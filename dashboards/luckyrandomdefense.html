 GameObject GetSummonEffect(UnitRatingType ratingType, Vector3 position, Quaternion rotation)\r\n        {\r\n            if (!_summonPoolDict.ContainsKey(ratingType)) return null;\r\n\r\n            GameObject obj = (_summonPoolDict[ratingType].Count == 0)\r\n                ? Instantiate(_summonEffectList.Find(x => x.ratingType == ratingType).effectPrefab, transform)\r\n                : _summonPoolDict[ratingType].Dequeue();\r\n\r\n            obj.transform.SetPositionAndRotation(position, rotation);\r\n            obj.SetActive(true);\r\n\r\n            return obj;\r\n        }\r\n\r\n        public void ReturnSummonEffect(UnitRatingType ratingType, GameObject obj)\r\n        {\r\n            obj.SetActive(false);\r\n            _summonPoolDict[ratingType].Enqueue(obj);\r\n        }\r\n    }\r\n\r\n\r\n}\r\n","lines":179},{"id":"02_Scripts/UI/TitleSlideIntro.cs","name":"TitleSlideIntro","path":"02_Scripts/UI/TitleSlideIntro.cs","layer":"UI","scenes":["HCH(한충희)","Main"],"entry":true,"summary":"TitleSlideIntro.cs 역할 : 타이틀 화면 슬라이드 인 연출 - 로고 : 화면 위 → 원위치 (떨어지기) - UI : 화면 아래 → 원위치 (올라오기) 부착 위치 : Canvas_Title 자식 GameObject (예: TitleIntroController) 인스펙터 연결 - logo : 위에서 떨어질 로고 RectTransform - titleUI : 아래에서 올라올 버튼 그룹 RectTransform (Sta","src":"// =================================================================\n// TitleSlideIntro.cs\n// 역할  : 타이틀 화면 슬라이드 인 연출\n//         - 로고 : 화면 위 → 원위치 (떨어지기)\n//         - UI   : 화면 아래 → 원위치 (올라오기)\n//\n// 부착 위치 : Canvas_Title 자식 GameObject (예: TitleIntroController)\n//\n// 인스펙터 연결\n// - logo       : 위에서 떨어질 로고 RectTransform\n// - titleUI    : 아래에서 올라올 버튼 그룹 RectTransform\n//                (Start/Settings/Exit 버튼을 하나의 부모 오브젝트로 묶을 것)\n//\n// 타이밍 흐름\n//   startDelay (페이드 끝나는 시점) → 로고 슬라이드 → uiDelayAfterLogo → UI 슬라이드\n// =================================================================\n\nusing DG.Tweening;\nusing UnityEngine;\n\nnamespace LuckyRandomDefense.UI\n{\n    public class TitleSlideIntro : MonoBehaviour\n    {\n        [Header(\"로고 (위에서 떨어짐)\")]\n        [SerializeField] private RectTransform logo;\n        [SerializeField] private float logoStartOffsetY = 800f;\n        [SerializeField] private float logoDuration = 0.7f;\n        [SerializeField] private Ease logoEase = Ease.OutBounce;\n\n        [Header(\"타이틀 UI (아래에서 올라옴)\")]\n        [SerializeField] private RectTransform titleUI;\n        [SerializeField] private float uiStartOffsetY = -800f;\n        [SerializeField] private float uiDuration = 0.6f;\n        [SerializeField] private Ease uiEase = Ease.OutBack;\n\n        [Header(\"타이밍\")]\n        [Tooltip(\"페이드 종료 시간과 맞출 것 (예: TitleIntroFader delay + duration)\")]\n        [SerializeField] private float startDelay = 2.3f;\n        [SerializeField] private float uiDelayAfterLogo = 0.2f;\n\n        private Vector2 _logoOriginalPos;\n        private Vector2 _uiOriginalPos;\n\n        private void Awake()\n        {\n            // 원본 위치 캐싱 → 화면 밖으로 이동\n            if (logo != null)\n            {\n                _logoOriginalPos = logo.anchoredPosition;\n                logo.anchoredPosition = _logoOriginalPos + new Vector2(0f, logoStartOffsetY);\n            }\n            else\n            {\n                Debug.LogWarning(\"[TitleSlideIntro] logo 미연결\");\n            }\n\n            if (titleUI != null)\n            {\n                _uiOriginalPos = titleUI.anchoredPosition;\n                titleUI.anchoredPosition = _uiOriginalPos + new Vector2(0f, uiStartOffsetY);\n            }\n            else\n            {\n                Debug.LogWarning(\"[TitleSlideIntro] titleUI 미연결\");\n            }\n        }\n\n        private void Start()\n        {\n            Sequence seq = DOTween.Sequence().SetLink(gameObject);\n\n            seq.AppendInterval(startDelay);\n\n            if (logo != null)\n            {\n                seq.Append(\n                    logo.DOAnchorPos(_logoOriginalPos, logoDuration)\n                        .SetEase(logoEase));\n            }\n\n            if (titleUI != null)\n            {\n                seq.AppendInterval(uiDelayAfterLogo);\n                seq.Append(\n                    titleUI.DOAnchorPos(_uiOriginalPos, uiDuration)\n                           .SetEase(uiEase));\n            }\n\n            seq.OnComplete(() => Debug.Log(\"[TitleSlideIntro] 슬라이드 완료\"));\n        }\n    }\n}\n","lines":94},{"id":"02_Scripts/SettingsManager.cs","name":"SettingsManager","path":"02_Scripts/SettingsManager.cs","layer":"Core","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"PlayerPrefs에서 설정값 로드","src":"﻿// =================================================================\r\n// SettingsManager.cs\r\n// 역할  : 게임 환경설정 데이터 관리 (볼륨, 해상도, 전체화면)\r\n//         PlayerPrefs로 로컬 저장\r\n//         타이틀/인게임 공용 사용\r\n//\r\n// 부착 위치 : 씬 내 Settings 오브젝트\r\n//\r\n// 의존성\r\n// - SettingsUI.cs : 슬라이더/토글 UI 갱신\r\n// - CloudSaveManager.cs : 수동 저장 시 클라우드 업로드\r\n//\r\n// 주의사항\r\n// - PlayerPrefs 키 변경 시 기존 저장값 초기화됨\r\n// - AudioMixer 사용 시 MixerGroup 연결 필요\r\n// =================================================================\r\n\r\nusing UnityEngine;\r\nusing UnityEngine.Audio;\r\n\r\nnamespace LuckyRandomDefense.Settings\r\n{\r\n    public class SettingsManager : MonoBehaviour\r\n    {\r\n        public static SettingsManager Instance { get; private set; }\r\n\r\n        // ── PlayerPrefs 키 ────────────────────────────────────────\r\n        private const string KeyBGM = \"Settings_BGM\";\r\n        private const string KeySFX = \"Settings_SFX\";\r\n        private const string KeyFull = \"Settings_Fullscreen\";\r\n\r\n        // ── AudioMixer 연결 ───────────────────────────────────────\r\n        // 주의 : AudioMixer 없으면 null로 두어도 작동\r\n        [Header(\"오디오 믹서 (선택)\")]\r\n        [SerializeField] private AudioMixer _audioMixer;\r\n\r\n        // ── 현재 설정값 ───────────────────────────────────────────\r\n        public float BGMVolume { get; private set; } = 1f;\r\n        public float SFXVolume { get; private set; } = 1f;\r\n        public bool IsFullscreen { get; private set; } = true;\r\n\r\n\r\n        // ================================================================\r\n        // 라이프사이클\r\n        // ================================================================\r\n\r\n        private void Awake()\r\n        {\r\n            if (Instance == null) Instance = this;\r\n            else { Destroy(gameObject); return; }\r\n\r\n            Load();\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 저장 / 로드\r\n        // ================================================================\r\n\r\n        /// <summary>PlayerPrefs에서 설정값 로드</summary>\r\n        public void Load()\r\n        {\r\n            BGMVolume = PlayerPrefs.GetFloat(KeyBGM, 1f);\r\n            SFXVolume = PlayerPrefs.GetFloat(KeySFX, 1f);\r\n            IsFullscreen = PlayerPrefs.GetInt(KeyFull, 1) == 1;\r\n\r\n            ApplyAll();\r\n            Debug.Log($\"[SettingsManager] 로드 완료 | BGM:{BGMVolume} SFX:{SFXVolume} Full:{IsFullscreen}\");\r\n        }\r\n\r\n        /// <summary>PlayerPrefs에 현재 설정값 저장</summary>\r\n        public void Save()\r\n        {\r\n            PlayerPrefs.SetFloat(KeyBGM, BGMVolume);\r\n            PlayerPrefs.SetFloat(KeySFX, SFXVolume);\r\n            PlayerPrefs.SetInt(KeyFull, IsFullscreen ? 1 : 0);\r\n            PlayerPrefs.Save();\r\n\r\n            Debug.Log(\"[SettingsManager] 로컬 저장 완료\");\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 설정값 변경\r\n        // ================================================================\r\n\r\n        public void SetBGMVolume(float value)\r\n        {\r\n            BGMVolume = Mathf.Clamp01(value);\r\n            ApplyBGM();\r\n        }\r\n\r\n        public void SetSFXVolume(float value)\r\n        {\r\n            SFXVolume = Mathf.Clamp01(value);\r\n            ApplySFX();\r\n        }\r\n\r\n        public void SetFullscreen(bool value)\r\n        {\r\n            IsFullscreen = value;\r\n            Screen.fullScreen = value;\r\n            Debug.Log($\"[SettingsManager] 전체화면 : {value}\");\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 적용\r\n        // ================================================================\r\n\r\n        private void ApplyAll()\r\n        {\r\n            ApplyBGM();\r\n            ApplySFX();\r\n            Screen.fullScreen = IsFullscreen;\r\n        }\r\n\r\n        private void ApplyBGM()\r\n        {\r\n            if (_audioMixer != null)\r\n                _audioMixer.SetFloat(\"BGM\", Mathf.Log10(Mathf.Max(BGMVolume, 0.0001f)) * 20f);\r\n        }\r\n\r\n        private void ApplySFX()\r\n        {\r\n            if (_audioMixer != null)\r\n                _audioMixer.SetFloat(\"SFX\", Mathf.Log10(Mathf.Max(SFXVolume, 0.0001f)) * 20f);\r\n        }\r\n    }\r\n}","lines":130},{"id":"02_Scripts/UI/Controller/UnitPanelController.cs","name":"UnitPanelController","path":"02_Scripts/UI/Controller/UnitPanelController.cs","layer":"UI","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"UnitBase의 최종 수치를 받는 새로운 UI 갱신 함수","src":"using LuckyRandomDefense.Core.EventBus;\r\nusing LuckyRandomDefense.Node;\r\nusing LuckyRandomDefense.Sound;\r\nusing LuckyRandomDefense.UI.Animation;\r\nusing LuckyRandomDefense.Unit;\r\nusing TMPro;\r\nusing UnityEngine;\r\nusing UnityEngine.UI;\r\n\r\nnamespace LuckyRandomDefense.UI.Controller\r\n{\r\n    public class UnitPanelController : MonoBehaviour\r\n    {\r\n        [SerializeField] private UIPopupAnimation[] _popupAnimations;\r\n\r\n        [Header(\"Unit Info Panel\")]\r\n        [SerializeField] private GameObject _infoPanel;\r\n        [SerializeField] private TextMeshProUGUI _unitName;\r\n        [SerializeField] private TextMeshProUGUI _unitAttack;\r\n        [SerializeField] private TextMeshProUGUI _unitAttackRange;\r\n\r\n        [Header(\"Action Panel\")]\r\n        [SerializeField] private GameObject _actionPanel;\r\n        [SerializeField] private float _panelOffset = 1.5f;\r\n\r\n\r\n        private void OnEnable() // 등록\r\n        {\r\n            UIEventBus.OnUnitBtnPopup += ShowPanel;\r\n            UIEventBus.OnUnitHidePanel += HidePanel;\r\n\r\n            UnitEventBus.OnUnitInteractionStarted += HidePanel;\r\n            UnitEventBus.OnUnitCollectionChanged += HidePanel;\r\n        }\r\n        private void OnDisable() // 해제\r\n        {\r\n            UIEventBus.OnUnitBtnPopup -= ShowPanel;\r\n            UIEventBus.OnUnitHidePanel -= HidePanel;\r\n\r\n            UnitEventBus.OnUnitInteractionStarted -= HidePanel;\r\n            UnitEventBus.OnUnitCollectionChanged -= HidePanel;\r\n        }\r\n\r\n        // UnitBase의 최종 수치를 받는 새로운 UI 갱신 함수\r\n        private void SetInfoPanelFromBase(UnitBase unitBase)\r\n        {\r\n            _popupAnimations[0].PlayOpen();\r\n            _popupAnimations[1].PlayOpen();\r\n\r\n            // UnitBase의 Public 프로퍼티 직접 참조\r\n            _unitName.text = unitBase.gameObject.name;\r\n            _unitAttack.text = \"Attack: \" + unitBase.FinalDamage.ToString(\"F1\");\r\n            _unitAttackRange.text = \"Range: \" + unitBase.FinalRange.ToString(\"F1\");\r\n\r\n            // 필요하다면 스킬 쿨타임 \r\n            // _unitCooldown.text = \"Cooldown: \" + unitBase.FinalSkillCooldown.ToString();\r\n        }\r\n\r\n        private void SetInfoPanel(UnitData unit)\r\n        {\r\n            _popupAnimations[0].PlayOpen();\r\n            _popupAnimations[1].PlayOpen();\r\n            _unitName.text = unit.unitName;\r\n            _unitAttack.text = \"Attack: \" + unit._damage.ToString();\r\n            _unitAttackRange.text = \"Attack Range: \" + unit._range.ToString();\r\n        }\r\n\r\n        public void ShowPanel(TileNode tile)\r\n        {\r\n            _popupAnimations[0].PlayOpen();\r\n            _popupAnimations[1].PlayOpen();\r\n            var stackUnits = tile.stackedUnits;\r\n\r\n            if (stackUnits == null || stackUnits.Count == 0)\r\n            {\r\n                Debug.Log(\"스택된 유닛 없음\");\r\n                HidePanel();\r\n                return;\r\n            }\r\n\r\n            var firstUnitObj = stackUnits[0];\r\n            UnitBase baseLogic = firstUnitObj.GetComponent<UnitBase>();\r\n\r\n            if (baseLogic != null)\r\n            {\r\n                // UnitBase Public 프로퍼티들을 사용해 판넬을 갱신\r\n                SetInfoPanelFromBase(baseLogic);\r\n            }\r\n            else\r\n            {\r\n                // 만약 UnitBase가 없다면 기본 데이터\r\n                SetInfoPanel(firstUnitObj.data);\r\n            }\r\n\r\n\r\n            //Vector3 worldPos = tile.transform.position;\r\n            //worldPos += Vector3.right * _panelOffset;\r\n            //Vector3 screenPos = Camera.main.WorldToScreenPoint(worldPos);\r\n            //_actionPanel.transform.position = screenPos;\r\n        }\r\n\r\n        public void HidePanel()\r\n        {\r\n            _popupAnimations[0].PlayClose();\r\n            _popupAnimations[1].PlayClose();\r\n            // _infoPanel.SetActive(false);\r\n            // _actionPanel.SetActive(false);\r\n            SoundEventBus.RaiseSFXRequested(SFXType.PanelClose);\r\n        }\r\n\r\n    }\r\n}","lines":112},{"id":"02_Scripts/UI/Controller/HeroicPanelController.cs","name":"HeroicPanelController","path":"02_Scripts/UI/Controller/HeroicPanelController.cs","layer":"UI","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"class HeroicPanelController : MonoBehaviour","src":"using LuckyRandomDefense.Core;\r\nusing LuckyRandomDefense.Core.EventBus;\r\nusing LuckyRandomDefense.Sound;\r\nusing LuckyRandomDefense.UI.Animation;\r\nusing System.Collections.Generic;\r\nusing TMPro;\r\nusing UnityEngine;\r\nusing UnityEngine.UI;\r\n\r\nnamespace LuckyRandomDefense.UI.Controller\r\n{\r\n    public class HeroicPanelController : MonoBehaviour\r\n    {\r\n        [SerializeField] private HeroicManager _heroicManager;\r\n\r\n        [Header(\"Heroic Panel\")]\r\n        [SerializeField] private GameObject _heroicPanel;\r\n        [SerializeField] private UIPopupAnimation _popupAnimation;\r\n        [SerializeField] private List<HeroicSlot> _heroicSlots;\r\n        [SerializeField] private Button _heroicBtn;\r\n\r\n        [System.Serializable]\r\n        public class HeroicSlot\r\n        {\r\n            [Header(\"Panel\")]\r\n            public GameObject panel;\r\n\r\n            [Header(\"Tab UI\")]\r\n            public GameObject tabNormal;\r\n            public GameObject tabFocus;\r\n\r\n            [Header(\"Recipe\")]\r\n            public TextMeshProUGUI Text_Unit1;\r\n            public TextMeshProUGUI Text_Unit2;\r\n\r\n            public GameObject checkMark1;\r\n            public GameObject checkMark2;\r\n        }\r\n        private void OnEnable()\r\n        {\r\n            UnitEventBus.OnUnitCollectionChanged += RefreshAllSlots;\r\n            UnitEventBus.OnUnitCollectionChanged += HidePanel;\r\n\r\n            UnitEventBus.OnUnitInteractionStarted += HidePanel;\r\n        }\r\n        private void OnDisable()\r\n        {\r\n            UnitEventBus.OnUnitCollectionChanged -= RefreshAllSlots;\r\n            UnitEventBus.OnUnitCollectionChanged -= HidePanel;\r\n\r\n            UnitEventBus.OnUnitInteractionStarted -= HidePanel;   \r\n        }\r\n\r\n        private void HidePanel() {\r\n            _popupAnimation.PlayClose();\r\n            SoundEventBus.RaiseSFXRequested(SFXType.PanelClose);\r\n        }\r\n\r\n       \r\n        public void ToggleHeroicPanel()\r\n        {\r\n            SoundEventBus.RaiseSFXRequested(SFXType.ButtonClick);\r\n            bool isActive = !_heroicPanel.activeSelf;\r\n\r\n            if (isActive)\r\n            {\r\n                _popupAnimation.PlayOpen();\r\n\r\n                int craftableIndex = GetFirstCraftableIndex();\r\n\r\n                if (craftableIndex >= 0)\r\n                {\r\n                    ShowHeroicPanel(craftableIndex);\r\n                }\r\n                else\r\n                {\r\n                    ShowHeroicPanel(0);\r\n                }\r\n\r\n                return;\r\n            }\r\n\r\n            _popupAnimation.PlayClose();\r\n            SoundEventBus.RaiseSFXRequested(SFXType.PanelClose);\r\n        }\r\n        public void ShowHeroicPanel(int index)\r\n        {\r\n            _heroicPanel.SetActive(true);\r\n\r\n            for (int i = 0; i < _heroicSlots.Count; i++)\r\n            {\r\n                bool isSelected = (i == index);\r\n\r\n                // 패널 활성화\r\n                _heroicSlots[i].panel.SetActive(isSelected);\r\n\r\n                // 탭 상태 변경\r\n                _heroicSlots[i].tabNormal.SetActive(!isSelected);\r\n                _heroicSlots[i].tabFocus.SetActive(isSelected);\r\n            }\r\n\r\n            UpdateHeroicSlot(index);\r\n        }\r\n        private void RefreshAllSlots()\r\n        {\r\n            for (int i = 0; i < _heroicSlots.Count; i++)\r\n            {\r\n                UpdateHeroicSlot(i);\r\n            }\r\n        }\r\n\r\n        public void UpdateHeroicSlot(int index)\r\n        {\r\n            var status = _heroicManager.GetRecipeStatus(index);\r\n            var slot = _heroicSlots[index];\r\n\r\n            slot.Text_Unit1.text = $\"{status.unitName1}\\n({status.owned1}/{status.required1})\";\r\n\r\n            slot.Text_Unit2.text = $\"{status.unitName2}\\n({status.owned2}/{status.required2})\";\r\n\r\n            slot.Text_Unit1.color = status.owned1 >= status.required1 ? Color.green : Color.red;\r\n            slot.checkMark1.SetActive(status.owned1 >= status.required1);\r\n            slot.Text_Unit2.color = status.owned2 >= status.required2 ? Color.green : Color.red;\r\n            slot.checkMark2.SetActive(status.owned2 >= status.required2);\r\n        }\r\n\r\n        private int GetFirstCraftableIndex()\r\n        {\r\n            for (int i = 0; i < _heroicSlots.Count; i++)\r\n            {\r\n                var status = _heroicManager.GetRecipeStatus(i);\r\n\r\n                bool canCraft =\r\n                    status.owned1 >= status.required1 &&\r\n                    status.owned2 >= status.required2;\r\n\r\n                if (canCraft)\r\n                    return i;\r\n            }\r\n\r\n            return -1;\r\n        }\r\n    }\r\n}","lines":144},{"id":"02_Scripts/UI/Controller/HUDController.cs","name":"HUDController","path":"02_Scripts/UI/Controller/HUDController.cs","layer":"UI","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"class HUDController : MonoBehaviour","src":"using LuckyRandomDefense.Core;\r\nusing LuckyRandomDefense.Core.EventBus;\r\nusing LuckyRandomDefense.Sound;\r\nusing LuckyRandomDefense.Unit;\r\nusing System.Collections;\r\nusing TMPro;\r\nusing UnityEngine;\r\nusing UnityEngine.UI;\r\n\r\nnamespace LuckyRandomDefense.UI.Controller\r\n{\r\n    public class HUDController : MonoBehaviour\r\n    {\r\n        [Header(\"HUD Text\")]\r\n        [SerializeField] private TextMeshProUGUI _goldText;\r\n        [SerializeField] private TextMeshProUGUI _waveText;\r\n        [SerializeField] private TextMeshProUGUI _nexusText;\r\n        [SerializeField] private TextMeshProUGUI _timeLimitText;\r\n        [SerializeField] private Slider _nexusSlider;\r\n\r\n        [Header(\"Buttons\")]\r\n        [SerializeField] private Button _summonBtn;\r\n        [SerializeField] private Button _pauseBtn;\r\n\r\n        [Header(\"Nexus Warning\")]\r\n        [SerializeField] private Color _normalNexusColor = Color.white;\r\n        [SerializeField] private Color _warningNexusColor = Color.red;\r\n        [SerializeField] private int _warningLifeThreshold = 30;\r\n\r\n        [Header(\"Warning Text\")]\r\n        [SerializeField] private GameObject _warningTextPanel;\r\n        [SerializeField] private TextMeshProUGUI _warningText;\r\n\r\n        private Coroutine _warningTextCoroutine;\r\n\r\n        private Coroutine _warningCoroutine;\r\n\r\n        private UnitSpawner _unitSpawner;\r\n\r\n        private void Start()\r\n        {\r\n            if (_unitSpawner == null)\r\n            {\r\n                _unitSpawner = UnitSpawner.Instance;\r\n            }\r\n\r\n            _warningText.gameObject.SetActive(false);\r\n            _nexusSlider.maxValue = 100;\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            GameEventBus.OnGoldChanged += UpdateGoldText;\r\n            GameEventBus.OnWaveChanged += UpdateWaveText;\r\n            GameEventBus.OnNexusLifeChanged += UpdateRemainLife;\r\n            GameEventBus.OnTimeLimitChanged += UpdateTime;\r\n            UIEventBus.OnWarningMessage += ShowWarningText;\r\n\r\n        }\r\n\r\n        private void OnDisable()\r\n        {\r\n            GameEventBus.OnGoldChanged -= UpdateGoldText;\r\n            GameEventBus.OnWaveChanged -= UpdateWaveText;\r\n            GameEventBus.OnNexusLifeChanged -= UpdateRemainLife;\r\n            GameEventBus.OnTimeLimitChanged -= UpdateTime;\r\n            UIEventBus.OnWarningMessage -= ShowWarningText;\r\n        }\r\n\r\n\r\n        public void InitializeUI(int currentGold, int nexusLife, int timeLimit)\r\n        {\r\n            UpdateGoldText(currentGold);\r\n            UpdateWaveText(1);\r\n            UpdateTime(timeLimit);\r\n            UpdateRemainLife(nexusLife);\r\n\r\n            RefreshSummonButton();\r\n        }\r\n\r\n        public void UpdateGoldText(int currentGold)\r\n        {\r\n            if (_goldText != null)\r\n            {\r\n                _goldText.text = $\"{currentGold}Gold\";\r\n            }\r\n            else\r\n            {\r\n                Debug.LogWarning(\"GoldText가 연결되지 않았다.\");\r\n            }\r\n\r\n            RefreshSummonButton();\r\n        }\r\n\r\n        public void UpdateWaveText(int wave)\r\n        {\r\n            if (_waveText != null)\r\n            {\r\n                _waveText.text = $\"WAVE {wave}\";\r\n                Debug.Log($\"WaveText 업데이트: wave {wave}\");\r\n            }\r\n            else\r\n            {\r\n                Debug.LogWarning(\"WaveText가 연결되지 않았다.\");\r\n            }\r\n        }\r\n\r\n        public void UpdateRemainLife(int nexusLife)\r\n        {\r\n            if (_nexusText != null)\r\n            {\r\n                _nexusText.text = $\"{nexusLife}/100\";\r\n\r\n                _nexusSlider.value = nexusLife;\r\n\r\n                if (nexusLife <= _warningLifeThreshold)\r\n                {\r\n                    _nexusText.color = _warningNexusColor;\r\n\r\n                    if (_warningCoroutine == null)\r\n                    {\r\n                        _warningCoroutine = StartCoroutine(BlinkNexusText());\r\n                    }\r\n                }\r\n                else\r\n                {\r\n                    _nexusText.color = _normalNexusColor;\r\n\r\n                    if (_warningCoroutine != null)\r\n                    {\r\n                        StopCoroutine(_warningCoroutine);\r\n                        _warningCoroutine = null;\r\n\r\n                        _nexusText.alpha = 1f;\r\n                    }\r\n                }\r\n            }\r\n            else\r\n            {\r\n                Debug.LogWarning(\"NexusText가 연결되지 않았다.\");\r\n            }\r\n        }\r\n\r\n        private IEnumerator BlinkNexusText()\r\n        {\r\n            while (true)\r\n            {\r\n                _nexusText.alpha = 0.3f;\r\n                yield return new WaitForSeconds(0.3f);\r\n\r\n                _nexusText.alpha = 1f;\r\n                yield return new WaitForSeconds(0.3f);\r\n            }\r\n        }\r\n\r\n        public void UpdateTime(int time)\r\n        {\r\n            if (_timeLimitText != null)\r\n            {\r\n                int minute = time / 60;\r\n                int second = time % 60;\r\n                _timeLimitText.text = $\"{minute:D2} : {second:D2}\";\r\n            }\r\n            else\r\n            {\r\n                Debug.LogWarning(\"TimeLimitText가 연결되지 않았다.\");\r\n            }\r\n        }\r\n\r\n        public void OnClickPause()\r\n        {\r\n            SoundEventBus.RaiseSFXRequested(SFXType.ButtonClick);\r\n            GameManager.Instance.TogglePause();\r\n        }\r\n\r\n        public void OnClickSummon()\r\n        {\r\n            SoundEventBus.RaiseSFXRequested(SFXType.ButtonClick);\r\n            UnitEventBus.RaiseUnitSummonRequested();\r\n        }\r\n\r\n        private void RefreshSummonButton()\r\n        {\r\n            if (_summonBtn == null || _unitSpawner == null)\r\n                return;\r\n\r\n            int summonCost = _unitSpawner.GetSummonCost();\r\n\r\n            _summonBtn.interactable =\r\n                GameManager.Instance.Gold >= summonCost;\r\n        }\r\n\r\n        public void ShowWarningText(string message)\r\n        {\r\n            if (_warningTextCoroutine != null)\r\n            {\r\n                StopCoroutine(_warningTextCoroutine);\r\n            }\r\n\r\n            _warningTextCoroutine =\r\n                StartCoroutine(WarningTextRoutine(message));\r\n        }\r\n\r\n        private IEnumerator WarningTextRoutine(string message)\r\n        {\r\n            _warningTextPanel.SetActive(true);\r\n            _warningText.text = message;\r\n\r\n            yield return new WaitForSeconds(1.5f);\r\n\r\n            _warningTextPanel.SetActive(false);\r\n        }\r\n    }\r\n}","lines":214},{"id":"02_Scripts/UI/UIManager.cs","name":"UIManager","path":"02_Scripts/UI/UIManager.cs","layer":"UI","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"UIManager 역할 최소화 각 Controller 참조만 보관 Initialize 호출만 담당","src":"using UnityEngine;\r\nusing System.Collections.Generic;\r\nusing TMPro;\r\nusing LuckyRandomDefense.UI.Controller;\r\n\r\nnamespace LuckyRandomDefense.UI\r\n{\r\n    public class UIManager : MonoBehaviour\r\n    {\r\n        // UIManager 역할 최소화\r\n        // 각 Controller 참조만 보관\r\n        // Initialize 호출만 담당\r\n\r\n        [SerializeField] private HUDController _hud;\r\n        [SerializeField] private UnitPanelController _unit;\r\n        [SerializeField] private HeroicPanelController _heroic;\r\n\r\n        [Header(\"Bounty\")]\r\n        [SerializeField] private GameObject _bountyContainer;\r\n        [SerializeField] private GameObject _bountyPrefab;\r\n\r\n        public void InitializeUI(int currentGold, int nexusLife, int timeLimit)\r\n        {\r\n            _hud.InitializeUI(currentGold, nexusLife, timeLimit);\r\n        }\r\n\r\n        public void UpdateBounty(List<EnemyData> enemyPattern)\r\n        {\r\n            if (enemyPattern != null && enemyPattern.Count > 0)\r\n            {\r\n                HashSet<string> usedNames = new HashSet<string>();\r\n                List<EnemyData> uniqueEnemies = new List<EnemyData>();\r\n\r\n                foreach (var enemy in enemyPattern)\r\n                {\r\n                    if (usedNames.Add(enemy._name))\r\n                    {\r\n                        uniqueEnemies.Add(enemy);\r\n                    }\r\n                }\r\n\r\n                foreach (var enemy in uniqueEnemies)\r\n                {\r\n                    GameObject bountyGO = Instantiate(_bountyPrefab, _bountyContainer.transform);\r\n                    bountyGO.name = $\"Bounty_{enemy._name}\";\r\n\r\n                    TextMeshProUGUI bountyNameText = bountyGO.transform.Find(\"Text_Name\").GetComponentInChildren<TextMeshProUGUI>();\r\n                    TextMeshProUGUI bountyGoldText = bountyGO.transform.Find(\"Text_Gold\").GetComponentInChildren<TextMeshProUGUI>();\r\n                    bountyNameText.text = enemy._name;\r\n                    bountyGoldText.text = $\"{enemy._gold}Gold\";\r\n                }\r\n            }\r\n            else\r\n            {\r\n                Debug.LogWarning(\"enemyPattern이 null이거나 비어 있습니다.\");\r\n            }\r\n        }\r\n    }\r\n}","lines":59},{"id":"02_Scripts/Core/WaveManager.cs","name":"WaveManager","path":"02_Scripts/Core/WaveManager.cs","layer":"Core","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"스테이지 전체 클리어 시 호출 난이도별 자동 해금 처리","src":"using UnityEngine;\r\nusing System.Collections;\r\nusing System.Collections.Generic;\r\nusing LuckyRandomDefense.Enemy;\r\nusing LuckyRandomDefense.Node;\r\nusing LuckyRandomDefense.Core.EventBus;\r\nusing LuckyRandomDefense.Save;\r\n\r\nnamespace LuckyRandomDefense.Core\r\n{\r\n    public class WaveManager : MonoBehaviour\r\n    {\r\n        public static WaveManager Instance { get; private set; }\r\n\r\n        [Header(\"Wave Setting\")]\r\n        [SerializeField] private List<WaveData> _waves;\r\n        [SerializeField] private int _currentWaveIndex = 0;\r\n        [SerializeField] private ProceduralMap _map;\r\n\r\n        [Header(\"자동저장\")]\r\n        [Tooltip(\"N웨이브마다 자동저장 — 1로 두면 매 웨이브 끝날 때마다 저장됨\")]\r\n        [SerializeField] private int autoSaveInterval = 5;\n\r\n        [Header(\"BGM Setting\")] // TODO: SoundManager로 이동 + WaveReady 부터 출력\r\n        [SerializeField] private AudioSource _bgmSource;\r\n        [SerializeField] private AudioClip _bgmNormalWave;\r\n        [SerializeField] private AudioClip _bgmBossWave;\r\n        [SerializeField] private float _fadeDuration = 1f;\r\n\r\n        private Coroutine _fadeCoroutine;\r\n\r\n        private bool _isSpawning = false;\r\n        private bool _isWaveRunning = false;\r\n\r\n        public WaveData _currentWave;\r\n\r\n        public int CurrentWaveIndex\r\n        {\r\n            get { return _currentWaveIndex; }\r\n            set\r\n            {\r\n                _currentWaveIndex = value;\r\n                GameEventBus.RaiseUpdateWaveText(_currentWaveIndex + 1);\r\n            }\r\n        }\r\n\r\n        [SerializeField] private float _timer;\r\n        [SerializeField] private bool _isWaveOver = false;\r\n\r\n        public bool IsWaveOver\r\n        {\r\n            get { return _isWaveOver; }\r\n            set { _isWaveOver = value; }\r\n        }\r\n\r\n        // ================================================================\r\n        // 라이프사이클\r\n        // ================================================================\r\n\r\n        private void Awake()\r\n        {\r\n            if (Instance == null) Instance = this;\r\n            else Destroy(gameObject);\r\n\r\n            // _currentWave를 Awake에서 초기화 → GameManager.Start()보다 먼저 보장\r\n            if (_waves != null && _waves.Count > 0)\r\n                _currentWave = _waves[0];\r\n        }\r\n\r\n        private void Start()\r\n        {\r\n            if (_waves.Count > 0)\r\n                _timer = GameManager.Instance.TimeLimit;\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            GameEventBus.OnGameStateChanged += HandleGameStateChanged;\r\n        }\r\n\r\n        private void OnDisable()\r\n        {\r\n            GameEventBus.OnGameStateChanged -= HandleGameStateChanged;\r\n        }\r\n\r\n        private bool _isFirstWaveReady = true; // 게임 시작 첫 WAVE_READY 구분용\r\n\r\n        // ================================================================\r\n        // 상태 전환 처리\r\n        // ================================================================\r\n\r\n        private void HandleGameStateChanged(GameState gameState)\r\n        {\r\n            switch (gameState)\r\n            {\r\n                case GameState.WAVE_READY:\r\n                    // 게임 시작 첫 WAVE_READY는 EndWave 건너뜀\r\n                    if (_isFirstWaveReady)\r\n                    {\r\n                        _isFirstWaveReady = false;\r\n                        Debug.Log(\"[WaveManager] 첫 WAVE_READY → EndWave 생략\");\r\n                        return;\r\n                    }\r\n                    EndWave();\r\n                    break;\r\n\r\n                case GameState.WAVE_PROGRESS:\r\n                    TryStartWave();\r\n                    break;\r\n\r\n                default:\r\n                    break;\r\n            }\r\n        }\r\n\r\n        private void TryStartWave()\r\n        {\r\n            // 이미 웨이브 진행 중이면 중복 시작 방지\r\n            if (_isWaveRunning)\r\n            {\r\n                Debug.Log(\"[WaveManager] 이미 웨이브 진행 중 → 중복 시작 무시\");\r\n                return;\r\n            }\r\n\r\n            if (_currentWaveIndex < _waves.Count)\r\n            {\r\n                StartWave(_currentWaveIndex);\r\n                _isWaveRunning = true;\r\n            }\r\n            else\r\n            {\r\n                Debug.Log(\"[WaveManager] 모든 웨이브 완료!\");\r\n                _isWaveOver = true;\r\n                OnAllWavesCleared();\r\n            }\r\n        }\r\n\r\n        /// <summary>스테이지 전체 클리어 시 호출 — 난이도별 자동 해금 처리</summary>\r\n        private void OnAllWavesCleared()\r\n        {\r\n            var stage = GameManager.Instance?.GetCurrentStage();\r\n            if (stage == null)\r\n            {\r\n                Debug.LogWarning(\"[WaveManager] OnAllWavesCleared : 현재 스테이지 정보 없음 → 해금 처리 스킵\");\r\n                return;\r\n            }\r\n\r\n            if (UserDataManager.Instance == null)\r\n            {\r\n                Debug.LogWarning(\"[WaveManager] OnAllWavesCleared : UserDataManager null → 해금 처리 스킵\");\r\n                return;\r\n            }\r\n\r\n            Debug.Log($\"[WaveManager] 스테이지 클리어 처리 시작 (difficulty={stage.difficulty}, isTutorial={stage.isTutorial})\");\r\n\r\n            // 난이도별 다음 단계 해금\r\n            // 튜토리얼인 경우 TutorialManager.EndTutorial에서 처리되므로 중복 호출 회피 가능\r\n            // 그래도 UnlockDifficulty 내부에 이미 중복 체크 있어서 안전함\r\n            switch (stage.difficulty)\r\n            {\r\n                case DifficultyType.EASY:\n                    if (stage.isTutorial)\n                        UserDataManager.Instance.SetTutorialCompleted();\n                    else\n                        UserDataManager.Instance.UnlockDifficulty(DifficultyType.NORMAL);\n                    UserDataManager.Instance.ClearRun(uploadToCloud: false);\n                    GameManager.Instance?.ReturnToTitleScreen();\n                    break;\n\n                case DifficultyType.NORMAL:\n                    UserDataManager.Instance.UnlockDifficulty(DifficultyType.HARD);\n                    UserDataManager.Instance.ClearRun(uploadToCloud: false);\n                    GameManager.Instance?.ReturnToTitleScreen();\n                    break;\n\n                case DifficultyType.HARD:\n                    Debug.Log(\"[WaveManager] HARD 클리어 — 최고 난이도 도달, 추가 해금 없음\");\n                    UserDataManager.Instance.ClearRun(uploadToCloud: false);\n                    GameManager.Instance?.ReturnToTitleScreen();\n                    break;\n            }\r\n        }\r\n\r\n        // ================================================================\r\n        // 스테이지 적용 (GameManager.SetCurrentStage에서 호출)\r\n        // ================================================================\r\n\r\n        public void SetStage(StageData stage)\r\n        {\r\n            if (stage == null || stage.waves == null || stage.waves.Count == 0)\r\n            {\r\n                Debug.LogError(\"[WaveManager] SetStage : 유효한 stage 없음\");\r\n                return;\r\n            }\r\n\r\n            _waves = stage.waves;\r\n            _currentWaveIndex = 0;\r\n            _currentWave = _waves[0];\r\n            _isFirstWaveReady = true;\r\n            _isWaveOver = false;\r\n            _isWaveRunning = false;\r\n\r\n            Debug.Log($\"[WaveManager] 스테이지 적용 완료 | 웨이브 {_waves.Count}개 | 첫 웨이브: {_currentWave?.name}\");\r\n        }\r\n\r\n\r\n        public void EndWave()\r\n        {\r\n            _isWaveRunning = false;\r\n            StopAllCoroutines();\r\n            CurrentWaveIndex++;\n\n            if (_currentWaveIndex >= _waves.Count)\n            {\n                Debug.Log(\"[WaveManager] 마지막 웨이브 종료 → 스테이지 클리어 처리\");\n                _isWaveOver = true;\n                OnAllWavesCleared();\n                return;\n            }\n\n            // 다음 웨이브 데이터 갱신\n            _currentWave = _waves[_currentWaveIndex];\n\r\n            Debug.Log($\"[WaveManager] 웨이브 종료 → 다음 웨이브: {_currentWaveIndex + 1}\");\r\n\r\n            TryAutoSave();\r\n\r\n            // 튜토리얼 매니저에 알림 (Tutorial 진행 중인 경우만 반응)\r\n            LuckyRandomDefense.Tutorial.TutorialManager.Instance?.NotifyWaveEnded(_currentWaveIndex);\r\n        }\r\n\r\n        private void TryAutoSave()\r\n        {\r\n            if (autoSaveInterval <= 0) return;\r\n            if (_currentWaveIndex % autoSaveInterval != 0) return;\r\n            if (UserDataManager.Instance == null) return;\n\n            var stage = GameManager.Instance?.GetCurrentStage();\n            if (stage != null && stage.isTutorial)\n            {\n                Debug.Log(\"[WaveManager] 튜토리얼 스테이지 → 이어하기 자동 저장 생략\");\n                return;\n            }\n\r\n            RunSaveData snap = SnapshotBuilder.Build(\"auto\");\r\n            UserDataManager.Instance.SaveRun(snap);\r\n            Debug.Log($\"[WaveManager] 자동저장 완료 (웨이브 {_currentWaveIndex})\");\r\n        }\r\n\r\n        public void StartWave(int index)\r\n        {\r\n            if (index >= _waves.Count) return;\r\n\r\n            Debug.Log($\"[WaveManager] Wave {index + 1} 시작!\");\r\n            _currentWave = _waves[index];\r\n            StartCoroutine(SpawnRoutine(_waves[index]));\r\n\r\n            ChangeBGM(index + 1);\r\n        }\r\n\r\n        // ================================================================\r\n        // 스폰\r\n        // ================================================================\r\n\r\n        private IEnumerator SpawnRoutine(WaveData data)\r\n        {\r\n            _isSpawning = true;\r\n            int spawnedCount = 0;\r\n\r\n            if (data._enemyPattern == null || data._enemyPattern.Count == 0)\r\n            {\r\n                _isSpawning = false;\r\n                yield break;\r\n            }\r\n\r\n            while (spawnedCount < data._enemyCount)\r\n            {\r\n                EnemyData currentEnemyData = data._enemyPattern[spawnedCount % data._enemyPattern.Count];\r\n                SpawnEnemy(currentEnemyData, data._hpRatio);\r\n                spawnedCount++;\r\n                yield return new WaitForSeconds(data._spawnDelay);\r\n            }\r\n\r\n            _isSpawning = false;\r\n        }\r\n\r\n        private void SpawnEnemy(EnemyData data, float hpRatio)\r\n        {\r\n            GameObject enemyObj = PoolManager.Instance.GetEnemy(data);\r\n            Vector3 spawnPos = _map.Tiles[_map.SpawnPos.x, _map.SpawnPos.y].transform.position;\r\n\r\n            if (enemyObj == null) return;\r\n\r\n            enemyObj.transform.position = spawnPos;\r\n\r\n            EnemyBase enemy = enemyObj.GetComponent<EnemyBase>();\r\n            if (enemy != null)\r\n            {\r\n                enemy.Init(data);\r\n                enemy.ApplyWaveRatio(hpRatio);\r\n            }\r\n\r\n            var goal = enemyObj.GetComponent<EnemyAI>();\r\n            goal?.InitializePath();\r\n        }\r\n\r\n        private void ChangeBGM(int waveNum)\r\n        {\r\n            AudioClip nextClip;\r\n\r\n            if(waveNum % 10 == 0)\r\n            {\r\n                nextClip = _bgmBossWave;\r\n            }\r\n            else\r\n            {\r\n                nextClip = _bgmNormalWave;\r\n            }\r\n\r\n            if (_bgmSource.clip == nextClip) return;\r\n\r\n            if(_fadeCoroutine != null) StopCoroutine(_fadeCoroutine);\r\n\r\n            _fadeCoroutine = StartCoroutine(FadeBGM(nextClip, _fadeDuration));\r\n        }\r\n\r\n        private IEnumerator FadeBGM(AudioClip newClip, float duration)\r\n        {\r\n            float startVolume = _bgmSource.volume;\r\n\r\n            for(float t = 0; t < duration; t += Time.deltaTime)\r\n            {\r\n                _bgmSource.volume = Mathf.Lerp(startVolume, 0, t / duration);\r\n                yield return null;\r\n            }\r\n            _bgmSource.volume = 0;\r\n\r\n            _bgmSource.clip = newClip;\r\n            _bgmSource.Play();\r\n\r\n            for (float t = 0; t < duration; t += Time.deltaTime)\r\n            {\r\n                _bgmSource.volume = Mathf.Lerp(0, startVolume, t / duration);\r\n                yield return null;\r\n            }\r\n            _bgmSource.volume = startVolume;\r\n        }\r\n    }\r\n}\r\n","lines":350},{"id":"02_Scripts/Test/SFXDebugTester.cs","name":"SFXDebugTester","path":"02_Scripts/Test/SFXDebugTester.cs","layer":"Test","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"class SFXDebugTest : MonoBehaviour","src":"using LuckyRandomDefense.Core.EventBus;\r\nusing LuckyRandomDefense.Sound;\r\nusing TMPro;\r\nusing UnityEngine;\r\nusing UnityEngine.UI;\r\n\r\nnamespace LuckyRandomDefense.Test\r\n{\r\n    public class SFXDebugTest : MonoBehaviour\r\n    {\r\n        [SerializeField] private TMP_Dropdown _dropdown;\r\n        [SerializeField] private SoundManager _soundManager;\r\n        [SerializeField] private TMP_Text _currentClipText;\r\n\r\n        private void Start()\r\n        {\r\n            RefreshDropdown();\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            _dropdown.onValueChanged.AddListener(OnDropdownChanged);\r\n        }\r\n\r\n        private void OnDisable()\r\n        {\r\n            _dropdown.onValueChanged.RemoveListener(OnDropdownChanged);\r\n        }\r\n\r\n        private void RefreshDropdown()\r\n        {\r\n            _dropdown.options.Clear();\r\n\r\n            foreach (AudioClip clip in _soundManager.Clips)\r\n            {\r\n                _dropdown.options.Add(\r\n                    new TMP_Dropdown.OptionData(clip.name));\r\n                _currentClipText.text = clip.name;\r\n            }\r\n\r\n            _dropdown.RefreshShownValue();\r\n        }\r\n        private void OnDropdownChanged(int index)\r\n        {\r\n            PlaySelectedClip(index);\r\n        }\r\n\r\n        private void PlaySelectedClip(int index)\r\n        {\r\n            AudioClip clip = _soundManager.Clips[index];\r\n\r\n            _soundManager.SFXSource.PlayOneShot(clip);\r\n        }\r\n\r\n        public void PlayNext()\r\n        {\r\n            int nextIndex = _dropdown.value + 1;\r\n\r\n            if (nextIndex >= _dropdown.options.Count)\r\n            {\r\n                nextIndex = 0;\r\n            }\r\n\r\n            _dropdown.value = nextIndex;\r\n        }\r\n\r\n        public void PlayPrevious()\r\n        {\r\n            int prevIndex = _dropdown.value - 1;\r\n\r\n            if (prevIndex < 0)\r\n            {\r\n                prevIndex = _dropdown.options.Count - 1;\r\n            }\r\n\r\n            _dropdown.value = prevIndex;\r\n        }\r\n    }\r\n}","lines":79},{"id":"02_Scripts/UI/Popup/Pause.cs","name":"Pause","path":"02_Scripts/UI/Popup/Pause.cs","layer":"UI","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"class Pause : PopupBase","src":"using LuckyRandomDefense.Core;\r\nusing System.Collections;\r\nusing UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.UI.Popup\r\n{\r\n    public class Pause : PopupBase\r\n    {\r\n        protected override GameState ShowOnState => GameState.PAUSE;\r\n\r\n        protected override void Awake()\r\n        {\r\n            base.Awake();\r\n        }\r\n\r\n        protected override void OnDestroy()\r\n        {\r\n            base.OnDestroy();\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n        }\r\n\r\n        protected override void OnShow()\r\n        {\r\n            StartCoroutine(CoPause());\r\n        }\r\n\r\n        IEnumerator CoPause()\r\n        {\r\n            Debug.Log(\"Pause\");\r\n            yield return Time.timeScale = 0f;\r\n        }\r\n    }\r\n}\r\n","lines":37},{"id":"02_Scripts/Quest/QuestUIController.cs","name":"QuestUIController","path":"02_Scripts/Quest/QuestUIController.cs","layer":"Quest","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"QuestManager → RaiseQuestProgressUpdated → 여기서 수신 처치 수 / 목표 텍스트 및 프로그레스바 갱신","src":"﻿// =================================================================\n// QuestUIController.cs\n// 역할  : 퀘스트 UI 제어\n//         평소 → 사이드 패널에 진행도 표시\n//         달성 시 → 팝업으로 보상 안내 후 자동 닫힘\n//\n// 부착 위치 : Canvas 하위 QuestUI 오브젝트에 부착\n//\n// 변경사항\n// - Text → TextMeshProUGUI 교체\n// - using TMPro 추가\n//\n// 네임스페이스 의존성\n// - LuckyRandomDefense.Core  : EventBus 참조\n// - LuckyRandomDefense.Quest : QuestStage, QuestManager 참조\n// - UnityEngine.UI            : Slider 참조\n// - TMPro                     : TextMeshProUGUI 참조\n//\n// 인스펙터 연결 필수 항목\n// - sidePanel         : 사이드 패널 루트 오브젝트\n// - progressBar       : 진행도 Slider\n// - killCountText     : \"처치 수 / 목표\" TMP 텍스트\n// - nextRewardText    : 다음 보상 골드 TMP 텍스트\n// - popup             : 달성 팝업 루트 오브젝트 (기본 비활성화)\n// - popupTitleText    : 팝업 단계명 TMP 텍스트\n// - popupRewardText   : 팝업 보상 골드 TMP 텍스트\n// - popupDuration     : 팝업 자동 닫힘 시간 (기본 2초)\n// =================================================================\n\nusing System.Collections;\nusing UnityEngine;\nusing UnityEngine.UI;\nusing TMPro;\nusing LuckyRandomDefense.Core.EventBus;\nusing LuckyRandomDefense.Quest;\n\nnamespace LuckyRandomDefense.UI\n{\n    public class QuestUIController : MonoBehaviour\n    {\n        // ── 사이드 패널 ───────────────────────────────────────────\n        [Header(\"사이드 패널\")]\n        [SerializeField] private GameObject sidePanel;\n        [SerializeField] private Slider progressBar;\n        [SerializeField] private TextMeshProUGUI killCountText;\n        [SerializeField] private TextMeshProUGUI nextRewardText;\n\n        // ── 달성 팝업 ─────────────────────────────────────────────\n        // 주의 : popup 오브젝트는 기본 비활성화 상태로 설정할 것\n        [Header(\"달성 팝업\")]\n        [SerializeField] private GameObject popup;\n        [SerializeField] private TextMeshProUGUI popupTitleText;\n        [SerializeField] private TextMeshProUGUI popupRewardText;\n\n        // ── 팝업 설정 ─────────────────────────────────────────────\n        [Header(\"팝업 설정\")]\n        [SerializeField] private float popupDuration = 2f;\n\n        // ── 내부 상태 ─────────────────────────────────────────────\n        private Coroutine _popupCoroutine;\n\n\n        // ================================================================\n        // 라이프사이클\n        // ================================================================\n\n        private void Awake()\n        {\n            if (sidePanel == null) Debug.LogError(\"[QuestUIController] sidePanel 미연결\");\n            if (progressBar == null) Debug.LogError(\"[QuestUIController] progressBar 미연결\");\n            if (killCountText == null) Debug.LogError(\"[QuestUIController] killCountText 미연결\");\n            if (nextRewardText == null) Debug.LogError(\"[QuestUIController] nextRewardText 미연결\");\n            if (popup == null) Debug.LogError(\"[QuestUIController] popup 미연결\");\n\n            // 팝업 초기 비활성화\n            if (popup != null) popup.SetActive(false);\n        }\n\n        private void OnEnable()\n        {\n            #region EventBus 구독\n\n            // 발행 : QuestManager.HandleEnemyKilled() → RaiseQuestProgressUpdated\n            GameEventBus.OnQuestProgressUpdated += HandleQuestProgressUpdated;\n\n            // 발행 : QuestManager.CheckStageCompletion() → RaiseQuestStageCompleted\n            GameEventBus.OnQuestStageCompleted += HandleQuestStageCompleted;\n\n            #endregion\n\n            Debug.Log(\"[QuestUIController] 이벤트 구독 완료\");\n        }\n\n        private void OnDisable()\n        {\n            #region EventBus 구독 해제\n\n            GameEventBus.OnQuestProgressUpdated -= HandleQuestProgressUpdated;\n            GameEventBus.OnQuestStageCompleted -= HandleQuestStageCompleted;\n\n            #endregion\n\n            Debug.Log(\"[QuestUIController] 이벤트 구독 해제\");\n        }\n\n\n        // ================================================================\n        // 사이드 패널 갱신\n        // ================================================================\n\n        /// <summary>\n        /// QuestManager → RaiseQuestProgressUpdated → 여기서 수신\n        /// 처치 수 / 목표 텍스트 및 프로그레스바 갱신\n        /// </summary>\n        private void HandleQuestProgressUpdated(int killCount, int nextTarget)\n        {\n            if (QuestManager.Instance == null) return;\n\n            // 프로그레스바 갱신\n            if (progressBar != null)\n                progressBar.value = QuestManager.Instance.GetProgress();\n\n            // 처치 수 텍스트 갱신\n            if (killCountText != null)\n            {\n                string targetStr = nextTarget < 0 ? \"완료\" : nextTarget.ToString();\n                killCountText.text = $\"{killCount} / {targetStr}\";\n            }\n\n            // 다음 보상 텍스트 갱신\n            if (nextRewardText != null)\n            {\n                int nextReward = QuestManager.Instance.GetNextReward();\n                nextRewardText.text = nextReward > 0\n                    ? $\"보상 : {nextReward}G\"\n                    : \"모든 퀘스트 완료\";\n            }\n\n            Debug.Log($\"[QuestUIController] 사이드 패널 갱신 : {killCount}/{nextTarget}\");\n        }\n\n\n        // ================================================================\n        // 달성 팝업 표시\n        // ================================================================\n\n        /// <summary>\n        /// QuestManager → RaiseQuestStageCompleted → 여기서 수신\n        /// 팝업 활성화 후 popupDuration 후 자동 닫힘\n        /// </summary>\n        private void HandleQuestStageCompleted(QuestStage stage, int stageIndex)\n        {\n            if (popup == null) return;\n\n            // 이전 팝업 코루틴 중단\n            if (_popupCoroutine != null)\n                StopCoroutine(_popupCoroutine);\n\n            // 팝업 텍스트 설정\n            if (popupTitleText != null)\n                popupTitleText.text = $\"퀘스트 달성!\\n{stage.stageName}\";\n\n            if (popupRewardText != null)\n                popupRewardText.text = $\"+{stage.goldReward}G 획득!\";\n\n            popup.SetActive(true);\n            _popupCoroutine = StartCoroutine(AutoClosePopup());\n\n            Debug.Log($\"[QuestUIController] 달성 팝업 표시 : {stage.stageName} | \" +\n                      $\"{popupDuration}초 후 자동 닫힘\");\n        }\n\n        private IEnumerator AutoClosePopup()\n        {\n            yield return new WaitForSeconds(popupDuration);\n            ClosePopup();\n        }\n\n        /// <summary>팝업 수동 닫기 (닫기 버튼 OnClick 연결용)</summary>\n        public void ClosePopup()\n        {\n            if (popup != null)\n                popup.SetActive(false);\n\n            Debug.Log(\"[QuestUIController] 팝업 닫힘\");\n        }\n    }\n}","lines":188},{"id":"02_Scripts/Data/UnitDataManager.cs","name":"UnitDataManager","path":"02_Scripts/Data/UnitDataManager.cs","layer":"Data","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"UnitNameType 기반 딕셔너리 (기존 유지)","src":"using UnityEngine;\r\nusing System.Collections.Generic;\r\nusing System.Linq;\r\n\r\npublic class UnitDataManager : MonoBehaviour\r\n{\r\n    public static UnitDataManager Instance;\r\n\r\n    [SerializeField] private UnitDataBase db;\r\n    [SerializeField] private UnitRatingData ratingData;\r\n\r\n    // UnitNameType 기반 딕셔너리 (기존 유지)\r\n    private Dictionary<UnitNameType, UnitData> unitDict;\r\n\r\n    // grade 기반 딕셔너리 (추가)\r\n    private Dictionary<int, List<UnitData>> gradeDict;\r\n\r\n    void Awake()\r\n    {\r\n        Instance = this;\r\n\r\n        // 기존: UnitNameType 딕셔너리\r\n        unitDict = db.allUnits.ToDictionary(unit => unit._nameType);\r\n\r\n        // 추가: grade별 리스트로 분류\r\n        gradeDict = db.allUnits\r\n            .GroupBy(unit => unit.grade)\r\n            .ToDictionary(g => g.Key, g => g.ToList());\r\n    }\r\n\r\n    // 기존 메서드 유지\r\n    public UnitData GetUnitData(UnitNameType type)\r\n    {\r\n        if (unitDict.TryGetValue(type, out var data)) return data;\r\n        return null;\r\n    }\r\n\r\n    // 기존 메서드 유지\r\n    public RatingModifier GetRatingModifier(UnitRatingType ratingType)\r\n    {\r\n        if (ratingData == null)\r\n            return new RatingModifier { damageMultiplier = 1, rangeMultiplier = 1, intervalMultiplier = 1 };\r\n        return ratingData.GetModifier(ratingType);\r\n    }\r\n\r\n    // 추가: grade로 랜덤 UnitData 반환\r\n    //public UnitData GetRandomUnitByGrade(int grade)\r\n    //{\r\n    //    if (!gradeDict.ContainsKey(grade) || gradeDict[grade].Count == 0)\r\n    //    {\r\n    //        Debug.LogError($\"[UnitDataManager] grade {grade}에 해당하는 UnitData가 없습니다. UnitDataBase를 확인하세요.\");\r\n    //        return null;\r\n    //    }\r\n\r\n    //    List<UnitData> pool = gradeDict[grade];\r\n    //    return pool[Random.Range(0, pool.Count)];\r\n    //}\r\n\r\n    // 추가: 특정 grade의 UnitData 목록 전체 반환 (필요 시 사용)\r\n    public List<UnitData> GetUnitsByGrade(int grade)\r\n    {\r\n        if (!gradeDict.ContainsKey(grade)) return new List<UnitData>();\r\n        return gradeDict[grade];\r\n    }\r\n\r\n\r\n    public UnitData GetRandomUnitByGrade(int grade)\r\n    {\r\n        if (db == null)\r\n        {\r\n            Debug.LogError(\"[UnitDataManager] UnitDataBase null → 인스펙터 확인\");\r\n            return null;\r\n        }\r\n\r\n        // grade 일치하는 유닛 필터링\r\n        var pool = db.allUnits.FindAll(u => u.grade == grade);\r\n\r\n        if (pool == null || pool.Count == 0)\r\n        {\r\n            Debug.LogError($\"[UnitDataManager] grade {grade} 유닛 없음 \" +\r\n                           $\"→ UnitDataBase에 해당 grade 유닛 추가 필요\");\r\n            return null;\r\n        }\r\n\r\n        return pool[Random.Range(0, pool.Count)];\r\n    }\r\n}\r\n","lines":88},{"id":"02_Scripts/Core/GameManager.cs","name":"GameManager","path":"02_Scripts/Core/GameManager.cs","layer":"Core","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"TitleScreen.OnClickStartGame()에서 호출. UIManager 초기화 + WAVE_READY 전환을 한 곳에서 처리.","src":"using UnityEngine;\nusing System.Collections;\nusing System.Collections.Generic;\nusing UnityEngine.SceneManagement;\nusing LuckyRandomDefense.UI;\nusing LuckyRandomDefense.Core.EventBus;\nusing LuckyRandomDefense.Node;\n\nnamespace LuckyRandomDefense.Core\n{\n    public class GameManager : MonoBehaviour\n    {\n        public static GameManager Instance { get; private set; }\n\n        [Header(\"매니저 참조\")]\n        [SerializeField] private UIManager _uiManager;\n        [SerializeField] private WaveManager _waveManager;\n\n        [Header(\"스테이지 폴백 (currentStage null 시 자동 적용)\")]\n        [Tooltip(\"어떤 경로로든 currentStage가 null 상태로 StartGame 호출되면 이 스테이지를 자동 세팅. 보통 Stage_Tutorial 연결.\")]\n        [SerializeField] private StageData _defaultStage;\n\n        [Header(\"게임 설정\")]\n        [SerializeField] private int _currentGold = 100000;\n        [SerializeField] private int _waveTime = 30;\n        [SerializeField] private int _nexusMaxLife = 100;\n        [SerializeField] private int _decreaseLifeAmount = 10;\n        [SerializeField] private int _waveReadyTime = 60;\n\n        private int _timeLimit = 0;\n        private bool _isGameOver = false;\n        private int _waveReadyCount = 60;\n        private int _nexusLife = 100;\n        private int _remainingEnemies = 0;\n\n        private GameState _gameState = GameState.INIT;\n\n        public GameState GameState\n        {\n            get { return _gameState; }\n            set\n            {\n                _gameState = value;\n                Debug.Log(\"GameState 변경 이벤트 발생: \" + _gameState);\n                GameEventBus.RaiseGameStateChanged(_gameState);\n            }\n        }\n\n        public bool IsPaused => _gameState == GameState.PAUSE;\n\n        public int Gold\n        {\n            get { return _currentGold; }\n            set { _currentGold = value; GameEventBus.RaiseUpdateGoldText(_currentGold); }\n        }\n\n        public int RemainingEnemyCount\n        {\n            get { return _remainingEnemies; }\n            set { _remainingEnemies = value; GameEventBus.RaiseUpdateEnemyCount(_remainingEnemies); }\n        }\n\n        public int TimeLimit\n        {\n            get { return _timeLimit; }\n            set { _timeLimit = value; GameEventBus.RaiseUpdateTimeLimit(_timeLimit); }\n        }\n\n        public bool IsGameOver\n        {\n            get { return _isGameOver; }\n            set { _isGameOver = value; if (_isGameOver) Debug.Log(\"게임 오버!\"); }\n        }\n\n        public int WaveTime => _waveTime;\n        public int WaveReadyTime => _waveReadyTime;\n\n        public int NexusLife\n        {\n            get { return _nexusLife; }\n            set\n            {\n                _nexusLife = value;\n                if (_nexusLife <= 0)\n                {\n                    _nexusLife = 0;\n                    IsGameOver = true;\n                    StartCoroutine(GameOver());\n                }\n                GameEventBus.RaiseUpdateNexusLife(_nexusLife);\n            }\n        }\n\n        public int WaveReadyCount\n        {\n            get { return _waveReadyCount; }\n            set { _waveReadyCount = value; }\n        }\n\n        // ================================================================\n        // 라이프사이클\n        // ================================================================\n\n        private void Awake()\n        {\n            if (Instance == null) Instance = this;\n            else Destroy(gameObject);\n        }\n\n        void Start()\n        {\n            // 데이터 초기화만 수행\n            // 상태 전환은 TitleScreen.OnClickStartGame()에서 담당\n            TimeLimit = _waveTime;\n            WaveReadyCount = _waveReadyTime;\n            NexusLife = _nexusMaxLife;\n        }\n\n        // ================================================================\n        // TitleScreen에서 호출 — 게임 시작 시 UI 초기화 + 상태 전환\n        // ================================================================\n\n        /// <summary>\n        /// TitleScreen.OnClickStartGame()에서 호출.\n        /// UIManager 초기화 + WAVE_READY 전환을 한 곳에서 처리.\n        /// </summary>\n        public void StartGame()\n        {\n            // 스테이지 폴백 — 어떤 경로로든 currentStage가 null로 들어왔다면 _defaultStage로 보강\n            // (StageSelect 미경유 / 이어하기 복원 / 디버그 직접 진입 등 모든 케이스 커버)\n            if (_currentStage == null)\n            {\n                if (_defaultStage != null)\n                {\n                    Debug.LogWarning($\"[GameManager] StartGame: currentStage null → _defaultStage로 폴백 적용 \" +\n                                     $\"({_defaultStage.stageName}, isTutorial={_defaultStage.isTutorial})\");\n                    SetCurrentStage(_defaultStage);\n                }\n                else\n                {\n                    Debug.LogError(\"[GameManager] StartGame: currentStage 와 _defaultStage 모두 null → \" +\n                                   \"인스펙터에서 GameManager._defaultStage 에 Stage_Tutorial 연결 필요\");\n                }\n            }\n\n            // 맵 생성 (이미 생성됐으면 스킵 — 이어하기 복원 시 SnapshotRestorer에서 먼저 호출됨)\n            if (ProceduralMap.Instance != null && ProceduralMap.Instance.Tiles == null)\n            {\n                ProceduralMap.Instance.GenerateMap(System.Environment.TickCount);\n            }\n\n            // WaveManager가 준비된 시점에 호출되므로 _currentWave null 없음\n            List<EnemyData> enemyPattern = _waveManager._currentWave?._enemyPattern;\n            _uiManager.InitializeUI(_currentGold, NexusLife, TimeLimit);\n            ChangeState(GameState.WAVE_READY);\n        }\n\n\n        // ================================================================\n        // 스테이지 (난이도) 관리\n        // ================================================================\n\n        private StageData _currentStage;\n        public StageData GetCurrentStage() => _currentStage;\n\n        /// <summary>StageSelectUI에서 호출 — 선택된 스테이지를 게임에 적용</summary>\n        public void SetCurrentStage(StageData stage)\n        {\n            if (stage == null)\n            {\n                Debug.LogError(\"[GameManager] SetCurrentStage : stage null\");\n                return;\n            }\n\n            _currentStage = stage;\n            Debug.Log($\"[GameManager] 스테이지 설정: {stage.stageName} (difficulty={stage.difficulty}, isTutorial={stage.isTutorial})\");\n\n            // 시작 골드/넥서스 적용\n            _currentGold = stage.startingGold;\n            _nexusMaxLife = stage.startingNexusLife;\n            _nexusLife = _nexusMaxLife;\n\n            // WaveManager에 웨이브 전달\n            if (_waveManager != null)\n            {\n                _waveManager.SetStage(stage);\n            }\n            else\n            {\n                Debug.LogWarning(\"[GameManager] _waveManager null → 스테이지 적용 일부 누락\");\n            }\n        }\n\n        // ================================================================\n        // 상태 관리\n        // ================================================================\n\n        public void ChangeState(GameState newState)\n        {\n            Debug.Log(\"[게임상태] \" + newState + \"로 변경\");\n            GameState = newState;\n        }\n\n        public void TogglePause()\n        {\n            if (GameState == GameState.WAVE_READY) return;\n            else if (GameState == GameState.PAUSE) StartCoroutine(Resume());\n            else ChangeState(GameState.PAUSE);\n        }\n\n        private IEnumerator GameOver()\n        {\n            Time.timeScale = 0f;\n            yield return null;\n            if (IsGameOver) ChangeState(GameState.GAMEOVER);\n        }\n\n        private IEnumerator Resume()\n        {\n            ChangeState(GameState.WAVE_PROGRESS);\n            yield return null;\n            Time.timeScale = 1f;\n        }\n\n        public void DecreaseLife()\n        {\n            NexusLife -= _decreaseLifeAmount;\n        }\n\n        public void ReturnToTitleScreen()\n        {\n            Time.timeScale = 1f;\n\n            var activeScene = SceneManager.GetActiveScene();\n            Debug.Log($\"[GameManager] 타이틀 복귀 → 현재 씬 재로드 ({activeScene.path})\");\n\n#if UNITY_EDITOR\n            if (!string.IsNullOrEmpty(activeScene.path))\n            {\n                UnityEditor.SceneManagement.EditorSceneManager.LoadSceneInPlayMode(\n                    activeScene.path,\n                    new LoadSceneParameters(LoadSceneMode.Single));\n                return;\n            }\n#endif\n\n            if (activeScene.buildIndex >= 0)\n                SceneManager.LoadScene(activeScene.buildIndex);\n            else\n                SceneManager.LoadScene(activeScene.name);\n        }\n    }\n}\n","lines":254},{"id":"02_Scripts/Quest/QuestManager.cs","name":"QuestManager","path":"02_Scripts/Quest/QuestManager.cs","layer":"Quest","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"PlayFabDataLoader.OnDataLoaded 이벤트 수신 RuntimeQuestData를 주입받아 퀘스트 초기화","src":"﻿// =================================================================\n// QuestManager.cs\n// 역할  : 누적 몬스터 처치 수 추적, 퀘스트 단계 달성 판정, 골드 자동 지급\n//         달성 시 EventBus로 UI에 알림 발행\n//\n// 부착 위치 : Managers 오브젝트에 부착\n//\n// 변경사항\n// - 기존 : QuestData ScriptableObject 인스펙터 연결 방식\n// - 변경 : PlayFabDataLoader.QuestData 런타임 데이터 방식\n//          PlayFabDataLoader.OnDataLoaded 이벤트 수신 후 초기화\n//\n// 네임스페이스 의존성\n// - LuckyRandomDefense.Core  : EventBus, GameManager 참조\n// - LuckyRandomDefense.Quest : QuestStage 참조\n//\n// EventBus 구독 흐름\n// EnemyBase.TakeDamage()\n// → EventBus.RaiseEnemyKilled()\n// → QuestManager.HandleEnemyKilled() 수신\n// → 처치 수 누적 → 단계 달성 판정\n// → GameManager.Gold 자동 지급\n// → EventBus.RaiseQuestStageCompleted() 발행\n// → QuestUIController 수신 → 팝업 표시\n// → EventBus.RaiseQuestProgressUpdated() 발행\n// → QuestUIController 수신 → 진행도 갱신\n//\n// 주의사항\n// - PlayFabDataLoader 데이터 로드 완료 전 퀘스트 기능 비활성화\n// - GameManager.Instance null 시 골드 지급 실패\n// - 모든 단계 완료 후에도 처치 수는 계속 누적됨\n// - stages는 killTarget 오름차순 정렬 필수\n//   → 구글 시트에서 정렬 상태로 관리할 것\n// =================================================================\n\nusing System.Collections.Generic;\nusing UnityEngine;\nusing LuckyRandomDefense.Core;\nusing LuckyRandomDefense.Core.EventBus;\nusing LuckyRandomDefense.Quest;\n\nnamespace LuckyRandomDefense.Quest\n{\n    public class QuestManager : MonoBehaviour\n    {\n        public static QuestManager Instance { get; private set; }\n\n        // ── 런타임 퀘스트 데이터 ──────────────────────────────────\n        // 주의 : PlayFabDataLoader.OnDataLoaded 이후 자동 주입됨\n        //        null이면 퀘스트 기능 전체 비활성화\n        private RuntimeQuestData _questData;\n\n        // ── 진행 상태 ─────────────────────────────────────────────\n        // 현재 누적 처치 수\n        private int _totalKillCount = 0;\n\n        // 현재 달성된 단계 인덱스 (-1 = 아직 아무 단계도 달성 안 됨)\n        private int _currentStageIndex = -1;\n\n        // ── 초기화 완료 여부 ──────────────────────────────────────\n        // PlayFab 데이터 로드 완료 전 처치 수 누적 방지용\n        private bool _isInitialized = false;\n\n        // ── 외부 참조용 프로퍼티 ─────────────────────────────────\n        public int TotalKillCount => _totalKillCount;\n        public int CurrentStageIndex => _currentStageIndex;\n        public bool IsAllStagesCompleted =>\n            _questData != null &&\n            _currentStageIndex >= _questData.stages.Count - 1;\n\n\n        // ================================================================\n        // 라이프사이클\n        // ================================================================\n\n        private void Awake()\n        {\n            if (Instance == null) Instance = this;\n            else\n            {\n                Debug.LogWarning(\"[QuestManager] 중복 인스턴스 감지 → 파괴\");\n                Destroy(gameObject);\n                return;\n            }\n        }\n\n        private void OnEnable()\n        {\n            #region EventBus 구독\n\n            // 발행 : EnemyBase.TakeDamage() → RaiseEnemyKilled()\n            GameEventBus.OnEnemyKilled += HandleEnemyKilled;\n\n            #endregion\n\n            // 발행 : PlayFabDataLoader → 데이터 로드 완료 시\n            // 수신 : InitQuestData() → 퀘스트 데이터 주입\n            PlayFabDataLoader.OnDataLoaded += InitQuestData;\n\n            Debug.Log(\"[QuestManager] 이벤트 구독 완료\");\n        }\n\n        private void OnDisable()\n        {\n            #region EventBus 구독 해제\n\n            GameEventBus.OnEnemyKilled -= HandleEnemyKilled;\n\n            #endregion\n\n            PlayFabDataLoader.OnDataLoaded -= InitQuestData;\n\n            Debug.Log(\"[QuestManager] 이벤트 구독 해제\");\n        }\n\n\n        // ================================================================\n        // PlayFab 데이터 초기화\n        // ================================================================\n\n        /// <summary>\n        /// PlayFabDataLoader.OnDataLoaded 이벤트 수신\n        /// RuntimeQuestData를 주입받아 퀘스트 초기화\n        /// </summary>\n        private void InitQuestData()\n        {\n            if (PlayFabDataLoader.Instance == null)\n            {\n                Debug.LogError(\"[QuestManager] InitQuestData 실패 : \" +\n                               \"PlayFabDataLoader.Instance null\");\n                return;\n            }\n\n            _questData = PlayFabDataLoader.Instance.QuestData;\n\n            if (_questData == null)\n            {\n                Debug.LogError(\"[QuestManager] QuestData null → \" +\n                               \"PlayFab Title Data 'QuestData' 키 확인\");\n                return;\n            }\n\n            if (_questData.stages == null || _questData.stages.Count == 0)\n            {\n                Debug.LogError(\"[QuestManager] QuestData.stages 비어있음 → \" +\n                               \"구글 시트 QuestData 탭 확인\");\n                return;\n            }\n\n            _isInitialized = true;\n\n            Debug.Log($\"[QuestManager] 초기화 완료 : {_questData.questName} | \" +\n                      $\"총 {_questData.stages.Count}단계\");\n        }\n\n\n        // ================================================================\n        // 처치 수 누적 및 단계 판정\n        // ================================================================\n\n        /// <summary>\n        /// EnemyBase.TakeDamage() → EventBus → 여기서 수신\n        /// 처치 수 누적 후 단계 달성 여부 판정\n        /// </summary>\n        private void HandleEnemyKilled()\n        {\n            // 주의 : PlayFab 데이터 로드 완료 전 처치 수 누적 방지\n            if (!_isInitialized || _questData == null) return;\n            if (_questData.stages == null || _questData.stages.Count == 0) return;\n\n            _totalKillCount++;\n\n            Debug.Log($\"[QuestManager] 처치 누적 : {_totalKillCount}마리\");\n\n            // 진행도 갱신 발행\n            // 수신 : QuestUIController.HandleQuestProgressUpdated()\n            GameEventBus.RaiseQuestProgressUpdated(_totalKillCount, GetNextTarget());\n\n            // 단계 달성 체크\n            CheckStageCompletion();\n        }\n\n        /// <summary>\n        /// 현재 처치 수 기준으로 달성 가능한 다음 단계 확인\n        /// 이미 달성한 단계는 건너뜀\n        /// </summary>\n        private void CheckStageCompletion()\n        {\n            for (int i = _currentStageIndex + 1; i < _questData.stages.Count; i++)\n            {\n                RuntimeQuestStage stage = _questData.stages[i];\n\n                if (_totalKillCount < stage.killTarget) break;\n\n                // 단계 달성\n                _currentStageIndex = i;\n                GiveReward(stage);\n\n                Debug.Log($\"[QuestManager] 퀘스트 단계 달성 : {stage.stageName} | \" +\n                          $\"목표:{stage.killTarget}마리 | 보상:{stage.goldReward}G\");\n\n                // 달성 이벤트 발행\n                // 수신 : QuestUIController.HandleQuestStageCompleted()\n                GameEventBus.RaiseQuestStageCompleted(\n                    new QuestStage\n                    {\n                        stageName = stage.stageName,\n                        killTarget = stage.killTarget,\n                        goldReward = stage.goldReward\n                    },\n                    _currentStageIndex\n                );\n            }\n\n            if (IsAllStagesCompleted)\n                Debug.Log(\"[QuestManager] 모든 퀘스트 단계 완료\");\n        }\n\n\n        // ================================================================\n        // 보상 지급\n        // ================================================================\n\n        /// <summary>\n        /// 달성 단계의 골드 자동 지급\n        /// 주의 : GameManager.Instance null이면 지급 실패\n        /// </summary>\n        private void GiveReward(RuntimeQuestStage stage)\n        {\n            if (stage.goldReward <= 0)\n            {\n                Debug.LogWarning($\"[QuestManager] {stage.stageName} 보상 골드 0 → 지급 생략\");\n                return;\n            }\n\n            if (GameManager.Instance == null)\n            {\n                Debug.LogError(\"[QuestManager] 보상 지급 실패 : GameManager.Instance null\");\n                return;\n            }\n\n            GameManager.Instance.Gold += stage.goldReward;\n\n            Debug.Log($\"[QuestManager] 보상 지급 완료 : +{stage.goldReward}G | \" +\n                      $\"현재 골드 : {GameManager.Instance.Gold}G\");\n        }\n\n\n        // ================================================================\n        // 외부 참조용 유틸 (UI 연동)\n        // ================================================================\n\n        /// <summary>다음 목표 처치 수 반환 (사이드 패널 표시용)</summary>\n        public int GetNextTarget()\n        {\n            int nextIndex = _currentStageIndex + 1;\n\n            if (_questData == null) return 0;\n            if (nextIndex >= _questData.stages.Count) return -1;\n\n            return _questData.stages[nextIndex].killTarget;\n        }\n\n        /// <summary>다음 단계 보상 골드 반환 (사이드 패널 표시용)</summary>\n        public int GetNextReward()\n        {\n            int nextIndex = _currentStageIndex + 1;\n\n            if (_questData == null) return 0;\n            if (nextIndex >= _questData.stages.Count) return 0;\n\n            return _questData.stages[nextIndex].goldReward;\n        }\n\n        /// <summary>현재 단계 진행도 0~1 반환 (프로그레스바용)</summary>\n        public float GetProgress()\n        {\n            if (_questData == null) return 0f;\n\n            int nextIndex = _currentStageIndex + 1;\n            if (nextIndex >= _questData.stages.Count) return 1f;\n\n            int prevTarget = nextIndex > 0\n                ? _questData.stages[nextIndex - 1].killTarget\n                : 0;\n\n            int nextTarget = _questData.stages[nextIndex].killTarget;\n            int range = nextTarget - prevTarget;\n\n            if (range <= 0) return 1f;\n\n            return Mathf.Clamp01((float)(_totalKillCount - prevTarget) / range);\n        }\n    }\n}","lines":295},{"id":"02_Scripts/Data/Server/PlayFabDataLoader.cs","name":"PlayFabDataLoader","path":"02_Scripts/Data/Server/PlayFabDataLoader.cs","layer":"Data","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"PlayFabDataLoader.cs 역할 : PlayFab Title Data에서 증강/퀘스트 데이터를 받아와 런타임 데이터로 변환 후 각 매니저에 전달 부착 위치 : PlayFabManager 오브젝트 (PlayFabInit과 동일 오브젝트) 실행 흐름 PlayFabInit.Login() 성공 → PlayFabDataLoader.LoadAllData() 호출 → AugmentData + QuestData 수신 및 파싱 → ","src":"﻿// =================================================================\r\n// PlayFabDataLoader.cs\r\n// 역할  : PlayFab Title Data에서 증강/퀘스트 데이터를 받아와\r\n//         런타임 데이터로 변환 후 각 매니저에 전달\r\n//\r\n// 부착 위치 : PlayFabManager 오브젝트 (PlayFabInit과 동일 오브젝트)\r\n//\r\n// 실행 흐름\r\n// PlayFabInit.Login() 성공\r\n// → PlayFabDataLoader.LoadAllData() 호출\r\n// → AugmentData + QuestData 수신 및 파싱\r\n// → 아이콘 Resources/AugmentIcons/{iconName} 로드\r\n// → OnDataLoaded 이벤트 발행\r\n// → GameManager에서 수신 후 게임 씬 시작\r\n//\r\n// 아이콘 로드 규칙\r\n// - Resources/AugmentIcons/ 폴더 내 파일명과 iconName 일치 필수\r\n// - 확장자(.png) 제외하고 iconName 입력\r\n//   예) iconName = \"icon_gold\" → AugmentIcons/icon_gold.png\r\n// - 아이콘 없으면 경고 로그만 출력하고 계속 진행\r\n//\r\n// 주의사항\r\n// - 데이터 로드 완료 전 게임 시작 금지\r\n// - PlayFab Title Data 키 : \"AugmentData\", \"QuestData\"\r\n// =================================================================\r\n\r\nusing System;\r\nusing System.Collections.Generic;\r\nusing PlayFab;\r\nusing PlayFab.ClientModels;\r\nusing UnityEngine;\r\n\r\npublic class PlayFabDataLoader : MonoBehaviour\r\n{\r\n    public static PlayFabDataLoader Instance { get; private set; }\r\n\r\n    // ── 로드 완료 이벤트 ─────────────────────────────────────────\r\n    // 수신 : GameManager에서 구독 후 게임 시작\r\n    public static event Action OnDataLoaded;\r\n\r\n    // ── 런타임 데이터 저장소 ─────────────────────────────────────\r\n    // 외부에서 PlayFabDataLoader.Instance.AugmentList 로 접근\r\n    public List<RuntimeAugmentData> AugmentList { get; private set; }\r\n    public RuntimeQuestData QuestData { get; private set; }\r\n\r\n\r\n    // ================================================================\r\n    // 라이프사이클\r\n    // ================================================================\r\n\r\n    private void Awake()\r\n    {\r\n        if (Instance == null) Instance = this;\r\n        else\r\n        {\r\n            Debug.LogWarning(\"[PlayFabDataLoader] 중복 인스턴스 감지 → 파괴\");\r\n            Destroy(gameObject);\r\n            return;\r\n        }\r\n    }\r\n\r\n\r\n    // ================================================================\r\n    // 외부 호출 — PlayFabInit.OnSuccess() 에서 호출\r\n    // ================================================================\r\n\r\n    public void LoadAllData()\r\n    {\r\n        Debug.Log(\"[PlayFabDataLoader] Title Data 로드 시작\");\r\n\r\n        var request = new GetTitleDataRequest\r\n        {\r\n            Keys = new List<string> { \"AugmentData\", \"QuestData\" }\r\n        };\r\n\r\n        PlayFabClientAPI.GetTitleData(request, OnTitleDataReceived, OnError);\r\n    }\r\n\r\n\r\n    // ================================================================\r\n    // 수신 & 파싱\r\n    // ================================================================\r\n\r\n    private void OnTitleDataReceived(GetTitleDataResult result)\r\n    {\r\n        // ── AugmentData 파싱 ──────────────────────────────────────\r\n        if (result.Data.ContainsKey(\"AugmentData\"))\r\n        {\r\n            string json = result.Data[\"AugmentData\"];\r\n            AugmentDataWrapper wrapper =\r\n                JsonUtility.FromJson<AugmentDataWrapper>(json);\r\n\r\n            AugmentList = wrapper.augments;\r\n\r\n            // 아이콘 로드\r\n            // 주의 : iconName과 Resources/AugmentIcons/ 내 파일명 일치 필수\r\n            foreach (var augment in AugmentList)\r\n            {\r\n                if (!string.IsNullOrEmpty(augment.iconName))\r\n                {\r\n                    augment.icon = Resources.Load<Sprite>(\r\n                        $\"AugmentIcons/{augment.iconName}\");\r\n\r\n                    if (augment.icon == null)\r\n                        Debug.LogWarning(\r\n                            $\"[PlayFabDataLoader] 아이콘 없음 : {augment.iconName} \" +\r\n                            $\"→ Resources/AugmentIcons/{augment.iconName}.png 확인\");\r\n                }\r\n                else\r\n                {\r\n                    Debug.LogWarning(\r\n                        $\"[PlayFabDataLoader] iconName 미설정 : {augment.augmentName}\");\r\n                }\r\n            }\r\n\r\n            Debug.Log(\r\n                $\"[PlayFabDataLoader] AugmentData 로드 완료 : {AugmentList.Count}개\");\r\n        }\r\n        else\r\n        {\r\n            Debug.LogError(\"[PlayFabDataLoader] AugmentData 키 없음 \" +\r\n                           \"→ PlayFab Title Data 키 이름 확인\");\r\n        }\r\n\r\n        // ── QuestData 파싱 ────────────────────────────────────────\r\n        if (result.Data.ContainsKey(\"QuestData\"))\r\n        {\r\n            string json = result.Data[\"QuestData\"];\r\n            QuestData = JsonUtility.FromJson<RuntimeQuestData>(json);\r\n\r\n            Debug.Log(\r\n                $\"[PlayFabDataLoader] QuestData 로드 완료 : {QuestData.stages.Count}단계\");\r\n        }\r\n        else\r\n        {\r\n            Debug.LogError(\"[PlayFabDataLoader] QuestData 키 없음 \" +\r\n                           \"→ PlayFab Title Data 키 이름 확인\");\r\n        }\r\n\r\n        // ── 로드 완료 이벤트 발행 ─────────────────────────────────\r\n        // 수신 : GameManager.OnDataLoaded 구독 후 게임 시작\r\n        Debug.Log(\"[PlayFabDataLoader] 전체 데이터 로드 완료 → 게임 시작\");\r\n        OnDataLoaded?.Invoke();\r\n    }\r\n\r\n    private void OnError(PlayFabError error)\r\n    {\r\n        Debug.LogError($\"[PlayFabDataLoader] 로드 실패 \" +\r\n                       $\"| 코드 : {error.Error} \" +\r\n                       $\"| 메시지 : {error.ErrorMessage}\");\r\n    }\r\n}","lines":152},{"id":"02_Scripts/Data/Server/PlayFabInit.cs","name":"PlayFabInit","path":"02_Scripts/Data/Server/PlayFabInit.cs","layer":"Data","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"기기 고유 ID로 익명 로그인 시도 신규 기기면 자동으로 계정 생성","src":"﻿// =================================================================\r\n// PlayFabInit.cs\r\n// 역할  : PlayFab 초기화 및 익명 로그인 처리\r\n//         로그인 성공 후 PlayFabDataLoader로 데이터 로드 시작\r\n//\r\n// 부착 위치 : PlayFabManager 오브젝트에 부착\r\n//             (PlayFabDataLoader와 동일 오브젝트)\r\n//\r\n// 실행 흐름\r\n// Awake() → Login()\r\n// → PlayFabClientAPI.LoginWithCustomID() 호출\r\n// → OnSuccess() : PlayFabDataLoader.LoadAllData() 호출\r\n// → OnError()   : 에러 로그 출력\r\n//\r\n// 로그인 방식\r\n// - LoginWithCustomID 사용\r\n// - CustomId : SystemInfo.deviceUniqueIdentifier (기기 고유 ID)\r\n// - CreateAccount = true → 신규 기기면 자동 계정 생성\r\n//\r\n// 의존성\r\n// - PlayFabDataLoader : 로그인 성공 후 데이터 로드 담당\r\n//   → 동일 오브젝트에 PlayFabDataLoader 컴포넌트 필수 부착\r\n//\r\n// 주의사항\r\n// - PlayFabSharedSettings 에셋에 Title ID 반드시 입력할 것\r\n//   경로 : Assets → Resources → PlayFabSharedSettings\r\n// - 로그인 실패 시 PlayFabDataLoader.LoadAllData() 미호출\r\n//   → 게임 데이터 로드 불가 → OnError 원인 파악 필요\r\n// ===============
