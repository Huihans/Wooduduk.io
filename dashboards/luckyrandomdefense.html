dSkillType)id);\r\n                        break;\r\n                    case UnitType.BEAST:\r\n                        skill = CreateMachineSkill((BeastSkillType)id);\r\n                        break;\r\n                    case UnitType.ELF:\r\n                        skill = CreateMachineSkill((ElfSkillType)id);\r\n                        break;\r\n\r\n\r\n                        // 다른 종족들생기면 추가\r\n                }\r\n\r\n                if (skill != null) skills.Add(skill);\r\n            }\r\n            return skills;\r\n        }\r\n        private static IUnitSkill CreateCommonSkill(CommonSkillType type)\r\n        {\r\n            return type switch\r\n            {\r\n                CommonSkillType.STUN => new UnitStunSkill(),\r\n                CommonSkillType.BUFF => new UnitBuffSkill(),\r\n                CommonSkillType.BOOM => new UnitBoomSkill(),\r\n\r\n                // 공통 스킬 추가\r\n                _ => null\r\n            };\r\n        }\r\n\r\n\r\n        private static IUnitSkill CreateHumanSkill(HumanSkillType type)\r\n        {\r\n            return type switch\r\n            {\r\n                HumanSkillType.HUMAN_BUFF => new HumanSupportSkill(),\r\n                HumanSkillType.POWER_SHOT => new PowerShotSkill(),\r\n                HumanSkillType.WINDMILL => new WindmillSkill(),\r\n                // 휴먼 새 스킬 추가\r\n                _ => null\r\n            };\r\n        }\r\n\r\n        private static IUnitSkill CreateMachineSkill(MachineSkillType type)\r\n        {\r\n            return type switch\r\n            {\r\n                MachineSkillType.LASER_BEAM => new LaserBeamSkill(),\r\n                // 기계 새 스킬추가\r\n                _ => null\r\n            };\r\n        }\r\n\r\n        private static IUnitSkill CreateMachineSkill(UndeadSkillType type)\r\n        {\r\n            return type switch\r\n            {\r\n                UndeadSkillType.POISON_CLOUD => new PoisonCloudSkill(),\r\n                UndeadSkillType.DEBUFF_FIELD => new DebuffFieldSkill(),\r\n                // 언대드 새 스킬추가\r\n                _ => null\r\n            };\r\n        }\r\n\r\n        private static IUnitSkill CreateMachineSkill(BeastSkillType type)\r\n        {\r\n            return type switch\r\n            {\r\n                BeastSkillType.BEAST_BUFF => new BeastBuffSikll(),\r\n                // 야수 새 스킬추가\r\n                _ => null\r\n            };\r\n        }\r\n\r\n        private static IUnitSkill CreateMachineSkill(ElfSkillType type)\r\n        {\r\n            return type switch\r\n            {\r\n                ElfSkillType.ELF_Fireball => new ElfBigFireBallSkill(),\r\n                ElfSkillType.ELF_FIREPILLAR => new ElfFirePillarSkill(),\r\n                ElfSkillType.ELF_Buff => new ElfBuffSkill(),\r\n\r\n                // 앨프 새 스킬추가\r\n                _ => null\r\n            };\r\n        }\r\n    }\r\n}\r\n","lines":118},{"id":"02_Scripts/Unit/Tools/OptimizedMissile.cs","name":"OptimizedMissile","path":"02_Scripts/Unit/Tools/OptimizedMissile.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"유닛 베이스에서 미사일을 생성한 후 호출하여 스탯을 주입합니다.","src":"using LuckyRandomDefense.Enemy;\r\nusing System.Collections;\r\nusing System.Collections.Generic;\r\nusing Unity.VisualScripting;\r\nusing UnityEngine;\r\nusing static MissileData;\r\n\r\npublic class OptimizedMissile : MonoBehaviour\r\n{\r\n    public MissileData data;\r\n    public Transform target;\r\n\r\n    [Header(\"Target Tracking\")]\r\n    [Tooltip(\"ON: 매 프레임 경로 재계산 (타겟 추적). OFF: 페이즈 시작 시 경로 고정\")]\r\n    public bool trackTargetPerFrame = false;\r\n\r\n    [Header(\"Test Options\")]\r\n    public bool launchOnStart = true;\r\n    public float startDelay = 2f;\r\n\r\n    [Header(\"New Targeting System\")]\r\n    public float detectionRadius = 10f; // 페이즈 전환 시 탐색할 범위\r\n    public LayerMask enemyLayer;\r\n\r\n    // --- [추가] UnitBase로부터 전달받을 스탯 ---\r\n    private float _damage;\r\n    private float _explosionRadius;\r\n    [SerializeField]private GameObject _hitEffectPrefab; \r\n\r\n\r\n    // --- 내부 상태 ---\r\n    private List<Vector3> _currentPath = new List<Vector3>();\r\n    private int _currentPhaseIdx = -1;\r\n    private int _segmentIdx = 0;\r\n    private float _segmentT = 0f;\r\n    private bool _isFlying = false;\r\n\r\n    private Quaternion _initialRotation;\r\n\r\n    \r\n    private Vector3 _launchOrigin;\r\n    private float _splitAngleOffset;\r\n    private HashSet<int> _completedSplits = new HashSet<int>();\r\n\r\n    private void Start()\r\n    {\r\n        if (launchOnStart)\r\n            Invoke(nameof(Launch), startDelay);\r\n    }\r\n\r\n    /// <summary>\r\n    /// 유닛 베이스에서 미사일을 생성한 후 호출하여 스탯을 주입합니다.\r\n    /// </summary>\r\n    public void Init(float damage, float radius, Transform initialTarget)\r\n    {\r\n        _damage = damage;\r\n        _explosionRadius = radius;\r\n        target = initialTarget;\r\n    }\r\n\r\n    public void Launch(Quaternion? overrideRotation = null)\r\n    {\r\n        if (data == null || target == null) return;\r\n\r\n        _launchOrigin = transform.position;\r\n\r\n        if (overrideRotation.HasValue)\r\n        {\r\n            _initialRotation = overrideRotation.Value;\r\n            transform.rotation = _initialRotation;\r\n\r\n            // [중요] 타겟 방향과 실제 분열 방향 사이의 각도 차이를 계산해서 저장\r\n            Vector3 toTarget = (target.position - transform.position).normalized;\r\n            float targetAngle = Mathf.Atan2(toTarget.y, toTarget.x) * Mathf.Rad2Deg;\r\n            float actualAngle = _initialRotation.eulerAngles.z + 90f; // 2D 보정\r\n            _splitAngleOffset = Mathf.DeltaAngle(targetAngle, actualAngle);\r\n        }\r\n        else\r\n        {\r\n            _initialRotation = transform.rotation;\r\n            _splitAngleOffset = 0;\r\n        }\r\n\r\n        _isFlying = true;\r\n        _currentPhaseIdx = -1;\r\n        _segmentT = 0;\r\n        NextPhase();\r\n    }\r\n\r\n    void Update()\r\n    {\r\n        //if (Input.GetKeyDown(KeyCode.Space))\r\n        //    Launch();\r\n\r\n        if (!_isFlying || _currentPath.Count < 2) return;\r\n\r\n        // 타겟 추적 ON: 현재 세그먼트 내 위치를 유지하면서 경로만 새로 계산\r\n        if (trackTargetPerFrame)\r\n        {\r\n            // 현재 세그먼트 진행 비율(_segmentT)은 그대로 유지하고 경로만 갱신\r\n            float savedT = _segmentT;\r\n            int savedSeg = _segmentIdx;\r\n            CalculatePhasePath(_currentPhaseIdx, target.position);\r\n            // 경로 재계산 후 인덱스가 범위를 벗어나지 않도록 보정\r\n            _segmentIdx = Mathf.Clamp(savedSeg, 0, _currentPath.Count - 2);\r\n            _segmentT = savedT;\r\n        }\r\n\r\n        var phase = data.phases[_currentPhaseIdx];\r\n        float progress = (float)_segmentIdx / Mathf.Max(1, _currentPath.Count - 1);\r\n        float speed = Mathf.Lerp(phase.startSpeed, phase.endSpeed, progress);\r\n\r\n        float dist = Vector3.Distance(_currentPath[_segmentIdx], _currentPath[_segmentIdx + 1]);\r\n        if (dist < 0.001f) _segmentT = 1f;\r\n        else _segmentT += (speed * Time.deltaTime) / dist;\r\n\r\n        transform.position = Vector3.Lerp(_currentPath[_segmentIdx], _currentPath[_segmentIdx + 1], _segmentT);\r\n\r\n        if (_segmentT < 1.0f)\r\n        {\r\n            Vector3 dir = (_currentPath[_segmentIdx + 1] - _currentPath[_segmentIdx]).normalized;\r\n            if (dir != Vector3.zero)\r\n            {\r\n                float angle = Mathf.Atan2(dir.y, dir.x) * Mathf.Rad2Deg;\r\n                transform.rotation = Quaternion.Euler(0, 0, angle - 90f);\r\n            }\r\n        }\r\n\r\n        if (_segmentT >= 1f)\r\n        {\r\n            _segmentT = 0f;\r\n            _segmentIdx++;\r\n            if (_segmentIdx >= _currentPath.Count - 1)\r\n                NextPhase();\r\n        }\r\n    }\r\n\r\n    //private void NextPhase()\r\n    //{\r\n    //    if (_currentPhaseIdx >= 0 && _currentPhaseIdx < data.phases.Length)\r\n    //    {\r\n    //        var currentPhase = data.phases[_currentPhaseIdx];\r\n\r\n    //        if (currentPhase.splitOnEnd && currentPhase.childMissilePrefab != null && !_completedSplits.Contains(_currentPhaseIdx))\r\n    //        {\r\n    //            _completedSplits.Add(_currentPhaseIdx);\r\n    //            // 코루틴을 실행합니다. (이 안에서 발사 후 삭제까지 처리)\r\n    //            StartCoroutine(ProcessRandomSplit(currentPhase));\r\n\r\n    //            // 만약 여기서 삭제해야 하는 페이즈라면, 아래의 다음 페이즈 진행을 막습니다.\r\n    //            if (currentPhase.splitOnEndDestroy)\r\n    //            {\r\n    //                _isFlying = false;\r\n    //                return;\r\n    //            }\r\n    //        }\r\n    //    }\r\n\r\n    //    _currentPhaseIdx++;\r\n\r\n    //    if (_currentPhaseIdx >= data.phases.Length)\r\n    //    {\r\n    //        OnHit();\r\n    //        return;\r\n    //    }\r\n\r\n    //    CalculatePhasePath(_currentPhaseIdx, target.position);\r\n    //    _segmentIdx = 0;\r\n    //}\r\n\r\n    \r\n\r\n    private void NextPhase()\r\n    {\r\n        if (_currentPhaseIdx >= 0 && _currentPhaseIdx < data.phases.Length)\r\n        {\r\n            var currentPhase = data.phases[_currentPhaseIdx];\r\n\r\n            if (currentPhase.splitOnEnd && currentPhase.childMissilePrefab != null && !_completedSplits.Contains(_currentPhaseIdx))\r\n            {\r\n                _completedSplits.Add(_currentPhaseIdx);\r\n                StartCoroutine(ProcessRandomSplit(currentPhase));\r\n\r\n                if (currentPhase.splitOnEndDestroy)\r\n                {\r\n                    _isFlying = false;\r\n                    return;\r\n                }\r\n            }\r\n        }\r\n\r\n        _currentPhaseIdx++;\r\n\r\n        if (_currentPhaseIdx >= data.phases.Length)\r\n        {\r\n            OnHit();\r\n            return;\r\n        }\r\n\r\n        // [추가] 새로운 페이즈 시작 전, 주변의 가장 가까운 적을 탐색하여 타겟 갱신\r\n        UpdateTargetToNearestEnemy();\r\n\r\n        // 갱신된 타겟(또는 유지된 타겟) 위치를 기반으로 경로 계산\r\n        if (target != null)\r\n        {\r\n            CalculatePhasePath(_currentPhaseIdx, target.position);\r\n        }\r\n        else\r\n        {\r\n            // 만약 타겟을 찾지 못했다면, 현재 보고 있는 방향으로 계속 직진하게 처리\r\n            Vector3 forwardPos = transform.position + transform.up * 10f;\r\n            CalculatePhasePath(_currentPhaseIdx, forwardPos);\r\n        }\r\n\r\n        _segmentIdx = 0;\r\n    }\r\n\r\n    /// <summary>\r\n    /// 3D 물리 엔진을 사용하여 범위 내 가장 가까운 적을 찾아 target으로 설정합니다.\r\n    /// </summary>\r\n    private void UpdateTargetToNearestEnemy()\r\n    {\r\n        // Physics.OverlapSphere를 사용하여 3D 콜라이더 탐색\r\n        Collider[] hits = Physics.OverlapSphere(transform.position, detectionRadius, enemyLayer);\r\n\r\n        if (hits.Length == 0) return; // 주변에 적이 없으면 기존 타겟 유지\r\n\r\n        float closestDistance = Mathf.Infinity;\r\n        Transform nearestEnemy = null;\r\n\r\n        foreach (var hit in hits)\r\n        {\r\n            // EnemyBase 컴포넌트가 있는지 확인 (필요 시 주석 해제하여 사용하세요)\r\n            // if (hit.GetComponent<EnemyBase>() == null) continue;\r\n\r\n            float distance = Vector3.Distance(transform.position, hit.transform.position);\r\n            if (distance < closestDistance)\r\n            {\r\n                closestDistance = distance;\r\n                nearestEnemy = hit.transform;\r\n            }\r\n        }\r\n\r\n        if (nearestEnemy != null)\r\n        {\r\n            target = nearestEnemy;\r\n            // Debug.Log($\"페이즈 {_currentPhaseIdx}: 새로운 타겟 포착! {target.name}\");\r\n        }\r\n    }\r\n\r\n    \r\n\r\n\r\n    private IEnumerator ProcessRandomSplit(MissileData.PhaseSettings phase)\r\n    {\r\n        float splitDamage = _damage / Mathf.Max(1, phase.splitCount);\r\n        // 1. 기준 방향 설정 (부모가 보던 방향)\r\n        Vector3 baseDir = transform.up;\r\n        if (target != null)\r\n            baseDir = (target.position - transform.position).normalized;\r\n\r\n        // 2. 부채꼴 각도 리스트 생성 (예: -45, 0, 45 등등)\r\n        List<float> angles = new List<float>();\r\n        for (int i = 0; i < phase.splitCount; i++)\r\n        {\r\n            float t = (phase.splitCount <= 1) ? 0.5f : (float)i / (phase.splitCount - 1);\r\n            float angle = Mathf.Lerp(-phase.splitAngle, phase.splitAngle, t);\r\n            angles.Add(angle);\r\n        }\r\n\r\n        // 3. 리스트 셔플 (순서 무작위 섞기 - 중복 각도 방지)\r\n        for (int i = 0; i < angles.Count; i++)\r\n        {\r\n            int rand = Random.Range(i, angles.Count);\r\n            float temp = angles[i];\r\n            angles[i] = angles[rand];\r\n            angles[rand] = temp;\r\n        }\r\n\r\n        for (int i = 0; i < angles.Count; i++)\r\n        {\r\n            yield return new WaitForSeconds(Random.Range(0.05f, 0.15f));\r\n\r\n            float currentAngle = angles[i];\r\n            Vector3 launchDir = Quaternion.Euler(0, 0, currentAngle) * baseDir;\r\n\r\n            GameObject go = Instantiate(phase.childMissilePrefab, transform.position, Quaternion.identity);\r\n            ProjectileSplit projectile = go.GetComponent<ProjectileSplit>();\r\n\r\n            if (projectile != null)\r\n            {\r\n                // [중요] 계산된 분할 데미지를 함께 전달!\r\n                projectile.Init(launchDir, splitDamage);\r\n            }\r\n        }\r\n\r\n        // 모든 사출이 끝난 뒤 본체 비활성화 (코루틴 중단 방지)\r\n        if (phase.splitOnEndDestroy)\r\n        {\r\n            gameObject.SetActive(false);\r\n            Destroy(gameObject);\r\n        }\r\n    }\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n    // [수정] targetPos를 매개변수로 받아 경로 생성 (frozenTargetPos 방식 유지 가능 + 동적 추적도 가능)\r\n    private void CalculatePhasePath(int pIdx, Vector3 targetPos)\r\n    {\r\n        _currentPath.Clear();\r\n        var phase = data.phases[pIdx];\r\n        int start = (pIdx == 0) ? 0 : data.phases[pIdx - 1].endPointIndex;\r\n        int end = phase.endPointIndex;\r\n\r\n        for (int i = start; i < end; i++)\r\n        {\r\n            if (phase.isCurve)\r\n            {\r\n                for (int s = 0; s < 10; s++)\r\n                    _currentPath.Add(GetCatmullRomInternal(s / 10f, i, pIdx, targetPos));\r\n            }\r\n            else\r\n            {\r\n                _currentPath.Add(GetSingleDynamicPos(i, pIdx, targetPos));\r\n            }\r\n        }\r\n\r\n        if (pIdx == data.phases.Length - 1)\r\n            _currentPath.Add(targetPos);\r\n        else\r\n            _currentPath.Add(GetSingleDynamicPos(end, pIdx, targetPos));\r\n    }\r\n\r\n    // =======================================================================\r\n    // [핵심 수정] p0 = data.pathPoints[0] (디자인 원점) → _launchOrigin (실제 발사 위치)\r\n    //\r\n    // 원리: 디자인 데이터의 모든 포인트는 data.pathPoints[0]을 기준으로 한 상대 오프셋.\r\n    //       실제 계산 시 그 오프셋을 _launchOrigin에 더해 월드 좌표로 변환.\r\n    // =======================================================================\r\n    private Vector3 GetSingleDynamicPos(int index, int pIdx, Vector3 targetPos)\r\n    {\r\n        if (data.pathPoints.Count < 2) return Vector3.zero;\r\n\r\n        Vector3 p0 = _launchOrigin; // 발사 지점\r\n        Vector3 toTarget = targetPos - p0;\r\n        bool isLeft = toTarget.x < 0;\r\n\r\n        // --- 1. 에디터와 동일하게 Phase 0 (발사단계) 정보를 가져옴 ---\r\n        var phase0 = data.phases[0];\r\n        int launchEndIdx = phase0.endPointIndex;\r\n        Vector3 designOrigin = data.pathPoints[0];\r\n        Vector3 designLaunchEnd = data.pathPoints[launchEndIdx];\r\n\r\n        // 에디터의 pivotPos 계산과 동일: 디자인된 발사 끝점을 월드로 변환 (고정된 축)\r\n        Vector3 launchEndOffset = designLaunchEnd - designOrigin;\r\n        Vector3 pivotPos = p0 + new Vector3(isLeft ? -launchEndOffset.x : launchEndOffset.x, launchEndOffset.y, 0);\r\n\r\n        // --- 2. 현재 페이즈의 useRotation 설정 확인 ---\r\n        bool useRot = data.phases[pIdx].useRotation;\r\n\r\n        // --- [분기 1] useRotation ON : 타겟 방향으로 전체 회전 (기존 로직) ---\r\n        if (useRot || Mathf.Abs(_splitAngleOffset) > 0.01f)\r\n        {\r\n            float designFullDist = Mathf.Abs(data.pathPoints[data.pathPoints.Count - 1].x - designOrigin.x);\r\n            if (designFullDist < 0.1f) designFullDist = 10f;\r\n\r\n            float scaleX = toTarget.magnitude / designFullDist;\r\n            if (index == data.pathPoints.Count - 1) return targetPos;\r\n\r\n            Quaternion finalRot;\r\n            if (Mathf.Abs(_splitAngleOffset) > 0.01f)\r\n            {\r\n                // 분열 미사일 처리\r\n                float targetAngle = Mathf.Atan2(toTarget.y, toTarget.x) * Mathf.Rad2Deg;\r\n                finalRot = Quaternion.Euler(0, 0, targetAngle + _splitAngleOffset - 90f);\r\n                Vector3 lp = data.pathPoints[index] - designOrigin;\r\n                return p0 + (finalRot * new Vector3(lp.x * scaleX, lp.y, 0));\r\n            }\r\n            else\r\n            {\r\n                // 일반 회전 미사일 처리\r\n                float angle = Mathf.Atan2(toTarget.y, Mathf.Abs(toTarget.x)) * Mathf.Rad2Deg;\r\n                finalRot = Quaternion.Euler(0, 0, isLeft ? -angle : angle);\r\n                Vector3 lp = data.pathPoints[index] - designOrigin;\r\n                float fx = isLeft ? -lp.x : lp.x;\r\n                return p0 + (finalRot * new Vector3(fx * scaleX, lp.y, 0));\r\n            }\r\n        }\r\n        // --- [분기 2] useRotation OFF : 에디터와 동일한 발사 구간 고정 로직 ---\r\n        else\r\n        {\r\n            // A. 발사 구간(Phase 0) 내부는 타겟 방향과 상관없이 월드 수직/수평 고정\r\n            if (index <= launchEndIdx)\r\n            {\r\n                Vector3 lp = data.pathPoints[index] - designOrigin;\r\n                // X좌표만 타겟이 왼쪽에 있으면 반전, Y는 고정\r\n                return p0 + new Vector3(isLeft ? -lp.x : lp.x, lp.y, lp.z);\r\n            }\r\n\r\n            // B. 발사 이후 구간은 pivotPos(발사 끝점)를 기준으로 타겟까지 신축\r\n            if (index == data.pathPoints.Count - 1) return targetPos;\r\n\r\n            Vector3 relTargetVec = targetPos - pivotPos;\r\n            float designRemX = Mathf.Abs(data.pathPoints[data.pathPoints.Count - 1].x - designLaunchEnd.x);\r\n            if (designRemX < 0.01f) designRemX = 10f;\r\n\r\n            Vector3 relLocal = data.pathPoints[index] - designLaunchEnd;\r\n            float scale = relTargetVec.magnitude / designRemX;\r\n            float fx = isLeft ? -relLocal.x : relLocal.x;\r\n\r\n            // 발사 끝점으로부터 타겟 방향으로 늘어남\r\n            return pivotPos + new Vector3(fx * scale, relLocal.y, relLocal.z);\r\n        }\r\n    }\r\n\r\n    private Vector3 GetCatmullRomInternal(float t, int i, int pIdx, Vector3 targetPos)\r\n    {\r\n        Vector3 p0 = GetSingleDynamicPos(Mathf.Max(i - 1, 0), pIdx, targetPos);\r\n        Vector3 p1 = GetSingleDynamicPos(i, pIdx, targetPos);\r\n        Vector3 p2 = GetSingleDynamicPos(Mathf.Min(i + 1, data.pathPoints.Count - 1), pIdx, targetPos);\r\n        Vector3 p3 = GetSingleDynamicPos(Mathf.Min(i + 2, data.pathPoints.Count - 1), pIdx, targetPos);\r\n        return 0.5f * ((2f * p1) + (-p0 + p2) * t + (2f * p0 - 5f * p1 + 4f * p2 - p3) * (t * t) + (-p0 + 3f * p1 - 3f * p2 + p3) * (t * t * t));\r\n    }\r\n\r\n    private void OnHit()\r\n    {\r\n        if (!_isFlying) return;\r\n        _isFlying = false;\r\n\r\n        // 1. 폭발 이펙트 생성 및 크기 조절\r\n        if (_hitEffectPrefab != null)\r\n        {\r\n            GameObject effect = Instantiate(_hitEffectPrefab, transform.position, Quaternion.identity);\r\n\r\n            // [핵심] 이펙트 크기 계산\r\n            // _explosionRadius가 반지름이므로 지름은 Radius * 2\r\n            // 기본 이펙트 크기가 4유닛이므로 지름을 4로 나누어 스케일을 구함\r\n            float effectScale = (_explosionRadius * 2f) / 4f;\r\n            effect.transform.localScale = new Vector3(effectScale, effectScale, effectScale);\r\n        }\r\n\r\n        // 2. 광역 데미지 처리 (반지름 기준)\r\n        Collider[] hitEnemies = Physics.OverlapSphere(transform.position, _explosionRadius, enemyLayer);\r\n        foreach (var col in hitEnemies)\r\n        {\r\n            if (col.TryGetComponent(out EnemyBase enemy))\r\n            {\r\n                enemy.TakeDamage(_damage);\r\n            }\r\n        }\r\n\r\n        // 3. 로그 출력 및 오브젝트 제거\r\n        Debug.Log($\"<color=cyan>[궁극기 폭발]</color> 범위: {_explosionRadius}, 적용 스케일: {(_explosionRadius * 2f) / 4f}\");\r\n\r\n        gameObject.SetActive(false);\r\n        Destroy(gameObject);\r\n    }\r\n\r\n\r\n}\r\n","lines":465},{"id":"02_Scripts/Augment/AugmentOffer.cs","name":"AugmentOffer","path":"02_Scripts/Augment/AugmentOffer.cs","layer":"Augment","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"AugmentOffer.cs 역할 : 플레이어에게 제시되는 증강 선택지 하나를 표현하는 런타임 데이터 클래스","src":"// =================================================================\n// AugmentOffer.cs\n// 역할  : 플레이어에게 제시되는 증강 선택지 하나를 표현하는 런타임 데이터 클래스\n// =================================================================\n\nnamespace LuckyRandomDefense.Augment\n{\n    public class AugmentOffer\n    {\n        public AugmentData data;\n        public AugmentTier tier => data.tier;\n        public float FinalEffectValue => data.effectValue;\n\n        public AugmentOffer(AugmentData data)\n        {\n            this.data = data;\n        }\n    }\n}\n","lines":20},{"id":"02_Scripts/Augment/AugmentManager.cs","name":"AugmentManager","path":"02_Scripts/Augment/AugmentManager.cs","layer":"Augment","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class AugmentManager : MonoBehaviour","src":"using System.Collections;\nusing System.Collections.Generic;\nusing UnityEngine;\nusing LuckyRandomDefense.Core;\nusing LuckyRandomDefense.Core.EventBus;\nusing LuckyRandomDefense.Unit;\n\nnamespace LuckyRandomDefense.Augment\n{\n    public class AugmentManager : MonoBehaviour\n    {\n        public static AugmentManager Instance { get; private set; }\n\n        [Header(\"RESOURCE 풀 (tier별)\")]\n        [SerializeField] private List<AugmentData> resourceSilver;\n        [SerializeField] private List<AugmentData> resourceGold;\n        [SerializeField] private List<AugmentData> resourcePrismatic;\n\n        [Header(\"TOWER 풀 (tier별)\")]\n        [SerializeField] private List<AugmentData> towerSilver;\n        [SerializeField] private List<AugmentData> towerGold;\n        [SerializeField] private List<AugmentData> towerPrismatic;\n\n        [Header(\"HERO 풀 (tier별)\")]\n        [SerializeField] private List<AugmentData> heroSilver;\n        [SerializeField] private List<AugmentData> heroGold;\n        [SerializeField] private List<AugmentData> heroPrismatic;\n\n        [Header(\"트리거 웨이브 (기본 3, 6, 9)\")]\n        [SerializeField] private List<int> triggerWaves = new List<int> { 3, 6, 9 };\n\n        [Header(\"선택 제한 시간 (초)\")]\n        [SerializeField] private float selectionTime = 30f;\n\n        [Header(\"등급 가중치 (합계 100 권장)\")]\n        [SerializeField] private float silverWeight    = 60f;\n        [SerializeField] private float goldWeight      = 30f;\n        [SerializeField] private float prismaticWeight = 10f;\n\n        private List<AugmentOffer> _currentOffers    = new List<AugmentOffer>();\n        private List<AugmentOffer> _acquiredAugments = new List<AugmentOffer>();\n        private Coroutine _timerCoroutine;\n\n        private void Awake()\n        {\n            if (Instance == null) Instance = this;\n            else { Destroy(gameObject); return; }\n        }\n\n        private void OnEnable()\n        {\n            GameEventBus.OnWaveCompleted     += HandleWaveCompleted;\n            GameEventBus.OnAugmentSelected   += HandleAugmentSelected;\n            GameEventBus.OnAugmentReroll     += HandleAugmentReroll;\n            GameEventBus.OnAugmentTierReroll += HandleAugmentTierReroll;\n            Debug.Log(\"[AugmentManager] 이벤트 구독 완료\");\n        }\n\n        private void OnDisable()\n        {\n            GameEventBus.OnWaveCompleted     -= HandleWaveCompleted;\n            GameEventBus.OnAugmentSelected   -= HandleAugmentSelected;\n            GameEventBus.OnAugmentReroll     -= HandleAugmentReroll;\n            GameEventBus.OnAugmentTierReroll -= HandleAugmentTierReroll;\n            Debug.Log(\"[AugmentManager] 이벤트 구독 해제\");\n        }\n\n        // ── 웨이브 완료 ────────────────────────────────────────────\n\n        private void HandleWaveCompleted(int completedWaveIndex)\n        {\n            Debug.Log($\"[AugmentManager] 웨이브 {completedWaveIndex} 완료 수신\");\n            if (!triggerWaves.Contains(completedWaveIndex))\n            {\n                Debug.Log($\"[AugmentManager] 웨이브 {completedWaveIndex}는 증강 트리거 아님 → 스킵\");\n                return;\n            }\n            GameManager.Instance.ChangeState(GameState.PAUSE);\n            GenerateAndPresentOffers();\n            if (_timerCoroutine != null) StopCoroutine(_timerCoroutine);\n            _timerCoroutine = StartCoroutine(SelectionTimer());\n        }\n\n        // ── 선택지 생성 ────────────────────────────────────────────\n\n        private void GenerateAndPresentOffers()\n        {\n            _currentOffers.Clear();\n            AugmentOffer resourceOffer = PickOffer(AugmentCategory.RESOURCE);\n            AugmentOffer towerOffer    = PickOffer(AugmentCategory.TOWER);\n            AugmentOffer heroOffer     = PickOffer(AugmentCategory.HERO);\n            if (resourceOffer != null) _currentOffers.Add(resourceOffer);\n            if (towerOffer    != null) _currentOffers.Add(towerOffer);\n            if (heroOffer     != null) _currentOffers.Add(heroOffer);\n            if (_currentOffers.Count == 0)\n            {\n                Debug.LogError(\"[AugmentManager] 선택지 생성 실패 → 풀 연결 확인\");\n                GameManager.Instance.ChangeState(GameState.WAVE_PROGRESS);\n                return;\n            }\n            Debug.Log($\"[AugmentManager] 선택지 {_currentOffers.Count}개 생성\");\n            GameEventBus.RaiseAugmentSelectionRequested(_currentOffers);\n        }\n\n        private AugmentOffer PickOffer(AugmentCategory category)\n        {\n            AugmentTier tier = GetRandomTier();\n            List<AugmentData> pool = GetPool(category, tier) ?? GetFallbackPool(category, tier);\n            if (pool == null || pool.Count == 0)\n            {\n                Debug.LogWarning($\"[AugmentManager] {category} 풀 비어있음\");\n                return null;\n            }\n            List<AugmentData> valid = pool.FindAll(a => a != null);\n            if (valid.Count == 0) return null;\n            AugmentData selected = valid[Random.Range(0, valid.Count)];\n            Debug.Log($\"[AugmentManager] {category} 선택: {selected.augmentName} [{selected.tier}] 수치:{selected.effectValue:F2}\");\n            return new AugmentOffer(selected);\n        }\n\n        // ── 타이머 ─────────────────────────────────────────────────\n\n        private IEnumerator SelectionTimer()\n        {\n            float remaining = selectionTime;\n            while (remaining > 0f)\n            {\n                remaining -= Time.unscaledDeltaTime;\n                GameEventBus.RaiseAugmentTimerUpdated(remaining);\n                yield return null;\n            }\n            if (_currentOffers.Count > 0)\n            {\n                AugmentOffer autoSelected = _currentOffers[Random.Range(0, _currentOffers.Count)];\n                Debug.Log($\"[AugmentManager] 시간 초과 → 자동 선택: {autoSelected.data.augmentName}\");\n                HandleAugmentSelected(autoSelected);\n            }\n            else\n            {\n                Debug.LogWarning(\"[AugmentManager] 시간 초과, 선택지 없음 → WAVE_PROGRESS\");\n                GameManager.Instance.ChangeState(GameState.WAVE_PROGRESS);\n            }\n        }\n\n        private void StopTimer()\n        {\n            if (_timerCoroutine != null) { StopCoroutine(_timerCoroutine); _timerCoroutine = null; }\n        }\n\n        // ── 리롤 ───────────────────────────────────────────────────\n\n        private void HandleAugmentReroll()\n        {\n            if (_currentOffers.Count == 0) { Debug.LogWarning(\"[AugmentManager] 리롤 실패 — 선택지 없음\"); return; }\n            _currentOffers.Clear();\n            AugmentOffer r = PickOffer(AugmentCategory.RESOURCE);\n            AugmentOffer t = PickOffer(AugmentCategory.TOWER);\n            AugmentOffer h = PickOffer(AugmentCategory.HERO);\n            if (r != null) _currentOffers.Add(r);\n            if (t != null) _currentOffers.Add(t);\n            if (h != null) _currentOffers.Add(h);\n            Debug.Log(\"[AugmentManager] 리롤 완료\");\n            GameEventBus.RaiseAugmentSelectionRequested(_currentOffers);\n        }\n\n        private void HandleAugmentTierReroll()\n        {\n            if (_currentOffers.Count == 0) { Debug.LogWarning(\"[AugmentManager] 등급 리롤 실패 — 선택지 없음\"); return; }\n            List<AugmentOffer> rerolled = new List<AugmentOffer>();\n            foreach (AugmentOffer offer in _currentOffers)\n            {\n                AugmentCategory category = offer.data.category;\n                AugmentTier newTier = GetRandomTier();\n                List<AugmentData> pool = GetPool(category, newTier) ?? GetFallbackPool(category, newTier);\n                if (pool == null || pool.Count == 0) { rerolled.Add(offer); continue; }\n                List<AugmentData> valid = pool.FindAll(a => a != null);\n                if (valid.Count == 0) { rerolled.Add(offer); continue; }\n                AugmentData selected = valid[Random.Range(0, valid.Count)];\n                rerolled.Add(new AugmentOffer(selected));\n                Debug.Log($\"[AugmentManager] 등급 리롤: {offer.data.augmentName}[{offer.tier}] → {selected.augmentName}[{selected.tier}]\");\n            }\n            _currentOffers = rerolled;\n            GameEventBus.RaiseAugmentSelectionRequested(_currentOffers);\n        }\n\n        // ── 증강 선택 적용 ─────────────────────────────────────────\n\n        private void HandleAugmentSelected(AugmentOffer offer)\n        {\n            if (offer == null || offer.data == null)\n            {\n                Debug.LogError(\"[AugmentManager] offer null → WAVE_PROGRESS\");\n                GameManager.Instance.ChangeState(GameState.WAVE_PROGRESS);\n                return;\n            }\n            StopTimer();\n            _acquiredAugments.Add(offer);\n            _currentOffers.Clear();\n            Debug.Log($\"[AugmentManager] 증강 선택: {offer.data.augmentName} [{offer.tier}] 수치:{offer.FinalEffectValue:F2}\");\n            switch (offer.data.augmentType)\n            {\n                case AugmentType.GOLD_BOOST:                                      ApplyGoldBoost(offer);    break;\n                case AugmentType.ALL_UNIT_DAMAGE:\n                case AugmentType.ALL_UNIT_RANGE:\n                case AugmentType.ALL_UNIT_SPEED:                                  ApplyAllUnitBuff(offer);  break;\n                case AugmentType.HERO_UNIT_DAMAGE:\n                case AugmentType.HERO_UNIT_RANGE:                                 ApplyHeroUnitBuff(offer); break;\n                default: Debug.LogWarning($\"[AugmentManager] 미처리 타입: {offer.data.augmentType}\"); break;\n            }\n            GameManager.Instance.ChangeState(GameState.WAVE_PROGRESS);\n            Debug.Log(\"[AugmentManager] 증강 적용 완료 → WAVE_PROGRESS\");\n        }\n\n        // ── 효과 적용 ──────────────────────────────────────────────\n\n        private void ApplyGoldBoost(AugmentOffer offer)\n        {\n            if (GameManager.Instance == null) { Debug.LogError(\"[AugmentManager] GameManager null\"); return; }\n            int goldAmount = Mathf.RoundToInt(offer.FinalEffectValue);\n            GameManager.Instance.Gold += goldAmount;\n            Debug.Log($\"[AugmentManager] 골드 +{goldAmount}G | 잔여: {GameManager.Instance.Gold}G\");\n        }\n\n        private void ApplyAllUnitBuff(AugmentOffer offer)\n        {\n            UnitBase[] allUnits = FindObjectsByType<UnitBase>(FindObjectsInactive.Exclude);\n            if (allUnits.Length == 0) { Debug.LogWarning(\"[AugmentManager] 유닛 없음\"); return; }\n            foreach (UnitBase unit in allUnits)\n            {\n                if (unit == null) continue;\n                unit.ApplyAugment(offer.data.augmentType, offer.FinalEffectValue);\n            }\n            Debug.Log($\"[AugmentManager] 전체 유닛 증강 | {offer.data.augmentType} | {offer.FinalEffectValue:F2} | {allUnits.Length}개\");\n        }\n\n        private void ApplyHeroUnitBuff(AugmentOffer offer)\n        {\n            UnitBase[] allUnits = FindObjectsByType<UnitBase>(FindObjectsInactive.Exclude);\n            int count = 0;\n            foreach (UnitBase unit in allUnits)\n            {\n                if (unit == null || unit.RatingType != UnitRatingType.HEROIC) continue;\n                unit.ApplyAugment(offer.data.augmentType, offer.FinalEffectValue);\n                count++;\n            }\n            if (count == 0) Debug.LogWarning(\"[AugmentManager] HEROIC 유닛 없음\");\n            else Debug.Log($\"[AugmentManager] 영웅 증강 | {offer.FinalEffectValue:F2} | {count}개\");\n        }\n\n        // ── 풀 조회 ────────────────────────────────────────────────\n\n        private List<AugmentData> GetPool(AugmentCategory category, AugmentTier tier) =>\n            (category, tier) switch\n            {\n                (AugmentCategory.RESOURCE, AugmentTier.SILVER)    => resourceSilver,\n                (AugmentCategory.RESOURCE, AugmentTier.GOLD)      => resourceGold,\n                (AugmentCategory.RESOURCE, AugmentTier.PRISMATIC) => resourcePrismatic,\n                (AugmentCategory.TOWER,    AugmentTier.SILVER)    => towerSilver,\n                (AugmentCategory.TOWER,    AugmentTier.GOLD)      => towerGold,\n                (AugmentCategory.TOWER,    AugmentTier.PRISMATIC) => towerPrismatic,\n                (AugmentCategory.HERO,     AugmentTier.SILVER)    => heroSilver,\n                (AugmentCategory.HERO,     AugmentTier.GOLD)      => heroGold,\n                (AugmentCategory.HERO,     AugmentTier.PRISMATIC) => heroPrismatic,\n                _ => null\n            };\n\n        private List<AugmentData> GetFallbackPool(AugmentCategory category, AugmentTier tier)\n        {\n            if (tier == AugmentTier.PRISMATIC)\n            {\n                var gold = GetPool(category, AugmentTier.GOLD);\n                if (gold != null && gold.Count > 0) return gold;\n            }\n            return GetPool(category, AugmentTier.SILVER);\n        }\n\n        private AugmentTier GetRandomTier()\n        {\n            float total = silverWeight + goldWeight + prismaticWeight;\n            float roll  = Random.Range(0f, total);\n            if (roll < silverWeight)              return AugmentTier.SILVER;\n            if (roll < silverWeight + goldWeight) return AugmentTier.GOLD;\n            return AugmentTier.PRISMATIC;\n        }\n\n        public List<AugmentOffer> GetAcquiredAugments() => _acquiredAugments;\n    }\n}\n","lines":289},{"id":"02_Scripts/Unit/Skill/BeastSkill/BeastBuff.cs","name":"BeastBuff","path":"02_Scripts/Unit/Skill/BeastSkill/BeastBuff.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class BeastBuffSikll : IUnitSkill","src":"﻿\r\nusing UnityEngine;\r\nusing LuckyRandomDefense.Enemy;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class BeastBuffSikll : IUnitSkill\r\n    {\r\n        public void Execute(UnitBase owner, EnemyBase target)\r\n        {\r\n            Debug.Log(\"야수 스킬 시전\");\r\n        }\r\n    }\r\n}\r\n\r\n","lines":16},{"id":"02_Scripts/Unit/Skill/CommomSkill/UnitBoomSkill.cs","name":"UnitBoomSkill","path":"02_Scripts/Unit/Skill/CommomSkill/UnitBoomSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"투사체 스크립트에 유닛 데이터 전달","src":"using UnityEngine;\r\nusing LuckyRandomDefense.Enemy;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class UnitBoomSkill : IUnitSkill\r\n    {\r\n        public void Execute(UnitBase owner, EnemyBase target)\r\n        {\r\n            if (target == null || owner == null) return;\r\n            Debug.Log(\"붐스킬 발동\");\r\n            Vector3 spawnPos = owner.transform.position  {\r\n                    Debug.Log(\"주변 아군 공용 버프 중 !\");\r\n                    ally.SetBuff(2f, 3f);\r\n                }\r\n            }\r\n        }\r\n    }\r\n}\r\n\r\n","lines":43},{"id":"02_Scripts/Unit/Skill/CommomSkill/UnitStunSkill.cs","name":"UnitStunSkill","path":"02_Scripts/Unit/Skill/CommomSkill/UnitStunSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"설정된 타겟 수만큼만 기절","src":"﻿using UnityEngine;\r\nusing System.Collections;\r\nusing LuckyRandomDefense.Enemy;\r\nusing System.Threading;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class UnitStunSkill : IUnitSkill\r\n    {\r\n        public void Execute(UnitBase owner, EnemyBase target)\r\n        {\r\n            if (owner == null) return;\r\n\r\n            Collider[] targets = Physics.OverlapSphere(owner.transform.position, owner.FinalRange, LayerMask.GetMask(\"Enemy\"));\r\n\r\n            int hitCount = 0;\r\n            int maxTargets = owner.FinalTargetCount;\r\n\r\n            foreach (var col in targets)\r\n            {\r\n                // 설정된 타겟 수만큼만 기절\r\n                if (hitCount >= maxTargets) break;\r\n\r\n                if (col.TryGetComponent(out EnemyBase enemy))\r\n                {\r\n                    \r\n                    UnitEffectObjectPool.Instance.GetSkillEffect(\r\n                        SkillEffectPrefapType.STUN_EFFECT,\r\n                        enemy.transform.position,\r\n                        Quaternion.identity);\r\n\r\n                   \r\n                    //var movement = enemy.GetComponent<EnemyMovement>();\r\n                    var movement = enemy.GetComponent<EnemyAI>();\r\n                    if (movement != null)\r\n                    {\r\n                        \r\n                        owner.StartCoroutine(StunRoutine(movement, owner.FinalStunTime));\r\n                    }\r\n\r\n                    hitCount++;\r\n                }\r\n            }\r\n\r\n            if (hitCount > 0)\r\n            {\r\n                Debug.Log($\"유닛 주변 {hitCount}명의 적에게 스턴 시전!\");\r\n            }\r\n        }\r\n        // 기절 무브먼트 끄기\r\n        private IEnumerator StunRoutine(EnemyAI movement, float duration)\r\n        {\r\n            if (movement == null) yield break;\r\n\r\n            movement.enabled = false;\r\n            yield return new WaitForSeconds(duration);\r\n\r\n            if (movement != null)\r\n            {\r\n                movement.enabled = true;\r\n            }\r\n        }\r\n    }\r\n}","lines":64},{"id":"02_Scripts/Unit/Skill/ElfSkil/ElfBuffSkill.cs","name":"ElfBuffSkill","path":"02_Scripts/Unit/Skill/ElfSkil/ElfBuffSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class ElfBuffSkill : IUnitSkill","src":"﻿using UnityEngine;\r\nusing LuckyRandomDefense.Enemy;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class ElfBuffSkill : IUnitSkill\r\n    {\r\n        public void Execute(UnitBase owner, EnemyBase target)\r\n        {\r\n            float range = owner.FinalSkillRange;\r\n            Collider[] allies = Physics.OverlapSphere(owner.transform.position, range);\r\n            foreach (var col in allies)\r\n            {\r\n                var unit = col.GetComponent<UnitBase>();\r\n                if (unit != null && unit.Type == UnitType.ELF)\r\n                {\r\n                    unit.SetBuff(2f, 3f);\r\n                    Debug.Log(\"엘프 버프 발동!\");\r\n                }\r\n            }\r\n        }\r\n    }\r\n}\r\n\r\n","lines":25},{"id":"02_Scripts/Unit/Skill/ElfSkil/ElfFirePillarSkill.cs","name":"ElfFirePillarSkill","path":"02_Scripts/Unit/Skill/ElfSkil/ElfFirePillarSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class ElfFirePillarSkill : IUnitSkill","src":"﻿using UnityEngine;\r\nusing LuckyRandomDefense.Enemy;\r\nusing System.Collections;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class ElfFirePillarSkill : IUnitSkill\r\n    {\r\n        public void Execute(UnitBase owner, EnemyBase target)\r\n        {\r\n            if (target == null || owner == null) return;\r\n\r\n\r\n            Vector3 targetPos = target.transform.position;\r\n\r\n\r\n\r\n\r\n            ApplyLimitedRangeDamage(owner, targetPos);\r\n        }\r\n\r\n        private void ApplyLimitedRangeDamage(UnitBase owner, Vector3 center)\r\n        {\r\n            Collider[] targets = Physics.OverlapSphere(center, owner.FinalSkillRange, LayerMask.GetMask(\"Enemy\"));\r\n\r\n            //\r\n            int maxTargets = owner.FinalTargetCount;\r\n            int currentHitCount = 0;\r\n\r\n            foreach (var col in targets)\r\n            {\r\n                if (currentHitCount >= maxTargets) break;\r\n                EnemyBase enemy = col.GetComponent<EnemyBase>();\r\n                if (enemy != null)\r\n                {\r\n                   \r\n                    UnitEffectObjectPool.Instance.GetSkillEffect(SkillEffectPrefapType.FIREPILLAR_EFFECT,\r\n                    enemy.transform.position, Quaternion.identity\r\n                    );\r\n\r\n\r\n                    enemy.TakeDamage(owner.FinalSkillDamage);\r\n\r\n\r\n                    currentHitCount++;\r\n                }\r\n            }\r\n        }\r\n    }\r\n}","lines":50},{"id":"02_Scripts/Unit/Skill/ElfSkil/UnitBigFireBallSkill.cs","name":"UnitBigFireBallSkill","path":"02_Scripts/Unit/Skill/ElfSkil/UnitBigFireBallSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class ElfBigFireBallSkill : IUnitSkill","src":"using UnityEngine;\r\nusing LuckyRandomDefense.Enemy;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class ElfBigFireBallSkill : IUnitSkill\r\n    {\r\n        public void Execute(UnitBase owner, EnemyBase target)\r\n        {\r\n            float damege = owner.FinalSkillDamage;\r\n\r\n            if (target == null || owner == null) return;\r\n            Vector3 spawnPos = owner.transform.position + Vector3.up * 0.5f;\r\n            Vector3 direction = (target.transform.position - spawnPos).normalized;\r\n            Quaternion rotation = Quaternion.FromToRotation(Vector3.right, direction);\r\n\r\n            UnitEffectObjectPool.Instance.GetSkillEffect(\r\n                SkillEffectPrefapType.FIREBALL_BIG_EFFECT,\r\n                spawnPos,\r\n                rotation\r\n            );\r\n\r\n            \r\n\r\n            target.TakeDamage(damege);\r\n            Debug.Log($\"{target.name}에게 빅파이어볼!\");\r\n            \r\n        }\r\n    }\r\n}\r\n","lines":31},{"id":"02_Scripts/Unit/Skill/HumanSkill/HumanSupportSkill.cs","name":"HumanSupportSkill","path":"02_Scripts/Unit/Skill/HumanSkill/HumanSupportSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"주변 아군 탐색 후 '휴먼' 타입에게만 버프 부여","src":"﻿using UnityEngine;\r\nusing LuckyRandomDefense.Enemy;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class HumanSupportSkill : IUnitSkill\r\n    {\r\n        public void Execute(UnitBase owner, EnemyBase target)\r\n        {\r\n            // 주변 아군 탐색 후 '휴먼' 타입에게만 버프 부여\r\n            float range = 5f;\r\n            Collider[] allies = Physics.OverlapSphere(owner.transform.position, range);\r\n            foreach (var col in allies)\r\n            {\r\n                var unit = col.GetComponent<UnitBase>();\r\n                if (unit != null && unit.Type == UnitType.HUMAN)\r\n                {\r\n                    unit.SetBuff(2f, 3f);\r\n                    Debug.Log(\"휴먼 버프 발동!\");\r\n                }\r\n            }\r\n        }\r\n    }\r\n}\r\n\r\n","lines":26},{"id":"02_Scripts/Unit/Skill/HumanSkill/PowerShotSkill.cs","name":"PowerShotSkill","path":"02_Scripts/Unit/Skill/HumanSkill/PowerShotSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class PowerShotSkill : IUnitSkill","src":"﻿using UnityEngine;\r\nusing LuckyRandomDefense.Enemy;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class PowerShotSkill : IUnitSkill\r\n    {\r\n        public void Execute(UnitBase owner, EnemyBase target)\r\n        {\r\n            if (target != null)\r\n            {\r\n                Vector3 spawnPos = owner.transform.position + Vector3.up * 0.5f;\r\n\r\n                UnitEffectObjectPool.Instance.GetSkillEffect(\r\n                SkillEffectPrefapType.STRONGBLOW_EFFECT,\r\n                spawnPos,\r\n                owner.transform.rotation);\r\n                float PowerShot = owner.FinalSkillDamage * 3;\r\n                target.TakeDamage(PowerShot);\r\n\r\n                \r\n            }\r\n        }\r\n    }\r\n}\r\n","lines":26},{"id":"02_Scripts/Unit/Skill/HumanSkill/WindmillSkill.cs","name":"WindmillSkill","path":"02_Scripts/Unit/Skill/HumanSkill/WindmillSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"유닛 주변의 적들을 탐색","src":"﻿using UnityEngine;\r\nusing LuckyRandomDefense.Enemy;\r\nusing System.Collections.Generic;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class WindmillSkill : IUnitSkill\r\n    {\r\n        public void Execute(UnitBase owner, EnemyBase target)\r\n        {\r\n            if (owner == null) return;\r\n\r\n            // 유닛 주변의 적들을 탐색 \r\n            Collider[] targetsInRange = Physics.OverlapSphere(\r\n                owner.transform.position,\r\n                owner.FinalRange,\r\n                LayerMask.GetMask(\"Enemy\")\r\n            );\r\n\r\n            if (targetsInRange.Length == 0) return;\r\n\r\n           \r\n            UnitEffectObjectPool.Instance.GetSkillEffect(\r\n                SkillEffectPrefapType.WINDMILL_EFFECT,\r\n                owner.transform.position,\r\n                Quaternion.identity\r\n            );\r\n\r\n            // 타겟팅 수\r\n            int attackCount = 0;\r\n            int targetCount = owner.FinalTargetCount * 2;\r\n            float skillDamage = owner.FinalSkillDamage * 2;\r\n            foreach (var col in targetsInRange)\r\n            {\r\n                if (attackCount >= targetCount) break;\r\n\r\n                if (col.TryGetComponent(out EnemyBase enemy))\r\n                {\r\n                    enemy.TakeDamage(skillDamage);\r\n                    attackCount++;\r\n                }\r\n            }\r\n\r\n            \r\n        }\r\n    }\r\n}","lines":47},{"id":"02_Scripts/Unit/Skill/MachineSkill/LaserBeamSkill.cs","name":"LaserBeamSkill","path":"02_Scripts/Unit/Skill/MachineSkill/LaserBeamSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class LaserBeamSkill : IUnitSkill","src":"﻿\r\nusing UnityEngine;\r\nusing LuckyRandomDefense.Enemy;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class LaserBeamSkill : IUnitSkill\r\n    {\r\n        public void Execute(UnitBase owner, EnemyBase target)\r\n        {\r\n            Debug.Log(\"기계 빔발사\");\r\n            target.TakeDamage(20f);\r\n        }\r\n    }\r\n\r\n}\r\n","lines":17},{"id":"02_Scripts/Unit/Skill/UndeadSkill/DebuffFieldSkill.cs","name":"DebuffFieldSkill","path":"02_Scripts/Unit/Skill/UndeadSkill/DebuffFieldSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"이동 후 위치와 비교해서 변화량 계산","src":"﻿using UnityEngine;\r\nusing System.Collections;\r\nusing LuckyRandomDefense.Enemy;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class DebuffFieldSkill : IUnitSkill\r\n    {\r\n        public void Execute(UnitBase owner, EnemyBase target)\r\n        {\r\n            if (target == null || owner == null) return;\r\n\r\n           \r\n            owner.StartCoroutine(DetermineDirectionAndSpawn(owner, target));\r\n        }\r\n\r\n        private IEnumerator DetermineDirectionAndSpawn(UnitBase owner, EnemyBase target)\r\n        {\r\n            \r\n            Vector3 startPos = target.transform.position;\r\n\r\n            \r\n            yield return new WaitForFixedUpdate();\r\n\r\n            if (target == null) yield break;\r\n\r\n            // 이동 후 위치와 비교해서 변화량 계산\r\n            Vector3 endPos = target.transform.position;\r\n            float deltaX = Mathf.Abs(endPos.x - startPos.x);\r\n            float deltaY = Mathf.Abs(endPos.y - startPos.y);\r\n\r\n           \r\n            Vector3 spawnPos = endPos;\r\n            spawnPos.z = 0f;\r\n\r\n            Quaternion spawnRotation = Quaternion.identity;\r\n\r\n            // Y축 변동량이 X축 변동량보다 크면\r\n            if (deltaY > deltaX)\r\n            {\r\n                \r\n                spawnRotation = Quaternion.Euler(0, 0, 90f);\r\n            }\r\n            else\r\n            {\r\n               \r\n                spawnRotation = Quaternion.identity;\r\n            }\r\n\r\n            // 최종 결정된 각도로 이펙트 생성\r\n            GameObject ampObj = UnitEffectObjectPool.Instance.GetSkillEffect(\r\n                SkillEffectPrefapType.DEBUFF_FIELD_EFFECT, spawnPos, spawnRotation);\r\n\r\n            if (ampObj != null && ampObj.TryGetComponent(out DebuffField field))\r\n            {\r\n                field.Setup(owner.FinalBuffTime, owner.FinalSkillRange, 2.0f);\r\n            }\r\n        }\r\n    }\r\n}\r\n    ","lines":61},{"id":"02_Scripts/Unit/Skill/UndeadSkill/PoisonCloudSkill.cs","name":"PoisonCloudSkill","path":"02_Scripts/Unit/Skill/UndeadSkill/PoisonCloudSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"대기 도중 적이 사라졌을 경우","src":"using UnityEngine;\r\nusing System.Collections;\r\nusing LuckyRandomDefense.Enemy;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class PoisonCloudSkill : IUnitSkill\r\n    {\r\n        public void Execute(UnitBase owner, EnemyBase target)\r\n        {\r\n            if (target == null || owner == null) return;\r\n\r\n            \r\n            owner.StartCoroutine(DetermineDirectionAndSpawn(owner, target));\r\n        }\r\n\r\n        private IEnumerator DetermineDirectionAndSpawn(UnitBase owner, EnemyBase target)\r\n        {\r\n            \r\n            Vector3 startPos = target.transform.position;\r\n\r\n           \r\n            yield return new WaitForFixedUpdate();\r\n\r\n            // 대기 도중 적이 사라졌을 경우\r\n            if (target == null) yield break;\r\n\r\n            // 이동 변화량 계산\r\n            Vector3 endPos = target.transform.position;\r\n            float deltaX = Mathf.Abs(endPos.x - startPos.x);\r\n            float deltaY = Mathf.Abs(endPos.y - startPos.y);\r\n\r\n           \r\n            Vector3 spawnPos = endPos;\r\n            spawnPos.z = 0f;\r\n\r\n            // 회전값 결정 (Y축 변동이 더 크면 위아래 이동으로 판단)\r\n            Quaternion spawnRotation = Quaternion.identity;\r\n            if (deltaY > deltaX)\r\n            {\r\n                // 세로 이동 중이면 90도 회전\r\n                spawnRotation = Quaternion.Euler(0, 0, 90f);\r\n            }\r\n\r\n          \r\n            GameObject cloudObj = UnitEffectObjectPool.Instance.GetSkillEffect(\r\n                SkillEffectPrefapType.POISON_CLOUD_EFFECT, spawnPos, spawnRotation);\r\n\r\n            \r\n            if (cloudObj != null && cloudObj.TryGetComponent(out PoisonField field))\r\n            {\r\n                float tickDamage = owner.FinalSkillDamage * 0.1f;\r\n                field.Setup(tickDamage, 0.5f, owner.FinalBuffTime, owner.FinalSkillRange);\r\n            }\r\n        }\r\n    }\r\n}\r\n\r\n    \r\n","lines":60},{"id":"02_Scripts/Unit/Tools/MissilData.cs","name":"MissilData","path":"02_Scripts/Unit/Tools/MissilData.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"스크립터블 오브젝트 본체에 타겟 좌표 추가 (에디터 테스트용)","src":"using UnityEngine;\r\nusing System.Collections.Generic;\r\n\r\n[CreateAssetMenu(fileName = \"NewMissileData\", menuName = \"Missile/Data\")]\r\npublic class MissileData : ScriptableObject  \r\n{\r\n    public List<Vector3> pathPoints = new List<Vector3>();\r\n\r\n    [System.Serializable]\r\n    public class PhaseSettings\r\n    {\r\n        public string name;\r\n        public int endPointIndex;\r\n        public bool useRotation = true;\r\n        public bool isCurve;\r\n        public bool isHomingg;\r\n\r\n        \r\n        \r\n\r\n        [Header(\"Speed Control\")]\r\n        public float startSpeed = 10f;\r\n        public float endSpeed = 20f;\r\n\r\n        [Header(\"Split Settings\")]\r\n        public bool splitOnEnd;\r\n        public bool splitOnEndDestroy = false;\r\n        public int splitCount = 3;\r\n        public float splitAngle = 45f;\r\n        public GameObject childMissilePrefab; // 분할될 때 생성할 미사일 프리팹\r\n\r\n        public Color phaseColor = Color.white;\r\n    }\r\n\r\n    public PhaseSettings[] phases = new PhaseSettings[3];\r\n    // 스크립터블 오브젝트 본체에 타겟 좌표 추가 (에디터 테스트용)\r\n    public Vector3 debugTargetPos;\r\n\r\n}","lines":39},{"id":"02_Scripts/Unit/Tools/ProjectileSplit.cs","name":"ProjectileSplit","path":"02_Scripts/Unit/Tools/ProjectileSplit.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"유효기간 지나면 자동 소멸","src":"using LuckyRandomDefense.Enemy;\r\nusing UnityEngine;\r\n\r\npublic class ProjectileSplit : MonoBehaviour\r\n{\r\n    [Header(\"Phase Settings\")]\r\n    public float straightDuration = 0.5f;\r\n    private float _timer = 0f;\r\n    private bool _isHomingActive = false;\r\n\r\n    [Header(\"Movement\")]\r\n    public float speed = 20f;\r\n    public float lifeTime = 3f;\r\n\r\n    [Header(\"Targeting & Collision\")]\r\n    public float detectionRadius = 8f; // 유도 탐색 범위\r\n    public float hitRadius = 0.2f;    // 실제 충돌 판정 두께 (SphereCast용)\r\n    public LayerMask enemyLayer;\r\n\r\n    private Transform _target;\r\n    private bool _isLaunched = false;\r\n    private float _damage;\r\n    private bool _isExploded = false;\r\n\r\n    public void Init(Vector3 launchDir, float splitDamage)\r\n    {\r\n        _damage = splitDamage;\r\n        transform.up = launchDir;\r\n        _timer = 0f;\r\n        _isHomingActive = false;\r\n        _target = null;\r\n        _isLaunched = true;\r\n\r\n        // 유효기간 지나면 자동 소멸\r\n        Destroy(gameObject, lifeTime);\r\n    }\r\n\r\n    void Update()\r\n    {\r\n        if (!_isLaunched || _isExploded) return;\r\n\r\n        // 1. 유도 로직 처리\r\n        HandleHoming();\r\n\r\n        // 2. 이동 거리 계산\r\n        float moveDistance = speed * Time.deltaTime;\r\n        Vector3 moveDir = transform.up;\r\n\r\n        // 3. [핵심] 레이어 캐스트로 충돌 체크 (SphereCast 사용)\r\n        // 이동할 방향으로 hitRadius 두께의 원반을 moveDistance만큼 던져서 검사합니다.\r\n        if (Physics.SphereCast(transform.position, hitRadius, moveDir, out RaycastHit hit, moveDistance, enemyLayer))\r\n        {\r\n            // 충돌 지점으로 위치 이동 후 폭발 처리\r\n            transform.position = hit.point;\r\n            OnHitEnemy(hit.collider);\r\n            return;\r\n        }\r\n\r\n        // 충돌 안 했을 때만 전진\r\n        transform.position += moveDir * moveDistance;\r\n    }\r\n\r\n    private void HandleHoming()\r\n    {\r\n        _timer += Time.deltaTime;\r\n\r\n        if (!_isHomingActive && _timer >= straightDuration)\r\n        {\r\n            _isHomingActive = true;\r\n            FindNearestTarget();\r\n        }\r\n\r\n        if (_isHomingActive && _target != null)\r\n        {\r\n            if (!_target.gameObject.activeInHierarchy)\r\n            {\r\n                _target = null;\r\n            }\r\n            else\r\n            {\r\n                Vector3 targetDir = (_target.position - transform.position).normalized;\r\n                transform.up = targetDir;\r\n            }\r\n        }\r\n    }\r\n\r\n    private void OnHitEnemy(Collider enemyCollider)\r\n    {\r\n        if (_isExploded) return;\r\n        _isExploded = true;\r\n\r\n        if (enemyCollider.TryGetComponent(out EnemyBase enemy))\r\n        {\r\n            enemy.TakeDamage(_damage);\r\n            Debug.Log($\"[자식 투사체 명중] 적: {enemy.name}, 피해량: {_damage}\");\r\n        }\r\n\r\n        // 폭발 이펙트 등이 있다면 여기서 생성\r\n        // Instantiate(explosionPrefab, transform.position, Quaternion.identity);\r\n\r\n        Destroy(gameObject);\r\n    }\r\n\r\n    void FindNearestTarget()\r\n    {\r\n        Collider[] hits = Physics.OverlapSphere(transform.position, detectionRadius, enemyLayer);\r\n        float closestDistance = Mathf.Infinity;\r\n        Transform tempTarget = null;\r\n\r\n        foreach (var hit in hits)\r\n        {\r\n            float distance = Vector3.Distance(transform.position, hit.transform.position);\r\n            if (distance < closestDistance)\r\n            {\r\n                closestDistance = distance;\r\n                tempTarget = hit.transform;\r\n            }\r\n        }\r\n        _target = tempTarget;\r\n    }\r\n\r\n    // 에디터에서 판정 범위를 보기 위한 기즈모\r\n    private void OnDrawGizmosSelected()\r\n    {\r\n        Gizmos.color = Color.yellow;\r\n        Gizmos.DrawWireSphere(transform.position, detectionRadius);\r\n\r\n        Gizmos.color = Color.red;\r\n        Gizmos.DrawWireSphere(transform.position, hitRadius);\r\n    }\r\n}","lines":131}],"edges":[{"source":"02_Scripts/Unit/UnitActionManager.cs","target":"02_Scripts/Core/EventBus/SoundEventBus.cs"},{"source":"02_Scripts/Unit/UnitActionManager.cs","target":"02_Scripts/Core/EventBus/UIEventBus.cs"},{"source":"02_Scripts/Unit/UnitActionManager.cs","target":"02_Scripts/Core/EventBus/UnitEventBus.cs"},{"source":"02_Scripts/Unit/UnitActionManager.cs","target":"02_Scripts/Core/GameManager.cs"},{"source":"02_Scripts/Unit/UnitActionManager.cs","target":"02_Scripts/Core/GameState.cs"},{"source":"02_Scripts/Unit/UnitActionManager.cs","target":"02_Scripts/Core/PoolManager.cs"},{"source":"02_Scripts/Unit/UnitActionManager.cs","target":"02_Scripts/Data/UnitData.cs"},{"source":"02_Scripts/Unit/UnitActionManager.cs","target":"02_Scripts/Node/NodeInputHandler.cs"},{"source":"02_Scripts/Unit/UnitActionManager.cs","target":"02_Scripts/Node/ProceduralM   // scene flow tabs
  const flow=document.getElementById('flow'); const order=M.scenes||[];
  const mk=(label,val)=>{ const s=document.createElement('div'); s.className='s'+(val===state.scene?' on':''); s.textContent=label; s.dataset.v=String(val);
    s.onclick=()=>{ state.scene=(state.scene===val)?null:val; [...flow.querySelectorAll('.s')].forEach(x=>x.classList.toggle('on',x.dataset.v===String(state.scene))); render(); }; return s; };
  flow.appendChild(mk('전체',null));
  order.forEach((s,i)=>{ const a=document.createElement('span'); a.className='arw'; a.textContent='▸'; flow.appendChild(a); flow.appendChild(mk(s,s)); });

  // layers sorted by count desc
  const layers=Object.keys(M.perLayer).sort((a,b)=>M.perLayer[b]-M.perLayer[a]);
  const LNAME=M.layerNames||{};
  const lnav=document.getElementById('lnav');
  layers.forEach(L=>{ const a=document.createElement('a'); a.innerHTML=`<span class="dot" style="background:${C[L]||'#888'}"></span><span>${L}</span><span class="c">${M.perLayer[L]}</span>`;
    a.onclick=()=>document.getElementById('lay-'+L)?.scrollIntoView({block:'start'}); lnav.appendChild(a); });
  document.getElementById('deadbox').innerHTML=M.deadText||'';

  const main=document.getElementById('main');
  function cardHtml(n){
    const sc=(n.scenes||[]).map(s=>`<span class="bdg sc">${s}</span>`).join('');
    return `<div class="card" data-id="${n.id}" style="border-left-color:${C[n.layer]||'#888'}">
      <div class="nm">${n.entry?'<span class="star">★</span>':''}${n.name}</div>
      <div class="pth">${n.path}</div>
      <div class="sum">${esc(n.summary||'')}</div>
      <div class="meta">${sc}<span class="deg">↔ ${(outAdj[n.id]||[]).length+(inAdj[n.id]||[]).length}</span></div>
    </div>`;
  }
  function match(n){
    if(state.scene && !(n.scenes||[]).includes(state.scene)) return false;
    if(state.q){ const q=state.q; return (n.name.toLowerCase().includes(q)||(n.summary||'').toLowerCase().includes(q)||n.path.toLowerCase().includes(q)); }
    return true;
  }
  function render(){
    let html=''; let total=0;
    layers.forEach(L=>{
      const items=N.filter(n=>n.layer===L && match(n));
      if(!items.length) return; total+=items.length;
      items.sort((a,b)=>(b.entry-a.entry)|| ((outAdj[b.id].length+inAdj[b.id].length)-(outAdj[a.id].length+inAdj[a.id].length)));
      html+=`<div class="layer" id="lay-${L}"><div class="lh"><div class="bar" style="background:${C[L]||'#888'}"></div><div class="name">${(LNAME[L]||L).split(' · ')[0]}</div><div class="en">${(LNAME[L]||L).split(' · ')[1]||''}</div><div class="cnt">${items.length}</div></div><div class="grid">${items.map(cardHtml).join('')}</div></div>`;
    });
    main.innerHTML = total? html : '<div id="empty">일치하는 스크립트가 없습니다.</div>';
    main.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDrawer(byId[c.dataset.id]));
  }
  function esc(s){ return (s+'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  const drawer=document.getElementById('drawer');
  function depList(ids){ if(!ids.length) return '<div style="color:var(--tx2);font-size:13px">없음</div>';
    return ids.map(id=>byId[id]).filter(Boolean).sort((a,b)=>a.name.localeCompare(b.name)).map(d=>`<div class="dep" data-id="${d.id}">${d.name} <span style="color:var(--tx2)">· ${d.layer}</span></div>`).join(''); }
  function openDrawer(n){
    if(!n) return;
    drawer.innerHTML=`<span class="x">×</span>
      <div class="dn">${n.entry?'★ ':''}${n.name}</div><div class="dp">${n.path}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px"><span class="bdg" style="border-color:${C[n.layer]};color:${C[n.layer]}">${n.layer}</span>${(n.scenes||[]).map(s=>`<span class="bdg sc">${s}</span>`).join('')}${n.entry?'<span class="bdg" style="color:var(--acc)">씬 엔트리</span>':''}</div>
      <div class="dsum">${esc(n.summary||'')}</div>
      <h5>소스 코드 <span class="lc">${n.lines||0}줄</span> <span class="copybtn">복사</span></h5>
      <pre class="code">${esc(n.src||'(소스 없음)')}</pre>
      <h5>의존 → (${(outAdj[n.id]||[]).length})</h5>${depList(outAdj[n.id]||[])}
      <h5>← 피의존 (${(inAdj[n.id]||[]).length})</h5>${depList(inAdj[n.id]||[])}`;
    drawer.classList.add('show');
    drawer.querySelector('.x').onclick=()=>drawer.classList.remove('show');
    drawer.querySelectorAll('.dep').forEach(d=>d.onclick=()=>openDrawer(byId[d.dataset.id]));
    var cb=drawer.querySelector('.copybtn'); if(cb) cb.onclick=()=>{ try{ navigator.clipboard.writeText(n.src||''); }catch(e){ var ta=document.createElement('textarea'); ta.value=n.src||''; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(_){} ta.remove(); } cb.textContent='복사됨'; setTimeout(function(){cb.textContent='복사';},1200); };
  }
  document.getElementById('q').addEventListener('input',e=>{ state.q=e.target.value.trim().toLowerCase(); render(); });
  render();
})();
</script>
</body>
</html>
