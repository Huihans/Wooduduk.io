==================================================\r\n\r\nusing PlayFab;\r\nusing PlayFab.ClientModels;\r\nusing UnityEngine;\r\n\r\npublic class PlayFabInit : MonoBehaviour\r\n{\r\n    // ================================================================\r\n    // 라이프사이클\r\n    // ================================================================\r\n\r\n    private void Awake()\r\n    {\r\n        Login();\r\n    }\r\n\r\n\r\n    // ================================================================\r\n    // 로그인\r\n    // ================================================================\r\n\r\n    /// <summary>\r\n    /// 기기 고유 ID로 익명 로그인 시도\r\n    /// 신규 기기면 자동으로 계정 생성\r\n    /// </summary>\r\n    private void Login()\r\n    {\r\n        var request = new LoginWithCustomIDRequest\r\n        {\r\n            // 기기 고유 ID 사용 → 같은 기기면 항상 동일 계정으로 로그인\r\n            CustomId = SystemInfo.deviceUniqueIdentifier,\r\n\r\n            // 주의 : true = 신규 기기 자동 계정 생성\r\n            //        false = 기존 계정 없으면 로그인 실패\r\n            CreateAccount = true\r\n        };\r\n\r\n        Debug.Log(\"[PlayFabInit] 로그인 시도 중...\");\r\n\r\n        PlayFabClientAPI.LoginWithCustomID(request, OnSuccess, OnError);\r\n    }\r\n\r\n\r\n    // ================================================================\r\n    // 콜백\r\n    // ================================================================\r\n\r\n    /// <summary>\r\n    /// 로그인 성공 콜백\r\n    /// PlayFabDataLoader.LoadAllData() 호출하여 데이터 로드 시작\r\n    /// </summary>\r\n    private void OnSuccess(LoginResult result)\r\n    {\r\n        Debug.Log($\"[PlayFabInit] 로그인 성공 | PlayFabId : {result.PlayFabId}\");\r\n\r\n        // 주의 : PlayFabDataLoader가 동일 오브젝트에 없으면 null 에러 발생\r\n        //        PlayFabManager 오브젝트에 PlayFabDataLoader 컴포넌트 확인\r\n        if (PlayFabDataLoader.Instance == null)\r\n        {\r\n            Debug.LogError(\"[PlayFabInit] PlayFabDataLoader.Instance null \" +\r\n                           \"→ PlayFabDataLoader 컴포넌트 부착 여부 확인\");\r\n            return;\r\n        }\r\n\r\n        PlayFabDataLoader.Instance.LoadAllData();\r\n    }\r\n\r\n    /// <summary>\r\n    /// 로그인 실패 콜백\r\n    /// 에러 코드 및 메시지 출력\r\n    /// </summary>\r\n    private void OnError(PlayFabError error)\r\n    {\r\n        Debug.LogError($\"[PlayFabInit] 로그인 실패 \" +\r\n                       $\"| 코드 : {error.Error} \" +\r\n                       $\"| 메시지 : {error.ErrorMessage}\");\r\n    }\r\n}","lines":107},{"id":"02_Scripts/Data/Server/CloudSaveManager.cs","name":"CloudSaveManager","path":"02_Scripts/Data/Server/CloudSaveManager.cs","layer":"Data","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"SaveData 전체를 PlayFab에 업로드 onSuccess / onFail 콜백으로 결과 반환","src":"// =================================================================\n// CloudSaveManager.cs\n// 역할  : PlayFab Player Data 수동 저장/불러오기\n//\n// 저장 항목\n// - UserSaveData : SaveData 전체 JSON\n//\n// 의존성\n// - PlayFab SDK\n// - UserDataManager (SaveData 참조)\n//\n// 주의사항\n// - PlayFabInit 로그인 완료 후 사용 가능\n// - 비동기 처리 → 콜백으로 결과 수신\n// =================================================================\n\nusing System;\nusing System.Collections.Generic;\nusing PlayFab;\nusing PlayFab.ClientModels;\nusing UnityEngine;\n\nnamespace LuckyRandomDefense.Cloud\n{\n    public class CloudSaveManager : MonoBehaviour\n    {\n        public static CloudSaveManager Instance { get; private set; }\n\n        private const string KeySaveData = \"UserSaveData\";\n\n\n        // ================================================================\n        // 라이프사이클\n        // ================================================================\n\n        private void Awake()\n        {\n            if (Instance == null) Instance = this;\n            else { Destroy(gameObject); return; }\n        }\n\n\n        // ================================================================\n        // 업로드 (수동 저장)\n        // ================================================================\n\n        /// <summary>\n        /// SaveData 전체를 PlayFab에 업로드\n        /// onSuccess / onFail 콜백으로 결과 반환\n        /// </summary>\n        public void Upload(Action onSuccess = null, Action onFail = null)\n        {\n            if (UserDataManager.Instance == null)\n            {\n                Debug.LogError(\"[CloudSaveManager] UserDataManager.Instance null → 업로드 불가\");\n                onFail?.Invoke();\n                return;\n            }\n\n            string saveJson = JsonUtility.ToJson(\n                UserDataManager.Instance.GetAllData(), prettyPrint: true);\n\n            var request = new UpdateUserDataRequest\n            {\n                Data = new Dictionary<string, string> { { KeySaveData, saveJson } }\n            };\n\n            PlayFabClientAPI.UpdateUserData(request,\n                result =>\n                {\n                    Debug.Log(\"[CloudSaveManager] 업로드 성공\");\n                    onSuccess?.Invoke();\n                },\n                error =>\n                {\n                    Debug.LogError($\"[CloudSaveManager] 업로드 실패 : {error.ErrorMessage}\");\n                    onFail?.Invoke();\n                }\n            );\n        }\n\n\n        // ================================================================\n        // 다운로드 (불러오기)\n        // ================================================================\n\n        /// <summary>\n        /// PlayFab에서 SaveData 다운로드 후 UserDataManager에 적용\n        /// onSuccess / onFail 콜백으로 결과 반환\n        /// </summary>\n        public void Download(Action onSuccess = null, Action onFail = null)\n        {\n            var request = new GetUserDataRequest\n            {\n                Keys = new List<string> { KeySaveData }\n            };\n\n            PlayFabClientAPI.GetUserData(request,\n                result =>\n                {\n                    if (result.Data.ContainsKey(KeySaveData))\n                    {\n                        string json = result.Data[KeySaveData].Value;\n                        SaveData data = JsonUtility.FromJson<SaveData>(json);\n\n                        if (data != null)\n                        {\n                            UserDataManager.Instance?.ApplyDownloadedData(data);\n                            Debug.Log(\"[CloudSaveManager] SaveData 다운로드 및 적용 완료\");\n                        }\n                        else\n                        {\n                            Debug.LogWarning(\"[CloudSaveManager] SaveData 파싱 실패 → 로컬 데이터 유지\");\n                        }\n                    }\n                    else\n                    {\n                        Debug.Log(\"[CloudSaveManager] 클라우드에 저장 데이터 없음 → 로컬 데이터 유지\");\n                    }\n\n                    onSuccess?.Invoke();\n                },\n                error =>\n                {\n                    Debug.LogError($\"[CloudSaveManager] 다운로드 실패 : {error.ErrorMessage}\");\n                    onFail?.Invoke();\n                }\n            );\n        }\n    }\n}\n","lines":132},{"id":"02_Scripts/UI/Popup/GameOver.cs","name":"GameOver","path":"02_Scripts/UI/Popup/GameOver.cs","layer":"UI","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"class GameOver : PopupBase","src":"using LuckyRandomDefense.Core;\r\nusing UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.UI.Popup\r\n{\r\n    public class GameOver : PopupBase\r\n    {\r\n        protected override GameState ShowOnState => GameState.GAMEOVER;\r\n\r\n        protected override void Awake()\r\n        {\r\n            base.Awake();\r\n        }\r\n\r\n        protected override void OnDestroy()\r\n        {\r\n            base.OnDestroy();\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            \r\n        }\r\n\r\n        protected override void OnShow()\r\n        {\r\n            \r\n        }\r\n    }\r\n}","lines":30},{"id":"02_Scripts/Enemy/EnemyBase.cs","name":"EnemyBase","path":"02_Scripts/Enemy/EnemyBase.cs","layer":"Enemy","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"[추가] 받는 배율","src":"﻿using System.Collections;\r\nusing UnityEngine;\r\nusing UnityEngine.UI;\r\nusing LuckyRandomDefense.Core;\r\nusing LuckyRandomDefense.Core.EventBus;\r\n\r\nnamespace LuckyRandomDefense.Enemy\r\n{\r\n    public class EnemyBase : MonoBehaviour\r\n    {\r\n        [SerializeField] private Slider _hpSlider;\r\n        private EnemyData _data;\r\n        private float _maxHp;\r\n        [SerializeField] private float _currentHp;\r\n        private EnemyAI _movement;\r\n\r\n        public float CurrentHp => _currentHp;\r\n        public float MaxHp => _maxHp;\r\n\r\n        [Header(\"HP 공식\")]\r\n        public float _exponentialBase = 1.25f;\r\n        public float _waveMultiplyRatio = 0.2f;\r\n\r\n\r\n        //[추가] 받는 배율\r\n        public float DamageMultiplier { get; set; } = 1.0f;\r\n        public int _currentWave;\r\n\r\n        [Header(\"Shield 공식\")]\r\n        public float _assistance = 60f;\r\n        private float _declineRate;\r\n\r\n        [Header(\"피격 이펙트\")]\r\n        [SerializeField] private Color _hitColor = new Color(1f, 0f, 0f, 1f);\r\n        [SerializeField] private float _flashDuration = 0.2f;\r\n        private SpriteRenderer[] _childRenderers;\r\n        private Coroutine _hitEffectCoroutine;\r\n        private MaterialPropertyBlock _propBlock;\r\n\r\n        [Header(\"사운드 이펙트\")]\r\n        [SerializeField] private AudioClip _hitSound;\r\n        [SerializeField] private AudioClip _deathSound;\r\n        private AudioSource _audioSource;\r\n\r\n        private void Update()\r\n        {\r\n            // 최적화예정 이벤트버스\r\n            _currentWave = WaveManager.Instance.CurrentWaveIndex + 1;\r\n        }\r\n        \r\n\r\n        private void Awake()\r\n        {\r\n            _movement = GetComponent<EnemyAI>();\r\n\r\n            // 주의 : WaveManager.Instance 접근은 Awake에서 금지\r\n            //        PoolManager가 풀 사전 생성하면서 WaveManager.Awake보다 먼저 도는 경우가 있음\r\n            //        _currentWave는 Update()에서 매 프레임 갱신되고, Init() 시점엔 항상 유효한 값이 들어와 있음\r\n\r\n            if (_propBlock == null)\r\n            {\r\n                _propBlock = new MaterialPropertyBlock();\r\n            }\r\n\r\n            _audioSource = GetComponent<AudioSource>();\r\n            if(_audioSource == null)\r\n            {\r\n                _audioSource = gameObject.AddComponent<AudioSource>();\r\n                _audioSource.playOnAwake = false;\r\n            }\r\n        }\r\n\r\n        public void Init(EnemyData data)\r\n        {\r\n            _data = data;\r\n\r\n            // Init 호출 시점엔 WaveManager.Instance가 반드시 존재 — 최신 웨이브 인덱스 동기화\r\n            if (WaveManager.Instance != null)\r\n                _currentWave = WaveManager.Instance.CurrentWaveIndex + 1;\r\n\r\n            _maxHp = data._hp * (1 + (_currentWave * _waveMultiplyRatio)) + Mathf.Pow(_exponentialBase, _currentWave);\r\n            _currentHp = _maxHp;\r\n\r\n            UpdateHPUI();\r\n\r\n            if (_movement != null)\r\n            {\r\n                _movement.SetSpeed(data._moveSpeed);\r\n            }\r\n\r\n            ReductionDamage();\r\n            SetFlashColor(Color.white);\r\n        }\r\n\r\n        public void ApplyWaveRatio(float hpRatio)\r\n        {\r\n            _maxHp *= hpRatio;\r\n            _currentHp = _maxHp;\r\n\r\n            UpdateHPUI();\r\n        }\r\n\r\n        private void UpdateHPUI()\r\n        {\r\n            if (_hpSlider != null)\r\n            {\r\n                _hpSlider.maxValue = _maxHp;\r\n                _hpSlider.value = _currentHp;\r\n            }\r\n        }\r\n\r\n        public void TakeDamage(float damage)\r\n        {\r\n            // 이미 비활성(=죽음 처리 완료) 또는 HP 0 이하면 중복 데미지/킬 카운트 방지\r\n            // → \"Coroutine couldn't be started because the the game object is inactive\" 경고도 같이 차단\r\n            if (!gameObject.activeInHierarchy)\r\n            {\r\n                Debug.Log($\"[EnemyBase] TakeDamage 무시: 이미 비활성 ({gameObject.name})\");\r\n                return;\r\n            }\r\n            if (_currentHp <= 0)\r\n            {\r\n                Debug.Log($\"[EnemyBase] TakeDamage 무시: 이미 HP 0 ({gameObject.name})\");\r\n                return;\r\n            }\r\n\r\n            if (!this.enabled) this.enabled = true;\r\n\r\n            // [추가] 받는 피해량\r\n            _currentHp -= (damage * (1 - _declineRate)) * DamageMultiplier; // shield 추가 예정\r\n            UpdateHPUI();\r\n\r\n            if(_hitSound != null)\r\n            {\r\n                _audioSource.PlayOneShot(_hitSound, 0.5f);\r\n            }\r\n            ShowHitEffect();\r\n            \r\n            if (_hpSlider != null)\r\n            {\r\n                _hpSlider.value = _currentHp;\r\n            }\r\n\r\n            if (_currentHp <= 0)\r\n            {\r\n                if(_hitEffectCoroutine != null) StopCoroutine(_hitEffectCoroutine);\r\n                SetFlashColor(Color.white);\r\n\r\n                if(_deathSound != null)\r\n                {\r\n                    AudioSource.PlayClipAtPoint(_deathSound, transform.position, 0.5f);\r\n                }\r\n\r\n                gameObject.SetActive(false);\r\n                GameManager.Instance.Gold += (_data._gold * 2);\r\n                GameManager.Instance.RemainingEnemyCount--;\r\n\r\n                // 퀘스트 처치 수 누적 이벤트 발행\r\n                // 수신 : QuestManager.HandleEnemyKilled()\r\n                GameEventBus.RaiseEnemyKilled();\r\n\r\n                // 튜토리얼 알림 (튜토리얼 진행 중일 때만 반응)\r\n                LuckyRandomDefense.Tutorial.TutorialManager.Instance?.NotifyEnemyDefeated();\r\n            }\r\n        }\r\n\r\n        private float ReductionDamage()\r\n        {\r\n            _declineRate = _data._shield / (_data._shield + _assistance);\r\n            return _declineRate;\r\n        }\r\n\r\n        private void ShowHitEffect()\r\n        {\r\n            if (_childRenderers == null || _childRenderers.Length == 0)\r\n            {\r\n                RefreshChildRenderers();\r\n            }\r\n\r\n            if(_hitEffectCoroutine != null) StopCoroutine(_hitEffectCoroutine);\r\n            _hitEffectCoroutine = StartCoroutine(HitFlashRoutine());\r\n        }\r\n\r\n        private void RefreshChildRenderers()\r\n        {\r\n            _childRenderers = GetComponentsInChildren<SpriteRenderer>(true);\r\n        }\r\n\r\n        private IEnumerator HitFlashRoutine()\r\n        {\r\n            SetFlashColor(_hitColor);\r\n            yield return new WaitForSeconds(_flashDuration);\r\n\r\n            SetFlashColor(Color.white);\r\n            _hitEffectCoroutine = null;\r\n        }\r\n\r\n        private void SetFlashColor(Color color)\r\n        {\r\n            if (_childRenderers == null || _childRenderers.Length == 0) return;\r\n\r\n            if(_propBlock == null) _propBlock = new MaterialPropertyBlock();\r\n\r\n            for(int i = 0; i < _childRenderers.Length; i++)\r\n            {\r\n                if (_childRenderers[i] == null) continue;\r\n\r\n                try \r\n                {\r\n                    _childRenderers[i].GetPropertyBlock(_propBlock);\r\n                    _propBlock.SetColor(\"_Color\", color);\r\n                    _propBlock.SetColor(\"_RendererColor\", color);\r\n                    _childRenderers[i].SetPropertyBlock(_propBlock);\r\n                }\r\n                catch(System.ArgumentNullException)\r\n                {\r\n                    Debug.LogWarning($\"{gameObject.name}의 {i}번째 자식렌더러 유효x\");\r\n                }\r\n\r\n            }\r\n        }\r\n\r\n        private int CalculateGold(int currentWave, int baseGold)\r\n        {\r\n            int multiplier = ((currentWave - 1) / 10) + 2;\r\n\r\n            return baseGold * multiplier;\r\n        }\r\n\r\n        public void RestoreHp(float amount)\r\n        {\r\n            if (_currentHp <= 0) return;\r\n\r\n            _currentHp += amount;\r\n\r\n            _currentHp = Mathf.Clamp(_currentHp, 0, _maxHp);\r\n\r\n            UpdateHPUI();\r\n        }\r\n    }\r\n}\r\n\r\n","lines":243},{"id":"02_Scripts/Unit/Skill/EFFect/SkillEffect/PoisonField.cs","name":"PoisonField","path":"02_Scripts/Unit/Skill/EFFect/SkillEffect/PoisonField.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"장판 크기 조절","src":"﻿using LuckyRandomDefense.Enemy;\r\nusing LuckyRandomDefense.Unit;\r\nusing UnityEngine;\r\n\r\npublic class PoisonField : MonoBehaviour\r\n{\r\n    private float _damage;\r\n    private float _interval;\r\n    private float _range;\r\n    private float _timer;\r\n\r\n    public void Setup(float dmg, float interval, float duration, float range)\r\n    {\r\n        _damage = dmg;\r\n        _interval = interval;\r\n        _range = range;\r\n        _timer = 0f;\r\n\r\n        // 장판 크기 조절\r\n        transform.localScale = new Vector3(range, 1, range);\r\n        Invoke(nameof(Deactivate), duration);\r\n    }\r\n\r\n    private void Update()\r\n    {\r\n        _timer += Time.deltaTime;\r\n        if (_timer >= _interval)\r\n        {\r\n            _timer = 0f;\r\n            ApplyTickDamage();\r\n        }\r\n    }\r\n\r\n    private void ApplyTickDamage()\r\n    {\r\n        Collider[] enemies = Physics.OverlapSphere(transform.position, _range, LayerMask.GetMask(\"Enemy\"));\r\n        foreach (var col in enemies)\r\n        {\r\n            if (col.TryGetComponent(out EnemyBase enemy))\r\n                enemy.TakeDamage(_damage);\r\n        }\r\n    }\r\n\r\n    private void Deactivate() => UnitEffectObjectPool.Instance.ReturnSkillEffect(SkillEffectPrefapType.POISON_CLOUD_EFFECT, gameObject);\r\n}","lines":45},{"id":"02_Scripts/Unit/Skill/EFFect/SkillEffect/DebuffField.cs","name":"DebuffField","path":"02_Scripts/Unit/Skill/EFFect/SkillEffect/DebuffField.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"장판이 사라질 때 적용됐던 디버프를 모두 해제","src":"﻿using UnityEngine;\r\nusing LuckyRandomDefense.Enemy;\r\nusing System.Collections.Generic;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class DebuffField : MonoBehaviour\r\n    {\r\n        private float _duration;\r\n        private float _range;\r\n        private float _multiplier;\r\n        private float _timer;\r\n\r\n        [SerializeField] private LayerMask _enemyLayer;\r\n\r\n        \r\n        private List<EnemyBase> _affectedEnemies = new List<EnemyBase>();\r\n\r\n        public void Setup(float duration, float range, float multiplier)\r\n        {\r\n            _duration = duration;\r\n            _range = range;\r\n            _multiplier = multiplier;\r\n            _timer = 0f;\r\n\r\n            transform.localScale = new Vector3(range * 2, range * 2, 1f);\r\n            _affectedEnemies.Clear();\r\n        }\r\n\r\n        private void Update()\r\n        {\r\n            _timer += Time.deltaTime;\r\n\r\n            if (_timer >= _duration)\r\n            {\r\n                // 장판이 사라질 때 적용됐던 디버프를 모두 해제\r\n                ClearDebuff();\r\n                gameObject.SetActive(false);\r\n                UnitEffectObjectPool.Instance.ReturnSkillEffect(SkillEffectPrefapType.DEBUFF_FIELD_EFFECT, gameObject);\r\n                return;\r\n            }\r\n\r\n            ApplyAmplification();\r\n        }\r\n\r\n        private void ApplyAmplification()\r\n        {\r\n            //  범위 내 적 탐색\r\n            Collider[] targets = Physics.OverlapSphere(transform.position, _range, _enemyLayer);\r\n            HashSet<EnemyBase> currentHits = new HashSet<EnemyBase>();\r\n\r\n            foreach (var col in targets)\r\n            {\r\n                if (col.TryGetComponent(out EnemyBase enemy))\r\n                {\r\n                    currentHits.Add(enemy);\r\n\r\n                    \r\n                    enemy.DamageMultiplier = _multiplier; \r\n                }\r\n            }\r\n\r\n            //장판 밖으로 나간 적들은 다시 1배\r\n            for (int i = _affectedEnemies.Count - 1; i >= 0; i--)\r\n            {\r\n                if (!currentHits.Contains(_affectedEnemies[i]))\r\n                {\r\n                    _affectedEnemies[i].DamageMultiplier = 1.0f;\r\n                    _affectedEnemies.RemoveAt(i);\r\n                }\r\n            }\r\n\r\n            // 새로 들어온 적 추가\r\n            foreach (var enemy in currentHits)\r\n            {\r\n                if (!_affectedEnemies.Contains(enemy))\r\n                {\r\n                    _affectedEnemies.Add(enemy);\r\n                }\r\n            }\r\n        }\r\n\r\n        private void ClearDebuff()\r\n        {\r\n            foreach (var enemy in _affectedEnemies)\r\n            {\r\n                if (enemy != null)\r\n                {\r\n                    enemy.DamageMultiplier = 1.0f;\r\n                }\r\n            }\r\n            _affectedEnemies.Clear();\r\n        }\r\n    }\r\n}","lines":95},{"id":"02_Scripts/Unit/Skill/EFFect/SkillEffect/ThrowBoomSkill.cs","name":"ThrowBoomSkill","path":"02_Scripts/Unit/Skill/EFFect/SkillEffect/ThrowBoomSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"투사체 자체의 색상 변경","src":"using UnityEngine;\r\nusing LuckyRandomDefense.Enemy;\r\nusing LuckyRandomDefense.Core.EventBus;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class ThrowBoomSkillEffect : MonoBehaviour\r\n    {\r\n        private Vector3 _targetPos;\r\n        private float _damage;\r\n        private float _range;\r\n        private Color _themeColor;\r\n        private float _moveSpeed = 15f;\r\n        private bool _isActive = false;\r\n\r\n        public void Launch(Vector3 targetPos, float damage, float range, Color color)\r\n        {\r\n            _targetPos = targetPos;\r\n            _damage = damage;\r\n            _range = range;\r\n            _themeColor = color;\r\n            _isActive = true;\r\n\r\n            // 투사체 자체의 색상 변경 \r\n            var ps = GetComponent<ParticleSystem>();\r\n            if (ps != null)\r\n            {\r\n                var main = ps.main;\r\n                main.startColor = color;\r\n            }\r\n\r\n            SoundEventBus.RaiseUnitSFXRequested(Unit_Sfx_Type.SKILL_EXPLOSION, transform.position);\r\n        }\r\n\r\n        private void Update()\r\n        {\r\n            if (!_isActive) return;\r\n\r\n            transform.position = Vector3.MoveTowards(transform.position, _targetPos, _moveSpeed * Time.deltaTime);\r\n\r\n            if (Vector3.Distance(transform.position, _targetPos) < 0.1f)\r\n            {\r\n                Explode();\r\n            }\r\n        }\r\n\r\n        private void Explode()\r\n        {\r\n            _isActive = false;\r\n\r\n          \r\n            GameObject expoObj = UnitEffectObjectPool.Instance.GetSkillEffect(\r\n                SkillEffectPrefapType.EXPLOSION_EFFECT, transform.position, Quaternion.identity);\r\n\r\n            \r\n\r\n            // 데이터 전달 \r\n            if (expoObj.TryGetComponent(out ExplosionEffect explosion))\r\n            {\r\n                explosion.SetExplosion(_range, _themeColor);\r\n            }\r\n\r\n            // 범위 데미지 처리 \r\n            Collider[] hits = Physics.OverlapSphere(transform.position, _range, LayerMask.GetMask(\"Enemy\"));\r\n            foreach (var hit in hits)\r\n            {\r\n                if (hit.TryGetComponent(out EnemyBase enemy))\r\n                {\r\n                    enemy.TakeDamage(_damage);\r\n                }\r\n            }\r\n\r\n            \r\n            UnitEffectObjectPool.Instance.ReturnSkillEffect(SkillEffectPrefapType.THROW_BOMB_EFFECT, gameObject);\r\n        }\r\n    }\r\n}","lines":77},{"id":"02_Scripts/Unit/Skill/EFFect/SkillEffect/ExplosionEffect.cs","name":"ExplosionEffect","path":"02_Scripts/Unit/Skill/EFFect/SkillEffect/ExplosionEffect.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"class ExplosionEffect : MonoBehaviour","src":"using UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class ExplosionEffect : MonoBehaviour\r\n    {\r\n        private ParticleSystem _particle;\r\n\r\n        private void Awake()\r\n        {\r\n            _particle = GetComponent<ParticleSystem>();\r\n        }\r\n\r\n\r\n        public void SetExplosion(float range, Color color)\r\n        {\r\n            var main = _particle.main;\r\n            main.startSize = range;   // 투사체에서 넘겨받은 범위 적용\r\n            main.startColor = color;  // 투사체에서 넘겨받은 색상 적용\r\n\r\n            _particle.Clear();\r\n            _particle.Play();\r\n\r\n\r\n            CancelInvoke(nameof(Deactivate));\r\n            Invoke(nameof(Deactivate), main.duration);\r\n        }\r\n\r\n        private void Deactivate()\r\n        {\r\n            UnitEffectObjectPool.Instance.ReturnSkillEffect(SkillEffectPrefapType.EXPLOSION_EFFECT, gameObject);\r\n        }\r\n    }\r\n}\r\n\r\n","lines":36},{"id":"02_Scripts/Unit/Skill/EFFect/SkillEffect/UnitSkiilEffect.cs","name":"UnitSkiilEffect","path":"02_Scripts/Unit/Skill/EFFect/SkillEffect/UnitSkiilEffect.cs","layer":"Unit","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"켜지면 lifeTime 후 자동 비활성화(풀 반환)","src":"using LuckyRandomDefense.Core.EventBus;\r\nusing UnityEngine;\r\nusing UnityEngine.UIElements;\r\n\r\n\r\nnamespace LuckyRandomDefense.Unit\r\n{\r\n    public class UnitSkillEffect : MonoBehaviour\r\n    {\r\n        [SerializeField] private SkillEffectPrefapType _skillEffectPrefapType;\r\n        [SerializeField] private float _lifeTime = 1.0f;\r\n\r\n        private void OnEnable()\r\n        {\r\n            // 켜지면 lifeTime 후 자동 비활성화(풀 반환) \r\n            CancelInvoke(nameof(Deactivate));\r\n            Invoke(nameof(Deactivate), _lifeTime);\r\n\r\n            switch (_skillEffectPrefapType)\r\n            {\r\n                case SkillEffectPrefapType.STUN_EFFECT:\r\n                    SoundEventBus.RaiseUnitSFXRequested(Unit_Sfx_Type.SKILL_STUN, transform.position);\r\n                    break;\r\n                case SkillEffectPrefapType.BUFF_EFFECT:\r\n                    SoundEventBus.RaiseUnitSFXRequested(Unit_Sfx_Type.SKILL_BUFF, transform.position);\r\n                    break;\r\n            }\r\n                    \r\n        }\r\n\r\n        private void Deactivate()\r\n        {\r\n\r\n            UnitEffectObjectPool.Instance.ReturnSkillEffect(_skillEffectPrefapType, gameObject);\r\n        }\r\n\r\n\r\n        private void OnTriggerEnter(Collider other)\r\n        {\r\n\r\n            if (other.gameObject.layer == LayerMask.NameToLayer(\"Enemy\"))\r\n            {\r\n                Deactivate();\r\n            }\r\n        }\r\n    }\r\n}\r\n\r\n","lines":49},{"id":"02_Scripts/Unit/UnitRangeVisual.cs","name":"UnitRangeVisual","path":"02_Scripts/Unit/UnitRangeVisual.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"부모가 있다면 부모의 월드 스케일로 나눠서 최종적인 World Scale이 1","src":"﻿using UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.Unit\r\n{\r\n    public class UnitRangeVisual : MonoBehaviour\r\n    {\r\n        private SpriteRenderer _spriteRenderer;\r\n\r\n        private void Awake()\r\n        {\r\n            _spriteRenderer = GetComponent<SpriteRenderer>();\r\n        }\r\n\r\n        public void SetScale(float radius)\r\n        {\r\n            float diameter = radius * 2f;\r\n\r\n            // 부모가 있다면 부모의 월드 스케일로 나눠서 \r\n            // 최종적인 World Scale이 1\r\n            if (transform.parent != null)\r\n            {\r\n                Vector3 parentScale = transform.parent.lossyScale;\r\n                transform.localScale = new Vector3(\r\n                    diameter / parentScale.x,\r\n                    diameter / parentScale.y,\r\n                    1f / parentScale.z\r\n                );\r\n            }\r\n            else\r\n            {\r\n                transform.localScale = new Vector3(diameter, diameter, 1f);\r\n            }\r\n        }\r\n\r\n r\n        [SerializeField] private UnitNameType _unitNameType;\r\n        [SerializeField] private float _lifeTime = 1.0f;\r\n\r\n        private void OnEnable()\r\n        {\r\n            // 켜지면 lifeTime 후 자동 비활성화(풀 반환) \r\n            CancelInvoke(nameof(Deactivate));\r\n            Invoke(nameof(Deactivate), _lifeTime);\r\n            SoundEventBus.RaiseUnitSFXRequested(Unit_Sfx_Type.ATTACK_SWORD, transform.position);\r\n        }\r\n\r\n        private void Deactivate()\r\n        {\r\n\r\n            UnitEffectObjectPool.Instance.ReturnAttackEffect(_unitNameType, gameObject);\r\n        }\r\n\r\n\r\n        private void OnTriggerEnter(Collider other)\r\n        {\r\n\r\n            if (other.gameObject.layer == LayerMask.NameToLayer(\"Enemy\"))\r\n            {\r\n                UnitEffectObjectPool.Instance.ReturnAttackEffect(_unitNameType, gameObject);\r\n            }\r\n        }\r\n    }\r\n}\r\n","lines":37},{"id":"02_Scripts/Unit/Skill/EFFect/AttckEffect/ArrowEffect.cs","name":"ArrowEffect","path":"02_Scripts/Unit/Skill/EFFect/AttckEffect/ArrowEffect.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"기존: 현재 위치로 발사","src":"using LuckyRandomDefense.Core.EventBus;\r\nusing LuckyRandomDefense.Enemy;\r\nusing LuckyRandomDefense.Sound;\r\nusing UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public class ArrowEffect : MonoBehaviour\r\n    {\r\n        [SerializeField] private UnitNameType _unitNameType;\r\n        [SerializeField] private float _moveSpeed = 15f;\r\n        [SerializeField] private float _lifeTime = 3.0f;\r\n\r\n        private Vector3 _targetPos;\r\n        private EnemyBase _targetEnemy;\r\n        private float _damage;\r\n        private bool _isMoving = false;\r\n\r\n        // ── 기존: 현재 위치로 발사 ──\r\n        public void SetTarget(EnemyBase target, float damage)\r\n        {\r\n            if (target == null) return;\r\n            SetTargetInternal(target, damage, target.transform.position);\r\n        }\r\n\r\n        // ── 추가: 예측 위치로 발사 ──\r\n        public void SetTargetPredicted(EnemyBase target, float damage, Vector3 predictedPos)\r\n        {\r\n            if (target == null) return;\r\n            SetTargetInternal(target, damage, predictedPos);\r\n        }\r\n\r\n        private void SetTargetInternal(EnemyBase target, float damage, Vector3 aimPos)\r\n        {\r\n            _targetEnemy = target;\r\n            _damage = damage;\r\n\r\n            _targetPos = aimPos;\r\n            _targetPos.z = 0f;\r\n\r\n            _isMoving = true;\r\n\r\n            Vector3 direction = (_targetPos - transform.position).normalized;\r\n            float angle = Mathf.Atan2(direction.y, direction.x) * Mathf.Rad2Deg;\r\n            transform.rotation = Quaternion.Euler(0, 0, angle);\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            _isMoving = false;\r\n            _targetEnemy = null;\r\n            CancelInvoke(nameof(Deactivate));\r\n            Invoke(nameof(Deactivate), _lifeTime);\r\n\r\n            switch(_unitNameType)\r\n            {\r\n                case UnitNameType.ELF_ARCHER:\r\n                    SoundEventBus.RaiseUnitSFXRequested(Unit_Sfx_Type.ATTACK_BOW, transform.position);\r\n                    break;\r\n                case UnitNameType.HUMAN_ARCHER:\r\n                    SoundEventBus.RaiseUnitSFXRequested(Unit_Sfx_Type.ATTACK_BOW, transform.position);\r\n                    break;\r\n\r\n\r\n                case UnitNameType.ELF_WIZARD:\r\n                    SoundEventBus.RaiseUnitSFXRequested(Unit_Sfx_Type.ATTACK_MAGIC, transform.position);\r\n                    break;\r\n                case UnitNameType.UNDEAD_ARCHER:\r\n                    SoundEventBus.RaiseUnitSFXRequested(Unit_Sfx_Type.ATTACK_MAGIC, transform.position);\r\n                    break;\r\n            }\r\n\r\n           \r\n\r\n        }\r\n\r\n        private void Update()\r\n        {\r\n            if (!_isMoving) return;\r\n\r\n            transform.position = Vector3.MoveTowards(transform.position, _targetPos, _moveSpeed * Time.deltaTime);\r\n\r\n            if (Vector3.Distance(transform.position, _targetPos) < 0.05f)\r\n            {\r\n                HitTarget();\r\n            }\r\n        }\r\n\r\n        private void HitTarget()\r\n        {\r\n            _isMoving = false;\r\n\r\n            if (_targetEnemy != null && _targetEnemy.gameObject.activeInHierarchy)\r\n            {\r\n                _targetEnemy.TakeDamage(_damage);\r\n                Debug.Log($\"{_targetEnemy.name}에게 화살 명중! 데미지: {_damage}\");\r\n            }\r\n\r\n            Deactivate();\r\n        }\r\n\r\n        private void Deactivate()\r\n        {\r\n            UnitEffectObjectPool.Instance.ReturnAttackEffect(_unitNameType, gameObject);\r\n        }\r\n    }\r\n}\r\n\r\n\r\n\r\n\r\n//using UnityEngine;\r\n//using LuckyRandomDefense.Enemy;\r\n\r\n//namespace LuckyRandomDefense.Unit.Skill\r\n//{\r\n//    public class ArrowEffect : MonoBehaviour\r\n//    {\r\n//        [SerializeField] private UnitNameType _unitNameType;\r\n//        [SerializeField] private float _moveSpeed = 15f;\r\n//        [SerializeField] private float _lifeTime = 3.0f;\r\n\r\n//        private Vector3 _targetPos; \r\n//        private EnemyBase _targetEnemy;\r\n//        private float _damage;\r\n//        private bool _isMoving = false;\r\n\r\n\r\n//        public void SetTarget(EnemyBase target, float damage, Vector3 aimPoint)\r\n//        {\r\n//            if (target == null) return;\r\n\r\n//            _targetEnemy = target;\r\n//            _damage = damage;\r\n\r\n\r\n//            _targetPos = aimPoint;\r\n//            _targetPos.z = 0f;\r\n\r\n//            _isMoving = true;\r\n\r\n//            // 회전 처리\r\n//            Vector3 direction = (_targetPos - transform.position).normalized;\r\n//            if (direction != Vector3.zero)\r\n//            {\r\n//                float angle = Mathf.Atan2(direc
