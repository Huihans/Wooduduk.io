);","src":"﻿using UnityEngine;\r\nusing LuckyRandomDefense.Node;\r\n\r\n\r\nnamespace LuckyRandomDefense.Unit\r\n{\r\n    public class Unit : MonoBehaviour\r\n    {\r\n        [Header(\"유닛 데이터\")]\r\n        public UnitData data;\r\n\r\n        [Header(\"현재 스탯\")]\r\n        public float currentAttackDamage;\r\n\r\n        private MeshRenderer meshRenderer;  // ← SpriteRenderer에서 변경\r\n        private TileNode currentTile;\r\n\r\n        void Awake()\r\n        {\r\n            meshRenderer = GetComponent<MeshRenderer>();\r\n        }\r\n\r\n        public void Init(UnitData unitData, TileNode tile)\r\n        {\r\n            data = unitData;\r\n            currentTile = tile;\r\n            currentAttackDamage = unitData._damage;\r\n\r\n            // 스프라이트가 있으면 텍스처로 적용\r\n            //if (unitData.unitSprite != null)\r\n            //    meshRenderer.material.mainTexture = unitData.unitSprite.texture;\r\n            //else\r\n            //    ApplyShapeColor(unitData);\r\n\r\n            gameObject.name = $\"Unit_{unitData.unitName}_G{unitData.grade}\";\r\n        }\r\n\r\n        public void ApplyUpgrade(float bonusDamage)\r\n        {\r\n            currentAttackDamage += bonusDamage;\r\n            Debug.Log($\"[Unit] {gameObject.name} \" +\r\n                      $\"공격력 {currentAttackDamage - bonusDamage} → {currentAttackDamage}\");\r\n        }\r\n\r\n        // 모양은 Material 색상으로 표현 (임시)\r\n        private void ApplyShapeColor(UnitData unitData)\r\n        {\r\n            string name = unitData.unitName.ToLower();\r\n            Color shapeColor = name switch\r\n            {\r\n                \"red\" => new Color(1f, 0.3f, 0.3f),\r\n                \"green\" => new Color(0.3f, 0.9f, 0.3f),\r\n                \"blue\" => new Color(0.3f, 0.5f, 1f),\r\n                _ => Color.white\r\n            };\r\n\r\n            // 등급 색상과 유닛 색상 혼합\r\n            Color gradeColor = GetGradeColor(unitData.grade);\r\n            meshRenderer.material.color = shapeColor * gradeColor;\r\n        }\r\n\r\n        private Color GetGradeColor(int grade)\r\n        {\r\n            return grade switch\r\n            {\r\n                1 => Color.white,\r\n                2 => new Color(0.5f, 1f, 0.5f),    // 연두\r\n                3 => new Color(0.4f, 0.6f, 1f),    // 파랑\r\n                4 => new Color(0.8f, 0.4f, 1f),    // 보라\r\n                5 => Color.yellow,\r\n                _ => Color.white\r\n            };\r\n        }\r\n\r\n        public TileNode GetCurrentTile() => currentTile;\r\n        public void SetCurrentTile(TileNode tile) => currentTile = tile;\r\n    }\r\n}\r\n","lines":79},{"id":"02_Scripts/Unit/UnitBase.cs","name":"UnitBase","path":"02_Scripts/Unit/UnitBase.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"AugmentManager.ApplyAllUnitBuff() / ApplyHeroUnitBuff()에서 호출. augmentType에 따라 배율을 누적하고 스탯을 즉시 재계산.","src":"using LuckyRandomDefense.Enemy;\nusing System.Collections;\nusing LuckyRandomDefense.Unit.Skill;\nusing System.Collections.Generic;\nusing PlayFab.MultiplayerModels;\nusing Unity.VectorGraphics;\nusing UnityEngine;\nusing LuckyRandomDefense.Augment;\n\nnamespace LuckyRandomDefense.Unit\n{\n    public class UnitBase : MonoBehaviour\n    {\n        [SerializeField] private EnemyBase _target;\n        [SerializeField] private float _currentdamage = 0;\n        [SerializeField] private UnitType _type;\n        [SerializeField] private UnitNameType _unitName;\n        [SerializeField] private UnitRatingType _ratingType;\n        private UnitData _data;\n        private SpriteRenderer[] _childRenderers;\n        private UnitRangeVisual _rangeVisual;\n        private Animator _animator;\n\n        [Header(\"레이어\")]\n        [SerializeField] private LayerMask _enemyLayer;\n        [SerializeField] private LayerMask _unitLayer;\n\n        [Header(\"스킬\")]\n        private bool _isSkillReady = true;\n        private bool _isSpecialSkillReady = true;\n        \n        private List<IUnitSkill> _skillList = new List<IUnitSkill>();\n        [SerializeField] private List<CommonSkillType> _commonSkills;\n        [SerializeField] private List<HumanSkillType> _humanSkills;\n        [SerializeField] private List<MachineSkillType> _machineSkills;\n        [SerializeField] private List<UndeadSkillType> _undeadSkills;\n        [SerializeField] private List<BeastSkillType> _beastSkills;\n        [SerializeField] private List<ElfSkillType> _ElfSkills;\n\n        [SerializeField] private Specialskilltype _specialskilltype;\n        [SerializeField] private GameObject _specialskillprefab;\n\n        // ── 기본 스탯 ──────────────────────────────────────────────\n        private float _finalDamage;\n        private float _finalRange;\n        private float _finalAttackInterval;\n        private int _finalattackTargetCount;\n\n        public float FinalDamage { get => _finalDamage; }\n        public float FinalRange { get => _finalRange; }\n        public float FinalAttackInterval { get => _finalAttackInterval; }\n\n        // ── 스킬 스탯 ──────────────────────────────────────────────\n        private float _finalSkillRange;\n        private float _finalSkillCooldown;\n        private float _finalStunTime;\n        private float _finalBuffTime;\n        private float _finalSkillChance;\n        private float _finalSkillDamage;\n        private int _finalTargetCount;\n\n        private float _fianlSpecialSkillDamage;\n        private float _fianlSpecialSkillRange;\n        private float _fianlSpecialSkillCooldwn;\n\n        public float FinalSkillRange { get => _finalSkillRange; }\n        public float FinalSkillCooldown { get => _finalSkillCooldown; }\n        public float FinalStunTime { get => _finalStunTime; }\n        public float FinalBuffTime { get => _finalBuffTime; }\n        public float FinalSkillChance { get => _finalSkillChance; }\n        public float FinalSkillDamage { get => _finalSkillDamage; }\n        public int FinalTargetCount { get => _finalTargetCount; }\n\n        private float _attackTimer;\n        private Unit unit;\n\n        // ── 버프 누적 수치 ─────────────────────────────────────────\n        private float _buffBonusDamage = 0f;\n\n        // ── 증강 누적 배율 (AugmentManager에서 누적 적용) ──────────\n        private float _augmentDamageMultiplier = 1f;\n        private float _augmentRangeMultiplier  = 1f;\n        private float _augmentSpeedMultiplier  = 1f;\n\n        public UnitType Type { get => _type; }\n        public UnitNameType NameType { get => _unitName; }\n        public UnitRatingType RatingType { get => _ratingType; }\n\n\n        [SerializeField] private float _projectileSpeed = 15f; // ArrowEffect 속도와 동일하게\n\n        private void Start()\n        {\n            unit = GetComponent<Unit>();\n            _data = UnitDataManager.Instance.GetUnitData(_unitName);\n            _animator = GetComponentInChildren<Animator>();\n            //_spriteRenderer = GetComponentInChildren<SpriteRenderer>();\n            _childRenderers = GetComponentsInChildren<SpriteRenderer>(true);\n            _rangeVisual = GetComponentInChildren<UnitRangeVisual>(true);\n            ApplyRatingStats();\n\n            InitSkills();\n\n            ShowRangeVisual(false);\n\n            StartCoroutine(PlaySummonEffectRoutine());\n\n        }\n\n        // ================================================================\n        // 스탯 계산\n        // ================================================================\n\n        public void RefreshFinalStats()\n        {\n            if (_data == null) return;\n            RatingModifier modifier = UnitDataManager.Instance.GetRatingModifier(_ratingType);\n\n            // 기본 스탯 × 등급 배율 × 증강 배율\n            _finalDamage          = _data._damage        * modifier.damageMultiplier   * _augmentDamageMultiplier;\n            _finalRange           = _data._range         * modifier.rangeMultiplier    * _augmentRangeMultiplier;\n            _finalAttackInterval  = _data._attackInterval* modifier.intervalMultiplier * _augmentSpeedMultiplier;\n            _finalattackTargetCount = _data._attackTargetCount;\n\n            // 버프 보너스 (SetBuff에서 누적)\n            _finalDamage += _buffBonusDamage;\n\n            // 스킬 스탯\n            _finalSkillRange    = _data._skillRange    * modifier.skillRangeMult;\n            _finalSkillCooldown = _data._skillCooldown * modifier.skillCooldownMult;\n            _finalStunTime      = _data._stunTime      * modifier.stunTimeMult;\n            _finalBuffTime      = _data._buffTime      * modifier.buffTimeMult;\n            _finalSkillChance   = _data._chance        * modifier.chanceMult;\n            _finalSkillDamage   = _data._skillDamage   * modifier.skillDamageMult;\n            _finalTargetCount   = Mathf.RoundToInt(_data._targetCount * modifier.targetCountMult);\n\n            // 투사체 궁극기 스텟\n            _fianlSpecialSkillDamage = _data._specialSkillDamage;\n            _fianlSpecialSkillRange = _data._specialSkillRange;\n            _fianlSpecialSkillCooldwn = _data._specialSkillCooldwn;\n\n\n\n        UpdateRangeVisual();\n        }\n\n        private void ApplyRatingStats()\n        {\n            RefreshFinalStats();\n        }\n\n        // ================================================================\n        // 증강 적용 (AugmentManager에서 호출)\n        // ================================================================\n\n        /// <summary>\n        /// AugmentManager.ApplyAllUnitBuff() / ApplyHeroUnitBuff()에서 호출.\n        /// augmentType에 따라 배율을 누적하고 스탯을 즉시 재계산.\n        /// </summary>\n        public void ApplyAugment(AugmentType augmentType, float value)\n        {\n            switch (augmentType)\n            {\n                case AugmentType.ALL_UNIT_DAMAGE:\n                case AugmentType.HERO_UNIT_DAMAGE:\n                    _augmentDamageMultiplier *= value;\n                    Debug.Log($\"[UnitBase] {gameObject.name} 데미지 증강 적용 → 배율: {_augmentDamageMultiplier:F2}\");\n                    break;\n\n                case AugmentType.ALL_UNIT_RANGE:\n                case AugmentType.HERO_UNIT_RANGE:\n                    _augmentRangeMultiplier *= value;\n                    Debug.Log($\"[UnitBase] {gameObject.name} 사거리 증강 적용 → 배율: {_augmentRangeMultiplier:F2}\");\n                    break;\n\n                case AugmentType.ALL_UNIT_SPEED:\n                    // 공격속도는 낮을수록 빠름 → 나누기로 적용\n                    _augmentSpeedMultiplier /= value;\n                    Debug.Log($\"[UnitBase] {gameObject.name} 공격속도 증강 적용 → 배율: {_augmentSpeedMultiplier:F2}\");\n                    break;\n\n                default:\n                    Debug.LogWarning($\"[UnitBase] ApplyAugment: 처리되지 않은 타입 {augmentType}\");\n                    return;\n            }\n\n            // 배율 변경 후 즉시 스탯 재계산\n            RefreshFinalStats();\n        }\n\n        // ================================================================\n        // 전투\n        // ================================================================\n\n        private void Update()\n        {\n            _attackTimer += Time.deltaTime;\n\n            if (!IsTargetValid())\n                _target = SearchTarget();\n\n            if (_target != null && _attackTimer >= _finalAttackInterval)\n            {\n                PerformAttack(_target);\n                _attackTimer = 0f;\n                Debug.Log($\"{_ratingType}_{_unitName}가{_target.name}에게 {_currentdamage}의 피해를 입힘\");\n            }\n\n            if (_target != null)\n                HandleFlip(_target.transform.position);\n        }\n\n        private bool IsTargetValid()\n        {\n            if (_target == null) return false;\n            float distance = Vector3.Distance(transform.position, _target.transform.position);\n            return distance <= _finalRange && _target.gameObject.activeInHierarchy;\n        }\n\n        private EnemyBase SearchTarget()\n        {\n            Collider[] targetsInRange = Physics.OverlapSphere(transform.position, _finalRange, _enemyLayer);\n            if (targetsInRange.Length > 0)\n                return GetClosestEnemy(targetsInRange);\n            return null;\n        }\n\n        private EnemyBase GetClosestEnemy(Collider[] hits)\n        {\n            EnemyBase closest = null;\n            float minDistance = Mathf.Infinity;\n            foreach (var hit in hits)\n            {\n                float distance = Vector3.Distance(transform.position, hit.transform.position);\n                if (distance < minDistance)\n                {\n                    minDistance = distance;\n                    closest = hit.GetComponent<EnemyBase>();\n                }\n            }\n            return closest;\n        }\n\n\n        //private void PerformAttack(EnemyBase target)\n        //{\n        //    if (target == null) return;\n\n        //    _animator.SetTrigger(\"2_Attack\");\n        //    _currentdamage = _finalDamage;\n\n            \n        //    Collider[] targetsInRange = Physics.OverlapSphere(transform.position, _finalRange, _enemyLayer);\n\n        \n        //    int attackedCount = 0;\n\n        //    foreach (var col in targetsInRange)\n        //    {\n        //        // FinalTargetCount 만큼만 공격하고 중단\n        //        if (attackedCount >= _finalattackTargetCount) break;\n\n        //        if (col.TryGetComponent(out EnemyBase enemy))\n        //        {\n        //            AttackSingleTarget(enemy);\n        //            attackedCount++;\n        //        }\n        //    }\n\n        //    // 스킬 쿨타임 체크 \n        //    if (_isSkillReady)\n        //    {\n              \n        //        StartCoroutine(UnitSkillAttackRoutine(target));\n        //    }\n        //}\n\n\n        //private void AttackSingleTarget(EnemyBase target)\n        //{\n        //    if (target == null) return;\n\n        //    float distance = Vector3.Distance(transform.position, target.transform.position);\n        //    if (distance > _finalRange + 0.5f) return;\n\n        //    Vector3 targetPos = target.transform.position;\n        //    targetPos.z = 0f;\n\n        //    Vector3 spawnPos = transform.position;\n        //    spawnPos.z = 0f;\n        //    spawnPos += Vector3.up * 0.1f;\n\n        //    GameObject effectObj = UnitEffectObjectPool.Instance.GetAttackEffect(_unitName, spawnPos, Quaternion.identity);\n\n        //    // 투사체인 경우\n        //    if (effectObj != null && effectObj.TryGetComponent(out ArrowEffect arrow))\n        //    {\n        //        arrow.SetTarget(target, _currentdamage);\n        //    }\n        //    // 근거리 또는 즉시 대미지인 경우\n        //    else\n        //    {\n        //        target.TakeDamage(_currentdamage);\n        //    }\n        //}\n\n\n\n\n        //private void AttackSingleTarget(EnemyBase target)\n        //{\n        //    if (target == null) return;\n\n        //    if (target.TryGetComponent(out EnemyAI enemyAI))\n        //    {\n        //        Vector3 spawnPos = transform.position + Vector3.up * 0.1f;\n        //        spawnPos.z = 0f;\n\n        //        // 투사체 속도 \n        //        float projectileSpeed = 15f;\n        //        float distance = Vector3.Distance(spawnPos, target.transform.position);\n\n        //        // 도달 시간 계산 (t = 거리 / 속력)\n        //        float t = distance / projectileSpeed;\n\n\n        //        // 미래 위치 = 현재 위치 + (적의 방향 * 적의 속도 * 도달 시간)\n        //        Vector3 predictedPoint = target.transform.position + (enemyAI.MoveDirection * enemyAI._moveSpeed * t);\n\n\n        //        GameObject effectObj = UnitEffectObjectPool.Instance.GetAttackEffect(_unitName, spawnPos, Quaternion.identity);\n\n        //        if (effectObj != null && effectObj.TryGetComponent(out ArrowEffect arrow))\n        //        {\n\n        //            arrow.SetTarget(target, _finalDamage, predictedPoint);\n        //        }\n        //    }\n        //}\n\n\n        // UnitBase 클래스 내부\n\n      \n\n        // \n        private void PerformAttack(EnemyBase target)\n        {\n            if (target == null) return;\n\n            _animator.SetTrigger(\"2_Attack\");\n            _currentdamage = _finalDamage;\n\n            Collider[] targetsInRange = Physics.OverlapSphere(transform.position, _finalRange, _enemyLayer);\n\n            int attackedCount = 0;\n\n            foreach (var col in targetsInRange)\n            {\n                if (attackedCount >= _finalattackTargetCount) break;\n\n                if (col.TryGetComponent(out EnemyBase enemy))\n                {\n                    AttackSingleTarget(enemy);\n                    attackedCount++;\n                }\n            }\n\n            if (_isSkillReady)\n            {\n                StartCoroutine(UnitSkillAttackRoutine(target));\n            }\n\n            if (_specialskillprefab != null && _isSpecialSkillReady)\n            {\n                StartCoroutine(SpecialSkillRoutine(target));\n            }\n        }\n\n        // ── 보조 메서드: 경로 기반 예측 위치 계산 ──\n        private Vector3 GetPredictedPositionOnPath(EnemyAI enemyAI, float seconds)\n        {\n            if (enemyAI.CurrentPath == null || enemyAI.TargetIndex >= enemyAI.CurrentPath.Count)\n                return enemyAI.transform.position;\n\n            float remainingDist = enemyAI._moveSpeed * seconds;\n            Vector3 currentPos = enemyAI.transform.position;\n            currentPos.z = 0f;\n\n            // 현재 타겟 노드부터 순차 탐색\n            for (int i = enemyAI.TargetIndex; i < enemyAI.CurrentPath.Count; i++)\n            {\n                Vector3 nodePos = enemyAI.CurrentPath[i].transform.position;\n                nodePos.z = 0f;\n\n                float segDist = Vector3.Distance(currentPos, nodePos);\n\n                if (remainingDist <= segDist)\n                {\n                    // 이 세그먼트 안에 예측 지점이 있음\n                    return Vector3.Lerp(currentPos, nodePos, remainingDist / segDist);\n                }\n\n                remainingDist -= segDist;\n                currentPos = nodePos;\n            }\n\n            // 경로 끝에 도달한 경우\n            return enemyAI.CurrentPath[enemyAI.CurrentPath.Count - 1].transform.position;\n        }\n\n        \n        private void AttackSingleTarget(EnemyBase target)\n        {\n            if (target == null) return;\n\n            Vector3 spawnPos = transform.position;\n            spawnPos.z = 0f;\n            spawnPos += Vector3.up * 0.1f;\n\n            EnemyAI enemyAI = target.GetComponent<EnemyAI>();\n            Vector3 predictedPos;\n\n            // 경로 기반 예측 발사\n            if (enemyAI != null && enemyAI.CurrentPath != null && enemyAI.TargetIndex < enemyAI.CurrentPath.Count)\n            {\n                // Step 1: 초기 도달 시간 (t = 거리 / 투사체 속력)\n                float dist0 = Vector3.Distance(spawnPos, target.transform.position);\n                float t0 = dist0 / _projectileSpeed;\n\n                // Step 2: t0 초 후 경로 위의 예측 위치\n                Vector3 p1 = GetPredictedPositionOnPath(enemyAI, t0);\n                p1.z = 0f;\n\n                // Step 3: 1회 뉴턴법 수렴 (예측 위치까지 거리로 재계산)\n                float dist1 = Vector3.Distance(spawnPos, p1);\n                float t1 = dist1 / _projectileSpeed;\n\n                predictedPos = GetPredictedPositionOnPath(enemyAI, t1);\n                predictedPos.z = 0f;\n            }\n            else\n            {\n                // EnemyAI 없으면 현재 위치 타겟\n                predictedPos = target.transform.position;\n                predictedPos.z = 0f;\n            }\n\n            // 투사체 발사\n            GameObject effectObj = UnitEffectObjectPool.Instance.GetAttackEffect(_unitName, spawnPos, Quaternion.identity);\n            \n            // 색상 변경\n            ParticleSystem[] allParticles = effectObj.GetComponentsInChildren<ParticleSystem>();\n            foreach (var ps in allParticles)\n            {\n                var main = ps.main;\n                main.startColor = _data._baseColor;\n                ps.Clear(); \n                ps.           if (_beastSkills != null && _beastSkills.Count > 0)\n                _skillList.AddRange(SkillFactory.CreateSkillList(UnitType.BEAST, _beastSkills.ConvertAll(s => (int)s)));\n            if (_ElfSkills != null && _ElfSkills.Count > 0)\n                _skillList.AddRange(SkillFactory.CreateSkillList(UnitType.ELF, _ElfSkills.ConvertAll(s => (int)s)));\n        }\n\n        // UnitBase 내부의 스페셜 스킬 루틴 예시\n        private IEnumerator SpecialSkillRoutine(EnemyBase target)\n        {\n            _isSpecialSkillReady = false;\n            Vector3 spawnPos = transform.position + Vector3.up * 0.5f;\n\n            GameObject go = Instantiate(_specialskillprefab, spawnPos, Quaternion.identity);\n            OptimizedMissile missile = go.GetComponent<OptimizedMissile>();\n\n            if (missile != null)\n            {\n                // 1. 데미지와 폭발 범위를 주입 (RefreshFinalStats에서 계산된 값들)\n                // _finalSpecialDamage와 _finalSpecialRange는 유닛 데이터 변수명에 맞춰주세요.\n                missile.Init(_fianlSpecialSkillDamage, _fianlSpecialSkillRange, target.transform);\n\n                // 2. 발사 방향 계산 및 실행\n                Vector3 launchDir = (target.transform.position - spawnPos).normalized;\n                missile.Launch(Quaternion.LookRotation(Vector3.forward, launchDir));\n            }\n\n            yield return new WaitForSeconds(_fianlSpecialSkillCooldwn);\n            _isSpecialSkillReady = true;\n        }\n\n\n        // ================================================================\n        // 버프 (스킬용 임시 버프)\n        // ================================================================\n\n        public void SetBuff(float bonus, float duration)\n        {\n            StartCoroutine(BuffDuration(bonus, duration));\n        }\n\n        private IEnumerator BuffDuration(float bonus, float duration)\n        {\n            _buffBonusDamage += bonus;\n            RefreshFinalStats();\n            yield return new WaitForSeconds(duration);\n            _buffBonusDamage -= bonus;\n            RefreshFinalStats();\n        }\n\n        // ================================================================\n        // 비주얼\n        // ================================================================\n\n        private void HandleFlip(Vector3 targetPos)\n        {\n            bool isLeft = targetPos.x < transform.position.x;\n            if (_childRenderers != null && _childRenderers.Length <= 2)\n            {\n                Vector3 s = transform.localScale;\n                s.x = isLeft ? -Mathf.Abs(s.x) : Mathf.Abs(s.x);\n                transform.localScale = s;\n            }\n            else if (_childRenderers != null && _childRenderers.Length >= 3)\n            {\n                Vector3 s = transform.localScale;\n                s.x = isLeft ? Mathf.Abs(s.x) : -Mathf.Abs(s.x);\n                transform.localScale = s;\n            }\n        }\n\n        private void OnMouseEnter() => ShowRangeVisual(true);\n        private void OnMouseExit()  => ShowRangeVisual(false);\n\n        private void ShowRangeVisual(bool isVisible)\n        {\n            if (_rangeVisual != null) _rangeVisual.SetVisible(isVisible);\n        }\n\n        private void UpdateRangeVisual()\n        {\n            if (_rangeVisual != null) _rangeVisual.SetScale(_finalRange);\n        }\n\n\n       \n\n\n\n        //기즈모\n        private void OnDrawGizmosSelected()\n        {\n            Gizmos.color = Color.red;\n            float range = (_data != null) ? _finalRange : 2f;\n            Gizmos.DrawWireSphere(transform.position, range);\n\n\n            if (_target != null)\n            {\n                Gizmos.color = Color.yellow;\n                Gizmos.DrawLine(transform.position, _target.transform.position);\n            }\n        }\n\n        // 소환이팩트\n        private IEnumerator PlaySummonEffectRoutine()\n        {\n \n            float yOffset = (_type == UnitType.HUMAN) ? 0.7f : 0.1f;\n            Vector3 summonPos = transform.position + (Vector3.down * yOffset);\n            summonPos.z = 0f; \n\n       \n            GameObject effectObj = UnitEffectObjectPool.Instance.GetSummonEffect(_ratingType, summonPos, Quaternion.identity);\n\n            if (effectObj != null)\n            {\n\n                yield return new WaitForSeconds(1.0f);\n                UnitEffectObjectPool.Instance.ReturnSummonEffect(_ratingType, effectObj);\n            }\n        }\n    }\n}\n","lines":628},{"id":"02_Scripts/Unit/UnitType/UnitRatingType.cs","name":"UnitRatingType","path":"02_Scripts/Unit/UnitType/UnitRatingType.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"enum UnitRatingType","src":"﻿public enum UnitRatingType\r\n{\r\n    NORMAL,\r\n    RARE,\r\n    EPIC,\r\n    HEROIC,\r\n\r\n}\r\n","lines":9},{"id":"02_Scripts/Data/EnemyData.cs","name":"EnemyData","path":"02_Scripts/Data/EnemyData.cs","layer":"Data","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class EnemyData : ScriptableObject","src":"using UnityEngine;\r\n\r\n[CreateAssetMenu(fileName = \"EnemyData\", menuName = \"Scriptable Objects/EnemyData\")]\r\npublic class EnemyData : ScriptableObject\r\n{\r\n    public string _name;\r\n    public float _hp;\r\n    public float _moveSpeed;\r\n    public float _shield;\r\n    public int _gold;\r\n    public GameObject _prefab;\r\n}\r\n","lines":13},{"id":"02_Scripts/Data/StageData.cs","name":"StageData","path":"02_Scripts/Data/StageData.cs","layer":"Data","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"StageData.cs 역할 : 스테이지(난이도)별 WaveData 모음 + 환경 설정 EASY/NORMAL/HARD 각각 하나씩 만들어 StageSelectUI에 연결 생성 : 우클릭 → Create → LuckyRandomDefense → StageData 의존성 - WaveData : 기존 웨이브 데이터 - DifficultyType : 난이도 enum","src":"// =================================================================\n// StageData.cs\n// 역할 : 스테이지(난이도)별 WaveData 모음 + 환경 설정\n//        EASY/NORMAL/HARD 각각 하나씩 만들어 StageSelectUI에 연결\n//\n// 생성 : 우클릭 → Create → LuckyRandomDefense → StageData\n//\n// 의존성\n// - WaveData : 기존 웨이브 데이터\n// - DifficultyType : 난이도 enum\n// =================================================================\n\nusing System.Collections.Generic;\nusing UnityEngine;\n\n[CreateAssetMenu(fileName = \"StageData\", menuName = \"LuckyRandomDefense/StageData\")]\npublic class StageData : ScriptableObject\n{\n    [Header(\"기본 정보\")]\n    public DifficultyType difficulty;\n    public string stageName;\n    [TextArea]\n    public string description;\n\n    [Header(\"미리보기 (UI에 표시)\")]\n    public Sprite thumbnail;\n\n    [Header(\"웨이브 구성\")]\n    public List<WaveData> waves;\n\n    [Header(\"플레이 설정\")]\n    public int startingGold = 100;\n    public int startingNexusLife = 100;\n\n    [Tooltip(\"웨이브 적 HP 배율 (EASY=0.5, NORMAL=1.0, HARD=1.5)\")]\n    public float enemyHpMultiplier = 1f;\n\n    [Header(\"튜토리얼 여부\")]\n    public bool isTutorial = false;\n}\n","lines":41},{"id":"02_Scripts/Data/UnitDataBase.cs","name":"UnitDataBase","path":"02_Scripts/Data/UnitDataBase.cs","layer":"Data","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class UnitDataBase : ScriptableObject","src":"using System.Collections.Generic;\nusing UnityEngine;\n\n\n[CreateAssetMenu(fileName = \"UnitDataBase\", menuName = \"Scriptable Objects/UnitDataBase\")]\npublic class UnitDataBase : ScriptableObject\n{\n    public List<UnitData> allUnits;\n\n    private Dictionary<int, UnitData> _byId;\n\n    private void EnsureCache()\n    {\n        if (_byId != null) return;\n        _byId = new Dictionary<int, UnitData>();\n        foreach (var u in allUnits)\n        {\n            if (u == null) continue;\n            if (_byId.ContainsKey(u.id))\n                Debug.LogWarning($\"[UnitDataBase] 중복 id 감지: {u.id} ({u.unitName})\");\n            else\n                _byId[u.id] = u;\n        }\n    }\n\n    public UnitData GetById(int id)\n    {\n        EnsureCache();\n        if (_byId.TryGetValue(id, out UnitData data)) return data;\n        Debug.LogWarning($\"[UnitDataBase] id {id} 없음\");\n        return null;\n    }\n\n    public UnitData GetByComposite(string unitName, int grade, UnitType type)\n    {\n        if (allUnits == null) return null;\n        return allUnits.Find(u => u != null\n            && u.unitName == unitName\n            && u.grade == grade\n            && u._type == type);\n    }\n\n    public void InvalidateCache() => _byId = null;\n}\n","lines":45},{"id":"02_Scripts/Lobby/Core/SaveData.cs","name":"SaveData","path":"02_Scripts/Lobby/Core/SaveData.cs","layer":"Lobby","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"SaveData.cs 역할 : JSON으로 직렬화/역직렬화되는 세이브 데이터 구조체 모음 주의 : [Serializable] 없으면 JsonUtility가 무시함 중첩 클래스도 전부 [Serializable] 필요 JsonUtility는 Dictionary 미지원 → List로만 관리","src":"using System;\nusing System.Collections.Generic;\n\n// ================================================================\n// SaveData.cs\n// 역할 : JSON으로 직렬화/역직렬화되는 세이브 데이터 구조체 모음\n// 주의 : [Serializable] 없으면 JsonUtility가 무시함\n//        중첩 클래스도 전부 [Serializable] 필요\n//        JsonUtility는 Dictionary 미지원 → List로만 관리\n// ================================================================\n\n[Serializable]\npublic class SaveData\n{\n    // ── 재화 / 스태미나 ──────────────────────────────────────────\n    public int lobbyCurrency = 100;\n    public int stamina = 5;\n\n    // ── 영웅 / 유물 목록 ─────────────────────────────────────────\n    public List<HeroSaveData> heroes = new List<HeroSaveData>();\n    public List<RelicSaveData> relics = new List<RelicSaveData>();\n\n    // ── 상점 (후순위 - 필드만 예약) ──────────────────────────────\n    public string lastShopRefresh = \"\";\n\n    // ── 튜토리얼 / 난이도 해금 ───────────────────────────────────\n    public bool tutorialCompleted = false;\n    public int unlockedDifficulty = 0;                          // 0=EASY only, 1=+NORMAL, 2=+HARD\n    public DifficultyType lastSelectedDifficulty = DifficultyType.EASY;\n\n    // ── 인게임 진행 스냅샷 ───────────────────────────────────────\n    public RunSaveData run = new RunSaveData();\n}\n\n// ────────────────────────────────────────────────────────────────\n// 영웅 세이브 데이터\n// ────────────────────────────────────────────────────────────────\n[Serializable]\npublic class HeroSaveData\n{\n    public int id;\n    public int level;\n    public bool isUnlocked;\n\n    // 해금된 스킬 ID 목록\n    // 주의 : HeroData ScriptableObject의 skillId와 매칭됨\n    public List<int> unlockedSkillIds = new List<int>();\n\n    public HeroSaveData(int id, int level, bool isUnlocked)\n    {\n        this.id = id;\n        this.level = level;\n        this.isUnlocked = isUnlocked;\n    }\n}\n\n// ────────────────────────────────────────────────────────────────\n// 유물 세이브 데이터\n// ────────────────────────────────────────────────────────────────\n[Serializable]\npublic class RelicSaveData\n{\n    public int id;\n    public int level;\n\n    // 강화 조건 : duplicateCount >= 2^level 달성 시 강화 가능\n    public int duplicateCount;\n\n    public RelicSaveData(int id)\n    {\n        this.id = id;\n        this.level = 0;\n        this.duplicateCount = 0;\n    }\n}\n\n// ────────────────────────────────────────────────────────────────\n// 인게임 진행 스냅샷 (이어하기용)\n// ────────────────────────────────────────────────────────────────\n[Serializable]\npublic class RunSaveData\n{\n    public bool hasSavedRun = false;\n    public string savedAtIso = \"\";\n    public string source = \"\";      // \"auto\" | \"manual\"\n    public int schemaVersion = 1;\n\n    public int currentWaveIndex;\n    public int currentGold;\n    public int nexusLife;\n    public int mapSeed;\n\n    public List<TileUnitSnapshot> tiles = new List<TileUnitSnapshot>();\n    public List<AcquiredAugmentSnapshot> acquiredAugments = new List<AcquiredAugmentSnapshot>();\n}\n\n[Serializable]\npublic class TileUnitSnapshot\n{\n    public int tileX;\n    public int tileY;\n    public List<UnitSlotSnapshot> stack = new List<UnitSlotSnapshot>();\n}\n\n[Serializable]\npublic class UnitSlotSnapshot\n{\n    public int unitDataId;\n    public float currentAttackDamage;\n}\n\n[Serializable]\npublic class AcquiredAugmentSnapshot\n{\n    public int augmentTypeId;\n    public int tierId;\n    public float effectValue;\n    public string augmentName;\n}\n","lines":120},{"id":"02_Scripts/Save/SnapshotRestorer.cs","name":"SnapshotRestorer","path":"02_Scripts/Save/SnapshotRestorer.cs","layer":"Save","scenes":["HCH(한충희)","Main","PSY"],"entry":false,"summary":"SnapshotRestorer.cs 역할 : RunSaveData → 런타임 상태 복원 TitleScreen.OnClickContinue()에서 호출 복원 순서 1. mapSeed로 맵 재생성 2. 골드 / 넥서스 체력 복원 3. 웨이브 인덱스 복원 4. 유닛 배치 복원 (UnitDataBase.GetById → 타일에 배치) 5. 증강 재적용","src":"// =================================================================\n// SnapshotRestorer.cs\n// 역할  : RunSaveData → 런타임 상태 복원\n//         TitleScreen.OnClickContinue()에서 호출\n//\n// 복원 순서\n//  1. mapSeed로 맵 재생성\n//  2. 골드 / 넥서스 체력 복원\n//  3. 웨이브 인덱스 복원\n//  4. 유닛 배치 복원 (UnitDataBase.GetById → 타일에 배치)\n//  5. 증강 재적용\n// =================================================================\n\nusing System.Collections.Generic;\nusing UnityEngine;\nusing LuckyRandomDefense.Core;\nusing LuckyRandomDefense.Node;\nusing LuckyRandomDefense.Augment;\nusing LuckyRandomDefense.Unit;\n\nusing UnitClass = LuckyRandomDefense.Unit.Unit;\n\nnamespace LuckyRandomDefense.Save\n{\n    public static class SnapshotRestorer\n    {\n        /// <returns>복원 성공 여부</returns>\n        public static bool Apply(RunSaveData snap, UnitDataBase unitDB)\n        {\n            if (snap == null)\n            {\n                Debug.LogError(\"[SnapshotRestorer] snap null\");\n                return false;\n            }\n\n            RestoreMap(snap);\n            RestoreGameState(snap);\n            RestoreWaveIndex(snap);\n            int placed = RestoreUnits(snap, unitDB);\n            RestoreAugments(snap);\n\n            Debug.Log($\"[SnapshotRestorer] 복원 완료 | 웨이브:{snap.currentWaveIndex} | 유닛:{placed}개\");\n            return true;\n        }\n\n        // ── 맵 재생성 ───────────────────────────────────────────────────\n\n        private static void RestoreMap(RunSaveData snap)\n        {\n            if (ProceduralMap.Instance == null)\n            {\n                Debug.LogWarning(\"[SnapshotRestorer] ProceduralMap.Instance null → 맵 복원 스킵\");\n                return;\n            }\n\n            if (snap.mapSeed == 0)\n            {\n                Debug.LogWarning(\"[SnapshotRestorer] mapSeed=0 → 새 맵 생성 (구버전 세이브)\");\n                ProceduralMap.Instance.GenerateMap(UnityEngine.Random.Range(1, int.MaxValue));\n            }\n            else\n            {\n                ProceduralMap.Instance.GenerateMap(snap.mapSeed);\n            }\n        }\n\n        // ── 골드 / 넥서스 ───────────────────────────────────────────────\n\n        private static void RestoreGameState(RunSaveData snap)\n        {\n            if (GameManager.Instance == null)\n            {\n                Debug.LogWarning(\"[SnapshotRestorer] GameManager.Instance null → 게임 상태 복원 스킵\");\n                return;\n            }\n\n            GameManager.Instance.Gold      = snap.currentGold;\n            GameManager.Instance.NexusLife = snap.nexusLife;\n        }\n\n        // ── 웨이브 인덱스 ───────────────────────────────────────────────\n\n        private static void RestoreWaveIndex(RunSaveData snap)\n        {\n            if (WaveManager.Instance == null)\n            {\n                Debug.LogWarning(\"[SnapshotRestorer] WaveManager.Instance null → 웨이브 복원 스킵\");\n                return;\n            }\n\n            WaveManager.Instance.CurrentWaveIndex = snap.currentWaveIndex;\n        }\n\n        // ── 유닛 배치 ───────────────────────────────────────────────────\n\n        private static int RestoreUnits(RunSaveData snap, UnitDataBase unitDB)\n        {\n            int placed = 0;\n\n            if (snap.tiles == null || snap.tiles.Count == 0) return 0;\n\n            if (unitDB == null)\n            {\n                Debug.LogError(\"[SnapshotRestorer] unitDB null → 유닛 복원 불가\");\n                return 0;\n            }\n\n            if (ProceduralMap.Instance == null || ProceduralMap.Instance.Tiles == null)\n            {\n                Debug.LogError(\"[SnapshotRestorer] ProceduralMap.Tiles null → 유닛 복원 불가\");\n                return 0;\n            }\n\n            int w = ProceduralMap.Instance.Tiles.GetLength(0);\n            int h = ProceduralMap.Instance.Tiles.GetLength(1);\n\n            foreach (TileUnitSnapshot tileSnap in snap.tiles)\n            {\n                if (tileSnap.tileX < 0 || tileSnap.tileX >= w ||\n                    tileSnap.tileY < 0 || tileSnap.tileY >= h)\n                {\n                    Debug.LogWarning($\"[SnapshotRestorer] Tile({tileSnap.tileX},{tileSnap.tileY}) 범위 초과 → 스킵\");\n                    continue;\n                }\n\n                TileNode tile = ProceduralMap.Instance.Tiles[tileSnap.tileX, tileSnap.tileY];\n                if (tile == null)\n                {\n                    Debug.LogWarning($\"[SnapshotRestorer] Tile({tileSnap.tileX},{tileSnap.tileY}) null → 스킵\");\n                    continue;\n                }\n\n                foreach (UnitSlotSnapshot slot in tileSnap.stack)\n                {\n                    UnitData data = unitDB.GetById(slot.unitDataId);\n                    if (data == null)\n                    {\n                        Debug.LogWarning($\"[SnapshotRestorer] unitDataId {slot.unitDataId} 없음 → 스킵\");\n                        continue;\n                    }\n\n                    if (data._prefab == null)\n                    {\n                        Debug.LogWarning($\"[SnapshotRestorer] {data.unitName} 프리팹 null → 스킵\");\n                        continue;\n                    }\n\n                    Vector3 pos = tile.transform.position;\n                    pos.z = -0.01f;\n                    GameObject go = Object.Instantiate(data._prefab, pos, Quaternion.identity);\n                    UnitClass unit = go.GetComponent<UnitClass>();\n\n                    if (unit == null)\n                    {\n                        Debug.LogWarning($\"[SnapshotRestorer] {data.unitName} 프리팹에 Unit 컴포넌트 없음 → 스킵\");\n                        Object.Destroy(go);\n                        continue;\n                    }\n\n                    unit.Init(data, tile);\n                    unit.currentAttackDamage = slot.currentAttackDamage;\n                    tile.AddUnit(unit);\n                    placed++;\n                }\n            }\n\n            return placed;\n        }\n\n        // ── 증강 재적용 ─────────────────────────────────────────────────\n\n        private static void RestoreAugments(RunSaveData snap)\n        {\n            if (snap.acquiredAugments == null || snap.acquiredAugments.Count == 0) return;\n\n            UnitBase[] allUnits = Object.FindObjectsByType<UnitBase>(FindObjectsInactive.Exclude);\n\n            foreach (AcquiredAugmentSnapshot aug in snap.acquiredAugments)\n            {\n                AugmentType type = (AugmentType)aug.augmentTypeId;\n\n                foreach (UnitBase unit in allUnits)\n                {\n                    if (unit == null) continue;\n\n                    bool isHeroAugment = type == AugmentType.HERO_UNIT_DAMAGE ||\n                                         type == AugmentType.HERO_UNIT_RANGE;\n\n                    if (isHeroAugment && unit.RatingType != UnitRatingType.HEROIC)\n                        continue;\n\n                    unit.ApplyAugment(type, aug.effectValue);\n                }\n\n                Debug.Log($\"[SnapshotRestorer] 증강 재적용: {aug.augmentName} ({type}) ×{aug.effectValue:F2}\");\n            }\n        }\n    }\n}\n","lines":200},{"id":"02_Scripts/Lobby/UI/PopupBase.cs","name":"PopupBase","path":"02_Scripts/Lobby/UI/PopupBase.cs","layer":"Lobby","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"protected virtual void Start() { if (closeButton ! null) closeButton.onClick.AddListener(OnClickClose); }","src":"﻿using UnityEngine;\r\nusing UnityEngine.UI;\r\n\r\npublic class PopupBase : MonoBehaviour\r\n{\r\n    public Button closeButton;\r\n\r\n    //protected virtual void Start()\r\n    //{\r\n    //    if (closeButton != null)\r\n    //        closeButton.onClick.AddListener(OnClickClose);\r\n    //}\r\n\r\n//    public void OnClickClose()\r\n//    {\r\n//        UIManager.Instance.CloseTopPopup();\r\n//    }\r\n}","lines":18},{"id":"02_Scripts/UI/PopupBase.cs","name":"PopupBase","path":"02_Scripts/UI/PopupBase.cs","layer":"UI","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class PopupBase : MonoBehaviour","src":"using UnityEngine;\r\nusing LuckyRandomDefense.Core;\r\nusing LuckyRandomDefense.Core.EventBus;\r\n\r\nnamespace LuckyRandomDefense.UI\r\n{\r\n    public abstract class PopupBase : MonoBehaviour\r\n    {\r\n        protected abstract GameState ShowOnState { get; }\r\n\r\n        protected virtual void Awake()\r\n        {\r\n            // 이벤트 등록\r\n            GameEventBus.OnGameStateChanged += HandleStateChanged;\r\n        }\r\n\r\n        protected virtual void OnDestroy()\r\n        {\r\n            // 이벤트 해제\r\n            GameEventBus.OnGameStateChanged -= HandleStateChanged;\r\n        }\r\n\r\n\r\n        private void HandleStateChanged(GameState state)\r\n        {\r\n            bool shouldShow = (state == ShowOnState);\r\n\r\n            if (shouldShow)\r\n            {\r\n                if (!gameObject.activeInHierarchy)\r\n                {\r\n                    Debug.Log($\"현재 state: {state} -> {gameObject.name} 활성화\");\r\n                    gameObject.SetActive(true);\r\n                }\r\n\r\n                OnShow();\r\n            }\r\n            else\r\n            {\r\n                if (gameObject.activeInHierarchy)\r\n                {\r\n                    Debug.Log($\"현재 state: {state} -> {gameObject.name} 비활성화\");\r\n                    gameObject.SetActive(false);\r\n                }\r\n            }\r\n        }\r\n\r\n        protected virtual void OnShow() { }\r\n    }\r\n}\r\n","lines":51},{"id":"02_Scripts/Node/MapGenerator.cs","name":"MapGenerator","path":"02_Scripts/Node/MapGenerator.cs","layer":"Node","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"Tile 레이어 인덱스 캐싱","src":"﻿using UnityEngine;\r\nusing LuckyRandomDefense.Core.EventBus;\r\n\r\nnamespace LuckyRandomDefense.Node\r\n{\r\n    public class MapGenerator : MonoBehaviour\r\n    {\r\n        [Header(\"맵 설정\")]\r\n        public int totalWidth = 8;   // 전체 가로\r\n        public int totalHeight = 5;   // 전체 세로\r\n        public float tileSize = 1f;\r\n        public float tileGap = 0.05f;\r\n\r\n        [Header(\"프리팹\")]\r\n        public GameObject tilePrefab;\r\n        public Transform tileContainer;\r\n\r\n        public TileNode[,] Tiles { get; private set; }\r\n\r\n        void Start() => GenerateMap();\r\n\r\n        public void GenerateMap()\r\n        {\r\n            foreach (Transform child in tileContainer)\r\n                Destroy(child.gameObject);\r\n\r\n            Tiles = new TileNode[totalWidth, totalHeight];\r\n            float step = tileSize + tileGap;\r\n\r\n            Vector2 origin = new Vector2(\r\n                transform.position.x - (totalWidth * step) / 2f + step / 2f,\r\n                transform.position.y - (totalHeight * step) / 2f + step / 2f\r\n            );\r\n\r\n            // Tile 레이어 인덱스 캐싱\r\n            int tileLayerIndex = LayerMask.NameToLayer(\"Tile\");\r\n            if (tileLayerIndex == -1)\r\n                Debug.LogError(\"[MapGenerator] 'Tile' 레이어 없음 → Project Settings → Tags and Layers에서 추가 필요\");\r\n\r\n            for (int x = 0; x < totalWidth; x++)\r\n            {\r\n                for (int y = 0; y < totalHeight; y++)\r\n                {\r\n                    Vector3 pos = new Vector3(\r\n                        origin.x + x * step,\r\n                        origin.y + y * step,\r\n                        0f\r\n                    );\r\n\r\n                    GameObject go = Instantiate(\r\n                        tilePrefab, pos,\r\n                        Quaternion.identity,\r\n                        tileContainer\r\n                    );\r\n\r\n                    go.transform.localScale = new Vector3(tileSize, tileSize, 1f);\r\n\r\n                    // 런타임 생성 시 레이어 직접 지정\r\n                    if (tileLayerIndex != -1)\r\n                        go.layer = tileLayerIndex;\r\n\r\n                    TileNode node = go.GetComponent<TileNode>();\r\n                    TileType type = GetTileType(x, y);\r\n                    node.Init(x, y, type);\r\n                    Tiles[x, y] = node;\r\n                }\r\n            }\r\n\r\n            UnitEventBus.RaiseMapGenerated();\r\n            Debug.Log($\"[MapGenerator] 생성 완료 \" +\r\n                      $\"전체:{totalWidth}x{totalHeight} \" +\r\n                      $\"플레이어블:{totalWidth - 2}x{totalHeight - 2}\");\r\n        }\r\n\r\n        // 테두리 = Corridor / 안쪽 = Playable\r\n        private TileType GetTileType(int x, int y)\r\n        {\r\n            bool isBorder = (x == 0 || x == totalWidth - 1 ||\r\n                             y == 0 || y == totalHeight - 1);\r\n            return isBorder ? TileType.Corridor : TileType.Playable;\r\n        }\r\n\r\n        public TileNode GetTile(int x, int y)\r\n        {\r\n            if (x < 0 || x >= totalWidth ||\r\n                y < 0 || y >= totalHeight) return null;\r\n            return Tiles[x, y];\r\n        }\r\n\r\n        public TileNode GetRandomEmptyPlayableTile()\r\n        {\r\n            var candidates = new System.Collections.Generic.List<TileNode>();\r\n            for (int x = 1; x < totalWidth - 1; x++)\r\n                for (int y = 1; y < totalHeight - 1; y++)\r\n                    if (!Tiles[x, y].isOccupied)\r\n                        candidates.Add(Tiles[x, y]);\r\n\r\n            if (candidates.Count == 0) return null;\r\n            return candidates[Random.Range(0, candidates.Count)];\r\n        }\r\n\r\n        public TileNode FindStackableTile(UnitData data)\r\n        {\r\n            for (int x = 1; x < totalWidth - 1; x++)\r\n                for (int y = 1; y < totalHeight - 1; y++)\r\n                    if (Tiles[x, y].CanStack(data))\r\n                        return Tiles[x, y];\r\n            return null;\r\n        }\r\n\r\n        public System.Collections.Generic.List<TileNode> GetAllPlayableTiles()\r\n        {\r\n            var list = new System.Collections.Generic.List<TileNode>();\r\n            for (int x = 1; x < totalWidth - 1; x++)\r\n                for (int y = 1; y < totalHeight - 1; y++)\r\n                    list.Add(Tiles[x, y]);\r\n            return list;\r\n        }\r\n\r\n        private void OnDrawGizmosSelected()\r\n        {\r\n            float step = tileSize + tileGap;\r\n\r\n            // 전체 맵 (흰색)\r\n            Gizmos.color = Color.white;\r\n            Gizmos.DrawWireCube(\r\n                transform.position,\r\n                new Vector3(totalWidth * step, totalHeight * step, 0.1f)\r\n            );\r\n\r\n            // 플레이어블 영역 (파란색)\r\n            Gizmos.color = Color.cyan;\r\n            Gizmos.DrawWireCube(\r\n                transform.position,\r\n                new Vector3((totalWidth - 2) * step, (totalHeight - 2) * step, 0.1f)\r\n            );\r\n        }\r\n    }\r\n}","lines":139},{"id":"02_Scripts/Unit/Skill/EFFect/SkillEffectType.cs","name":"SkillEffectType","path":"02_Scripts/Unit/Skill/EFFect/SkillEffectType.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"enum SkillEffectPrefapType","src":"﻿public enum SkillEffectPrefapType\r\n{\r\n    STUN_EFFECT,\r\n    BUFF_EFFECT,\r\n    FIREBALL_BIG_EFFECT,\r\n    FIREPILLAR_EFFECT,\r\n    STRONGBLOW_EFFECT,\r\n    EXPLOSION_EFFECT,\r\n    THROW_BOMB_EFFECT,\r\n    POISON_CLOUD_EFFECT,\r\n    DEBUFF_FIELD_EFFECT,\r\n    WINDMILL_EFFECT,\r\n\r\n}\r\n","lines":15},{"id":"02_Scripts/Unit/UnitType/UnitNameType.cs","name":"UnitNameType","path":"02_Scripts/Unit/UnitType/UnitNameType.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"enum UnitNameType","src":"﻿\r\npublic enum UnitNameType\r\n{\r\n    // 휴먼\r\n    HUMAN_SOLDIER,\r\n    HUMAN_ARCHER,\r\n    HUMAN_SUPPORTER,\r\n    \r\n    // 기계\r\n    MACHINE_MACHINEGUN,\r\n    MACHINE_CANNON,\r\n    MACHUNE_LASER,\r\n\r\n    // 언데드\r\n    UNDEAD_SOLDER,\r\n    UNDEAD_WARRIOR,\r\n    UNDEAD_ARCHER,\r\n    BEAST_NONE,\r\n\r\n    // 자연\r\n    NATURE_NONE,\r\n\r\n    //엘프\r\n    ELF_ARCHER,\r\n    ELF_SUPPORTER,\r\n    ELF_WIZARD,\r\n}\r\n\r\n\r\n","lines":30},{"id":"02_Scripts/Core/EventBus/GameEventBus.cs","name":"GameEventBus","path":"02_Scripts/Core/EventBus/GameEventBus.cs","layer":"Core","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"게임 상태(GameState)가 변경될 때마다 발생하는 이벤트","src":"﻿using LuckyRandomDefense.Quest;\r\nusing System;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing LuckyRandomDefense.Augment;\r\n\r\nnamespace LuckyRandomDefense.Core.EventBus\r\n{\r\n    public class GameEventBus : MonoBehaviour\r\n    {\r\n        #region Game 상태 변경 시 UI 업데이트 이벤트\r\n        public static event Action<int> OnGoldChanged;\r\n        public static event Action<int> OnWaveChanged;\r\n        public static event Action<int> OnNexusLifeChanged;\r\n        public static event Action<int> OnTimeLimitChanged;\r\n\r\n        public static void RaiseUpdateGoldText(int currentGold)\r\n        {\r\n            OnGoldChanged?.Invoke(currentGold);\r\n        }\r\n\r\n        public static void RaiseUpdateWaveText(int wave)\r\n        {\r\n            OnWaveChanged?.Invoke(wave);\r\n        }\r\n\r\n        public static void RaiseUpdateNexusLife(int nexusLife)\r\n        {\r\n            OnNexusLifeChanged?.Invoke(nexusLife);\r\n        }\r\n        public static void RaiseUpdateTimeLimit(int currentTime)\r\n        {\r\n            OnTimeLimitChanged?.Invoke(currentTime);\r\n        }\r\n\r\n        // 게임 상태(GameState)가 변경될 때마다 발생하는 이벤트\r\n        public static event Action<GameState> OnGameStateChanged;\r\n        public static void RaiseGameStateChanged(GameState state)\r\n        {\r\n            OnGameStateChanged?.Invoke(state);\r\n        }\r\n        #endregion\r\n\r\n        #region Quest 이벤트\r\n        // 발행 : EnemyBase.TakeDamage() → 적 처치 시\r\n        // 수신 : QuestManager.HandleEnemyKilled()\r\n        public static event Action OnEnemyKilled;\r\n        public static void RaiseEnemyKilled()\r\n            => OnEnemyKilled?.Invoke();\r\n\r\n        // 발행 : GameManager.RemainingEnemyCount setter → 적 사망 시\r\n        // 수신 : UI → 남은 적 수 텍스트 갱신\r\n        public static event Action<int> OnEnemyCountChanged;\r\n        public static void RaiseUpdateEnemyCount(int remainingEnemies)\r\n            => OnEnemyCountChanged?.Invoke(remainingEnemies);\r\n\r\n        // 발행 : QuestManager.HandleEnemyKilled()\r\n        // 수신 : QuestUIController.HandleQuestProgressUpdated()\r\n        public static event Action<int, int> OnQuestProgressUpdated;\r\n        public static void RaiseQuestProgressUpdated(int killCount, int nextTarget)\r\n            => OnQuestProgressUpdated?.Invoke(killCount, nextTarget);\r\n\r\n        // 발행 : QuestManager.CheckStageCompletion()\r\n        // 수신 : QuestUIController.HandleQuestStageCompleted()\r\n        public static event Action<QuestStage, int> OnQuestStageCompleted;\r\n        public static void RaiseQuestStageCompleted(QuestStage stage, int stageIndex)\r\n            => OnQuestStageCompleted?.Invoke(stage, stageIndex);\r\n        #endregion\r\n\r\n        #region Augment 이벤트\r\n        // 발행 : WaveManager → 웨이브 완료 시\r\n        // 수신 : AugmentManager.HandleWaveCompleted()\r\n        public static event Action<int> OnWaveCompleted;\r\n        public static void RaiseWaveCompleted(int waveIndex)\r\n            => OnWaveCompleted?.Invoke(waveIndex);\r\n\r\n        // 발행 : AugmentManager → 증강 선택지 생성 완료 시\r\n        // 수신 : AugmentPopup → UI 표시\r\n        public static event Action<List<AugmentOffer>> OnAugmentSelectionRequested;\r\n        public static void RaiseAugmentSelectionRequested(List<AugmentOffer> offers)\r\n            => OnAugmentSelectionRequested?.Invoke(offers);\r\n\r\n        // 발행 : AugmentPopup 선택 버튼\r\n        // 수신 : AugmentManager.HandleAugmentSelected()\r\n        public static event Action<AugmentOffer> OnAugmentSelected;\r\n        public static void RaiseAugmentSelected(AugmentOffer offer)\r\n            => OnAugmentSelected?.Invoke(offer);\r\n\r\n        // 발행 : AugmentPopup 증강 리롤 버튼\r\n        // 수신 : AugmentManager.HandleAugmentReroll()\r\n        public static event Action OnAugmentReroll;\r\n        public static void RaiseAugmentReroll()\r\n            => OnAugmentReroll?.Invoke();\r\n\r\n        // 발행 : AugmentPopup 등급 리롤 버튼\r\n        // 수신 : AugmentManager.HandleAugmentTierReroll()\r\n        public static event Action OnAugmentTierReroll;\r\n        public static void RaiseAugmentTierReroll()\r\n            => OnAugmentTierReroll?.Invoke();\r\n\r\n        // 발행 : AugmentManager.SelectionTimer() → 매 프레임\r\n        // 수신 : AugmentPopup → 타이머 UI 갱신\r\n        public static event Action<float> OnAugmentTimerUpdated;\r\n        public static void RaiseAugmentTimerUpdated(float remaining)\r\n            => OnAugmentTimerUpdated?.Invoke(remaining);\r\n        #endregion\r\n    }\r\n}","lines":108},{"id":"02_Scripts/Data/DifficultyType.cs","name":"DifficultyType","path":"02_Scripts/Data/DifficultyType.cs","layer":"Data","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"DifficultyType.cs 역할 : 스테이지 난이도 enum SaveData/StageData/StageSelectUI에서 공통 사용 주의 : enum 값(int) 절대 변경 금지 세이브 호환성 깨짐","src":"// =================================================================\n// DifficultyType.cs\n// 역할 : 스테이지 난이도 enum\n//        SaveData/StageData/StageSelectUI에서 공통 사용\n// 주의 : enum 값(int) 절대 변경 금지 — 세이브 호환성 깨짐\n// =================================================================\n\n[System.Serializable]\npublic enum DifficultyType\n{\n    EASY   = 0,\n    NORMAL = 1,\n    HARD   = 2\n}\n","lines":15},{"id":"02_Scripts/Data/WaveData.cs","name":"WaveData","path":"02_Scripts/Data/WaveData.cs","layer":"Data","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"웨이브 패턴 만들기","src":"using System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\n[CreateAssetMenu(fileName = \"WaveData\", menuName = \"Scriptable Objects/WaveData\")]\r\npublic class WaveData : ScriptableObject\r\n{\r\n    public int _waveIndex;\r\n    public int _enemyCount;\r\n    public float _hpRatio;\r\n    public float _spawnDelay;\r\n\r\n    // 웨이브 패턴 만들기\r\n    public List<EnemyData> _enemyPattern;\r\n}\r\n","lines":15},{"id":"02_Scripts/Save/SnapshotBuilder.cs","name":"SnapshotBuilder","path":"02_Scripts/Save/SnapshotBuilder.cs","layer":"Save","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"SnapshotBuilder.cs 역할 : 현재 런타임 상태 → RunSaveData 직렬화 WaveManager(자동저장) / InGameSettingsUI(수동저장)에서 호출 의존성 - GameManager : Gold, NexusLife - WaveManager : CurrentWaveIndex - ProceduralMap : CurrentSeed, Tiles - AugmentManager : GetAcquiredAugm","src":"// =================================================================\n// SnapshotBuilder.cs\n// 역할  : 현재 런타임 상태 → RunSaveData 직렬화\n//         WaveManager(자동저장) / InGameSettingsUI(수동저장)에서 호출\n//\n// 의존성\n// - GameManager    : Gold, NexusLife\n// - WaveManager    : CurrentWaveIndex\n// - ProceduralMap  : CurrentSeed, Tiles\n// - AugmentManager : GetAcquiredAugments()\n// =================================================================\n\nusing System;\nusing System.Collections.Generic;\nusing UnityEngine;\nusing LuckyRandomDefense.Core;\nusing LuckyRandomDefense.Node;\nusing LuckyRandomDefense.Augment;\n\nusing UnitClass = LuckyRandomDefense.Unit.Unit;\n\nnamespace LuckyRandomDefense.Save\n{\n    public static class SnapshotBuilder\n    {\n        public static RunSaveData Build(string source)\n        {\n            var snap = new RunSaveData\n            {\n                hasSavedRun    = true,\n                source         = source,\n                savedAtIso     = DateTime.UtcNow.ToString(\"o\"),\n                schemaVersion  = 1,\n            };\n\n            // ── 맵 시드 ─────────────────────────────────────────\n            if (ProceduralMap.Instance != null)\n                snap.mapSeed = ProceduralMap.Instance.CurrentSeed;\n            else\n                Debug.LogWarning(\"[SnapshotBuilder] ProceduralMap.Instance null → mapSeed=0\");\n\n            // ── 게임 상태 ────────────────────────────────────────\n            if (GameManager.Instance != null)\n            {\n                snap.currentGold  = GameManager.Instance.Gold;\n                snap.nexusLife    = GameManager.Instance.NexusLife;\n            }\n            else\n            {\n                Debug.LogWarning(\"[SnapshotBuilder] GameManager.Instance null → gold/nexus 기본값\");\n            }\n\n            // ── 웨이브 인덱스 ────────────────────────────────────\n            if (WaveManager.Instance != null)\n                snap.currentWaveIndex = WaveManager.Instance.CurrentWaveIndex;\n            else\n                Debug.LogWarning(\"[SnapshotBuilder] WaveManager.Instance null → waveIndex=0\");\n\n            // ── 타일 유닛 스냅샷 ─────────────────────────────────\n            snap.tiles = CollectTiles();\n\n            // ── 증강 스냅샷 ──────────────────────────────────────\n            snap.acquiredAugments = CollectAugments();\n\n            Debug.Log($\"[SnapshotBuilder] 스냅샷 완료 | 소스:{source} | 웨이브:{snap.currentWaveIndex} | 타일:{snap.tiles.Count} | 증강:{snap.acquiredAugments.Count}\");\n            return snap;\n        }\n\n        private static List<TileUnitSnapshot> CollectTiles()\n        {\n            var list = new List<TileUnitSnapshot>();\n\n            if (ProceduralMap.Instance == null || ProceduralMap.Instance.Tiles == null)\n                return list;\n\n            TileNode[,] tiles = ProceduralMap.Instance.Tiles;\n            int w = tiles.GetLength(0);\n            int h = tiles.GetLength(1);\n\n            for (int x = 0; x < w; x++)\n            {\n                for (int y = 0; y < h; y++)\n                {\n                    TileNode tile = tiles[x, y];\n                    if (tile == null || !tile.isOccupied || tile.stackedUnits.Count == 0)\n                        continue;\n\n                    var tileSnap = new TileUnitSnapshot { tileX = x, tileY = y };\n\n                    foreach (UnitClass unit in tile.stackedUnits)\n                    {\n                        if (unit == null || unit.data == null)\n                        {\n                            Debug.LogWarning($\"[SnapshotBuilder] Tile({x},{y}) 유닛 또는 data null → 스킵\");\n                            continue;\n                        }\n\n                        tileSnap.stack.Add(new UnitSlotSnapshot\n                        {\n                            unitDataId          = unit.data.id,\n                            currentAttackDamage = unit.currentAttackDamage\n                        });\n                    }\n\n                    if (tileSnap.stack.Count > 0)\n                        list.Add(tileSnap);\n                }\n            }\n\n            return list;\n        }\n\n        private static List<AcquiredAugmentSnapshot> CollectAugments()\n        {\n            var list = new List<AcquiredAugmentSnapshot>();\n\n            if (AugmentManager.Instance == null) return list;\n\n            foreach (AugmentOffer offer in AugmentManager.Instance.GetAcquiredAugments())\n            {\n                if (offer == null || offer.data == null) continue;\n\n                list.Add(new AcquiredAugmentSnapshot\n                {\n                    augmentTypeId = (int)offer.data.augmentType,\n                    tierId        = (int)offer.data.tier,\n                    effectValue   = offer.FinalEffectValue,\n                    augmentName   = offer.data.augmentName\n                });\n            }\n\n            return list;\n        }\n    }\n}\n","lines":136},{"id":"02_Scripts/Quest/QuestData.cs","name":"QuestData","path":"02_Scripts/Quest/QuestData.cs","layer":"Quest","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"QuestData.cs 역할 : 누적 처치 퀘스트의 단계별 목표와 보상을 정의하는 ScriptableObject 단계 수 및 수치는 인스펙터에서 자유롭게 설정 가능 생성 : 우클릭 → Create → LuckyRandomDefense → QuestData 네임스페이스 의존성 - 없음 (순수 데이터 클래스) 주의사항 - stages 리스트는 killTarget 오름차순으로 정렬할 것 순서가 틀리면 QuestManager에서 단계","src":"// =================================================================\n// QuestData.cs\n// 역할  : 누적 처치 퀘스트의 단계별 목표와 보상을 정의하는 ScriptableObject\n//         단계 수 및 수치는 인스펙터에서 자유롭게 설정 가능\n//\n// 생성  : 우클릭 → Create → LuckyRandomDefense → QuestData\n//\n// 네임스페이스 의존성\n// - 없음 (순수 데이터 클래스)\n//\n// 주의사항\n// - stages 리스트는 killTarget 오름차순으로 정렬할 것\n//   순서가 틀리면 QuestManager에서 단계 판정이 잘못됨\n// - goldReward가 0이면 보상 없이 단계만 넘어감\n// =================================================================\n\nusing System.Collections.Generic;\nusing UnityEngine;\n\nnamespace LuckyRandomDefense.Quest\n{\n    [CreateAssetMenu(\n        fileName = \"QuestData\",\n        menuName = \"LuckyRandomDefense/QuestData\")]\n    public class QuestData : ScriptableObject\n    {\n        [Header(\"퀘스트 이름 (UI 표시용)\")]\n        public string questName = \"몬스터 처치\";\n\n        [Header(\"퀘스트 단계 목록 (killTarget 오름차순 정렬 필수)\")]\n        public List<QuestStage> stages;\n    }\n\n    // ────────────────────────────────────────────────────────────────\n    // 퀘스트 단계 정의\n    // ────────────────────────────────────────────────────────────────\n    [System.Serializable]\n    public class QuestStage\n    {\n        [Header(\"단계 이름 (에디터 식별용)\")]\n        public string stageName;\n\n        // 주의 : stages 리스트 내에서 오름차순 정렬 필수\n        [Header(\"목표 처치 수\")]\n        public int killTarget;\n\n        [Header(\"보상 골드\")]\n        public int goldReward;\n    }\n}\n","lines":51},{"id":"02_Scripts/Data/UnitRatingData.cs","name":"UnitRatingData","path":"02_Scripts/Data/UnitRatingData.cs","layer":"Data","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class UnitRatingData : ScriptableObject","src":"﻿using UnityEngine;\r\n\r\n[CreateAssetMenu(fileName = \"UnitRatingData\", menuName = \"Scriptable Objects/UnitRatingData\")]\r\npublic class UnitRatingData : ScriptableObject\r\n{\r\n    [Header(\"등급별 가중치 설정\")]\r\n    public RatingModifier Normal;\r\n    public RatingModifier Rare;\r\n    public RatingModifier Epic;\r\n    public RatingModifier Heroic;\r\n\r\n    public RatingModifier GetModifier(UnitRatingType type)\r\n    {\r\n        return type switch\r\n        {\r\n            UnitRatingType.NORMAL => Normal,\r\n            UnitRatingType.RARE => Rare,\r\n            UnitRatingType.EPIC => Epic,\r\n            UnitRatingType.HEROIC => Heroic,\r\n            _ => Normal\r\n        };\r\n    }\r\n}\r\n\r\n[System.Serializable]\r\npublic struct RatingModifier\r\n{\r\n    [Header(\"기본 스텟 가중치\")]\r\n    public float damageMultiplier;   // 공격력 배율\r\n    public float rangeMultiplier;    // 사거리 배율\r\n    public float intervalMultiplier; // 공격 속도 배율 (낮을수록 빠름)\r\n    public float attackTargetMultiplier; //일반공격 타게팅\r\n\r\n    [Header(\"스킬 가중치\")]\r\n    public float skillRangeMult;    // 스킬 범위 \r\n    public float skillCooldownMult; // 스킬 쿨타임 \r\n    public float stunTimeMult;     // 기절 시간 \r\n    public float buffTimeMult;     // 버프 지속시간 \r\n    public float chanceMult;       // 발동 확률 \r\n    public float skillDamageMult;   // 스킬 데미지 \r\n    public float targetCountMult;  // 스킬 타게팅 \r\n}","lines":42},{"id":"02_Scripts/Data/Server/RuntimeQuestData.cs","name":"RuntimeQuestData","path":"02_Scripts/Data/Server/RuntimeQuestData.cs","layer":"Data","scenes":["HCH(한충희)","Main","PSY"],"entry":false,"summary":"RuntimeQuestData.cs 역할 : PlayFab JSON에서 파싱된 퀘스트 데이터 런타임 클래스 QuestData ScriptableObject 대신 사용","src":"﻿// =================================================================\r\n// RuntimeQuestData.cs\r\n// 역할  : PlayFab JSON에서 파싱된 퀘스트 데이터 런타임 클래스\r\n//         QuestData ScriptableObject 대신 사용\r\n// =================================================================\r\n\r\nusing System;\r\nusing System.Collections.Generic;\r\n\r\n[Serializable]\r\npublic class RuntimeQuestData\r\n{\r\n    public string questName;\r\n    public List<RuntimeQuestStage> stages;\r\n}\r\n\r\n[Serializable]\r\npublic class RuntimeQuestStage\r\n{\r\n    public string stageName;\r\n    public int killTarget;\r\n    public int goldReward;\r\n}","lines":23},{"id":"02_Scripts/Augment/AugmentData.cs","name":"AugmentData","path":"02_Scripts/Augment/AugmentData.cs","layer":"Augment","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"AugmentData.cs 역할 : 증강체 하나의 효과와 표시 정보를 정의하는 ScriptableObject","src":"// =================================================================\n// AugmentData.cs\n// 역할  : 증강체 하나의 효과와 표시 정보를 정의하는 ScriptableObject\n// =================================================================\n\nusing UnityEngine;\n\nnamespace LuckyRandomDefense.Augment\n{\n    public enum AugmentCategory\n    {\n        RESOURCE,\n        TOWER,\n        HERO\n    }\n\n    public enum AugmentType\n    {\n        GOLD_BOOST,\n        ALL_UNIT_DAMAGE,\n        ALL_UNIT_RANGE,\n        ALL_UNIT_SPEED,\n        HERO_UNIT_DAMAGE,\n        HERO_UNIT_RANGE,\n    }\n\n    public enum AugmentTier\n    {\n        SILVER    = 1,\n        GOLD      = 2,\n        PRISMATIC = 3\n    }\n\n    [CreateAssetMenu(\n        fileName = \"AugmentData\",\n        menuName = \"LuckyRandomDefense/AugmentData\")]\n    public class AugmentData : ScriptableObject\n    {\n        [Header(\"표시 정보\")]\n        public string augmentName;\n\n        [TextArea]\n        public string description;\n\n        public Sprite icon;\n\n        [Header(\"분류\")]\n        public AugmentCategory category;\n        public AugmentType augmentType;\n\n        [Header(\"등급\")]\n        public AugmentTier tier;\n\n        [Header(\"효과 수치 (등급 반영된 최종값)\")]\n        public float effectValue;\n    }\n}\n","lines":58},{"id":"02_Scripts/Data/Server/RuntimeAugmentData.cs","name":"RuntimeAugmentData","path":"02_Scripts/Data/Server/RuntimeAugmentData.cs","layer":"Data","scenes":["HCH(한충희)","Main","PSY"],"entry":false,"summary":"RuntimeAugmentData.cs 역할 : PlayFab JSON에서 파싱된 증강 데이터 런타임 클래스 ScriptableObject 대신 사용 주의사항 - JsonUtility 사용을 위해 [Serializable] 필수 - enum은 string으로 받아서 파싱 - iconName : Resources/AugmentIcons/ 폴더 내 파일명과 일치해야 함 예) iconName \"icon_gold\" → AugmentI","src":"﻿// =================================================================\r\n// RuntimeAugmentData.cs\r\n// 역할  : PlayFab JSON에서 파싱된 증강 데이터 런타임 클래스\r\n//         ScriptableObject 대신 사용\r\n//\r\n// 주의사항\r\n// - JsonUtility 사용을 위해 [Serializable] 필수\r\n// - enum은 string으로 받아서 파싱\r\n// - iconName : Resources/AugmentIcons/ 폴더 내 파일명과 일치해야 함\r\n//   예) iconName = \"icon_gold\" → AugmentIcons/icon_gold.png\r\n// =================================================================\r\n\r\nusing System;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing LuckyRandomDefense.Augment;\r\n\r\n[Serializable]\r\npublic class RuntimeAugmentData\r\n{\r\n    public string augmentName;\r\n    public string description;\r\n    public string category;    // \"RESOURCE\" / \"TOWER\" / \"HERO\"\r\n    public string augmentType;\r\n    public string tier;        // \"SILVER\" / \"GOLD\" / \"PRISMATIC\"\r\n    public float effectValue;\r\n\r\n    // 주의 : Resources/AugmentIcons/ 폴더 내 파일명과 동일해야 함\r\n    //        확장자(.png) 제외하고 입력\r\n    //        예) \"icon_gold\", \"icon_sword\"\r\n    public string iconName;\r\n\r\n    // 아이콘은 Resources에서 로드 후 주입\r\n    // JsonUtility 직렬화 제외\r\n    [NonSerialized] public Sprite icon;\r\n\r\n    // ── enum 변환 프로퍼티 ────────────────────────────────────────\r\n    public AugmentCategory Category =>\r\n        Enum.Parse<AugmentCategory>(category);\r\n\r\n    public AugmentType AugmentType =>\r\n        Enum.Parse<AugmentType>(augmentType);\r\n\r\n    public AugmentTier Tier =>\r\n        Enum.Parse<AugmentTier>(tier);\r\n}\r\n\r\n// ── JSON 파싱용 래퍼 ─────────────────────────────────────────────\r\n[Serializable]\r\npublic class AugmentDataWrapper\r\n{\r\n    public List<RuntimeAugmentData> augments;\r\n}","lines":53},{"id":"02_Scripts/Tutorial/TutorialSequence.cs","name":"TutorialSequence","path":"02_Scripts/Tutorial/TutorialSequence.cs","layer":"Tutorial","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"TutorialSequence.cs 역할 : 여러 TutorialStep을 순서대로 묶은 시퀀스 EASY 스테이지에 1개 만들어 TutorialManager에 연결 생성 : 우클릭 → Create → LuckyRandomDefense → TutorialSequence","src":"// =================================================================\n// TutorialSequence.cs\n// 역할 : 여러 TutorialStep을 순서대로 묶은 시퀀스\n//        EASY 스테이지에 1개 만들어 TutorialManager에 연결\n//\n// 생성 : 우클릭 → Create → LuckyRandomDefense → TutorialSequence\n// =================================================================\n\nusing System.Collections.Generic;\nusing UnityEngine;\n\nnamespace LuckyRandomDefense.Tutorial\n{\n    [CreateAssetMenu(fileName = \"TutorialSequence\", menuName = \"LuckyRandomDefense/TutorialSequence\")]\n    public class TutorialSequence : ScriptableObject\n    {\n        [Header(\"식별\")]\n        public string sequenceName = \"EASY_Tutorial\";\n\n        [Header(\"스텝 순서\")]\n        public List<TutorialStep> steps = new List<TutorialStep>();\n\n        [Header(\"완료 처리\")]\n        [Tooltip(\"이 시퀀스 완료 시 tutorialCompleted=true 저장 + NORMAL/HARD 해금\")]\n        public bool markTutorialCompletedOnEnd = true;\n    }\n}\n","lines":28},{"id":"02_Scripts/Tutorial/TutorialStep.cs","name":"TutorialStep","path":"02_Scripts/Tutorial/TutorialStep.cs","layer":"Tutorial","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"TutorialStep.cs 역할 : 튜토리얼 한 단계의 정보 (메시지/강조대상/완료조건) 생성 : 우클릭 → Create → LuckyRandomDefense → TutorialStep 사용 예시 (EASY 스테이지 5단계 예시) Step01_Summon : message \"소환 버튼을 눌러보세요\", targetUIName \"Button_Summon\", trigger UnitSummoned Step02_Upgrade : me","src":"// =================================================================\n// TutorialStep.cs\n// 역할 : 튜토리얼 한 단계의 정보 (메시지/강조대상/완료조건)\n//\n// 생성 : 우클릭 → Create → LuckyRandomDefense → TutorialStep\n//\n// 사용 예시 (EASY 스테이지 5단계 예시)\n//  Step01_Summon   : message=\"소환 버튼을 눌러보세요\",\n//                    targetUIName=\"Button_Summon\", trigger=UnitSummoned\n//  Step02_Upgrade  : message=\"유닛을 업그레이드해보세요\",\n//                    targetUIName=\"Button_Upgrade\", trigger=UnitUpgraded\n//  Step03_FreePlay : message=\"자유롭게 운영해보세요!\",\n//                    trigger=WaveEnded, hideHighlight=true\n// =================================================================\n\nusing UnityEngine;\n\nnamespace LuckyRandomDefense.Tutorial\n{\n    public enum TutorialTriggerType\n    {\n        None,           // 자동 진행 또는 \"다음\" 버튼만으로 진행\n        Click,          // 강조 대상 클릭 (Button의 onClick 감지)\n        UnitSummoned,   // 유닛 소환 알림\n        UnitUpgraded,   // 유닛 업그레이드 알림\n        HeroCreated,    // 영웅 조합 알림\n        WaveEnded,      // 웨이브 종료 알림\n        EnemyDefeated,  // 적 처치 알림\n    }\n\n    [CreateAssetMenu(fileName = \"TutorialStep\", menuName = \"LuckyRandomDefense/TutorialStep\")]\n    public class TutorialStep : ScriptableObject\n    {\n        [Header(\"식별\")]\n        public string stepId;\n\n        [Header(\"표시 내용\")]\n        [TextArea(2, 5)]\n        public string message;\n\n        [Header(\"강조 대상 (없으면 강조 생략)\")]\n        [Tooltip(\"씬에 존재하는 GameObject 이름 (비활성 포함). 빈 값이면 강조 없음\")]\n        public string targetUIName;\n\n        [Tooltip(\"강조 영역 외곽선/손가락 표시 안 할지 여부\")]\n        public bool hideHighlight = false;\n\n        [Header(\"완료 조건\")]\n        public TutorialTriggerType trigger = TutorialTriggerType.None;\n\n        [Tooltip(\"트리거가 몇 번 발생해야 진행 (예: 2회 소환 → 2)\")]\n        public int triggerCount = 1;\n\n        [Header(\"UI 옵션\")]\n        [Tooltip(\"True면 메시지 박스에 '다음' 버튼 표시 (수동 진행)\")]\n        public bool showNextButton = false;\n\n        [Tooltip(\"0이 아니면 N초 후 자동 진행 (트리거와 무관)\")]\n        public float autoAdvanceDelay = 0f;\n\n        [Header(\"메시지 박스 위치\")]\n        [Tooltip(\"기본 위치(하단)에서 추가 오프셋\")]\n        public Vector2 messageBoxOffset = Vector2.zero;\n\n        [Header(\"자동 시각요소 숨김 (Step03 자유운영용)\")]\n        [Tooltip(\"0보다 크면, 메시지 표시 후 N초 뒤에 Dimmed/MessageBox만 페이드아웃해서 게임 화면 가시성 확보 \" +\n                 \"(트리거 대기는 계속 진행). 권장 3~5초.\")]\n        public float autoHideOverlaySeconds = 0f;\n\n        [Tooltip(\"autoHideOverlaySeconds 이후 페이드아웃 지속 시간\")]\n        public float autoHideFadeDuration = 0.5f;\n    }\n}\n","lines":74},{"id":"02_Scripts/Lobby/HeroData.cs","name":"HeroData","path":"02_Scripts/Lobby/HeroData.cs","layer":"Lobby","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"HeroData.cs 역할 : 영웅 원본 스펙을 정의하는 ScriptableObject 런타임에 수정되지 않는 읽기 전용 데이터 생성 : 우클릭 → Create → Lobby → HeroData 주의 : 실제 진행 데이터(레벨, 해금여부)는 HeroSaveData에서 관리 이 파일은 절대 런타임에 수정하지 말 것","src":"﻿using System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\n// ================================================================\r\n// HeroData.cs\r\n// 역할 : 영웅 원본 스펙을 정의하는 ScriptableObject\r\n//        런타임에 수정되지 않는 읽기 전용 데이터\r\n// 생성 : 우클릭 → Create → Lobby → HeroData\r\n// 주의 : 실제 진행 데이터(레벨, 해금여부)는 HeroSaveData에서 관리\r\n//        이 파일은 절대 런타임에 수정하지 말 것\r\n// ================================================================\r\n\r\n[CreateAssetMenu(fileName = \"HeroData\", menuName = \"Lobby/HeroData\")]\r\npublic class HeroData : ScriptableObject\r\n{\r\n    // ── 기본 정보 ─────────────────────────────────────────────────\r\n    public int id;\r\n    public string heroName;\r\n    public Sprite portrait;\r\n\r\n    // ── 해금 조건 ─────────────────────────────────────────────────\r\n    // 주의 : unlockCost = 0 이면 기본 해금 상태로 자동 등록됨\r\n    public int unlockCost;\r\n\r\n    // ── 레벨업 ────────────────────────────────────────────────────\r\n    public int maxLevel;\r\n\r\n    // 레벨당 고정 비용\r\n    // 추후 레벨별 차등 비용 필요 시 List<int> upgradeCostPerLevel로 교체\r\n    public int upgradeCost;\r\n\r\n    // ── 스킬 목록 ─────────────────────────────────────────────────\r\n    // 주의 : skillId는 프로젝트 전체에서 중복되지 않게 관리할 것\r\n    public List<HeroSkillData> skills = new List<HeroSkillData>();\r\n}\r\n\r\n// ────────────────────────────────────────────────────────────────\r\n// 영웅 스킬 정의\r\n// ────────────────────────────────────────────────────────────────\r\n[System.Serializable]\r\npublic class HeroSkillData\r\n{\r\n    // 주의 : skillId는 HeroSaveData.unlockedSkillIds와 매칭 키\r\n    public int skillId;\r\n    public string skillName;\r\n\r\n    // 이 레벨 달성 시 자동 해금\r\n    public int unlockLevel;\r\n\r\n    public Sprite skillIcon;\r\n\r\n    [TextArea]\r\n    public string description;\r\n}","lines":54},{"id":"02_Scripts/Unit/UnitType/UnitType.cs","name":"UnitType","path":"02_Scripts/Unit/UnitType/UnitType.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"enum UnitType","src":"﻿public enum UnitType\r\n{\r\n    \r\n    HUMAN,\r\n    MACHINE,\r\n    UNDEAD,\r\n    BEAST,\r\n    NATURE,\r\n    ELF,\r\n    COMMONSKILL, // 스킬용 선택하지말것.\r\n\r\n}\r\n\r\n","lines":14},{"id":"02_Scripts/Unit/Skill/IUnitSkill.cs","name":"IUnitSkill","path":"02_Scripts/Unit/Skill/IUnitSkill.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"interface IUnitSkill","src":"﻿using LuckyRandomDefense.Enemy;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public interface IUnitSkill\r\n    {\r\n        void Execute(UnitBase owner, EnemyBase target);\r\n    }\r\n\r\n}\r\n\r\n","lines":12},{"id":"02_Scripts/Unit/Skill/SkillType/BeastSkillType.cs","name":"BeastSkillType","path":"02_Scripts/Unit/Skill/SkillType/BeastSkillType.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"enum BeastSkillType","src":"﻿public enum BeastSkillType\r\n{\r\n    BEAST_BUFF,\r\n}","lines":4},{"id":"02_Scripts/Unit/Skill/SkillType/CommonSkillType.cs","name":"CommonSkillType","path":"02_Scripts/Unit/Skill/SkillType/CommonSkillType.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"enum CommonSkillType","src":"﻿public enum CommonSkillType\r\n{\r\n    STUN,   //기절\r\n    BUFF,   // 버프\r\n    BOSSOVERCLOCK, // 보스특공\r\n    MORALE, // 사기고양 \r\n    BOOM // 폭탄\r\n\r\n}","lines":9},{"id":"02_Scripts/Unit/Skill/SkillType/ElfSkillType.cs","name":"ElfSkillType","path":"02_Scripts/Unit/Skill/SkillType/ElfSkillType.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"enum ElfSkillType","src":"﻿using System;\r\nusing System.Collections.Generic;\r\nusing System.Text;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public enum ElfSkillType\r\n    {\r\n        ELF_Buff,\r\n        ELF_FIREPILLAR,\r\n        ELF_SUPPORTER,\r\n        ELF_Fireball, //?\r\n        \r\n    }\r\n}\r\n","lines":16},{"id":"02_Scripts/Unit/Skill/SkillType/HumanSkillType.cs","name":"HumanSkillType","path":"02_Scripts/Unit/Skill/SkillType/HumanSkillType.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"enum HumanSkillType","src":"﻿public enum HumanSkillType\r\n{\r\n\r\n    HUMAN_BUFF,\r\n    POWER_SHOT,\r\n    BACK_BOOM,\r\n    BACK_DOUBLEBOOM,\r\n    WINDMILL,\r\n    NONE,\r\n\r\n\r\n}","lines":12},{"id":"02_Scripts/Unit/Skill/SkillType/MachineSkillType.cs","name":"MachineSkillType","path":"02_Scripts/Unit/Skill/SkillType/MachineSkillType.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"enum MachineSkillType","src":"﻿public enum MachineSkillType\r\n{\r\n    LASER_BEAM\r\n}","lines":4},{"id":"02_Scripts/Unit/Skill/SkillType/SpecialskillType.cs","name":"SpecialskillType","path":"02_Scripts/Unit/Skill/SkillType/SpecialskillType.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"enum Specialskilltype","src":"﻿public enum Specialskilltype\r\n{\r\n    HH_SPECIALSKILL,\r\n    HE_SPECIALSKILL,\r\n    EE_SPECIALSKILL,\r\n    EU_SPECIALSKILL,\r\n    UU_SPECIALSKILL,\r\n    UH_SPECIALSKILL,\r\n\r\n}\r\n","lines":11},{"id":"02_Scripts/Unit/Skill/SkillType/UndeadSkillType.cs","name":"UndeadSkillType","path":"02_Scripts/Unit/Skill/SkillType/UndeadSkillType.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"enum UndeadSkillType","src":"﻿public enum UndeadSkillType\r\n{\r\n    POISON_CLOUD,\r\n    DEBUFF_FIELD,\r\n}","lines":5},{"id":"02_Scripts/Unit/Skill/UnitSkillFactory.cs","name":"UnitSkillFactory","path":"02_Scripts/Unit/Skill/UnitSkillFactory.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"범용 스킬 생성기","src":"﻿using System.Collections.Generic;\r\n\r\nnamespace LuckyRandomDefense.Unit.Skill\r\n{\r\n    public static class SkillFactory\r\n    {\r\n        // 범용 스킬 생성기\r\n        public static List<IUnitSkill> CreateSkillList(UnitType unitType, List<int> skillIds)\r\n        {\r\n            List<IUnitSkill> skills = new List<IUnitSkill>();\r\n\r\n            foreach (var id in skillIds)\r\n            {\r\n                IUnitSkill skill = null;\r\n\r\n                //종족별로 분기\r\n                //종족 생기면 추가\r\n                switch (unitType)\r\n                {\r\n                    case UnitType.COMMONSKILL:\r\n                        skill = CreateCommonSkill((CommonSkillType)id);\r\n                        break;\r\n                    case UnitType.HUMAN:\r\n                        skill = CreateHumanSkill((HumanSkillType)id);\r\n                        break;\r\n                    case UnitType.MACHINE:\r\n                        skill = CreateMachineSkill((MachineSkillType)id);\r\n                        break;\r\n                    case UnitType.UNDEAD:\r\n                        skill = CreateMachineSkill((Undea
