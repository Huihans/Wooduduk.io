tRatingType 매핑 기준\r\n// grade 1 = NORMAL / grade 2 = RARE / grade 3 = EPIC / grade 4 = HEROIC\r\n// HEROIC_GRADE(4) 는 스택/조합 제외\r\n// ※ UnitRatingType.HEROIC enum값(3)과 grade값(4)은 다름 → 혼용 금지\r\n// =================================================================\r\n\r\nusing UnityEngine;\r\nusing System.Collections.Generic;\r\nusing LuckyRandomDefense.Core.EventBus;  // EventBus (유닛 추가/제거 이벤트 발행)\r\nusing LuckyRandomDefense.Unit;\r\n\r\n// LuckyRandomDefense.Unit.Unit과 UnityEngine.UI 등과의 충돌 방지\r\nusing UnitClass = LuckyRandomDefense.Unit.Unit;\r\n\r\nnamespace LuckyRandomDefense.Node\r\n{\r\n    public enum TileType { Corridor, Playable, Forbidden, Spawn, Goal }\r\n\r\n    public class TileNode : MonoBehaviour\r\n    {\r\n        // ── HEROIC 등급 기준 상수 ──────────────────────────────────\r\n        // 주의 : UnitRatingType.HEROIC enum값(3)과 다름\r\n        //        grade 기준으로 통일 — 절대 (int)UnitRatingType.HEROIC 혼용 금지\r\n        private const int HEROIC_GRADE = 4;\r\n\r\n        // ── 타일 정보 ─────────────────────────────────────────────\r\n        [Header(\"타일 정보\")]\r\n        public int gridX;\r\n        public int gridY;\r\n        public TileType tileType;\r\n        public bool isOccupied = false;\r\n        public bool isSelected = false;\r\n\r\n        // ── 중첩 정보 ─────────────────────────────────────────────\r\n        // 주의 : maxStack = 3 기준으로 조합 조건 판단됨\r\n        [Header(\"중첩 정보\")]\r\n        public List<UnitClass> stackedUnits = new List<UnitClass>();\r\n        public int maxStack = 3;\r\n\r\n        // ── 색상 설정 ─────────────────────────────────────────────\r\n        [Header(\"색상\")]\r\n        public Color playableColor  = new Color(0.85f, 0.92f, 1f);\r\n        public Color corridorColor  = new Color(0.6f,  0.6f,  0.65f);\r\n        public Color hoverColor     = new Color(1f,    1f,    0.6f);\r\n        public Color occupiedColor  = new Color(0.7f,  0.5f,  0.5f);\r\n        public Color selectedColor  = new Color(1f,    0.8f,  0.3f);\r\n\r\n        [Header(\"등급별 점유 색상\")]\r\n        private Color normalColor = new Color(0.9f, 0.85f, 0.85f); // 연한 회갈색 (기존보다 밝게)\r\n        private Color rareColor = new Color(0.6f, 0.8f, 1.0f);  // 연한 하늘색 (Soft Blue)\r\n        private Color epicColor = new Color(1.0f, 0.6f, 0.6f);  // 연한 분홍/레드 (Soft Red)\r\n        private Color heroicColor = new Color(0.4f, 1f, 0.7f); // \r\n\r\n        // ── 내부 상수 ─────────────────────────────────────────────\r\n        // 유닛이 타일보다 앞에 렌더링되도록 Z축 오프셋 적용\r\n        private const float UNIT_Z_OFFSET = -0.01f;\r\n\r\n        private SpriteRenderer _spriteRenderer;\r\n        private Color _defaultColor;\r\n\r\n        [Header(\"A* Pathfinding\")]\r\n        public int gCost;\r\n        public int hCost;\r\n        public TileNode parent;\r\n\r\n        public int FCost => gCost + hCost;\r\n        public bool IsWalkable => tileType != TileType.Forbidden;\r\n\r\n\r\n        // ================================================================\r\n        // 라이프사이클\r\n        // ================================================================\r\n\r\n        void Awake()\r\n        {\r\n            // 주의 : SpriteRenderer 없으면 SetColor 전부 무시됨\r\n            //        Tile 프리팹에 SpriteRenderer 필수\r\n            _spriteRenderer = GetComponent<SpriteRenderer>();\r\n            if (_spriteRenderer == null)\r\n                Debug.LogError($\"[TileNode] {gameObject.name} : SpriteRenderer 없음 → 프리팹 확인\");\r\n        }\r\n\r\n        public void Init(int x, int y, TileType type)\r\n        {\r\n            gridX     = x;\r\n            gridY     = y;\r\n            tileType  = type;\r\n\r\n            _defaultColor = (type == TileType.Playable) ? playableColor : corridorColor;\r\n            SetColor(_defaultColor);\r\n\r\n            gameObject.name = $\"Tile_{x}_{y} [{type}]\";\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 스택 가능 여부 판단\r\n        // ================================================================\r\n\r\n        /// <summary>\r\n        /// 이 타일에 해당 UnitData를 중첩할 수 있는지 확인\r\n        /// 조건 : 동일 unitName + 동일 grade + 동일 _type + 스택 여유 있음\r\n        /// 제외 : HEROIC_GRADE(4) 유닛은 스택 불가\r\n        /// </summary>\r\n        public bool CanStack(UnitData data)\r\n        {\r\n            if (data == null)\r\n            {\r\n                Debug.LogWarning(\"[TileNode] CanStack : data null\");\r\n                return false;\r\n            }\r\n\r\n            // 주의 : HEROIC_GRADE(4) = grade 기준값\r\n            //        (int)UnitRatingType.HEROIC(=3)과 다름 — 혼용 금지\r\n            if (data.grade == HEROIC_GRADE) return false;\r\n            if (stackedUnits == null || stackedUnits.Count == 0) return false;\r\n            if (stackedUnits.Count >= maxStack) return false;\r\n\r\n            UnitData first = stackedUnits[0]?.data;\r\n            if (first == null)\r\n            {\r\n                Debug.LogWarning(\"[TileNode] CanStack : stackedUnits[0].data null\");\r\n                return false;\r\n            }\r\n\r\n            if (first.grade == HEROIC_GRADE) return false;\r\n\r\n            return first.unitName == data.unitName\r\n                && first.grade    == data.grade\r\n                && first._type    == data._type;\r\n        }\r\n\r\n        /// <summary>스택이 꽉 찼는지 확인 (조합 조건 판단용)</summary>\r\n        public bool IsStackFull() => stackedUnits.Count >= maxStack;\r\n\r\n\r\n        // ================================================================\r\n        // 유닛 추가 / 제거\r\n        // ================================================================\r\n\r\n        public void AddUnit(UnitClass unit)\r\n        {\r\n            stackedUnits.Add(unit);\r\n            isOccupied = true;\r\n            unit.SetCurrentTile(this);\r\n            RefreshStackVisual();\r\n            RefreshColor();\r\n\r\n            tileType = TileType.Forbidden;\r\n\r\n            // 발행 수신 : UIManager 또는 UI 갱신 구독자\r\n            UnitEventBus.RaiseUnitAddedToTile(this);\r\n        }\r\n\r\n        public void RemoveUnit(UnitClass unit)\r\n        {\r\n            stackedUnits.Remove(unit);\r\n            if (stackedUnits.Count == 0)\r\n                isOccupied = false;\r\n            RefreshStackVisual();\r\n            RefreshColor();\r\n\r\n            tileType = TileType.Playable;\r\n\r\n            // 발행 수신 : UIManager 또는 UI 갱신 구독자\r\n            UnitEventBus.RaiseUnitRemovedFromTile(this);\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 스택 시각 배치\r\n        // ================================================================\r\n\r\n        private void RefreshStackVisual()\r\n        {\r\n            for (int i = 0; i < stackedUnits.Count; i++)\r\n            {\r\n                Vector3 offset = GetStackOffset(i, stackedUnits.Count);\r\n                stackedUnits[i].transform.position = new Vector3(\r\n                    transform.position.x + offset.x,\r\n                    transform.position.y + offset.y,\r\n                    transform.position.z + UNIT_Z_OFFSET\r\n                );\r\n            }\r\n        }\r\n\r\n        private Vector3 GetStackOffset(int index, int total)\r\n        {\r\n            float spacing = 0.2f;\r\n\r\n            if (total == 1) return Vector3.zero;\r\n\r\n            if (total == 2)\r\n            {\r\n                return index == 0\r\n                    ? new Vector3(-spacing, 0f, 0f)\r\n                    : new Vector3( spacing, 0f, 0f);\r\n            }\r\n\r\n            return index switch\r\n            {\r\n                0 => new Vector3(-spacing, -spacing * 0.5f, 0f),\r\n                1 => new Vector3( spacing, -spacing * 0.5f, 0f),\r\n                2 => new Vector3(0f,        spacing,        0f),\r\n                _ => Vector3.zero\r\n            };\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 색상 제어\r\n        // ================================================================\r\n\r\n        public void OnHover()\r\n        {\r\n            // Corridor는 호버 피드백 없음\r\n            if (tileType != TileType.Playable) return;\r\n\r\n            // 유닛 있는 타일은 밝게, 빈 타일은 hoverColor\r\n            if (isOccupied)\r\n                SetColor(Color.Lerp(occupiedColor, Color.white, 0.3f));\r\n            else\r\n                SetColor(hoverColor);\r\n        }\r\n\r\n        //public void OnSelected()   => SetColor(selectedColor);\r\n        //public void OnDeselected()\r\n        //{\r\n        //    isSelected = false; // 내부 데이터 해제\r\n        //    RefreshColor();     // 이제 isSelected가 false이므로 기본색이나 occupiedColor로 돌아감\r\n        //}\r\n        //public void RefreshColor() => SetColor(isOccupied ? occupiedColor : _defaultColor);\r\n\r\n        private void SetColor(Color color)\r\n        {\r\n            if (_spriteRenderer != null)\r\n                _spriteRenderer.color = color;\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // [추가]색상 제어 (우선순위: Selected > Occupied > Default)\r\n        // ================================================================\r\n\r\n        public void OnSelected()\r\n        {\r\n            isSelected = true; // 선택 상태 저장\r\n            RefreshColor();\r\n        }\r\n\r\n        public void OnDeselected()\r\n        {\r\n            isSelected = false; // 선택 해제 상태 저장\r\n            RefreshColor();\r\n        }\r\n\r\n        public void RefreshColor()\r\n        {\r\n            // 1순위: 선택 상태\r\n            if (isSelected)\r\n            {\r\n                SetColor(selectedColor);\r\n                return;\r\n            }\r\n\r\n            // 2순위: 점유 상태 (등급별 색상 적용)\r\n            if (isOccupied && stackedUnits.Count > 0)\r\n            {\r\n                SetColor(GetGradeColor());\r\n            }\r\n            // 3순위: 기본 상태\r\n            else\r\n            {\r\n                SetColor(_defaultColor);\r\n            }\r\n        }\r\n\r\n        private Color GetGradeColor()\r\n        {\r\n            if (stackedUnits.Count == 0 || stackedUnits[0].data == null)\r\n                return normalColor;\r\n\r\n            int grade = stackedUnits[0].data.grade;\r\n\r\n            return grade switch\r\n            {\r\n                2 => rareColor,   // RARE\r\n                3 => epicColor,   // EPIC\r\n                4 => heroicColor, // HEROIC (HEROIC_GRADE)\r\n                _ => normalColor  // NORMAL (1) 및 기타\r\n            };\r\n        }\r\n\r\n        public void SetType(TileType newType)\r\n        {\r\n            tileType = newType;\r\n        }\r\n    }\r\n}\r\n","lines":316},{"id":"02_Scripts/Enemy/EnemyAI.cs","name":"EnemyAI","path":"02_Scripts/Enemy/EnemyAI.cs","layer":"Enemy","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"class EnemyAI : MonoBehaviour","src":"using UnityEngine;\r\nusing System.Collections.Generic;\r\nusing System.Collections;\r\nusing LuckyRandomDefense.Node;\r\nusing LuckyRandomDefense.Core;\r\n\r\nnamespace LuckyRandomDefense.Enemy\r\n{\r\n    public class EnemyAI : MonoBehaviour\r\n    {\r\n        private PathFinder _pathFinder;\r\n        private List<TileNode> _currentPath;\r\n        private int _targetIndex;\r\n        public float _moveSpeed = 2f;\r\n\r\n        //[추가]\r\n        public Vector3 MoveDirection { get; private set; }\r\n        public List<TileNode> CurrentPath => _currentPath; \r\n        public int TargetIndex => _targetIndex;\r\n        //\r\n\r\n        private void OnEnable()\r\n        {\r\n            if(EnemyManager.Instance != null)\r\n            {\r\n                EnemyManager.Instance.RegisterEnemey(this);\r\n            }\r\n        }\r\n        private void OnDisable()\r\n        {\r\n            if(EnemyManager.Instance != null)\r\n            {\r\n                EnemyManager.Instance.UnregisterEnemy(this);\r\n            }\r\n        }\r\n\r\n        private void Update()\r\n        {\r\n            MoveAlongPath();\r\n        }\r\n\r\n        private void MoveAlongPath()\r\n        {\r\n            if (_currentPath == null || _targetIndex >= _currentPath.Count)\r\n            {\r\n                ReachedGoal();\r\n                return;\r\n            }\r\n\r\n            Vector3 targetPos = _currentPath[_targetIndex].transform.position;\r\n            targetPos.z = transform.position.z;\r\n\r\n            //[추가]\r\n            Vector3 dir = (targetPos - transform.position).normalized;\r\n            if (dir != Vector3.zero) MoveDirection = dir;\r\n            //\r\n\r\n            transform.position = Vector3.MoveTowards(transform.position, targetPos, _moveSpeed * Time.deltaTime);\r\n\r\n            if(Vector3.Distance(transform.position, targetPos) < 0.05f)\r\n            {\r\n                _targetIndex++;\r\n\r\n                if(_targetIndex >= _currentPath.Count )\r\n                {\r\n                    ReachedGoal();\r\n                }\r\n            }\r\n        }\r\n\r\n        public void InitializePath()\r\n        {\r\n            var map = ProceduralMap.Instance;\r\n\r\n            _pathFinder = map.GetComponent<PathFinder>();\r\n            _currentPath = _pathFinder.FindPath(map.SpawnPos, map.GoalPos);\r\n            _targetIndex = 0;\r\n        }\r\n\r\n        private void ReachedGoal()\r\n        {\r\n            Debug.Log($\"{gameObject.name} 목적지 도착\");\r\n\r\n            _targetIndex = 0;\r\n\r\n            gameObject.SetActive( false );\r\n\r\n            // Life 감소 추가\r\n            GameManager.Instance.DecreaseLife();\r\n        }\r\n\r\n        public void SetSpeed(float speed)\r\n        {\r\n            _moveSpeed = speed;\r\n        }\r\n\r\n\r\n\r\n       \r\n\r\n        \r\n    }\r\n}\r\n","lines":104},{"id":"02_Scripts/Tutorial/TutorialManager.cs","name":"TutorialManager","path":"02_Scripts/Tutorial/TutorialManager.cs","layer":"Tutorial","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"오버레이 자식의 모든 Image raycastTarget을 끈다. 단, Button_Next의 Image는 살려둬서 다음 버튼은 클릭 가능하게 유지.","src":"// =================================================================\n// TutorialManager.cs\n// 역할 : 튜토리얼 시퀀스 실행 + 진행 제어\n//\n// 부착 위치 : 씬에 빈 GameObject 만들어 부착 (예: \"TutorialManager\")\n//              또는 ManagersRoot 자식\n//\n// 인스펙터 연결\n// - tutorialOverlay : TutorialOverlay GameObject (자동 생성 결과물)\n// - defaultSequence : 기본 시작 시퀀스 (StartTutorial 호출 시 null이면 이걸 사용)\n//\n// 사용\n//   TutorialManager.Instance.StartTutorial();           // 기본 시퀀스 시작\n//   TutorialManager.Instance.StartTutorial(otherSeq);   // 다른 시퀀스\n//\n// 게임 이벤트 알림 (다른 코드에서 호출)\n//   TutorialManager.Instance?.NotifyUnitSummoned();\n//   TutorialManager.Instance?.NotifyUnitUpgraded();\n//   TutorialManager.Instance?.NotifyHeroCreated();\n//   TutorialManager.Instance?.NotifyWaveEnded(waveIdx);\n//   TutorialManager.Instance?.NotifyEnemyDefeated();\n// =================================================================\n\nusing System.Collections;\nusing System.Collections.Generic;\nusing DG.Tweening;\nusing TMPro;\nusing UnityEngine;\nusing UnityEngine.UI;\nusing LuckyRandomDefense.Core;\n\nnamespace LuckyRandomDefense.Tutorial\n{\n    public class TutorialManager : MonoBehaviour\n    {\n        public static TutorialManager Instance { get; private set; }\n\n        [Header(\"필수 참조\")]\n        [SerializeField] private GameObject tutorialOverlay;  // Canvas_Tutorial/TutorialOverlay\n        [SerializeField] private TutorialSequence defaultSequence;\n\n        // ── 내부 캐시 (TutorialOverlay 자식들) ────────────────────\n        private RectTransform _highlight;\n        private RectTransform _handIcon;\n        private RectTransform _messageBox;\n        private TextMeshProUGUI _messageText;\n        private Button _nextButton;\n\n        // ── 진행 상태 ─────────────────────────────────────────────\n        private TutorialSequence _sequence;\n        private int _currentStepIndex = -1;\n        private int _triggerCount = 0;\n        private bool _isRunning = false;\n        private Coroutine _autoAdvanceCoroutine;\n        private Tween _handBobTween;\n        private Tween _highlightPulseTween;\n\n        // ================================================================\n        // 라이프사이클\n        // ================================================================\n\n        private void Awake()\n        {\n            Debug.Log(\"[TutorialManager] Awake\");\n\n            if (Instance == null)\n            {\n                Instance = this;\n            }\n            else\n            {\n                Debug.LogWarning(\"[TutorialManager] 중복 인스턴스 → 파괴\");\n                Destroy(gameObject);\n                return;\n            }\n\n            if (tutorialOverlay == null)\n            {\n                Debug.LogError(\"[TutorialManager] tutorialOverlay 미연결 → 인스펙터 확인\");\n                return;\n            }\n\n            CacheOverlayChildren();\n        }\n\n        private void CacheOverlayChildren()\n        {\n            _highlight   = FindChildRT(\"Highlight\");\n            _handIcon    = FindChildRT(\"HandIcon\");\n            _messageBox  = FindChildRT(\"MessageBox\");\n\n            if (_messageBox != null)\n            {\n                var txt = _messageBox.Find(\"Text_Message\");\n                if (txt != null) _messageText = txt.GetComponent<TextMeshProUGUI>();\n\n                var nextBtnGo = _messageBox.Find(\"Button_Next\");\n                if (nextBtnGo != null)\n                {\n                    _nextButton = nextBtnGo.GetComponent<Button>();\n                    if (_nextButton != null)\n                        _nextButton.onClick.AddListener(OnClickNext);\n                }\n            }\n\n            // 안전망: 오버레이 시각 요소가 게임 입력을 막지 않도록 raycastTarget 강제 OFF\n            // (Highlight, HandIcon, MessageBox 본체, Dimmed 등 모든 Image — Button_Next 자식만 예외)\n            DisableOverlayRaycasts();\n\n            Debug.Log($\"[TutorialManager] 캐싱 완료 | highlight={(_highlight != null)} hand={(_handIcon != null)} \" +\n                      $\"msgBox={(_messageBox != null)} msgText={(_messageText != null)} nextBtn={(_nextButton != null)}\");\n        }\n\n        /// <summary>\n        /// 오버레이 자식의 모든 Image raycastTarget을 끈다.\n        /// 단, Button_Next의 Image는 살려둬서 다음 버튼은 클릭 가능하게 유지.\n        /// </summary>\n        private void DisableOverlayRaycasts()\n        {\n            if (tutorialOverlay == null) return;\n\n            var images = tutorialOverlay.GetComponentsInChildren<Image>(true);\n            int turnedOff = 0;\n            foreach (var img in images)\n            {\n                // Button_Next 자식이거나 Button 컴포넌트가 같이 붙은 Image는 예외\n                bool isInteractive = img.gameObject == (_nextButton != null ? _nextButton.gameObject : null);\n                if (!isInteractive && img.GetComponent<Button>() == null)\n                {\n                    if (img.raycastTarget)\n                    {\n                        img.raycastTarget = false;\n                        turnedOff++;\n                    }\n                }\n            }\n            Debug.Log($\"[TutorialManager] 오버레이 raycast 차단 해제: {turnedOff}개 Image (게임 입력 통과)\");\n        }\n\n        private RectTransform FindChildRT(string name)\n        {\n            if (tutorialOverlay == null) return null;\n            var t = tutorialOverlay.transform.Find(name);\n            if (t == null)\n            {\n                Debug.LogWarning($\"[TutorialManager] '{name}' 자식 못 찾음\");\n                return null;\n            }\n            return t as RectTransform;\n        }\n\n        // ================================================================\n        // 외부 API — 시작/종료\n        // ================================================================\n\n        /// <summary>튜토리얼 시퀀스 시작</summary>\n        public void StartTutorial(TutorialSequence sequence = null)\n        {\n            if (_isRunning)\n            {\n                Debug.LogWarning(\"[TutorialManager] 이미 진행 중 → 무시\");\n                return;\n            }\n\n            _sequence = sequence != null ? sequence : defaultSequence;\n            if (_sequence == null || _sequence.steps == null || _sequence.steps.Count == 0)\n            {\n                Debug.LogError(\"[TutorialManager] 유효한 시퀀스 없음 → 시작 불가\");\n                return;\n            }\n\n            Debug.Log($\"[TutorialManager] 튜토리얼 시작: {_sequence.sequenceName} (스텝 {_sequence.steps.Count}개)\");\n\n            _isRunning = true;\n            _currentStepIndex = -1;\n\n            // 오버레이 + 부모 체인 강제 활성화 (Canvas_Tutorial 자체가 꺼져있는 케이스 방지)\n            if (tutorialOverlay != null)\n            {\n                Transform t = tutorialOverlay.transform;\n                int depth = 0;\n                while (t != null && depth < 10)\n                {\n                    if (!t.gameObject.activeSelf)\n                    {\n                        Debug.Log($\"[TutorialManager] 부모 활성화: {t.name} (was inactive)\");\n                        t.gameObject.SetActive(true);\n                    }\n                    t = t.parent;\n                    depth++;\n                }\n\n                tutorialOverlay.SetActive(true);\n\n                var canvas = tutorialOverlay.GetComponentInParent<Canvas>(true);\n                Debug.Log($\"[TutorialManager] 오버레이 활성화 완료 | overlay.active={tutorialOverlay.activeInHierarchy} \" +\n                          $\"canvas={(canvas != null ? canvas.name : \"null\")} canvasEnabled={(canvas != null && canvas.enabled)} \" +\n                          $\"sortOrder={(canvas != null ? canvas.sortingOrder : -1)}\");\n\n                // 늦은 시점에 캐싱이 안 됐을 수도 있으니 보장\n                if (_highlight == null || _messageText == null)\n                {\n                    Debug.LogWarning(\"[TutorialManager] 캐시 비어있음 → 재캐싱\");\n                    CacheOverlayChildren();\n                }\n            }\n            else\n            {\n                Debug.LogError(\"[TutorialManager] tutorialOverlay 미연결 → 비주얼 표시 불가\");\n            }\n\n            AdvanceStep();\n        }\n\n        /// <summary>튜토리얼 강제 종료 (스킵 등)</summary>\n        public void EndTutorial(bool markCompleted = true)\n        {\n            if (!_isRunning) return;\n\n            Debug.Log($\"[TutorialManager] 튜토리얼 종료 (markCompleted={markCompleted})\");\n\n            _isRunning = false;\n            _currentStepIndex = -1;\n            _triggerCount = 0;\n\n            if (_autoAdvanceCoroutine != null) StopCoroutine(_autoAdvanceCoroutine);\n            _autoAdvanceCoroutine = null;\n\n            _handBobTween?.Kill();\n            _handBobTween = null;\n\n            if (tutorialOverlay != null) tutorialOverlay.SetActive(false);\n\n            // 완료 저장\n            if (markCompleted && _sequence != null && _sequence.markTutorialCompletedOnEnd)\n            {\n                if (UserDataManager.Instance != null)\n                {\n                    UserDataManager.Instance.SetTutorialCompleted();\n\n                    var stage = GameManager.Instance?.GetCurrentStage();\n                    if (stage != null && stage.isTutorial)\n                        GameManager.Instance.ReturnToTitleScreen();\n                    Debug.Log(\"[TutorialManager] tutorialCompleted=true 저장 + NORMAL/HARD 해금\");\n                }\n                else\n                {\n                    Debug.LogWarning(\"[TutorialManager] UserDataManager null → 완료 저장 실패\");\n                }\n            }\n        }\n\n        // ================================================================\n        // 진행\n        // ================================================================\n\n        private void AdvanceStep()\n        {\n            _currentStepIndex++;\n            _triggerCount = 0;\n\n            if (_autoAdvanceCoroutine != null)\n            {\n                StopCoroutine(_autoAdvanceCoroutine);\n                _autoAdvanceCoroutine = null;\n            }\n\n            if (_currentStepIndex >= _sequence.steps.Count)\n            {\n                Debug.Log(\"[TutorialManager] 모든 스텝 완료\");\n                EndTutorial(true);\n                return;\n            }\n\n            var step = _sequence.steps[_currentStepIndex];\n            Debug.Log($\"[TutorialManager] 스텝 {_currentStepIndex}/{_sequence.steps.Count - 1} 진입: \" +\n                      $\"{step.stepId} | trigger={step.trigger}({step.triggerCount}회) target='{step.targetUIName}'\");\n\n            ApplyStep(step);\n        }\n\n        private void ApplyStep(TutorialStep step)\n        {\n            // 메시지\n            if (_messageText != null) _messageText.text = step.message;\n\n            // 다음 버튼\n            if (_nextButton != null) _nextButton.gameObject.SetActive(step.showNextButton);\n\n            // 강조 대상 좌표 잡기\n            RectTransform targetRt = null;\n            if (!step.hideHighlight && !string.IsNullOrEmpty(step.targetUIName))\n            {\n                targetRt = FindUIByName(step.targetUIName);\n                if (targetRt == null)\n                    Debug.LogWarning($\"[TutorialManager] 강조 대상 '{step.targetUIName}' 못 찾음 → 강조 생략\");\n            }\n\n            // Highlight + Hand 표시/이동\n            bool shouldHighlight = !step.hideHighlight && targetRt != null;\n            Debug.Log($\"[TutorialManager] ApplyStep | hideHighlight={step.hideHighlight} target='{step.targetUIName}' \" +\n                      $\"targetFound={(targetRt != null)} shouldHighlight={shouldHighlight} \" +\n                      $\"highlightRef={(_highlight != null)} handRef={(_handIcon != null)} msgTextRef={(_messageText != null)} \" +\n                      $\"msgLen={(step.message != null ? step.message.Length : -1)}\");\n            if (_highlight != null) _highlight.gameObject.SetActive(shouldHighlight);\n            if (_handIcon != null) _handIcon.gameObject.SetActive(shouldHighlight);\n\n            if (shouldHighlight)\n            {\n                MoveHighlightToTarget(targetRt);\n                StartHandBobAnimation();\n                StartHighlightPulseAnimation();\n            }\n            else\n            {\n                _handBobTween?.Kill();\n                _highlightPulseTween?.Kill();\n            }\n\n            // 메시지 박스 위치 오프셋\n            if (_messageBox != null)\n            {\n                _messageBox.anchoredPosition = new Vector2(0f, 200f) + step.messageBoxOffset;\n            }\n\n            // 자동 진행 타이머\n            if (step.autoAdvanceDelay > 0f)\n            {\n                _autoAdvanceCoroutine = StartCoroutine(AutoAdvanceRoutine(step.autoAdvanceDelay));\n            }\n\n            // [신규] 자동 오버레이 페이드아웃 — 강조 대상이 없는 자유운영 스텝에서 화면 가시성 확보\n            // Dimmed/MessageBox만 페이드아웃, 트리거 대기(WaveEnded 등)는 계속 살아있음\n            if (_autoHideCoroutine != null)\n            {\n                StopCoroutine(_autoHideCoroutine);\n                _autoHideCoroutine = null;\n            }\n            if (step.autoHideOverlaySeconds > 0f)\n            {\n                _autoHideCoroutine = StartCoroutine(\n                    AutoHideOverlayRoutine(step.autoHideOverlaySeconds, step.autoHideFadeDuration));\n            }\n            else\n            {\n                // 다음 스텝에선 보이도록 복원\n                RestoreOverlayVisibility();\n            }\n\n            // 트리거가 None이고 다음 버튼도 없고 자동 진행도 없으면 → 데드락 경고\n            if (step.trigger == TutorialTriggerType.None\n                && !step.showNextButton\n                && step.autoAdvanceDelay <= 0f)\n            {\n                Debug.LogError($\"[TutorialManager] 스텝 '{step.stepId}' 진행 조건 없음 (trigger/nextButton/autoAdvance 모두 없음) → 멈춤\");\n            }\n        }\n\n        // ─────────────────────────────────────────────────────────\n        // 자동 오버레이 페이드 (자유운영 스텝용)\n        // ─────────────────────────────────────────────────────────\n        private Coroutine _autoHideCoroutine;\n        private CanvasGroup _dimmedCanvasGroup;\n        private CanvasGroup _messageBoxCanvasGroup;\n\n        private IEnumerator AutoHideOverlayRoutine(float delay, float fadeDuration)\n        {\n            Debug.Log($\"[TutorialManager] AutoHide 대기 시작 ({delay}s 후 페이드아웃)\");\n            yield return new WaitForSecondsRealtime(delay);\n\n            EnsureFadeCanvasGroups();\n\n            float t = 0f;\n            float dur = Mathf.Max(0.01f, fadeDuration);\n            float dimStart  = _dimmedCanvasGroup     != null ? _dimmedCanvasGroup.alpha     : 1f;\n            float msgStart  = _messageBoxCanvasGroup != null ? _messageBoxCanvasGroup.alpha : 1f;\n\n            while (t < dur)\n            {\n                t += Time.unscaledDeltaTime;\n                float p = 1f - Mathf.Clamp01(t / dur);\n                if (_dimmedCanvasGroup     != null) _dimmedCanvasGroup.alpha     = dimStart * p;\n                if (_messageBoxCanvasGroup != null) _messageBoxCanvasGroup.alpha = msgStart * p;\n                yield return null;\n            }\n            if (_dimmedCanvasGroup     != null) _dimmedCanvasGroup.alpha     = 0f;\n            if (_messageBoxCanvasGroup != null) _messageBoxCanvasGroup.alpha = 0f;\n            Debug.Log(\"[TutorialManager] AutoHide 페이드아웃 완료 — 트리거 대기 계속 (Highlight/HandIcon은 hideHighlight=true라 이미 꺼져있음)\");\n        }\n\n        private void RestoreOverlayVisibility()\n        {\n            EnsureFadeCanvasGroups();\n            if (_dimmedCanvasGroup     != null) _dimmedCanvasGroup.alpha     = 1f;\n            if (_messageBoxCanvasGroup != null) _messageBoxCanvasGroup.alpha = 1f;\n        }\n\n        /// <summary>Dimmed/MessageBox에 CanvasGroup이 없으면 동적으로 부착해서 페이드 가능하게</summary>\n        private void EnsureFadeCanvasGroups()\n        {\n            if (tutorialOverlay == null) return;\n\n            if (_dimmedCanvasGroup == null)\n            {\n                var dimmed = tutorialOverlay.transform.Find(\"Dimmed\");\n                if (dimmed != null)\n                {\n                    _dimmedCanvasGroup = dimmed.GetComponent<CanvasGroup>();\n                    if (_dimmedCanvasGroup == null)\n                        _dimmedCanvasGroup = dimmed.gameObject.AddComponent<CanvasGroup>();\n                }\n            }\n            if (_messageBoxCanvasGroup == null && _messageBox != null)\n            {\n                _messageBoxCanvasGroup = _messageBox.GetComponent<CanvasGroup>();\n                if (_messageBoxCanvasGroup == null)\n                    _messageBoxCanvasGroup = _messageBox.gameObject.AddComponent<CanvasGroup>();\n            }\n        }\n\n        private IEnumerator AutoAdvanceRoutine(float delay)\n        {\n            yield return new WaitForSecondsRealtime(delay);\n            Debug.Log($\"[TutorialManager] 자동 진행 ({delay}s 경과)\");\n            AdvanceStep();\n        }\n\n        // ================================================================\n        // Highlight 위치 이동\n        // ================================================================\n\n        private void MoveHighlightToTarget(RectTransform target)\n        {\n            if (_highlight == null || target == null) return;\n\n            // 강조 영역을 target의 월드 좌표에 맞춤\n            // (TutorialOverlay와 target이 다른 Canvas일 수 있어서 월드 좌표 사용)\n            Vector3 worldPos = target.position;\n            _highlight.position = worldPos;\n\n            // 크기를 target 크기에 맞춤 (월드 → 로컬 변환)\n            Vector2 targetSize = target.rect.size * target.lossyScale;\n            Vector2 highlightScale = _highlight.lossyScale;\n            if (highlightScale.x > 0f && highlightScale.y > 0f)\n                _highlight.sizeDelta = new Vector2(targetSize.x / highlightScale.x, targetSize.y / highlightScale.y);\n\n            // 손가락 아이콘은 강조 영역 아래쪽 가운데에 배치\n            if (_handIcon != null)\n            {\n                Vector3 handPos = worldPos;\n                handPos.y -= targetSize.y * 0.5f + 20f; // 약간 아래\n                _handIcon.position = handPos;\n            }\n\n            Debug.Log($\"[TutorialManager] Highlight 이동 → pos={worldPos} size={_highlight.sizeDelta}\");\n        }\n\n        /// <summary>Highlight Image의 알파를 펄스시켜 시인성 강화 (cyan 색 + 깜빡임)</summary>\n        private void StartHighlightPulseAnimation()\n        {\n            _highlightPulseTween?.Kill();\n\n            if (_highlight == null) return;\n            var img = _highlight.GetComponent<Image>();\n            if (img == null) return;\n\n            // 알파 0.25 ↔ 0.75 사이로 1.2초 주기 펄스\n            Color baseColor = img.color;\n            baseColor.a = 0.25f;\n            img.color = baseColor;\n\n            _highlightPulseTween = DOTween.To(\n                    () => img.color.a,\n                    a => { var c = img.color; c.a = a; img.color = c; },\n                    0.75f, 0.6f)\n                .SetEase(Ease.InOutSine)\n                .SetLoops(-1, LoopType.Yoyo)\n                .SetUpdate(true)\n                .SetLink(_highlight.gameObject);\n\n            // Scale 살짝 펄스 (1.0 ↔ 1.08)\n            _highlight.localScale = Vector3.one;\n            _highlight.DOScale(1.08f, 0.6f)\n                .SetEase(Ease.InOutSine)\n                .SetLoops(-1, LoopType.Yoyo)\n                .SetUpdate(true)\n                .SetLink(_highlight.gameObject);\n        }\n\n        private void StartHandBobAnimation()\n        {\n            _handBobTween?.Kill();\n\n            if (_handIcon == null) return;\n\n            // 손가락 위아래로 까딱\n            Vector3 basePos = _handIcon.localPosition;\n            _handBobTween = _handIcon\n                .DOLocalMoveY(basePos.y - 20f, 0.5f)\n                .SetEase(Ease.InOutSine)\n                .SetLoops(-1, LoopType.Yoyo)\n                .SetUpdate(true)  // Time.timeScale 무시 (일시정지 중에도 동작)\n                .SetLink(_handIcon.gameObject);\n        }\n\n        // ================================================================\n        // UI 찾기 (비활성 포함)\n        // ================================================================\n\n        private RectTransform FindUIByName(string name)\n        {\n            // 비활성 오브젝트까지 검색\n            // (GameObject.Find는 비활성 못 찾음)\n            var allRects = Resources.FindObjectsOfTypeAll<RectTransform>();\n            foreach (var rt in allRects)\n            {\n                if (rt.name != name) continue;\n                // 프리팹 에셋 제외 (씬 안의 인스턴스만)\n                if (!rt.gameObject.scene.IsValid()) continue;\n                return rt;\n            }\n            return null;\n        }\n\n        // ================================================================\n        // 외부 알림 메서드 (게임 코드에서 호출)\n        // ================================================================\n\n        public void NotifyUnitSummoned()     => OnTriggerFired(TutorialTriggerType.UnitSummoned);\n        public void NotifyUnitUpgraded()     => OnTriggerFired(TutorialTriggerType.UnitUpgraded);\n        public void NotifyHeroCreated()      => OnTriggerFired(TutorialTriggerType.HeroCreated);\n        public void NotifyWaveEnded(int idx) => OnTriggerFired(TutorialTriggerType.WaveEnded);\n        public void NotifyEnemyDefeated()    => OnTriggerFired(TutorialTriggerType.EnemyDefeated);\n\n        private void OnTriggerFired(TutorialTriggerType type)\n        {\n            if (!_isRunning) return;\n            if (_sequence == null || _currentStepIndex < 0 || _currentStepIndex >= _sequence.steps.Count) return;\n\n            var step = _sequence.steps[_currentStepIndex];\n            if (step.trigger != type) return; // 현재 스텝과 무관\n\n            _triggerCount++;\n            Debug.Log($\"[TutorialManager] 트리거 '{type}' 카운트 {_triggerCount}/{step.triggerCount}\");\n\n            if (_triggerCount >= step.triggerCount)\n            {\n                Debug.Log(\"[TutorialManager] 트리거 조건 충족 → 다음 스텝\");\n                AdvanceStep();\n            }\n        }\n\n        // ================================================================\n        // 버튼 콜백\n        // ================================================================\n\n        private void OnClickNext()\n        {\n            if (!_isRunning) return;\n\n            var step = _sequence.steps[_currentStepIndex];\n            if (!step.showNextButton)\n            {\n                Debug.LogWarning(\"[TutorialManager] '다음' 버튼이 안 보이는 스텝에서 클릭됨 → 무시\");\n                return;\n            }\n\n            Debug.Log(\"[TutorialManager] '다음' 버튼 클릭 → 진행\");\n            AdvanceStep();\n        }\n    }\n}\n","lines":573},{"id":"02_Scripts/Tutorial/TutorialStartTrigger.cs","name":"TutorialStartTrigger","path":"02_Scripts/Tutorial/TutorialStartTrigger.cs","layer":"Tutorial","scenes":["HCH(한충희)"],"entry":true,"summary":"TutorialStartTrigger.cs 역할 : 게임 시작 시 조건에 맞으면 튜토리얼 자동 시작 부착 위치 : 인게임 씬의 매니저 오브젝트 자식 (예: ManagersRoot/TutorialStartTrigger) 동작 - 현재 스테이지가 isTutorial true 인 경우만 시도 - 이미 튜토리얼을 클리어한 적이 있으면 건너뜀 - 게임 상태가 WAVE_READY 진입 시 시작 (게임 시작 직후)","src":"﻿// =================================================================\n// TutorialStartTrigger.cs\n// 역할 : 게임 시작 시 조건에 맞으면 튜토리얼 자동 시작\n//\n// 부착 위치 : 인게임 씬의 매니저 오브젝트 자식\n//             (예: ManagersRoot/TutorialStartTrigger)\n//\n// 동작\n//  - 현재 스테이지가 isTutorial=true 인 경우만 시도\n//  - 이미 튜토리얼을 클리어한 적이 있으면 건너뜀\n//  - 게임 상태가 WAVE_READY 진입 시 시작 (게임 시작 직후)\n// =================================================================\n\nusing UnityEngine;\nusing LuckyRandomDefense.Core;\nusing LuckyRandomDefense.Core.EventBus;\n\nnamespace LuckyRandomDefense.Tutorial\n{\n    public class TutorialStartTrigger : MonoBehaviour\n    {\n        [SerializeField] private TutorialSequence sequence;\n        [SerializeField] private float startDelay = 1.0f;\n\n        [Header(\"디버그\")]\n        [Tooltip(\"True면 이미 완료한 튜토리얼도 강제 실행\")]\n        [SerializeField] private bool forceStart = false;\n\n        private bool _hasTriggered = false;\n\n        private void OnEnable()\n        {\n            GameEventBus.OnGameStateChanged += HandleGameStateChanged;\n            Debug.Log(\"[TutorialStartTrigger] 이벤트 구독 완료\");\n        }\n\n        private void OnDisable()\n        {\n            GameEventBus.OnGameStateChanged -= HandleGameStateChanged;\n            Debug.Log(\"[TutorialStartTrigger] 이벤트 구독 해제\");\n        }\n\n        private void HandleGameStateChanged(GameState state)\n        {\n            if (_hasTriggered) return;\n            if (state != GameState.WAVE_READY) return;\n\n            _hasTriggered = true;\n            Invoke(nameof(TryStart), startDelay);\n        }\n\n        private void TryStart()\n        {\n            Debug.Log($\"[TutorialStartTrigger] TryStart 진입 | forceStart={forceStart} \" +\n                      $\"hasSequence={(sequence != null)} \" +\n                      $\"tutorialMgr={(TutorialManager.Instance != null)}\");\n\n            bool tutorialCompleted = UserDataManager.Instance != null\n                && UserDataManager.Instance.IsTutorialCompleted();\n\n            // 현재 스테이지가 튜토리얼인지 확인\n            var stage = GameManager.Instance?.GetCurrentStage();\n            if (stage == null)\n            {\n                if (forceStart)\n                {\n                    Debug.LogWarning(\"[TutorialStartTrigger] currentStage null이지만 forceStart=true → 진행\");\n                }\n                else\n                {\n                    Debug.LogWarning(\"[TutorialStartTrigger] currentStage null → 튜토리얼 스킵 \" +\n                                     \"(GameManager._defaultStage 또는 TitleScreen.fallbackStage 인스펙터 연결 확인)\");\n                    return;\n                }\n            }\n            else\n            {\n                Debug.Log($\"[TutorialStartTrigger] currentStage='{stage.stageName}' \" +\n                          $\"difficulty={stage.difficulty} isTutorial={stage.isTutorial}\");\n\n                bool shouldRunTutorial = stage.isTutorial\n                    || (stage.difficulty == DifficultyType.EASY && !tutorialCompleted);\n\n                if (!shouldRunTutorial)\n                {\n                    Debug.Log(\"[TutorialStartTrigger] 현재 스테이지가 튜토리얼 아님 → 스킵\");\n                    return;\n                }\n            }\n\n            // 이미 클리어한 경우 스킵 (forceStart 제외)\n            if (!forceStart && tutorialCompleted)\n            {\n                Debug.Log(\"[TutorialStartTrigger] 튜토리얼 이미 클리어 → 스킵 \" +\n                          \"(Tools > LuckyRandomDefense > Debug > Reset Tutorial Progress 로 초기화 가능)\");\n                return;\n            }\n\n            if (TutorialManager.Instance == null)\n            {\n                Debug.LogError(\"[TutorialStartTrigger] TutorialManager.Instance null → 시작 불가 \" +\n                               \"(씬에 TutorialManager 컴포넌트 존재 여부 확인)\");\n                return;\n            }\n\n            Debug.Log($\"[TutorialStartTrigger] 튜토리얼 시작 시도 (sequence={(sequence != null ? sequence.sequenceName : \"default\")})\");\n            TutorialManager.Instance.StartTutorial(sequence);\n        }\n    }\n}\n","lines":111},{"id":"02_Scripts/Lobby/Core/UserDataManager.cs","name":"UserDataManager","path":"02_Scripts/Lobby/Core/UserDataManager.cs","layer":"Lobby","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"세이브 파일 삭제 (디버그/테스트용)","src":"﻿using System;\r\nusing System.IO;\r\nusing UnityEngine;\r\nusing LuckyRandomDefense.Cloud;\r\n\r\n// ================================================================\r\n// UserDataManager.cs\r\n// 역할 : 로비 전체 데이터의 중앙 관리자 (Singleton)\r\n//        저장/로드, 재화, 영웅, 유물 관련 모든 데이터 조작 담당\r\n//        DontDestroyOnLoad로 인게임 씬까지 데이터 유지\r\n//\r\n// 의존성 : SaveData, HeroData\r\n// 주의   : 다른 스크립트에서 _data를 직접 수정하지 말 것\r\n//          반드시 이 Manager를 통해서만 수정할 것\r\n// ================================================================\r\n\r\npublic class UserDataManager : MonoBehaviour\r\n{\r\n    // ── 싱글톤 ────────────────────────────────────────────────────\r\n    public static UserDataManager Instance { get; private set; }\r\n\r\n    // ── 이벤트 (Observer) ─────────────────────────────────────────\r\n    // UI 스크립트들이 이 이벤트를 구독해서 데이터 변경을 감지\r\n    public static event Action<int> OnCurrencyChanged;\r\n    public static event Action<HeroSaveData> OnHeroUpdated;\r\n    public static event Action<RelicSaveData> OnRelicUpdated;\r\n    public static event Action OnRunSaveCompleted;\r\n\r\n    // ── 내부 데이터 ───────────────────────────────────────────────\r\n    private SaveData _data;\r\n\r\n    // 저장 경로\r\n    // Windows → %APPDATA%/../LocalLow/CompanyName/ProductName\r\n    // Android → /data/data/패키지명/files\r\n    private string SavePath => Path.Combine(Application.persistentDataPath, \"savedata.json\");\r\n\r\n\r\n    // ================================================================\r\n    // 초기화\r\n    // ================================================================\r\n\r\n    void Awake()\r\n    {\r\n        if (Instance == null)\r\n        {\r\n            Instance = this;\r\n            DontDestroyOnLoad(gameObject);\r\n            Load();\r\n        }\r\n        else\r\n        {\r\n            Debug.LogWarning(\"[UserDataManager] 중복 인스턴스 감지 → 파괴\");\r\n            Destroy(gameObject);\r\n        }\r\n    }\r\n\r\n\r\n    // ================================================================\r\n    // 저장 / 로드\r\n    // ================================================================\r\n\r\n    public void Save()\r\n    {\r\n        try\r\n        {\r\n            string json = JsonUtility.ToJson(_data, prettyPrint: true);\r\n            File.WriteAllText(SavePath, json);\r\n            Debug.Log($\"[UserDataManager] 저장 완료 → {SavePath}\");\r\n        }\r\n        catch (Exception e)\r\n        {\r\n            Debug.LogError($\"[UserDataManager] 저장 실패 : {e.Message}\");\r\n        }\r\n    }\r\n\r\n    public void Load()\r\n    {\r\n        try\r\n        {\r\n            if (File.Exists(SavePath))\r\n            {\r\n                string json = File.ReadAllText(SavePath);\r\n                _data = JsonUtility.FromJson<SaveData>(json);\r\n\r\n                if (_data == null)\r\n                {\r\n                    Debug.LogError(\"[UserDataManager] JSON 파싱 결과 null → 새 데이터로 대체\");\r\n                    _data = new SaveData();\r\n                }\r\n                else\r\n                {\r\n                    NormalizeLoadedData();\r\n                    Debug.Log($\"[UserDataManager] 로드 완료 | \" +\r\n                              $\"재화:{_data.lobbyCurrency} \" +\r\n                              $\"영웅:{_data.heroes.Count}명 \" +\r\n                              $\"유물:{_data.relics.Count}개\");\r\n                }\r\n            }\r\n            else\r\n            {\r\n                _data = new SaveData();\r\n                Debug.Log(\"[UserDataManager] 세이브 파일 없음 → 새 데이터 생성\");\r\n            }\r\n        }\r\n        catch (Exception e)\r\n        {\r\n            Debug.LogError($\"[UserDataManager] 로드 실패 : {e.Message} → 새 데이터 생성\");\r\n            _data = new SaveData();\r\n        }\r\n    }\r\n\r\n    private void NormalizeLoadedData()\r\n    {\r\n        if (_data == null) return;\r\n\r\n        bool changed = false;\r\n        if (_data.run == null)\r\n        {\r\n            _data.run = new RunSaveData();\r\n            changed = true;\r\n        }\r\n\r\n        int completedUnlock = (int)DifficultyType.HARD;\r\n        if (_data.tutorialCompleted && _data.unlockedDifficulty < completedUnlock)\r\n        {\r\n            _data.unlockedDifficulty = completedUnlock;\r\n            changed = true;\r\n            Debug.Log(\"[UserDataManager] 기존 튜토리얼 완료 세이브 보정 → HARD까지 해금\");\r\n        }\r\n\r\n        if (changed)\r\n            Save();\r\n    }\r\n\r\n    /// <summary>세이브 파일 삭제 (디버그/테스트용)</summary>\r\n    public void DeleteSave()\r\n    {\r\n        if (File.Exists(SavePath))\r\n        {\r\n            File.Delete(SavePath);\r\n            _data = new SaveData();\r\n            Debug.Log(\"[UserDataManager] 세이브 삭제 완료\");\r\n        }\r\n        else\r\n        {\r\n            Debug.LogWarning(\"[UserDataManager] 삭제할 세이브 파일 없음\");\r\n        }\r\n    }\r\n\r\n\r\n    // ================================================================\r\n    // 재화\r\n    // ================================================================\r\n\r\n    public int GetCurrency() => _data.lobbyCurrency;\r\n\r\n    public void AddCurrency(int amount)\r\n    {\r\n        if (amount <= 0)\r\n        {\r\n            Debug.LogWarning($\"[UserDataManager] AddCurrency에 0 이하 값 입력 : {amount}\");\r\n            return;\r\n        }\r\n\r\n        _data.lobbyCurrency += amount;\r\n        OnCurrencyChanged?.Invoke(_data.lobbyCurrency);\r\n        Debug.Log($\"[UserDataManager] 재화 획득 +{amount} → 현재:{_data.lobbyCurrency}\");\r\n        Save();\r\n    }\r\n\r\n    public bool SpendCurrency(int amount)\r\n    {\r\n        if (amount <= 0)\r\n        {\r\n            Debug.LogWarning($\"[UserDataManager] SpendCurrency에 0 이하 값 입력 : {amount}\");\r\n            return false;\r\n        }\r\n\r\n        if (_data.lobbyCurrency < amount)\r\n        {\r\n            Debug.Log($\"[UserDataManager] 재화 부족 | 필요:{amount} 보유:{_data.lobbyCurrency}\");\r\n            return false;\r\n        }\r\n\r\n        _data.lobbyCurrency -= amount;\r\n        OnCurrencyChanged?.Invoke(_data.lobbyCurrency);\r\n        Debug.Log($\"[UserDataManager] 재화 소모 -{amount} → 현재:{_data.lobbyCurrency}\");\r\n        Save();\r\n        return true;\r\n    }\r\n\r\n\r\n    // ================================================================\r\n    // 영웅\r\n    // ================================================================\r\n\r\n    /// <summary>SaveData에서 영웅 조회. 없으면 null 반환</summary>\r\n    public HeroSaveData GetHero(int heroId)\r\n    {\r\n        HeroSaveData hero = _data.heroes.Find(h => h.id == heroId);\r\n\r\n        if (hero == null)\r\n            Debug.LogWarning($\"[UserDataManager] GetHero : ID {heroId} 없음\");\r\n\r\n        return hero;\r\n    }\r\n\r\n    /// <summary>영웅 해금. 처음 해금 시 SaveData에 자동 등록</summary>\r\n    public bool UnlockHero(int heroId, HeroData heroData)\r\n    {\r\n        if (heroData == null)\r\n        {\r\n            Debug.LogError($\"[UserDataManager] UnlockHero : heroData null (ID:{heroId})\");\r\n            return false;\r\n        }\r\n\r\n        if (heroData.id != heroId)\r\n        {\r\n            Debug.LogError($\"[UserDataManager] UnlockHero : heroId({heroId})와 \" +\r\n                           $\"heroData.id({heroData.id}) 불일치\");\r\n            return false;\r\n        }\r\n\r\n        HeroSaveData hero = _data.heroes.Find(h => h.id == heroId);\r\n\r\n        if (hero == null)\r\n        {\r\n            hero = new HeroSaveData(heroId, 0, false);\r\n            _data.heroes.Add(hero);\r\n            Debug.Log($\"[UserDataManager] 영웅 {heroId} SaveData 신규 등록\");\r\n        }\r\n\r\n        if (hero.isUnlocked)\r\n        {\r\n            Debug.LogWarning($\"[UserDataManager] 영웅 {heroId} 이미 해금된 상태\");\r\n            return false;\r\n        }\r\n\r\n        if (!SpendCurrency(heroData.unlockCost)) return false;\r\n\r\n        hero.isUnlocked = true;\r\n        OnHeroUpdated?.Invoke(hero);\r\n        Save();\r\n        Debug.Log($\"[UserDataManager] 영웅 {heroId} ({heroData.heroName}) 해금 완료\");\r\n        return true;\r\n    }\r\n\r\n    /// <summary>영웅 레벨업. 레벨 달성 시 스킬 자동 해금</summary>\r\n    public bool UpgradeHero(int heroId, HeroData heroData)\r\n    {\r\n        if (heroData == null)\r\n        {\r\n            Debug.LogError($\"[UserDataManager] UpgradeHero : heroData null (ID:{heroId})\");\r\n            return false;\r\n        }\r\n\r\n        HeroSaveData hero = GetHero(heroId);\r\n        if (hero == null) return false;\r\n\r\n        if (!hero.isUnlocked)\r\n        {\r\n            Debug.LogWarning($\"[UserDataManager] 영웅 {heroId} 미해금 상태에서 레벨업 시도\");\r\n            return false;\r\n        }\r\n\r\n        if (hero.level >= heroData.maxLevel)\r\n        {\r\n            Debug.Log($\"[UserDataManager] 영웅 {heroId} 최대 레벨 도달 (Lv{heroData.maxLevel})\");\r\n            return false;\r\n        }\r\n\r\n        if (!SpendCurrency(heroData.upgradeCost)) return false;\r\n\r\n        hero.level++;\r\n        Debug.Log($\"[UserDataManager] 영웅 {heroId} 레벨업 → Lv{hero.level}\");\r\n\r\n        // 해당 레벨에서 해금되는 스킬 자동 활성화\r\n        foreach (HeroSkillData skill in heroData.skills)\r\n        {\r\n            if (skill.unlockLevel != hero.level) continue;\r\n\r\n            if (hero.unlockedSkillIds.Contains(skill.skillId))\r\n            {\r\n                Debug.LogWarning($\"[UserDataManager] 스킬 {skill.skillId} 이미 해금 → 중복 방지\");\r\n                continue;\r\n            }\r\n\r\n            hero.unlockedSkillIds.Add(skill.skillId);\r\n            Debug.Log($\"[UserDataManager] 스킬 해금 → {skill.skillName} \" +\r\n                      $\"(ID:{skill.skillId} 해금레벨:{skill.unlockLevel})\");\r\n        }\r\n\r\n        OnHeroUpdated?.Invoke(hero);\r\n        Save();\r\n        return true;\r\n    }\r\n\r\n\r\n    // ================================================================\r\n    // 유물\r\n    // ================================================================\r\n\r\n    /// <summary>SaveData에서 유물 조회. 없으면 null 반환</summary>\r\n    public RelicSaveData GetRelic(int relicId)\r\n    {\r\n        RelicSaveData relic = _data.relics.Find(r => r.id == relicId);\r\n\r\n        if (relic == null)\r\n            Debug.LogWarning($\"[UserDataManager] GetRelic : ID {relicId} 없음\");\r\n\r\n        return relic;\r\n    }\r\n\r\n    /// <summary>강화 가능 여부 : duplicateCount >= 2^level</summary>\r\n    public bool CanUpgradeRelic(int relicId)\r\n    {\r\n        RelicSaveData relic = GetRelic(relicId);\r\n        if (relic == null) return false;\r\n\r\n        int required = (int)Mathf.Pow(2, relic.level);\r\n        bool canUpgrade = relic.duplicateCount >= required;\r\n\r\n        Debug.Log($\"[UserDataManager] 유물 {relicId} 강화 가능:{canUpgrade} \" +\r\n                  $\"(보유:{relic.duplicateCount} / 필요:{required})\");\r\n        return canUpgrade;\r\n    }\r\n\r\n    /// <summary>유물 중복 획득 처리. 없으면 SaveData에 자동 등록</summary>\r\n    public void AddRelicDuplicate(int relicId)\r\n    {\r\n        RelicSaveData relic = _data.relics.Find(r => r.id == relicId);\r\n\r\n        if (relic == null)\r\n        {\r\n            relic = new RelicSaveData(relicId);\r\n            _data.relics.Add(relic);\r\n            Debug.Log($\"[UserDataManager] 유물 {relicId} SaveData 신규 등록\");\r\n        }\r\n\r\n        relic.duplicateCount++;\r\n        OnRelicUpdated?.Invoke(relic);\r\n        Debug.Log($\"[UserDataManager] 유물 {relicId} 중복 획득 → \" +\r\n                  $\"누적:{relic.duplicateCount}개 \" +\r\n                  $\"(강화 필요:{(int)Mathf.Pow(2, relic.level)}개)\");\r\n        Save();\r\n    }\r\n\r\n    /// <summary>유물 강화. 강화 후 duplicateCount 초기화</summary>\r\n    public bool UpgradeRelic(int relicId)\r\n    {\r\n        if (!CanUpgradeRelic(relicId))\r\n        {\r\n            Debug.Log($\"[UserDataManager] 유물 {relicId} 강화 조건 미달\");\r\n            return false;\r\n        }\r\n\r\n        RelicSaveData relic = GetRelic(relicId);\r\n\r\n        if (relic == null)\r\n        {\r\n            Debug.LogError($\"[UserDataManager] UpgradeRelic : CanUpgrade 통과했으나 \" +\r\n                           $\"relic null (ID:{relicId})\");\r\n            return false;\r\n        }\r\n\r\n        int prevLevel = relic.level;\r\n        relic.level++;\r\n        relic.duplicateCount = 0;\r\n\r\n        OnRelicUpdated?.Invoke(relic);\r\n        Save();\r\n        Debug.Log($\"[UserDataManager] 유물 {relicId} 강화 완료 Lv{prevLevel} → Lv{relic.level}\");\r\n        return true;\r\n    }\r\n\r\n\r\n    // ================================================================\r\n    // 인게임 연동\r\n    // ================================================================\r\n\r\n    /// <summary>\r\n    /// 인게임 씬에서 로비 데이터 전체 참조용\r\n    /// 주의 : 반환된 SaveData를 직접 수정하지 말 것 (읽기 전용)\r\n    /// </summary>\r\n    public SaveData GetAllData()\r\n    {\r\n        if (_data == null)\r\n        {\r\n            Debug.LogError(\"[UserDataManager] GetAllData : _data null → 빈 SaveData 반환\");\r\n            return new SaveData();\r\n        }\r\n        return _data;\r\n    }\r\n\r\n\r\n    // ================================================================\r\n    // 튜토리얼 / 난이도 해금\r\n    // ================================================================\r\n\r\n    public bool IsTutorialCompleted()\r\n    {\r\n        if (_data == null) return false;\r\n        return _data.tutorialCompleted;\r\n    }\r\n\r\n    public void SetTutorialCompleted()\r\n    {\r\n        if (_data == null) _data = new SaveData();\r\n\r\n        bool changed = false;\r\n        if (!_data.tutorialCompleted)\r\n        {\r\n            _data.tutorialCompleted = true;\r\n            changed = true;\r\n        }\r\n\r\n        int completedUnlock = (int)DifficultyType.HARD;\r\n        if (_data.unlockedDifficulty < completedUnlock)\r\n        {\r\n            _data.unlockedDifficulty = completedUnlock;\r\n            changed = true;\r\n        }\r\n\r\n        if (_data.run != null && _data.run.hasSavedRun)\r\n        {\r\n            _data.run = new RunSaveData { hasSavedRun = false };\r\n            changed = true;\r\n        }\r\n\r\n        if (!changed)\r\n        {\r\n            Debug.Log(\"[UserDataManager] 튜토리얼 완료/난이도 해금 상태 유지 → 저장 생략\");\r\n            return;\r\n        }\r\n\r\n        Save();\r\n        Debug.Log(\"[UserDataManager] 튜토리얼 완료 처리 → NORMAL/HARD 해금 + 이어하기 데이터 초기화\");\r\n\r\n        if (CloudSaveManager.Instance != null)\r\n        {\r\n            CloudSaveManager.Instance.Upload(\r\n                onSuccess: () => Debug.Log(\"[UserDataManager] 튜토리얼 완료 클라우드 동기화 완료\"),\r\n                onFail: () => Debug.LogWarning(\"[UserDataManager] 튜토리얼 완료 클라우드 동기화 실패 (로컬은 정상)\")\r\n            );\r\n        }\r\n    }\r\n\r\n    public bool IsDifficultyUnlocked(DifficultyType diff)\r\n    {\r\n        if (_data == null) return diff == DifficultyType.EASY;\r\n        return (int)diff <= _data.unlockedDifficulty;\r\n    }\r\n\r\n    public void UnlockDifficulty(DifficultyType diff)\r\n    {\r\n        if (_data == null) _data = new SaveData();\r\n        if ((int)diff <= _data.unlockedDifficulty)\r\n        {\r\n            Debug.Log($\"[UserDataManager] {diff} 이미 해금 상태 → 무시\");\r\n            return;\r\n        }\r\n        _data.unlockedDifficulty = (int)diff;\r\n        Save();\r\n        Debug.Log($\"[UserDataManager] 난이도 해금: {diff} (unlockedDifficulty={_data.unlockedDifficulty}) → 로컬 저장 완료\");\r\n\r\n        // 클라우드 동기화\r\n        if (CloudSaveManager.Instance != null)\r\n        {\r\n            CloudSaveManager.Instance.Upload(\r\n                onSuccess: () => Debug.Log($\"[UserDataManager] {diff} 해금 클라우드 동기화 완료\"),\r\n                onFail: () => Debug.LogWarning(\"[UserDataManager] 클라우드 동기화 실패 (로컬은 정상)\")\r\n            );\r\n        }\r\n    }\r\n\r\n    public DifficultyType GetLastDifficulty()\r\n    {\r\n        if (_data == null) return DifficultyType.EASY;\r\n        return _data.lastSelectedDifficulty;\r\n    }\r\n\r\n    public void SetLastDifficulty(DifficultyType diff)\r\n    {\r\n        if (_data == null) _data = new SaveData();\r\n        if (_data.lastSelectedDifficulty == diff) return;\r\n        _data.lastSelectedDifficulty = diff;\r\n        Save();\r\n        Debug.Log($\"[UserDataManager] 마지막 선택 난이도 저장: {diff}\");\r\n    }\r\n\r\n\r\n    // ================================================================\r\n    // 이어하기 저장 / 불러오기\r\n    // ================================================================\r\n\r\n    public bool HasSavedRun()\r\n    {\r\n        if (_data == null || _data.run == null) return false;\r\n        return _data.run.hasSavedRun;\r\n    }\r\n\r\n    public RunSaveData GetRun()\r\n    {\r\n        if (_data == null || _data.run == null) return null;\r\n        return _data.run;\r\n    }\r\n\r\n    /// <summary>스냅샷을 로컬 저장 + 클라우드 업로드</summary>\r\n    public void SaveRun(RunSaveData snapshot, bool uploadToCloud = true)\r\n    {\r\n        if (_data == null) _data = new SaveData();\r\n        snapshot.hasSavedRun = true;\r\n        snapshot.savedAtIso = DateTime.UtcNow.ToString(\"o\");\r\n        _data.run = snapshot;\r\n        Save();\r\n        Debug.Log($\"[UserDataManager] 인게임 진행 저장 완료 (소스:{snapshot.source} 웨이브:{snapshot.currentWaveIndex})\");\r\n\r\n        if (uploadToCloud && CloudSaveManager.Instance != null)\r\n        {\r\n            CloudSaveManager.Instance.Upload(\r\n                onSuccess: () => {\r\n                    Debug.Log(\"[UserDataManager] 클라우드 업로드 완료\");\r\n                    OnRunSaveCompleted?.Invoke();\r\n                },\r\n                onFail: () => Debug.LogWarning(\"[UserDataManager] 클라우드 업로드 실패 (로컬은 정상 저장됨)\")\r\n            );\r\n        }\r\n        else\r\n        {\r\n            OnRunSaveCompleted?.Invoke();\r\n        }\r\n    }\r\n\r\n    /// <summary>이어하기 데이터 초기화 + 클라우드 동기화</summary>\r\n    public void ClearRun(bool uploadToCloud = true)\r\n    {\r\n        if (_data == null) return;\r\n        _data.run = new RunSaveData { hasSavedRun = false };\r\n        Save();\r\n        Debug.Log(\"[UserDataManager] 이어하기 데이터 초기화\");\r\n\r\n        if (uploadToCloud && CloudSaveManager.Instance != null)\r\n            CloudSaveManager.Instance.Upload();\r\n    }\r\n\r\n    /// <summary>클라우드 다운로드 후 로컬에 전체 덮어쓰기</summary>\r\n    public void ApplyDownloadedData(SaveData downloaded)\r\n    {\r\n        if (downloaded == null)\r\n        {\r\n            Debug.LogWarning(\"[UserDataManager] ApplyDownloadedData : downloaded null → 무시\");\r\n            return;\r\n        }\r\n        _data = downloaded;\r\n        if (_data.run == null) _data.run = new RunSaveData();\r\n        Save();\r\n        OnCurrencyChanged?.Invoke(_data.lobbyCurrency);\r\n        Debug.Log(\"[UserDataManager] 클라우드 데이터 적용 완료\");\r\n    }\r\n\r\n\r\n    // ================================================================\r\n    // 앱 생명주기 자동 저장\r\n    // ================================================================\r\n\r\n    void OnApplicationQuit()\r\n    {\r\n        Debug.Log(\"[UserDataManager] 앱 종료 감지 → 자동 저장\");\r\n        Save();\r\n    }\r\n\r\n    void OnApplicationPause(bool pauseStatus)\r\n    {\r\n        // 모바일 백그라운드 전환 시 저장\r\n        if (pauseStatus)\r\n        {\r\n            Debug.Log(\"[UserDataManager] 앱 일시정지 감지 → 자동 저장\");\r\n            Save();\r\n        }\r\n    }\r\n}\r\n","lines":582},{"id":"02_Scripts/UI/StageSelectUI.cs","name":"StageSelectUI","path":"02_Scripts/UI/StageSelectUI.cs","layer":"UI","scenes":["HCH(한충희)"],"entry":true,"summary":"StageSelectUI.cs 역할 : 스테이지 선택 화면 좌우 화살표로 난이도 선택 EASY/NORMAL/HARD 중 해금된 것만 시작 가능 부착 위치 : Canvas/Panel_StageSelect 인스펙터 연결 - stages : 난이도 순서대로 (EASY → NORMAL → HARD) - leftArrow / rightArrow / startButton - stageNameText / descriptionText / t","src":"// =================================================================\n// StageSelectUI.cs\n// 역할  : 스테이지 선택 화면 — 좌우 화살표로 난이도 선택\n//         EASY/NORMAL/HARD 중 해금된 것만 시작 가능\n//\n// 부착 위치 : Canvas/Panel_StageSelect\n//\n// 인스펙터 연결\n// - stages : 난이도 순서대로 (EASY → NORMAL → HARD)\n// - leftArrow / rightArrow / startButton\n// - stageNameText / descriptionText / thumbnailImage / lockIcon\n// - indicators : 상단 1·2·3 인디케이터 이미지들 (EASY → NORMAL → HARD 순)\n// =================================================================\n\nusing UnityEngine;\nusing UnityEngine.UI;\nusing TMPro;\nusing LuckyRandomDefense.Core;\nusing LuckyRandomDefense.Sound;\nusing LuckyRandomDefense.Core.EventBus;\n\nnamespace LuckyRandomDefense.UI\n{\n    public class StageSelectUI : MonoBehaviour\n    {\n        [Header(\"스테이지 데이터 (EASY → NORMAL → HARD 순)\")]\n        [SerializeField] private StageData[] stages;\n\n        [Header(\"UI - 인디케이터 (Header)\")]\n        [SerializeField] private Image[] indicators;\n        [SerializeField] private Color indicatorActiveColor = Color.white;\n        [SerializeField] private Color indicatorInactiveColor = new Color(1f, 1f, 1f, 0.3f);\n\n        [Header(\"UI - 미리보기 (Body)\")]\n        [SerializeField] private TextMeshProUGUI stageNameText;\n        [SerializeField] private TextMeshProUGUI descriptionText;\n        [SerializeField] private Image thumbnailImage;\n        [SerializeField] private GameObject lockIcon;\n\n        [Header(\"UI - 버튼\")]\n        [SerializeField] private Button leftArrow;\n        [SerializeField] private Button rightArrow;\n        [SerializeField] private Button startButton;\n\n        [Header(\"Start 버튼 색상\")]\n        [Tooltip(\"해금된 스테이지 시작 가능 시 — 따뜻한 강조색 (배경 검정과 대비)\")]\n        [SerializeField] private Color startEnabledColor = new Color(1f, 0.78f, 0.2f, 1f);   // 골드/주황 톤\n        [Tooltip(\"잠금 상태 — 명확히 어두운 회색 (눌리지 않음을 직관적으로 보여줌)\")]\n        [SerializeField] private Color startDisabledColor = new Color(0.25f, 0.25f, 0.28f, 1f);\n\n        [Header(\"난이도별 썸네일 틴트 (스프라이트 없을 때 시인성 확보)\")]\n        [Tooltip(\"EASY 스테이지 카드 색 (해금 상태 기준)\")]\n        [SerializeField] private Color easyTint   = new Color(0.40f, 0.78f, 0.45f, 1f);   // 연두\n        [Tooltip(\"NORMAL 스테이지 카드 색 (해금 상태 기준)\")]\n        [SerializeField] private Color normalTint = new Color(0.30f, 0.55f, 0.95f, 1f);   // 파랑\n        [Tooltip(\"HARD 스테이지 카드 색 (해금 상태 기준)\")]\n        [SerializeField] private Color hardTint   = new Color(0.92f, 0.32f, 0.32f, 1f);   // 빨강\n        [Tooltip(\"잠긴 스테이지 카드 색 (난이도 무관 동일 — 잠금 상태 통일)\")]\n        [SerializeField] private Color lockedTint = new Color(0.18f, 0.18f, 0.20f, 1f);\n\n        [Header(\"잠금 표시 — Start 버튼 텍스트\")]\n        [Tooltip(\"Start 버튼 안의 텍스트 (있으면 잠금/시작 라벨 자동 전환)\")]\n        [SerializeField] private TextMeshProUGUI startButtonLabel;\n        [SerializeField] private string startLabelEnabled  = \"시작하기\";\n        [SerializeField] private string startLabelDisabled = \"잠금\";\n\n        private int _currentIndex = 0;\n\n        // ================================================================\n        // 라이프사이클\n        // ================================================================\n\n        private void Awake()\n        {\n            Debug.Log($\"[StageSelectUI] Awake | stages.Length={(stages != null ? stages.Length : -1)}\");\n\n            if (stages == null || stages.Length == 0)\n                Debug.LogError(\"[StageSelectUI] stages 배열 미연결 → 인스펙터 확인\");\n\n            // 버튼 이벤트 등록\n            if (leftArrow != null) leftArrow.onClick.AddListener(() => ChangeStage(-1));\n            else Debug.LogWarning(\"[StageSelectUI] leftArrow 미연결\");\n\n            if (rightArrow != null) rightArrow.onClick.AddListener(() => ChangeStage(+1));\n            else Debug.LogWarning(\"[StageSelectUI] rightArrow 미연결\");\n\n            if (startButton != null) startButton.onClick.AddListener(OnClickStart);\n            else Debug.LogError(\"[StageSelectUI] startButton 미연결\");\n        }\n\n        private void OnEnable()\n        {\n            // 마지막 선택한 난이도로 복원\n            DifficultyType last = UserDataManager.Instance != null\n                ? UserDataManager.Instance.GetLastDifficulty()\n                : DifficultyType.EASY;\n\n            _currentIndex = Mathf.Clamp((int)last, 0, stages.Length - 1);\n            Debug.Log($\"[StageSelectUI] OnEnable | 복원된 인덱스={_currentIndex} ({last})\");\n\n            Refresh();\n        }\n\n        // ================================================================\n        // 인덱스 변경\n        // ================================================================\n\n        private void ChangeStage(int delta)\n        {\n            SoundEventBus.RaiseSFXRequested(SFXType.ButtonClick);\n\n            int oldIndex = _currentIndex;\n            _currentIndex = Mathf.Clamp(_currentIndex + delta, 0, stages.Length - 1);\n\n            Debug.Log($\"[StageSelectUI] ChangeStage | {oldIndex} → {_currentIndex} (delta={delta})\");\n\n            if (_currentIndex == oldIndex)\n            {\n                Debug.Log(\"[StageSelectUI] 변경 없음 (끝에 도달)\");\n                return;\n            }\n\n            Refresh();\n        }\n\n        // ================================================================\n        // UI 갱신\n        // ================================================================\n\n        private void Refresh()\n        {\n            if (stages == null || stages.Length == 0) return;\n\n            var stage = stages[_currentIndex];\n            bool unlocked = IsCurrentUnlocked();\n\n            Debug.Log($\"[StageSelectUI] Refresh | stage={stage.difficulty} unlocked={unlocked}\");\n\n            // 미리보기 텍스트\n            if (stageNameText != null) stageNameText.text = stage.stageName;\n            if (descriptionText != null) descriptionText.text = unlocked\n                ? GetDescriptionForDifficulty(stage.difficulty)\n                : GetLockMessageForDifficulty(stage.difficulty);\n\n            // 썸네일 — 스프라이트가 있으면 그것 우선, 없으면 난이도별 틴트로 시각 구분\n            if (thumbnailImage != null)\n            {\n                if (stage.thumbnail != null)\n                {\n                    thumbnailImage.sprite = stage.thumbnail;\n                    thumbnailImage.color = unlocked ? Color.white : lockedTint;\n                }\n                else\n                {\n                    // 스프라이트 없는 경우 — 난이도별 색상으로 카드 표현\n                    thumbnailImage.sprite = null;\n                    thumbnailImage.color = unlocked ? GetTintForDifficulty(stage.difficulty) : lockedTint;\n                }\n            }\n\n            // 잠금 아이콘 표시 (lockIcon이 썸네일 위에 오버레이로 깔린다고 가정)\n            if (lockIcon != null) lockIcon.SetActive(!unlocked);\n\n            // Start 버튼 활성화 + 라벨 전환\n            if (startButton != null)\n            {\n                startButton.interactable = unlocked;\n                var startImg = startButton.GetComponent<Image>();\n                if (startImg != null)\n                    startImg.color = unlocked ? startEnabledColor : startDisabledColor;\n            }\n            if (startButtonLabel != null)\n            {\n                startButtonLabel.text = unlocked ? startLabelEnabled : startLabelDisabled;\n                startButtonLabel.color = unlocked\n                    ? new Color(0.1f, 0.05f, 0f, 1f)        // 노란 버튼 위 짙은 글자\n                    : new Color(0.65f, 0.65f, 0.7f, 1f);    // 어두운 버튼 위 옅은 회색\n            }\n\n            // 화살표 비활성화 (끝에서)\n            if (leftArrow != null) leftArrow.interactable = _currentIndex > 0;\n            if (rightArrow != null) rightArrow.interactable = _currentIndex < stages.Length - 1;\n\n            // 인디케이터 업데이트\n            UpdateIndicators();\n\n            // 마지막 선택 저장 (해금 여부와 무관하게 단순히 마지막 본 인덱스)\n            if (UserDataManager.Instance != null)\n                UserDataManager.Instance.SetLastDifficulty(stage.difficulty);\n        }\n\n        private void UpdateIndicators()\n        {\n            if (indicators == null) return;\n\n            for (int i = 0; i < indicators.Length; i++)\n            {\n                if (indicators[i] == null) continue;\n\n                bool isCurrent = (i == _currentIndex);\n                bool isUnlocked = (i < stages.Length) && IsIndexUnlocked(i);\n\n                // 3단계: 현재 선택 > 해금됐지만 미선택 > 잠김\n                if (isCurrent)\n                    indicators[i].color = indicatorActiveColor;\n                else if (isUnlocked)\n                    indicators[i].color = new Color(\n                        indicatorInactiveColor.r,\n                        indicatorInactiveColor.g,\n                        indicatorInactiveColor.b,\n                        Mathf.Max(indicatorInactiveColor.a, 0.6f)); // 잠금보다는 밝게\n                else\n                    indicators[i].color = new Color(\n                        indicatorInactiveColor.r,\n                        indicatorInactiveColor.g,\n                        indicatorInactiveColor.b,\n                        0.2f); // 잠금은 더 어둡게\n            }\n        }\n\n        private bool IsIndexUnlocked(int idx)\n        {\n            if (idx < 0 || idx >= stages.Length || stages[idx] == null) return false;\n            if (UserDataManager.Instance == null) return stages[idx].difficulty == DifficultyType.EASY;\n            return UserDataManager.Instance.IsDifficultyUnlocked(stages[idx].difficulty);\n        }\n\n        private bool IsCurrentUnlocked()\n        {\n            if (UserDataManager.Instance == null)\n            {\n                Debug.LogWarning(\"[StageSelectUI] UserDataManager null → 기본 EASY만 해금\");\n                return stages[_currentIndex].difficulty == DifficultyType.EASY;\n            }\n\n            return UserDataManager.Instance.IsDifficultyUnlocked(stages[_currentIndex].difficulty);\n        }\n\n        // ================================================================\n        // Start 버튼\n        // ================================================================\n\n        private void OnClickStart()\n        {\n            SoundEventBus.RaiseSFXRequested(SFXType.ButtonClick);\n\n            if (!IsCurrentUnlocked())\n            {\n                Debug.LogWarning($\"[StageSelectUI] 잠금된 스테이지 시작 시도: {stages[_currentIndex].difficulty}\");\n                return;\n            }\n\n            var stage = stages[_currentIndex];\n            Debug.Log($\"[StageSelectUI] OnClickStart | 선택된 스테이지: {stage.stageName} ({stage.difficulty})\");\n\n            // GameManager에 선택된 스테이지 전달\n            if (GameManager.Instance != null)\n            {\n                GameManager.Instance.SetCurrentStage(stage);\n                Debug.Log(\"[StageSelectUI] GameManager.SetCurrentStage 호출 완료\");\n            }\n            else\n            {\n                Debug.LogError(\"[StageSelectUI] GameManager.Instance null\");\n                return;\n            }\n\n            // TitleScreen이 Outro/패널정리/인게임 UI 활성화/StartGame까지 일괄 처리.\n            // 이 패널을 먼저 SetActive(false)로 끄면 이 스크립트도 멈춰서 이후 호출 못 함 → 호출 뒤에 끄도록 순서 변경.\n            var title = FindAnyObjectByType<TitleScreen>(FindObjectsInactive.Include);\n            if (title != null)\n            {\n                Debug.Log(\"[StageSelectUI] TitleScreen.StartGameFromStageSelect 호출\");\n                title.StartGameFromStageSelect();\n                // StartGameFromStageSelect 내부에서 stageSelectPanel.SetActive(false) 처리됨 — 안전망으로 한 번 더\n                gameObject.SetActive(false);\n            }\n            else\n            {\n                Debug.LogError(\"[StageSelectUI] TitleScreen 못 찾음 → 직접 GameManager.StartGame 호출 (인게임 UI 활성화 누락 가능)\");\n                GameManager.Instance.StartGame();\n                gameObject.SetActive(false);\n            }\n        }\n\n        // ================================================================\n        // 헬퍼 (난이도별 설명/잠금 메시지 — 임시 하드코딩)\n        // ================================================================\n\n        private Color GetTintForDifficulty(DifficultyType d)\n        {\n            switch (d)\n            {\n                case DifficultyType.EASY:   return easyTint;\n                case DifficultyType.NORMAL: return normalTint;\n                case DifficultyType.HARD:   return hardTint;\n                default: return Color.white;\n            }\n        }\n\n        private string GetDescriptionForDifficulty(DifficultyType d)\n        {\n            switch (d)\n            {\n                case DifficultyType.EASY:   return \"기본 조작을 익히는 튜토리얼 스테이지입니다.\";\n                case DifficultyType.NORMAL: return \"정식 난이도. 다양한 적과 보스를 상대하세요.\";\n                case DifficultyType.HARD:   return \"최고 난이도. 운과 실력 모두 필요합니다.\";\n                default: return \"\";\n            }\n        }\n\n        private string GetLockMessageForDifficulty(DifficultyType d)\n        {\n            switch (d)\n            {\n                case DifficultyType.NORMAL: return \"🔒 EASY 스테이지를 클리어해야 해금됩니다.\";\n                case DifficultyType.HARD:   return \"🔒 NORMAL 스테이지를 클리어해야 해금됩니다.\";\n                default: return \"\";\n            }\n        }\n    }\n}\n","lines":323},{"id":"02_Scripts/Core/EventBus/SoundEventBus.cs","name":"SoundEventBus","path":"02_Scripts/Core/EventBus/SoundEventBus.cs","layer":"Core","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class SoundEventBus : MonoBehaviour","src":"using System;\r\nusing UnityEngine;\r\nusing LuckyRandomDefense.Sound;\r\n\r\nnamespace LuckyRandomDefense.Core.EventBus\r\n{\r\n    public class SoundEventBus : MonoBehaviour\r\n    {\r\n        public static event Action<SFXType> OnSFXRequested;\r\n        public static void RaiseSFXRequested(SFXType sfxType)\r\n        {\r\n            OnSFXRequested?.Invoke(sfxType);\r\n        }\r\n\r\n\r\n        public static event Action<Unit_Sfx_Type, Vector3> OnUnitSFXRequested;\r\n        public static void RaiseUnitSFXRequested(Unit_Sfx_Type sfxType , Vector3 position)\r\n        {\r\n            OnUnitSFXRequested?.Invoke(sfxType, position);\r\n        }\r\n    }\r\n}","lines":22},{"id":"02_Scripts/Core/EventBus/UIEventBus.cs","name":"UIEventBus","path":"02_Scripts/Core/EventBus/UIEventBus.cs","layer":"Core","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"class UIEventBus : MonoBehaviour","src":"using LuckyRandomDefense.Node;\r\nusing System;\r\nusing UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.Core.EventBus\r\n{\r\n    public class UIEventBus : MonoBehaviour\r\n    {\r\n        #region UIManager 관련 이벤트\r\n        public static event Action<TileNode> OnUnitBtnPopup;\r\n        public static event Action OnUnitHidePanel;\r\n        public static event Action<string> OnWarningMessage;\r\n\r\n        public static void RaiseUnitBtnPopup(TileNode tile)\r\n        {\r\n            OnUnitBtnPopup?.Invoke(tile);\r\n        }\r\n        public static void RaiseUnitHidePanel()\r\n        {\r\n            OnUnitHidePanel?.Invoke();\r\n        }\r\n        public static void RaiseWarningMessage(string message)\r\n        {\r\n            OnWarningMessage?.Invoke(message);\r\n        }\r\n\r\n        #endregion\r\n    }\r\n}","lines":29},{"id":"02_Scripts/Core/EventBus/UnitEventBus.cs","name":"UnitEventBus","path":"02_Scripts/Core/EventBus/UnitEventBus.cs","layer":"Core","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":false,"summary":"타일 선택 / 해제","src":"using LuckyRandomDefense.Node;\r\nusing System;\r\nusing UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.Core.EventBus\r\n{\r\n    public class UnitEventBus : MonoBehaviour\r\n    {\r\n        #region Tile & Unit 이벤트\r\n\r\n        // ─── 타일 선택 / 해제 ───────────────────────────────\r\n        public static event Action<TileNode> OnTileSelected;\r\n        public static void RaiseTileSelected(TileNode tile)\r\n            => OnTileSelected?.Invoke(tile);\r\n\r\n        public static event Action OnTileDeselected;\r\n        public static void RaiseTileDeselected()\r\n            => OnTileDeselected?.Invoke();\r\n\r\n        // ─── 유닛 타일 추가 / 제거 ──────────────────────────\r\n        public static event Action<TileNode> OnUnitAddedToTile;\r\n        public static void RaiseUnitAddedToTile(TileNode tile)\r\n            => OnUnitAddedToTile?.Invoke(tile);\r\n\r\n        public static event Action<TileNode> OnUnitRemovedFromTile;\r\n        public static void RaiseUnitRemovedFromTile(TileNode tile)\r\n            => OnUnitRemovedFromTile?.Invoke(tile);\r\n\r\n        // 업그레이드\r\n        public static event Action OnUnitUpgradeStackRequested;\r\n        public static void RaiseUnitUpgradeStackRequested() => OnUnitUpgradeStackRequested?.Invoke();\r\n\r\n        // ─── 판매 / 조합 / 강화 요청 ────────────────────────\r\n        public static event Action<TileNode> OnUnitSellRequested;\r\n        public static void RaiseUnitSellRequested(TileNode tile)\r\n            => OnUnitSellRequested?.Invoke(tile);\r\n\r\n        public static event Action<TileNode> OnUnitMergeRequested;\r\n        public static void RaiseUnitMergeRequested(TileNode tile)\r\n            => OnUnitMergeRequested?.Invoke(tile);\r\n\r\n        public static event Action<int> OnUnitUpgradeRequested;\r\n        public static void RaiseUnitUpgradeRequested(int grade)\r\n            => OnUnitUpgradeRequested?.Invoke(grade);\r\n\r\n        // ─── 유닛 이동 / 교환 ───────────────────────────────\r\n        public static event Action<TileNode, TileNode> OnUnitSwapped;\r\n        public static void RaiseUnitSwapped(TileNode from, TileNode to)\r\n            => OnUnitSwapped?.Invoke(from, to);\r\n\r\n        // ─── 맵 생성 완료 ────────────────────────────────────\r\n        public static event Action OnMapGenerated;\r\n        public static void RaiseMapGenerated()\r\n            => OnMapGenerated?.Invoke();\r\n\r\n        // ─── 소환 요청 ────────────────────────────────────────────────\r\n        // 발행 : UIActionBridge.OnClickSummon()\r\n        // 수신 : UnitSpawner.HandleSummon()\r\n        public static event Action OnUnitSummonRequested;\r\n        public static void RaiseUnitSummonRequested()\r\n            => OnUnitSummonRequested?.Invoke();\r\n\r\n\r\n        public static event Action OnHeroicMergeRequested;\r\n        public static event Action<HeroicRecipeData> OnHeroicRecipeRequested;\r\n        public static void RaiseHeroicMergeRequested()\r\n            => OnHeroicMergeRequested?.Invoke();\r\n        public static void RaiseHeroicRecipeRequested(HeroicRecipeData recipe)\r\n            => OnHeroicRecipeRequested?.Invoke(recipe);\r\n        #endregion\r\n\r\n        #region Unit 상태 변경 이벤트\r\n        // 유닛 생성, 판매, 합성, 업그레이드 등 보유 유닛 상태가 바뀌었을 때 UI 업데이트, 사운드 재생 등 필요한 곳에서 구독하여 처리\r\n        public static event Action OnUnitCollectionChanged;\r\n        public static void RaiseUnitCollectionChanged() => OnUnitCollectionChanged?.Invoke();\r\n\r\n\r\n        // 유닛 이동, 교환, 선택 변경 등 유닛과 타일 간 상호작용이 시작될 때 필요한 곳에서 구독하여 처리\r\n
