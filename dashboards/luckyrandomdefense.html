<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LuckyRandomDefense — 아키텍처 대시보드</title>
<style>
  :root{ --bg:#0b1220; --bg2:#0e1830; --panel:#121d33; --panel2:#16233c; --line:#243350; --tx:#e9f0f8; --tx2:#8ea3c2; --acc:#38d9a9; --acc2:#4dabf7; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--tx); font-family:"Segoe UI",system-ui,"Malgun Gothic",sans-serif; }
  #app{ display:grid; grid-template-columns:250px 1fr; grid-template-rows:62px 1fr; height:100vh; }
  header{ grid-column:1/3; display:flex; align-items:center; gap:18px; padding:0 22px; border-bottom:1px solid var(--line); background:linear-gradient(180deg,var(--bg2),var(--bg)); }
  header h1{ font-size:19px; margin:0; font-weight:800; }
  header h1 span{ color:var(--acc); }
  .flow{ display:flex; align-items:center; gap:8px; margin-left:8px; }
  .flow .s{ font-size:12px; padding:4px 12px; border-radius:20px; background:var(--panel); border:1px solid var(--line); color:var(--tx2); cursor:pointer; user-select:none; }
  .flow .s.on{ background:var(--acc); color:#04101f; border-color:var(--acc); font-weight:700; }
  .flow .arw{ color:var(--tx2); font-size:12px; }
  .chips{ margin-left:auto; display:flex; gap:8px; }
  .chip{ font-size:12.5px; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:5px 11px; color:var(--tx2); }
  .chip b{ color:var(--tx); font-size:14px; }
  aside{ border-right:1px solid var(--line); background:var(--bg2); overflow-y:auto; padding:16px 14px; }
  #q{ width:100%; padding:9px 11px; background:var(--bg); border:1px solid var(--line); border-radius:8px; color:var(--tx); font-size:13px; margin-bottom:16px; }
  #q:focus{ outline:none; border-color:var(--acc); }
  aside h4{ font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--tx2); margin:6px 0 8px; }
  .lnav a{ display:flex; align-items:center; gap:9px; padding:6px 8px; border-radius:6px; color:var(--tx); text-decoration:none; font-size:13px; cursor:pointer; }
  .lnav a:hover{ background:var(--panel); }
  .lnav .dot{ width:10px; height:10px; border-radius:3px; flex:0 0 auto; }
  .lnav .c{ margin-left:auto; color:var(--tx2); font-variant-numeric:tabular-nums; font-size:12px; }
  .deadbox{ margin-top:18px; font-size:11.5px; color:var(--tx2); line-height:1.6; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
  main{ overflow-y:auto; padding:8px 26px 60px; scroll-behavior:smooth; }
  .layer{ margin-top:30px; }
  .layer > .lh{ display:flex; align-items:center; gap:12px; position:sticky; top:0; background:linear-gradient(180deg,var(--bg) 70%,transparent); padding:12px 0 10px; z-index:5; }
  .lh .bar{ width:5px; height:26px; border-radius:3px; }
  .lh .name{ font-size:22px; font-weight:800; }
  .lh .en{ font-family:ui-monospace,Consolas,monospace; font-size:13px; color:var(--tx2); }
  .lh .cnt{ margin-left:auto; font-size:13px; color:var(--tx2); }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-left-width:4px; border-radius:12px; padding:14px 16px; cursor:pointer; transition:none; }
  .card:hover{ background:var(--panel2); border-color:var(--acc); }
  .card .nm{ font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .card .star{ color:var(--acc); font-size:13px; }
  .card .pth{ font-family:ui-monospace,Consolas,monospace; font-size:11px; color:var(--tx2); margin:3px 0 8px; word-break:break-all; }
  .card .sum{ font-size:12.5px; color:var(--tx); line-height:1.55; opacity:.92; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .card .meta{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; align-items:center; }
  .bdg{ font-size:10.5px; padding:2px 7px; border-radius:5px; border:1px solid var(--line); color:var(--tx2); }
  .bdg.sc{ background:var(--bg); }
  .deg{ margin-left:auto; font-size:11px; color:var(--tx2); font-family:ui-monospace,monospace; }
  .hidden{ display:none !important; }
  /* detail drawer */
  #drawer{ position:fixed; top:0; right:0; width:420px; height:100vh; background:var(--bg2); border-left:1px solid var(--line); padding:24px; overflow-y:auto; transform:translateX(460px); transition:transform .2s ease; box-shadow:-12px 0 40px rgba(0,0,0,.45); z-index:20; }
  #drawer.show{ transform:none; }
  #drawer .x{ position:absolute; top:16px; right:20px; cursor:pointer; color:var(--tx2); font-size:22px; }
  #drawer .x:hover{ color:var(--tx); }
  #drawer .dn{ font-size:24px; font-weight:800; margin-right:24px; word-break:break-all; }
  #drawer .dp{ font-family:ui-monospace,Consolas,monospace; font-size:12px; color:var(--tx2); margin:5px 0 14px; word-break:break-all; }
  #drawer .dsum{ font-size:14px; line-height:1.7; background:var(--panel); border-radius:10px; padding:14px 15px; }
  #drawer .code{ max-height:460px; overflow:auto; background:#0b1220; border:1px solid var(--line); border-radius:8px; padding:12px 14px; font-family:ui-monospace,Consolas,monospace; font-size:11.5px; line-height:1.55; color:#c7d2e0; white-space:pre; margin-top:2px; tab-size:4; }
  .copybtn{ cursor:pointer; color:var(--acc); font-size:11px; border:1px solid var(--line); padding:1px 8px; border-radius:5px; margin-left:8px; }
  .copybtn:hover{ background:var(--panel); }
  #drawer .lc{ color:var(--tx2); font-weight:400; text-transform:none; letter-spacing:0; }
  #drawer h5{ font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--tx2); margin:18px 0 8px; }
  #drawer .dep{ font-size:13px; color:var(--acc2); padding:3px 0; cursor:pointer; word-break:break-all; }
  #drawer .dep:hover{ text-decoration:underline; }
  #empty{ color:var(--tx2); padding:40px; text-align:center; font-size:15px; }
</style>
</head>

    <h1 id="ttl"></h1>
    <div class="flow" id="flow"></div>

    <input id="q" placeholder="스크립트·요약 검색…" autocomplete="off">

  <main id="main"></main>
</div>
<div id="drawer"></div>
<script>
const DATA = {"meta":{"generated":"2026-07-11","project":"LuckyRandomDefense","title":"🎲 럭키 랜덤 디펜스 <span>아키텍처</span>","scenes":["Main","KHJ","PSY","HCH(한충희)"],"layerNames":{"Unit":"Unit · 유닛","Enemy":"Enemy · 적","UI":"UI","Data":"Data · 저장/PlayFab","Core":"Core · 코어","Lobby":"Lobby · 로비","Node":"Node · 노드","Augment":"Augment · 증강","Quest":"Quest · 퀘스트","Save":"Save · 저장","Sound":"Sound · 사운드","Tutorial":"Tutorial","Editor":"Editor · 툴","Test":"Test"},"deadText":"4개 씬(Main·KHJ·PSY·HCH(한충희))에서 실제 사용되는 <b>라이브 코드 116개</b>만 표시. 씬에서 미도달한 <b>33개</b>(에디터툴·테스트·미사용 등)는 제외했습니다.","live":116,"dead":33,"edges":427,"perScene":{"Main":114,"KHJ":90,"PSY":111,"HCH(한충희)":115},"perLayer":{"Unit":45,"Core":12,"Node":7,"UI":16,"Sound":2,"Enemy":3,"Test":2,"Quest":3,"Data":13,"Tutorial":4,"Lobby":4,"Save":2,"Augment":3}},"colors":{"Unit":"#ff6b6b","UI":"#4dabf7","Data":"#ffd43b","Core":"#51cf66","Node":"#da77f2","Tutorial":"#ff922b","Lobby":"#38d9a9","Enemy":"#a9e34b","Quest":"#f783ac","Augment":"#63e6be","Sound":"#ffa94d","Test":"#748ffc","Save":"#e599f7"},"nodes":[{"id":"02_Scripts/Unit/UnitActionManager.cs","name":"UnitActionManager","path":"02_Scripts/Unit/UnitActionManager.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"첫 클릭 : 유닛 있는 타일 선택 두 번째 클릭 : 빈 타일이면 이동 / 유닛 있으면 교환 같은 타일 재클릭 : 선택 취소","src":"﻿using System.Collections;\r\n// ================================================================\r\n// UnitActionManager.cs\r\n// 역할  : 유닛 관련 모든 액션 처리\r\n//         이동/교환, 판매, 일반 조합, 강화, 영웅 조합 통합 관리\r\n//\r\n// 부착 위치 : Managers 오브젝트 또는 UnitActionManager 오브젝트\r\n//\r\n// 네임스페이스 의존성\r\n// - LuckyRandomDefense.Core : GameManager 참조\r\n// - LuckyRandomDefense.Core.EventBus : UnitEventBus, UIEventBus 참조\r\n// - LuckyRandomDefense.Node : TileNode, NodeInputHandler, MapGenerator 참조\r\n//\r\n// UnitEventBus 구독 흐름\r\n// NodeInputHandler  → OnTileClicked          → HandleTileClickForMovement\r\n// NodeInputHandler  → RaiseTileSelected      → HandleTileSelected\r\n// NodeInputHandler  → RaiseTileDeselected    → HandleTileDeselected\r\n// UIActionBridge    → RaiseUnitSellRequested → HandleSell\r\n// UIActionBridge    → RaiseUnitMergeRequested→ HandleMerge\r\n// UIActionBridge    → RaiseUnitUpgradeRequested → HandleUpgrade\r\n// UIActionBridge    → RaiseHeroicMergeRequested → HandleHeroicMerge\r\n//\r\n// grade 기준 (팀 내 통일)\r\n// grade 1 = NORMAL / grade 2 = RARE / grade 3 = EPIC / grade 4 = HEROIC\r\n// HEROIC_GRADE(4) → 스택/일반조합 제외, 영웅 고유 조합으로만 생성\r\n// ================================================================\r\n\r\nusing LuckyRandomDefense.Core;\r\nusing LuckyRandomDefense.Core.EventBus;\r\nusing LuckyRandomDefense.Node;\r\nusing LuckyRandomDefense.Sound;\r\nusing System.Collections.Generic;\r\nusing System.Linq;\r\nusing UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.Unit\r\n{\r\n    public class UnitActionManager : MonoBehaviour\r\n    {\r\n        public static UnitActionManager Instance { get; private set; }\r\n\r\n        // ── HEROIC 등급 상수 ──────────────────────────────────────\r\n        // 주의 : UnitRatingType.HEROIC enum값(3)과 혼용 금지\r\n        //        grade 기준으로만 판단할 것\r\n        private const int HEROIC_GRADE = 4;\r\n\r\n\r\n        // ================================================================\r\n        // 인스펙터 필드\r\n        // ================================================================\r\n\r\n        // ── 일반 조합 풀 ──────────────────────────────────────────\r\n        // 주의 : grade1+1 결과 → grade2Pool, grade2+1 → grade3Pool\r\n        //        grade 4(HEROIC)는 영웅 고유 조합으로만 생성\r\n        //        각 풀이 비어있으면 조합 시 Debug.LogError 발생\r\n        [Header(\"일반 조합 결과 풀 (grade별 UnitData 에셋 등록)\")]\r\n        [SerializeField] private List<UnitData> grade2Pool;\r\n        [SerializeField] private List<UnitData> grade3Pool;\r\n        [SerializeField] private List<UnitData> grade4Pool;\r\n\r\n        // ── 강화 설정 ─────────────────────────────────────────────\r\n        [Header(\"강화 설정\")]\r\n        [SerializeField] private int baseUpgradeCost = 20;\r\n        [SerializeField] private int costIncreasePerLevel = 10;\r\n        [SerializeField] private float damageIncreaseRate = 0.5f;\r\n\r\n        // ── 영웅 조합 레시피 ──────────────────────────────────────\r\n        // 주의 : HeroicRecipeData 에셋을 전부 등록해야 함\r\n        //        영웅 추가 시 에셋 생성 후 여기에 추가\r\n        [Header(\"영웅 고유 조합 레시피 목록\")]\r\n        [SerializeField] private int _mergeGold = 300;\r\n        [SerializeField] private List<HeroicRecipeData> heroicRecipeList;\r\n        // 레시피 큐에 저장.\r\n        private Queue<UnitData> _pendingHeroicUnits = new Queue<UnitData>();\r\n        public bool HasPendingHeroicUnit => _pendingHeroicUnits.Count > 0;\r\n        public UnitData GetNextHeroicUnit() => _pendingHeroicUnits.Dequeue();\r\n\r\n        public GameObject mergeEffectPrefab;\r\n        public GameObject _mergeSpEffectPrefab;\r\n\r\n        // ── 맵 참조 ───────────────────────────────────────────────\r\n        // 주의 : 인스펙터에서 ProceduralMap 오브젝트 반드시 연결할 것\r\n        [Header(\"맵 참조\")]\r\n        [SerializeField] private ProceduralMap mapGenerator;\r\n\r\n        // ================================================================\r\n        // 내부 상태\r\n        // ================================================================\r\n\r\n        // 강화 횟수 추적 (grade 1~4)\r\n        private Dictionary<int, int> _upgradeCounts = new Dictionary<int, int>()\r\n        {\r\n            { 1, 0 }, { 2, 0 }, { 3, 0 }, { 4, 0 }\r\n        };\r\n\r\n        // 이동/교환용 첫 번째 선택 타일\r\n        private TileNode _firstSelectedTile;\r\n\r\n        // 판매/조합용 현재 선택 타일\r\n        private TileNode _selectedTile;\r\n\r\n\r\n        // ================================================================\r\n        // 라이프사이클\r\n        // ================================================================\r\n\r\n        private void Awake()\r\n        {\r\n            if (Instance == null) Instance = this;\r\n            else\r\n            {\r\n                Debug.LogWarning(\"[UnitActionManager] 중복 인스턴스 감지 → 파괴\");\r\n                Destroy(gameObject);\r\n            }\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            #region UnitEventBus 구독\r\n\r\n            // 발행 : NodeInputHandler.HandleClick() → RaiseTileSelected\r\n            UnitEventBus.OnTileSelected += HandleTileSelected;\r\n\r\n            // 발행 : NodeInputHandler.ClearSelection() → RaiseTileDeselected\r\n            UnitEventBus.OnTileDeselected += HandleTileDeselected;\r\n\r\n            \r\n\r\n            // 발행 : UIActionBridge.OnClickSell() → RaiseUnitSellRequested\r\n            UnitEventBus.OnUnitSellRequested += HandleSell;\r\n\r\n            // 발행 : UIActionBridge.OnClickMerge() → RaiseUnitMergeRequested\r\n            UnitEventBus.OnUnitMergeRequested += HandleMerge;\r\n\r\n            // 발행 : UIActionBridge.OnClickUpgrade(grade) → RaiseUnitUpgradeRequested\r\n            UnitEventBus.OnUnitUpgradeRequested += HandleUpgrade;\r\n\r\n            // 발행 : UIActionBridge.OnClickHeroicMerge() → RaiseHeroicMergeRequested\r\n            UnitEventBus.OnHeroicMergeRequested += HandleHeroicMerge;\r\n\r\n            // 발행 : NodeInputHandler.HandleClick() → OnTileClicked (이동/교환용)\r\n            //NodeInputHandler.OnTileClicked += HandleTileClickForMovement;\r\n            NodeInputHandler.OnTileRightClicked += HandleTileRightClickForSwap;\r\n\r\n\r\n            #endregion\r\n\r\n            Debug.Log(\"[UnitActionManager] 이벤트 구독 완료\");\r\n        }\r\n\r\n        private void OnDisable()\r\n        {\r\n            #region UnitEventBus 구독 해제 (메모리 누수 방지)\r\n\r\n            UnitEventBus.OnTileSelected -= HandleTileSelected;\r\n            UnitEventBus.OnTileDeselected -= HandleTileDeselected;\r\n            UnitEventBus.OnUnitSellRequested -= HandleSell;\r\n            UnitEventBus.OnUnitMergeRequested -= HandleMerge;\r\n            UnitEventBus.OnUnitUpgradeRequested -= HandleUpgrade;\r\n            UnitEventBus.OnHeroicMergeRequested -= HandleHeroicMerge;\r\n            //NodeInputHandler.OnTileClicked -= HandleTileClickForMovement;\r\n            NodeInputHandler.OnTileRightClicked -= HandleTileRightClickForSwap;\r\n\r\n\r\n            #endregion\r\n\r\n            Debug.Log(\"[UnitActionManager] 이벤트 구독 해제\");\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 타일 선택 / 해제\r\n        // ================================================================\r\n\r\n        private void HandleTileSelected(TileNode tile)\r\n        {\r\n            _selectedTile = tile;\r\n            Debug.Log($\"[UnitActionManager] 타일 선택 : {tile.name} | \" +\r\n                      $\"점유:{tile.isOccupied} | 스택:{tile.stackedUnits.Count}\");\r\n        }\r\n\r\n        private void HandleTileDeselected()\r\n        {\r\n            _selectedTile = null;\r\n            Debug.Log(\"[UnitActionManager] 타일 선택 해제\");\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 유닛 이동 / 교환\r\n        // ================================================================\r\n\r\n        /// <summary>\r\n        /// 첫 클릭 : 유닛 있는 타일 선택\r\n        /// 두 번째 클릭 : 빈 타일이면 이동 / 유닛 있으면 교환\r\n        /// 같은 타일 재클릭 : 선택 취소\r\n        /// </summary>\r\n        \r\n\r\n       \r\n\r\n       \r\n\r\n\r\n\r\n\r\n        /// <summary>\r\n        /// 두 타일의 유닛 스택 전체 교환\r\n        /// 빈 타일이면 이동, 유닛 있으면 교환\r\n        /// </summary>\r\n        private void SwapUnits(TileNode source, TileNode target)\r\n        {\r\n            List<Unit> sourceUnits = new List<Unit>(source.stackedUnits);\r\n            List<Unit> targetUnits = new List<Unit>(target.stackedUnits);\r\n\r\n            foreach (var unit in sourceUnits) source.RemoveUnit(unit);\r\n            foreach (var unit in targetUnits) target.RemoveUnit(unit);\r\n\r\n            foreach (var unit in sourceUnits) target.AddUnit(unit);\r\n            foreach (var unit in targetUnits) source.AddUnit(unit);\r\n\r\n            UnitEventBus.RaiseUnitSwapped(source, target);\r\n            Debug.Log($\"[UnitActionManager] 교환 완료 : {source.name} <-> {target.name}\");\r\n        }\r\n\r\n\r\n        \r\n\r\n\r\n        private void HandleTileRightClickForSwap(TileNode clickedTile)\r\n        {\r\n            if (_selectedTile == null || _selectedTile == clickedTile) return;\r\n            if (!_selectedTile.isOccupied || !clickedTile.isOccupied) return;\r\n\r\n            SwapUnits(_selectedTile, clickedTile);\r\n\r\n            TileNode oldSelectedTile = _selectedTile;\r\n            _selectedTile = clickedTile;\r\n\r\n            // ★ 이 줄이 핵심입니다! 입력을 관리하는 싱글톤의 데이터도 바꿔줍니다.\r\n            if (NodeInputHandler.Instance != null)\r\n                NodeInputHandler.Instance.SelectedTile = _selectedTile;\r\n\r\n            oldSelectedTile.OnDeselected();\r\n            _selectedTile.OnSelected();\r\n\r\n            // 이 이벤트를 날리면, 이 이벤트를 구독 중인 다른 녀석들의 변수도 다 바뀝니다.\r\n            UnitEventBus.RaiseTileSelected(_selectedTile);\r\n        }\r\n\r\n\r\n\r\n\r\n        // ================================================================\r\n        // 유닛 판매\r\n        // ================================================================\r\n\r\n        /// <summary>\r\n        /// UI 판매 버튼 OnClick 연결\r\n        /// → UIActionBridge.OnClickSell()\r\n        /// → UnitEventBus.RaiseUnitSellRequested(selectedTile)\r\n        /// 선택 타일의 유닛 전체 판매 후 골드 지급\r\n        /// </summary>\r\n        \r\n        private void HandleSell(TileNode tile)\r\n        {\r\n            if (tile == null || !tile.isOccupied) return;\r\n\r\n            int totalGold = 0;\r\n            List<Unit> unitsToSell = new List<Unit>(tile.stackedUnits);\r\n\r\n            foreach (var unit in unitsToSell)\r\n            {\r\n               \r\n                var unitBase = unit.GetComponent<UnitBase>();\r\n                if (unitBase == null) continue;\r\n\r\n                //  _ratingType(Enum) 값에 따라 판매가 결정\r\n                int sellPrice = unitBase.RatingType switch\r\n                {\r\n                    UnitRatingType.NORMAL => 25,\r\n                    UnitRatingType.RARE => 75,\r\n                    UnitRatingType.EPIC => 225,\r\n                    UnitRatingType.HEROIC => 600,\r\n                    _ => 0\r\n                };\r\n\r\n                totalGold += sellPrice;\r\n                tile.RemoveUnit(unit);\r\n                Destroy(unit.gameObject);\r\n            }\r\n\r\n            GameManager.Instance.Gold += totalGold;\r\n\r\n            // 상태 초기화\r\n            _selectedTile = null;\r\n            UnitEventBus.RaiseTileDeselected();\r\n            UnitEventBus.RaiseUnitCollectionChanged();\r\n\r\n            Debug.Log($\"[UnitActionManager] {tile.name} 판매 완료: +{totalGold}G\");\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 일반 유닛 조합 (grade 1~3)\r\n        // ================================================================\r\n\r\n        /// <summary>\r\n        /// UI 조합 버튼 OnClick 연결\r\n        /// → UIActionBridge.OnClickMerge()\r\n        /// → UnitEventBus.RaiseUnitMergeRequested(selectedTile)\r\n        /// 동일 유닛 3스택 → 다음 등급 랜덤 유닛 생성\r\n        /// HEROIC(grade 4)는 일반 조합 불가 → 영웅 고유 조합 버튼 사용\r\n        /// </summary>\r\n        private void HandleMerge(TileNode tile)\r\n        {\r\n            if (tile == null)\r\n            {\r\n                Debug.LogWarning(\"[UnitActionManager] 조합 실패 : tile null → 타일을 먼저 선택하세요\");\r\n                return;\r\n            }\r\n\r\n            //if (tile.stackedUnits.Count < tile.maxStack)\r\n            //{\r\n            //    Debug.LogWarning($\"[UnitActionManager] 조합 실패 : \" +\r\n            //                     $\"{tile.stackedUnits.Count}/{tile.maxStack} 스택 → 3스택 필요\");\r\n            //    return;\r\n            //}\r\n\r\n            int firstGrade = tile.stackedUnits[0].data.grade;\r\n\r\n            // HEROIC 등급은 일반 조합 불가\r\n            // 주의 : HEROIC_GRADE(4) 기준 사용, UnitRatingType.HEROIC enum(3) 혼용 금지\r\n            if (firstGrade == HEROIC_GRADE)\r\n            {\r\n                Debug.LogWarning(\"[UnitActionManager] 조합 실패 : \" +\r\n                                 \"HEROIC(G4)는 일반 조합 불가 → 영웅 고유 조합 버튼 사용\");\r\n                return;\r\n            }\r\n\r\n            if (firstGrade >= 3)\r\n            {\r\n                Debug.LogWarning(\"[UnitActionManager] 조합 실패 : \" +\r\n                                 \"EPIC(G3)은 일반 조합 최고 등급 → 영웅 고유 조합으로만 상위 생성 가능\");\r\n                return;\r\n            }\r\n\r\n            // 모든 유닛 동일 등급 확인\r\n            foreach (var unit in tile.stackedUnits)\r\n            {\r\n                if (unit.data.grade != firstGrade)\r\n                {\r\n                    Debug.LogWarning(\"[UnitActionManager] 조합 실패 : 다른 등급 유닛 혼재\");\r\n                    return;\r\n                }\r\n            }\r\n\r\n            UnitData nextData = GetRandomUnitFromNextGrade(firstGrade);\r\n            if (nextData == null) return;\r\n\r\n            // 기존 유닛 3마리 제거\r\n            for (int i = tile.stackedUnits.Count - 1; i >= 0; i--)\r\n                Destroy(tile.stackedUnits[i].gameObject);\r\n\r\n            tile.stackedUnits.Clear();\r\n            tile.isOccupied = false;\r\n            tile.RefreshColor();\r\n\r\n            SpawnUnit(nextData, tile);\r\n            \r\n            //추가\r\n            tile.isOccupied = true;\r\n            _selectedTile = tile;\r\n            UnitEventBus.RaiseTileSelected(tile);\r\n            //[같은 유닛으로 이동방지]\r\n            // 스택 가능 타일 먼저 탐색 → 없으면 기존 타일 사용\r\n            //TileNode targetTile = mapGenerator.FindStackableTile(nextData) ?? tile;\r\n            //SpawnUnit(nextData, targetTile);\r\n\r\n\r\n            //_firstSelectedTile = null;\r\n            //_selectedTile = null;\r\n            //UnitEventBus.RaiseTileDeselected();\r\n            UnitEventBus.RaiseUnitCollectionChanged();\r\n            SoundEventBus.RaiseSFXRequested(SFXType.Merge);\r\n            Debug.Log($\"[UnitActionManager] 일반 조합 완료 : \" +\r\n                      $\"G{firstGrade} → {nextData.unitName} G{nextData.grade}\");  \r\n        }\r\n\r\n        private UnitData GetRandomUnitFromNextGrade(int currentGrade)\r\n        {\r\n            // 주의 : grade 1→2, 2→3, 3→4(HEROIC)는 영웅 고유 조합으로 처리\r\n            //        grade4Pool은 일반 조합에서 사용 안함 (예약 목적)\r\n            List<UnitData> pool = currentGrade switch\r\n            {\r\n                1 => grade2Pool,\r\n                2 => grade3Pool,\r\n                3 => grade4Pool,\r\n                _ => null\r\n            };\r\n\r\n            if (pool == null || pool.Count == 0)\r\n            {\r\n                Debug.LogError($\"[UnitActionManager] G{currentGrade + 1} 풀 비어있음 → \" +\r\n                               $\"인스펙터에서 grade{currentGrade + 1}Pool 에셋 등록 확인\");\r\n                return null;\r\n            }\r\n\r\n            return pool[Random.Range(0, pool.Count)];\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 유닛 생성 공통 메서드\r\n        // ================================================================\r\n\r\n        /// <summary>\r\n        /// UnitSpawner 및 조합 결과 생성 공통 메서드\r\n        /// data._prefab 방식 → UnitData 에셋마다 _prefab 연결 필수\r\n        /// 주의 : UnitData 에셋의 _prefab이 null이면 에러 발생\r\n        ///        04_Datas/Unit/UnitStats/ 각 에셋의 _prefab 슬롯 확인\r\n        /// </summary>\r\n        public void SpawnUnit(UnitData data, TileNode tile)\r\n        {\r\n            if (data._prefab == null)\r\n            {\r\n                Debug.LogError($\"[UnitActionManager] SpawnUnit 실패 : \" +\r\n                               $\"{data.unitName}의 _prefab null → \" +\r\n                               $\"UnitData 에셋에 프리팹 연결 필요\");\r\n                return;\r\n            }\r\n\r\n            if (tile == null)\r\n            {\r\n                Debug.LogError(\"[UnitActionManager] SpawnUnit 실패 : tile null\");\r\n                return;\r\n            }\r\n\r\n            // [추가]2D 기준 Z(-0.01f) : 타일보다 앞에 렌더링\r\n            Vector3 spawnPos = tile.transform.position + new Vector3(0f, 0f, -0.01f);\r\n            GameObject unitObj = Instantiate(data._prefab, spawnPos, Quaternion.identity);\r\n\r\n            Unit unit = unitObj.GetComponent<Unit>();\r\n            if (unit == null)\r\n            {\r\n                Debug.LogError($\"[UnitActionManager] {data._prefab.name}에 \" +\r\n                               \"Unit 컴포넌트 없음 → 프리팹 확인\");\r\n                Destroy(unitObj);\r\n                return;\r\n            }\r\n\r\n            unit.Init(data, tile);\r\n            tile.AddUnit(unit);\r\n\r\n            ApplyStackSortingOrder(unit, tile.stackedUnits.Count);\r\n            SoundEventBus.RaiseSFXRequested(SFXType.Summon);\r\n            Debug.Log($\"[UnitActionManager] 유닛 생성 : \" +\r\n                      $\"{data.unitName} G{data.grade} → {tile.name} \" +\r\n                      $\"[{tile.stackedUnits.Count}/{tile.maxStack}]\");\r\n            Debug.Log($\"[UnitActionManager] 유닛 정보 : {tile.stackedUnits[0].data.unitName} G{tile.stackedUnits[0].data.grade}\");\r\n        }\r\n\r\n        private void ApplyStackSortingOrder(Unit unit, int stackIndex)\r\n        {\r\n            if (unit == null) return;\r\n\r\n            // 기본 레이어 값 (예: 10)에 스택 번호를 더해 우선순위를 정합니다.\r\n            // 첫 번째는 11, 두 번째는 12, 세 번째는 13 순으로 위로 올라옵니다.\r\n            int baseOrder = 20;\r\n            int targetOrder = baseOrder - stackIndex;\r\n\r\n            //GetComponentsInChildren<SpriteRenderer>(true)를 통해 깊숙이 박힌 에셋까지 모두 찾습니다.\r\n            SpriteRenderer[] srs = unit.GetComponentsInChildren<SpriteRenderer>(true);\r\n            foreach (var sr in srs)\r\n            {\r\n                sr.sortingOrder = targetOrder;\r\n            }\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 유닛 강화\r\n        // ================================================================\r\n\r\n        /// <summary>\r\n        /// UI 강화 버튼 OnClick 연결\r\n        /// → UIActionBridge.OnClickUpgrade(grade)\r\n        /// → UnitEventBus.RaiseUnitUpgradeRequested(grade)\r\n        /// 해당 등급 유닛 전체 공격력 강화 (기본 공격력의 damageIncreaseRate%)\r\n        /// 강화마다 비용 증가 / 해당 등급 유닛 없으면 골드 차감 안함\r\n        /// </summary>\r\n        private void HandleUpgrade(int grade)\r\n        {\r\n            if (!_upgradeCounts.ContainsKey(grade))\r\n            {\r\n                Debug.LogError($\"[UnitActionManager] 강화 실패 : \" +\r\n                               $\"잘못된 등급 ({grade}) → 1~4만 허용\");\r\n                return;\r\n            }\r\n\r\n            if (GameManager.Instance == null)\r\n            {\r\n                Debug.LogError(\"[UnitActionManager] 강화 실패 : GameManager.Instance null\");\r\n                return;\r\n            }\r\n\r\n            int cost = GetUpgradeCost(grade);\r\n\r\n            if (GameManager.Instance.Gold < cost)\r\n            {\r\n                UIEventBus.RaiseWarningMessage(\"Gold is not enough!\");\r\n                Debug.LogWarning($\"[UnitActionManager] 강화 실패 : 골드 부족 | \" +\r\n                                 $\"필요:{cost}G / 보유:{GameManager.Instance.Gold}G\");\r\n                return;\r\n            }\r\n\r\n            // 주의 : FindObjectsByType은 성능 비용 있음\r\n            //        유닛 수가 많아지면 캐싱 방식으로 교체 고려\r\n            Unit[] allUnits = FindObjectsByType<Unit>(FindObjectsInactive.Exclude);\r\n            int affectedCount = 0;\r\n\r\n            foreach (var unit in allUnits)\r\n            {\r\n                if (unit.data == null) continue;\r\n                if (unit.data.grade != grade) continue;\r\n\r\n                float bonus = unit.data._damage * damageIncreaseRate;\r\n                unit.ApplyUpgrade(bonus);\r\n                affectedCount++;\r\n            }\r\n\r\n            if (affectedCount == 0)\r\n            {\r\n                Debug.LogWarning($\"[UnitActionManager] 강화 취소 : \" +\r\n                                 $\"G{grade} 유닛이 필드에 없음 → 골드 차감 안함\");\r\n                return;\r\n            }\r\n\r\n            GameManager.Instance.Gold -= cost;\r\n            _upgradeCounts[grade]++;\r\n            UnitEventBus.RaiseUnitCollectionChanged();\r\n            SoundEventBus.RaiseSFXRequested(SFXType.Upgrade);\r\n            Debug.Log($\"[UnitActionManager] G{grade} 강화 완료 | \" +\r\n                      $\"비용:{cost}G | 영향:{affectedCount}마리 | \" +\r\n                      $\"다음 비용:{GetUpgradeCost(grade)}G\");\r\n        }\r\n\r\n\r\n\r\n\r\n        // ================================================================\r\n        // 영웅 고유 조합 (grade 4 HEROIC)\r\n        // ================================================================\r\n\r\n        /// <summary>\r\n        /// UI 영웅 조합 버튼 OnClick 연결\r\n        /// → UIActionBridge.OnClickHeroicMerge()\r\n        /// → UnitEventBus.RaiseHeroicMergeRequested()\r\n        /// 등록된 레시피를 순서대로 검사 → 재료 충족 시 첫 번째 레시피 실행\r\n        /// 선택된 타일 기준이 아닌 필드 전체에서 재료 탐색\r\n        /// </summary>\r\n\r\n        private void HandleHeroicMerge()\r\n        {\r\n            \r\n\r\n            //레디 상테이외에 불가능\r\n            if (GameManager.Instance.GameState == GameState.WAVE_READY)\r\n            {\r\n                if (GameManager.Instance.Gold < _mergeGold)\r\n                {\r\n                    Debug.LogWarning($\"[UnitSpawner] 골드 부족!  {_mergeGold}골드가 필요해요.\");\r\n                    return;\r\n                }\r\n                // 최신 필드 유닛 상태를 다시 가져옵니다.\r\n                List<Unit> allUnits = GetAllFieldUnits();\r\n\r\n\r\n                Debug.Log($\"[조합 시도] 현재 필드 유닛 수: {allUnits.Count}\");\r\n\r\n                if (allUnits.Count == 0) return;\r\n\r\n                foreach (HeroicRecipeData recipe in heroicRecipeList)\r\n                {\r\n                    if (recipe == null) continue;\r\n\r\n                    // 재료가 있는지 확인\r\n                    if (TryExecuteHeroicRecipe(recipe, allUnits))\r\n                    {\r\n                        // 성공하면 바로 함수 종료 (영웅 대기열에 추가됨)\r\n                        return;\r\n                    }\r\n                }\r\n                UnitEventBus.RaiseUnitCollectionChanged();\r\n                Debug.Log(\"[UnitActionManager] 조합 가능한 레시피가 없습니다.\");\r\n            }\r\n        }\r\n\r\n\r\n        /// <summary>\r\n        /// 특정 레시피 재료가 필드에 충족되는지 확인 후 실행\r\n        /// 재료 충족 시 해당 유닛 제거 → 영웅 유닛 생성\r\n        /// </summary>\r\n        private bool TryExecuteHeroicRecipe(HeroicRecipeData recipe, List<Unit> allUnits)\r\n        {\r\n            //\r\n            if (recipe.resultUnit == null)\r\n            {\r\n                Debug.LogError($\"[UnitActionManager] 레시피 '{recipe.recipeName}'의 \" +\r\n                               \"resultUnit null → HeroicRecipeData 에셋에서 결과 유닛 연결 확인\");\r\n                return false;\r\n            }\r\n\r\n            // 재료별 매칭 유닛 탐색\r\n            // key : 재료 인덱스 / value : 소모할 Unit 리스트\r\n            Dictionary<int, List<Unit>> ingredientMap = new Dictionary<int, List<Unit>>();\r\n\r\n            for (int i = 0; i < recipe.ingredientList.Count; i++)\r\n            {\r\n                RecipeIngredient ingredient = recipe.ingredientList[i];\r\n\r\n                // 주의 : unitName 대소문자 완전 일치 필요\r\n                //        UnitData.unitName과 HeroicRecipeData.ingredientList[i].unitName 비교\r\n                //foreach (var u in allUnits)\r\n                //{\r\n                //     Debug.Log($\"[체크] 필드 유닛명: '{u.data.unitName}' (G{u.data.grade}) <-> 레시피 요구: '{ingredient.unitName}' (G{ingredient.grade})\");\r\n                //}\r\n                List<Unit> matched = allUnits\r\n                .Where(u => u != null\r\n                        && u.data != null\r\n                        && u.data == ingredient.unitData) // 데이터 에셋이 일치하는지 바로 확인\r\n                .ToList();\r\n\r\n                //List<Unit> matched = allUnits\r\n                //    .Where(u => u != null\r\n                //             && u.data != null\r\n                //             && u.data.unitName == ingredient.unitName\r\n                //             && u.data.grade == ingredient.grade)\r\n                    //.ToList();\r\n\r\n                if (matched.Count < ingredient.count)\r\n                {\r\n                    //Debug.Log($\"[UnitActionManager] 레시피 '{recipe.recipeName}' 재료 부족 | \" +\r\n                    //          $\"{ingredient.unitName} G{ingredient.grade} : \" +\r\n                    //          $\"보유 {matched.Count} / 필요 {ingredient.count}\");\r\n                    return false;\r\n                }\r\n\r\n                // 필요 수량만큼만 추출\r\n                ingredientMap[i] = matched.Take(ingredient.count).ToList();\r\n            }\r\n\r\n            GameManager.Instance.Gold -= _mergeGold;\r\n            // 재료 전부 충족 → 실행\r\n            ExecuteHeroicMerge(recipe, ingredientMap);\r\n            return true;\r\n        }\r\n\r\n        /// <summary>\r\n        /// 재료 유닛 제거 → 영웅 유닛 생성\r\n        /// 스폰 위치 : 빈 플레이어블 타일 우선 / 없으면 첫 번째 재료 타일\r\n        /// </summary>\r\n       \r\n        //private void ExecuteHeroicMerge(HeroicRecipeData recipe, Dictionary<int, List<Unit>> ingredientMap)\r\n        //{\r\n        //    // 재료 유닛들만 제거 (Destroy만 진행)\r\n        //    foreach (var kvp in ingredientMap)\r\n        //    {\r\n        //        foreach (Unit unit in kvp.Value)\r\n        //        {\r\n        //            if (unit == null) continue;\r\n        //            TileNode tile = unit.GetCurrentTile();\r\n        //            if (tile != null) tile.RemoveUnit(unit);\r\n        //            Destroy(unit.gameObject);\r\n        //        }\r\n        //    }\r\n\r\n        //    //필드에 소환하지 않고 '대기 큐'에 저장\r\n        //    _pendingHeroicUnits.Enqueue(recipe.resultUnit);\r\n\r\n        //    // 선택 상태 초기화\r\n        //    _firstSelectedTile = null;\r\n        //    _selectedTile = null;\r\n        //    UnitEventBus.RaiseTileDeselected();\r\n        //    UnitEventBus.RaiseUnitCollectionChanged();\r\n        //    Debug.Log($\"[UnitActionManager] 영웅 조합 성공! '{recipe.resultUnit.unitName}'이 소환 대기 목록에 추가되었습니다. (현재 대기: {_pendingHeroicUnits.Count})\");\r\n        //}\r\n\r\n        private void ExecuteHeroicMerge(HeroicRecipeData recipe, Dictionary<int, List<Unit>> ingredientMap)\r\n        {\r\n            // 1. 모든 재료 유닛 리스트 추출 및 중심점 계산\r\n            List<Unit> materials = new List<Unit>();\r\n            Vector3 centerPosition = Vector3.zero;\r\n\r\n            foreach (var kvp in ingredientMap)\r\n            {\r\n                foreach (Unit unit in kvp.Value)\r\n                {\r\n                    materials.Add(unit);\r\n                    centerPosition += unit.transform.position;\r\n\r\n                    // 타일에서 미리 제거하여 다른 유닛이 배치될 수 있게 해요\r\n                    TileNode tile = unit.GetCurrentTile();\r\n                    if (tile != null) tile.RemoveUnit(unit);\r\n                }\r\n            }\r\n            centerPosition /= materials.Count; // 평균 위치 (중심점)\r\n\r\n            // 2. 연출 코루틴 실행\r\n            StartCoroutine(MergeAnimationRoutine(recipe, materials, centerPosition));\r\n\r\n            // 선택 상태 초기화\r\n            _firstSelectedTile = null;\r\n            _selectedTile = null;\r\n            UnitEventBus.RaiseTileDeselected();\r\n        }\r\n\r\n        private IEnumerator MergeAnimationRoutine(HeroicRecipeData recipe, List<Unit> materials, Vector3 targetPos)\r\n        {\r\n            float mergeDuration = 0.5f; // 재료가 모이는 시간\r\n            float showDuration = 1.2f;  // 완성된 유닛을 보여주는 시간\r\n            float elapsed = 0f;\r\n\r\n            // 1. 재료 유닛들이 중심점으로 빨려 들어가는 연출\r\n            Dictionary<Unit, Vector3> startPositions = new Dictionary<Unit, Vector3>();\r\n            foreach (var u in materials) if (u != null) startPositions[u] = u.transform.position;\r\n\r\n            while (elapsed < mergeDuration)\r\n            {\r\n                elapsed += Time.deltaTime;\r\n                float t = elapsed / mergeDuration;\r\n                foreach (var unit in materials)\r\n                {\r\n                    if (unit == null) continue;\r\n                    unit.transform.position = Vector3.Lerp(startPositions[unit], targetPos, t * t);\r\n                    unit.transform.localScale = Vector3.Lerp(Vector3.one, Vector3.zero, t);\r\n                }\r\n                yield return null;\r\n            }\r\n\r\n            // 2. 재료 유닛 제거 \r\n            foreach (var unit in materials) if (unit != null) Destroy(unit.gameObject);\r\n\r\n            // 3. 완성될 영웅 유닛 프리뷰 생성\r\n            GameObject effect = Instantiate(mergeEffectPrefab, targetPos, Quaternion.identity);\r\n            Destroy(effect, 2f);\r\n            GameObject previewUnit = Instantiate(recipe.resultUnit._prefab, targetPos, Quaternion.identity);\r\n\r\n            // 프리뷰 유닛은 공격하거나 움직이지 않게 스크립트를 꺼두는 게 좋아요\r\n            if (previewUnit.TryGetComponent(out Unit unitScript)) unitScript.enabled = false;\r\n\r\n            // 웅장하게 나타나는 효과 (작았다가 커지기)\r\n            previewUnit.transform.localScale = Vector3.zero;\r\n            float pElapsed = 0f;\r\n            float pDuration = 0.3f;\r\n            while (pElapsed < pDuration)\r\n            {\r\n                pElapsed += Time.deltaTime;\r\n                previewUnit.transform.localScale = Vector3.Lerp(Vector3.zero, Vector3.one * 1.2f, pElapsed / pDuration);\r\n                yield return null;\r\n            }\r\n            previewUnit.transform.localScale = Vector3.one;\r\n\r\n            GameObject mergeSpeffect = Instantiate(_mergeSpEffectPrefab, targetPos, Quaternion.identity);\r\n            SoundEventBus.RaiseUnitSFXRequested(Unit_Sfx_Type.HIT_CRITICAL, targetPos);\r\n            Destroy(mergeSpeffect, 2f);\r\n            \r\n            \r\n            yield return new WaitForSeconds(showDuration);\r\n\r\n            // 4. 대기열로 들어가는 연출\r\n            elapsed = 0f;\r\n            Vector3 exitPos = targetPos + Vector3.up * 2f;\r\n            while (elapsed < 0.4f)\r\n            {\r\n                elapsed += Time.deltaTime;\r\n                float t = elapsed / 0.4f;\r\n                previewUnit.transform.position = Vector3.Lerp(targetPos, exitPos, t);\r\n                previewUnit.transform.localScale = Vector3.Lerp(Vector3.one, Vector3.zero, t);\r\n                yield return null;\r\n            }\r\n\r\n            // 5. 프리뷰 제거 및 실제 데이터 큐에 추가\r\n            Destroy(previewUnit);\r\n            _pendingHeroicUnits.Enqueue(recipe.resultUnit);\r\n            UnitEventBus.RaiseUnitCollectionChanged();\r\n\r\n            Debug.Log($\"[UnitActionManager] 영웅 조합 완료: {recipe.resultUnit.unitName} 큐에 추가됨\");\r\n\r\n            // 튜토리얼 알림 (튜토리얼 진행 중일 때만 반응)\r\n            LuckyRandomDefense.Tutorial.TutorialManager.Instance?.NotifyHeroCreated();\r\n        }\r\n\r\n\r\n\r\n\r\n        /// <summary>\r\n        /// 현재 플레이어블 타일에 있는 모든 유닛 수집\r\n        /// 영웅 조합 재료 탐색 시 사용\r\n        /// </summary>\r\n        private List<Unit> GetAllFieldUnits()\r\n        {\r\n            List<Unit> result = new List<Unit>();\r\n            \r\n            List<TileNode> playableTiles = mapGenerator.GetAllPlayableTiles();\r\n            Debug.Log($\"[playableTiles] 타일 갖고 옴 : {playableTiles.Count}개\");\r\n            foreach (TileNode tile in playableTiles)\r\n            {\r\n                if (tile == null || !tile.isOccupied) continue;\r\n\r\n                foreach (Unit unit in tile.stackedUnits)\r\n                {\r\n\r\n                    if (unit != null)\r\n                        result.Add(unit);\r\n                }\r\n            }\r\n\r\n            Debug.Log($\"[UnitActionManager] 필드 유닛 수집 : {result.Count}마리\");\r\n            return result;\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 외부 참조용 유틸 (UI 연동)\r\n        // ================================================================\r\n\r\n        /// <summary>현재 강화 비용 반환 (UI 표시용)</summary>\r\n        public int GetUpgradeCost(int grade)\r\n        {\r\n            if (!_upgradeCounts.ContainsKey(grade)) return baseUpgradeCost;\r\n            return baseUpgradeCost + (costIncreasePerLevel * _upgradeCounts[grade]);\r\n        }\r\n\r\n        /// <summary>현재 강화 횟수 반환 (UI 표시용)</summary>\r\n        public int GetUpgradeCount(int grade)\r\n        {\r\n            if (!_upgradeCounts.ContainsKey(grade)) return 0;\r\n            return _upgradeCounts[grade];\r\n        }\r\n\r\n        /// <summary>\r\n        /// 현재 조합 가능한 영웅 레시피 목록 반환 (UI 표시용)\r\n        /// 재료가 충족된 레시피만 반환\r\n        /// </summary>\r\n        /// \r\n        public List<HeroicRecipeData> GetAvailableHeroicRecipes()\r\n        {\r\n            if (mapGenerator == null) return new List<HeroicRecipeData>();\r\n\r\n            // 필드에 있는 모든 유닛 수집\r\n            List<Unit> allUnits = GetAllFieldUnits();\r\n            List<HeroicRecipeData> available = new List<HeroicRecipeData>();\r\n\r\n            //  등록된 모든 영웅 레시피를 하나씩 검사\r\n            foreach (HeroicRecipeData recipe in heroicRecipeList)\r\n            {\r\n                if (recipe == null) continue;\r\n\r\n                bool canMerge = true;\r\n\r\n                // 레시피에 필요한 각 재료가 충분한지 확인\r\n                foreach (RecipeIngredient ingredient in recipe.ingredientList)\r\n                {\r\n                    if (ingredient.unitData == null) continue; \r\n\r\n                    // [변경 지점] 이름/등급 비교가 아니라 에셋 자체가 같은지 확인\r\n                    int matchedCount = allUnits.Count(u =>\r\n                        u != null &&\r\n                        u.data != null &&\r\n                        u.data == ingredient.unitData); // 에셋 직접 비교\r\n\r\n                    if (matchedCount < ingredient.count)\r\n                    {\r\n                        canMerge = false;\r\n                        break;\r\n                    }\r\n                }\r\n\r\n                // 모든 재료가 충족되었다면 리스트에 추가\r\n                if (canMerge)\r\n                    available.Add(recipe);\r\n            }\r\n\r\n            return available;\r\n        }\r\n\r\n\r\n       \r\n    }\r\n}","lines":891},{"id":"02_Scripts/Core/PoolManager.cs","name":"PoolManager","path":"02_Scripts/Core/PoolManager.cs","layer":"Core","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"class PoolManager : MonoBehaviour","src":"using UnityEngine;\r\nusing System.Collections.Generic;\r\nusing Unity.VisualScripting;\r\n\r\nnamespace LuckyRandomDefense.Core\r\n{\r\n    public class PoolManager : MonoBehaviour\r\n    {\r\n        public static PoolManager Instance { get; private set; }\r\n\r\n        [System.Serializable]\r\n        public struct Pool\r\n        {\r\n            public string Name;\r\n            public GameObject Prefab;\r\n            public int Size;\r\n        }\r\n\r\n        [SerializeField] private List<Pool> _pools;\r\n        private Dictionary<string, List<GameObject>> _poolDictionary\r\n            = new Dictionary<string, List<GameObject>>();\r\n\r\n        private void Awake()\r\n        {\r\n            if(Instance != null && Instance != this)\r\n            {\r\n                Destroy(gameObject);\r\n                return;\r\n            }\r\n            Instance = this;\r\n\r\n            foreach(Pool pool in _pools)\r\n            {\r\n                if (_poolDictionary.ContainsKey(pool.Name)) continue;\r\n\r\n                List<GameObject> enemyPool = new List<GameObject>();\r\n\r\n                for(int i = 0;  i < pool.Size; i++)\r\n                {\r\n                    if(pool.Prefab == null)\r\n                    {\r\n                        Debug.LogWarning($\"Prefab for pool '{pool.Name}' is not assigned.\");\r\n                        continue;\r\n                    } else if (this.transform == null)\r\n                    {\r\n                        Debug.LogWarning($\"PoolManager '{this.name}' does not have a valid transform.\");\r\n                        continue;\r\n                    }\r\n                    GameObject enemy = Instantiate(pool.Prefab, this.transform);\r\n                    enemy.SetActive(false);\r\n                    enemyPool.Add(enemy);\r\n                }\r\n                _poolDictionary.Add(pool.Name, enemyPool);\r\n            }\r\n        }\r\n\r\n        public GameObject GetEnemy(EnemyData data)\r\n        {\r\n            if(data == null) return null;\r\n\r\n            string name = data._name;\r\n\r\n            if(!_poolDictionary.ContainsKey(name))\r\n            {\r\n                _poolDictionary.Add(name, new List<GameObject>());\r\n            }\r\n\r\n            foreach(GameObject enemy in _poolDictionary[name])\r\n            {\r\n                if(enemy != null && !enemy.activeInHierarchy)\r\n                {\r\n                    enemy.SetActive(true);\r\n                    return enemy;\r\n                }\r\n            }\r\n\r\n            if(data._prefab != null)\r\n            {\r\n                GameObject newEnemy = Instantiate(data._prefab, this.transform);\r\n                newEnemy.SetActive(true);\r\n                _poolDictionary[name].Add(newEnemy);\r\n                return newEnemy;\r\n            }\r\n            return null;\r\n        }\r\n    }\r\n}\r\n\r\n","lines":89},{"id":"02_Scripts/Node/ProceduralMap.cs","name":"ProceduralMap","path":"02_Scripts/Node/ProceduralMap.cs","layer":"Node","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"시드 지정 생성 (이어하기용)","src":"﻿using JetBrains.Annotations;\r\nusing NUnit.Framework.Interfaces;\r\nusing System.Collections.Generic;\r\nusing Unity.AI.Navigation;\r\n#if UNITY_EDITOR\r\nusing UnityEditor.Tilemaps;\r\n#endif\r\nusing UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.Node\r\n{\r\n    public class ProceduralMap : MonoBehaviour\r\n    {\r\n        public static ProceduralMap Instance { get; private set; }\r\n\r\n        [Header(\"맵 기본 설정\")]\r\n        public int _width = 60;\r\n        public int _height = 40;\r\n        public float _tileSize = 1f;\r\n        public float _tileGap = 0.02f;\r\n\r\n        [Header(\"동굴 알고리즘\")]\r\n        [Range(0, 100)]\r\n        public int _randomFillPercent = 40;\r\n        public int _smoothIterations = 5;\r\n        private Vector2Int _spawnPos;\r\n        private Vector2Int _goalPos;\r\n\r\n        public Vector2Int SpawnPos => _spawnPos;\r\n        public Vector2Int GoalPos => _goalPos;\r\n\r\n        [Header(\"Prefab & Materials\")]\r\n        public GameObject _tilePrefab;\r\n        public Transform _tileContainer;\r\n\r\n        [Header(\"Tile Sprite_Floor\")]\r\n        public Sprite _spriteFloorMid;\r\n        public Sprite _spriteFloorTop;\r\n        public Sprite _spriteFloorBot;\r\n        public Sprite _spriteFloorLeft;\r\n        public Sprite _spriteFloorRight;\r\n        public Sprite _spriteFloorTL;\r\n        public Sprite _spriteFloorTR;\r\n        public Sprite _spriteFloorBL;\r\n        public Sprite _spriteFloorBR;\r\n\r\n        [Header(\"Tile Sprite_Cliff\")]\r\n        public Sprite _spriteCliffLeft;\r\n        public Sprite _spriteCliffRight;\r\n        public Sprite _spriteCliffMid;\r\n\r\n\r\n        private MapEnvironment _mapEnv;\r\n\r\n        private int[,] _mapData;\r\n        public TileNode[,] Tiles { get; private set; }\r\n\r\n        public int CurrentSeed { get; private set; }\r\n\r\n        public Vector3 GetMapCenter()\r\n        {\r\n            return transform.position;\r\n        }\r\n\r\n        public Vector2 GetMapSize()\r\n        {\r\n            float totalWidth = (_width * _tileSize) + ((_width - 1) * _tileGap);\r\n            float totalHeight = (_height * _tileSize) + ((_height - 1) * _tileGap);\r\n            return new Vector2(totalWidth, totalHeight);\r\n        }\r\n\r\n        private void Awake()\r\n        {\r\n            if(Instance == null)\r\n            {\r\n                Instance = this;\r\n            }\r\n            else\r\n            {\r\n                Destroy(gameObject);\r\n            }\r\n\r\n            _mapEnv = GetComponent<MapEnvironment>();\r\n        }\r\n\r\n        // 씬 시작 시 자동 생성 제거 → GameManager.StartGame()에서 호출\r\n        // void Start() { GenerateMap(System.Environment.TickCount); }\r\n\r\n        /// <summary>시드 지정 생성 (이어하기용)</summary>\r\n        public void GenerateMap(int seed)\r\n        {\r\n            CurrentSeed = seed;\r\n            Random.InitState(seed);\r\n            GenerateMap();\r\n        }\r\n\r\n        public void GenerateMap()\r\n        {\r\n            foreach (Transform child in _tileContainer) Destroy(child.gameObject);\r\n\r\n            if (_mapEnv != null) _mapEnv.ClearEnvironment();\r\n\r\n            _mapData = new int[_width, _height];\r\n            Tiles = new TileNode[_width, _height];\r\n\r\n            RandomFillMap();\r\n\r\n            for (int i = 0; i < _smoothIterations; i++)\r\n            {\r\n                SmoothMap();\r\n            }\r\n\r\n            CarvePath(_spawnPos, _goalPos);\r\n            DrawMap();\r\n\r\n            if(_mapEnv != null)\r\n            {\r\n                float step = _tileSize + _tileGap;\r\n                _mapEnv.ClearEnvironment();\r\n                _mapEnv.Decorate(_mapData, _width, _height, GetOriginPosition(), step);\r\n            }\r\n        }\r\n\r\n        private void RandomFillMap()\r\n        {\r\n            int randomSpawnY = Random.Range(1, _height - 1);\r\n            int randomGoalY = Random.Range(1, _height - 1);\r\n\r\n            _spawnPos = new Vector2Int(0, randomSpawnY);\r\n            _goalPos = new Vector2Int(_width - 1, randomGoalY);\r\n\r\n            for (int x = 0; x < _width; x++)\r\n            {\r\n                for (int y = 0; y < _height; y++)\r\n                {\r\n                    if (IsAroundSpawnAndGoal(x, y))\r\n                    {\r\n                        _mapData[x, y] = 0;\r\n                    }\r\n                    else if (x == 0 || x == _width - 1 || y == 0 || y == _height - 1)\r\n                    {\r\n                        _mapData[x, y] = 1;\r\n                    }\r\n                    else\r\n                    {\r\n                        _mapData[x, y] = (Random.Range(0, 100) < _randomFillPercent) ? 1 : 0;\r\n                    }\r\n                }\r\n            }\r\n        }\r\n\r\n        private bool IsAroundSpawnAndGoal(int x, int y)\r\n        {\r\n            if (x >= _spawnPos.x && x <= _spawnPos.x + 2\r\n                && y >= _spawnPos.y && y <= _spawnPos.y + 1)\r\n                return true;\r\n\r\n            if (x >= _goalPos.x - 2 && x <= _goalPos.x\r\n                && y >= _goalPos.y - 1 && y <= _goalPos.y + 1)\r\n                return true;\r\n\r\n            return false;\r\n        }\r\n\r\n        private void SmoothMap()\r\n        {\r\n            int[,] nextMap = new int[_width, _height];\r\n\r\n            for (int x = 0; x < _width; x++)\r\n            {\r\n                for (int y = 0; y < _height; y++)\r\n                {\r\n                    int neighborWalls = GetSurroundingWallCount(x, y);\r\n\r\n                    if (neighborWalls > 4) nextMap[x, y] = 1;\r\n                    else if (neighborWalls < 4) nextMap[x, y] = 0;\r\n                    else nextMap[x, y] = _mapData[x, y];\r\n                }\r\n            }\r\n            _mapData = nextMap;\r\n        }\r\n\r\n        private int GetSurroundingWallCount(int gridX, int gridY)\r\n        {\r\n            int wallCount = 0;\r\n            for (int x = gridX - 1; x <= gridX + 1; x++)\r\n            {\r\n                for (int y = gridY - 1; y <= gridY + 1; y++)\r\n                {\r\n                    if (x >= 0 && x < _width && y >= 0 && y < _height)\r\n                    {\r\n                        if (x != gridX || y != gridY)\r\n                            wallCount += _mapData[x, y];\r\n                    }\r\n                    else wallCount++;\r\n                }\r\n            }\r\n            return wallCount;\r\n        }\r\n\r\n        private void DrawMap()\r\n        {\r\n            float step = _tileSize + _tileGap;\r\n            Vector3 origin = GetOriginPosition();\r\n\r\n            for (int x = 0; x < _width; x++)\r\n            {\r\n                for (int y = 0; y < _height; y++)\r\n                {\r\n                    Vector3 pos = origin + new Vector3(x * step, y * step, 0f);\r\n                    GameObject go = Instantiate(_tilePrefab, pos, Quaternion.identity, _tileContainer);\r\n                    Vector3 currentScale = go.transform.localScale;\r\n                    go.transform.localScale = new Vector3(_tileSize, _tileSize, currentScale.z);\r\n\r\n                    TileNode node = go.GetComponent<TileNode>();\r\n                    SpriteRenderer sr = go.GetComponent<SpriteRenderer>();\r\n\r\n                    TileType type;\r\n                    if (x == _spawnPos.x && y == _spawnPos.y)\r\n                    {\r\n                        type = TileType.Spawn;\r\n                    }\r\n                    else if (x == _goalPos.x && y == _goalPos.y)\r\n                    {\r\n                        type = TileType.Goal;\r\n                    }\r\n                    else type = (_mapData[x, y] == 1) ? TileType.Forbidden : TileType.Playable;\r\n\r\n                    if(sr != null)\r\n                    {\r\n                        sr.sprite = GetTileSprite(x, y, _mapData[x, y]);\r\n                    }\r\n                    \r\n                    node.Init(x, y, type);\r\n                    Tiles[x, y] = node;\r\n\r\n                    Renderer tile = go.GetComponent<Renderer>();\r\n                    switch (type)\r\n                    {\r\n                        case TileType.Spawn:\r\n                            tile.material.color = Color.red;\r\n                            break;\r\n                        case TileType.Goal:\r\n                            tile.material.color = Color.green;\r\n                            break;\r\n                        //case TileType.Forbidden:\r\n                        //    tile.material.color = Color.gray;\r\n                        //    break;\r\n                        default:\r\n                            tile.material.color = Color.white;\r\n                            break;\r\n                    }\r\n                }\r\n            }\r\n        }\r\n\r\n        private void CarvePath(Vector2Int start, Vector2Int end)\r\n        {\r\n            int x = start.x;\r\n            int y = start.y;\r\n            while (x != end.x || y != end.y)\r\n            {\r\n                if (x < end.x) x++;\r\n                else if (x > end.x) x--;\r\n\r\n                if (y < end.y) y++;\r\n                else if (y > end.y) y--;\r\n\r\n\r\n                for (int i = -1; i <= 1; i++)\r\n                {\r\n                    for (int j = -1; j <= 1; j++)\r\n                    {\r\n                        int nx = Mathf.Clamp(x + i, 0, _width - 1);\r\n                        int ny = Mathf.Clamp(y + j, 0, _height - 1);\r\n                        _mapData[nx, ny] = 0;\r\n                    }\r\n                }\r\n            }\r\n        }\r\n\r\n        private Vector3 GetOriginPosition()\r\n        {\r\n            float totalWidth = (_width * _tileSize) + ((_width - 1) * _tileGap);\r\n            float totalHeight = (_height * _tileSize) + ((_height - 1) * _tileGap);\r\n\r\n            return transform.position\r\n                - new Vector3(totalWidth / 2f - _tileSize / 2f\r\n                , totalHeight / 2f - _tileSize / 2f\r\n                , 0f);\r\n        }\r\n\r\n        public bool CanPlaceUnit(TileNode selectedNode)\r\n        {\r\n            if (selectedNode.tileType != TileType.Playable) return false;\r\n\r\n            TileType originalType = selectedNode.tileType;\r\n            selectedNode.SetType(TileType.Forbidden);\r\n\r\n            PathFinder finder = GetComponent<PathFinder>();\r\n            var path = finder.FindPath(SpawnPos, GoalPos);\r\n\r\n            selectedNode.SetType(originalType);\r\n\r\n            return path != null;\r\n        }\r\n\r\n        public List<TileNode> GetAllPlayableTiles()\r\n        {\r\n            var list = new List<TileNode>();\r\n\r\n            // 맵이 아직 생성되지 않은 시점(타이틀/스테이지 선택/WAVE_READY 직전 등)에서\r\n            // 영웅 조합 버튼·HUD 등이 호출하면 Tiles가 null인 상태로 들어옴 → 빈 리스트 반환\r\n            if (Tiles == null || _width <= 0 || _height <= 0)\r\n            {\r\n                Debug.LogWarning($\"[ProceduralMap] GetAllPlayableTiles 호출됐지만 맵 미생성 \" +\r\n                                 $\"(Tiles={(Tiles == null ? \"null\" : \"ok\")} w={_width} h={_height}) → 빈 리스트 반환\");\r\n                return list;\r\n            }\r\n\r\n            for (int x = 0; x < _width; x++)\r\n            {\r\n                for (int y = 0; y < _height; y++)\r\n                {\r\n                    var tile = Tiles[x, y];\r\n\r\n                    if (tile == null) continue;\r\n\r\n                    if (tile.tileType == TileType.Playable || tile.isOccupied)\r\n                    {\r\n                        list.Add(tile);\r\n                    }\r\n                }\r\n            }\r\n\r\n            return list;\r\n        }\r\n\r\n        public TileNode FindStackableTile(UnitData data)\r\n        {\r\n            for (int x = 0; x < _width; x++)\r\n            {\r\n                for (int y = 0; y < _height; y++)\r\n                {\r\n                    var tile = Tiles[x, y];\r\n\r\n                    if (tile == null) continue;\r\n                    if (tile.tileType != TileType.Playable) continue;\r\n\r\n                    if (tile.CanStack(data))\r\n                        return tile;\r\n                }\r\n            }\r\n\r\n            return null;\r\n        }\r\n\r\n        public TileNode GetRandomEmptyPlayableTile()\r\n        {\r\n            var candidates = new List<TileNode>();\r\n\r\n            for (int x = 0; x < _width; x++)\r\n            {\r\n                for (int y = 0; y < _height; y++)\r\n                {\r\n                    var tile = Tiles[x, y];\r\n\r\n                    if (tile == null) continue;\r\n\r\n                    if (tile.tileType == TileType.Playable && !tile.isOccupied)\r\n                        candidates.Add(tile);\r\n                }\r\n            }\r\n\r\n            if (candidates.Count == 0) return null;\r\n\r\n            return candidates[Random.Range(0, candidates.Count)];\r\n        }\r\n\r\n        private Sprite GetTileSprite(int x, int y, int typeValue)\r\n        {\r\n            System.Func<int, int, int> GetMapData = (tx, ty) =>\r\n            {\r\n                if (tx < 0 || tx >= _width || ty < 0 || ty >= _height) return 1;\r\n                return _mapData[tx, ty];\r\n            };\r\n\r\n            if (typeValue == 0)\r\n            {\r\n                return _spriteFloorMid;\r\n            }\r\n\r\n            int u = GetMapData(x, y + 1);\r\n            int d = GetMapData(x, y - 1);\r\n            int l = GetMapData(x - 1, y);\r\n            int r = GetMapData(x + 1, y);\r\n\r\n\r\n            // ---------------------------------------------------------\r\n            // 1. Playable '아래쪽'(y-1) Forbidden: 바닥 경계면\r\n            // ---------------------------------------------------------\r\n            if (u == 0)\r\n            {\r\n                if (l == 0 && r != 0) return _spriteFloorTR;\r\n                if (r == 0 && l != 0) return _spriteFloorTL;\r\n                return _spriteFloorTop;\r\n            }\r\n\r\n            // ---------------------------------------------------------\r\n            // 2. [추가] Playable '위쪽 대각선' Forbidden: 바닥 하단 모서리 (화살표 부분)\r\n            // ---------------------------------------------------------\r\n            // 내 대각선 아래(x+1, y-1)가 길인데, 내 바로 아래(y-1)는 벽(절벽)인 경우\r\n            if (GetMapData(x + 1, y - 1) == 0 && d == 1) return _spriteFloorBL;\r\n            if (GetMapData(x - 1, y - 1) == 0 && d == 1) return _spriteFloorBR;\r\n\r\n            // ---------------------------------------------------------\r\n            // 3. Playable '위쪽'(y+1) Forbidden: Cliff (절벽 면)\r\n            // ---------------------------------------------------------\r\n            if (d == 0)\r\n            {\r\n                if (l == 0) return _spriteCliffLeft;\r\n                if (r == 0) return _spriteCliffRight;\r\n                return _spriteCliffMid;\r\n            }\r\n\r\n            // ---------------------------------------------------------\r\n            // 4. 측면 및 나머지 대각선\r\n            // ---------------------------------------------------------\r\n            if (r == 0) return _spriteFloorLeft;\r\n            if (l == 0) return _spriteFloorRight;\r\n\r\n            // (기존 대각선 로직)\r\n            if (GetMapData(x + 1, y - 1) == 0) return _spriteFloorTR;\r\n            if (GetMapData(x - 1, y - 1) == 0) return _spriteFloorTL;\r\n\r\n            // ---------------------------------------------------------\r\n            // 5. 기본 배경\r\n            // ---------------------------------------------------------\r\n            if (y == 0) return _spriteCliffMid;\r\n            return _spriteFloorMid;\r\n\r\n            //if(d == 0 && u == 1)\r\n            //{\r\n            //    if (l == 0) return _spriteCliffLeft;\r\n            //    if (r == 0) return _spriteCliffRight;\r\n            //    return _spriteCliffMid;\r\n            //}\r\n\r\n            //if(u == 0)\r\n            //{\r\n            //    if (l != 0 && GetMapData(x - 1, y + 1) == 0) return _spriteFloorTL;\r\n            //    if (r != 0 && GetMapData(x + 1, y + 1) == 0) return _spriteFloorTR;\r\n\r\n            //    return _spriteFloorTop;\r\n            //}\r\n\r\n            //if (GetMapData(x + 1, y + 1) == 0 && r != 0 && u != 0) return _spriteFloorTR;\r\n            //if (GetMapData(x - 1, y + 1) == 0 && l != 0 && u != 0) return _spriteFloorTL;\r\n            //if (l == 0) return _spriteFloorRight;\r\n            //if (r == 0) return _spriteFloorLeft;\r\n\r\n            //if (y == 0 ) return _spriteCliffMid;\r\n\r\n            //return _spriteFloorMid;\r\n\r\n        }\r\n    }\r\n}\r\n\r\n\r\n","lines":471},{"id":"02_Scripts/Node/NodeInputHandler.cs","name":"NodeInputHandler","path":"02_Scripts/Node/NodeInputHandler.cs","layer":"Node","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"UI 클릭이면 타일 클릭 막기","src":"﻿using LuckyRandomDefense.Core.EventBus;\r\nusing System;\r\nusing UnityEngine;\r\nusing UnityEngine.EventSystems;\r\nusing UnityEngine.InputSystem;\r\n\r\nnamespace LuckyRandomDefense.Node\r\n{\r\n    public class NodeInputHandler : MonoBehaviour\r\n    {\r\n        public static NodeInputHandler Instance { get; private set; }\r\n\r\n        public static event Action<TileNode> OnTileClicked;\r\n        public static event Action<TileNode> OnTileRightClicked;\r\n        public static event Action<TileNode> OnTileHovered;\r\n        public static event Action<TileNode> OnTileHoverExited;\r\n\r\n        private TileNode _selectedTile;\r\n        private TileNode _lastHoveredTile;\r\n\r\n        [Header(\"Raycast 설정\")]\r\n        public LayerMask tileLayer;\r\n\r\n\r\n        public TileNode SelectedTile\r\n        {\r\n            get => _selectedTile;\r\n            set => _selectedTile = value;\r\n        }\r\n\r\n\r\n        private void Awake()\r\n        {\r\n            if (Instance == null) Instance = this;\r\n            else Destroy(gameObject);\r\n        }\r\n\r\n\r\n        void Update()\r\n        {\r\n            HandleHover();\r\n            if (Mouse.current.leftButton.wasPressedThisFrame)\r\n            {\r\n                // UI 클릭이면 타일 클릭 막기\r\n                if (EventSystem.current.IsPointerOverGameObject())\r\n                    return;\r\n\r\n                HandleClick();\r\n            }\r\n\r\n            if (Mouse.current.rightButton.wasPressedThisFrame)\r\n                HandleRightClick();\r\n        }\r\n\r\n        private void HandleHover()\r\n        {\r\n            TileNode tile = GetTileUnderMouse();\r\n            if (tile == _lastHoveredTile) return;\r\n\r\n            if (_lastHoveredTile != null)\r\n            {\r\n                // 선택된 타일은 selectedColor 유지\r\n                if (_lastHoveredTile == _selectedTile)\r\n                    _lastHoveredTile.OnSelected();\r\n                else\r\n                    _lastHoveredTile.RefreshColor();\r\n\r\n                OnTileHoverExited?.Invoke(_lastHoveredTile);\r\n            }\r\n\r\n            if (tile != null)\r\n            {\r\n                tile.OnHover();\r\n                OnTileHovered?.Invoke(tile);\r\n            }\r\n\r\n            _lastHoveredTile = tile;\r\n        }\r\n\r\n        //private void HandleClick()\r\n        //{\r\n        //    TileNode tile = GetTileUnderMouse();\r\n        //    if (tile == null) return;\r\n        //    if (tile.tileType == TileType.Corridor) return;\r\n\r\n        //    if (_selectedTile != null && _selectedTile != tile)\r\n        //        _selectedTile.RefreshColor();\r\n\r\n        //    _selectedTile = tile;\r\n        //    tile.OnSelected();\r\n\r\n        //    // EventBus로 선택 이벤트 발행\r\n        //    EventBus.RaiseTileSelected(tile);\r\n        //    OnTileClicked?.Invoke(tile);\r\n\r\n        //    Debug.Log($\"[NodeInput] {tile.name} | Occupied:{tile.isOccupied}\");\r\n        //}\r\n\r\n\r\n        private void HandleClick()\r\n        {\r\n            TileNode tile = GetTileUnderMouse();\r\n\r\n            //  아무것도 없는 곳을 클릭했거나, 복도 타일인 경우 처리\r\n            if (tile == null || tile.tileType == TileType.Corridor)\r\n            {\r\n                UIEventBus.RaiseUnitHidePanel();\r\n                return;\r\n            }\r\n\r\n            // 이미 선택된 타일을 다시 클릭한 경우 (해제 로직)\r\n            if (_selectedTile == tile)\r\n            {\r\n                ClearSelection();\r\n                UIEventBus.RaiseUnitHidePanel();\r\n                Debug.Log($\"[NodeInput] {tile.name} 선택 해제됨.\");\r\n                return;\r\n            }\r\n\r\n            // 다른 타일이 선택되어 있었다면 이전 타일 색상 복구\r\n            if (_selectedTile != null && _selectedTile != tile)\r\n            {\r\n                _selectedTile.OnDeselected();\r\n            }\r\n\r\n            // 새로운 타일 선택\r\n            _selectedTile = tile;\r\n            tile.OnSelected();\r\n\r\n            // EventBus로 선택 이벤트 발행\r\n            UnitEventBus.RaiseTileSelected(tile);\r\n            UnitEventBus.RaiseUnitInteractionStarted();\r\n            OnTileClicked?.Invoke(tile);\r\n\r\n            if (tile.stackedUnits.Count > 0)\r\n            {\r\n                UIEventBus.RaiseUnitBtnPopup(tile);\r\n            }\r\n            Debug.Log($\"[NodeInput] {tile.name} 선택됨 | Occupied:{tile.isOccupied}\");\r\n        }\r\n\r\n\r\n\r\n        // 우클릭\r\n        private void HandleRightClick()\r\n        {\r\n            TileNode tile = GetTileUnderMouse();\r\n            // 복도이거나 빈 공간이면 무시\r\n            if (tile == null || tile.tileType == TileType.Corridor) return;\r\n\r\n            // 우클릭 이벤트 발행 (UnitActionManager가 이를 수신합니다)\r\n            OnTileRightClicked?.Invoke(tile);\r\n            UnitEventBus.RaiseUnitInteractionStarted();\r\n        }\r\n\r\n        public void ClearSelection()\r\n        {\r\n            if (_selectedTile != null)\r\n            {\r\n                \r\n                _selectedTile.OnDeselected();\r\n            }\r\n            _selectedTile = null;\r\n            UnitEventBus.RaiseTileDeselected();\r\n        }\r\n\r\n\r\n        // 2D Physics2D Raycast 사용\r\n        private TileNode GetTileUnderMouse()\r\n        {\r\n            Vector2 mousePos = Mouse.current.position.ReadValue();\r\n            Vector2 worldPos = Camera.main.ScreenToWorldPoint(mousePos);\r\n\r\n            RaycastHit2D hit = Physics2D.Raycast(worldPos, Vector2.zero, 0f, tileLayer);\r\n            if (hit.collider != null)\r\n                return hit.collider.GetComponent<TileNode>();\r\n\r\n            return null;\r\n        }\r\n\r\n        public TileNode GetSelectedTile() => _selectedTile;\r\n\r\n        //public void ClearSelection()\r\n        //{\r\n        //    _selectedTile?.RefreshColor();\r\n        //    _selectedTile = null;\r\n        //    EventBus.RaiseTileDeselected();\r\n        //}\r\n    }\r\n}","lines":190},{"id":"02_Scripts/Node/PathFinder.cs","name":"PathFinder","path":"02_Scripts/Node/PathFinder.cs","layer":"Node","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"class PathFinder : MonoBehaviour","src":"using System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\n\r\nnamespace LuckyRandomDefense.Node\r\n{\r\n    public class PathFinder : MonoBehaviour\r\n    {\r\n        private ProceduralMap _map;\r\n\r\n        private void Awake()\r\n        {\r\n            _map = GetComponent<ProceduralMap>();\r\n        }\r\n        \r\n        public List<TileNode> FindPath(Vector2Int startCoords,Vector2Int targetCoords)\r\n        {\r\n            TileNode startNode = _map.Tiles[startCoords.x, startCoords.y];\r\n            TileNode targetNode = _map.Tiles[targetCoords.x, targetCoords.y];\r\n\r\n            List<TileNode> openSet = new List<TileNode>();\r\n            HashSet<TileNode> closeSet = new HashSet<TileNode>();\r\n            openSet.Add(startNode);\r\n\r\n            ResetNodeCosts();\r\n\r\n            while(openSet.Count > 0)\r\n            {\r\n                TileNode currentNode = openSet[0];\r\n                for(int i = 1; i < openSet.Count; i++)\r\n                {\r\n                    if (openSet[i].FCost < currentNode.FCost ||\r\n                        (openSet[i].FCost == currentNode.FCost && openSet[i].hCost < currentNode.hCost))\r\n                    {\r\n                        currentNode = openSet[i];\r\n                    }\r\n                }\r\n\r\n                openSet.Remove(currentNode);\r\n                closeSet.Add(currentNode);\r\n\r\n                if(currentNode == targetNode)\r\n                {\r\n                    return RetracePath(startNode, targetNode);\r\n                }\r\n\r\n                foreach(TileNode neighbor in GetNeighbors(currentNode))\r\n                {\r\n                    if (!neighbor.IsWalkable || closeSet.Contains(neighbor)) continue;\r\n\r\n                    int newMovementCostToNeighbor = currentNode.gCost + 10;\r\n                    if(newMovementCostToNeighbor < neighbor.gCost || !openSet.Contains(neighbor))\r\n                    {\r\n                        neighbor.gCost = newMovementCostToNeighbor;\r\n                        neighbor.hCost = GetManhattanDistance(neighbor, targetNode);\r\n                        neighbor.parent = currentNode;\r\n\r\n                        if(!openSet.Contains(neighbor)) openSet.Add(neighbor);\r\n                    }\r\n                }\r\n            }\r\n            return null;\r\n        }\r\n\r\n        private int GetManhattanDistance(TileNode a, TileNode b)\r\n        {\r\n            return(Mathf.Abs(a.gridX - b.gridX) + Mathf.Abs(a.gridY - b.gridY)) * 10;\r\n        }\r\n\r\n        private List<TileNode> GetNeighbors(TileNode node)\r\n        {\r\n            List<TileNode> neighbors = new List<TileNode>();\r\n            Vector2Int[] dirs = { Vector2Int.up, Vector2Int.down, Vector2Int.left, Vector2Int.right };\r\n\r\n            foreach(var dir in dirs)\r\n            {\r\n                int nx = node.gridX + dir.x;\r\n                int ny = node.gridY + dir.y;\r\n\r\n                if(nx >= 0 && nx < _map._width && ny >= 0 && ny < _map._height)\r\n                {\r\n                    neighbors.Add(_map.Tiles[nx, ny]);\r\n                }\r\n            }\r\n            return neighbors;\r\n        }\r\n\r\n        private List<TileNode> RetracePath(TileNode start, TileNode end)\r\n        {\r\n            List<TileNode> path = new List<TileNode>();\r\n            TileNode curr = end;\r\n            while(curr != start)\r\n            {\r\n                path.Add(curr);\r\n                curr = curr.parent;\r\n            }\r\n            path.Reverse();\r\n            return path;\r\n        }\r\n\r\n        private void ResetNodeCosts()\r\n        {\r\n            foreach(var node in _map.Tiles)\r\n            {\r\n                node.gCost = int.MaxValue;\r\n                node.hCost = 0;\r\n                node.parent = null;\r\n            }\r\n        }\r\n\r\n        private void OnDrawGizmos()\r\n        {\r\n            if (_map == null || _map.Tiles == null) return;\r\n        }\r\n    }\r\n}\r\n\r\n","lines":118},{"id":"02_Scripts/Node/MapEnvironment.cs","name":"MapEnvironment","path":"02_Scripts/Node/MapEnvironment.cs","layer":"Node","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"struct EvironmentObject","src":"using System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.Node\r\n{\r\n    [System.Serializable]\r\n    public struct EvironmentObject\r\n    {\r\n        public string name;\r\n        public GameObject prefab;\r\n        [Range(0f, 1f)] public float spawnChance;\r\n        public Vector2Int size;\r\n        public Vector2 scaleRange;\r\n    }\r\n    public class MapEnvironment : MonoBehaviour\r\n    {\r\n        [Header(\"배경 오브젝트 설정\")]\r\n        [SerializeField] private List<EvironmentObject> _objects;\r\n        [SerializeField] private Transform _envContainer;\r\n\r\n        private HashSet<Vector2Int> _usedPos = new HashSet<Vector2Int>();\r\n\r\n        public void Decorate(int[,] mapData, int width, int height, Vector3 origin, float step)\r\n        {\r\n            _objects.Sort((a,b) => (b.size.x * b.size.y).CompareTo(a.size.x * a.size.y));\r\n\r\n            for(int x = 0; x < width;  x++)\r\n            {\r\n                for(int y = 0; y < height; y++)\r\n                {\r\n                    if (mapData[x, y] == 1 && !_usedPos.Contains(new Vector2Int(x,y)))\r\n                    {\r\n                        SpawnObject(x, y, mapData, width, height, origin, step);\r\n                    }\r\n                }\r\n            }\r\n        }\r\n\r\n        private void SpawnObject(int x, int y, int[,] mapData, int width, int height, Vector3 origin, float step)\r\n        {\r\n            foreach(var env in _objects)\r\n            {\r\n                if (Random.value > env.spawnChance) continue;\r\n\r\n                if (!CanPlace(x, y, env.size, mapData, width, height)) continue;\r\n\r\n                Vector3 basePos = origin + new Vector3(x * step, y * step, 0f);\r\n                Vector3 offset = new Vector3((env.size.x - 1) * step * 0.5f, (env.size.y - 1) * step * 0.5f, -0.1f);\r\n\r\n                GameObject obj = Instantiate(env.prefab, basePos + offset, Quaternion.identity, _envContainer);\r\n\r\n                float s = Random.Range(env.scaleRange.x, env.scaleRange.y);\r\n                float baseScale = (s == 0f ? 1f : s);\r\n\r\n                obj.transform.localScale = obj.transform.localScale * baseScale;\r\n\r\n                for(int i = 0; i < env.size.x; i++)\r\n                {\r\n                    for(int j = 0; j < env.size.y; j++)\r\n                    {\r\n                        _usedPos.Add(new Vector2Int(x + i, y + j));\r\n                    }\r\n                }\r\n                break;\r\n            }\r\n        }\r\n\r\n        private bool CanPlace(int startX, int startY, Vector2Int size, int[,] mapData, int width, int height)\r\n        {\r\n            for(int i = 0; i < size.x;  i++)\r\n            {\r\n                for(int j = 0; j < size.y; j++)\r\n                {\r\n                    int currX = startX + i;\r\n                    int currY = startY + j;\r\n\r\n                    if (currX >= width || currY >= height || mapData[currX, currY] != 1 || _usedPos.Contains(new Vector2Int(currX, currY))) return false;\r\n\r\n                }\r\n            }\r\n            return true;\r\n        }\r\n\r\n        public void ClearEnvironment()\r\n        {\r\n            _usedPos.Clear();\r\n            if(_envContainer != null)\r\n            {\r\n                foreach(Transform child in _envContainer)\r\n                {\r\n                    Destroy(child.gameObject);\r\n                }\r\n            }\r\n\r\n        }\r\n    }\r\n\r\n}\r\n","lines":99},{"id":"02_Scripts/UI/Animation/UIButtonAnimation.cs","name":"UIButtonAnimation","path":"02_Scripts/UI/Animation/UIButtonAnimation.cs","layer":"UI","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"class UIButtonAnimation : MonoBehaviour,","src":"using DG.Tweening;\r\nusing UnityEngine;\r\nusing UnityEngine.EventSystems;\r\n\r\nnamespace LuckyRandomDefense.UI.Animation\r\n{\r\n    public class UIButtonAnimation : MonoBehaviour, IPointerEnterHandler, IPointerExitHandler, IPointerClickHandler\r\n    {\r\n        [Header(\"Hover\")]\r\n        [SerializeField] private float hoverScale = 1.1f;\r\n        [SerializeField] private float hoverDuration = 0.15f;\r\n\r\n        [Header(\"Click\")]\r\n        [SerializeField] private float punchPower = 0.15f;\r\n        [SerializeField] private float clickDuration = 0.2f;\r\n\r\n        private Vector3 originalScale;\r\n\r\n        private void Awake()\r\n        {\r\n            originalScale = transform.localScale;\r\n        }\r\n\r\n        public void OnPointerEnter(PointerEventData eventData)\r\n        {\r\n            transform.DOScale(originalScale * hoverScale, hoverDuration)\r\n                .SetEase(Ease.OutQuad);\r\n        }\r\n\r\n        public void OnPointerExit(PointerEventData eventData)\r\n        {\r\n            transform.DOScale(originalScale, hoverDuration)\r\n                .SetEase(Ease.OutQuad);\r\n        }\r\n\r\n        public void OnPointerClick(Pointer
