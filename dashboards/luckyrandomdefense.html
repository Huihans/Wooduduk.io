EventData eventData)\r\n        {\r\n            transform.DOPunchScale(\r\n                Vector3.one * punchPower,\r\n                clickDuration,\r\n                8,\r\n                0.8f);\r\n        }\r\n    }\r\n}","lines":45},{"id":"02_Scripts/Sound/SoundManager.cs","name":"SoundManager","path":"02_Scripts/Sound/SoundManager.cs","layer":"Sound","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"[SerializeField] private AudioSource _bgmSource;","src":"using UnityEngine;\r\nusing LuckyRandomDefense.Core.EventBus;\r\nusing System.Collections.Generic;\r\n\r\nnamespace LuckyRandomDefense.Sound\r\n{\r\n    public class SoundManager : MonoBehaviour\r\n    {\r\n        [Header(\"Audio Source\")]\r\n        //[SerializeField] private AudioSource _bgmSource;\r\n        [SerializeField] private AudioSource _sfxSource;\r\n\r\n        [Header(\"SFX Clips\")]\r\n        [SerializeField] private AudioClip _summonClip;\r\n        [SerializeField] private AudioClip _upgradeClip;\r\n        [SerializeField] private AudioClip _sellClip;\r\n        [SerializeField] private AudioClip _mergeClip;\r\n        [SerializeField] private AudioClip _buttonClickClip;\r\n        [SerializeField] private AudioClip _panelCloseClip;\r\n        [SerializeField] private AudioClip _errorClip;\r\n\r\n        [SerializeField] private List<AudioClip> _clips;\r\n\r\n        \r\n        [System.Serializable]\r\n        public struct UnitSoundData\r\n        {\r\n            public Unit_Sfx_Type type; \r\n            public AudioClip clip;\r\n            public float individualDelay; // 이 사운드만의 최소 재생 \r\n        }\r\n        [SerializeField] private List<UnitSoundData> _unitSoundList;\r\n        private Dictionary<Unit_Sfx_Type, AudioClip> _unitSfxDictionary = new Dictionary<Unit_Sfx_Type, AudioClip>();\r\n        private Dictionary<Unit_Sfx_Type, float> _lastPlayTime = new Dictionary<Unit_Sfx_Type, float>();\r\n        private Dictionary<Unit_Sfx_Type, float> _delayDictionary = new Dictionary<Unit_Sfx_Type, float>();\r\n        [SerializeField] private float _globalMinDelay = 0.2f; // 최소 재생 간격\r\n\r\n        [Header(\"Pooling Settings\")]\r\n        [SerializeField] private int _poolSize = 20; // 동시에 재생될 최대 사운드 개수\r\n        private List<AudioSource> _sfxPool = new List<AudioSource>();\r\n        private int _currentPoolIndex = 0;\r\n\r\n        public List<AudioClip> Clips => _clips;\r\n\r\n        public AudioSource SFXSource => _sfxSource;\r\n\r\n\r\n\r\n\r\n        private void Awake()\r\n        {\r\n            // 유닛용 딕셔너리 초기화\r\n            foreach (var data in _unitSoundList)\r\n            {\r\n                if (data.clip != null && !_unitSfxDictionary.ContainsKey(data.type))\r\n                {\r\n                    _unitSfxDictionary.Add(data.type, data.clip);\r\n                    _delayDictionary.Add(data.type, data.individualDelay);\r\n                }\r\n            }\r\n\r\n            \r\n            // 오디오 소스 풀 생성\r\n            for (int i = 0; i < _poolSize; i++)\r\n            {\r\n                GameObject go = new GameObject($\"SFX_Player_{i}\");\r\n                go.transform.SetParent(this.transform); // 매니저 자식으로 관리\r\n\r\n                AudioSource source = go.AddComponent<AudioSource>();\r\n                source.playOnAwake = false;\r\n                source.spatialBlend = 1.0f; // 3D 사운드 설정\r\n                source.rolloffMode = AudioRolloffMode.Logarithmic; // 거리별 감쇄\r\n                source.minDistance = 2f;\r\n                source.maxDistance = 20f; //  맵 크기에 맞춰 조절\r\n\r\n                _sfxPool.Add(source);\r\n            }\r\n\r\n\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            // 사운드 관련 이벤트 구독\r\n            SoundEventBus.OnSFXRequested += PlaySFX;\r\n            SoundEventBus.OnUnitSFXRequested += PlayUnitSFX;\r\n\r\n        }\r\n        private void OnDisable()\r\n        {\r\n            // 사운드 관련 이벤트 해제\r\n            SoundEventBus.OnSFXRequested -= PlaySFX;\r\n            SoundEventBus.OnUnitSFXRequested -= PlayUnitSFX;\r\n        }\r\n\r\n        public void PlaySFX(SFXType type)\r\n        {\r\n            AudioClip clip = null;\r\n\r\n            switch (type)\r\n            {\r\n                case SFXType.Summon:\r\n                    clip = _summonClip;\r\n                    break;\r\n\r\n                case SFXType.Upgrade:\r\n                    clip = _upgradeClip;\r\n                    break;\r\n\r\n                case SFXType.Sell:\r\n                    clip = _sellClip;\r\n                    break;\r\n\r\n                case SFXType.Merge:\r\n                    clip = _mergeClip;\r\n                    break;\r\n\r\n                case SFXType.ButtonClick:\r\n                    clip = _buttonClickClip;\r\n                    break;\r\n\r\n                case SFXType.PanelClose:\r\n                    clip = _panelCloseClip;\r\n                    break;\r\n\r\n                case SFXType.Error:\r\n                    clip = _errorClip;\r\n                    break;\r\n\r\n                case SFXType.SettingOpen:\r\n                    clip = _clips[6];\r\n                    break;\r\n            }\r\n\r\n            if (clip != null)   // 기존 사운드를 끊지 않고 효과음을 한번 재생\r\n            {\r\n                _sfxSource.PlayOneShot(clip);\r\n            }\r\n        }\r\n\r\n        public void PlayUnitSFX(Unit_Sfx_Type type, Vector3 position)\r\n        {\r\n            \r\n            // 기본적으로 글로벌 딜레이를 쓰되, 딕셔너리에 0보다 큰 값이 있으면 그걸로 덮어쓰기\r\n            float minDelay = _globalMinDelay;\r\n            if (_delayDictionary.TryGetValue(type, out float individualDelay))\r\n            {\r\n                if (individualDelay > 0f)\r\n                {\r\n                    minDelay = individualDelay;\r\n                }\r\n            }\r\n\r\n            // 쿨타임 체크\r\n            if (_lastPlayTime.TryGetValue(type, out float lastTime))\r\n            {\r\n                if (Time.time - lastTime < minDelay) return;\r\n            }\r\n\r\n            // 실제 재생 (딕셔너리에서 클립 찾기)\r\n            if (_unitSfxDictionary.TryGetValue(type, out AudioClip clip))\r\n            {\r\n              \r\n                AudioSource source = GetNextAvailableSource();\r\n                source.transform.position = position;\r\n\r\n                // 찰진 타격감을 위해 피치 랜덤화 \r\n                source.pitch = UnityEngine.Random.Range(0.9f, 1.1f);\r\n\r\n                source.clip = clip;\r\n                source.Play();\r\n\r\n                // 재생 시간 기록\r\n                _lastPlayTime[type] = Time.time;\r\n            }\r\n        }\r\n\r\n\r\n        private AudioSource GetNextAvailableSource()\r\n        {\r\n            // 순환 풀링: 인덱스를 돌리면서 현재 안 쓰고 있는 녀석을 찾거나 그냥 다음 녀석을 덮어씀\r\n            for (int i = 0; i < _poolSize; i++)\r\n            {\r\n                int index = (_currentPoolIndex + i) % _poolSize;\r\n                if (!_sfxPool[index].isPlaying)\r\n                {\r\n                    _currentPoolIndex = index;\r\n                    return _sfxPool[index];\r\n                }\r\n            }\r\n\r\n            // 모두 재생 중이라면 그냥 다음 순서 강제 사용\r\n            _currentPoolIndex = (_currentPoolIndex + 1) % _poolSize;\r\n            return _sfxPool[_currentPoolIndex];\r\n        }\r\n    }\r\n}","lines":197},{"id":"02_Scripts/UI/TitleScreen.cs","name":"TitleScreen","path":"02_Scripts/UI/TitleScreen.cs","layer":"UI","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"스테이지 선택 패널에서 START를 눌렀을 때 진입점. 이어하기 분기/팝업 거치지 않고 바로 Outro → 인게임 UI 활성화 → StartGame 흐름 강제.","src":"// =================================================================\n// TitleScreen.cs\n// 역할  : 타이틀 화면 UI 제어\n//\n// [수정 내역]\n// - settingsPanel 필드 추가 (Panel_Settings 참조)\n// - OnClickOpenSettings() 추가 → Button_Settings OnClick에 연결\n// - 이어하기 시스템 추가 (저장 있으면 팝업, 없으면 바로 시작)\n// - Outro 시퀀스 추가 (UI 슬라이드 아웃 → 페이드 아웃 → 맵 생성 → 페이드 인)\n// =================================================================\n\nusing System;\nusing DG.Tweening;\nusing UnityEngine;\nusing TMPro;\nusing LuckyRandomDefense.Core;\nusing LuckyRandomDefense.Sound;\nusing LuckyRandomDefense.Core.EventBus;\nusing LuckyRandomDefense.Save;\n\nnamespace LuckyRandomDefense.UI\n{\n    public class TitleScreen : MonoBehaviour\n    {\n        [Header(\"타이틀 UI\")]\n        [SerializeField] private GameObject titleScreen;\n        [SerializeField] private GameObject titleBackground;\n\n        [Header(\"설정 패널\")]\n        [SerializeField] private GameObject settingsPanel;\n\n        [Header(\"이어하기 팝업\")]\n        [SerializeField] private GameObject continuePopup;\n        [SerializeField] private TextMeshProUGUI continueWaveLabel;\n\n        [Header(\"스테이지 선택 패널 (옵션 B용)\")]\n        [SerializeField] private GameObject stageSelectPanel;\n\n        [Header(\"데이터\")]\n        [SerializeField] private UnitDataBase unitDataBase;\n\n        [Header(\"기본 스테이지 폴백 (이어하기/직접 진입 시 안전망)\")]\n        [Tooltip(\"currentStage가 null 상태로 게임 시작될 때 자동 적용할 기본 스테이지 — 보통 Stage_Tutorial 연결\")]\n        [SerializeField] private StageData fallbackStage;\n\n        [Header(\"인게임 UI 목록 (초기 비활성화 상태로 등록)\")]\n        [SerializeField] private GameObject[] ingameUIList;\n\n        [Header(\"Outro 슬라이드 대상 (인트로와 동일 참조)\")]\n        [SerializeField] private RectTransform logo;\n        [SerializeField] private RectTransform titleUI;\n        [SerializeField] private float logoOutOffsetY = 800f;   // 위로 올라감\n        [SerializeField] private float uiOutOffsetY = -800f;    // 아래로 내려감\n\n        [Header(\"Outro 페이드 (페이드 오버레이 재사용)\")]\n        [SerializeField] private GameObject fadeOverlay;        // Panel_FadeOverlay\n        [SerializeField] private CanvasGroup fadeCanvasGroup;\n\n        [Header(\"Outro 타이밍\")]\n        [SerializeField] private float slideOutDuration = 0.4f;\n        [SerializeField] private float fadeOutDuration = 0.5f;\n        [SerializeField] private float midDelay = 0.3f;\n        [SerializeField] private float fadeInDuration = 0.6f;\n\n        private bool _outroPlaying = false;\n\n        // ================================================================\n        // 라이프사이클\n        // ================================================================\n\n        private void Start()\n        {\n            if (titleScreen != null)\n                titleScreen.SetActive(true);\n            else\n                Debug.LogError(\"[TitleScreen] titleScreen 미연결 → 인스펙터 확인\");\n\n            if (ingameUIList != null)\n                foreach (var ui in ingameUIList)\n                    if (ui != null) ui.SetActive(false);\n\n            if (settingsPanel != null)\n                settingsPanel.SetActive(false);\n\n            if (continuePopup != null)\n                continuePopup.SetActive(false);\n\n            Debug.Log(\"[TitleScreen] 타이틀 화면 초기화 완료\");\n        }\n\n        // ================================================================\n        // 버튼 OnClick\n        // ================================================================\n\n        public void OnClickStart()\n        {\n            if (_outroPlaying) return;\n            SoundEventBus.RaiseSFXRequested(SFXType.ButtonClick);\n\n            if (HasContinuableRun())\n                ShowContinuePopup();\n            else\n                PlayOutroThen(StartNewGameCore);\n        }\n\n        public void OnClickContinue()\n        {\n            if (_outroPlaying) return;\n            SoundEventBus.RaiseSFXRequested(SFXType.ButtonClick);\n\n            if (continuePopup != null)\n                continuePopup.SetActive(false);\n\n            RunSaveData snap = UserDataManager.Instance?.GetRun();\n            if (snap == null)\n            {\n                Debug.LogWarning(\"[TitleScreen] 이어하기 데이터 없음 → 새 게임으로 대체\");\n                PlayOutroThen(StartNewGameCore);\n                return;\n            }\n\n            PlayOutroThen(() =>\n            {\n                bool ok = SnapshotRestorer.Apply(snap, unitDataBase);\n                if (!ok)\n                {\n                    Debug.LogWarning(\"[TitleScreen] 복원 실패 → 새 게임으로 대체\");\n                    UserDataManager.Instance?.ClearRun();\n                    StartNewGameCore();\n                    return;\n                }\n                ActivateIngameUI();\n                if (GameManager.Instance != null)\n                    GameManager.Instance.StartGame();\n            });\n        }\n\n        public void OnClickNewGame()\n        {\n            if (_outroPlaying) return;\n            SoundEventBus.RaiseSFXRequested(SFXType.ButtonClick);\n\n            Debug.Log(\"[TitleScreen] OnClickNewGame → 이어하기 데이터 삭제 후 스테이지 선택으로\");\n\n            if (continuePopup != null)\n                continuePopup.SetActive(false);\n\n            UserDataManager.Instance?.ClearRun();\n            OpenStageSelectPanel();\n        }\n\n        public void OnClickStartGame() => OnClickStart();\n\n        /// <summary>\n        /// 스테이지 선택 패널에서 START를 눌렀을 때 진입점.\n        /// 이어하기 분기/팝업 거치지 않고 바로 Outro → 인게임 UI 활성화 → StartGame 흐름 강제.\n        /// </summary>\n        public void StartGameFromStageSelect()\n        {\n            if (_outroPlaying)\n            {\n                Debug.LogWarning(\"[TitleScreen] StartGameFromStageSelect 중복 호출 — Outro 진행 중\");\n                return;\n            }\n\n            Debug.Log(\"[TitleScreen] StartGameFromStageSelect 진입 → Outro 후 인게임 UI 활성화\");\n            SoundEventBus.RaiseSFXRequested(SFXType.ButtonClick);\n\n            // 잔여 패널 정리 (이미 꺼져있어도 안전)\n            if (continuePopup != null) continuePopup.SetActive(false);\n            if (settingsPanel != null) settingsPanel.SetActive(false);\n            if (stageSelectPanel != null) stageSelectPanel.SetActive(false);\n\n            PlayOutroThen(StartNewGameCore);\n        }\n\n        /// <summary>\n        /// 타이틀의 START 버튼 → 스테이지 선택 패널로 전환\n        /// 이어하기 데이터 있으면 Continue 팝업 먼저 표시\n        /// </summary>\n        public void OnClickGoToStageSelect()\n        {\n            if (_outroPlaying) return;\n            SoundEventBus.RaiseSFXRequested(SFXType.ButtonClick);\n\n            Debug.Log($\"[TitleScreen] OnClickGoToStageSelect | hasSavedRun={HasContinuableRun()}\");\n\n            if (HasContinuableRun())\n            {\n                ShowContinuePopup();\n            }\n            else\n            {\n                OpenStageSelectPanel();\n            }\n        }\n\n        private void OpenStageSelectPanel()\n        {\n            if (stageSelectPanel == null)\n            {\n                Debug.LogError(\"[TitleScreen] stageSelectPanel 미연결 → 인스펙터에서 Panel_StageSelect 연결 필요\");\n                return;\n            }\n\n            Debug.Log(\"[TitleScreen] Panel_TitleScreen 끄고 Panel_StageSelect 켬\");\n\n            // 타이틀 화면 끄기\n            if (titleScreen != null) titleScreen.SetActive(false);\n            if (settingsPanel != null) settingsPanel.SetActive(false);\n            if (continuePopup != null) continuePopup.SetActive(false);\n\n            // 스테이지 선택 패널 켜기\n            stageSelectPanel.SetActive(true);\n        }\n\n        public void OnClickOpenSettings()\n        {\n            SoundEventBus.RaiseSFXRequested(SFXType.SettingOpen);\n            if (settingsPanel == null)\n            {\n                Debug.LogError(\"[TitleScreen] settingsPanel 미연결 → 인스펙터에서 Panel_Settings 연결 필요\");\n                return;\n            }\n\n            bool isOpen = settingsPanel.activeSelf;\n            settingsPanel.SetActive(!isOpen);\n            Debug.Log($\"[TitleScreen] 설정 패널 {(!isOpen ? \"열림\" : \"닫힘\")}\");\n        }\n\n        public void OnClickExit()\n        {\n            SoundEventBus.RaiseSFXRequested(SFXType.Error);\n            Debug.Log(\"[TitleScreen] 종료 버튼 클릭\");\n\n#if UNITY_EDITOR\n            UnityEditor.EditorApplication.isPlaying = false;\n#else\n            Application.Quit();\n#endif\n        }\n\n        // ================================================================\n        // Outro 시퀀스\n        // ================================================================\n\n        /// <summary>\n        /// Outro 흐름:\n        /// 1. titleUI 내려가기 + logo 올라가기 (살짝 오버랩)\n        /// 2. 페이드 아웃 (투명 → 검정)\n        /// 3. midDelay 대기 + 콜백(맵 생성 / 게임 시작)\n        /// 4. 페이드 인 (검정 → 투명)\n        /// </summary>\n        private void PlayOutroThen(Action onMidpoint)\n        {\n            _outroPlaying = true;\n\n            Debug.Log($\"[TitleScreen] Outro 시작 | logo={(logo != null)} titleUI={(titleUI != null)} \" +\n                      $\"fadeOverlay={(fadeOverlay != null)} fadeCanvasGroup={(fadeCanvasGroup != null)}\");\n\n            // 인트로/슬라이드 잔존 트윈 강제 종료 (Outro와 alpha/position 충돌 방지)\n            if (logo != null) { logo.DOKill(); Debug.Log(\"[TitleScreen] logo 잔존 트윈 KILL\"); }\n            if (titleUI != null) { titleUI.DOKill(); Debug.Log(\"[TitleScreen] titleUI 잔존 트윈 KILL\"); }\n            if (fadeCanvasGroup != null) { fadeCanvasGroup.DOKill(); Debug.Log(\"[TitleScreen] fadeCanvasGroup 잔존 트윈 KILL\"); }\n\n            Sequence seq = DOTween.Sequence().SetLink(gameObject);\n\n            // 1. UI 슬라이드 아웃 (아래로)\n            if (titleUI != null)\n            {\n                Vector2 uiTarget = titleUI.anchoredPosition + new Vector2(0f, uiOutOffsetY);\n                seq.Append(\n                    titleUI.DOAnchorPos(uiTarget, slideOutDuration)\n                           .SetEase(Ease.InBack));\n            }\n\n            // 2. 로고 슬라이드 아웃 (위로) — UI 슬라이드 중반에 시작\n            if (logo != null)\n            {\n                Vector2 logoTarget = logo.anchoredPosition + new Vector2(0f, logoOutOffsetY);\n                seq.Insert(slideOutDuration * 0.3f,\n                    logo.DOAnchorPos(logoTarget, slideOutDuration)\n                        .SetEase(Ease.InBack));\n            }\n\n            // 3. 페이드 아웃 준비\n            if (fadeOverlay != null) fadeOverlay.SetActive(true);\n            if (fadeCanvasGroup != null)\n            {\n                fadeCanvasGroup.alpha = 0f;\n                fadeCanvasGroup.blocksRaycasts = true;\n                seq.Append(fadeCanvasGroup.DOFade(1f, fadeOutDuration));\n            }\n\n            // 4. 검정 화면 대기 + 콜백\n            seq.AppendInterval(midDelay);\n            seq.AppendCallback(() =>\n            {\n                try { onMidpoint?.Invoke(); }\n                catch (Exception e) { Debug.LogError($\"[TitleScreen] Outro midpoint 예외: {e}\"); }\n            });\n\n            // 5. 페이드 인 (검정 → 투명)\n            if (fadeCanvasGroup != null)\n                seq.Append(fadeCanvasGroup.DOFade(0f, fadeInDuration));\n\n            // 6. 마무리\n            seq.OnComplete(() =>\n            {\n                if (fadeCanvasGroup != null) fadeCanvasGroup.blocksRaycasts = false;\n                if (fadeOverlay != null) fadeOverlay.SetActive(false);\n                _outroPlaying = false;\n                Debug.Log(\"[TitleScreen] Outro 시퀀스 완료\");\n            });\n        }\n\n        // ================================================================\n        // 내부 헬퍼\n        // ================================================================\n\n        private bool HasContinuableRun()\n        {\n            return UserDataManager.Instance != null && UserDataManager.Instance.HasSavedRun();\n        }\n\n        private void ShowContinuePopup()\n        {\n            if (continuePopup == null)\n            {\n                // continuePopup UI가 씬에 미연결인 경우 — 자동으로 이어하기 진행 (저장 데이터 손실 방지)\n                Debug.LogWarning(\"[TitleScreen] continuePopup 미연결 → 자동 이어하기 실행 \" +\n                                 \"(인스펙터에서 Continue Popup 연결하면 사용자 선택 가능)\");\n                AutoContinueRun();\n                return;\n            }\n\n            RunSaveData run = UserDataManager.Instance?.GetRun();\n            if (continueWaveLabel != null && run != null)\n                continueWaveLabel.text = $\"Wave {run.currentWaveIndex + 1}에서 이어하기\";\n\n            continuePopup.SetActive(true);\n        }\n\n        /// <summary>continuePopup 미연결 환경에서 자동으로 이어하기 실행</summary>\n        private void AutoContinueRun()\n        {\n            RunSaveData snap = UserDataManager.Instance?.GetRun();\n            if (snap == null || !snap.hasSavedRun)\n            {\n                Debug.LogWarning(\"[TitleScreen] AutoContinue: 유효 저장 없음 → 새 게임\");\n                PlayOutroThen(StartNewGameCore);\n                return;\n            }\n\n            Debug.Log($\"[TitleScreen] AutoContinue: Wave {snap.currentWaveIndex + 1}부터 복원 시작\");\n\n            PlayOutroThen(() =>\n            {\n                bool ok = SnapshotRestorer.Apply(snap, unitDataBase);\n                if (!ok)\n                {\n                    Debug.LogWarning(\"[TitleScreen] AutoContinue 복원 실패 → 새 게임\");\n                    UserDataManager.Instance?.ClearRun();\n                    StartNewGameCore();\n                    return;\n                }\n                ActivateIngameUI();\n                if (GameManager.Instance != null)\n                    GameManager.Instance.StartGame();\n            });\n        }\n\n        /// <summary>Outro 미드포인트에서 호출 — 실제 게임 시작 처리</summary>\n        private void StartNewGameCore()\n        {\n            if (settingsPanel != null)\n                settingsPanel.SetActive(false);\n\n            ActivateIngameUI();\n\n            if (GameManager.Instance != null)\n            {\n                // currentStage가 null인 경로(이어하기/스테이지선택 미경유)에서 폴백 스테이지 강제 세팅\n                // → TutorialStartTrigger의 'currentStage null → 스킵' 회피\n                if (GameManager.Instance.GetCurrentStage() == null)\n                {\n                    if (fallbackStage != null)\n                    {\n                        Debug.LogWarning($\"[TitleScreen] currentStage null → fallbackStage 적용: \" +\n                                         $\"{fallbackStage.stageName} (isTutorial={fallbackStage.isTutorial})\");\n                        GameManager.Instance.SetCurrentStage(fallbackStage);\n                    }\n                    else\n                    {\n                        Debug.LogError(\"[TitleScreen] currentStage null인데 fallbackStage도 미연결 → \" +\n                                       \"인스펙터에서 Stage_Tutorial 연결 필요\");\n                    }\n                }\n                else\n                {\n                    Debug.Log($\"[TitleScreen] currentStage 정상 세팅됨: \" +\n                              $\"{GameManager.Instance.GetCurrentStage().stageName}\");\n                }\n\n                GameManager.Instance.StartGame();\n                Debug.Log(\"[TitleScreen] GameManager.StartGame() 호출 완료\");\n            }\n            else\n            {\n                Debug.LogError(\"[TitleScreen] GameManager.Instance null → 씬에 GameManager 확인\");\n            }\n        }\n\n        private void ActivateIngameUI()\n        {\n            if (titleScreen != null)\n                titleScreen.SetActive(false);\n\n            if (titleBackground != null)\n                titleBackground.SetActive(false);\n\n            if (ingameUIList != null)\n            {\n                foreach (var ui in ingameUIList)\n                {\n                    if (ui != null)\n                        ui.SetActive(true);\n                    else\n                        Debug.LogWarning(\"[TitleScreen] ingameUIList 항목 중 null 있음\");\n                }\n            }\n        }\n    }\n}\n","lines":435},{"id":"02_Scripts/Core/HeroicManager.cs","name":"HeroicManager","path":"02_Scripts/Core/HeroicManager.cs","layer":"Core","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"상태 전용 데이터","src":"using LuckyRandomDefense.Node;\r\nusing LuckyRandomDefense.UI;\r\nusing System.Collections.Generic;\r\nusing System.Linq;\r\nusing UnityEngine;\r\nusing UnitClass = LuckyRandomDefense.Unit.Unit;\r\n\r\n\r\nnamespace LuckyRandomDefense.Core\r\n{\r\n    public class HeroicManager : MonoBehaviour\r\n    {\r\n        public static HeroicManager Instance { get; private set; }\r\n\r\n        [SerializeField] private ProceduralMap _proceduralMap;\r\n        [Header(\"영웅 유닛 레시피\")]\r\n        [SerializeField] private List<HeroicRecipeData> _recipes;\r\n\r\n        void Awake()\r\n        {\r\n            if (Instance == null)\r\n            {\r\n                Instance = this;\r\n            }\r\n            else\r\n            {\r\n                Destroy(gameObject);\r\n            }\r\n        }\r\n\r\n        // 상태 전용 데이터\r\n        public class HeroicRecipeStatus\r\n        {\r\n            public string unitName1;\r\n            public int owned1;\r\n            public int required1;\r\n\r\n            public string unitName2;\r\n            public int owned2;\r\n            public int required2;\r\n        }\r\n\r\n        public HeroicRecipeData GetHeroicRecipe(int index)\r\n        {\r\n            if (_recipes == null || _recipes.Count <= index)\r\n                return null;\r\n\r\n            return _recipes[index];\r\n        }\r\n\r\n        public List<UnitClass> GetAllFieldUnits()\r\n        {\r\n            List<UnitClass> result = new List<UnitClass>();\r\n            List<TileNode> playableTiles = _proceduralMap.GetAllPlayableTiles();\r\n\r\n            foreach (TileNode tile in playableTiles)\r\n            {\r\n                if (tile == null || !tile.isOccupied) continue;\r\n\r\n                foreach (UnitClass unit in tile.stackedUnits)\r\n                {\r\n                    if (unit != null)\r\n                        result.Add(unit);\r\n                }\r\n            }\r\n            return result;\r\n        }\r\n        public int GetOwnedCount(string unitName, int grade, List<UnitClass> allUnits)\r\n        {\r\n            return allUnits.Count(u =>\r\n                u != null &&\r\n                u.data != null &&\r\n                u.data.unitName == unitName &&\r\n                u.data.grade == grade);\r\n        }\r\n\r\n\r\n        public HeroicRecipeStatus GetRecipeStatus(int index)\r\n        {\r\n            var recipe = GetHeroicRecipe(index);\r\n\r\n            if (recipe == null || recipe.ingredientList == null)\r\n                return null;\r\n\r\n            var allUnits = GetAllFieldUnits();\r\n\r\n            var ingredient1 = recipe.ingredientList[0];\r\n            var ingredient2 = recipe.ingredientList[1];\r\n\r\n            int owned1 = GetOwnedCount(\r\n                ingredient1.unitData.unitName,\r\n                ingredient1.unitData.grade,\r\n                allUnits\r\n            );\r\n\r\n            int owned2 = GetOwnedCount(\r\n                ingredient2.unitData.unitName,\r\n                ingredient2.unitData.grade,\r\n                allUnits\r\n            );\r\n\r\n            return new HeroicRecipeStatus\r\n            {\r\n                unitName1 = ingredient1.unitData.unitName,\r\n                required1 = ingredient1.count,\r\n                owned1 = owned1,\r\n                unitName2 = ingredient2.unitData.unitName,\r\n                required2 = ingredient2.count,\r\n                owned2 = owned2\r\n            };\r\n        }\r\n    }\r\n}","lines":113},{"id":"02_Scripts/UI/TitleParallaxLayer.cs","name":"TitleParallaxLayer","path":"02_Scripts/UI/TitleParallaxLayer.cs","layer":"UI","scenes":["Main"],"entry":true,"summary":"TitleParallaxLayer.cs 역할 : 타이틀 화면 배경 레이어별 자동 스크롤 패럴랙스 부착 위치 : BackGround/Layer_1, Layer_2, ... 각각 동작 - 인스펙터에서 설정한 시작 위치를 그대로 유지 - 매 프레임 scrollSpeed 만큼 X 방향으로 이동 - 스프라이트 폭을 벗어나면 초기 위치로 리셋 (무한 스크롤 흉내) 추천 설정 (앞에 있는 레이어일수록 빠르게) - Layer_1 (가장 뒤)","src":"// =================================================================\n// TitleParallaxLayer.cs\n// 역할  : 타이틀 화면 배경 레이어별 자동 스크롤 패럴랙스\n//\n// 부착 위치 : BackGround/Layer_1, Layer_2, ... 각각\n//\n// 동작\n// - 인스펙터에서 설정한 시작 위치를 그대로 유지\n// - 매 프레임 scrollSpeed 만큼 X 방향으로 이동\n// - 스프라이트 폭을 벗어나면 초기 위치로 리셋 (무한 스크롤 흉내)\n//\n// 추천 설정 (앞에 있는 레이어일수록 빠르게)\n// - Layer_1 (가장 뒤): scrollSpeed = 0.05\n// - Layer_2          : scrollSpeed = 0.1\n// - Layer_3          : scrollSpeed = 0.2\n// - Layer_4 (가장 앞): scrollSpeed = 0.35\n// =================================================================\n\nusing UnityEngine;\n\nnamespace LuckyRandomDefense.UI\n{\n    [RequireComponent(typeof(SpriteRenderer))]\n    public class TitleParallaxLayer : MonoBehaviour\n    {\n        [Header(\"스크롤 속도 (음수면 반대 방향)\")]\n        [SerializeField] private float scrollSpeed = 0.1f;\n\n        [Header(\"리셋 방식\")]\n        [Tooltip(\"true면 스프라이트 폭만큼 이동 시 시작 위치로 점프 (무한 스크롤)\")]\n        [SerializeField] private bool wrapAround = true;\n\n        [Header(\"스크롤 방향\")]\n        [SerializeField] private Vector2 direction = new Vector2(1f, 0f);\n\n        private Vector3 _initialPos;\n        private float _spriteWidth;\n\n        private void Start()\n        {\n            // 인스펙터에서 설정한 위치를 기준점으로 저장\n            _initialPos = transform.position;\n\n            // 스프라이트 폭 (월드 단위)\n            SpriteRenderer sr = GetComponent<SpriteRenderer>();\n            if (sr != null && sr.sprite != null)\n                _spriteWidth = sr.bounds.size.x;\n            else\n                _spriteWidth = 0f;\n        }\n\n        private void Update()\n        {\n            Vector3 dir = new Vector3(direction.x, direction.y, 0f);\n            transform.position += dir * scrollSpeed * Time.deltaTime;\n\n            if (!wrapAround || _spriteWidth <= 0f) return;\n\n            // X축 무한 스크롤\n            float offsetX = transform.position.x - _initialPos.x;\n            if (Mathf.Abs(offsetX) >= _spriteWidth)\n            {\n                transform.position = new Vector3(\n                    _initialPos.x,\n                    transform.position.y,\n                    transform.position.z\n                );\n            }\n        }\n    }\n}\n","lines":72},{"id":"02_Scripts/UI/Popup/WaveReady.cs","name":"WaveReady","path":"02_Scripts/UI/Popup/WaveReady.cs","layer":"UI","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"class WaveReady : PopupBase","src":"using LuckyRandomDefense.Core;\r\nusing System.Collections;\r\nusing TMPro;\r\nusing UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.UI.Popup\r\n{\r\n    public class WaveReady : PopupBase\r\n    {\r\n        [SerializeField] private TextMeshProUGUI _readyCountText;\r\n        private int time;\r\n        protected override GameState ShowOnState => GameState.WAVE_READY;\r\n\r\n        protected override void Awake()\r\n        {\r\n            base.Awake();\r\n        }\r\n\r\n        protected override void OnDestroy()\r\n        {\r\n            base.OnDestroy();\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            \r\n        }\r\n\r\n        protected override void OnShow()\r\n        {\r\n            if (_readyCountText != null)\r\n            {\r\n                time = GameManager.Instance.WaveReadyCount;\r\n                StartCoroutine(ReadyCountRoutine());\r\n            }\r\n            else\r\n            {\r\n                return;\r\n            }\r\n        }\r\n\r\n        IEnumerator ReadyCountRoutine()\r\n        {\r\n            Debug.Log(\"WaveReady...\");\r\n            while (time > 0)\r\n            {\r\n                if (_readyCountText != null)\r\n                {\r\n                    int minute = time / 60;\r\n                    int second = time % 60;\r\n                    _readyCountText.text = $\"{minute:D2} : {second:D2}\";\r\n                }\r\n                else\r\n                {\r\n                    Debug.LogWarning(\"ReadyCountText가 연결되지 않았다.\");\r\n                }\r\n\r\n                time--;\r\n                yield return new WaitForSeconds(1f);\r\n            }\r\n            GameManager.Instance.WaveReadyCount = GameManager.Instance.WaveReadyTime;\r\n            GameManager.Instance.ChangeState(GameState.WAVE_PROGRESS);\r\n        }\r\n    }\r\n}","lines":65},{"id":"02_Scripts/Enemy/EnemyManager.cs","name":"EnemyManager","path":"02_Scripts/Enemy/EnemyManager.cs","layer":"Enemy","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"class EnemyManager : MonoBehaviour","src":"using System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.Enemy\r\n{\r\n    public class EnemyManager : MonoBehaviour\r\n    {\r\n        public static EnemyManager Instance {  get; private set; }\r\n        public List<EnemyAI> _activeEnemies = new List<EnemyAI>();\r\n\r\n        private void Awake()\r\n        {\r\n            if (Instance == null) Instance = this;\r\n            else Destroy(gameObject);\r\n        }\r\n\r\n        public void RegisterEnemey(EnemyAI enemy)\r\n        {\r\n            if(!_activeEnemies.Contains(enemy))\r\n            {\r\n                _activeEnemies.Add(enemy);\r\n            }\r\n        }\r\n\r\n        public void UnregisterEnemy(EnemyAI enemy)\r\n        {\r\n            if(_activeEnemies.Contains(enemy))\r\n            {\r\n                _activeEnemies.Remove(enemy);\r\n            }\r\n        }\r\n\r\n        public void UpdatePath()\r\n        {\r\n            foreach(var enemy in _activeEnemies)\r\n            {\r\n                if(enemy != null && enemy.gameObject.activeSelf)\r\n                {\r\n                    enemy.InitializePath();\r\n                }\r\n            }\r\n        }\r\n    }\r\n}\r\n","lines":45},{"id":"02_Scripts/UI/TitleIntroFader.cs","name":"TitleIntroFader","path":"02_Scripts/UI/TitleIntroFader.cs","layer":"UI","scenes":["HCH(한충희)","Main"],"entry":true,"summary":"TitleIntroFader.cs 역할 : 타이틀 진입 시 검은 화면 → 투명 페이드 인 연출 부착 위치 : Canvas_Title/Panel_FadeOverlay 인스펙터 연결 필수 - CanvasGroup (자동 추가됨) - Image (검은색, alpha 1로 시작 검은 화면 만들기용) 동작 흐름 1. 시작 시 alpha 1 (완전 검정) 2. delay 만큼 대기 3. duration 동안 alpha 0으로 페이드 4.","src":"// =================================================================\n// TitleIntroFader.cs\n// 역할  : 타이틀 진입 시 검은 화면 → 투명 페이드 인 연출\n//\n// 부착 위치 : Canvas_Title/Panel_FadeOverlay\n//\n// 인스펙터 연결 필수\n// - CanvasGroup (자동 추가됨)\n// - Image (검은색, alpha=1로 시작 — 검은 화면 만들기용)\n//\n// 동작 흐름\n//  1. 시작 시 alpha = 1 (완전 검정)\n//  2. delay 만큼 대기\n//  3. duration 동안 alpha 0으로 페이드\n//  4. 끝나면 자기 자신 비활성화 (뒤의 버튼 클릭 차단 해제)\n// =================================================================\n\nusing DG.Tweening;\nusing UnityEngine;\n\nnamespace LuckyRandomDefense.UI\n{\n    [RequireComponent(typeof(CanvasGroup))]\n    public class TitleIntroFader : MonoBehaviour\n    {\n        [Header(\"페이드 설정\")]\n        [SerializeField] private float duration = 2f;\n        [SerializeField] private float delay = 0.3f;\n        [SerializeField] private Ease easeType = Ease.InOutSine;\n\n        private CanvasGroup _canvasGroup;\n        private bool _played = false;\n\n        private void Awake()\n        {\n            _canvasGroup = GetComponent<CanvasGroup>();\n        }\n\n        private void OnEnable()\n        {\n            // 1회만 실행 (Outro에서 패널을 재활용할 때 인트로 재발동 방지)\n            if (_played) return;\n            _played = true;\n\n            // 시작 상태 : 완전 검정 + 클릭 차단\n            _canvasGroup.alpha = 1f;\n            _canvasGroup.blocksRaycasts = true;\n            _canvasGroup.interactable = false;\n\n            _canvasGroup\n                .DOFade(0f, duration)\n                .SetDelay(delay)\n                .SetEase(easeType)\n                .SetLink(gameObject)\n                .OnComplete(() =>\n                {\n                    _canvasGroup.blocksRaycasts = false;\n                    gameObject.SetActive(false);\n                    Debug.Log(\"[TitleIntroFader] 페이드 인 완료\");\n                });\n        }\n    }\n}\n","lines":64},{"id":"02_Scripts/UI/Animation/UIPopupAnimation.cs","name":"UIPopupAnimation","path":"02_Scripts/UI/Animation/UIPopupAnimation.cs","layer":"UI","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"class UIPopupAnimation : MonoBehaviour","src":"using DG.Tweening;\nusing UnityEngine;\n\nnamespace LuckyRandomDefense.UI.Animation\n{\n    public class UIPopupAnimation : MonoBehaviour\n    {\n        [Header(\"Animation\")]\n        [SerializeField] private float duration = 0.3f;\n        [SerializeField] private float startScale = 0.7f;\n\n        private CanvasGroup canvasGroup;\n        private RectTransform rectTransform;\n\n        private Tween currentTween;\n\n        private void Awake()\n        {\n            rectTransform = GetComponent<RectTransform>();\n\n            canvasGroup = GetComponent<CanvasGroup>();\n\n            if (canvasGroup == null)\n                canvasGroup = gameObject.AddComponent<CanvasGroup>();\n        }\n\n        private void EnsureCached()\n        {\n            if (rectTransform == null) rectTransform = GetComponent<RectTransform>();\n\n            if (canvasGroup == null)\n            {\n                canvasGroup = GetComponent<CanvasGroup>();\n                if (canvasGroup == null)\n                    canvasGroup = gameObject.AddComponent<CanvasGroup>();\n            }\n        }\n\n        public void PlayOpen()\n        {\n            EnsureCached();\n            gameObject.SetActive(true);\n\n            currentTween?.Kill();\n\n            rectTransform.localScale = Vector3.one * startScale;\n            canvasGroup.alpha = 0f;\n\n            Sequence seq = DOTween.Sequence().SetLink(gameObject);\n\n            seq.Join(\n                rectTransform.DOScale(1f, duration)\n                    .SetEase(Ease.OutBack)\n            );\n\n            seq.Join(\n                canvasGroup.DOFade(1f, duration)\n            );\n\n            currentTween = seq;\n        }\n\n        public void PlayClose()\n        {\n            EnsureCached();\n\n            if (rectTransform == null || canvasGroup == null) return;\n\n            currentTween?.Kill();\n\n            Sequence seq = DOTween.Sequence().SetLink(gameObject);\n\n            seq.Join(\n                rectTransform.DOScale(startScale, duration)\n                    .SetEase(Ease.InBack)\n            );\n\n            seq.Join(\n                canvasGroup.DOFade(0f, duration)\n            );\n\n            seq.OnComplete(() =>\n            {\n                gameObject.SetActive(false);\n            });\n\n            currentTween = seq;\n        }\n    }\n}\n","lines":91},{"id":"02_Scripts/Test/RecipeUnitSpawner.cs","name":"RecipeUnitSpawner","path":"02_Scripts/Test/RecipeUnitSpawner.cs","layer":"Test","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"class RecipeUnitSpawner : MonoBehaviour","src":"using LuckyRandomDefense.Core;\r\nusing LuckyRandomDefense.Core.EventBus;\r\nusing LuckyRandomDefense.Node;\r\nusing LuckyRandomDefense.UI.Controller;\r\nusing LuckyRandomDefense.Unit;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.Test\r\n{\r\n    public class RecipeUnitSpawner : MonoBehaviour\r\n    {\r\n        [SerializeField] private ProceduralMap _proceduralMap;\r\n        [SerializeField] private UnitActionManager _unitActionManager;\r\n\r\n        [Header(\"H_Warrior_H_Archer\")]\r\n        [SerializeField] private List<UnitData> _RecipeUnitList0;\r\n\r\n        [Header(\"H_Warrior_E_Archer\")]\r\n        [SerializeField] private List<UnitData> _RecipeUnitList1;\r\n\r\n        [Header(\"E_Archer_E_Wizard\")]\r\n        [SerializeField] private List<UnitData> _RecipeUnitList2;\r\n\r\n        [Header(\"E_Archer_U_Soldier\")]\r\n        [SerializeField] private List<UnitData> _RecipeUnitList3;\r\n\r\n        [Header(\"U_Soldier_U_Warrior\")]\r\n        [SerializeField] private List<UnitData> _RecipeUnitList4;\r\n\r\n        [Header(\"U_Warrior_H_Warrior\")]\r\n        [SerializeField] private List<UnitData> _RecipeUnitList5;\r\n\r\n        void Start()\r\n        {\r\n            if (_proceduralMap == null)\r\n            {\r\n                Debug.LogError(\"[RecipeUnitSpawner] proceduralMap null\");\r\n                return;\r\n            }\r\n        }\r\n\r\n        public void summonHWarriorHArcher()\r\n        {\r\n            HandleSummon(_RecipeUnitList0);\r\n            UnitEventBus.RaiseUnitCollectionChanged();\r\n        }\r\n\r\n        public void summonHWarriorEArcher()\r\n        {\r\n            HandleSummon(_RecipeUnitList1);\r\n            UnitEventBus.RaiseUnitCollectionChanged();\r\n        }\r\n\r\n        public void summonEArcherEWizard()\r\n        {\r\n            HandleSummon(_RecipeUnitList2);\r\n            UnitEventBus.RaiseUnitCollectionChanged();\r\n        }\r\n\r\n        public void summonEArcherUSoldier()\r\n        {\r\n            HandleSummon(_RecipeUnitList3);\r\n            UnitEventBus.RaiseUnitCollectionChanged();\r\n        }\r\n\r\n        public void summonUSoldierUWarrior()\r\n        {\r\n            HandleSummon(_RecipeUnitList4);\r\n            UnitEventBus.RaiseUnitCollectionChanged();\r\n        }\r\n\r\n        public void summonUWarriorHWarrior()\r\n        {\r\n            HandleSummon(_RecipeUnitList5);\r\n            UnitEventBus.RaiseUnitCollectionChanged();\r\n        }\r\n\r\n        public void HandleSummon(List<UnitData> recipeUnits)\r\n        {\r\n            if (GameManager.Instance == null)\r\n            {\r\n                Debug.LogError(\"[RecipeUnitSpawner] GameManager.Instance null\");\r\n                return;\r\n            }\r\n\r\n            foreach (UnitData data in recipeUnits)\r\n            {\r\n                TileNode targetTile =\r\n                    _proceduralMap.FindStackableTile(data)\r\n                    ?? FindEmptyTileColumnFirst();\r\n\r\n                if (targetTile == null)\r\n                {\r\n                    Debug.LogWarning(\"[RecipeUnitSpawner] 배치 가능한 타일 없음\");\r\n                    return;\r\n                }\r\n\r\n                _unitActionManager.SpawnUnit(data, targetTile);\r\n\r\n                Debug.Log($\"[RecipeUnitSpawner] 소환 : {data.unitName}\");\r\n            }\r\n        }\r\n        private TileNode FindEmptyTileColumnFirst()\r\n        {\r\n            if (_proceduralMap == null)\r\n            {\r\n                Debug.LogError(\"[UnitSpawner] proceduralMap null\");\r\n                return null;\r\n            }\r\n\r\n            for (int x = 0; x < _proceduralMap._width; x++)\r\n            {\r\n                for (int y = _proceduralMap._height - 1; y >= 0; y--)\r\n                {\r\n                    TileNode tile = _proceduralMap.Tiles[x, y];\r\n\r\n                    if (tile == null) continue;\r\n\r\n                    if (tile.tileType != TileType.Playable) continue;\r\n\r\n                    if (!tile.isOccupied)\r\n                        return tile;\r\n                }\r\n            }\r\n\r\n            Debug.LogWarning(\"[UnitSpawner] 빈 타일 없음\");\r\n            return null;\r\n        }\r\n    }\r\n}\r\n","lines":132},{"id":"02_Scripts/Unit/UnitSpawner.cs","name":"UnitSpawner","path":"02_Scripts/Unit/UnitSpawner.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"UnitSpawner.cs grade Pool을 Inspector에서 직접 할당하던 방식 → UnitDataManager.GetRandomUnitByGrade()로 자동 조회하는 방식으로 변경 UnitDataBase에 UnitData를 추가하기만 하면 자동으로 소환 풀에 포함됨","src":"// ================================================================\r\n// UnitSpawner.cs\r\n// grade Pool을 Inspector에서 직접 할당하던 방식 →\r\n// UnitDataManager.GetRandomUnitByGrade()로 자동 조회하는 방식으로 변경\r\n// UnitDataBase에 UnitData를 추가하기만 하면 자동으로 소환 풀에 포함됨\r\n// ================================================================\r\nusing UnityEngine;\r\nusing LuckyRandomDefense.Node;\r\nusing LuckyRandomDefense.Core;\r\nusing LuckyRandomDefense.Core.EventBus;\r\n\r\nnamespace LuckyRandomDefense.Unit\r\n{\r\n    public class UnitSpawner : MonoBehaviour\r\n    {\r\n        public static UnitSpawner Instance { get; private set; }\r\n\r\n        [Header(\"등급 확률 (합계 100)\")]\r\n        [Range(0, 100)][SerializeField] private float grade1Chance = 70f;\r\n        [Range(0, 100)][SerializeField] private float grade2Chance = 20f;\r\n        [Range(0, 100)][SerializeField] private float grade3Chance = 8f;\r\n        [Range(0, 100)][SerializeField] private float grade4Chance = 2f;\r\n\r\n        [Header(\"소환 비용\")]\r\n         private int summonCost = 50;\r\n\r\n        [SerializeField] private int rareUpgradeCost = 100;\r\n        [SerializeField] private int epicUpgradeCost = 300;\r\n\r\n        [Header(\"참조\")]\r\n        [SerializeField] private MapGenerator mapGenerator;\r\n        private TileNode _currentSelectedTile;\r\n\r\n        // ================================================================\r\n        // 초기화\r\n        // ================================================================\r\n        private void Awake()\r\n        {\r\n            if (Instance == null) Instance = this;\r\n            else\r\n            {\r\n                Debug.LogWarning(\"[UnitSpawner] 중복 인스턴스 제거\");\r\n                Destroy(gameObject);\r\n            }\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            UnitEventBus.OnUnitSummonRequested += HandleSummon;\r\n            UnitEventBus.OnUnitUpgradeStackRequested += HandleUpgradeStack;\r\n\r\n            UnitEventBus.OnTileSelected += (tile) => _currentSelectedTile = tile;\r\n            UnitEventBus.OnTileDeselected += () => _currentSelectedTile = null;\r\n        }\r\n\r\n        private void OnDisable()\r\n        {\r\n            UnitEventBus.OnUnitSummonRequested -= HandleSummon;\r\n            UnitEventBus.OnUnitUpgradeStackRequested -= HandleUpgradeStack;\r\n\r\n            UnitEventBus.OnTileSelected -= (tile) => _currentSelectedTile = tile;\r\n            UnitEventBus.OnTileDeselected -= () => _currentSelectedTile = null;\r\n        }\r\n\r\n        // ================================================================\r\n        // 소환 처리\r\n        // ================================================================\r\n        // UnitSpawner.cs 내부의 HandleSummon 수정\r\n        private void HandleSummon()\r\n        {\r\n            // 웨이브 준비 시간에만 유닛 소환 가능\r\n            if(GameManager.Instance.GameState == GameState.WAVE_READY)\r\n            {\r\n                if (_currentSelectedTile == null) return;\r\n\r\n\r\n                // 적 경로를 막는 타일 위치에 소환 불가\r\n                if(!ProceduralMap.Instance.CanPlaceUnit(_currentSelectedTile))\r\n                {\r\n                    Debug.LogWarning(\"적의 경로를 막는 위치에는 소환 할 수 없습니다.\");\r\n                    UIEventBus.RaiseWarningMessage(\"Cannot place unit here!\");\r\n                    return;\r\n                }\r\n\r\n                // 맵 구조물에 유닛 소환 불가\r\n                if(_currentSelectedTile.tileType == TileType.Forbidden)\r\n                {\r\n                    Debug.LogWarning(\"해당 위치에는 유닛 배치 불가능합니다.\");\r\n                    UIEventBus.RaiseWarningMessage(\"Cannot place unit here!\");\r\n                    return;\r\n                }\r\n\r\n                // 빈 타일이 아닐 경우 소환 차단\r\n                if (_currentSelectedTile.stackedUnits.Count > 0)\r\n                {\r\n                    Debug.LogWarning(\"[UnitSpawner] 이미 유닛이 있습니다.\");\r\n                    return;\r\n                }\r\n\r\n                // 조합된 영웅 유닛이 있는지 먼저 확인\r\n                if (UnitActionManager.Instance.HasPendingHeroicUnit)\r\n                {\r\n                    // 영웅은 별도의 골드 소모 없이(이미 조합 시 재료를 썼으므로) \r\n                    UnitData heroicData = UnitActionManager.Instance.GetNextHeroicUnit();\r\n\r\n                    UnitActionManager.Instance.SpawnUnit(heroicData, _currentSelectedTile);\r\n                    Debug.Log($\"[UnitSpawner] 대기 중인 영웅 소환: {heroicData.unitName}\");\r\n                    return; \r\n                }\r\n\r\n                // 영웅이 없으면 기존의 일반 랜덤 소환 진행\r\n                if (GameManager.Instance.Gold < summonCost)\r\n                {\r\n                    UIEventBus.RaiseWarningMessage(\"No Gold!\");\r\n                    Debug.LogWarning(\"[UnitSpawner] 골드가 부족합니다.\");\r\n                    return;\r\n                }\r\n\r\n                UnitData finalData = GetRandomUnitData();\r\n\r\n                if (finalData != null)\r\n                {\r\n                    GameManager.Instance.Gold -= summonCost;\r\n                    UnitActionManager.Instance.SpawnUnit(finalData, _currentSelectedTile);\r\n                    Debug.Log($\"[UnitSpawner] 신규 일반 유닛 소환: {finalData.unitName}\");\r\n\r\n                    // 튜토리얼 알림 (튜토리얼 진행 중일 때만 반응)\r\n                    LuckyRandomDefense.Tutorial.TutorialManager.Instance?.NotifyUnitSummoned();\r\n                }\r\n            }\r\n            else\r\n            {\r\n                Debug.Log(\"웨이브 진행 중입니다. 유닛 소환 불가\");\r\n            }            \r\n        }\r\n\r\n\r\n\r\n\r\n\r\n\r\n        private void HandleUpgradeStack()\r\n        {\r\n            TileNode targetTile = NodeInputHandler.Instance.SelectedTile;\r\n\r\n            if (targetTile == null || targetTile.stackedUnits.Count == 0)\r\n            {\r\n                Debug.LogWarning(\"[UnitSpawner] 업그레이드 실패 : 유닛이 있는 노드를 선택해주세요.\");\r\n                return;\r\n            }\r\n\r\n            // 유닛의 UnitBase에서 현재 등급을 확인합니다.\r\n            UnitBase unitBase = targetTile.stackedUnits[0].GetComponent<UnitBase>();\r\n            if (unitBase == null) return;\r\n\r\n            int currentCost = 0;\r\n            UnitRatingType currentRating = unitBase.RatingType;\r\n\r\n            \r\n            switch (currentRating)\r\n            {\r\n                case UnitRatingType.NORMAL:\r\n                    // 노말 -> 레어 업그레이드 비용\r\n                    currentCost = 100;\r\n                    break;\r\n\r\n                case UnitRatingType.RARE:\r\n                    // 레어 -> 에픽 업그레이드 비용\r\n                    currentCost = 300;\r\n                    break;\r\n\r\n                case UnitRatingType.EPIC:\r\n                    Debug.LogWarning(\"[UnitSpawner] 에픽 등급은 현재 최대 업그레이드 상태입니다.\");\r\n                    return;\r\n\r\n                default:\r\n                    return;\r\n            }\r\n\r\n            // 골드 부족 확인\r\n            if (GameManager.Instance.Gold < currentCost)\r\n            {\r\n                Debug.LogWarning($\"[UnitSpawner] 골드 부족! {currentRating} 등급 업그레이드에는 {currentCost}골드가 필요해요.\");\r\n                return;\r\n            }\r\n\r\n            // 비용 차감 및 업그레이드 실행\r\n            GameManager.Instance.Gold -= currentCost;\r\n            UnitEventBus.RaiseUnitMergeRequested(targetTile);\r\n\r\n            Debug.Log($\"[UnitSpawner] {currentRating} 유닛 업그레이드 완료! 차감 골드: {currentCost}\");\r\n\r\n            // 튜토리얼 알림 (튜토리얼 진행 중일 때만 반응)\r\n            LuckyRandomDefense.Tutorial.TutorialManager.Instance?.NotifyUnitUpgraded();\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // UnitDataManager 기반 랜덤 UnitData 선택\r\n        // ================================================================\r\n        private UnitData GetRandomUnitData()\r\n        {\r\n            if (UnitDataManager.Instance == null)\r\n            {\r\n                Debug.LogError(\"[UnitSpawner] UnitDataManager.Instance null — 씬에 UnitDataManager가 있는지 확인하세요.\");\r\n                return null;\r\n            }\r\n\r\n            int grade = GetRandomGrade();\r\n            UnitData result = UnitDataManager.Instance.GetRandomUnitByGrade(grade);\r\n\r\n            if (result == null)\r\n            {\r\n                Debug.LogError($\"[UnitSpawner] grade {grade} UnitData 없음 — UnitDataBase에 해당 grade 유닛을 추가하세요.\");\r\n                return null;\r\n            }\r\n\r\n            Debug.Log($\"[UnitSpawner] 선택: {result.unitName} G{result.grade}\");\r\n            return result;\r\n        }\r\n\r\n        // ================================================================\r\n        // 등급 확률 계산\r\n        // ================================================================\r\n        private int GetRandomGrade()\r\n        {\r\n            float roll = Random.Range(0f, 100f);\r\n            float cumulative = 0f;\r\n\r\n            cumulative += grade1Chance;\r\n            if (roll < cumulative) return 1;\r\n\r\n            cumulative += grade2Chance;\r\n            if (roll < cumulative) return 2;\r\n\r\n            cumulative += grade3Chance;\r\n            if (roll < cumulative) return 3;\r\n\r\n            cumulative += grade4Chance;\r\n            if (roll < cumulative) return 4;\r\n\r\n            // 확률 합계가 100 미만인 경우 grade1 fallback\r\n            Debug.LogWarning($\"[UnitSpawner] 확률 합계 미달 (roll:{roll:F1}) → grade1 fallback\");\r\n            return 1;\r\n        }\r\n\r\n        // ================================================================\r\n        // 빈 타일 탐색 (열 우선: 좌→우, 위→아래)\r\n        // ================================================================\r\n        private TileNode FindEmptyTileColumnFirst()\r\n        {\r\n            if (mapGenerator == null)\r\n            {\r\n                Debug.LogError(\"[UnitSpawner] mapGenerator null\");\r\n                return null;\r\n            }\r\n\r\n            for (int x = 1; x < mapGenerator.totalWidth - 1; x++)\r\n            {\r\n                for (int y = mapGenerator.totalHeight - 2; y >= 1; y--)\r\n                {\r\n                    TileNode tile = mapGenerator.GetTile(x, y);\r\n                    if (tile != null && !tile.isOccupied)\r\n                        return tile;\r\n                }\r\n            }\r\n\r\n            Debug.LogWarning(\"[UnitSpawner] 빈 타일 없음\");\r\n            return null;\r\n        }\r\n\r\n        // ================================================================\r\n        // UI용 공개 메서드\r\n        // ================================================================\r\n        public int GetSummonCost() => summonCost;\r\n    }\r\n}\r\n","lines":278},{"id":"02_Scripts/Node/UIActionBridge.cs","name":"UIActionBridge","path":"02_Scripts/Node/UIActionBridge.cs","layer":"Node","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"소환 버튼 OnClick에 연결 발행 → EventBus.RaiseUnitSummonRequested() 수신 → UnitSpawner.HandleSummon()","src":"// ================================================================\r\n// UIActionBridge.cs\r\n// 역할  : UI 버튼 OnClick과 EventBus를 연결하는 브릿지\r\n//         반환값 있는 함수나 static 함수는 OnClick에 직접 연결 불가\r\n//         → 이 스크립트가 중간 다리 역할\r\n//\r\n// 부착 위치 : Canvas 또는 UI 버튼들의 부모 오브젝트\r\n//\r\n// 네임스페이스 의존성\r\n// - LuckyRandomDefense.Core : EventBus 참조\r\n// - LuckyRandomDefense.Node : NodeInputHandler 참조\r\n//\r\n// 인스펙터 연결\r\n// - nodeInputHandler : NodeInputHandler가 붙은 오브젝트 드래그 필수\r\n//\r\n// grade 범위 : 1~4 (5등급 없음)\r\n// grade 4 = HEROIC → 강화는 가능, 조합/스택은 불가\r\n// ================================================================\r\n\r\nusing UnityEngine;\r\nusing LuckyRandomDefense.Core.EventBus;  // EventBus 참조\r\nusing LuckyRandomDefense.Node;  // NodeInputHandler 참조\r\n\r\nnamespace LuckyRandomDefense.UI\r\n{\r\n    public class UIActionBridge : MonoBehaviour\r\n    {\r\n        // ── 인스펙터 연결 ──────────────────────────────────────────\r\n        // 주의 : 반드시 NodeInputHandler가 붙은 오브젝트를 드래그할 것\r\n        //        null이면 판매/조합 버튼 클릭 시 Warning 발생\r\n        [SerializeField] private NodeInputHandler nodeInputHandler;\r\n\r\n        private void Awake()\r\n        {\r\n            if (nodeInputHandler == null)\r\n                Debug.LogError(\"[UIActionBridge] nodeInputHandler null → \" +\r\n                               \"인스펙터에서 NodeInputHandler 오브젝트 연결 필요\");\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 버튼 OnClick 연결 함수\r\n        // 유니티 Inspector → Button → OnClick → 이 함수들 연결\r\n        // ================================================================\r\n\r\n        /// <summary>\r\n        /// 소환 버튼 OnClick에 연결\r\n        /// 발행 → EventBus.RaiseUnitSummonRequested()\r\n        /// 수신 → UnitSpawner.HandleSummon()\r\n        /// </summary>\r\n        public void OnClickSummon()\r\n        {\r\n            Debug.Log(\"[UIActionBridge] 소환 요청\");\r\n            UnitEventBus.RaiseUnitSummonRequested();\r\n        }\r\n        public void OnClickUpgradeStack()\r\n        {\r\n            Debug.Log(\"[UIActionBridge] 유닛 증식/업그레이드 요청\");\r\n            UnitEventBus.RaiseUnitUpgradeStackRequested();\r\n        }\r\n\r\n        /// <summary>\r\n        /// 판매 버튼 OnClick에 연결\r\n        /// 현재 선택된 타일의 유닛 전체 판매\r\n        /// 발행 → EventBus.RaiseUnitSellRequested(tile)\r\n        /// 수신 → UnitActionManager.HandleSell(tile)\r\n        /// </summary>\r\n        public void OnClickSell()\r\n        {\r\n            if (nodeInputHandler == null)\r\n            {\r\n                Debug.LogWarning(\"[UIActionBridge] 판매 실패 : nodeInputHandler null\");\r\n                return;\r\n            }\r\n\r\n            var selectedTile = nodeInputHandler.GetSelectedTile();\r\n\r\n            if (selectedTile == null)\r\n            {\r\n                Debug.LogWarning(\"[UIActionBridge] 판매 실패 : 선택된 타일 없음 → 타일을 먼저 클릭하세요\");\r\n                return;\r\n            }\r\n\r\n            Debug.Log($\"[UIActionBridge] 판매 요청 → {selectedTile.name}\");\r\n            UnitEventBus.RaiseUnitSellRequested(selectedTile);\r\n        }\r\n\r\n        /// <summary>\r\n        /// 조합 버튼 OnClick에 연결\r\n        /// 현재 선택된 타일의 유닛 3스택 조합\r\n        /// 발행 → UnitEventBus.RaiseUnitMergeRequested(tile)\r\n        /// 수신 → UnitActionManager.HandleMerge(tile)\r\n        /// </summary>\r\n        public void OnClickMerge()\r\n        {\r\n            if (nodeInputHandler == null)\r\n            {\r\n                Debug.LogWarning(\"[UIActionBridge] 조합 실패 : nodeInputHandler null\");\r\n                return;\r\n            }\r\n\r\n            var selectedTile = nodeInputHandler.GetSelectedTile();\r\n\r\n            if (selectedTile == null)\r\n            {\r\n                Debug.LogWarning(\"[UIActionBridge] 조합 실패 : 선택된 타일 없음 → 타일을 먼저 클릭하세요\");\r\n                return;\r\n            }\r\n\r\n            Debug.Log($\"[UIActionBridge] 조합 요청 → {selectedTile.name}\");\r\n            UnitEventBus.RaiseUnitMergeRequested(selectedTile);\r\n        }\r\n\r\n        /// <summary>\r\n        /// 강화 버튼 OnClick에 연결\r\n        /// grade : 강화할 유닛 등급 (1~4)\r\n        /// 버튼별로 grade 값을 다르게 넘겨서 등급별 강화 버튼 구성\r\n        /// 발행 → UnitEventBus.RaiseUnitUpgradeRequested(grade)\r\n        /// 수신 → UnitActionManager.HandleUpgrade(grade)\r\n        ///\r\n        /// 주의 : grade 범위 1~4 (5등급 없음)\r\n        ///        grade 4(HEROIC)는 강화 가능, 조합/스택은 불가\r\n        /// </summary>\r\n        public void OnClickUpgrade(int grade)\r\n        {\r\n            if (grade < 1 || grade > 4)\r\n            {\r\n                Debug.LogError($\"[UIActionBridge] 강화 실패 : 잘못된 등급 ({grade}) → 1~4만 허용\");\r\n                return;\r\n            }\r\n\r\n            Debug.Log($\"[UIActionBridge] G{grade} 강화 요청\");\r\n            UnitEventBus.RaiseUnitUpgradeRequested(grade);\r\n        }\r\n\r\n        public void OnClickHeroicMerge()\r\n        {\r\n            Debug.Log(\"[UIActionBridge] 영웅 조합 요청\");\r\n            UnitEventBus.RaiseHeroicMergeRequested();\r\n        }\r\n    }\r\n}\r\n","lines":143},{"id":"02_Scripts/Core/CameraController.cs","name":"CameraController","path":"02_Scripts/Core/CameraController.cs","layer":"Core","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"타이틀/초기 상태에서는 카메라 조작 차단","src":"using LuckyRandomDefense.Node;\r\nusing Unity.VisualScripting;\r\nusing UnityEngine;\r\n\r\nnamespace LuckyRandomDefense.Core\r\n{\r\n    public class CameraController : MonoBehaviour\r\n    {\r\n        [Header(\"Move Setting\")]\r\n        public float _dragSpeed = 1f;\r\n        public Vector2 _minBounds;\r\n        public Vector2 _maxBounds;\r\n\r\n        [Header(\"Zoom Setting\")]\r\n        public float _zoomSpeed = 5f;\r\n        public float _minZoom = 5f;\r\n        public float _maxZoon = 20f;\r\n\r\n        [SerializeField] private ProceduralMap _map;\r\n\r\n        private Camera _cam;\r\n        private Vector3 _dragOrigin;\r\n        private bool _blockedLogShown = false;  // 차단 로그 1회 출력용\r\n\r\n        void Start()\r\n        {\r\n            _cam = GetComponent<Camera>();\r\n            Debug.Log($\"[CameraController] 초기화 | orthographic={(_cam != null && _cam.orthographic)} mapRef={(_map != null)}\");\r\n\r\n            Invoke(\"SetupBounds\", 0.1f);\r\n        }\r\n\r\n        void Update()\r\n        {\r\n            // 타이틀/초기 상태에서는 카메라 조작 차단\r\n            if (GameManager.Instance == null || GameManager.Instance.GameState == GameState.INIT)\r\n            {\r\n                // 사용자가 실제로 조작 시도했을 때 1회만 로그 (스팸 방지)\r\n                if (!_blockedLogShown &&\r\n                    (Input.GetMouseButtonDown(2) || Input.GetAxis(\"Mouse ScrollWheel\") != 0))\r\n                {\r\n                    Debug.Log($\"[CameraController] 입력 차단 | gameStateNull={(GameManager.Instance == null)} state=INIT\");\r\n                    _blockedLogShown = true;\r\n                }\r\n                return;\r\n            }\r\n\r\n            HandleMove();\r\n            HandleZoom();\r\n        }\r\n\r\n        private void HandleMove()\r\n        {\r\n            if (Input.GetMouseButtonDown(2))\r\n            {\r\n                _dragOrigin = _cam.ScreenToWorldPoint(Input.mousePosition);\r\n            }\r\n\r\n            if(Input.GetMouseButton(2))\r\n            {\r\n                Vector3 difference = _dragOrigin - _cam.ScreenToWorldPoint(Input.mousePosition);\r\n\r\n                Vector3 newPos = transform.position + new Vector3(difference.x, difference.y, 0);\r\n\r\n                newPos.x = Mathf.Clamp(newPos.x, _minBounds.x, _maxBounds.x);\r\n                newPos.y = Mathf.Clamp(newPos.y, _minBounds.y, _maxBounds.y);\r\n\r\n                transform.position = newPos;\r\n            }\r\n        }\r\n\r\n        private void HandleZoom()\r\n        {\r\n            float scroll = Input.GetAxis(\"Mouse ScrollWheel\");\r\n            if(scroll != 0)\r\n            {\r\n                if(_cam.orthographic)\r\n                {\r\n                    _cam.orthographicSize -= scroll * _zoomSpeed;\r\n                    _cam.orthographicSize = Mathf.Clamp(_cam.orthographicSize, _minZoom, _maxZoon);\r\n                }\r\n                else\r\n                {\r\n                    transform.Translate(0, 0, scroll * _zoomSpeed, Space.Self);\r\n                }\r\n            }\r\n        }\r\n\r\n        private void SetupBounds()\r\n        {\r\n            if (_map == null)\r\n            {\r\n                Debug.LogWarning(\"[CameraController] SetupBounds : _map 미연결 → 경계 설정 스킵\");\r\n                return;\r\n            }\r\n\r\n            Vector2 mapSize = _map.GetMapSize();\r\n            Vector3 mapCentor = _map.GetMapCenter();\r\n\r\n            float verticalExtent = _cam.orthographicSize;\r\n            float HorizontalExtent = verticalExtent * _cam.aspect;\r\n\r\n            _minBounds = new Vector2(mapCentor.x - (mapSize.x / 2f) + HorizontalExtent,\r\n                mapCentor.y - (mapSize.y / 2f) + verticalExtent);\r\n            _maxBounds = new Vector2(mapCentor.x + (mapSize.x / 2f) - HorizontalExtent,\r\n                mapCentor.y + (mapSize.y / 2f) - verticalExtent);\r\n\r\n            Debug.Log($\"[CameraController] 경계 설정 완료 | min={_minBounds} max={_maxBounds}\");\r\n        }\r\n    }\r\n\r\n}\r\n","lines":113},{"id":"02_Scripts/TransitionController.cs","name":"TransitionController","path":"02_Scripts/TransitionController.cs","layer":"Core","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"타이틀 상태 즉시 적용 (애니메이션 없음)","src":"﻿// =================================================================\r\n// TransitionController.cs\r\n// 역할  : 타이틀 ↔ 인게임 전환 연출 제어\r\n//         카메라 줌아웃 + 블러 해제 + UI 슬라이드 동시 처리\r\n//\r\n// 부착 위치 : Main Camera 오브젝트\r\n//\r\n// 연출 흐름\r\n// [타이틀 상태]\r\n// → 카메라 줌인 (orthographicSize 크게)\r\n// → URP Volume 블러 ON\r\n// → 인게임 UI 화면 밖 대기\r\n//\r\n// [게임 시작 버튼 클릭]\r\n// → TitleUI  : 화면 밖으로 슬라이드 아웃\r\n// → 카메라   : 줌아웃 애니메이션 (Lerp)\r\n// → 블러     : 점진적 해제 (Volume weight Lerp)\r\n// → InGameUI : 화면 안으로 슬라이드 인\r\n// → 완료 시  : GameManager.ChangeState(WAVE_READY)\r\n//\r\n// 의존성\r\n// - UnityEngine.Rendering.Universal (URP)\r\n// - LuckyRandomDefense.Core.GameManager\r\n//\r\n// 주의사항\r\n// - Camera.orthographic 사용 시 orthographicSize로 줌 제어\r\n// - Camera.perspective 사용 시 fieldOfView로 줌 제어\r\n// - URP Volume 컴포넌트 인스펙터 연결 필수\r\n// =================================================================\r\n\r\nusing System.Collections;\r\nusing UnityEngine;\r\nusing UnityEngine.Rendering;\r\nusing UnityEngine.Rendering.Universal;\r\nusing LuckyRandomDefense.Core;\r\n\r\nnamespace LuckyRandomDefense.Transition\r\n{\r\n    public class TransitionController : MonoBehaviour\r\n    {\r\n        public static TransitionController Instance { get; private set; }\r\n\r\n        // ── 카메라 설정 ───────────────────────────────────────────\r\n        [Header(\"카메라 줌 설정\")]\r\n        [SerializeField] private Camera _mainCamera;\r\n\r\n        // 타이틀 상태 줌 수치\r\n        [SerializeField] private float _titleZoom = 8f;\r\n\r\n        // 인게임 상태 줌 수치\r\n        [SerializeField] private float _ingameZoom = 5f;\r\n\r\n        // 줌 전환 소요 시간\r\n        [SerializeField] private float _zoomDuration = 1.5f;\r\n\r\n        // ── URP 블러 설정 ─────────────────────────────────────────\r\n        // 주의 : 씬에 배치된 Global Volume 컴포넌트 연결\r\n        [Header(\"URP 블러 설정\")]\r\n        [SerializeField] private Volume _postProcessVolume;\r\n\r\n        // 블러 전환 소요 시간\r\n        [SerializeField] private float _blurDuration = 1.2f;\r\n\r\n        // ── UI 슬라이드 설정 ──────────────────────────────────────\r\n        [Header(\"UI 슬라이드 설정\")]\r\n        [SerializeField] private RectTransform _titleUI;\r\n        [SerializeField] private RectTransform _ingameUI;\r\n\r\n        // 타이틀 UI 슬라이드 아웃 목표 위치 (화면 위로)\r\n        [SerializeField] private Vector2 _titleUIHidePos = new Vector2(0f, 1200f);\r\n\r\n        // 인게임 UI 슬라이드 인 시작 위치 (화면 아래)\r\n        [SerializeField] private Vector2 _ingameUIShowPos = new Vector2(0f, -1200f);\r\n\r\n        // UI 슬라이드 소요 시간\r\n        [SerializeField] private float _slideDuration = 0.8f;\r\n\r\n        // ── 내부 상태 ─────────────────────────────────────────────\r\n        private DepthOfField _dof;\r\n        private Vector2 _titleUIOriginPos;\r\n        private Vector2 _ingameUIOriginPos;\r\n        private bool _isTransitioning = false;\r\n\r\n\r\n        // ================================================================\r\n        // 라이프사이클\r\n        // ================================================================\r\n\r\n        private void Awake()\r\n        {\r\n            if (Instance == null) Instance = this;\r\n            else { Destroy(gameObject); return; }\r\n\r\n            if (_mainCamera == null)\r\n                _mainCamera = Camera.main;\r\n\r\n            // URP Volume에서 DepthOfField 컴포넌트 가져오기\r\n            if (_postProcessVolume != null)\r\n                _postProcessVolume.profile.TryGet(out _dof);\r\n            else\r\n                Debug.LogError(\"[TransitionController] PostProcessVolume 미연결\");\r\n        }\r\n\r\n        private void Start()\r\n        {\r\n            // 원본 위치 저장\r\n            if (_titleUI != null) _titleUIOriginPos = _titleUI.anchoredPosition;\r\n            if (_ingameUI != null) _ingameUIOriginPos = _ingameUI.anchoredPosition;\r\n\r\n            // 타이틀 초기 상태 설정\r\n            SetTitleState();\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 초기 상태 설정\r\n        // ================================================================\r\n\r\n        /// <summary>타이틀 상태 즉시 적용 (애니메이션 없음)</summary>\r\n        private void SetTitleState()\r\n        {\r\n            // 카메라 줌인\r\n            if (_mainCamera != null)\r\n                _mainCamera.orthographicSize = _titleZoom;\r\n\r\n            // 블러 최대\r\n            if (_dof != null)\r\n                _postProcessVolume.weight = 1f;\r\n\r\n            // 인게임 UI 화면 밖 대기\r\n            if (_ingameUI != null)\r\n                _ingameUI.anchoredPosition = _ingameUIShowPos;\r\n\r\n            Debug.Log(\"[TransitionController] 타이틀 초기 상태 설정 완료\");\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 전환 실행 (외부 호출)\r\n        // ================================================================\r\n\r\n        /// <summary>\r\n        /// TitleScreen.OnClickStartGame()에서 호출\r\n        /// 전환 중 중복 호출 방지\r\n        /// </summary>\r\n        public void StartTransition()\r\n        {\r\n            if (_isTransitioning)\r\n            {\r\n                Debug.LogWarning(\"[TransitionController] 전환 중 중복 호출 → 무시\");\r\n                return;\r\n            }\r\n\r\n            Debug.Log(\"[TransitionController] 전환 시작\");\r\n            StartCoroutine(TransitionRoutine());\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 전환 코루틴\r\n        // ================================================================\r\n\r\n        private IEnumerator TransitionRoutine()\r\n        {\r\n            _isTransitioning = true;\r\n\r\n            // ── 1. 타이틀 UI 슬라이드 아웃 ───────────────────────\r\n            StartCoroutine(SlideUI(_titleUI, _titleUIOriginPos, _titleUIHidePos, _slideDuration));\r\n\r\n            // ── 2. 카메라 줌아웃 + 블러 해제 동시 진행 ───────────\r\n            StartCoroutine(ZoomCamera(_titleZoom, _ingameZoom, _zoomDuration));\r\n            StartCoroutine(FadeBlur(1f, 0f, _blurDuration));\r\n\r\n            // 가장 긴 연출 시간 대기\r\n            yield return new WaitForSeconds(Mathf.Max(_zoomDuration, _blurDuration));\r\n\r\n            // ── 3. 인게임 UI 슬라이드 인 ──────────────────────────\r\n            yield return StartCoroutine(\r\n                SlideUI(_ingameUI, _ingameUIShowPos, _ingameUIOriginPos, _slideDuration));\r\n\r\n            // ── 4. 게임 상태 전환 ─────────────────────────────────\r\n            if (GameManager.Instance != null)\r\n            {\r\n                GameManager.Instance.ChangeState(GameState.WAVE_READY);\r\n                Debug.Log(\"[TransitionController] 전환 완료 → WAVE_READY\");\r\n            }\r\n            else\r\n            {\r\n                Debug.LogError(\"[TransitionController] GameManager.Instance null\");\r\n            }\r\n\r\n            _isTransitioning = false;\r\n        }\r\n\r\n\r\n        // ================================================================\r\n        // 개별 애니메이션 코루틴\r\n        // ================================================================\r\n\r\n        /// <summary>카메라 orthographicSize Lerp</summary>\r\n        private IEnumerator ZoomCamera(float from, float to, float duration)\r\n        {\r\n            float elapsed = 0f;\r\n\r\n            while (elapsed < duration)\r\n            {\r\n                elapsed += Time.deltaTime;\r\n                float t = Mathf.Clamp01(elapsed / duration);\r\n\r\n                // EaseInOut 커브 적용\r\n                t = t * t * (3f - 2f * t);\r\n\r\n                if (_mainCamera != null)\r\n                    _mainCamera.orthographicSize = Mathf.Lerp(from, to, t);\r\n\r\n                yield return null;\r\n            }\r\n\r\n            if (_mainCamera != null)\r\n                _mainCamera.orthographicSize = to;\r\n        }\r\n\r\n        /// <summary>URP Volume weight Lerp (블러 강도)</summary>\r\n        private IEnumerator FadeBlur(float from, float to, float duration)\r\n        {\r\n            if (_postProcessVolume == null) yield break;\r\n\r\n            float elapsed = 0f;\r\n\r\n            while (elapsed < duration)\r\n            {\r\n                elapsed += Time.deltaTime;\r\n                float t = Mathf.Clamp01(elapsed / duration);\r\n\r\n                _postProcessVolume.weight = Mathf.Lerp(from, to, t);\r\n\r\n                yield return null;\r\n            }\r\n\r\n            _postProcessVolume.weight = to;\r\n        }\r\n\r\n        /// <summary>UI RectTransform anchoredPosition Lerp</summary>\r\n        private IEnumerator SlideUI(\r\n            RectTransform rect, Vector2 from, Vector2 to, float duration)\r\n        {\r\n            if (rect == null) yield break;\r\n\r\n            float elapsed = 0f;\r\n            rect.anchoredPosition = from;\r\n\r\n            while (elapsed < duration)\r\n            {\r\n                elapsed += Time.deltaTime;\r\n                float t = Mathf.Clamp01(elapsed / duration);\r\n\r\n                // EaseOut 커브 적용\r\n                t = 1f - Mathf.Pow(1f - t, 3f);\r\n\r\n                rect.anchoredPosition = Vector2.Lerp(from, to, t);\r\n\r\n                yield return null;\r\n            }\r\n\r\n            rect.anchoredPosition = to;\r\n        }\r\n    }\r\n}","lines":268},{"id":"02_Scripts/UI/Popup/WaveProgress.cs","name":"WaveProgress","path":"02_Scripts/UI/Popup/WaveProgress.cs","layer":"UI","scenes":["HCH(한충희)","Main","PSY"],"entry":true,"summary":"이전 코루틴 중복 실행 방지","src":"using LuckyRandomDefense.Core;\nusing System.Collections;\nusing UnityEngine;\n\nnamespace LuckyRandomDefense.UI.Popup\n{\n    public class WaveProgress : PopupBase\n    {\n        protected override GameState ShowOnState => GameState.WAVE_PROGRESS;\n\n        protected override void Awake()\n        {\n            base.Awake();\n        }\n\n        protected override void OnDestroy()\n        {\n            base.OnDestroy();\n        }\n\n        protected override void OnShow()\n        {\n            // 이전 코루틴 중복 실행 방지\n            StopAllCoroutines();\n            StartCoroutine(TimeLimitCoroutine());\n        }\n\n        IEnumerator TimeLimitCoroutine()\n        {\n            Debug.Log(\"[WaveProgress] 타이머 시작\");\n\n            while (GameManager.Instance.TimeLimit > 0)\n            {\n                yield return new WaitForSeconds(1f);\n                GameManager.Instance.TimeLimit--;\n            }\n\n            Debug.Log(\"[WaveProgress] 시간 종료 → WAVE_READY\");\n            GameManager.Instance.TimeLimit = GameManager.Instance.WaveTime;\n            GameManager.Instance.ChangeState(GameState.WAVE_READY);\n        }\n    }\n}\n","lines":44},{"id":"02_Scripts/Unit/UnitEffectObjectPool.cs","name":"UnitEffectObjectPool","path":"02_Scripts/Unit/UnitEffectObjectPool.cs","layer":"Unit","scenes":["HCH(한충희)","KHJ","Main","PSY"],"entry":true,"summary":"class UnitEffectObjectPool : MonoBehaviour","src":"﻿using PlayFab.MultiplayerModels;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\n\r\nnamespace LuckyRandomDefense.Unit\r\n{\r\n    public class UnitEffectObjectPool : MonoBehaviour\r\n    {\r\n        public static UnitEffectObjectPool Instance { get; private set; }\r\n\r\n        [System.Serializable]\r\n        public struct EffectData\r\n        {\r\n            public UnitNameType unitName; // 유닛 이름 \r\n            public GameObject effectPrefab; // 프리팹\r\n            public int poolSize; //  생성해둘 개수\r\n        }\r\n\r\n        [Header(\"이펙트 설정\")]\r\n        [SerializeField] private List<EffectData> _effectList;\r\n\r\n\r\n        [System.Serializable]\r\n        public struct SkillEffectData\r\n        {\r\n            public SkillEffectPrefapType skillEffectPrefapType; \r\n            public GameObject effectPrefab; // 프리팹\r\n            public int poolSize; //  생성해둘 개수\r\n        }\r\n\r\n        [SerializeField] private List<SkillEffectData> _skillEffectList;\r\n\r\n\r\n        [System.Serializable]\r\n        public struct SummonEffectData\r\n        {\r\n            public UnitRatingType ratingType; \r\n            public GameObject effectPrefab;\r\n            public int poolSize;\r\n        }\r\n\r\n        [SerializeField] private List<SummonEffectData> _summonEffectList;\r\n\r\n        private Dictionary<UnitNameType, Queue<GameObject>> _poolDictionary = new Dictionary<UnitNameType, Queue<GameObject>>();\r\n        private Dictionary<SkillEffectPrefapType, Queue<GameObject>> _skillPoolDict = new Dictionary<SkillEffectPrefapType, Queue<GameObject>>();\r\n        private Dictionary<UnitRatingType, Queue<GameObject>> _summonPoolDict = new Dictionary<UnitRatingType, Queue<GameObject>>(); \r\n\r\n        private void Awake()\r\n        {\r\n            Instance = this;\r\n            InitializePool();\r\n        }\r\n\r\n        private void InitializePool()\r\n        {\r\n            foreach (var data in _effectList)\r\n            {\r\n                Queue<GameObject> objectPool = new Queue<GameObject>();\r\n\r\n                for (int i = 0; i < data.poolSize; i++)\r\n                {\r\n                    GameObject obj = Instantiate(data.effectPrefab, transform);\r\n                    obj.SetActive(false);\r\n                    objectPool.Enqueue(obj);\r\n                }\r\n\r\n                _poolDictionary.Add(data.unitName, objectPool);\r\n            }\r\n\r\n            foreach (var data in _skillEffectList)\r\n            {\r\n                Queue<GameObject> objectPool = new Queue<GameObject>();\r\n                for (int i = 0; i < data.poolSize; i++)\r\n                {\r\n                    GameObject obj = Instantiate(data.effectPrefab, transform);\r\n                    obj.SetActive(false);\r\n                    objectPool.Enqueue(obj);\r\n                }\r\n                _skillPoolDict.Add(data.skillEffectPrefapType, objectPool);\r\n            }\r\n\r\n            foreach (var data in _summonEffectList)\r\n            {\r\n                Queue<GameObject> objectPool = new Queue<GameObject>();\r\n                for (int i = 0; i < data.poolSize; i++)\r\n                {\r\n                    GameObject obj = Instantiate(data.effectPrefab, transform);\r\n                    obj.SetActive(false);\r\n                    objectPool.Enqueue(obj);\r\n                }\r\n                _summonPoolDict.Add(data.ratingType, objectPool);\r\n            }\r\n\r\n\r\n        }\r\n\r\n        // 이펙트 소환 \r\n        public GameObject GetAttackEffect(UnitNameType unitName, Vector3 position, Quaternion rotation)\r\n        {\r\n            if (!_poolDictionary.ContainsKey(unitName)) return null;\r\n\r\n            GameObject obj;\r\n\r\n\r\n            if (_poolDictionary[unitName].Count == 0)\r\n            {\r\n\r\n                GameObject prefab = _effectList.Find(x => x.unitName == unitName).effectPrefab;\r\n                obj = Instantiate(prefab, transform);\r\n            }\r\n            else\r\n            {\r\n\r\n                obj = _poolDictionary[unitName].Dequeue();\r\n            }\r\n\r\n            obj.transform.SetPositionAndRotation(position, rotation);\r\n            obj.SetActive(true);\r\n\r\n            return obj;\r\n        }\r\n\r\n        // 이펙트 반환\r\n        public void ReturnAttackEffect(UnitNameType unitName, GameObject obj)\r\n        {\r\n            obj.SetActive(false);\r\n            _poolDictionary[unitName].Enqueue(obj);\r\n        }\r\n\r\n        // 스킬이펙트 함수 호출\r\n        public GameObject GetSkillEffect(SkillEffectPrefapType type, Vector3 position, Quaternion rotation)\r\n        {\r\n            if (!_skillPoolDict.ContainsKey(type)) return null;\r\n\r\n            GameObject obj = (_skillPoolDict[type].Count == 0)\r\n                ? Instantiate(_skillEffectList.Find(x => x.skillEffectPrefapType == type).effectPrefab, transform)\r\n                : _skillPoolDict[type].Dequeue();\r\n\r\n            obj.transform.SetPositionAndRotation(position, rotation);\r\n            obj.SetActive(true);\r\n\r\n            return obj;\r\n        }\r\n\r\n        public void ReturnSkillEffect(SkillEffectPrefapType type, GameObject obj)\r\n        {\r\n            obj.SetActive(false);\r\n            _skillPoolDict[type].Enqueue(obj);\r\n        }\r\n\r\n\r\n\r\n        // 소환 이펙트\r\n\r\n        public
