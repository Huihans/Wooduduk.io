<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scene Thriller — 아키텍처 대시보드</title>
<style>
  :root{ --bg:#0b1220; --bg2:#0e1830; --panel:#121d33; --panel2:#16233c; --line:#243350; --tx:#e9f0f8; --tx2:#8ea3c2; --acc:#38d9a9; --acc2:#4dabf7; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--tx); font-family:"Segoe UI",system-ui,"Malgun Gothic",sans-serif; }
  #app{ display:grid; grid-template-columns:250px 1fr; grid-template-rows:62px 1fr; height:100vh; }
  header{ grid-column:1/3; display:flex; align-items:center; gap:18px; padding:0 22px; border-bottom:1px solid var(--line); background:linear-gradient(180deg,var(--bg2),var(--bg)); }
  header h1{ font-size:19px; margin:0; font-weight:800; }
  header h1 span{ color:var(--acc); }
  .flow{ display:flex; align-items:center; gap:8px; margin-left:8px; }
  .flow .s{ font-size:12px; padding:4px 12px; border-radius:20px; background:var(--panel); border:1px solid var(--line); color:var(--tx2); cursor:pointer; user-select:none; }
  .flow .s.on{ background:var(--acc); color:#04101f; border-color:var(--acc); font-weight:700; }
  .flow .arw{ color:var(--tx2); font-size:12px; }
  .chips{ margin-left:auto; display:flex; gap:8px; }
  .chip{ font-size:12.5px; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:5px 11px; color:var(--tx2); }
  .chip b{ color:var(--tx); font-size:14px; }
  aside{ border-right:1px solid var(--line); background:var(--bg2); overflow-y:auto; padding:16px 14px; }
  #q{ width:100%; padding:9px 11px; background:var(--bg); border:1px solid var(--line); border-radius:8px; color:var(--tx); font-size:13px; margin-bottom:16px; }
  #q:focus{ outline:none; border-color:var(--acc); }
  aside h4{ font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--tx2); margin:6px 0 8px; }
  .lnav a{ display:flex; align-items:center; gap:9px; padding:6px 8px; border-radius:6px; color:var(--tx); text-decoration:none; font-size:13px; cursor:pointer; }
  .lnav a:hover{ background:var(--panel); }
  .lnav .dot{ width:10px; height:10px; border-radius:3px; flex:0 0 auto; }
  .lnav .c{ margin-left:auto; color:var(--tx2); font-variant-numeric:tabular-nums; font-size:12px; }
  .deadbox{ margin-top:18px; font-size:11.5px; color:var(--tx2); line-height:1.6; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
  main{ overflow-y:auto; padding:8px 26px 60px; scroll-behavior:smooth; }
  .layer{ margin-top:30px; }
  .layer > .lh{ display:flex; align-items:center; gap:12px; position:sticky; top:0; background:linear-gradient(180deg,var(--bg) 70%,transparent); padding:12px 0 10px; z-index:5; }
  .lh .bar{ width:5px; height:26px; border-radius:3px; }
  .lh .name{ font-size:22px; font-weight:800; }
  .lh .en{ font-family:ui-monospace,Consolas,monospace; font-size:13px; color:var(--tx2); }
  .lh .cnt{ margin-left:auto; font-size:13px; color:var(--tx2); }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-left-width:4px; border-radius:12px; padding:14px 16px; cursor:pointer; transition:none; }
  .card:hover{ background:var(--panel2); border-color:var(--acc); }
  .card .nm{ font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .card .star{ color:var(--acc); font-size:13px; }
  .card .pth{ font-family:ui-monospace,Consolas,monospace; font-size:11px; color:var(--tx2); margin:3px 0 8px; word-break:break-all; }
  .card .sum{ font-size:12.5px; color:var(--tx); line-height:1.55; opacity:.92; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .card .meta{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; align-items:center; }
  .bdg{ font-size:10.5px; padding:2px 7px; border-radius:5px; border:1px solid var(--line); color:var(--tx2); }
  .bdg.sc{ background:var(--bg); }
  .deg{ margin-left:auto; font-size:11px; color:var(--tx2); font-family:ui-monospace,monospace; }
  .hidden{ display:none !important; }
  /* detail drawer */
  #drawer{ position:fixed; top:0; right:0; width:420px; height:100vh; background:var(--bg2); border-left:1px solid var(--line); padding:24px; overflow-y:auto; transform:translateX(460px); transition:transform .2s ease; box-shadow:-12px 0 40px rgba(0,0,0,.45); z-index:20; }
  #drawer.show{ transform:none; }
  #drawer .x{ position:absolute; top:16px; right:20px; cursor:pointer; color:var(--tx2); font-size:22px; }
  #drawer .x:hover{ color:var(--tx); }
  #drawer .dn{ font-size:24px; font-weight:800; margin-right:24px; word-break:break-all; }
  #drawer .dp{ font-family:ui-monospace,Consolas,monospace; font-size:12px; color:var(--tx2); margin:5px 0 14px; word-break:break-all; }
  #drawer .dsum{ font-size:14px; line-height:1.7; background:var(--panel); border-radius:10px; padding:14px 15px; }
  #drawer .code{ max-height:460px; overflow:auto; background:#0b1220; border:1px solid var(--line); border-radius:8px; padding:12px 14px; font-family:ui-monospace,Consolas,monospace; font-size:11.5px; line-height:1.55; color:#c7d2e0; white-space:pre; margin-top:2px; tab-size:4; }
  .copybtn{ cursor:pointer; color:var(--acc); font-size:11px; border:1px solid var(--line); padding:1px 8px; border-radius:5px; margin-left:8px; }
  .copybtn:hover{ background:var(--panel); }
  #drawer .lc{ color:var(--tx2); font-weight:400; text-transform:none; letter-spacing:0; }
  #drawer h5{ font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--tx2); margin:18px 0 8px; }
  #drawer .dep{ font-size:13px; color:var(--acc2); padding:3px 0; cursor:pointer; word-break:break-all; }
  #drawer .dep:hover{ text-decoration:underline; }
  #empty{ color:var(--tx2); padding:40px; text-align:center; font-size:15px; }
</style>
</head>

</div>
<div id="drawer"></div>

const DATA = {"meta":{"generated":"2026-07-11","project":"Scene Thriller","title":"🔦 씬 스릴러 <span>아키텍처</span>","scenes":["Room1","Room2","Room3","Demo"],"layerNames":{"Core":"Core · 코어 플레이","Room1":"Room1 · 키패드","Room2":"Room2 · NPC","Keypad":"Keypad · 키패드 에셋"},"deadText":"4개 씬(Room1·Room2·Room3·Demo)에서 실제 사용되는 <b>라이브 코드 19개</b>만 표시. 씬에서 미도달한 <b>4개</b>(에디터툴·테스트·미사용 등)는 제외했습니다.","live":19,"dead":4,"edges":31,"perScene":{"Room1":14,"Room2":14,"Room3":0,"Demo":0},"perLayer":{"Core":13,"Room1":2,"Room2":3,"Keypad":1}},"colors":{"Core":"#ff6b6b","Room2":"#4dabf7","Room1":"#ffd43b","Keypad":"#51cf66"},"nodes":[{"id":"Scripts/HintImageSpawner.cs","name":"HintImageSpawner","path":"Scripts/HintImageSpawner.cs","layer":"Core","scenes":["Room1"],"entry":true,"summary":"키패드 1회 실패 시 벽면에 힌트 이미지를 동적으로 생성 - 여러 힌트 이미지를 Inspector에서 + 버튼으로 추가 가능 - 각 항목마다 다른 위치/크기/회전 설정 가능 [설정 방법] 1. 빈 GameObject 생성 → 이 스크립트 부착 2. Hint Entries → + 버튼으로 항목 추가 (4개) - Texture: 힌트 이미지 - Spawn Position: 각 벽면 위치 - Spawn Rotation: 벽 방향 회","src":"using System.Collections.Generic;\nusing UnityEngine;\n\n/// <summary>\n/// 키패드 1회 실패 시 벽면에 힌트 이미지를 동적으로 생성\n/// - 여러 힌트 이미지를 Inspector에서 + 버튼으로 추가 가능\n/// - 각 항목마다 다른 위치/크기/회전 설정 가능\n/// \n/// [설정 방법]\n/// 1. 빈 GameObject 생성 → 이 스크립트 부착\n/// 2. Hint Entries → + 버튼으로 항목 추가 (4개)\n///    - Texture: 힌트 이미지\n///    - Spawn Position: 각 벽면 위치\n///    - Spawn Rotation: 벽 방향 회전\n///    - Image Size: 크기\n/// 3. KeypadPuzzleAutoSubmit의 On Fail Count Changed → OnFailCountChanged() 연결\n/// </summary>\npublic class HintImageSpawner : MonoBehaviour\n{\n    [System.Serializable]\n    public class HintEntry\n    {\n        public Texture2D texture;\n        public Vector3 spawnPosition;\n        public Vector3 spawnRotation;\n        public Vector2 imageSize = new Vector2(1f, 1f);\n        public Color tintColor = Color.white;\n    }\n\n    [Header(\"Hint Images\")]\n    [SerializeField] private List<HintEntry> hintEntries = new List<HintEntry>();\n\n    private List<GameObject> _spawnedHints = new List<GameObject>();\n    private bool _shown = false;\n\n    public void OnFailCountChanged(int failCount)\n    {\n        if (failCount >= 1)\n            ShowAllHints();\n    }\n\n    public void ShowAllHints()\n    {\n        if (_shown) return;\n        _shown = true;\n\n        foreach (var entry in hintEntries)\n        {\n            if (entry.texture == null) continue;\n            SpawnHint(entry);\n        }\n\n        SoundManager.Instance?.PlayHintSpawn();\n        SoundManager.Instance?.PlayHintSpawn();\n        Debug.Log($\"[HintImageSpawner] 힌트 이미지 {_spawnedHints.Count}개 생성됨\");\n    }\n\n    private void SpawnHint(HintEntry entry)\n    {\n        var obj = GameObject.CreatePrimitive(PrimitiveType.Quad);\n        obj.name = \"HintImage_\" + entry.texture.name;\n\n        Destroy(obj.GetComponent<Collider>());\n\n        obj.transform.position = entry.spawnPosition;\n        obj.transform.eulerAngles = entry.spawnRotation;\n        obj.transform.localScale = new Vector3(\n            entry.imageSize.x > 0 ? entry.imageSize.x : 1f,\n            entry.imageSize.y > 0 ? entry.imageSize.y : 1f,\n            1f\n        );\n\n        var renderer = obj.GetComponent<MeshRenderer>();\n        // Unlit/Transparent 셰이더 사용 (투명도 지원)\n        var shader = Shader.Find(\"Unlit/Transparent\");\n        var mat = new Material(shader);\n        mat.mainTexture = entry.texture;\n\n        renderer.material = mat;\n        _spawnedHints.Add(obj);\n    }\n\n    public void HideAllHints()\n    {\n        foreach (var hint in _spawnedHints)\n            if (hint != null) Destroy(hint);\n\n        _spawnedHints.Clear();\n        _shown = false;\n    }\n}\n","lines":92},{"id":"Scripts/GameManager.cs","name":"GameManager","path":"Scripts/GameManager.cs","layer":"Core","scenes":["Room1"],"entry":true,"summary":"게임 매니저 - 씬 초기화 및 게임 흐름 관리 [설정 방법] 1. 각 씬에 빈 GameObject 생성 → 이름 GameManager 2. 이 스크립트 부착 3. Inspector에서 필요한 슬롯 연결","src":"using System.Collections;\nusing UnityEngine;\n\n/// <summary>\n/// 게임 매니저 - 씬 초기화 및 게임 흐름 관리\n/// \n/// [설정 방법]\n/// 1. 각 씬에 빈 GameObject 생성 → 이름 GameManager\n/// 2. 이 스크립트 부착\n/// 3. Inspector에서 필요한 슬롯 연결\n/// </summary>\npublic class GameManager : MonoBehaviour\n{\n    [Header(\"Scene Settings\")]\n    [SerializeField] private float startDelay = 1f;         // 씬 시작 후 딜레이\n    [SerializeField] private bool playHintsOnStart = true;  // 시작 시 힌트 음성 자동 재생\n\n    [Header(\"References\")]\n    [SerializeField] private TimerManager timerManager;\n\n    private void Start()\n    {\n        StartCoroutine(CoInitScene());\n    }\n\n    private IEnumerator CoInitScene()\n    {\n        // 1. 시작 딜레이\n        yield return new WaitForSeconds(startDelay);\n\n        // 3. 힌트 음성 재생\n        if (playHintsOnStart)\n            SoundManager.Instance?.PlayAllHints();\n\n        // 4. 타이머 시작\n        if (timerManager != null)\n            timerManager.StartTimer();\n\n        Debug.Log(\"[GameManager] 씬 초기화 완료\");\n    }\n}\n","lines":42},{"id":"Scripts/PlayerController.cs","name":"PlayerController","path":"Scripts/PlayerController.cs","layer":"Core","scenes":["Room1","Room2"],"entry":true,"summary":"1인칭 플레이어 컨트롤러 - WASD 이동 - 마우스 X: 플레이어 좌우 회전 - 마우스 Y: 카메라 상하 회전 [하이라키 구조] Player (이 스크립트 + CharacterController) Main Camera (자식으로 배치, Position Y 0.7 권장)","src":"using UnityEngine;\n\n/// <summary>\n/// 1인칭 플레이어 컨트롤러\n/// - WASD 이동\n/// - 마우스 X: 플레이어 좌우 회전\n/// - 마우스 Y: 카메라 상하 회전\n/// \n/// [하이라키 구조]\n/// Player (이 스크립트 + CharacterController)\n///   └── Main Camera (자식으로 배치, Position Y = 0.7 권장)\n/// </summary>\n[RequireComponent(typeof(CharacterController))]\npublic class PlayerController : MonoBehaviour\n{\n    [Header(\"Move\")]\n    [SerializeField] private float moveSpeed = 3.5f;\n\n    [Header(\"Mouse Look\")]\n    [SerializeField] private Transform cameraTransform;         // Main Camera를 드래그\n    [SerializeField] private float mouseSensitivity = 150f;\n    [SerializeField] private float verticalClampAngle = 80f;    // 상하 시야각 제한\n\n    private CharacterController _cc;\n    private float _verticalRotation = 0f;\n    private bool _inputEnabled = true;\n\n    private void Awake()\n    {\n        _cc = GetComponent<CharacterController>();\n\n        // cameraTransform 미지정 시 자식 카메라 자동 탐색\n        if (cameraTransform == null && Camera.main != null)\n            cameraTransform = Camera.main.transform;\n\n        // 커서 잠금\n        Cursor.lockState = CursorLockMode.Locked;\n        Cursor.visible = false;\n    }\n\n    public void EnableInput(bool enable)\n    {\n        _inputEnabled = enable;\n\n        // 사망 연출 등 입력 비활성화 시 커서 처리\n        if (!enable)\n        {\n            Cursor.lockState = CursorLockMode.None;\n            Cursor.visible = true;\n        }\n        else\n        {\n            Cursor.lockState = CursorLockMode.Locked;\n            Cursor.visible = false;\n        }\n    }\n\n    private void Update()\n    {\n        if (!_inputEnabled) return;\n\n        HandleMovement();\n        HandleMouseLook();\n    }\n\n    private void HandleMovement()\n    {\n        float h = Input.GetAxisRaw(\"Horizontal\");\n        float v = Input.GetAxisRaw(\"Vertical\");\n\n        Vector3 move = transform.right * h + transform.forward * v;\n        move = Vector3.ClampMagnitude(move, 1f) * moveSpeed;\n        move.y = -2f; // 기본 중력\n\n        _cc.Move(move * Time.deltaTime);\n    }\n\n    private void HandleMouseLook()\n    {\n        float mouseX = Input.GetAxis(\"Mouse X\") * mouseSensitivity * Time.deltaTime;\n        float mouseY = Input.GetAxis(\"Mouse Y\") * mouseSensitivity * Time.deltaTime;\n\n        // 플레이어 오브젝트 좌우 회전\n        transform.Rotate(Vector3.up * mouseX);\n\n        // 카메라 상하 회전 (클램프로 과회전 방지)\n        _verticalRotation -= mouseY;\n        _verticalRotation = Mathf.Clamp(_verticalRotation, -verticalClampAngle, verticalClampAngle);\n\n        if (cameraTransform != null)\n            cameraTransform.localRotation = Quaternion.Euler(_verticalRotation, 0f, 0f);\n    }\n}\n","lines":94},{"id":"Scripts/TimerManager.cs","name":"TimerManager","path":"Scripts/TimerManager.cs","layer":"Core","scenes":["Room1"],"entry":true,"summary":"Countdown timer for each Scene. - Starts automatically on Awake (or call StartTimer() manually). - At timeLimit seconds, triggers DeathSequence. - Optional event at halfTime for tension escalation.","src":"using System.Collections;\nusing UnityEngine;\nusing UnityEngine.Events;\n\n/// <summary>\n/// Countdown timer for each Scene.\n/// - Starts automatically on Awake (or call StartTimer() manually).\n/// - At timeLimit seconds, triggers DeathSequence.\n/// - Optional event at halfTime for tension escalation.\n/// </summary>\npublic class TimerManager : MonoBehaviour\n{\n    [Header(\"Config\")]\n    [SerializeField] private float timeLimit = 120f;       // 제한 시간 (초)\n    [SerializeField] private bool autoStart = true;        // Awake 시 자동 시작\n\n    [Header(\"Wiring\")]\n    [SerializeField] private DeathSequence deathSequence;\n\n    [Header(\"Tension Event (Optional)\")]\n    [Tooltip(\"남은 시간이 이 값 이하가 되면 onTensionStart 이벤트 발생 (ex. 60초)\")]\n    [SerializeField] private float tensionThreshold = 60f;\n    public UnityEvent onTensionStart;   // 긴장 연출 강화 (BGM 변경, 조명 등)\n\n    /// <summary>\n    /// 매 프레임 남은 시간(초)을 전달. UI나 월드 오브젝트에 연결 가능.\n    /// </summary>\n    public UnityEvent<float> onTimerTick;\n\n    /// <summary>\n    /// 타이머 만료 시 호출.\n    /// </summary>\n    public UnityEvent onTimeUp;\n\n    private float _remaining;\n    private bool _running = false;\n    private bool _tensionFired = false;\n    private bool _expired = false;\n\n    private void Awake()\n    {\n        _remaining = timeLimit;\n\n        if (autoStart)\n            StartTimer();\n    }\n\n    /// <summary>\n    /// 타이머를 시작합니다.\n    /// </summary>\n    public void StartTimer()\n    {\n        if (_expired) return;\n        _running = true;\n    }\n\n    /// <summary>\n    /// 타이머를 일시 정지합니다.\n    /// </summary>\n    public void PauseTimer()\n    {\n        _running = false;\n    }\n\n    /// <summary>\n    /// 타이머를 재개합니다.\n    /// </summary>\n    public void ResumeTimer()\n    {\n        if (_expired) return;\n        _running = true;\n    }\n\n    /// <summary>\n    /// 타이머를 강제 만료시킵니다 (외부에서 즉시 사망 트리거 가능).\n    /// </summary>\n    public void ForceExpire()\n    {\n        if (_expired) return;\n        _running = false;\n        _expired = true;\n        HandleTimeUp();\n    }\n\n    /// <summary>\n    /// 키패드 퍼즐 해결 시 타이머를 멈춥니다.\n    /// </summary>\n    public void StopTimer()\n    {\n        _running = false;\n        _expired = true; // 재시작 방지\n    }\n\n    /// <summary>\n    /// 현재 남은 시간 반환.\n    /// </summary>\n    public float GetRemaining() => _remaining;\n\n    private void Update()\n    {\n        if (!_running || _expired) return;\n\n        _remaining -= Time.deltaTime;\n        _remaining = Mathf.Max(_remaining, 0f);\n\n        onTimerTick?.Invoke(_remaining);\n\n        // 긴장 연출 임계값 도달\n        if (!_tensionFired && _remaining <= tensionThreshold)\n        {\n            _tensionFired = true;\n            onTensionStart?.Invoke();\n            Debug.Log(\"[TimerManager] Tension threshold reached.\");\n        }\n\n        // 시간 만료\n        if (_remaining <= 0f)\n        {\n            _running = false;\n            _expired = true;\n            HandleTimeUp();\n        }\n    }\n\n    private void HandleTimeUp()\n    {\n        Debug.Log(\"[TimerManager] Time's up!\");\n        onTimeUp?.Invoke();\n\n        if (deathSequence != null)\n            deathSequence.Play();\n        else\n            Debug.LogWarning(\"[TimerManager] DeathSequence is not assigned.\");\n    }\n}\n","lines":136},{"id":"Scripts/DeathSequence.cs","name":"DeathSequence","path":"Scripts/DeathSequence.cs","layer":"Core","scenes":["Room1","Room2"],"entry":true,"summary":"사망 연출 컨트롤러 1. 플레이어 입력 비활성화 2. 플레이어 후방에 NPC 스폰 3. SFX 재생 4. 카메라가 후방으로 회전 (NPC 바라보기) 5. NPC 공격 애니메이션 (Attack2) 6. 플레이어 쓰러지는 연출 7. 페이드 아웃 8. 씬 리로드","src":"using System.Collections;\nusing UnityEngine;\nusing UnityEngine.SceneManagement;\n\n/// <summary>\n/// 사망 연출 컨트롤러\n/// 1. 플레이어 입력 비활성화\n/// 2. 플레이어 후방에 NPC 스폰\n/// 3. SFX 재생\n/// 4. 카메라가 후방으로 회전 (NPC 바라보기)\n/// 5. NPC 공격 애니메이션 (Attack2)\n/// 6. 플레이어 쓰러지는 연출\n/// 7. 페이드 아웃\n/// 8. 씬 리로드\n/// </summary>\npublic class DeathSequence : MonoBehaviour\n{\n    public enum DeathType\n    {\n        TimerExpired,\n        KeypadFail,\n    }\n\n    public enum DeathMode\n    {\n        NpcApproach,  // 기본 - NPC 후방 스폰 + 카메라 회전\n        DirectHit     // Room2용 - 카메라 회전 없이 바로 쓰러짐\n    }\n\n    public enum AfterDeathAction\n    {\n        LoadGameOverScene,\n        ReloadCurrentScene\n    }\n\n    [Header(\"Behavior\")]\n    [SerializeField] private DeathMode deathMode = DeathMode.NpcApproach;\n    [SerializeField] private AfterDeathAction afterDeath = AfterDeathAction.ReloadCurrentScene;\n    [SerializeField] private string gameOverSceneName = \"GameOver\";\n\n    [Header(\"References\")]\n    [SerializeField] private PlayerController playerToDisable;\n    [SerializeField] private Transform cameraTransform;         // Main Camera\n    [SerializeField] private Transform playerTransform;         // Player 오브젝트\n\n    [Header(\"NPC\")]\n    [SerializeField] private GameObject npcPrefab;              // NPC 프리팹 (없으면 씬 오브젝트 사용)\n    [SerializeField] private GameObject npcSceneObject;         // 씬에 배치된 NPC 오브젝트 (비활성화 상태로 배치)\n    [SerializeField] private float npcSpawnDistance = 1.5f;     // 플레이어 후방 거리\n    [SerializeField] private Vector3 npcSpawnOffset = Vector3.zero;  // 스폰 위치 추가 오프셋 (X:좌우 Y:높이 Z:앞뒤)\n    [SerializeField] private AudioClip npcSFX;                  // NPC 등장 SFX\n    [SerializeField] private AudioClip npcAttackSFX;              // NPC 공격 SFX\n    [SerializeField] private AudioClip playerDeathSFX;            // 플레이어 사망 SFX\n    [SerializeField] private string attackAnimTrigger = \"Attack2\"; // 애니메이션 클립 이름\n    [SerializeField, Range(0f, 1f)] private float attackHitPoint = 0.5f; // 공격 애니메이션 중 쓰러짐 타이밍 (0~1)\n\n    [Header(\"Camera Turn\")]\n    [SerializeField] private float cameraTurnDelay = 0.5f;      // NPC 스폰 후 카메라 돌아보기 딜레이\n    [SerializeField] private float cameraTurnDuration = 0.4f;   // 후방으로 돌아보는 시간\n\n    [Header(\"Camera Shake\")]\n    [SerializeField] private float shakeDuration = 0.6f;\n    [SerializeField] private float shakeMagnitude = 0.15f;\n\n    [Header(\"Fall Animation\")]\n    [SerializeField] private float fallDuration = 1.0f;\n    [SerializeField] private float fallTargetX = -1f;\n    [SerializeField] private float fallTargetY = -0.8f;\n    [SerializeField] private float fallTargetRotZ = -90f;\n\n    [Header(\"Delay\")]\n    [SerializeField] private float fadeDelay = 0.5f;\n\n    [Header(\"Scene Load Delay\")]\n    [SerializeField] private float sceneLoadDelay = 1.0f;\n\n    private bool _isPlaying = false;\n    private AudioSource _sfxSource;\n\n    private void Awake()\n    {\n        if (cameraTransform == null && Camera.main != null)\n            cameraTransform = Camera.main.transform;\n\n        _sfxSource = gameObject.AddComponent<AudioSource>();\n        _sfxSource.playOnAwake = false;\n    }\n\n    public void Play()\n    {\n        Play(DeathType.KeypadFail);\n    }\n\n    public void Play(DeathType type)\n    {\n        if (_isPlaying) return;\n        StartCoroutine(CoPlay(type));\n    }\n\n    private IEnumerator CoPlay(DeathType type)\n    {\n        _isPlaying = true;\n\n        // 1. 플레이어 입력 비활성화\n        if (playerToDisable != null)\n            playerToDisable.EnableInput(false);\n\n        // 재생 중인 SFX 중단\n        SoundManager.Instance?.StopSFX();\n\n        if (deathMode == DeathMode.DirectHit)\n        {\n            // Room2용 - 카메라 회전 없이 바로 쓰러짐\n            if (npcAttackSFX != null)\n                _sfxSource.PlayOneShot(npcAttackSFX);\n            if (playerDeathSFX != null)\n                _sfxSource.PlayOneShot(playerDeathSFX);\n\n            yield return StartCoroutine(CoShake());\n            yield return StartCoroutine(CoFall());\n        }\n        else\n        {\n            // 기본 - NPC 후방 스폰 + 카메라 회전\n            GameObject spawnedNPC = SpawnNPC();\n\n            if (npcSFX != null)\n                _sfxSource.PlayOneShot(npcSFX);\n\n            if (spawnedNPC != null)\n            {\n                yield return new WaitForSeconds(cameraTurnDelay);\n                yield return StartCoroutine(CoCameraTurnTo(spawnedNPC.transform.position));\n            }\n\n            if (spawnedNPC != null)\n            {\n                var anim = spawnedNPC.GetComponentInChildren<Animation>();\n                if (anim != null && anim.GetClip(attackAnimTrigger) != null)\n                {\n                    float clipLength = anim.GetClip(attackAnimTrigger).length;\n                    anim.Play(attackAnimTrigger);\n                    if (npcAttackSFX != null)\n                        _sfxSource.PlayOneShot(npcAttackSFX);\n                    yield return new WaitForSeconds(clipLength * attackHitPoint);\n                }\n                else\n                {\n                    yield return new WaitForSeconds(0.8f);\n                }\n            }\n\n            if (playerDeathSFX != null)\n                _sfxSource.PlayOneShot(playerDeathSFX);\n\n            yield return StartCoroutine(CoShake());\n            yield return StartCoroutine(CoFall());\n        }\n\n        yield return new WaitForSeconds(fadeDelay + sceneLoadDelay);\n        LoadScene();\n    }\n\n    private GameObject SpawnNPC()\n    {\n        if (playerTransform == null) return null;\n\n        GameObject npc;\n\n        // 씬 오브젝트 우선 사용, 없으면 프리팹 인스턴스\n        if (npcSceneObject != null)\n        {\n            npc = npcSceneObject;\n            npc.SetActive(true);\n        }\n        else if (npcPrefab != null)\n        {\n            Vector3 spawnPos = playerTransform.position - playerTransform.forward * npcSpawnDistance;\n            spawnPos.y = playerTransform.position.y;\n            spawnPos += npcSpawnOffset;\n            npc = Instantiate(npcPrefab, spawnPos, Quaternion.identity);\n        }\n        else\n        {\n            Debug.LogWarning(\"[DeathSequence] NPC 프리팹 또는 씬 오브젝트가 없어요!\");\n            return null;\n        }\n\n        // 플레이어 후방 위치로 이동\n        Vector3 spawnPosition = playerTransform.position - playerTransform.forward * npcSpawnDistance;\n        spawnPosition.y = playerTransform.position.y;\n        spawnPosition += npcSpawnOffset;\n        npc.transform.position = spawnPosition;\n\n        // NPC가 플레이어를 바라보게 (Y축만 회전)\n        Vector3 lookDir = playerTransform.position - npc.transform.position;\n        lookDir.y = 0f;\n        npc.transform.rotation = Quaternion.LookRotation(lookDir);\n\n        Debug.Log($\"[DeathSequence] NPC 활성화: {spawnPosition}\");\n        return npc;\n    }\n\n    private IEnumerator CoCameraTurnTo(Vector3 targetPos)\n    {\n        if (cameraTransform == null) yield break;\n\n        // 카메라가 바라볼 방향 계산 (Y축만 회전, 카메라 높이 고정)\n        Vector3 dirToNPC = targetPos - cameraTransform.position;\n        dirToNPC.y = 0f;\n        dirToNPC.Normalize();\n        Quaternion startRot = cameraTransform.rotation;\n        Quaternion endRot = Quaternion.LookRotation(dirToNPC);\n\n        float elapsed = 0f;\n        while (elapsed < cameraTurnDuration)\n        {\n            elapsed += Time.deltaTime;\n            float t = Mathf.SmoothStep(0f, 1f, elapsed / cameraTurnDuration);\n            cameraTransform.rotation = Quaternion.Lerp(startRot, endRot, t);\n            yield return null;\n        }\n\n        cameraTransform.rotation = endRot;\n    }\n\n    private IEnumerator CoShake()\n    {\n        if (cameraTransform == null) yield break;\n\n        Vector3 originalPos = cameraTransform.localPosition;\n        float elapsed = 0f;\n\n        while (elapsed < shakeDuration)\n        {\n            elapsed += Time.deltaTime;\n            float x = Random.Range(-1f, 1f) * shakeMagnitude;\n            float y = Random.Range(-1f, 1f) * shakeMagnitude;\n            cameraTransform.localPosition = originalPos + new Vector3(x, y, 0f);\n            yield return null;\n        }\n\n        cameraTransform.localPosition = originalPos;\n    }\n\n    private IEnumerator CoFall()\n    {\n        Transform target = playerTransform != null ? playerTransform : cameraTransform;\n        if (target == null) yield break;\n\n        var cc = target.GetComponent<CharacterController>();\n        if (cc != null) cc.enabled = false;\n\n        Vector3 startPos = target.position;\n        Vector3 startEuler = target.eulerAngles;\n\n        Vector3 endPos = new Vector3(startPos.x + fallTargetX, startPos.y + fallTargetY, startPos.z);\n\n        float elapsed = 0f;\n        while (elapsed < fallDuration)\n        {\n            elapsed += Time.deltaTime;\n            float t = Mathf.SmoothStep(0f, 1f, elapsed / fallDuration);\n\n            target.position = Vector3.Lerp(startPos, endPos, t);\n            target.eulerAngles = new Vector3(\n                startEuler.x,\n                startEuler.y,\n                Mathf.LerpAngle(startEuler.z, fallTargetRotZ, t)\n            );\n\n            yield return null;\n        }\n\n        target.position = endPos;\n        target.eulerAngles = new Vector3(startEuler.x, startEuler.y, fallTargetRotZ);\n    }\n\n    private void LoadScene()\n    {\n        if (afterDeath == AfterDeathAction.ReloadCurrentScene)\n        {\n            SceneManager.LoadScene(SceneManager.GetActiveScene().name);\n        }\n        else\n        {\n            if (!string.IsNullOrWhiteSpace(gameOverSceneName))\n                SceneManager.LoadScene(gameOverSceneName);\n            else\n                SceneManager.LoadScene(SceneManager.GetActiveScene().name);\n        }\n    }\n}\n","lines":294},{"id":"Scripts/SceneTransitionTrigger.cs","name":"SceneTransitionTrigger","path":"Scripts/SceneTransitionTrigger.cs","layer":"Core","scenes":["Room1","Room2"],"entry":true,"summary":"씬 전환 트리거 - 플레이어가 트리거 구역에 들어오면 다음 씬으로 전환 [설정 방법] 1. 빈 GameObject 생성 → 이 스크립트 부착 2. Box Collider 추가 → Is Trigger 체크 3. Next Scene Name에 이동할 씬 이름 입력 4. 문 통과 위치에 배치 [주의] File > Build Settings에 씬을 추가해야 전환이 동작해요!","src":"using UnityEngine;\nusing UnityEngine.SceneManagement;\n\n/// <summary>\n/// 씬 전환 트리거\n/// - 플레이어가 트리거 구역에 들어오면 다음 씬으로 전환\n/// \n/// [설정 방법]\n/// 1. 빈 GameObject 생성 → 이 스크립트 부착\n/// 2. Box Collider 추가 → Is Trigger 체크\n/// 3. Next Scene Name에 이동할 씬 이름 입력\n/// 4. 문 통과 위치에 배치\n/// \n/// [주의]\n/// File > Build Settings에 씬을 추가해야 전환이 동작해요!\n/// </summary>\npublic class SceneTransitionTrigger : MonoBehaviour\n{\n    [Header(\"Config\")]\n    [SerializeField] private string nextSceneName = \"Room2\";\n    [SerializeField] private string playerTag = \"Player\";\n\n    private void OnTriggerEnter(Collider other)\n    {\n        if (!other.CompareTag(playerTag)) return;\n\n        SoundManager.Instance?.StopSFX();\n        SceneManager.LoadScene(nextSceneName);\n    }\n}\n","lines":31},{"id":"Scripts/Room1/KeypadDigitButton.cs","name":"KeypadDigitButton","path":"Scripts/Room1/KeypadDigitButton.cs","layer":"Room1","scenes":["Room1"],"entry":true,"summary":"Attach this to each keypad digit button (0~9). Ensure the button has a Collider.","src":"using UnityEngine;\n\n/// <summary>\n/// Attach this to each keypad digit button (0~9).\n/// Ensure the button has a Collider.\n/// </summary>\npublic class KeypadDigitButton : MonoBehaviour, IInteractable\n{\n    [SerializeField] private KeypadPuzzleAutoSubmit keypad;\n    [SerializeField, Range(0, 9)] private int digit = 0;\n\n    [Header(\"Optional press animation\")]\n    [SerializeField] private Transform buttonVisual;\n    [SerializeField] private float pressDepth = 0.01f;\n    [SerializeField] private float pressReturnSpeed = 18f;\n\n    private Vector3 _initialLocalPos;\n\n    private void Awake()\n    {\n        if (buttonVisual == null) buttonVisual = transform;\n        _initialLocalPos = buttonVisual.localPosition;\n    }\n\n    public void Interact(InteractorClick interactor)\n    {\n        if (keypad == null) return;\n\n        keypad.PressDigit(digit);\n        PressVisual();\n    }\n\n    private void PressVisual()\n    {\n        if (buttonVisual == null) return;\n\n        buttonVisual.localPosition = _initialLocalPos + Vector3.back * pressDepth;\n        StopAllCoroutines();\n        StartCoroutine(ReturnVisual());\n    }\n\n    private System.Collections.IEnumerator ReturnVisual()\n    {\n        while (buttonVisual != null &&\n               Vector3.Distance(buttonVisual.localPosition, _initialLocalPos) > 0.0001f)\n        {\n            buttonVisual.localPosition = Vector3.Lerp(\n                buttonVisual.localPosition,\n                _initialLocalPos,\n                Time.deltaTime * pressReturnSpeed\n            );\n            yield return null;\n        }\n\n        if (buttonVisual != null) buttonVisual.localPosition = _initialLocalPos;\n    }\n}\n","lines":58},{"id":"Scripts/Door.cs","name":"Door","path":"Scripts/Door.cs","layer":"Core","scenes":["Room1","Room2"],"entry":true,"summary":"Simple door: - Locked by default - KeypadPuzzleAutoSubmit calls Unlock() - Player can click to open (Interact) - 코루틴으로 부드럽게 회전하며 열림","src":"using System.Collections;\nusing UnityEngine;\n\n/// <summary>\n/// Simple door:\n/// - Locked by default\n/// - KeypadPuzzleAutoSubmit calls Unlock()\n/// - Player can click to open (Interact)\n/// - 코루틴으로 부드럽게 회전하며 열림\n/// </summary>\npublic class Door : MonoBehaviour, IInteractable\n{\n    [Header(\"State\")]\n    [SerializeField] private bool isLocked = true;\n    [SerializeField] private bool openOnUnlock = false;\n\n    [Header(\"Open Rotation\")]\n    [SerializeField] private float openAngle = 90f;\n    [SerializeField] private float openDuration = 0.8f;\n\n    private bool _isOpen = false;\n    private bool _isOpening = false;\n\n    public void Unlock()\n    {\n        isLocked = false;\n        SoundManager.Instance?.PlayDoorUnlock();\n\n        if (openOnUnlock)\n            Open();\n    }\n\n    public void Interact(InteractorClick interactor)\n    {\n        TryOpen();\n    }\n\n    public void TryOpen()\n    {\n        if (_isOpen || _isOpening) return;\n\n        if (isLocked)\n        {\n            SoundManager.Instance?.PlayDoorLocked();\n            return;\n        }\n\n        Open();\n    }\n\n    public void Open()\n    {\n        if (_isOpen || _isOpening) return;\n\n        SoundManager.Instance?.PlayDoorOpen();\n        StartCoroutine(CoOpen());\n    }\n\n    private IEnumerator CoOpen()\n    {\n        _isOpening = true;\n\n        Quaternion startRot = transform.localRotation;\n        Quaternion endRot = startRot * Quaternion.Euler(0f, openAngle, 0f);\n\n        float elapsed = 0f;\n        while (elapsed < openDuration)\n        {\n            elapsed += Time.deltaTime;\n            float t = Mathf.SmoothStep(0f, 1f, elapsed / openDuration);\n            transform.localRotation = Quaternion.Lerp(startRot, endRot, t);\n            yield return null;\n        }\n\n        transform.localRotation = endRot;\n        _isOpen = true;\n        _isOpening = false;\n    }\n}\n","lines":80},{"id":"Scripts/Room1/KeypadPuzzleAutoSubmit.cs","name":"KeypadPuzzleAutoSubmit","path":"Scripts/Room1/KeypadPuzzleAutoSubmit.cs","layer":"Room1","scenes":["Room1"],"entry":true,"summary":"4-digit keypad puzzle: - Clicking digit buttons fills slots 1->4. - On the 4th digit, auto-validates (no Enter key). - Wrong attempts accumulate; on max fails, triggers DeathSequence. - No UI required; optional events for LED/text feedback.","src":"using UnityEngine;\nusing UnityEngine.Events;\n\n/// <summary>\n/// 4-digit keypad puzzle:\n/// - Clicking digit buttons fills slots 1->4.\n/// - On the 4th digit, auto-validates (no Enter key).\n/// - Wrong attempts accumulate; on max fails, triggers DeathSequence.\n/// - No UI required; optional events for LED/text feedback.\n/// </summary>\npublic class KeypadPuzzleAutoSubmit : MonoBehaviour\n{\n    [Header(\"Config\")]\n    [SerializeField] private string correctCode = \"1234\";\n    [SerializeField] private int codeLength = 4;\n    [SerializeField] private int maxFails = 3;\n\n    [Header(\"Wiring\")]\n    [SerializeField] private Door doorToUnlock;\n    [SerializeField] private DeathSequence deathSequence;\n\n    public UnityEvent<string> onBufferChanged;\n    public UnityEvent<int> onFailCountChanged;\n\n    private string _buffer = \"\";\n    private int _fails = 0;\n    private bool _lockedInput = false;\n    private bool _solved = false;\n\n    private void Awake()\n    {\n        if (correctCode == null) correctCode = \"\";\n        correctCode = correctCode.Trim();\n\n        EmitBuffer();\n        EmitFails();\n    }\n\n    public void PressDigit(int digit)\n    {\n        if (_lockedInput || _solved) return;\n        if (digit < 0 || digit > 9) return;\n        if (_buffer.Length >= codeLength) return;\n\n        _buffer += digit.ToString();\n        SoundManager.Instance?.PlayKeypadButton();\n\n        EmitBuffer();\n\n        if (_buffer.Length == codeLength)\n            ValidateAndProcess();\n    }\n\n    public void Clear()\n    {\n        if (_lockedInput || _solved) return;\n        _buffer = \"\";\n        EmitBuffer();\n    }\n\n    private void ValidateAndProcess()\n    {\n        _lockedInput = true;\n\n        bool success = (_buffer == correctCode);\n\n        if (success)\n        {\n            _solved = true;\n            SoundManager.Instance?.PlayKeypadSuccess();\n            if (doorToUnlock != null) doorToUnlock.Unlock();\n            Debug.Log(\"[Keypad] Solved. Door unlocked.\");\n            return;\n        }\n\n        _fails++;\n        EmitFails();\n        SoundManager.Instance?.PlayKeypadFail();\n\n        Debug.Log($\"[Keypad] Wrong code. Fails: {_fails}/{maxFails}\");\n\n        _buffer = \"\";\n        EmitBuffer();\n\n        if (_fails >= maxFails)\n        {\n            TriggerDeath();\n            return;\n        }\n\n        _lockedInput = false;\n    }\n\n    private void TriggerDeath()\n    {\n        _lockedInput = true;\n\n        if (deathSequence != null)\n            deathSequence.Play();\n        else\n            Debug.LogWarning(\"[Keypad] DeathSequence is not assigned.\");\n    }\n\n    private void EmitBuffer()\n    {\n        onBufferChanged?.Invoke(_buffer);\n    }\n\n    private void EmitFails()\n    {\n        onFailCountChanged?.Invoke(_fails);\n    }\n}\n","lines":114},{"id":"Scripts/SoundManager.cs","name":"SoundManager","path":"Scripts/SoundManager.cs","layer":"Core","scenes":["Room1","Room2"],"entry":true,"summary":"사운드 매니저 - 게임 전체 효과음 + BGM 중앙 관리 - DontDestroyOnLoad로 씬 전환해도 유지 - 싱글톤으로 어디서든 접근 가능 [설정 방법] 1. 빈 GameObject 생성 → 이름 SoundManager 2. 이 스크립트 부착 3. Inspector에서 각 클립 슬롯에 오디오 파일 드래그 4. 각 스크립트에서 SoundManager.Instance.Play~() 호출","src":"using UnityEngine;\n\n/// <summary>\n/// 사운드 매니저 - 게임 전체 효과음 + BGM 중앙 관리\n/// - DontDestroyOnLoad로 씬 전환해도 유지\n/// - 싱글톤으로 어디서든 접근 가능\n/// \n/// [설정 방법]\n/// 1. 빈 GameObject 생성 → 이름 SoundManager\n/// 2. 이 스크립트 부착\n/// 3. Inspector에서 각 클립 슬롯에 오디오 파일 드래그\n/// 4. 각 스크립트에서 SoundManager.Instance.Play~() 호출\n/// </summary>\npublic class SoundManager : MonoBehaviour\n{\n    public static SoundManager Instance { get; private set; }\n\n    [Header(\"BGM\")]\n    [SerializeField] private AudioClip bgmClip;                     // BGM 클립\n    [SerializeField, Range(0f, 1f)] private float bgmVolume = 0.5f; // BGM 볼륨\n    [SerializeField] private bool playBGMOnAwake = true;            // 시작 시 자동 재생\n\n    [Header(\"Hint Voice\")]\n    [SerializeField] private AudioClip hintClip;           // 힌트 음성 (단일 클립)\n    [SerializeField] private AudioClip hintSpawnSFX;       // 힌트 이미지 생성 SFX\n\n    [Header(\"Keypad\")]\n    [SerializeField] private AudioClip keypadButton;\n    [SerializeField] private AudioClip keypadSuccess;\n    [SerializeField] private AudioClip keypadFail;\n\n    [Header(\"Door\")]\n    [SerializeField] private AudioClip doorLocked;\n    [SerializeField] private AudioClip doorUnlock;\n    [SerializeField] private AudioClip doorOpen;\n\n    [Header(\"Volume\")]\n    [SerializeField, Range(0f, 1f)] private float masterVolume = 1f;\n\n    private AudioSource _sfxSource;\n    private AudioSource _bgmSource;\n    private AudioSource _hintSource;\n\n    private void Awake()\n    {\n        // 싱글톤 + DontDestroyOnLoad\n        if (Instance != null && Instance != this)\n        {\n            Destroy(gameObject);\n            return;\n        }\n        Instance = this;\n        DontDestroyOnLoad(gameObject);\n\n        // SFX용 AudioSource\n        _sfxSource = gameObject.AddComponent<AudioSource>();\n        _sfxSource.playOnAwake = false;\n\n        // 힌트 전용 AudioSource\n        _hintSource = gameObject.AddComponent<AudioSource>();\n        _hintSource.playOnAwake = false;\n\n        // BGM용 AudioSource\n        _bgmSource = gameObject.AddComponent<AudioSource>();\n        _bgmSource.playOnAwake = false;\n        _bgmSource.loop = true;\n        _bgmSource.volume = bgmVolume;\n\n        if (playBGMOnAwake)\n            PlayBGM();\n    }\n\n    // ── BGM ─────────────────────────────────\n    public void PlayBGM()\n    {\n        if (bgmClip == null) return;\n        if (_bgmSource.isPlaying) return;\n\n        _bgmSource.clip = bgmClip;\n        _bgmSource.Play();\n    }\n\n    public void StopBGM()\n    {\n        _bgmSource.Stop();\n    }\n\n    public void PauseBGM()\n    {\n        _bgmSource.Pause();\n    }\n\n    public void ResumeBGM()\n    {\n        _bgmSource.UnPause();\n    }\n\n    public void SetBGMVolume(float volume)\n    {\n        bgmVolume = Mathf.Clamp01(volume);\n        _bgmSource.volume = bgmVolume;\n    }\n\n    // ── Hint Voice ──────────────────────────\n    public void PlayAllHints()\n    {\n        if (hintClip == null) return;\n        _hintSource.clip = hintClip;\n        _hintSource.volume = masterVolume;\n        _hintSource.Play();\n    }\n    public void PlayHintSpawn() => PlaySFX(hintSpawnSFX);\n\n    // ── Keypad ──────────────────────────────\n    public void PlayKeypadButton()  => PlaySFX(keypadButton);\n    public void PlayKeypadSuccess() => PlaySFX(keypadSuccess);\n    public void PlayKeypadFail()    => PlaySFX(keypadFail);\n\n    // ── Door ────────────────────────────────\n    public void PlayDoorLocked()    => PlaySFX(doorLocked);\n    public void PlayDoorUnlock()    => PlaySFX(doorUnlock);\n    public void PlayDoorOpen()      => PlaySFX(doorOpen);\n\n    // ── 제어 ────────────────────────────────\n    public void StopSFX()\n    {\n        _sfxSource.Stop();\n        _hintSource.Stop();\n    }\n\n    // ── 공통 재생 ────────────────────────────\n    private void PlaySFX(AudioClip clip)\n    {\n        if (clip == null) return;\n        _sfxSource.PlayOneShot(clip, masterVolume);\n    }\n}\n","lines":138},{"id":"Scripts/InteractorClick.cs","name":"InteractorClick","path":"Scripts/InteractorClick.cs","layer":"Core","scenes":["Room1","Room2"],"entry":true,"summary":"Click-to-interact raycaster. Attach to the Player (or camera rig). Ray is cast from the mouse position on screen, so it works regardless of camera forward.","src":"using UnityEngine;\n\n/// <summary>\n/// Click-to-interact raycaster. Attach to the Player (or camera rig).\n/// Ray is cast from the mouse position on screen, so it works regardless of camera forward.\n/// </summary>\npublic class InteractorClick : MonoBehaviour\n{\n    [Header(\"Raycast\")]\n    [SerializeField] private Camera playerCamera;\n    [SerializeField] private float interactDistance = 10.0f;\n    [SerializeField] private LayerMask interactMask = ~0;\n\n    [Header(\"Input\")]\n    [SerializeField] private int mouseButton = 0; // 0 = Left Click\n\n    [Header(\"Debug (Optional)\")]\n    [SerializeField] private bool logHits = false;\n\n    private void Reset()\n    {\n        if (playerCamera == null) playerCamera = Camera.main;\n    }\n\n    private void Update()\n    {\n        if (Input.GetMouseButtonDown(mouseButton))\n            TryInteract();\n    }\n\n    public void TryInteract()\n    {\n        if (playerCamera == null)\n        {\n            Debug.LogWarning(\"[InteractorClick] playerCamera is not assigned.\");\n            return;\n        }\n\n        // Cast from mouse cursor position (screen space) -> world ray\n        Ray ray = playerCamera.ScreenPointToRay(Input.mousePosition);\n\n        if (Physics.Raycast(ray, out RaycastHit hit, interactDistance, interactMask, QueryTriggerInteraction.Ignore))\n        {\n            if (logHits) Debug.Log($\"[InteractorClick] Hit: {hit.collider.name}\");\n\n            // Prefer component on the collider object\n            if (hit.collider.TryGetComponent<IInteractable>(out var interactable))\n            {\n                interactable.Interact(this);\n                return;\n            }\n\n            // Fallback: check parents\n            var parentInteractable = hit.collider.GetComponentInParent<IInteractable>();\n            parentInteractable?.Interact(this);\n        }\n        else\n        {\n            if (logHits) Debug.Log(\"[InteractorClick] Hit: nothing\");\n        }\n    }\n}\n","lines":63},{"id":"Scripts/CameraBob.cs","name":"CameraBob","path":"Scripts/CameraBob.cs","layer":"Core","scenes":["Room1","Room2"],"entry":true,"summary":"플레이어 이동 시 카메라 흔들림 (Head Bob) + 발걸음 소리 [설정 방법] 1. Main Camera 오브젝트에 이 스크립트 부착 2. Footstep Clips 에 발걸음 클립 추가 (여러 개 등록 시 랜덤 재생) 3. 인스펙터에서 수치 조정","src":"using UnityEngine;\n\n/// <summary>\n/// 플레이어 이동 시 카메라 흔들림 (Head Bob) + 발걸음 소리\n/// \n/// [설정 방법]\n/// 1. Main Camera 오브젝트에 이 스크립트 부착\n/// 2. Footstep Clips 에 발걸음 클립 추가 (여러 개 등록 시 랜덤 재생)\n/// 3. 인스펙터에서 수치 조정\n/// </summary>\npublic class CameraBob : MonoBehaviour\n{\n    [Header(\"Bob Settings\")]\n    [SerializeField] private float bobFrequency = 2.0f;\n    [SerializeField] private float bobAmplitudeX = 0.03f;\n    [SerializeField] private float bobAmplitudeY = 0.06f;\n    [SerializeField] private float bobSmoothing = 10f;\n\n    [Header(\"Footstep\")]\n    [SerializeField] private AudioClip[] footstepClips;     // 발걸음 클립 (여러 개 등록 시 랜덤)\n    [SerializeField] private float footstepVolume = 0.5f;\n    [SerializeField] private float footstepInterval = 0.4f; // 발소리 재생 간격 (초)\n\n    [Header(\"References\")]\n    [SerializeField] private CharacterController characterController;\n\n    private Vector3 _defaultLocalPos;\n    private float _bobTimer = 0f;\n    private AudioSource _audioSource;\n\n    private float _footstepTimer = 0f;\n\n    private void Awake()\n    {\n        _defaultLocalPos = transform.localPosition;\n\n        if (characterController == null)\n            characterController = GetComponentInParent<CharacterController>();\n\n        _audioSource = gameObject.AddComponent<AudioSource>();\n        _audioSource.playOnAwake = false;\n        _audioSource.spatialBlend = 0f; // 2D 사운드\n    }\n\n    private void Update()\n    {\n        HandleBob();\n    }\n\n    private void HandleBob()\n    {\n        Vector3 velocity = characterController != null ? characterController.velocity : Vector3.zero;\n        float speed = new Vector3(velocity.x, 0f, velocity.z).magnitude;\n\n        if (speed > 0.1f)\n        {\n            _bobTimer += Time.deltaTime * bobFrequency * (speed / 3f);\n\n            float sinValue = Mathf.Sin(_bobTimer);\n\n            Vector3 targetPos = new Vector3(\n                sinValue * bobAmplitudeX,\n                _defaultLocalPos.y + Mathf.Abs(sinValue) * bobAmplitudeY,\n                _defaultLocalPos.z\n            );\n\n            transform.localPosition = Vector3.Lerp(\n                transform.localPosition,\n                targetPos,\n                Time.deltaTime * bobSmoothing\n            );\n\n            // 시간 간격으로 발소리 재생\n            _footstepTimer -= Time.deltaTime;\n            if (_footstepTimer <= 0f)\n            {\n                PlayFootstep();\n                _footstepTimer = footstepInterval;\n            }\n        }\n        else\n        {\n            _bobTimer = 0f;\n            _footstepTimer = 0f;\n            transform.localPosition = Vector3.Lerp(\n                transform.localPosition,\n                _defaultLocalPos,\n                Time.deltaTime * bobSmoothing\n            );\n        }\n    }\n\n    private void PlayFootstep()\n    {\n        if (footstepClips == null || footstepClips.Length == 0) return;\n\n        // 랜덤 클립 선택\n        AudioClip clip = footstepClips[Random.Range(0, footstepClips.Length)];\n        if (clip != null)\n            _audioSource.PlayOneShot(clip, footstepVolume);\n    }\n}\n","lines":103},{"id":"Scripts/Room2/NPCSpawner.cs","name":"NPCSpawner","path":"Scripts/Room2/NPCSpawner.cs","layer":"Room2","scenes":["Room2"],"entry":true,"summary":"3개 홀웨이에서 NPC 랜덤 스폰 - 각 홀웨이당 최대 3마리 (총 최대 9마리) - 120초 동안 생존하면 성공","src":"using System.Collections;\nusing System.Collections.Generic;\nusing UnityEngine;\n\n/// <summary>\n/// 3개 홀웨이에서 NPC 랜덤 스폰\n/// - 각 홀웨이당 최대 3마리 (총 최대 9마리)\n/// - 120초 동안 생존하면 성공\n/// </summary>\npublic class NPCSpawner : MonoBehaviour\n{\n    [System.Serializable]\n    public class Hallway\n    {\n        public Transform spawnPoint;    // 홀웨이 끝 스폰 위치\n        public Transform waypoint;      // 홀웨이 입구 웨이포인트\n    }\n\n    [Header(\"Hallways\")]\n    [SerializeField] private Hallway[] hallways;          // 홀웨이 3개\n\n    [Header(\"NPC Settings\")]\n    [SerializeField] private GameObject npcPrefab;          // NPC 프리팹\n    [SerializeField] private int maxPerHallway = 3;        // 홀웨이당 최대 NPC 수\n    [SerializeField] private float spawnInterval = 5f;      // 스폰 간격 (초)\n    [SerializeField] private float npcMoveSpeed = 2f;       // NPC 이동 속도\n\n    [Header(\"Timer\")]\n    [SerializeField] private float survivalTime = 120f;     // 생존 목표 시간\n\n    [Header(\"Wiring\")]\n    [SerializeField] private Transform player;\n    [SerializeField] private DeathSequence deathSequence;\n    [SerializeField] private Door doorToUnlock;\n    [SerializeField] private GameObject[] wallsToHide; // 이벤트 시작 시 숨길 벽들\n\n    private bool _active = false;\n    private bool _finished = false;\n\n    // 홀웨이별 현재 NPC 수 추적\n    private List<NPCMover>[] _hallwayNPCs;\n\n    public void StartSpawner()\n    {\n        if (_active || _finished) return;\n\n        _hallwayNPCs = new List<NPCMover>[hallways.Length];\n        for (int i = 0; i < hallways.Length; i++)\n            _hallwayNPCs[i] = new List<NPCMover>();\n\n        _active = true;\n        StartCoroutine(CoSpawnLoop());\n        StartCoroutine(CoSurvivalTimer());\n\n        Debug.Log(\"[NPCSpawner] 시작! 생존 목표: \" + survivalTime + \"초\");\n    }\n\n    private IEnumerator CoSurvivalTimer()\n    {\n        yield return new WaitForSeconds(survivalTime);\n\n        if (!_finished)\n        {\n            _finished = true;\n            _active = false;\n            OnSuccess();\n        }\n    }\n\n    private IEnumerator CoSpawnLoop()\n    {\n        while (_active)\n        {\n            yield return new WaitForSeconds(spawnInterval);\n            if (!_active) yield break;\n\n            TrySpawnNPC();\n        }\n    }\n\n    [Header(\"Hit Detection\")]\n    [SerializeField] private float detectionAngle = 15f;\n\n    public void TryShoot()\n    {\n        if (!_active) return;\n\n        Camera cam = Camera.main;\n        if (cam == null) return;\n\n        NPCMover hitNPC = null;\n        float bestAngle = detectionAngle;\n\n        foreach (var list in _hallwayNPCs)\n        {\n            foreach (var npc in list)\n            {\n                if (npc == null || npc.IsDead) continue;\n                Vector3 npcCenter = npc.transform.position + Vector3.up * 1.0f;\n                Vector3 dir = (npcCenter - cam.transform.position).normalized;\n                float angle = Vector3.Angle(cam.transform.forward, dir);\n                if (angle < bestAngle)\n                {\n                    bestAngle = angle;\n                    hitNPC = npc;\n                }\n            }\n        }\n\n        if (hitNPC != null)\n        {\n            hitNPC.Die();\n            Debug.Log(\"[NPCSpawner] NPC 적중!\");\n        }\n        else\n        {\n            Debug.Log(\"[NPCSpawner] 빗나감\");\n        }\n    }\n\n    private void TrySpawnNPC()\n    {\n        // 스폰 가능한 홀웨이 목록 추출 (최대 수 미달인 홀웨이)\n        List<int> available = new List<int>();\n        for (int i = 0; i < hallways.Length; i++)\n        {\n            // 죽은 NPC 정리\n            _hallwayNPCs[i].RemoveAll(n => n == null);\n\n            if (_hallwayNPCs[i].Count < maxPerHallway)\n                available.Add(i);\n        }\n\n        if (available.Count == 0)\n        {\n            Debug.Log(\"[NPCSpawner] 모든 홀웨이 최대치 도달\");\n            return;\n        }\n\n        // 랜덤 홀웨이 선택\n        int idx = available[Random.Range(0, available.Count)];\n        SpawnInHallway(idx);\n    }\n\n    private void SpawnInHallway(int hallwayIndex)\n    {\n        Hallway hallway = hallways[hallwayIndex];\n        if (hallway.spawnPoint == null || npcPrefab == null) return;\n\n        GameObject npcObj = Instantiate(npcPrefab, hallway.spawnPoint.position, hallway.spawnPoint.rotation);\n        NPCMover mover = npcObj.GetComponent<NPCMover>();\n\n        if (mover == null)\n        {\n            Debug.LogWarning(\"[NPCSpawner] NPC 프리팹에 NPCMover 컴포넌트가 없어요!\");\n            Destroy(npcObj);\n            return;\n        }\n\n        mover.Init(hallway.waypoint, player, deathSequence, npcMoveSpeed);\n        _hallwayNPCs[hallwayIndex].Add(mover);\n\n        Debug.Log($\"[NPCSpawner] 홀웨이 {hallwayIndex}에 NPC 스폰 (현재 {_hallwayNPCs[hallwayIndex].Count}마리)\");\n    }\n\n    private void OnSuccess()\n    {\n        // 모든 NPC 제거\n        foreach (var list in _hallwayNPCs)\n            foreach (var npc in list)\n                if (npc != null) npc.Die();\n\n        // 문 열기\n        if (doorToUnlock != null) doorToUnlock.Unlock();\n\n        // 벽 비활성화\n        foreach (var wall in wallsToHide)\n            if (wall != null) wall.SetActive(false);\n\n        Debug.Log(\"[NPCSpawner] 생존 성공! 문 열림\");\n    }\n}\n","lines":183},{"id":"Scripts/PlayerItemHolder.cs","name":"PlayerItemHolder","path":"Scripts/PlayerItemHolder.cs","layer":"Core","scenes":["Room2"],"entry":true,"summary":"플레이어 아이템 홀더 - 아이템을 1개만 소지 가능 - 카메라 집을 때 NPCSpawner 이벤트 시작 [설정 방법] 1. Player 오브젝트에 부착 2. HoldAnchor: Main Camera 자식으로 빈 GameObject 생성 후 연결 3. NpcSpawner: NPCSpawner 오브젝트 연결","src":"using UnityEngine;\n\n/// <summary>\n/// 플레이어 아이템 홀더\n/// - 아이템을 1개만 소지 가능\n/// - 카메라 집을 때 NPCSpawner 이벤트 시작\n///\n/// [설정 방법]\n/// 1. Player 오브젝트에 부착\n/// 2. HoldAnchor: Main Camera 자식으로 빈 GameObject 생성 후 연결\n/// 3. NpcSpawner: NPCSpawner 오브젝트 연결\n/// </summary>\npublic class PlayerItemHolder : MonoBehaviour\n{\n    [Header(\"Hold Anchor\")]\n    [SerializeField] private Transform holdAnchor;\n\n    [Header(\"Camera Event\")]\n    [SerializeField] private NPCSpawner npcSpawner;\n    [SerializeField] private CameraFlashEffect flashEffect;\n    [SerializeField] private string cameraItemName = \"Camera\";\n\n    private PickupItem _heldItem = null;\n\n    public bool IsHoldingItem => _heldItem != null;\n    public PickupItem HeldItem => _heldItem;\n\n    private void Awake()\n    {\n        if (holdAnchor == null && Camera.main != null)\n            holdAnchor = Camera.main.transform;\n    }\n\n    private void Update()\n    {\n        if (Input.GetMouseButtonDown(1) && IsHoldingCamera())\n        {\n            if (flashEffect != null) flashEffect.Flash();\n            if (npcSpawner != null) npcSpawner.TryShoot();\n        }\n    }\n\n    public void TryPickup(PickupItem item)\n    {\n        if (_heldItem != null)\n            _heldItem.Drop();\n\n        _heldItem = item;\n        item.PickUp(holdAnchor);\n\n        if (IsHoldingCamera())\n        {\n            if (npcSpawner != null) npcSpawner.StartSpawner();\n        }\n    }\n\n    public void DropCurrent()\n    {\n        if (_heldItem == null) return;\n        _heldItem.Drop();\n        _heldItem = null;\n    }\n\n    public void DropAndDestroyItem()\n    {\n        if (_heldItem == null) return;\n        Destroy(_heldItem.gameObject);\n        _heldItem = null;\n    }\n\n    private bool IsHoldingCamera()\n    {\n        return _heldItem != null && _heldItem.ItemName == cameraItemName;\n    }\n}\n","lines":76},{"id":"Scripts/Room2/CameraFlashEffect.cs","name":"CameraFlashEffect","path":"Scripts/Room2/CameraFlashEffect.cs","layer":"Room2","scenes":["Room2"],"entry":true,"summary":"카메라 셔터 플래시 효과 - 화면 전체 하얀 플래시 (UI) - 포인트 라이트 순간 점등 [설정 방법] 1. 빈 GameObject 생성 → 이 스크립트 부착 2. Canvas 안에 전체화면 흰색 Image 생성 → FlashImage 슬롯에 연결 3. 빈 GameObject에 Point Light 추가 → FlashLight 슬롯에 연결 4. CameraShutterPuzzle에서 TryShoot() 성공/시도 시 Flash","src":"using System.Collections;\nusing UnityEngine;\nusing UnityEngine.UI;\n\n/// <summary>\n/// 카메라 셔터 플래시 효과\n/// - 화면 전체 하얀 플래시 (UI)\n/// - 포인트 라이트 순간 점등\n/// \n/// [설정 방법]\n/// 1. 빈 GameObject 생성 → 이 스크립트 부착\n/// 2. Canvas 안에 전체화면 흰색 Image 생성 → FlashImage 슬롯에 연결\n/// 3. 빈 GameObject에 Point Light 추가 → FlashLight 슬롯에 연결\n/// 4. CameraShutterPuzzle에서 TryShoot() 성공/시도 시 Flash() 호출\n/// </summary>\npublic class CameraFlashEffect : MonoBehaviour\n{\n    [Header(\"Screen Flash\")]\n    [SerializeField] private Image flashImage;              // 전체화면 흰색 UI Image\n    [SerializeField] private float flashInDuration = 0.05f; // 번쩍이는 속도\n    [SerializeField] private float flashOutDuration = 0.2f; // 사라지는 속도\n    [SerializeField] private float flashMaxAlpha = 0.95f;   // 최대 밝기\n\n    [Header(\"Point Light Flash\")]\n    [SerializeField] private Light flashLight;              // Point Light\n    [SerializeField] private float lightIntensity = 8f;     // 빛 강도\n    [SerializeField] private float lightRange = 6f;         // 빛 범위\n    [SerializeField] private float lightDuration = 0.15f;   // 빛 지속 시간\n\n    [Header(\"SFX\")]\n    [SerializeField] private AudioClip shutterClip;\n\n    private AudioSource _sfx;\n    private Coroutine _flashRoutine;\n\n    private void Awake()\n    {\n        _sfx = gameObject.AddComponent<AudioSource>();\n        _sfx.playOnAwake = false;\n\n        // 시작 시 플래시 이미지 투명하게\n        if (flashImage != null)\n        {\n            flashImage.color = new Color(1f, 1f, 1f, 0f);\n            flashImage.raycastTarget = false;\n        }\n\n        // 라이트 끄기\n        if (flashLight != null)\n            flashLight.enabled = false;\n    }\n\n    /// <summary>\n    /// 외부에서 호출 - 셔터 플래시 발동\n    /// </summary>\n    public void Flash()\n    {\n        if (_flashRoutine != null)\n            StopCoroutine(_flashRoutine);\n\n        _flashRoutine = StartCoroutine(CoFlash());\n    }\n\n    private IEnumerator CoFlash()\n    {\n        // 셔터 소리 재생\n        if (shutterClip != null) _sfx.PlayOneShot(shutterClip);\n\n        // 라이트 + 화면 플래시 동시 시작\n        StartCoroutine(CoLightFlash());\n        yield return StartCoroutine(CoScreenFlash());\n    }\n\n    private IEnumerator CoScreenFlash()\n    {\n        if (flashImage == null) yield break;\n\n        // 빠르게 하얗게\n        float t = 0f;\n        while (t < flashInDuration)\n        {\n            t += Time.deltaTime;\n            float alpha = Mathf.Lerp(0f, flashMaxAlpha, t / flashInDuration);\n            flashImage.color = new Color(1f, 1f, 1f, alpha);\n            yield return null;\n        }\n\n        flashImage.color = new Color(1f, 1f, 1f, flashMaxAlpha);\n\n        // 천천히 사라짐\n        t = 0f;\n        while (t < flashOutDuration)\n        {\n            t += Time.deltaTime;\n            float alpha = Mathf.Lerp(flashMaxAlpha, 0f, t / flashOutDuration);\n            flashImage.color = new Color(1f, 1f, 1f, alpha);\n            yield return null;\n        }\n\n        flashImage.color = new Color(1f, 1f, 1f, 0f);\n    }\n\n    private IEnumerator CoLightFlash()\n    {\n        if (flashLight == null) yield break;\n\n        flashLight.enabled = true;\n        flashLight.intensity = lightIntensity;\n        flashLight.range = lightRange;\n        flashLight.color = Color.white;\n\n        // 빛 페이드 아웃\n        float t = 0f;\n        while (t < lightDuration)\n        {\n            t += Time.deltaTime;\n            flashLight.intensity = Mathf.Lerp(lightIntensity, 0f, t / lightDuration);\n            yield return null;\n        }\n\n        flashLight.enabled = false;\n    }\n}\n","lines":124},{"id":"Scripts/PickupItem.cs","name":"PickupItem","path":"Scripts/PickupItem.cs","layer":"Core","scenes":["Room2"],"entry":true,"summary":"집을 수 있는 아이템 - 좌클릭으로 집기 - 카메라 앞에 고정 - 다시 클릭하면 내려놓기 [설정 방법] 1. 아이템 오브젝트에 이 스크립트 + Collider 부착 2. PlayerItemHolder.cs가 Player에 붙어있어야 함","src":"using UnityEngine;\n\n/// <summary>\n/// 집을 수 있는 아이템\n/// - 좌클릭으로 집기\n/// - 카메라 앞에 고정\n/// - 다시 클릭하면 내려놓기\n/// \n/// [설정 방법]\n/// 1. 아이템 오브젝트에 이 스크립트 + Collider 부착\n/// 2. PlayerItemHolder.cs가 Player에 붙어있어야 함\n/// </summary>\npublic class PickupItem : MonoBehaviour, IInteractable\n{\n    [Header(\"Hold Settings\")]\n    [SerializeField] private Vector3 holdLocalPosition = new Vector3(0.3f, -0.3f, 0.6f);   // 카메라 기준 위치\n    [SerializeField] private Vector3 holdLocalRotation = new Vector3(0f, 0f, 0f);           // 들었을 때 회전\n\n    [Header(\"Item Info\")]\n    [SerializeField] private string itemName = \"Camera\";\n\n    private Transform _originalParent;\n    private Vector3 _originalPosition;\n    private Quaternion _originalRotation;\n    private bool _isHeld = false;\n    private Collider _collider;\n\n    public bool IsHeld => _isHeld;\n    public string ItemName => itemName;\n\n    private void Awake()\n    {\n        _collider = GetComponent<Collider>();\n        _originalParent = transform.parent;\n        _originalPosition = transform.position;\n        _originalRotation = transform.rotation;\n    }\n\n    public void Interact(InteractorClick interactor)\n    {\n        if (_isHeld)\n        {\n            Drop();\n        }\n        else\n        {\n            // PlayerItemHolder에 집기 요청\n            var holder = interactor.GetComponent<PlayerItemHolder>();\n            if (holder == null)\n                holder = interactor.GetComponentInParent<PlayerItemHolder>();\n\n            if (holder != null)\n                holder.TryPickup(this);\n        }\n    }\n\n    /// <summary>\n    /// PlayerItemHolder에서 호출 - 카메라 앞에 붙이기\n    /// </summary>\n    public void PickUp(Transform holdAnchor)\n    {\n        _isHeld = true;\n\n        transform.SetParent(holdAnchor);\n        transform.localPosition = holdLocalPosition;\n        transform.localRotation = Quaternion.Euler(holdLocalRotation);\n\n        // 들고 있는 동안 콜라이더 끄기 (Raycast 방해 방지)\n        if (_collider != null) _collider.enabled = false;\n\n        Debug.Log($\"[PickupItem] {itemName} 집음\");\n    }\n\n    /// <summary>\n    /// 내려놓기 - 원래 위치로 복귀\n    /// </summary>\n    public void Drop()\n    {\n        _isHeld = false;\n\n        transform.SetParent(_originalParent);\n        transform.position = _originalPosition;\n        transform.rotation = _originalRotation;\n\n        if (_collider != null) _collider.enabled = true;\n\n        Debug.Log($\"[PickupItem] {itemName} 내려놓음\");\n    }\n}\n","lines":90},{"id":"Scripts/Room2/NPCMover.cs","name":"NPCMover","path":"Scripts/Room2/NPCMover.cs","layer":"Room2","scenes":["Room2"],"entry":true,"summary":"스폰 SFX 재생 (루프)","src":"using System.Collections;\nusing UnityEngine;\n\npublic class NPCMover : MonoBehaviour\n{\n    [Header(\"Movement\")]\n    [SerializeField] private float moveSpeed = 2f;\n    [SerializeField] private float waypointReachDistance = 0.3f;\n    [SerializeField] private float playerTouchDistance = 0.8f;\n\n    [Header(\"Wiring\")]\n    [SerializeField] private DeathSequence deathSequence;\n\n    [Header(\"SFX\")]\n    [SerializeField] private AudioClip spawnSFX;  // 스폰 시 재생할 SFX\n\n    private Transform _waypoint;\n    private Transform _player;\n    private bool _reachedWaypoint = false;\n    private bool _active = false;\n    private bool _isDead = false;\n    private Animation _anim;\n    private AudioSource _audioSource;  // 셔터에 맞아 사망 중인지\n\n    public bool IsDead => _isDead;\n\n    public void Init(Transform waypoint, Transform player, DeathSequence death, float speed = 2f)\n    {\n        _waypoint = waypoint;\n        _player = player;\n        deathSequence = death;\n        moveSpeed = speed;\n        _active = true;\n\n        _anim = GetComponentInChildren<Animation>();\n        PlayAnim(\"Run\");\n\n        // 스폰 SFX 재생 (루프)\n        _audioSource = gameObject.AddComponent<AudioSource>();\n        _audioSource.spatialBlend = 1f;\n        _audioSource.rolloffMode = AudioRolloffMode.Linear;\n        _audioSource.minDistance = 1f;\n        _audioSource.maxDistance = 15f;\n        _audioSource.loop = true;\n        _audioSource.playOnAwake = false;\n        if (spawnSFX != null)\n        {\n            _audioSource.clip = spawnSFX;\n            _audioSource.Play();\n        }\n    }\n\n    private void Update()\n    {\n        if (!_active || _player == null) return;\n\n        // 플레이어 접촉 체크\n        float distToPlayer = Vector3.Distance(transform.position, _player.position);\n        if (distToPlayer <= playerTouchDistance)\n        {\n            TriggerDeath();\n            return;\n        }\n\n        if (!_reachedWaypoint && _waypoint != null)\n        {\n            MoveToward(_waypoint.position);\n            if (Vector3.Distance(transform.position, _waypoint.position) <= waypointReachDistance)\n                _reachedWaypoint = true;\n        }\n        else\n        {\n            MoveToward(_player.position);\n        }\n    }\n\n    private void MoveToward(Vector3 target)\n    {\n        Vector3 flatTarget = new Vector3(target.x, transform.position.y, target.z);\n        Vector3 dir = (flatTarget - transform.position).normalized;\n        transform.position += dir * moveSpeed * Time.deltaTime;\n\n        if (dir != Vector3.zero)\n        {\n            Quaternion targetRot = Quaternion.LookRotation(dir);\n            transform.rotation = Quaternion.Slerp(transform.rotation, targetRot, Time.deltaTime * 10f);\n        }\n    }\n\n    private void TriggerDeath()\n    {\n        _active = false;\n        if (_audioSource != null) _audioSource.Stop();\n        PlayAnim(\"Attack2\");\n        if (deathSequence != null)\n            deathSequence.Play();\n        else\n            Debug.LogWarning(\"[NPCMover] DeathSequence 미연결!\");\n    }\n\n    public void Die()\n    {\n        _isDead = true;\n        _active = false;\n        if (_audioSource != null) _audioSource.Stop();\n        PlayAnim(\"Death\");\n        StartCoroutine(CoFadeOut());\n    }\n\n    private void PlayAnim(string clipName)\n    {\n        if (_anim == null) return;\n        if (_anim[clipName] != null)\n            _anim.Play(clipName);\n    }\n\n    private IEnumerator CoFadeOut()\n    {\n        float duration = 0.5f;\n        float elapsed = 0f;\n\n        Renderer[] renderers = GetComponentsInChildren<Renderer>();\n\n        // URP 머티리얼 투명도 활성화\n        foreach (var r in renderers)\n        {\n            foreach (var mat in r.materials)\n            {\n                mat.SetFloat(\"_Surface\", 1f);\n                mat.SetFloat(\"_Blend\", 0f);\n                mat.SetOverrideTag(\"RenderType\", \"Transparent\");\n                mat.renderQueue = 3000;\n                mat.EnableKeyword(\"_SURFACE_TYPE_TRANSPARENT\");\n            }\n        }\n\n        while (elapsed < duration)\n        {\n            elapsed += Time.deltaTime;\n            float alpha = Mathf.Lerp(1f, 0f, elapsed / duration);\n\n            foreach (var r in renderers)\n                foreach (var mat in r.materials)\n                {\n                    // URP BaseColor와 기본 color 둘 다 설정\n                    Color c = mat.HasProperty(\"_BaseColor\") \n                        ? mat.GetColor(\"_BaseColor\") \n                        : mat.color;\n                    c.a = alpha;\n                    if (mat.HasProperty(\"_BaseColor\")) mat.SetColor(\"_BaseColor\", c);\n                    mat.color = c;\n                }\n\n            yield return null;\n        }\n\n        Destroy(gameObject);\n    }\n}\n","lines":160},{"id":"Scripts/IInteractable.cs","name":"IInteractable","path":"Scripts/IInteractable.cs","layer":"Core","scenes":["Room1","Room2"],"entry":false,"summary":"Simple interactable contract for click-based raycast interaction. Keep this minimal for project scope.","src":"using UnityEngine;\n\n/// <summary>\n/// Simple interactable contract for click-based raycast interaction.\n/// Keep this minimal for project scope.\n/// </summary>\npublic interface IInteractable\n{\n    /// <summary>\n    /// Called when the player interacts with this object (mouse click raycast hit).\n    /// </summary>\n    void Interact(InteractorClick interactor);\n}\n","lines":14},{"id":"Keypad/Scripts/Keypad.cs","name":"Keypad","path":"Keypad/Scripts/Keypad.cs","layer":"Keypad","scenes":["Room1","Room2"],"entry":false,"summary":"Gets value from pressedbutton","src":"using System;\r\nusing System.Collections;\r\nusing TMPro;\r\nusing UnityEngine;\r\nusing UnityEngine.Events;\r\n\r\nnamespace NavKeypad\r\n{\r\n    public class Keypad : MonoBehaviour\r\n    {\r\n        [Header(\"Events\")]\r\n        [SerializeField] private UnityEvent onAccessGranted;\r\n        [SerializeField] private UnityEvent onAccessDenied;\r\n        [Header(\"Combination Code (9 Numbers Max)\")]\r\n        [SerializeField] private int keypadCombo = 12345;\r\n\r\n        public UnityEvent OnAccessGranted => onAccessGranted;\r\n        public UnityEvent OnAccessDenied => onAccessDenied;\r\n\r\n        [Header(\"Settings\")]\r\n        [SerializeField] private string accessGrantedText = \"Granted\";\r\n        [SerializeField] private string accessDeniedText = \"Denied\";\r\n\r\n        [Header(\"Visuals\")]\r\n        [SerializeField] private float displayResultTime = 1f;\r\n        [Range(0, 5)]\r\n        [SerializeField] private float screenIntensity = 2.5f;\r\n        [Header(\"Colors\")]\r\n        [SerializeField] private Color screenNormalColor = new Color(0.98f, 0.50f, 0.032f, 1f); //orangy\r\n        [SerializeField] private Color screenDeniedColor = new Color(1f, 0f, 0f, 1f); //red\r\n        [SerializeField] private Color screenGrantedColor = new Color(0f, 0.62f, 0.07f); //greenish\r\n        [Header(\"SoundFx\")]\r\n        [SerializeField] private AudioClip buttonClickedSfx;\r\n        [SerializeField] private AudioClip accessDeniedSfx;\r\n        [SerializeField] private AudioClip accessGrantedSfx;\r\n        [Header(\"Component References\")]\r\n        [SerializeField] private Renderer panelMesh;\r\n        [SerializeField] private TMP_Text keypadDisplayText;\r\n        [SerializeField] private AudioSource audioSource;\r\n\r\n\r\n        private string currentInput;\r\n        private bool displayingResult = false;\r\n        private bool accessWasGranted = false;\r\n\r\n        private void Awake()\r\n        {\r\n            ClearInput();\r\n            panelMesh.material.SetVector(\"_EmissionColor\", screenNormalColor * screenIntensity);\r\n        }\r\n\r\n\r\n        //Gets value from pressedbutton\r\n        public void AddInput(string input)\r\n        {\r\n            audioSource.PlayOneShot(buttonClickedSfx);\r\n            if (displayingResult || accessWasGranted) return;\r\n            switch (input)\r\n            {\r\n                case \"enter\":\r\n                    CheckCombo();\r\n                    break;\r\n                default:\r\n                    if (currentInput != null && currentInput.Length == 9) // 9 max passcode size \r\n                    {\r\n                        return;\r\n                    }\r\n                    currentInput += input;\r\n                    keypadDisplayText.text = currentInput;\r\n                    break;\r\n            }\r\n\r\n        }\r\n        public void CheckCombo()\r\n        {\r\n            if (int.TryParse(currentInput, out var currentKombo))\r\n            {\r\n                bool granted = currentKombo == keypadCombo;\r\n                if (!displayingResult)\r\n                {\r\n                    StartCoroutine(DisplayResultRoutine(granted));\r\n                }\r\n            }\r\n            else\r\n            {\r\n                Debug.LogWarning(\"Couldn't process input for some reason..\");\r\n            }\r\n\r\n        }\r\n\r\n        //mainly for animations \r\n        private IEnumerator DisplayResultRoutine(bool granted)\r\n        {\r\n            displayingResult = true;\r\n\r\n            if (granted) AccessGranted();\r\n            else AccessDenied();\r\n\r\n            yield return new WaitForSeconds(displayResultTime);\r\n            displayingResult = false;\r\n            if (granted) yield break;\r\n            ClearInput();\r\n            panelMesh.material.SetVector(\"_EmissionColor\", screenNormalColor * screenIntensity);\r\n\r\n        }\r\n\r\n        private void AccessDenied()\r\n        {\r\n            keypadDisplayText.text = accessDeniedText;\r\n            onAccessDenied?.Invoke();\r\n            panelMesh.material.SetVector(\"_EmissionColor\", screenDeniedColor * screenIntensity);\r\n            audioSource.PlayOneShot(accessDeniedSfx);\r\n        }\r\n\r\n        private void ClearInput()\r\n        {\r\n            currentInput = \"\";\r\n            keypadDisplayText.text = currentInput;\r\n        }\r\n\r\n        private void AccessGranted()\r\n        {\r\n            accessWasGranted = true;\r\n            keypadDisplayText.text = accessGrantedText;\r\n            onAccessGranted?.Invoke();\r\n            panelMesh.material.SetVector(\"_EmissionColor\", screenGrantedColor * screenIntensity);\r\n            audioSource.PlayOneShot(accessGrantedSfx);\r\n        }\r\n\r\n    }\r\n}", (function(){
  const D=DATA, N=D.nodes, C=D.colors, M=D.meta; var _t=document.getElementById('ttl'); if(_t) _t.innerHTML=M.title;
  const byId={}; N.forEach(n=>byId[n.id]=n);
  const outAdj={}, inAdj={}; N.forEach(n=>{outAdj[n.id]=[];inAdj[n.id]=[];});
  D.edges.forEach(e=>{ if(byId[e.source]&&byId[e.target]){ outAdj[e.source].push(e.target); inAdj[e.target].push(e.source);} });

  document.getElementById('chips').innerHTML =
    `<div class="chip">라이브 <b>${M.live}</b></div><div class="chip">레이어 <b>${Object.keys(M.perLayer).length}</b></div><div class="chip">의존 <b>${M.edges}</b></div><div class="chip">죽은코드 <b>${M.dead}</b> 제외</div>`;

  const state={ scene:null, q:'' };
  // scene flow tabs
  const flow=document.getElementById('flow'); const order=M.scenes||[];
  const mk=(label,val)=>{ const s=document.createElement('div'); s.className='s'+(val===state.scene?' on':''); s.textContent=label; s.dataset.v=String(val);
    s.onclick=()=>{ state.scene=(state.scene===val)?null:val; [...flow.querySelectorAll('.s')].forEach(x=>x.classList.toggle('on',x.dataset.v===String(state.scene))); render(); }; return s; };
  flow.appendChild(mk('전체',null));
  order.forEach((s,i)=>{ const a=document.createElement('span'); a.className='arw'; a.textContent='▸'; flow.appendChild(a); flow.appendChild(mk(s,s)); });

  // layers sorted by count desc
  const layers=Object.keys(M.perLayer).sort((a,b)=>M.perLayer[b]-M.perLayer[a]);
  const LNAME=M.layerNames||{};
  const lnav=document.getElementById('lnav');
  layers.forEach(L=>{ const a=document.createElement('a'); a.innerHTML=`<span class="dot" style="background:${C[L]||'#888'}"></span><span>${L}</span><span class="c">${M.perLayer[L]}</span>`;
    a.onclick=()=>document.getElementById('lay-'+L)?.scrollIntoView({block:'start'}); lnav.appendChild(a); });
  document.getElementById('deadbox').innerHTML=M.deadText||'';

  const main=document.getElementById('main');
  function cardHtml(n){
    const sc=(n.scenes||[]).map(s=>`<span class="bdg sc">${s}</span>`).join('');
    return `<div class="card" data-id="${n.id}" style="border-left-color:${C[n.layer]||'#888'}">
      <div class="nm">${n.entry?'<span class="star">★</span>':''}${n.name}</div>
      <div class="pth">${n.path}</div>
      <div class="sum">${esc(n.summary||'')}</div>
      <div class="meta">${sc}<span class="deg">↔ ${(outAdj[n.id]||[]).length+(inAdj[n.id]||[]).length}</span></div>
    </div>`;
  }
  function match(n){
    if(state.scene && !(n.scenes||[]).includes(state.scene)) return false;
    if(state.q){ const q=state.q; return (n.name.toLowerCase().includes(q)||(n.summary||'').toLowerCase().includes(q)||n.path.toLowerCase().includes(q)); }
    return true;
  }
  function render(){
    let html=''; let total=0;
    layers.forEach(L=>{
      const items=N.filter(n=>n.layer===L && match(n));
      if(!items.length) return; total+=items.length;
      items.sort((a,b)=>(b.entry-a.entry)|| ((outAdj[b.id].length+inAdj[b.id].length)-(outAdj[a.id].length+inAdj[a.id].length)));
      html+=`<div class="layer" id="lay-${L}"><div class="lh"><div class="bar" style="background:${C[L]||'#888'}"></div><div class="name">${(LNAME[L]||L).split(' · ')[0]}</div><div class="en">${(LNAME[L]||L).split(' · ')[1]||''}</div><div class="cnt">${items.length}</div></div><div class="grid">${items.map(cardHtml).join('')}</div></div>`;
    });
    main.innerHTML = total? html : '<div id="empty">일치하는 스크립트가 없습니다.</div>';
    main.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDrawer(byId[c.dataset.id]));
  }
  function esc(s){ return (s+'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  const drawer=document.getElementById('drawer');
  function depList(ids){ if(!ids.length) return '<div style="color:var(--tx2);font-size:13px">없음</div>';
    return ids.map(id=>byId[id]).filter(Boolean).sort((a,b)=>a.name.localeCompare(b.name)).map(d=>`<div class="dep" data-id="${d.id}">${d.name} <span style="color:var(--tx2)">· ${d.layer}</span></div>`).join(''); }
  function openDrawer(n){
    if(!n) return;
    drawer.innerHTML=`<span class="x">×</span>
      <div class="dn">${n.entry?'★ ':''}${n.name}</div><div class="dp">${n.path}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px"><span class="bdg" style="border-color:${C[n.layer]};color:${C[n.layer]}">${n.layer}</span>${(n.scenes||[]).map(s=>`<span class="bdg sc">${s}</span>`).join('')}${n.entry?'<span class="bdg" style="color:var(--acc)">씬 엔트리</span>':''}</div>
      <div class="dsum">${esc(n.summary||'')}</div>
      <h5>소스 코드 <span class="lc">${n.lines||0}줄</span> <span class="copybtn">복사</span></h5>
      <pre class="code">${esc(n.src||'(소스 없음)')}</pre>
      <h5>의존 → (${(outAdj[n.id]||[]).length})</h5>${depList(outAdj[n.id]||[])}
      <h5>← 피의존 (${(inAdj[n.id]||[]).length})</h5>${depList(inAdj[n.id]||[])}`;
    drawer.classList.add('show');
    drawer.querySelector('.x').onclick=()=>drawer.classList.remove('show');
    drawer.querySelectorAll('.dep').forEach(d=>d.onclick=()=>openDrawer(byId[d.dataset.id]));
    var cb=drawer.querySelector('.copybtn'); if(cb) cb.onclick=()=>{ try{ navigator.clipboard.writeText(n.src||''); }catch(e){ var ta=document.createElement('textarea'); ta.value=n.src||''; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(_){} ta.remove(); } cb.textContent='복사됨'; setTimeout(function(){cb.textContent='복사';},1200); };
  }
  document.getElementById('q').addEventListener('input',e=>{ state.q=e.target.value.trim().toLowerCase(); render(); });
  render();
})();
</script>
