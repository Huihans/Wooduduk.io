lic class TemperatureController : MonoBehaviour\r\n    {\r\n        [SerializeField] private UIDocument uiDocument;   // HUD와 같은 UIDocument를 드래그\r\n        [Range(0f, 1f)]\r\n        [SerializeField] private float initialTemperature = 1f;\r\n\r\n        private VisualElement fill;\r\n        private Label valueLabel;\r\n        private float current;\r\n\r\n        // 색 위계: 따뜻=주황 / 주의=호박 / 위험=빨강\r\n        private static readonly Color Warm = new Color32(0xff, 0x8c, 0x2b, 0xff);\r\n        private static readonly Color Caution = new Color32(0xef, 0x9f, 0x27, 0xff);\r\n        private static readonly Color Danger = new Color32(0xe2, 0x4b, 0x4a, 0xff);\r\n        // 숫자색: 칸이 절반 이상 차면 진한 갈색, 그 아래면 밝은색(어두운 트랙 위라서)\r\n        private static readonly Color TextDark = new Color32(0x3a, 0x1f, 0x0e, 0xff);\r\n        private static readonly Color TextLight = new Color32(0xff, 0xe2, 0xc2, 0xff);\r\n\r\n        void Start()\r\n        {\r\n            var root = uiDocument.rootVisualElement;\r\n            fill = root.Q<VisualElement>(\"temperature-fill\");\r\n            valueLabel = root.Q<Label>(\"temperature-value\");\r\n\r\n            Debug.Log($\"[Temp] fill={fill != null}, value={valueLabel != null}\");\r\n\r\n            SetTemperature(initialTemperature);\r\n        }\r\n\r\n        // 외부 진입점: 게임플레이 파트가 매 순간 호출 (0=빙점, 1=만온)\r\n        public void SetTemperature(float t01)\r\n        {\r\n            current = Mathf.Clamp01(t01);\r\n\r\n            if (fill != null)\r\n            {\r\n                fill.style.width = Length.Percent(current * 100f);\r\n                fill.style.backgroundColor = ColorFor(current);\r\n            }\r\n            if (valueLabel != null)\r\n            {\r\n                valueLabel.text = Mathf.RoundToInt(current * 100f) + \"%\";\r\n                valueLabel.style.color = current >= 0.5f ? TextDark : TextLight;\r\n            }\r\n        }\r\n\r\n        public float Current => current;\r\n\r\n        private static Color ColorFor(float t)\r\n        {\r\n            if (t >= 0.5f) return Warm;\r\n            if (t >= 0.25f) return Caution;\r\n            return Danger;\r\n        }\r\n    }\r\n}","lines":65},{"id":"Scripts/Slot/Animation/TutorialFireFedAnimation.cs","name":"TutorialFireFedAnimation","path":"Scripts/Slot/Animation/TutorialFireFedAnimation.cs","layer":"Slot","scenes":["Tutorial"],"entry":true,"summary":"1회용 실행을 완벽하게 보장하기 위한 플래그","src":"﻿using System.Collections;\nusing UnityEngine;\nusing Wooduduk.Slot;\n\npublic class TutorialFireFedAnimation : MonoBehaviour\n{\n     private float _targetWorldY = -1f;\n     private float _moveSpeed = 0.5f;\n\n    // 1회용 실행을 완벽하게 보장하기 위한 플래그\n    private bool _hasTriggered = false; \n\n    private void OnEnable()\n    {\n        if (!_hasTriggered)\n        {\n            SlotEvent.OnFireFed += HandleFireFed;\n        }\n    }\n\n    private void OnDisable()\n    {\n        SlotEvent.OnFireFed -= HandleFireFed;\n    }\n\n    private void HandleFireFed(RunProgress run)\n    {\n        if (_hasTriggered) return;\n        _hasTriggered = true;\n\n        SlotEvent.OnFireFed -= HandleFireFed;\n\n        StartCoroutine(MoveRoutine());\n    }\n\n    private IEnumerator MoveRoutine()\n    {\n        Vector3 targetPosition = new Vector3(transform.position.x, _targetWorldY, transform.position.z);\n\n        while (transform.position != targetPosition)\n        {\n            transform.position = Vector3.MoveTowards(transform.position, targetPosition, _moveSpeed * Time.deltaTime);\n            yield return null;\n        }\n\n        gameObject.SetActive(false);\n    }\n}","lines":48},{"id":"Scripts/UI/LeaderboardController.cs","name":"LeaderboardController","path":"Scripts/UI/LeaderboardController.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"순위 버튼으로 열기 → 평소 모드(직전 판 점수 표시)","src":"using UnityEngine;\r\nusing UnityEngine.UIElements;\r\nusing Wooduduk.FX;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    public class LeaderboardController : MonoBehaviour\r\n    {\r\n        [SerializeField] private UIDocument uiDocument;\r\n        [SerializeField] private bool useStub = false;   // 테스트용. 켜면 더미 데이터로 동작.\r\n\r\n        private VisualElement overlay, listRoot;\r\n        private Label lastScoreLabel;\r\n        private Button tabMine, tabGlobal;\r\n\r\n        private ILeaderboardSource source;\r\n        private LeaderboardAdapterSource adapter;   // 실데이터일 때만 사용(로드 트리거·재렌더용)\r\n        private bool showingMine = true;\r\n        private bool resultMode = false;            // 사망 결과(\"이번 판\") 표시 중인지\r\n\r\n        void Awake()\r\n        {\r\n            if (useStub)\r\n            {\r\n                source = new StubLeaderboardSource();\r\n            }\r\n            else\r\n            {\r\n                adapter = new LeaderboardAdapterSource();\r\n                source = adapter;\r\n            }\r\n        }\r\n\r\n        void OnEnable()\r\n        {\r\n            var root = uiDocument.rootVisualElement;\r\n            UiSfxHover.BindAll(root);\r\n            overlay = root.Q<VisualElement>(\"lb-overlay\");\r\n            listRoot = root.Q<VisualElement>(\"lb-list\");\r\n            lastScoreLabel = root.Q<Label>(\"lb-last-score\");\r\n            tabMine = root.Q<Button>(\"lb-tab-mine\");\r\n            tabGlobal = root.Q<Button>(\"lb-tab-global\");\r\n\r\n            root.Q<Button>(\"lb-close\").clicked += () => { UiSfxEvent.Raise(UiSfxKind.Close); Hide(); };\r\n            tabMine.clicked += () => { UiSfxEvent.Raise(UiSfxKind.Toggle); ShowTab(true); };\r\n            tabGlobal.clicked += () => { UiSfxEvent.Raise(UiSfxKind.Toggle); ShowTab(false); };\r\n\r\n            if (adapter != null) adapter.OnUpdated += OnDataUpdated;\r\n\r\n            Hide();\r\n        }\r\n\r\n        void OnDisable()\r\n        {\r\n            if (adapter != null) adapter.OnUpdated -= OnDataUpdated;\r\n        }\r\n\r\n        void OnDestroy()\r\n        {\r\n            adapter?.Dispose();   // static 이벤트 구독 해제\r\n        }\r\n\r\n        // 순위 버튼으로 열기 → 평소 모드(직전 판 점수 표시)\r\n        public void Show()\r\n        {\r\n            UiSfxEvent.Raise(UiSfxKind.Open);\r\n            resultMode = false;\r\n            overlay.style.display = DisplayStyle.Flex;\r\n            adapter?.RequestLoad();   // 서버 최신 요청. 도착하면 OnDataUpdated가 다시 그림.\r\n            UpdateLastScore();        // 직전 판 점수(있으면) 라벨에\r\n            ShowTab(true);\r\n        }\r\n\r\n        public void Hide()\r\n        {\r\n            overlay.style.display = DisplayStyle.None;\r\n        }\r\n\r\n        // 게임플레이가 사망 순간 호출 → \"이번 판\" 점수 강조 + 2.5초 후 자동 닫힘\r\n        public void ShowResult(int score)\r\n        {\r\n            Show();                                     // 먼저 평소 모드로 열고(직전 점수 세팅됨)\r\n            resultMode = true;                          // 결과 모드로 전환\r\n            source.Submit(score);\r\n            lastScoreLabel.text = \"이번 판 \" + score;   // 그 위에 이번 판으로 덮어쓰기\r\n            CancelInvoke(nameof(Hide));\r\n            Invoke(nameof(Hide), 2.5f);\r\n        }\r\n\r\n        // 비동기 데이터 도착 → 패널이 열려 있으면 현재 탭/직전점수를 다시 그림\r\n        private void OnDataUpdated()\r\n        {\r\n            if (overlay != null && overlay.style.display == DisplayStyle.Flex)\r\n            {\r\n                UpdateLastScore();\r\n                ShowTab(showingMine);\r\n            }\r\n        }\r\n\r\n        // 직전 판 점수를 라벨에. 단, 사망 결과(\"이번 판\") 표시 중이면 덮지 않음.\r\n        private void UpdateLastScore()\r\n        {\r\n            if (resultMode) return;\r\n            if (adapter == null) return;\r\n\r\n            int? last = adapter.LatestScore;\r\n            if (last.HasValue)\r\n                lastScoreLabel.text = \"직전 판 \" + last.Value;\r\n            // 값 없으면(첫 판 전) UXML 기본 텍스트 유지\r\n        }\r\n\r\n        private void ShowTab(bool mine)\r\n        {\r\n            showingMine = mine;\r\n            tabMine.RemoveFromClassList(\"lb-tab-on\");\r\n            tabGlobal.RemoveFromClassList(\"lb-tab-on\");\r\n            (mine ? tabMine : tabGlobal).AddToClassList(\"lb-tab-on\");\r\n\r\n            var data = mine ? source.GetMyRecords() : source.GetGlobal();\r\n            listRoot.Clear();\r\n\r\n            if (data.Length == 0)\r\n            {\r\n                // 아직 로딩 중이면 안내, 진짜 비었으면 빈 안내\r\n                var hint = new Label(adapter != null && !adapter.HasData ? \"불러오는 중…\" : \"기록이 없습니다\");\r\n                hint.AddToClassList(\"lb-row\");\r\n                listRoot.Add(hint);\r\n                return;\r\n            }\r\n\r\n            foreach (var e in data)\r\n            {\r\n                var row = new VisualElement();\r\n                row.AddToClassList(\"lb-row\");\r\n\r\n                var r = new Label(\"#\" + e.rank); r.AddToClassList(\"lb-rank\");\r\n                var n = new Label(e.name); n.AddToClassList(\"lb-name\");\r\n                var s = new Label(e.score.ToString()); s.AddToClassList(\"lb-score\");\r\n\r\n                row.Add(r);\r\n                row.Add(n);\r\n                row.Add(s);\r\n                listRoot.Add(row);\r\n            }\r\n        }\r\n    }\r\n}","lines":147},{"id":"Scripts/Slot/CampfireController.cs","name":"CampfireController","path":"Scripts/Slot/CampfireController.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"모닥불 컨트롤러","src":"using System.Collections;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 모닥불 컨트롤러\r\n    public class CampfireController : MonoBehaviour\r\n    {\r\n        [SerializeField] private GameObject _flameRoot;\r\n\r\n        private RunContext _ctx;\r\n        private bool _lit;\r\n        private int _lastFireLogs = -1;\r\n        private int _lastCost = -1;\r\n        private bool _warmed;\r\n\r\n        public void Bind(RunContext ctx)\r\n        {\r\n            _ctx = ctx;\r\n            SetLit(false);\r\n            _lastFireLogs = -1;\r\n            _lastCost = -1;\r\n            if (!_warmed) StartCoroutine(PrewarmFlame()); \r\n        }\r\n        private void Update()\r\n        {\r\n            if (_ctx == null) return;\r\n            bool burning = _ctx.Run.FireBurnSeconds > 0f;\r\n            if (burning != _lit) SetLit(burning);\r\n\r\n            int logs = _ctx.Survival.FireLogLoaded(_ctx.Run);\r\n            int cost = _ctx.Economy.FireFeedCost(_ctx.Run.FireFeedStreak);\r\n            if (logs != _lastFireLogs || cost != _lastCost)\r\n            {\r\n                _lastFireLogs = logs;\r\n                _lastCost = cost;\r\n                SlotEvent.RaiseFireFuelChanged(logs, _ctx.Survival.MaxFireLogs, cost);\r\n            }\r\n        }\r\n        private void SetLit(bool on)\r\n        {\r\n            _lit = on;\r\n            if (_flameRoot != null) _flameRoot.SetActive(on);\r\n            if (on) SlotEvent.RaiseCampfireLit(transform.position);\r\n            else SlotEvent.RaiseCampfireOut();\r\n        }\r\n        private IEnumerator PrewarmFlame()\r\n        {\r\n            if (_flameRoot == null) { _warmed = true; yield break; }\r\n            _flameRoot.SetActive(true);   \r\n            yield return null;                      \r\n            yield return null;                      \r\n            _flameRoot.SetActive(false);  \r\n            _warmed = true;\r\n        }\r\n\r\n    }\r\n}","lines":58},{"id":"Scripts/Tutorial/NarrationView.cs","name":"NarrationView","path":"Scripts/Tutorial/NarrationView.cs","layer":"Tutorial","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"화면 하단 독백. 클릭으로만 진행. 클릭 입력은 uGUI로 받는다: (1) 이 패널 자체 클릭(IPointerClickHandler) 또는 (2) 풀스크린 ClickCatcher(Image+Button)의 OnClick에 Skip()을 연결 → \"화면 아무 데나 클릭=다음\". 클릭 1번: 타이핑 중이면 즉시 전체 표시 / 다 떴으면 다음 줄로.","src":"using MoreMountains.Feedbacks;     \r\nusing System.Collections;\r\nusing TMPro;                       \r\nusing UnityEngine;\r\nusing UnityEngine.EventSystems;\r\nusing UnityEngine.InputSystem;\r\n\r\nnamespace Wooduduk.Tutorial\r\n{\r\n    // 화면 하단 독백. 클릭으로만 진행.\r\n    // 클릭 입력은 uGUI로 받는다: (1) 이 패널 자체 클릭(IPointerClickHandler) 또는\r\n    // (2) 풀스크린 ClickCatcher(Image+Button)의 OnClick에 Skip()을 연결 → \"화면 아무 데나 클릭=다음\".\r\n    // 클릭 1번: 타이핑 중이면 즉시 전체 표시 / 다 떴으면 다음 줄로.\r\n    public sealed class NarrationView : MonoBehaviour, IPointerClickHandler\r\n    {\r\n        [Header(\"UI\")]\r\n        [SerializeField] private CanvasGroup _group;\r\n        [SerializeField] private TextMeshProUGUI _text;\r\n\r\n        [Header(\"FEEL\")]\r\n        [SerializeField] private MMF_Player _slideInFeedback;   // 줄마다 슬라이드업/페이드(선택)\r\n\r\n        [Header(\"SFX\")]\r\n        [SerializeField] private AudioSource _sfxSource;        // 나레이션 전용 2D AudioSource\r\n        [SerializeField] private AudioClip _lineAppearSfx;      // 줄 등장음(선택)\r\n        [SerializeField] private AudioClip _typeBlip;           // 타자기 틱(선택)\r\n        [SerializeField] private int _blipEveryChars = 2;\r\n        [Range(0f, 1f)][SerializeField] private float _typeVolume = 0.5f;\r\n\r\n        [Header(\"Timing\")]\r\n        [SerializeField] private float _charInterval = 0.03f;\r\n\r\n        private bool _clicked;\r\n\r\n        private void Awake() { if (_group != null) _group.alpha = 0f; }\r\n\r\n        // (1) 패널 자체 클릭\r\n        public void OnPointerClick(PointerEventData _) => _clicked = true;\r\n        // (2) 풀스크린 ClickCatcher Button.OnClick → 여기에 연결(\"화면 아무 데나 클릭=다음\")\r\n        public void Skip() => _clicked = true;\r\n\r\n        public IEnumerator ShowLine(string line)\r\n        {\r\n            if (_text == null) yield break;\r\n\r\n            gameObject.SetActive(true);\r\n            if (_group != null) _group.alpha = 1f;\r\n            if (_slideInFeedback != null) _slideInFeedback.PlayFeedbacks();\r\n            if (_sfxSource != null && _lineAppearSfx != null) _sfxSource.PlayOneShot(_lineAppearSfx);\r\n\r\n            _clicked = false;\r\n            _text.text = \"\";\r\n            bool revealedByClick = false;\r\n            int step = Mathf.Max(1, _blipEveryChars);\r\n            for (int i = 0; i < line.Length; i++)\r\n            {\r\n                _text.text += line[i];\r\n                if (_sfxSource != null && _typeBlip != null &&\r\n                    !char.IsWhiteSpace(line[i]) && (i % step) == 0)\r\n                    _sfxSource.PlayOneShot(_typeBlip, _typeVolume);\r\n\r\n                float t = 0f;\r\n                while (t < _charInterval && !_clicked)\r\n                {\r\n                    if (AdvancePressed) _clicked = true;   // 커서 모드 무관 스킵\r\n                    t += Time.unscaledDeltaTime;\r\n                    yield return null;\r\n                }\r\n                if (_clicked)\r\n                {\r\n                    revealedByClick = i < line.Length - 1;\r\n                    _text.text = line;\r\n                    break;\r\n                }\r\n            }\r\n\r\n            if (_clicked && !revealedByClick) yield break;  // 완성 문장 클릭 = 즉시 진행\r\n\r\n            yield return null;                               // 스킵/진행 클릭 분리 가드\r\n            _clicked = false;\r\n            while (!_clicked)\r\n            {\r\n                if (AdvancePressed) _clicked = true;         // 커서 모드 무관 진행\r\n                yield return null;\r\n            }\r\n        }\r\n        private static bool AdvancePressed =>\r\n        (Mouse.current != null && Mouse.current.leftButton.wasPressedThisFrame) ||\r\n        (Keyboard.current != null && Keyboard.current.spaceKey.wasPressedThisFrame);\r\n        public void Hide() { if (_group != null) _group.alpha = 0f; }\r\n    }\r\n}","lines":92},{"id":"Scripts/Tutorial/TutorialLocationSwitch.cs","name":"TutorialLocationSwitch","path":"Scripts/Tutorial/TutorialLocationSwitch.cs","layer":"Tutorial","scenes":["Tutorial"],"entry":true,"summary":"오두막 밖(설산) → 안 으로 장소 전환. 플레이어 이동 스크립트가 없어도 됨: 검은 화면으로 가린 채 \"환경 교체 + (선택)카메라 순간이동\"만 한다. 사용: 전환 스텝의 OnEnterEvent에 SwitchToInside() 연결, OnEnterWait = (_fadeTime 2 + 0.1) 정도.","src":"﻿using System.Collections;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.Tutorial\r\n{\r\n    // 오두막 밖(설산) → 안 으로 장소 전환.\r\n    // 플레이어 이동 스크립트가 없어도 됨: 검은 화면으로 가린 채 \"환경 교체 + (선택)카메라 순간이동\"만 한다.\r\n    // 사용: 전환 스텝의 OnEnterEvent에 SwitchToInside() 연결, OnEnterWait = (_fadeTime * 2 + 0.1) 정도.\r\n    public sealed class TutorialLocationSwitch : MonoBehaviour\r\n    {\r\n        [Header(\"페이드 (풀스크린 검정 Image의 CanvasGroup)\")]\r\n        [SerializeField] private CanvasGroup _fade;\r\n        [SerializeField] private float _fadeTime = 0.6f;\r\n\r\n        [Header(\"환경 교체 (둘 중 하나만 켜짐)\")]\r\n        [SerializeField] private GameObject _outside;   // 끌 환경(설산/외경)\r\n        [SerializeField] private GameObject _inside;    // 켤 환경(오두막 내부)\r\n\r\n        [Header(\"카메라/플레이어 순간이동 (선택 — 안 쓰면 비워둠)\")]\r\n        [SerializeField] private Transform _playerRig;     // 옮길 대상(카메라 리그)\r\n        [SerializeField] private Transform _insideAnchor;  // 도착 위치/회전\r\n\r\n        // OnEnterEvent에서 호출\r\n        public void SwitchToInside() => StartCoroutine(Switch(_inside, _outside));\r\n\r\n        // (필요하면) 반대로\r\n        public void SwitchToOutside() => StartCoroutine(Switch(_outside, _inside));\r\n\r\n        private IEnumerator Switch(GameObject on, GameObject off)\r\n        {\r\n            yield return Fade(0f, 1f);                 // 1) 암전\r\n\r\n            if (off != null) off.SetActive(false);     // 2) 검은 동안 환경 교체\r\n            if (on != null) on.SetActive(true);\r\n            if (_playerRig != null && _insideAnchor != null && on == _inside)\r\n                _playerRig.SetPositionAndRotation(_insideAnchor.position, _insideAnchor.rotation); // 순간이동\r\n\r\n            yield return Fade(1f, 0f);                 // 3) 페이드인\r\n        }\r\n\r\n        private IEnumerator Fade(float from, float to)\r\n        {\r\n            if (_fade == null) yield break;\r\n            _fade.blocksRaycasts = true;               // 전환 중 입력 차단\r\n            float t = 0f;\r\n            while (t < _fadeTime)\r\n            {\r\n                t += Time.unscaledDeltaTime;\r\n                _fade.alpha = Mathf.Lerp(from, to, t / _fadeTime);\r\n                yield return null;\r\n            }\r\n            _fade.alpha = to;\r\n            _fade.blocksRaycasts = to > 0.5f;          // 검정일 때만 차단\r\n        }\r\n    }\r\n}","lines":56},{"id":"Scripts/Tutorial/TutorialDirector.cs","name":"TutorialDirector","path":"Scripts/Tutorial/TutorialDirector.cs","layer":"Tutorial","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"한 스텝(독백 + 진행조건 + 환경셋업 + 연출). ScriptableObject가 아니라 Director에 직렬화 → 씬 참조(상호작용/피드백)를 직접 담을 수 있음.","src":"using MoreMountains.Feedbacks;\r\nusing System;\r\nusing System.Collections;\r\nusing System.Collections.Generic;\r\nusing TMPro;\r\nusing UnityEngine;\r\nusing UnityEngine.Events;\r\nusing Wooduduk.Slot;\r\nusing Wooduduk.Slot.Machine;\r\nusing Wooduduk.Tutorial;\r\n\r\nnamespace Wooduduk.Tutorial\r\n{\r\n    // 한 스텝(독백 + 진행조건 + 환경셋업 + 연출).\r\n    // ScriptableObject가 아니라 Director에 직렬화 → 씬 참조(상호작용/피드백)를 직접 담을 수 있음.\r\n    [Serializable]\r\n    public sealed class TutorialStep\r\n    {\r\n        [TextArea] public string[] Lines;                 // 독백(여러 줄, 차례로). 이 동안은 상호작용 잠김\r\n        public TutorialTrigger Advance = TutorialTrigger.TapToContinue;\r\n        public int IntParam;                              // 콤보 목표 등\r\n        [Header(\"행동 안내\")]\r\n        [TextArea] public string Instruction;             // 행동 단계에 하단 지시문(예: \"모닥불을 클릭해 장작을 넣으세요\")\r\n        [Header(\"환경 셋업\")]\r\n        public int GrantWood;                             // 진입 시 banked 장작 제공(0=없음)\r\n        public bool FreezeSurvival;                       // 이 스텝 동안 체온 하락 정지(불은 켜지 않음)\r\n        public SymbolSkew[] Skew;                         // 이 스텝 심볼 가중치 스큐\r\n        public GameObject[] AllowedInteractables;         // 행동 단계에 허용할 상호작용(나머지는 콜라이더 off)\r\n        [Header(\"진입 연출\")]\r\n        public UnityEvent OnEnterEvent;                   // 스텝 시작 시 호출(예: 오두막 안으로 장소 전환)\r\n        public MMF_Player OnEnterFeedback;                // 스텝 시작 시 FEEL(선택)\r\n        public float OnEnterWait;                         // 진입 연출 후 대기(초)\r\n        [Header(\"완료 연출\")]\r\n        public string SuccessLine;                        // 조건 충족(+스핀이면 릴 정지) 후 한 줄\r\n        public MMF_Player OnAdvanceFeedback;              // 조건 충족 시 FEEL(선택)\r\n    }\r\n\r\n\r\n    [Serializable]\r\n    public sealed class TutorialChapter\r\n    {\r\n        public string Title;                              // 챕터 타이틀(나레이션으로 1회 표시)\r\n        public List<TutorialStep> Steps = new List<TutorialStep>();\r\n    }\r\n\r\n    // 튜토리얼 오케스트레이터. 진행 판정은 전부 기존 SlotEvent로만(코어 비침습).\r\n    // 단계: 환경셋업 → (대사: 상호작용 잠금) → (행동: 지시문+허용 상호작용) → (스핀이면 릴정지 대기) → 완료대사.\r\n    public sealed class TutorialDirector : MonoBehaviour\r\n    {\r\n        [SerializeField] private NarrationView _narration;\r\n        [SerializeField] private SlotmachineController _slot;\r\n        [SerializeField] private bool _freeCards = true; // 튜토리얼은 카드 구매 비용 0\r\n        [SerializeField] private string _seed = \"tutorial\";\r\n        [Tooltip(\"완료 후 이동할 메인 씬 이름(Build Settings 등록). 비우면 이동 안 함.\")]\r\n        [SerializeField] private string _nextScene;\r\n\r\n        [Header(\"지시문(행동 안내) UI\")]\r\n        [SerializeField] private GameObject _instructionRoot;   // 지시문 패널(켜고 끔)\r\n        [SerializeField] private TextMeshProUGUI _instructionText;\r\n\r\n        [Tooltip(\"씬의 모든 상호작용 오브젝트. 스텝 행동단계에서 허용분만 콜라이더 ON.\")]\r\n        [SerializeField] private List<GameObject> _allInteractables = new List<GameObject>();\r\n        [SerializeField] private List<TutorialChapter> _chapters = new List<TutorialChapter>();\r\n\r\n        // 튜토리얼 완료 알림 → 계정/세이브 레이어가 구독(SaveManager에 _tutorialDone 저장).\r\n        public static event Action OnTutorialCompleted;\r\n\r\n        private readonly TutorialWeightCard _weightCard = new TutorialWeightCard();\r\n        private bool _stepDone;\r\n        private Action _unsubscribe;\r\n\r\n        private void Start() => StartCoroutine(Run());\r\n\r\n        private IEnumerator Run()\r\n        {\r\n            if (_slot == null || _narration == null) { Debug.LogError(\"[Tutorial] _slot/_narration 미연결\"); yield break; }\r\n\r\n            _slot.Init(_seed);\r\n            if (_freeCards) _slot.SetCardCostOverride(0);\r\n            if (_slot.Effects != null && _slot.Run != null) _slot.Effects.Add(_weightCard, _slot.Run);\r\n\r\n            SetInstruction(null);\r\n            SetInteractables(null); // 시작은 전부 잠금\r\n\r\n            foreach (var ch in _chapters)\r\n            {\r\n                if (ch == null) continue;\r\n                //if (!string.IsNullOrEmpty(ch.Title)) yield return _narration.ShowLine($\"— {ch.Title} —\");\r\n                foreach (var step in ch.Steps) if (step != null) yield return RunStep(step);\r\n            }\r\n\r\n            if (OnTutorialCompleted != null) OnTutorialCompleted.Invoke();\r\n            if (!string.IsNullOrEmpty(_nextScene))\r\n                UnityEngine.SceneManagement.SceneManager.LoadScene(_nextScene);\r\n        }\r\n\r\n        private IEnumerator RunStep(TutorialStep step)\r\n        {\r\n            // 1) 환경 셋업\r\n            _weightCard.SetSkew(step.Skew);\r\n            if (step.GrantWood > 0 && _slot.Run != null) _slot.Run.BankedWood += step.GrantWood;\r\n\r\n            Coroutine freeze = null;\r\n            if (step.FreezeSurvival) freeze = StartCoroutine(PinTemp()); // 체온만 고정 — 모닥불은 켜지 않음\r\n\r\n            // 진입 연출(장소 전환 등)\r\n            step.OnEnterEvent?.Invoke();\r\n            if (step.OnEnterFeedback != null) step.OnEnterFeedback.PlayFeedbacks();\r\n            if (step.OnEnterWait > 0f) yield return new WaitForSecondsRealtime(step.OnEnterWait);\r\n\r\n            // 2) 독백 — 이 동안은 상호작용 전부 잠금(실수로 슬롯/정산 안 눌리게)\r\n            SetInteractables(null);\r\n            SetInstruction(null);\r\n            if (step.Lines != null)\r\n                foreach (var line in step.Lines)\r\n                    yield return _narration.ShowLine(line);\r\n\r\n            // 3) 행동 단계 — 지시문 + 허용 상호작용 ON\r\n            if (step.Advance != TutorialTrigger.TapToContinue)\r\n            {\r\n                SetInstruction(step.Instruction);\r\n                SetInteractables(step.AllowedInteractables);\r\n\r\n                _stepDone = false;\r\n                Subscribe(step);\r\n                yield return new WaitUntil(() => _stepDone);\r\n                Unsubscribe();\r\n\r\n                // 스핀 결과는 \"릴이 멈춘 뒤\" 대사가 나오도록 대기(결과 먼저, 대사 나중)\r\n                if (IsSpinTrigger(step.Advance)) yield return WaitForSpinCompleted();\r\n\r\n                SetInstruction(null);\r\n                SetInteractables(null);\r\n            }\r\n\r\n            if (freeze != null) StopCoroutine(freeze);\r\n\r\n            // 4) 완료 대사/연출\r\n            if (step.OnAdvanceFeedback != null) step.OnAdvanceFeedback.PlayFeedbacks();\r\n            if (!string.IsNullOrEmpty(step.SuccessLine)) yield return _narration.ShowLine(step.SuccessLine);\r\n        }\r\n\r\n        // 체온만 가득 유지(드레인 무효화). FireBurnSeconds를 안 건드려 모닥불이 켜지지 않는다.\r\n        private IEnumerator PinTemp()\r\n        {\r\n            while (true)\r\n            {\r\n                if (_slot.Run != null) _slot.Run.BodyTemp = _slot.Run.MaxBodyTemp;\r\n                yield return null;\r\n            }\r\n        }\r\n\r\n        private void SetInstruction(string msg)\r\n        {\r\n            bool show = !string.IsNullOrEmpty(msg);\r\n            if (_instructionText != null) _instructionText.text = msg;\r\n            if (_instructionRoot != null) _instructionRoot.SetActive(show);\r\n        }\r\n\r\n        // 스핀 기반 트리거인지(이러면 릴 정지까지 기다렸다 결과대사)\r\n        private static bool IsSpinTrigger(TutorialTrigger t) =>\r\n            t == TutorialTrigger.OnSwing || t == TutorialTrigger.OnHit ||\r\n            t == TutorialTrigger.OnFailNoSwing || t == TutorialTrigger.OnFailWorm ||\r\n            t == TutorialTrigger.OnKnotSeen || t == TutorialTrigger.OnComboReach ||\r\n            t == TutorialTrigger.OnMakgeolli;\r\n\r\n        // 다음 OnSpinCompleted(릴 정지 완료)까지 대기. 안전 타임아웃 포함.\r\n        private IEnumerator WaitForSpinCompleted(float timeout = 5f)\r\n        {\r\n            bool done = false;\r\n            Action h = () => done = true;\r\n            SlotEvent.OnSpinCompleted += h;\r\n            float t = 0f;\r\n            while (!done && t < timeout) { t += Time.unscaledDeltaTime; yield return null; }\r\n            SlotEvent.OnSpinCompleted -= h;\r\n        }\r\n\r\n        // 오브젝트는 보이게 두고 콜라이더만 토글(PlayerInteractor가 콜라이더 레이캐스트).\r\n        private void SetInteractables(GameObject[] allowed)\r\n        {\r\n            foreach (var go in _allInteractables) SetInteractable(go, false);\r\n            if (allowed != null) foreach (var go in allowed) SetInteractable(go, true);\r\n        }\r\n\r\n        private static void SetInteractable(GameObject go, bool on)\r\n        {\r\n            if (go == null) return;\r\n            var cols = go.GetComponentsInChildren<Collider>(true);\r\n            for (int i = 0; i < cols.Length; i++) cols[i].enabled = on;\r\n        }\r\n\r\n        private void Subscribe(TutorialStep step)\r\n        {\r\n            switch (step.Advance)\r\n            {\r\n                case TutorialTrigger.OnSwing:\r\n                    {\r\n                        Action h = () => _stepDone = true;\r\n                        SlotEvent.OnSpinStarted += h;\r\n                        _unsubscribe = () => SlotEvent.OnSpinStarted -= h;\r\n                        break;\r\n                    }\r\n                case TutorialTrigger.OnHit:\r\n                    {\r\n                        Action<SpinOutcome> h = o => { if (o.Judgment != null && o.Judgment.IsHit) _stepDone = true; };\r\n                        SlotEvent.OnSpinJudged += h;\r\n                        _unsubscribe = () => SlotEvent.OnSpinJudged -= h;\r\n                        break;\r\n                    }\r\n                case TutorialTrigger.OnFailNoSwing:\r\n                    {\r\n                        Action<SpinOutcome> h = o => { if (o.Judgment != null && o.Judgment.FailReason == FailReason.NOSWING) _stepDone = true; };\r\n                        SlotEvent.OnSpinJudged += h;\r\n                        _unsubscribe = () => SlotEvent.OnSpinJudged -= h;\r\n                        break;\r\n                    }\r\n                case TutorialTrigger.OnFailWorm:\r\n                    {\r\n                        Action<SpinOutcome> h = o => { if (o.Judgment != null && o.Judgment.FailReason == FailReason.WORM) _stepDone = true; };\r\n                        SlotEvent.OnSpinJudged += h;\r\n                        _unsubscribe = () => SlotEvent.OnSpinJudged -= h;\r\n                        break;\r\n                    }\r\n                case TutorialTrigger.OnKnotSeen:\r\n                    {\r\n                        Action<SpinResult> h = r => { if (HasSymbol(r, SymbolId.KNOT)) _stepDone = true; };\r\n                        SlotEvent.OnReelsDecided += h;\r\n                        _unsubscribe = () => SlotEvent.OnReelsDecided -= h;\r\n                        break;\r\n                    }\r\n                case TutorialTrigger.OnComboReach:\r\n                    {\r\n                        Action<SpinOutcome> h = o => { if (o.Combo >= step.IntParam) _stepDone = true; };\r\n                        SlotEvent.OnSpinJudged += h;\r\n                        _unsubscribe = () => SlotEvent.OnSpinJudged -= h;\r\n                        break;\r\n                    }\r\n                case TutorialTrigger.OnFireFed:\r\n                    {\r\n                        Action<RunProgress> h = _ => _stepDone = true;\r\n                        SlotEvent.OnFireFed += h;\r\n                        _unsubscribe = () => SlotEvent.OnFireFed -= h;\r\n                        break;\r\n                    }\r\n                case TutorialTrigger.OnSettle:\r\n                    {\r\n                        Action<RunProgress, long> h = (_, __) => _stepDone = true;\r\n                        SlotEvent.OnSettled += h;\r\n                        _unsubscribe = () => SlotEvent.OnSettled -= h;\r\n                        break;\r\n                    }\r\n                case TutorialTrigger.OnMakgeolli:\r\n                    {\r\n                        Action<SpinOutcome> h = o => { if (o.Judgment != null && o.Judgment.MGLTriggered) _stepDone = true; };\r\n                        SlotEvent.OnSpinJudged += h;\r\n                        _unsubscribe = () => SlotEvent.OnSpinJudged -= h;\r\n                        break;\r\n                    }\r\n                case TutorialTrigger.OnCardBought:\r\n                    {\r\n                        Action<string, bool> h = (_, ok) => { if (ok) _stepDone = true; };\r\n                        CardEvent.OnCardBought += h;                 // 카드 구매는 CardEvent(SlotEvent 아님, Wooduduk.Slot)\r\n                        _unsubscribe = () => CardEvent.OnCardBought -= h;\r\n                        break;\r\n                    }\r\n                default:\r\n                    _stepDone = true;\r\n                    break;\r\n            }\r\n        }\r\n\r\n        private void Unsubscribe()\r\n        {\r\n            _unsubscribe?.Invoke();\r\n            _unsubscribe = null;\r\n        }\r\n\r\n        private static bool HasSymbol(SpinResult r, SymbolId id)\r\n        {\r\n            if (r.Reels == null) return false;\r\n            for (int i = 0; i < r.Reels.Length; i++) if (r.Reels[i] == id) return true;\r\n            return false;\r\n        }\r\n\r\n        private void OnDisable() => Unsubscribe();\r\n    }\r\n}\r\n","lines":288},{"id":"Scripts/Tutorial/TutorialCompletionSaver.cs","name":"TutorialCompletionSaver","path":"Scripts/Tutorial/TutorialCompletionSaver.cs","layer":"Tutorial","scenes":["Tutorial"],"entry":true,"summary":"(요약 없음)","src":"﻿using System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Network.Firebase;\r\n\r\nnamespace Wooduduk.Tutorial\r\n{\r\n    public class TutorialCompletionSaver : MonoBehaviour\r\n    {\r\n        private void OnEnable() => TutorialDirector.OnTutorialCompleted += SaveDone;\r\n        private void OnDisable() => TutorialDirector.OnTutorialCompleted -= SaveDone;\r\n\r\n        private void SaveDone()\r\n        {\r\n            if (!UserManager.Instance.TryGetUser(out var user) || user == null) return;\r\n            user._tutorialDone = true;                                    // 인메모리 즉시\r\n            SaveManager.Instance.UpdateUserFields(user._userId,\r\n                new Dictionary<string, object> { { \"_tutorialDone\", true } }); // Firebase\r\n        }\r\n    }\r\n}\r\n","lines":21},{"id":"Scripts/Slot/CampfireFuelBinder.cs","name":"CampfireFuelBinder","path":"Scripts/Slot/CampfireFuelBinder.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"모닥불에 들어가 있는 장작/최대장작 표시","src":"using UnityEngine;\r\nusing TMPro;          \r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 모닥불에 들어가 있는 장작/최대장작 표시\r\n    public class CampfireFuelBinder : MonoBehaviour\r\n    {\r\n        [SerializeField] private TextMeshPro _fuelText;  \r\n\r\n        private int _lastCur = -1, _lastMax = -1, _lastCost = -1;\r\n\r\n        void OnEnable() => SlotEvent.OnFireFuelChanged += OnFuelChanged;\r\n        void OnDisable() => SlotEvent.OnFireFuelChanged -= OnFuelChanged;\r\n\r\n        // 장작 개수가 바뀐 경우\r\n        private void OnFuelChanged(int current, int max, int cost)\r\n        {\r\n            if (_fuelText == null || (current == _lastCur && max == _lastMax && cost == _lastCost)) return;\r\n            _lastCur = current; _lastMax = max; _lastCost = cost;\r\n            _fuelText.text = $\"장작 {current}/{max}\\n 현재 가격 : {cost}\";  \r\n        }\r\n    }\r\n}","lines":24},{"id":"Scripts/Slot/CampfireInteractable.cs","name":"CampfireInteractable","path":"Scripts/Slot/CampfireInteractable.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"모닥불 상호작용 장작 소모 + 체온 회복","src":"﻿using UnityEngine;\r\nusing Wooduduk.Core;\r\nusing Wooduduk.Slot.Machine;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 모닥불 상호작용\r\n    // 장작 소모 + 체온 회복\r\n    public class CampfireInteractable : MonoBehaviour, IInteractable\r\n    {\r\n        [SerializeField] private SlotmachineController _controller;\r\n        [SerializeField] private string _prompt = \"모닥불 지피기\";\r\n\r\n        public string Prompt => _prompt;\r\n        // 회전 중엔 차단(UX확인하고 수정해도 될듯)/ 장작 부족은 FeedFire 내부에서 가드\r\n        public bool CanInteract => _controller != null && !_controller.IsSpinning;\r\n\r\n        private void Awake()\r\n        {\r\n            if (_controller == null)\r\n                Debug.LogError(\"_controller 미연결\");\r\n        }\r\n\r\n        public void Interact(IInteractor source)\r\n        {\r\n            if (!CanInteract) return;\r\n            _controller.FeedFire(); // 성공 시 OnFireFed 발행 -> PlayerSurvival.Warm()로 체온 회복\r\n        }\r\n    }\r\n}","lines":30},{"id":"Scripts/FX/OutlineHighlighter.cs","name":"OutlineHighlighter","path":"Scripts/FX/OutlineHighlighter.cs","layer":"FX","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"(요약 없음)","src":"﻿using System;\r\nusing UnityEngine;\r\nusing Wooduduk.Core;\r\n\r\nnamespace Wooduduk.FX\r\n{\r\n    public class OutlineHighlighter : MonoBehaviour, IHighlightable\r\n    {\r\n        [SerializeField] private Outline _outline;\r\n        [SerializeField] private Color _color = Color.yellow;\r\n        [SerializeField] private float _width = 5f;\r\n\r\n        private void Awake()\r\n        {\r\n            if (_outline == null) _outline = GetComponent<Outline>();\r\n            if (_outline == null) return;\r\n            _outline.OutlineMode = Outline.Mode.OutlineAll;\r\n            _outline.OutlineColor = _color;\r\n            _outline.OutlineWidth = _width;\r\n            _outline.enabled = false;   // 시작은 꺼짐\r\n        }\r\n\r\n        public void SetHighlight(bool on)\r\n        {\r\n            if (_outline != null && _outline.enabled != on) _outline.enabled = on; // 중복 set 방지\r\n        }\r\n    }\r\n}\r\n","lines":29},{"id":"Scripts/Slot/Animation/PlayerWoodThrower.cs","name":"PlayerWoodThrower","path":"Scripts/Slot/Animation/PlayerWoodThrower.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"(요약 없음)","src":"﻿using System.Collections;\nusing UnityEngine;\nusing Wooduduk.Core;\nusing Wooduduk.Interactables;\nusing Wooduduk.Slot;\n\nnamespace Wooduduk.Player\n{\n    public class PlayerWoodThrower : MonoBehaviour\n    {\n        [SerializeField] private GameObject _woodPrefab;\n        [SerializeField] private Transform _throwPoint; // 던질 위치\n        [SerializeField] private float _throwForce = 3f;\n\n\n        private void Start()\n        {\n            GenericObjectPool.Instance.Prewarm(_woodPrefab, 50);\n        }\n\n        private void OnEnable()\n        {\n            SlotEvent.OnFireFed += HandleFireFed;\n        }\n\n        private void OnDisable()\n        {\n            SlotEvent.OnFireFed -= HandleFireFed;\n        }\n        private void HandleFireFed(RunProgress run)\n        {\n            StartCoroutine(ThrowRoutine());\n        }\r\n        IEnumerator ThrowRoutine()\n        {\n            yield return null;\r\n\r\n            GameObject go = GenericObjectPool.Instance.Spawn(_woodPrefab, _throwPoint.position, _throwPoint.rotation);\n            if (go.TryGetComponent<WoodLog>(out var woodLog))\n            {\n                woodLog.Throw(_throwPoint.forward, _throwForce);\n            }\n        }\n    }\n}","lines":45},{"id":"Scripts/Slot/Animation/WoodLog.cs","name":"WoodLog","path":"Scripts/Slot/Animation/WoodLog.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"풀에서 나올 때 물리 상태 초기화","src":"﻿using System;\nusing System.Collections;\nusing UnityEngine;\nusing Wooduduk.Core;\nusing Wooduduk.Slot;\n\nnamespace Wooduduk.Interactables\n{\n    [RequireComponent(typeof(Rigidbody))]\n    public class WoodLog : MonoBehaviour, IPoolable\n    {\n        [Header(\"충돌 사운드\")]\r\n        [SerializeField, Min(0f)] private float _minImpactSpeed = 1.5f;  // 이하 무시(구르는 미세 접촉 컷)\r\n        [SerializeField, Min(0f)] private float _maxImpactSpeed = 8f;    // 이 속도 이상 = 강도 1\r\n        [SerializeField, Min(0f)] private float _impactCooldown = 1f;  // 로그당 재발화 최소 간격(초)\r\n        private float _lastImpactTime;\n        private Action<GameObject> _returnToPool;\n        private Rigidbody _rb;\n        private WaitForSeconds _despawnDelay = new WaitForSeconds(5f);\n\n        private void Awake()\n        {\n            _rb = GetComponent<Rigidbody>();\n        }\n\n        public void SetupPoolReturn(Action<GameObject> returnAction)\n        {\n            _returnToPool = returnAction;\n        }\n\n        public void OnSpawn()\n        {\n            // 풀에서 나올 때 물리 상태 초기화\n            _lastImpactTime = -999f;\n            _rb.linearVelocity = Vector3.zero;\n            _rb.angularVelocity = Vector3.zero;\n            StartCoroutine(AutoDespawnRoutine());\n        }\n\n        public void OnReturn()\n        {\n            StopAllCoroutines();\n        }\n\n        // 외부에서 힘을 가해 던지는 메서드\n        public void Throw(Vector3 direction, float force)\n        {\n            _rb.AddForce(direction * force, ForceMode.Impulse);\n            // 약간의 회전을 주어 자연스럽게 날아가도록 처리\n            _rb.AddTorque(UnityEngine.Random.insideUnitSphere * force, ForceMode.Impulse);\n        }\n\n        private IEnumerator AutoDespawnRoutine()\n        {\n            yield return _despawnDelay;\n            _returnToPool?.Invoke(gameObject);\n        }\n        private void OnCollisionEnter(Collision c)\r\n        {\r\n            float speed = c.relativeVelocity.magnitude;\r\n            if (speed < _minImpactSpeed) return;                          // 1차 컷: 프리미티브 필터\r\n            if (Time.time - _lastImpactTime < _impactCooldown) return;    // 2차 컷: 로그당 쿨다운\r\n            _lastImpactTime = Time.time;\r\n            float s = Mathf.InverseLerp(_minImpactSpeed, _maxImpactSpeed, speed);\r\n            WoodEvent.RaiseWoodImpact(c.GetContact(0).point, s);          // 실제 재생 여부는 바인더가 최종 결정\r\n        }\n    }\n}","lines":68},{"id":"Scripts/FX/SFX/WoodImpactAudio.cs","name":"WoodImpactAudio","path":"Scripts/FX/SFX/WoodImpactAudio.cs","layer":"FX","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"장작 충돌 사운드 게이트키퍼","src":"﻿using UnityEngine;\r\nusing Wooduduk.Interactables;\r\nusing Wooduduk.SFX;\r\nusing Wooduduk.Slot;\r\n\r\nnamespace Wooduduk.Audio\r\n{\r\n    // 장작 충돌 사운드 게이트키퍼 \r\n    public sealed class WoodImpactAudio : MonoBehaviour\r\n    {\r\n        [SerializeField, Min(0f)] private float _globalMinInterval = 0.06f; // 전체 최소 간격(동시 착지 스팸 컷)\r\n        [SerializeField, Min(1)] private int _maxPerWindow = 5;             // 윈도우당 최대 재생 수\r\n        [SerializeField, Min(0.1f)] private float _window = 0.5f;           // 윈도우 길이(초)\r\n        [SerializeField, Range(0f, 1f)] private float _minStrength = 0.05f; // 약한 접촉 무시\r\n\r\n        private float _lastPlay = -999f, _windowStart;\r\n        private int _count;\r\n\r\n        private void OnEnable() => WoodEvent.OnWoodImpact += Handle;\r\n        private void OnDisable() => WoodEvent.OnWoodImpact -= Handle;\r\n\r\n        private void Handle(Vector3 pos, float strength01)\r\n        {\r\n            if (strength01 < _minStrength) return;\r\n            float now = Time.time;\r\n            if (now - _lastPlay < _globalMinInterval) return;\r\n            if (now - _windowStart > _window) { _windowStart = now; _count = 0; }\r\n            if (_count >= _maxPerWindow) return;\r\n            _count++; _lastPlay = now;\r\n            var s = SoundManager.Instance;\r\n            if (s != null) s.PlaySfxAt(SfxId.WoodImpact, pos);   // 3D + 레이어(퉁 + 나무 마찰)\r\n        }\r\n    }\r\n}","lines":34},{"id":"Scripts/UI/HudController.cs","name":"HudController","path":"Scripts/UI/HudController.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"HudController 장작(firewood) 표시 제거판. · 장작은 FirewoodBinder가 SlotmachineController.Run에서 직접 읽어 전담 → 여기선 안 만짐. · gold/token은 아직 InventoryService(스텁) 그대로 유지. 지갑 어댑터(UserManager 연동) 작업 때 한 번에 교체 예정.","src":"// HudController — 장작(firewood) 표시 제거판.\r\n//   · 장작은 FirewoodBinder가 SlotmachineController.Run에서 직접 읽어 전담 → 여기선 안 만짐.\r\n//   · gold/token은 아직 InventoryService(스텁) 그대로 유지. 지갑 어댑터(UserManager 연동) 작업 때 한 번에 교체 예정.\r\nusing UnityEngine;\r\nusing UnityEngine.UIElements;\r\nusing Wooduduk.Tier;               // TierService, TierEvents, TierProgress, AxeTier\r\nusing Wooduduk.Network.Firebase;   // UserManager (닉네임 소스)\r\nusing Wooduduk.Data.Static;        // UserData._userNick\r\nusing Wooduduk.FX;\r\nusing Wooduduk.Slot.Machine;               // SlotmachineController (IsSpinning) ← 네임스페이스 다르면 이 줄만 조정\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    public class HudController : MonoBehaviour\r\n    {\r\n        [SerializeField] private UIDocument uiDocument;\r\n        [SerializeField] private ShopController shopController;\r\n        [SerializeField] private SettingsController settingsController;\r\n        [SerializeField] private MultiplayerController multiplayerController;\r\n        [SerializeField] private LeaderboardController leaderboardController;\r\n\r\n        // 슬롯 회전 상태(IsSpinning)를 읽어 스핀 중엔 멀티·상점 버튼을 잠근다. 인스펙터에서 드래그.\r\n        // 미할당이면 잠금 없이 그대로 동작(안전 폴백).\r\n        [SerializeField] private SlotmachineController slot;\r\n\r\n        // 티어: 도끼 등급 7단계 스프라이트 [0]막대기 ~ [6]다이아 (인스펙터에서 크기 7로)\r\n        [SerializeField] private Sprite[] axeSprites;\r\n\r\n        private Label goldLabel, tokenLabel;\r\n        private Label tierRankLabel, tierLpLabel;\r\n        private Label nicknameLabel;\r\n        private VisualElement tierAxe;\r\n        private PlayerInventory inv;\r\n\r\n        // 스핀 중 잠글 버튼(멀티·상점). Update에서 토글하려고 필드로 승격.\r\n        private Button shopBtn, multiBtn;\r\n        private bool lastSpinning = false; // 상태 바뀔 때만 SetEnabled 호출(매 프레임 낭비 방지)\r\n\r\n        // 변경 감지용 직전값 (폴링)\r\n        private int lastGold = -1, lastToken = -1;\r\n        private string lastNick = null;\r\n\r\n        // static 이벤트 → 구독/해제 짝 필수(누수 방지)\r\n        void OnEnable() => TierEvents.OnTierChanged += HandleTierChanged;\r\n        void OnDisable() => TierEvents.OnTierChanged -= HandleTierChanged;\r\n\r\n        void Start()\r\n        {\r\n            inv = InventoryService.GetOrCreate();\r\n\r\n            var root = uiDocument.rootVisualElement;\r\n            UiSfxHover.BindAll(root);\r\n            goldLabel = root.Q<Label>(\"gold-label\");\r\n            tokenLabel = root.Q<Label>(\"token-label\");\r\n\r\n            tierRankLabel = root.Q<Label>(\"tier-rank-label\");\r\n            tierLpLabel = root.Q<Label>(\"tier-lp-label\");\r\n            tierAxe = root.Q<VisualElement>(\"tier-axe\");\r\n            nicknameLabel = root.Q<Label>(\"hud-nickname\");\r\n\r\n            shopBtn = root.Q<Button>(\"shop-button\");\r\n            multiBtn = root.Q<Button>(\"multiplayer-button\");\r\n            var settingsBtn = root.Q<Button>(\"settings-button\");\r\n            var leaderboardBtn = root.Q<Button>(\"leaderboard-button\");\r\n\r\n            shopBtn.clicked += OpenShop;\r\n            multiBtn.clicked += OpenMultiplayer;\r\n            settingsBtn.clicked += OpenSettings;\r\n            leaderboardBtn.clicked += OpenLeaderboard;\r\n\r\n            // 초기 1회: 저장된 현재 티어를 조회(pull)해서 칩 채움.\r\n            // 이후 변동은 OnTierChanged(push)로 갱신. (켜고 진입한 시점엔 이벤트가 아직 안 옴)\r\n            var tier = TierService.Instance;\r\n            if (tier != null) ApplyTier(tier.CurrentRank, tier.CurrentLp);\r\n            else Debug.LogWarning(\"[HUD] TierService.Instance 없음 — dev 씬에 TierService 프리팹 배치 필요(한충희)\");\r\n\r\n            RefreshCurrency(force: true);\r\n            RefreshNickname();\r\n        }\r\n\r\n        void Update()\r\n        {\r\n            RefreshCurrency(force: false);\r\n            RefreshNickname();\r\n            RefreshSpinLock();   // 스핀 중 멀티·상점 버튼 잠금\r\n        }\r\n\r\n        // 슬롯이 도는 동안 멀티·상점 버튼을 비활성(클릭 차단 + 회색 처리).\r\n        // SetEnabled(false)는 \"지금 못 누른다\"는 시각 피드백까지 함께 줌.\r\n        // 상태가 바뀌는 순간에만 토글해 매 프레임 스타일 갱신을 피한다.\r\n        private void RefreshSpinLock()\r\n        {\r\n            if (slot == null) return;   // 슬롯 미할당이면 잠금 없이 통과(안전)\r\n\r\n            bool spinning = slot.IsSpinning;\r\n            if (spinning == lastSpinning) return;\r\n\r\n            if (shopBtn != null) shopBtn.SetEnabled(!spinning);\r\n            if (multiBtn != null) multiBtn.SetEnabled(!spinning);\r\n            lastSpinning = spinning;\r\n        }\r\n\r\n        private void RefreshCurrency(bool force)\r\n        {\r\n            if (force || inv.gold != lastGold)\r\n            {\r\n                goldLabel.text = inv.gold.ToString();\r\n                lastGold = inv.gold;\r\n            }\r\n            if (force || inv.token != lastToken)\r\n            {\r\n                tokenLabel.text = inv.token.ToString();\r\n                lastToken = inv.token;\r\n            }\r\n        }\r\n\r\n        // 닉네임: UserManager.CurrentUserData._userNick를 폴링해서 갱신.\r\n        //   유저 데이터는 로그인 후 비동기로 들어오므로 Start 시점엔 null일 수 있다.\r\n        //   → 매 프레임 싸게 확인하다가, 값이 들어오거나 바뀌면 그때 한 번 라벨 갱신(바뀔 때만).\r\n        //   (닉네임은 세션 중 거의 안 변하므로 폴링 비용은 무시할 수준. 이벤트 구독은 추후 개선 후보.)\r\n        private void RefreshNickname()\r\n        {\r\n            if (nicknameLabel == null) return;\r\n\r\n            var um = UserManager.Instance;\r\n            string nick = (um != null && um.CurrentUserData != null)\r\n                ? um.CurrentUserData._userNick\r\n                : null;\r\n            if (string.IsNullOrEmpty(nick)) nick = \"플레이어\";   // 로드 전 폴백\r\n\r\n            if (nick != lastNick)\r\n            {\r\n                nicknameLabel.text = nick;\r\n                lastNick = nick;\r\n            }\r\n        }\r\n\r\n        // 런 종료로 티어 변동(push). HUD는 \"현재 상태\"만 갱신(델타·연출은 결과창 담당).\r\n        private void HandleTierChanged(TierProgress p)\r\n        {\r\n            ApplyTier(p.NewState.Rank, p.NewState.Lp);\r\n        }\r\n\r\n        private void ApplyTier(AxeTier rank, int lp)\r\n        {\r\n            if (tierRankLabel != null) tierRankLabel.text = ToKorean(rank);\r\n            if (tierLpLabel != null) tierLpLabel.text = \"LP \" + lp;\r\n\r\n            if (tierAxe != null && axeSprites != null\r\n                && (int)rank < axeSprites.Length && axeSprites[(int)rank] != null)\r\n                tierAxe.style.backgroundImage = new StyleBackground(axeSprites[(int)rank]);\r\n        }\r\n\r\n        private static string ToKorean(AxeTier t)\r\n        {\r\n            switch (t)\r\n            {\r\n                case AxeTier.Stick: return \"막대기\";\r\n                case AxeTier.Wood: return \"나무 도끼\";\r\n                case AxeTier.Stone: return \"돌 도끼\";\r\n                case AxeTier.Iron: return \"철 도끼\";\r\n                case AxeTier.Silver: return \"은 도끼\";\r\n                case AxeTier.Gold: return \"금 도끼\";\r\n                case AxeTier.Diamond: return \"다이아 도끼\";\r\n                default: return t.ToString();\r\n            }\r\n        }\r\n\r\n        private void OpenShop()\r\n        {\r\n            settingsController.Hide();\r\n            multiplayerController.Hide();\r\n            shopController.Show();\r\n        }\r\n\r\n        private void OpenMultiplayer()\r\n        {\r\n            shopController.Hide();\r\n            settingsController.Hide();\r\n            multiplayerController.Show();\r\n        }\r\n\r\n        private void OpenSettings()\r\n        {\r\n            shopController.Hide();\r\n            multiplayerController.Hide();\r\n            settingsController.Show();\r\n        }\r\n\r\n        private void OpenLeaderboard()\r\n        {\r\n            leaderboardController.Show();\r\n        }\r\n    }\r\n}","lines":195},{"id":"Scripts/UI/EffectsController.cs","name":"EffectsController","path":"Scripts/UI/EffectsController.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"\"적용 중 효과\" 표시 컨트롤러 카드 패널(영구) + 막걸리 패널(임시·남은스핀). 격리: 효과 정의는 IEffectSource, \"켜짐/남은스핀\"은 게임플레이가 진입점으로 통보(체온 정신). 진입점(개별 토글, A안): AddCard(id) / RemoveCard(id) / ClearCards() ← 카드(런 지속) SetMakgeolli(id, 남은스핀) / RemoveMakgeolli(id) ← 막걸리(남은스핀<=0이면 ","src":"// \"적용 중 효과\" 표시 컨트롤러 — 카드 패널(영구) + 막걸리 패널(임시·남은스핀).\r\n// 격리: 효과 정의는 IEffectSource, \"켜짐/남은스핀\"은 게임플레이가 진입점으로 통보(체온 정신).\r\n// 진입점(개별 토글, A안):\r\n//   AddCard(id) / RemoveCard(id) / ClearCards()           ← 카드(런 지속)\r\n//   SetMakgeolli(id, 남은스핀) / RemoveMakgeolli(id)        ← 막걸리(남은스핀<=0이면 자동 제거)\r\n//\r\n// [릴 정지 대기] 막걸리 표시는 릴이 다 멈춘 뒤에 반영한다(장작 바인더와 동일 정신).\r\n//   SetMakgeolli가 스핀 도중 호출되면 즉시 그리지 않고, slot.IsSpinning이 false가 될 때까지\r\n//   기다렸다가(코루틴) 반영한다. slot 미할당이면 즉시 반영(기존 동작).\r\nusing System.Collections;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing UnityEngine.UIElements;\r\nusing Wooduduk.Slot.Machine;   // SlotmachineController (릴 회전 상태 확인)\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    public class EffectsController : MonoBehaviour\r\n    {\r\n        [SerializeField] private UIDocument uiDocument;   // HUD와 같은 UIDocument를 드래그\r\n        [SerializeField] private Wooduduk.Data.DataSO.DataManagerSO dataManager;  // 진짜 효과 정의 출처 (Inspector 드래그)\r\n        [SerializeField] private SlotmachineController slot;   // 릴 회전 상태 확인용 (FirewoodBinder와 같은 slot 드래그)\r\n        [SerializeField] private bool previewOnStart = false;  // 레이아웃 확인용 샘플. 실연동에선 끔(게임플레이가 채움).\r\n\r\n        private IEffectSource source;\r\n        private Dictionary<string, EffectInfo> defs;      // id -> 정의 (이름/분류/버프)\r\n\r\n        private VisualElement cardPanel, cardList, makgeolliPanel, makgeolliList;\r\n        private readonly Dictionary<string, VisualElement> cardChips = new Dictionary<string, VisualElement>();\r\n        private readonly Dictionary<string, VisualElement> makChips = new Dictionary<string, VisualElement>();\r\n        private readonly Dictionary<string, Label> makSpinLabels = new Dictionary<string, Label>();\r\n\r\n        // 릴 정지 대기: 스핀 중 들어온 SetMakgeolli 요청을 모았다가, 릴이 멈추면 한 번에 반영.\r\n        //   key=막걸리 id, value=요청된 남은 스핀(0 이하이면 제거). 같은 id는 마지막 값으로 덮어씀.\r\n        private readonly Dictionary<string, int> pendingMak = new Dictionary<string, int>();\r\n        private Coroutine flushRoutine;\r\n\r\n        // 리스트가 비었을 때 보여줄 \"효과 없음\" 라벨 (카드/막걸리 각각)\r\n        private Label cardEmptyLabel, makEmptyLabel;\r\n\r\n        // hover 상세 팝업 (UXML의 effect-tooltip). Start에서 잡아두고 enter/leave로 토글.\r\n        private VisualElement effectTooltip;\r\n        private Label effectTooltipTitle, effectTooltipText;\r\n        private VisualElement hudRoot;   // 툴팁 위치 계산 기준(패널 좌표)\r\n\r\n        void Awake()\r\n        {\r\n            // dataManager가 꽂혀 있으면 진짜 정의, 아니면 스텁으로 폴백(안전)\r\n            source = dataManager != null\r\n                ? (IEffectSource)new ScriptableObjectEffectSource(dataManager)\r\n                : new StubEffectSource();\r\n            defs = new Dictionary<string, EffectInfo>();\r\n            foreach (var e in source.GetAll()) defs[e.id] = e;\r\n        }\r\n\r\n        void Start()\r\n        {\r\n            var root = uiDocument.rootVisualElement;\r\n            hudRoot = root;\r\n            cardPanel = root.Q<VisualElement>(\"card-panel\");\r\n            cardList = root.Q<VisualElement>(\"card-list\");\r\n            makgeolliPanel = root.Q<VisualElement>(\"makgeolli-panel\");\r\n            makgeolliList = root.Q<VisualElement>(\"makgeolli-list\");\r\n\r\n            // hover 상세 팝업 요소 (없으면 hover 기능만 조용히 비활성)\r\n            effectTooltip = root.Q<VisualElement>(\"effect-tooltip\");\r\n            effectTooltipTitle = root.Q<Label>(\"effect-tooltip-title\");\r\n            effectTooltipText = root.Q<Label>(\"effect-tooltip-text\");\r\n            if (effectTooltip != null) effectTooltip.style.display = DisplayStyle.None;\r\n\r\n            // slot 미할당 대비: 인스펙터에 안 꽂혔으면 씬에서 자동으로 찾는다.\r\n            //   (이게 null이면 릴 정지 대기가 안 걸려 막걸리가 스핀 중에 떠버림)\r\n            if (slot == null) slot = FindObjectOfType<SlotmachineController>();\r\n            Debug.Log($\"[Effects] slot 참조 = {(slot != null ? slot.name : \"NULL (릴 대기 비활성)\")}\");\r\n\r\n            Debug.Log($\"[Effects] cardPanel={cardPanel != null} cardList={cardList != null} makPanel={makgeolliPanel != null} makList={makgeolliList != null}\");\r\n\r\n            RefreshPanels();\r\n\r\n            if (previewOnStart) SeedPreview();\r\n\r\n            Debug.Log($\"[Effects] 시드 후 칩 개수: cards={cardChips.Count} mak={makChips.Count}\");\r\n        }\r\n\r\n        // 레이아웃 확인용 샘플. previewOnStart 끄면 안 뜬다.\r\n        private void SeedPreview()\r\n        {\r\n            // 카드 미리보기 제거(테스트 방해). 필요하면 아래 두 줄 복구.\r\n            // AddCard(\"card_aluminum_bat\");\r\n            // AddCard(\"card_insurance\");\r\n            SetMakgeolli(\"mak_burning_axe\", 5);\r\n            SetMakgeolli(\"mak_hiccup\", 2);\r\n        }\r\n\r\n        // ===== 카드 (런 지속, 카운트다운 없음) =====\r\n        public void AddCard(string id)\r\n        {\r\n            Debug.Log($\"[Effects] AddCard 요청 id='{id}' / defs에 있나={defs.ContainsKey(id)}\");\r\n            if (cardList == null || cardChips.ContainsKey(id)) return;\r\n            if (!defs.TryGetValue(id, out var info)) return;\r\n\r\n            var chip = new VisualElement();\r\n            chip.AddToClassList(\"card-chip\");\r\n            chip.pickingMode = PickingMode.Position;   // hover 상세를 받으려면 마우스 수신 필요\r\n\r\n            var dot = new VisualElement();\r\n            dot.AddToClassList(\"card-dot\");\r\n            chip.Add(dot);\r\n\r\n            var name = new Label(info.displayName);\r\n            name.AddToClassList(\"card-chip-text\");\r\n            chip.Add(name);\r\n\r\n            cardList.Add(chip);\r\n            cardChips[id] = chip;\r\n            AttachHover(chip, info);\r\n            RefreshPanels();\r\n        }\r\n\r\n        public void RemoveCard(string id)\r\n        {\r\n            if (!cardChips.TryGetValue(id, out var chip)) return;\r\n            chip.RemoveFromHierarchy();\r\n            cardChips.Remove(id);\r\n            RefreshPanels();\r\n        }\r\n\r\n        public void ClearCards()\r\n        {\r\n            if (cardList != null) cardList.Clear();\r\n            cardChips.Clear();\r\n            cardEmptyLabel = null;   // Clear()로 라벨도 떨어졌으니 참조 리셋\r\n            RefreshPanels();\r\n        }\r\n\r\n        // ===== 막걸리 (임시 · 남은 스핀) =====\r\n        // remainingSpins <= 0 이면 제거. 이미 있으면 숫자만 갱신(업서트).\r\n        //\r\n        // 릴이 도는 중이면 즉시 반영하지 않고 pending에 모아뒀다가, 릴이 멈춘 뒤 한 번에 반영한다.\r\n        // (slot 미할당이면 대기 없이 즉시 반영 → 기존 동작 그대로)\r\n        public void SetMakgeolli(string id, int remainingSpins)\r\n        {\r\n            if (makgeolliList == null) return;\r\n\r\n            if (slot != null && slot.IsSpinning)\r\n            {\r\n                pendingMak[id] = remainingSpins;   // 같은 id면 마지막 요청으로 덮음\r\n                if (flushRoutine == null) flushRoutine = StartCoroutine(FlushMakgeolliAfterReels());\r\n                return;\r\n            }\r\n\r\n            ApplyMakgeolli(id, remainingSpins);\r\n        }\r\n\r\n        // 릴이 멈출 때까지 기다렸다가, 스핀 중 쌓인 막걸리 요청을 한꺼번에 반영.\r\n        private IEnumerator FlushMakgeolliAfterReels()\r\n        {\r\n            yield return new WaitWhile(() => slot != null && slot.IsSpinning);\r\n\r\n            // 순회 중 컬렉션 변경 방지: 스냅샷 뜬 뒤 반영하고 pending 비움.\r\n            var snapshot = new List<KeyValuePair<string, int>>(pendingMak);\r\n            pendingMak.Clear();\r\n            flushRoutine = null;\r\n\r\n            foreach (var kv in snapshot)\r\n                ApplyMakgeolli(kv.Key, kv.Value);\r\n        }\r\n\r\n        // 실제 UI 반영(칩 생성/갱신/제거). 대기 없이 즉시 그린다.\r\n        private void ApplyMakgeolli(string id, int remainingSpins)\r\n        {\r\n            if (makgeolliList == null) return;\r\n            if (remainingSpins <= 0) { RemoveMakgeolli(id); return; }\r\n            if (!defs.TryGetValue(id, out var info)) return;\r\n\r\n            if (makChips.ContainsKey(id))\r\n            {\r\n                if (makSpinLabels.TryGetValue(id, out var sl)) sl.text = remainingSpins.ToString();\r\n                return;\r\n            }\r\n\r\n            var chip = new VisualElement();\r\n            chip.AddToClassList(\"mak-chip\");\r\n            chip.pickingMode = PickingMode.Position;   // hover 상세를 받으려면 마우스 수신 필요\r\n\r\n            var tag = new Label(info.isBuff ? \"버프\" : \"디버프\");\r\n            tag.AddToClassList(\"mak-tag\");\r\n            tag.AddToClassList(info.isBuff ? \"mak-tag--buff\" : \"mak-tag--debuff\");\r\n            chip.Add(tag);\r\n\r\n            var name = new Label(info.displayName);\r\n            name.AddToClassList(\"mak-name\");\r\n            chip.Add(name);\r\n\r\n            var spin = new Label(remainingSpins.ToString());\r\n            spin.AddToClassList(\"mak-spin\");\r\n            chip.Add(spin);\r\n\r\n            makgeolliList.Add(chip);\r\n            makChips[id] = chip;\r\n            makSpinLabels[id] = spin;\r\n            AttachHover(chip, info);\r\n            RefreshPanels();\r\n        }\r\n\r\n        public void RemoveMakgeolli(string id)\r\n        {\r\n            if (!makChips.TryGetValue(id, out var chip)) return;\r\n            chip.RemoveFromHierarchy();\r\n            makChips.Remove(id);\r\n            makSpinLabels.Remove(id);\r\n            RefreshPanels();\r\n        }\r\n\r\n        // ===== hover 상세 팝업 =====\r\n        // 칩에 마우스가 들어오면 해당 효과의 설명을 팝업으로 띄우고, 나가면 숨긴다.\r\n        // 설명(description)이 비어 있으면 \"설명 준비 중\"으로 폴백 → 실데이터 SO 연결 전에도 UI 검증 가능.\r\n        private void AttachHover(VisualElement chip, EffectInfo info)\r\n        {\r\n            if (chip == null || effectTooltip == null) return;\r\n\r\n            string title = info.displayName;\r\n            string desc = string.IsNullOrEmpty(info.description) ? \"설명 준비 중\" : info.description;\r\n\r\n            chip.RegisterCallback<MouseEnterEvent>(_ => ShowTooltip(title, desc, chip));\r\n            chip.RegisterCallback<MouseLeaveEvent>(_ => HideTooltip());\r\n        }\r\n\r\n        private void ShowTooltip(string title, string desc, VisualElement anchor)\r\n        {\r\n            if (effectTooltip == null) return;\r\n\r\n            if (effectTooltipTitle != null) effectTooltipTitle.text = title;\r\n            if (effectTooltipText != null) effectTooltipText.text = desc;\r\n\r\n            effectTooltip.style.display = DisplayStyle.Flex;\r\n\r\n            var b = anchor.worldBound;        // 칩(패널 좌표계)\r\n            var rootB = hudRoot.worldBound;   // hud-root 원점/크기\r\n            float gap = 6f;\r\n\r\n            // 폭을 추정하지 않고, 툴팁의 \"오른쪽 모서리\"를 칩 왼쪽 모서리에 붙인다.\r\n            //   style.right = 부모(hud-root) 오른쪽에서의 거리 → 원하는 오른쪽 X를 거리로 환산.\r\n            //   left/width는 auto라 내용만큼 왼쪽으로 늘어남 → 항상 카드에 딱 붙음.\r\n            float desiredRightX = b.xMin - gap;\r\n\r\n            if (desiredRightX - rootB.xMin < 250f)\r\n            {\r\n                // (예외) 왼쪽 공간이 부족하면 칩 오른쪽으로 연다.\r\n                effectTooltip.style.right = StyleKeyword.Auto;\r\n                effectTooltip.style.left = b.xMax + gap - rootB.xMin;\r\n            }\r\n            else\r\n            {\r\n                effectTooltip.style.left = StyleKeyword.Auto;\r\n                effectTooltip.style.right = rootB.xMax - desiredRightX;\r\n            }\r\n            effectTooltip.style.top = b.yMin - rootB.yMin;\r\n        }\r\n\r\n        private void HideTooltip()\r\n        {\r\n            if (effectTooltip != null) effectTooltip.style.display = DisplayStyle.None;\r\n        }\r\n\r\n        // 카드·막걸리 패널은 비어 있어도 항상 표시하고, 비면 안에 \"효과 없음\"을 넣는다.\r\n        private void RefreshPanels()\r\n        {\r\n            if (cardPanel != null) cardPanel.style.display = DisplayStyle.Flex;\r\n            if (makgeolliPanel != null) makgeolliPanel.style.display = DisplayStyle.Flex;\r\n\r\n            RefreshEmpty(cardList, ref cardEmptyLabel, cardChips.Count);\r\n            RefreshEmpty(makgeolliList, ref makEmptyLabel, makChips.Count);\r\n        }\r\n\r\n        // 리스트가 비면 \"효과 없음\" 라벨을 넣고, 차면 뺀다.\r\n        private void RefreshEmpty(VisualElement list, ref Label label, int count)\r\n        {\r\n            if (list == null) return;\r\n\r\n            if (count == 0)\r\n            {\r\n                if (label == null)\r\n                {\r\n                    label = new Label(\"효과 없음\");\r\n                    label.AddToClassList(\"effect-empty\");   // USS로 색·여백 손보고 싶으면 이 클래스\r\n                    label.pickingMode = PickingMode.Ignore;\r\n                    label.style.color = new Color(1f, 1f, 1f, 0.4f);\r\n                    label.style.fontSize = 13f;\r\n                }\r\n                if (label.parent != list) list.Add(label);\r\n            }\r\n            else\r\n            {\r\n                if (label != null && label.parent == list) label.RemoveFromHierarchy();\r\n            }\r\n        }\r\n    }\r\n}","lines":299},{"id":"Scripts/UI/FirewoodBinder.cs","name":"FirewoodBinder","path":"Scripts/UI/FirewoodBinder.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"게임플레이의 장작 값을 HUD firewood-label(정산/banked)에 표시하는 바인더. [비용 즉시 · 획득 나중 왜 이렇게 짜는가] 슬롯을 \"누르는 즉시\" _machine.Spin()이 이번 스핀의 모든 장작 변동을 Run에 반영한다. · 스핀 비용 : TryPaySpin에서 banked -= cost (클릭 직후, Spin 이전) · 도토리 획득 : Apply에서 banked += AcornWood · 명중 획득 ","src":"// 게임플레이의 장작 값을 HUD firewood-label(정산/banked)에 표시하는 바인더.\r\n//\r\n// [비용 즉시 · 획득 나중 — 왜 이렇게 짜는가]\r\n//   슬롯을 \"누르는 즉시\" _machine.Spin()이 이번 스핀의 모든 장작 변동을 Run에 반영한다.\r\n//     · 스핀 비용   : TryPaySpin에서  banked   -= cost        (클릭 직후, Spin 이전)\r\n//     · 도토리 획득 : Apply에서        banked   += AcornWood\r\n//     · 명중 획득   : Apply에서        unsettled += WoodStack  (HUD엔 unsettled 미표시)\r\n//   → 이벤트가 울리는 시점의 Run은 이미 \"비용도 빠지고 획득도 더해진\" 최종값이다.\r\n//\r\n//   그런데 연출 요구는 \"비용은 클릭 즉시 표시 / 획득(도토리)은 릴이 멈춘 뒤 표시\".\r\n//   Run엔 최종값밖에 없으므로, 획득 이전의 중간값을 직접 계산해서 만든다:\r\n//       클릭 즉시 표시 banked = 최종 banked − Applied.AcornWood   (= 비용만 빠진 값)\r\n//       릴 정지 후 표시 banked = 최종 banked                       (= 도토리까지 공개)\r\n//   재료(최종값 + 이번 획득량)는 OnSpinJudged가 싣고 오는 SpinOutcome에 다 들어 있다.\r\n//   → payload 없는 OnSpinStarted가 아니라 OnSpinJudged(Action<SpinOutcome>)를 구독한다.\r\n//\r\n//   정산(OnSettled)·모닥불(OnFireFed)·카드(OnCardBought)·리셋(OnRunReset)은\r\n//   릴 회전과 무관한 즉시 동작 → Run에서 바로 읽어 갱신.\r\n//\r\n// 표시 의미(기획): UnsettledWood = 굴리는 중(실패 시 소실) / BankedWood = 안전 확보.\r\n//   ※ 미정산 표시는 기획상 제거됨 → unsettledLabel이 없어도 banked는 갱신되도록 각 라벨 독립 가드.\r\n//\r\n// 배치: HUD 오브젝트에 붙이고 Inspector에서 uiDocument(HUD)와 slot을 드래그.\r\nusing System.Collections;\r\nusing UnityEngine;\r\nusing UnityEngine.UIElements;\r\nusing Wooduduk.Slot;           // SlotEvent, RunProgress, SpinApplied, CardEvent\r\nusing Wooduduk.Slot.Machine;   // SlotmachineController, SpinOutcome\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    public class FirewoodBinder : MonoBehaviour\r\n    {\r\n        [SerializeField] private UIDocument uiDocument;        // HUD와 같은 UIDocument (드래그)\r\n        [SerializeField] private SlotmachineController slot;   // 게임플레이 창구 (같은 씬, 드래그)\r\n\r\n        private Label unsettledLabel;   // 미정산(슬롯 옆) — 기획상 없을 수 있음\r\n        private Label bankedLabel;      // 정산(장작 옆)\r\n        private long lastUnsettled = -1;\r\n        private long lastBanked = -1;\r\n\r\n        void Start()\r\n        {\r\n            var root = uiDocument != null ? uiDocument.rootVisualElement : null;\r\n            unsettledLabel = root?.Q<Label>(\"firewood-unsettled\");\r\n            bankedLabel = root?.Q<Label>(\"firewood-banked\");\r\n            Debug.Log($\"[Firewood] unsettled={unsettledLabel != null}, banked={bankedLabel != null}\");\r\n\r\n            Refresh();   // 시작 시 1회 초기 표시\r\n        }\r\n\r\n        void OnEnable()\r\n        {\r\n            SlotEvent.OnSpinJudged += OnSpinJudged;     // 비용 즉시 표시 + 릴 정지 후 획득 공개\r\n            SlotEvent.OnSettled += OnSettled;\r\n            SlotEvent.OnFireFed += OnFireFed;\r\n            SlotEvent.OnRunReset += OnRunReset;         // 게임 초기화 시 즉시 리셋\r\n            CardEvent.OnCardBought += OnCardBought;     // 카드 구매(장작 결제) 즉시 갱신\r\n        }\r\n\r\n        void OnDisable()\r\n        {\r\n            SlotEvent.OnSpinJudged -= OnSpinJudged;\r\n            SlotEvent.OnSettled -= OnSettled;\r\n            SlotEvent.OnFireFed -= OnFireFed;\r\n            SlotEvent.OnRunReset -= OnRunReset;\r\n            CardEvent.OnCardBought -= OnCardBought;\r\n        }\r\n\r\n        // 스핀 판정(클릭 직후 울림). outcome에 최종값 + 이번 획득량이 모두 실려 온다.\r\n        //   클릭 즉시 : 비용은 반영(이미 banked에서 빠짐), 획득분(도토리·명중)은 숨긴 중간값.\r\n        //   릴 정지 후 : 획득분까지 반영한 최종값 공개.\r\n        private void OnSpinJudged(SpinOutcome outcome)\r\n        {\r\n            StopAllCoroutines();   // 빠른 연속 스핀: 이전 공개 대기 취소\r\n\r\n            long unsettledMid = outcome.UnsettledWood - outcome.Applied.WoodStack; // 명중 획득 숨김\r\n            long bankedMid = outcome.BankedWood - outcome.Applied.AcornWood; // 도토리 획득 숨김\r\n            SetWood(unsettledMid, bankedMid);\r\n\r\n            StartCoroutine(RevealAfterReels(outcome.UnsettledWood, outcome.BankedWood));\r\n        }\r\n\r\n        // 정산·모닥불은 릴 회전과 무관 → 즉시 갱신\r\n        private void OnSettled(RunProgress _, long __) => Refresh();\r\n        private void OnFireFed(RunProgress _) => Refresh();\r\n\r\n        // 런 리셋/부활: 장작 표시 즉시 초기화\r\n        private void OnRunReset(RunProgress _) => Refresh();\r\n\r\n        // 카드 구매: 장작으로 결제되므로 스핀 안 기다리고 즉시 갱신.\r\n        private void OnCardBought(string cardId, bool success)\r\n        {\r\n            if (!success) return;\r\n            Refresh();\r\n        }\r\n\r\n        // 릴이 멈출 때까지(IsSpinning == false) 기다렸다가 획득분까지 반영한 최종값 공개.\r\n        private IEnumerator RevealAfterReels(long unsettledFinal, long bankedFinal)\r\n        {\r\n            yield return new WaitWhile(() => slot != null && slot.IsSpinning);\r\n            SetWood(unsettledFinal, bankedFinal);\r\n        }\r\n\r\n        // 지정한 값으로 라벨 세팅 (바뀐 라벨만 텍스트 재작성). 스핀 중간값/최종값 공통 진입점.\r\n        private void SetWood(long unsettled, long banked)\r\n        {\r\n            if (bankedLabel == null) return;\r\n\r\n            if (unsettled != lastUnsettled)\r\n            {\r\n                if (unsettledLabel != null) unsettledLabel.text = unsettled.ToString();\r\n                lastUnsettled = unsettled;\r\n            }\r\n            if (banked != lastBanked)\r\n            {\r\n                bankedLabel.text = banked.ToString();\r\n                lastBanked = banked;\r\n            }\r\n        }\r\n\r\n        // 현재 Run 값을 그대로 읽어 세팅 (스핀과 무관한 즉시 동작: 정산·모닥불·카드·리셋·초기표시)\r\n        private void Refresh()\r\n        {\r\n            if (slot == null) return;\r\n            var run = slot.Run;\r\n            if (run == null) return;\r\n            SetWood(run.UnsettledWood, run.BankedWood);\r\n        }\r\n    }\r\n}","lines":131},{"id":"Scripts/UI/TemperatureBinder.cs","name":"TemperatureBinder","path":"Scripts/UI/TemperatureBinder.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"게임플레이(SlotmachineController)가 열어둔 체온 값을 매 프레임 읽어 TemperatureController.SetTemperature에 흘려넣는 \"연결\" 컴포넌트. 왜 이렇게 분리했나: - TemperatureController는 \"표시 전용 + SetTemperature 진입점\"으로 이미 완성돼 있음(안 건드림). - 게임플레이는 BodyTempNormalized(0~1)를 \"UI가 읽어가라\"고 열어둠(p","src":"// 게임플레이(SlotmachineController)가 열어둔 체온 값을\r\n// 매 프레임 읽어 TemperatureController.SetTemperature에 흘려넣는 \"연결\" 컴포넌트.\r\n//\r\n// 왜 이렇게 분리했나:\r\n//  - TemperatureController는 \"표시 전용 + SetTemperature 진입점\"으로 이미 완성돼 있음(안 건드림).\r\n//  - 게임플레이는 BodyTempNormalized(0~1)를 \"UI가 읽어가라\"고 열어둠(push 아님, pull).\r\n//  - 이 컴포넌트가 그 둘을 잇는다: 매 프레임 읽어서(pull) → 진입점에 넣음(push 진입점 재사용).\r\n//\r\n// 배치: HUD 오브젝트(TemperatureController와 같은 오브젝트)에 붙이고,\r\n//       Inspector에서 slot(씬의 SlotmachineController)과 temp를 드래그.\r\nusing UnityEngine;\r\nusing Wooduduk.Slot.Machine;   // SlotmachineController\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    public class TemperatureBinder : MonoBehaviour\r\n    {\r\n        [SerializeField] private SlotmachineController slot;   // 게임플레이 창구 (같은 씬, 드래그)\r\n        [SerializeField] private TemperatureController temp;   // 내 게이지 (같은 오브젝트, 드래그)\r\n\r\n        void Update()\r\n        {\r\n            if (slot == null || temp == null) return;\r\n\r\n            // 게임플레이가 0~1로 미리 계산해둔 체온을 그대로 진입점에 전달.\r\n            // (게임 시작 전엔 BodyTempNormalized가 1f 반환하도록 게임플레이가 가드해둠)\r\n            temp.SetTemperature(slot.BodyTempNormalized);\r\n        }\r\n    }\r\n}","lines":30},{"id":"Scripts/UI/Effectsbinder.cs","name":"Effectsbinder","path":"Scripts/UI/Effectsbinder.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"게임플레이의 활성 효과(ActiveEffects)를 EffectsController 패널에 동기화하는 바인더. [전체 목록 재동기화 방식 장작 바인더와 같은 정신] 개별 신호의 payload를 쫓지 않는다. 막걸리 카운트다운(TickDown)이나 만료는 별도 신호가 없기 때문. 대신 트리거가 오면 ActiveEffects \"전체\"를 다시 읽어 패널을 통째로 맞춘다 → 추가/카운트다운/만료가 한 번에 따라옴. SlotEffect","src":"// 게임플레이의 활성 효과(ActiveEffects)를 EffectsController 패널에 동기화하는 바인더.\r\n//\r\n// [전체 목록 재동기화 방식 — 장작 바인더와 같은 정신]\r\n//   개별 신호의 payload를 쫓지 않는다. 막걸리 카운트다운(TickDown)이나 만료는\r\n//   별도 신호가 없기 때문. 대신 트리거가 오면 ActiveEffects \"전체\"를 다시 읽어\r\n//   패널을 통째로 맞춘다 → 추가/카운트다운/만료가 한 번에 따라옴.\r\n//\r\n//   SlotEffect.IsPermanent(RemainingSpins<0)로 카드/막걸리를 가른다:\r\n//     · 카드(영구)   → AddCard(id)        (남은스핀 개념 없음)\r\n//     · 막걸리(임시) → SetMakgeolli(id, RemainingSpins)  (0이하면 컨트롤러가 자동 제거)\r\n//\r\n// [동기화 트리거 — \"언제 다시 읽을까\"]\r\n//   · OnEffectApplied : 막걸리 발동/카드 장착이 \"켜지는 순간\" → 스핀 안 기다리고 즉시 표시.\r\n//   · OnCardBought    : 카드 구매 순간(전용 채널) → 즉시 표시.\r\n//   · OnSpinJudged    : 스핀이 지난 뒤(릴 정지 후) → 막걸리 남은스핀 카운트다운/만료 반영.\r\n//   · OnRunReset      : 런 리셋/부활 순간 → 패널 즉시 비움(Sync의 제거 로직이 처리).\r\n//   · OnSettled/OnFireFed : 안전용 추가 동기화(효과엔 직접 영향 없음).\r\n//   → OnEffectApplied는 \"켜짐만\" 알림(카운트다운·만료 신호 없음)이라 OnSpinJudged와 역할 분담.\r\n//     둘 다 Sync()라 서로 부딪히지 않는다.\r\n//\r\n// 배치: HUD 오브젝트에 붙이고 Inspector에서 effects(EffectsController)와 slot을 드래그.\r\nusing System.Collections;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Slot;           // SlotEvent, SlotEffect, SpinOutcome, RunProgress, CardEvent\r\nusing Wooduduk.Slot.Machine;   // SlotmachineController\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    public class EffectsBinder : MonoBehaviour\r\n    {\r\n        [SerializeField] private EffectsController effects;     // 내 효과 패널 (드래그)\r\n        [SerializeField] private SlotmachineController slot;    // 게임플레이 창구 (드래그)\r\n\r\n        // 직전에 패널에 반영돼 있던 효과 id (이번에 사라진 걸 찾아 제거하기 위함)\r\n        private readonly HashSet<string> shownCardIds = new HashSet<string>();\r\n        private readonly HashSet<string> shownMakIds = new HashSet<string>();\r\n\r\n        void OnEnable()\r\n        {\r\n            SlotEvent.OnSpinJudged += OnSpinJudged;      // 스핀 후: 카운트다운/만료\r\n            SlotEvent.OnSettled += OnSettled;\r\n            SlotEvent.OnFireFed += OnFireFed;\r\n            SlotEvent.OnEffectApplied += OnEffectApplied; // ★ 막걸리 발동/카드 장착 즉시\r\n            SlotEvent.OnRunReset += OnRunReset;           // ★ 런 리셋/부활 시 즉시 비움\r\n            CardEvent.OnCardBought += OnCardBought;        // ★ 카드 구매 즉시\r\n        }\r\n\r\n        void OnDisable()\r\n        {\r\n            SlotEvent.OnSpinJudged -= OnSpinJudged;\r\n            SlotEvent.OnSettled -= OnSettled;\r\n            SlotEvent.OnFireFed -= OnFireFed;\r\n            SlotEvent.OnEffectApplied -= OnEffectApplied; // ★ 해제(누수 방지)\r\n            SlotEvent.OnRunReset -= OnRunReset;           // ★ 해제\r\n            CardEvent.OnCardBought -= OnCardBought;        // ★ 해제\r\n        }\r\n\r\n        // 스핀: 릴이 멈춘 뒤 동기화 (막걸리 남은스핀 카운트다운/만료가 여기서 따라옴)\r\n        private void OnSpinJudged(SpinOutcome _)\r\n        {\r\n            StopAllCoroutines();\r\n            StartCoroutine(SyncAfterReels());\r\n        }\r\n\r\n        private void OnSettled(RunProgress _, long __) => Sync();\r\n        private void OnFireFed(RunProgress _) => Sync();\r\n\r\n        // ★ 효과가 \"켜지는\" 순간(막걸리 발동/카드 장착): 스핀 안 기다리고 즉시 반영.\r\n        //   payload는 안 쓰고 전체 재동기화(Sync가 ActiveEffects 전체를 읽음).\r\n        private void OnEffectApplied(SlotEffect _) => Sync();\r\n\r\n        // ★ 런 리셋/부활: ActiveEffects가 비므로 Sync가 패널을 즉시 비운다.\r\n        private void OnRunReset(RunProgress _) => Sync();\r\n\r\n        // ★ 카드 구매 순간(전용 채널): 즉시 전체 재동기화.\r\n        private void OnCardBought(string cardId, bool success)\r\n        {\r\n            if (!success) return;\r\n            Sync();\r\n        }\r\n\r\n        private IEnumerator SyncAfterReels()\r\n        {\r\n            yield return new WaitWhile(() => slot != null && slot.IsSpinning);\r\n            Sync();\r\n        }\r\n\r\n        // 게임플레이의 활성 효과 전체를 읽어 패널과 맞춘다.\r\n        private void Sync()\r\n        {\r\n            if (effects == null || slot == null) return;\r\n\r\n            var active = slot.ActiveEffects;   // 게임 시작 전엔 null일 수 있음\r\n            if (active == null) return;\r\n\r\n            // 이번에 살아있는 id 모음 (사라진 것 제거 판정용)\r\n            var aliveCardIds = new HashSet<string>();\r\n            var aliveMakIds = new HashSet<string>();\r\n\r\n            foreach (var e in active)\r\n            {\r\n                if (e == null) continue;\r\n\r\n                if (e.IsPermanent)\r\n                {\r\n                    // 카드(영구)\r\n                    aliveCardIds.Add(e.Id);\r\n                    if (!shownCardIds.Contains(e.Id))\r\n                        effects.AddCard(e.Id);          // 새로 생긴 카드만 추가\r\n                }\r\n                else\r\n                {\r\n                    // 막걸리(임시) — 남은스핀까지 업서트. 0이하면 컨트롤러가 자동 제거.\r\n                    aliveMakIds.Add(e.Id);\r\n                    effects.SetMakgeolli(e.Id, e.RemainingSpins);\r\n                }\r\n            }\r\n\r\n            // 직전엔 있었는데 이번엔 사라진 효과 → 패널에서 제거\r\n            foreach (var id in shownCardIds)\r\n                if (!aliveCardIds.Contains(id)) effects.RemoveCard(id);\r\n            foreach (var id in shownMakIds)\r\n                if (!aliveMakIds.Contains(id)) effects.RemoveMakgeolli(id);\r\n\r\n            // 다음 비교를 위해 현재 상태 저장\r\n            shownCardIds.Clear(); shownCardIds.UnionWith(aliveCardIds);\r\n            shownMakIds.Clear(); shownMakIds.UnionWith(aliveMakIds);\r\n        }\r\n    }\r\n}","lines":131},{"id":"Scripts/FX/ScreenFader.cs","name":"ScreenFader","path":"Scripts/FX/ScreenFader.cs","layer":"FX","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"사망 시 화면 암전 → 부활(시 복귀(페이드인). 풀스크린 검은 Image의 CanvasGroup alpha를 보간. SlotEvent.OnDeath / OnRunReset 구독.","src":"﻿using System.Collections;\r\nusing UnityEngine;\r\nusing Wooduduk.Slot;\r\nusing Wooduduk.Data.Result;   // RunResultData\r\nusing Wooduduk.Data.Service;  // RunResultUIService (P4: 결과 표시 시 암전 복귀)\r\n\r\nnamespace Wooduduk.FX\r\n{\r\n    // 사망 시 화면 암전 → 부활(시 복귀(페이드인).\r\n    // 풀스크린 검은 Image의 CanvasGroup alpha를 보간. SlotEvent.OnDeath / OnRunReset 구독.\r\n    [RequireComponent(typeof(CanvasGroup))]\r\n    public class ScreenFader : MonoBehaviour\r\n    {\r\n        [SerializeField] private CanvasGroup _group;            // 풀스크린 검은 이미지의 CanvasGroup\r\n        [SerializeField] private float _fadeOutDuration = 3f; // 사망 → 암전 시간\r\n        [SerializeField] private float _fadeInDuration = 3f; // 부활 → 복귀 시간\r\n\r\n        private Coroutine _co;\r\n\r\n        private void Awake()\r\n        {\r\n            if (_group == null) _group = GetComponent<CanvasGroup>();\r\n            if (_group != null) { _group.alpha = 0f; _group.blocksRaycasts = false; } // 시작은 투명\r\n        }\r\n        private void OnEnable()\r\n        {\r\n            SlotEvent.OnDeath += HandleDeath;\r\n            SlotEvent.OnRunReset += HandleReset;\r\n            RunResultUIService.OnShow += HandleResultShown; // P4: 결과창 뜨면 암전 복귀(모닥불 위 결과 보이게)\r\n        }\r\n        private void OnDisable()\r\n        {\r\n            SlotEvent.OnDeath -= HandleDeath;\r\n            SlotEvent.OnRunReset -= HandleReset;\r\n            RunResultUIService.OnShow -= HandleResultShown;\r\n        }\r\n        private void HandleDeath(RunProgress run) => Fade(1f, _fadeOutDuration); // 암전\r\n        private void HandleReset(RunProgress run) => Fade(0f, _fadeInDuration);  // 복귀\r\n        // P4: 멀티 사망자는 암전 상태 → 결과 확정/표시 시 페이드-백해서 모닥불+결과가 보이게.\r\n        private void HandleResultShown(RunResultData result) => Fade(0f, _fadeInDuration);\r\n\r\n        private void Fade(float target, float dur)\r\n        {\r\n            if (_group == null) return;\r\n            if (_co != null) StopCoroutine(_co);\r\n            _group.blocksRaycasts = target > 0.5f;          // 검은 화면일 때만 입력 차단\r\n            _co = StartCoroutine(FadeRoutine(target, dur));\r\n        }\r\n        private IEnumerator FadeRoutine(float target, float dur)\r\n        {\r\n            float start = _group.alpha, t = 0f;\r\n            while (t < dur)\r\n            {\r\n                t += Time.unscaledDeltaTime;                // timeScale 무관(부활 Realtime과 일치)\r\n                _group.alpha = Mathf.Lerp(start, target, dur > 0f ? t / dur : 1f);\r\n                yield return null;\r\n            }\r\n            _group.alpha = target;\r\n            _co = null;\r\n        }\r\n    }\r\n}","lines":62},{"id":"Scripts/Network/Firebase/Matchmaking/MatchmakingFlow.cs","name":"MatchmakingFlow","path":"Scripts/Network/Firebase/Matchmaking/MatchmakingFlow.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"매칭 성사 후 게임 시작 방식. InPlace=현재 씬에서 직호출(단일 씬), LoadScene=멀티 씬 로드(부트스트랩이 시작).","src":"﻿using System;\r\nusing System.Collections;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing UnityEngine.SceneManagement;\r\n\r\nnamespace Wooduduk.Network.Firebase.Matchmaking\r\n{\r
