= 3, int wormPercent = 110) { RemainingSpins = durationSpins; _wormPercent = wormPercent; }\r\n        public override string Id => \"M006\";\r\n        public override string DisplayName => \"딸꾹질\";\r\n        public override bool IsDebuff => true;\r\n        public override void ModifyWeights(WeightTable t, in SpinContext ctx) => t.MultiplyPercent(SymbolId.WORM, _wormPercent);\r\n    }\r\n\r\n    // 풀린 눈(막걸리 디버프) : 퍼펙트 출현 가중치↓.\r\n    public sealed class BlurryEyesEffect : SlotEffect\r\n    {\r\n        private readonly int _perfectPercent;\r\n        public BlurryEyesEffect(int durationSpins = 3, int perfectPercent = 80) { RemainingSpins = durationSpins; _perfectPercent = perfectPercent; }\r\n        public override string Id => \"M007\";\r\n        public override string DisplayName => \"풀린 눈\";\r\n        public override bool IsDebuff => true;\r\n        public override void ModifyWeights(WeightTable t, in SpinContext ctx) => t.MultiplyPercent(SymbolId.PERFECT, _perfectPercent);\r\n    }\r\n\r\n    // 헛손질(막걸리 디버프) : 명중 장작 배율 = 0 (이번 스핀 장작 0).\r\n    public sealed class WhiffEffect : SlotEffect\r\n    {\r\n        private readonly long _woodBp;\r\n        public WhiffEffect(int durationSpins = 1, long woodBp = 0) { RemainingSpins = durationSpins; _woodBp = woodBp; }\r\n        public override string Id => \"M009\";\r\n        public override string DisplayName => \"헛손질\";\r\n        public override bool IsDebuff => true;\r\n        public override long WoodMultiplierBp => _woodBp;\r\n    }\r\n\r\n    // 배탈(디버프) : 도토리 가치 0 (기획서). [기존 장작0 → 도토리0으로 정렬]\r\n    public sealed class UpsetStomachEffect : SlotEffect\r\n    {\r\n        public UpsetStomachEffect(int durationSpins = 2) { RemainingSpins = durationSpins; }\r\n        public override string Id => \"M010\";\r\n        public override string DisplayName => \"배탈\";\r\n        public override int AcornValueMultiplier => 0;\r\n        public override bool IsDebuff => true;\r\n    }\r\n\r\n\r\n    // 흥 폭발(버프) : 명중 시 콤보 추가(+comboPlus). 임시(지속 스핀).\r\n    public sealed class ExcitementBurstEffect : SlotEffect\r\n    {\r\n        private readonly int _comboPlus;\r\n        public ExcitementBurstEffect(int durationSpins = 1, int comboPlus = 2) { RemainingSpins = durationSpins; _comboPlus = comboPlus < 0 ? 0 : comboPlus; } // 음수 방지\r\n        public override string Id => \"M004\";\r\n        public override string DisplayName => \"흥 폭발\";\r\n        public override int ExtraComboOnHit => _comboPlus;\r\n    }\r\n\r\n    // 불빠따 페널티 : 다음 스핀 SWING 가중치↓(명중률↓). SlotMachine이 불빠따 발동 시 추가.\r\n    // 막걸리 아님 → IsDebuff 안 켬(항아리 지속½ 대상 아님).\r\n    public sealed class FireBatPenaltyEffect : SlotEffect\r\n    {\r\n        private readonly int _swingPercent;\r\n        public FireBatPenaltyEffect(int durationSpins = 1, int swingPercent = 80) { RemainingSpins = durationSpins; _swingPercent = swingPercent; }\r\n        public override string Id => \"firebat_penalty\";\r\n        public override string DisplayName => \"불빠따 여파\";\r\n        public override void ModifyWeights(WeightTable t, in SpinContext ctx) => t.MultiplyPercent(SymbolId.SWING, _swingPercent);\r\n    }\r\n\r\n    // 기름통 카드(영구) : 불빠따 배율·페널티 증가(기획서 C004). value_mod 150/10 → 배율 ×1.5(+50%), 페널티 +10%p.\r\n    public sealed class OilCanCard : SlotEffect\r\n    {\r\n        private readonly long _multBp;\r\n        private readonly int _penaltyBonus;\r\n        public OilCanCard(long multBp = 15000, int penaltyBonus = 10) { _multBp = multBp; _penaltyBonus = penaltyBonus; RemainingSpins = -1; }\r\n        public override string Id => \"C004\";\r\n        public override string DisplayName => \"기름통\";\r\n        public override long FireBatMultBonusBp => _multBp;\r\n        public override int FireBatPenaltyBonusPercent => _penaltyBonus;\r\n    }\r\n\r\n    // 막걸리 롤러 / 카드 팩토리\r\n    // \r\n    // 막걸리 3매치 발동 시 효과 1개를 결정론 RNG로 추첨.\r\n    // 같은 시드면 같은 순서로 등장(GDD: 막걸리 효과까지 동일). 머신의 RNG 스트림을 소비.\r\n    public sealed class MGLRoller : IMGLSource\r\n    {\r\n        private readonly List<Func<SlotEffect>> _pool;\r\n        public MGLRoller(List<Func<SlotEffect>> pool) { _pool = pool; }\r\n\r\n        public SlotEffect Roll(IDeterministicRng rng)\r\n        {\r\n            if (_pool == null || _pool.Count == 0) return null;\r\n            return _pool[rng.Range(0, _pool.Count)]();\r\n        }\r\n    }\r\n\r\n    // 임시 막걸리 풀(3종). 10종 확정 시 교체.\r\n    public static class MGLPool\r\n    {\r\n        // 추가 — SO에서 읽는 버전\r\n        public static MGLRoller CreateRoller(DataManagerSO data)\r\n        {\r\n            if (data?._makgeolliDataList == null || data._makgeolliDataList.Count == 0)\r\n                throw new InvalidOperationException(\"막걸리 데이터(_makgeolliDataList) 비어있음\");\r\n\r\n            var pool = new List<Func<SlotEffect>>();\r\n\r\n            foreach (var so in data._makgeolliDataList)\r\n            {\r\n                if (so?._data == null) continue;\r\n                var d = so._data;\r\n                var e = d._effects != null && d._effects.Count > 0 ? d._effects[0] : null;\r\n                int dur = d._durationSpin > 0 ? d._durationSpin : 3;\r\n                int v1 = e != null ? (int)e._value1 : 0;\r\n                float vf = e != null ? e._value1 : 0f;        // ← float 버전 추가\r\n\r\n                switch (d._id)\r\n                {\r\n                    case \"M001\":  // 불타는 도끼 — weight_multiply SWING (버프)\r\n                        pool.Add(() => new BurningAxeEffect(dur, v1 > 0 ? v1 : 115));\r\n                        break;\r\n                    case \"M002\":  // 황금손 — 도토리×2 (기획서). 기존 wood_mult → acornMult=2 고정.\r\n                        pool.Add(() => new GoldenHandEffect(dur, 2));\r\n                        break;\r\n                    case \"M003\":  // 장인의 집중 — weight_multiply PERFECT (버프)\r\n                        pool.Add(() => new ArtisanFocusEffect(dur, v1 > 0 ? v1 : 125));\r\n                        break;\r\n                    case \"M004\":  // 흥폭발 — combo_on_hit (val1 = 추가 콤보)\r\n                        pool.Add(() => new ExcitementBurstEffect(dur, v1 > 0 ? v1 : 2));\r\n                        break;\r\n                    case \"M005\":  // 행운목바람 — weight_multiply LUCK\r\n                        pool.Add(() => new LuckyWindEffect(dur, v1 > 0 ? v1 : 200));\r\n                        break;\r\n                    case \"M006\":  // 딸꾹질 — weight_multiply WORM (디버프)\r\n                        pool.Add(() => new HiccupEffect(dur, v1 > 0 ? v1 : 110));\r\n                        break;\r\n                    case \"M007\":  // 풀린 눈 — weight_multiply PERFECT (디버프)\r\n                        pool.Add(() => new BlurryEyesEffect(dur, v1 > 0 ? v1 : 80));\r\n                        break;\r\n                    case \"M008\":  // 무거운도끼 — 명중 시 강제 약스윙(기획서). ForcesWeakSwing.\r\n                        pool.Add(() => new HeavyAxeEffect(dur));\r\n                        break;\r\n                    case \"M009\":  // 헛손질 — 장작 0(정의적). 현재 0L 고정.\r\n                        pool.Add(() => new WhiffEffect(dur, 0L));\r\n                        // 확장 여지: 부분 장작감소(예 ×0.5) 기획 시 ↓ 데이터구동으로 교체. 단 SO val1≠0 오설정 시 의도 깨짐.\r\n                        // pool.Add(() => new WhiffEffect(dur, (long)(vf * 10000)));\r\n                        break;\r\n                    case \"M010\":  // 배탈 — 도토리 가치 0(기획서). AcornValueMultiplier=0.\r\n                        pool.Add(() => new UpsetStomachEffect(dur));\r\n                        break;\r\n                }\r\n            }\r\n            if (pool.Count == 0)\r\n                throw new System.InvalidOperationException(\"매핑된 막걸리 효과 0개. 데이터 ID 확인\");\r\n\r\n            return new MGLRoller(pool);\r\n        }\r\n    }\r\n\r\n    // 카드 id → 인스턴스(상점/테스트용). 카드 풀·가격은 추후 시트.\r\n    public static class CardCatalog\r\n    {\r\n        // 카드 id → 인스턴스(기본값). EditMode 테스트(CardEffectValidation C-1/C-2/C-3/G-2)에서 사용 — 제거 금지.\r\n        public static SlotEffect Create(string cardId)\r\n        {\r\n            switch (cardId)\r\n            {\r\n                case \"C001\": return new AluminumBatCard();\r\n                case \"C002\": return new LuckySaplingCard();\r\n                case \"C003\": return new InsuranceCard();\r\n                case \"C004\": return new OilCanCard();\r\n                case \"C005\": return new AcornSackCard();\r\n                case \"C006\": return new FourthReelCard();\r\n                case \"C007\": return new MakgeolliJarCard();\r\n                case \"C008\": return new PesticideCard();\r\n                default: return null;\r\n            }\r\n        }\r\n\r\n        // 카드 id → 인스턴스. SO 수치(_effects[0]._value1) 주입, 없으면 기본값. 구매 진입점.\r\n        public static SlotEffect Create(string cardId, DataManagerSO data)\r\n        {\r\n            var so = data?.GetCard(cardId);\r\n            var e = so?._data?._effects != null && so._data._effects.Count > 0\r\n                     ? so._data._effects[0] : null;\r\n            int v1 = e != null ? (int)e._value1 : 0;\r\n\r\n            switch (cardId)\r\n            {\r\n                case \"C001\": return new AluminumBatCard(v1 > 0 ? v1 : 130);\r\n                case \"C002\": return new LuckySaplingCard(v1 > 0 ? v1 : 108);\r\n                case \"C003\": return new InsuranceCard(v1 > 0 ? v1 : 1);\r\n                case \"C004\": return new OilCanCard();\r\n                case \"C005\": return new AcornSackCard(v1 > 0 ? v1 : 2);\r\n                case \"C006\": return new FourthReelCard();\r\n                case \"C007\": return new MakgeolliJarCard(v1 > 0 ? v1 : 108);\r\n                case \"C008\": return new PesticideCard(v1 > 0 ? v1 : 50);\r\n                default: return null;\r\n            }\r\n        }\r\n    }\r\n}","lines":333},{"id":"Scripts/Slot/EffectSystem.cs","name":"EffectSystem","path":"Scripts/Slot/EffectSystem.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"슬롯 효과 베이스(카드·막걸리 공통). 필요한 페이즈 훅만 오버라이드(기본 무효). 카드 = 영구, 막걸리 = 임시.","src":"﻿using System.Collections.Generic;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n\r\n    // 슬롯 효과 베이스(카드·막걸리 공통).\r\n    // 필요한 페이즈 훅만 오버라이드(기본 무효). 카드 = 영구, 막걸리 = 임시.\r\n    public abstract class SlotEffect\r\n    {\r\n        public abstract string Id { get; }\r\n        public abstract string DisplayName { get; }\r\n        public int RemainingSpins;   // -1 영구(카드) / >0 임시(막걸리) / 0 만료\r\n\r\n        public bool IsPermanent => RemainingSpins < 0;\r\n        public bool IsExpired => RemainingSpins == 0;\r\n\r\n        public virtual void OnApply(RunProgress run) { }\r\n        public virtual void OnRemove(RunProgress run) { }\r\n\r\n        // 페이즈 훅 (기본 무효) 필요한 것만 오버라이드\r\n        public virtual void ModifyWeights(WeightTable table, in SpinContext ctx) { } // 추첨 전 가중치\r\n        public virtual int ExtraReels => 0;                                          // 릴 수 추가(4번째 릴)\r\n        public virtual long WoodMultiplierBp => 10000;                               // 명중 장작 배율(황금손)\r\n        public virtual int AcornValueMultiplier => 1;                                // 도토리 가치 배수(도토리 자루)\r\n        public virtual bool TryConsumeFailGuard() => false;                          // 보험 : 실패 페널티 1회 무효(차지 소모)\r\n        public virtual int ExtraComboOnHit => 0;                                      // 명중 시 추가 콤보(기본 0=무효, 음수 금지: 명중이 콤보를 깎지 않게). 흥폭발 등.\r\n\r\n        // ── 추가 훅 (기획서 Phase1 카드 5종 대응, 기본 무효) ──────────────────────────────────\r\n        public virtual bool ForcesWeakSwing => false;          // 무거운도끼: 명중 시 약스윙(×1.0) 강제(기본 무효)\r\n        public virtual bool IsDebuff => false;                 // 디버프 표식(막걸리항아리 지속½ 대상 판별용)\r\n        public virtual bool HalvesDebuffDuration => false;     // 막걸리항아리: 디버프 막걸리 지속 절반\r\n        public virtual long FireBatMultBonusBp => 10000;       // 기름통: 불빠따 배율 추가 증폭(10000=×1.0=무효)\r\n        public virtual int  FireBatPenaltyBonusPercent => 0;   // 기름통: 불빠따 페널티 추가 강도(0=무효)\r\n    }\r\n\r\n    // 활성 효과 레지스트리\r\n    // 카드, 막걸리 보관/생명주기/페이즈 집계\r\n    public sealed class EffectRegistry\r\n    {\r\n        private readonly List<SlotEffect> _effects = new List<SlotEffect>();\r\n        public IReadOnlyList<SlotEffect> Active => _effects;\r\n\r\n        public void Add(SlotEffect effect, RunProgress run)\r\n        {\r\n            if (effect == null) return;\r\n            _effects.Add(effect);\r\n            effect.OnApply(run);\r\n        }\r\n\r\n        public void ModifyWeights(WeightTable table, in SpinContext ctx)\r\n        {\r\n            for (int i = 0; i < _effects.Count; i++) _effects[i].ModifyWeights(table, in ctx);\r\n        }\r\n\r\n        public int TotalExtraReels()\r\n        {\r\n            int n = 0;\r\n            for (int i = 0; i < _effects.Count; i++) n += _effects[i].ExtraReels;\r\n            return n;\r\n        }\r\n\r\n        public long CombinedWoodMultiplierBp()\r\n        {\r\n            long bp = 10000;\r\n            for (int i = 0; i < _effects.Count; i++) bp = bp * _effects[i].WoodMultiplierBp / 10000;\r\n            return bp;\r\n        }\r\n\r\n        public int CombinedAcornMultiplier()\r\n        {\r\n            int m = 1;\r\n            for (int i = 0; i < _effects.Count; i++) m *= _effects[i].AcornValueMultiplier;\r\n            return m;\r\n        }\r\n\r\n        public int CombinedExtraComboOnHit()\r\n        {\r\n            int n = 0;\r\n            for (int i = 0; i < _effects.Count; i++) n += _effects[i].ExtraComboOnHit;\r\n            return n;\r\n        }\r\n\r\n        // ── 추가 집계 (기획서 Phase1 카드 5종 대응) ─────────────────────────────────────────\r\n        // 하나라도 true (TryConsumeFailGuard 패턴)\r\n        public bool AnyForcesWeakSwing()\r\n        {\r\n            for (int i = 0; i < _effects.Count; i++) if (_effects[i].ForcesWeakSwing) return true;\r\n            return false;\r\n        }\r\n        public bool AnyHalvesDebuffDuration()\r\n        {\r\n            for (int i = 0; i < _effects.Count; i++) if (_effects[i].HalvesDebuffDuration) return true;\r\n            return false;\r\n        }\r\n        // 곱 (CombinedWoodMultiplierBp 패턴, 시작 10000)\r\n        public long CombinedFireBatMultBonusBp()\r\n        {\r\n            long bp = 10000;\r\n            for (int i = 0; i < _effects.Count; i++) bp = bp * _effects[i].FireBatMultBonusBp / 10000;\r\n            return bp;\r\n        }\r\n        // 합 (CombinedExtraComboOnHit 패턴, 시작 0)\r\n        public int CombinedFireBatPenaltyBonusPercent()\r\n        {\r\n            int n = 0;\r\n            for (int i = 0; i < _effects.Count; i++) n += _effects[i].FireBatPenaltyBonusPercent;\r\n            return n;\r\n        }\r\n\r\n        // 활성 효과 중 하나라도 실패 가드를 소모하면 true(보험).\r\n        public bool TryConsumeFailGuard()\r\n        {\r\n            for (int i = 0; i < _effects.Count; i++)\r\n                if (_effects[i].TryConsumeFailGuard()) return true;\r\n            return false;\r\n        }\r\n\r\n        // 스핀 종료 : 임시 효과 카운트다운 + 만료 제거(역순). 카드(영구)는 유지.\r\n        public void TickDown(RunProgress run)\r\n        {\r\n            for (int i = _effects.Count - 1; i >= 0; i--)\r\n            {\r\n                var e = _effects[i];\r\n                if (e.IsPermanent) continue;\r\n                e.RemainingSpins--;\r\n                if (e.IsExpired) { e.OnRemove(run); _effects.RemoveAt(i); }\r\n            }\r\n        }\r\n\r\n        // 런 종료/리셋 : 전부 제거\r\n        public void Clear(RunProgress run)\r\n        {\r\n            for (int i = 0; i < _effects.Count; i++) _effects[i].OnRemove(run);\r\n            _effects.Clear();\r\n        }\r\n    }\r\n\r\n    // 활성 효과의 가중치 변형을 파이프라인에 연결하는 스테이지(콤보/운빨 다음 단계).\r\n    public sealed class EffectsWeightStage : IWeightStage\r\n    {\r\n        private readonly EffectRegistry _registry;\r\n        public EffectsWeightStage(EffectRegistry registry) { _registry = registry; }\r\n        public void Apply(WeightTable table, in SpinContext ctx) => _registry.ModifyWeights(table, in ctx);\r\n    }\r\n    public interface IMGLSource { SlotEffect Roll(IDeterministicRng rng); }\r\n}\r\n","lines":147},{"id":"Scripts/Slot/RunContext.cs","name":"RunContext","path":"Scripts/Slot/RunContext.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"한 런의 공유 컨텍스트. 상태 + 프로세서 싱글 = 로컬 / 멀티 = 서버","src":"﻿using System;\r\nusing Wooduduk.Player;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 한 런의 공유 컨텍스트. 상태 + 프로세서\r\n    // 싱글 = 로컬 / 멀티 = 서버\r\n    public class RunContext\r\n    {\r\n        public string Seed { get; }                 // 결정론 시드(슬롯 RNG·멀티 동기화 기준)\r\n        public RunProgress Run { get; }             // 공유 상태(진행/체온/경제)\r\n        public RunProcessor Economy { get; }        // 경제 : 추첨 후 반영·정산·비용·최종 환산\r\n        public SurvivalProcessor Survival { get; }  // 생존 : 체온 드레인·회복·생사\r\n\r\n        public RunContext(string seed, RunProgress run, RunProcessor economy, SurvivalProcessor survival)\r\n        {\r\n            Seed = seed; Run = run; Economy = economy; Survival = survival;\r\n        }\r\n    }\r\n\r\n    // 기본 RunContext 조립. DataSO 교체\r\n    public static class RunContextFactory\r\n    {\r\n        public static RunContext CreateDefault(string seed,\r\n         SlotEconomyConfig economyConfig,\r\n         SurvivalConfig survivalConfig)\r\n        {\r\n            if (economyConfig == null || survivalConfig == null)\r\n                throw new InvalidOperationException(\"economy/survival config 누락\");\r\n            var run = new RunProgress();\r\n            run.BankedWood = economyConfig._startWood; \r\n            var economy = new RunProcessor(economyConfig);\r\n            var survival = new SurvivalProcessor(survivalConfig);\r\n            survival.Init(run);\r\n            return new RunContext(seed, run, economy, survival);\r\n        }\r\n    }\r\n}\r\n","lines":39},{"id":"Scripts/Data/DataSO/SymbolTableSO.cs","name":"SymbolTableSO","path":"Scripts/Data/DataSO/SymbolTableSO.cs","layer":"Data","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"슬롯 옆 심볼 족보","src":"﻿using System;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Slot; \r\n\r\nnamespace Wooduduk.Data.DataSO\r\n{\r\n    // 슬롯 옆 심볼 족보\r\n    [CreateAssetMenu(fileName = \"SymbolTable\", menuName = \"GameData/SymbolTable\")]\r\n    public class SymbolTableSO : ScriptableObject\r\n    {\r\n        [Serializable]\r\n        public struct Row\r\n        {\r\n            public SymbolId _symbol;     // 조건 숫자 인용 + 정렬 기준\r\n            public string _displayName;  // \"스윙\"\r\n            public int _spriteIndex;     // TMP Sprite Asset 인덱스(-1이면 인라인 아이콘 없음)\r\n            public string _effectSign;   // \"×\" \"＋\" \"＝\" \"★\" \"✗\" \"–\"\r\n            [TextArea] public string _effectText; // \"배율 ×1.5\"\r\n            public Color _color;         // 효과 색(명중=청록, 보너스=호박, 위험=빨강, 꽝=회색)\r\n        }\r\n\r\n        public List<Row> _rows = new List<Row>();\r\n    }\r\n}","lines":25},{"id":"Scripts/Data/Static/StaticEnum/Rarity.cs","name":"Rarity","path":"Scripts/Data/Static/StaticEnum/Rarity.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿namespace Wooduduk.Data.Static.StaticEnum\r\n{\r\n    public enum Rarity\r\n    {\r\n        COMMON,\r\n        RARE,\r\n        EPIC,\r\n        LEGENDARY\r\n    }\r\n}\r\n","lines":11},{"id":"Scripts/UI/SkinData.cs","name":"SkinData","path":"Scripts/UI/SkinData.cs","layer":"UI","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"스킨 1종의 정적 정의. 소유/장착 같은 런타임 상태는 절대 여기에 두지 않는다. (런타임 상태는 PlayerInventory에서 관리)","src":"using UnityEngine;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    public enum Rarity { Common, Rare, Epic, Legendary }\r\n    public enum SkinCategory { Slot, Axe }\r\n\r\n    /// <summary>\r\n    /// 스킨 1종의 정적 정의. 소유/장착 같은 런타임 상태는 절대 여기에 두지 않는다.\r\n    /// (런타임 상태는 PlayerInventory에서 관리)\r\n    /// </summary>\r\n    [CreateAssetMenu(fileName = \"Skin\", menuName = \"Wooduduk/Skin\")]\r\n    public class SkinData : ScriptableObject\r\n    {\r\n        public string id;             // 저장/식별용 고유 키 (예: \"slot_wildfire\")\r\n\r\n        public string displayName;    // 화면 표기 (예: \"산불 슬롯\")\r\n        public Rarity rarity;\r\n        public SkinCategory category;\r\n        public Sprite icon;           // 썸네일 (아트 전엔 null이어도 UI 동작)\r\n        public bool hiddenUntilOwned; // true면 미보유 시 '???'(미발견)로 표기\r\n        public int returnGold;        // 가챠 중복 시 환급 골드 (데이터팀 _returnGold에서 번역돼 들어옴)\r\n        public float weight;\r\n    }\r\n}","lines":25},{"id":"Scripts/UI/IGachaConfig.cs","name":"IGachaConfig","path":"Scripts/UI/IGachaConfig.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"가챠 수치 설정 계약. 상점 UI는 \"확률·환급·비용을 알려주는 무언가\"에만 의존한다. 지금은 StubGachaConfig(임시값), 나중에 데이터 파트의 GachaConfigSO로 교체. 이 인터페이스 뒤로 모든 수치를 격리해 둔 것이 핵심 UI 코드는 수치를 직접 알지 못한다.","src":"using System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    /// <summary>\r\n    /// 가챠 수치 설정 계약. 상점 UI는 \"확률·환급·비용을 알려주는 무언가\"에만 의존한다.\r\n    /// 지금은 StubGachaConfig(임시값), 나중에 데이터 파트의 GachaConfigSO로 교체.\r\n    /// 이 인터페이스 뒤로 모든 수치를 격리해 둔 것이 핵심 — UI 코드는 수치를 직접 알지 못한다.\r\n    /// </summary>\r\n    public interface IGachaConfig\r\n    {\r\n        float GetRarityWeight(Rarity rarity);   // 희귀도별 출현 가중치\r\n        int GetDuplicateRefund(Rarity rarity);  // 중복 시 돌려줄 장작 양\r\n        int GetPullCost(int count);             // count회 뽑기에 드는 뽑기코인\r\n    }\r\n\r\n    /// <summary>\r\n    /// 임시 가챠 설정. 수치는 전부 placeholder — 나중에 데이터 파트가 진짜 값으로 정한다.\r\n    /// 던져버릴 값이라 지금 정확할 필요 없음. UI를 굴리는 용도.\r\n    /// </summary>\r\n    public class StubGachaConfig : IGachaConfig\r\n    {\r\n        readonly Dictionary<Rarity, float> weights = new()\r\n        {\r\n            { Rarity.Common,    60f },\r\n            { Rarity.Rare,      28f },\r\n            { Rarity.Epic,       9f },\r\n            { Rarity.Legendary,  3f },\r\n        };\r\n\r\n        readonly Dictionary<Rarity, int> refund = new()\r\n        {\r\n            { Rarity.Common,    20 },\r\n            { Rarity.Rare,      60 },\r\n            { Rarity.Epic,     150 },\r\n            { Rarity.Legendary,400 },\r\n        };\r\n\r\n        public float GetRarityWeight(Rarity rarity) => weights[rarity];\r\n        public int GetDuplicateRefund(Rarity rarity) => refund[rarity];\r\n\r\n        // 10회는 1회 할인 (10 x 10 = 100 대신 90)\r\n        public int GetPullCost(int count) => count == 10 ? 90 : count * 10;\r\n    }\r\n}","lines":46},{"id":"Scripts/UI/InventoryService.cs","name":"InventoryService","path":"Scripts/UI/InventoryService.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"[재구성본] 노트 구조 기반. 본인 실제 InventoryService와 대조 후 사용. 데이터 파트 합류 시 SeedStub 호출부만 세이브 로드로 교체.","src":"// [재구성본] 노트 구조 기반. 본인 실제 InventoryService와 대조 후 사용.\r\n// 데이터 파트 합류 시 SeedStub 호출부만 세이브 로드로 교체.\r\nnamespace Wooduduk.UI\r\n{\r\n    public static class InventoryService\r\n    {\r\n        public static PlayerInventory Current { get; private set; }\r\n\r\n        public static PlayerInventory GetOrCreate()\r\n        {\r\n            if (Current == null)\r\n            {\r\n                Current = new PlayerInventory();\r\n                SeedStub(Current);   // ← 데이터 파트 오면 이 줄을 세이브 로드로 교체\r\n            }\r\n            return Current;\r\n        }\r\n\r\n        private static void SeedStub(PlayerInventory inv)\r\n        {\r\n            // 재화(gold/token)는 이제 UserManager.CurrentUserData가, 장작(firewood)은\r\n            // RunProgress가 소유한다. PlayerInventory는 그쪽으로 심부름 보내는 어댑터일 뿐이라\r\n            // 여기서 임시값을 박지 않는다. (예전 inv.gold/token/firewood 대입은 제거됨)\r\n            //\r\n            // 데이터 파트 합류 완료 → 더 이상 스텁 시드 불필요.\r\n            // (소유/장착 초기화도 UserManager가 서버 데이터로 처리)\r\n        }\r\n    }\r\n}","lines":29},{"id":"Scripts/UI/ITokenExchange.cs","name":"ITokenExchange","path":"Scripts/UI/ITokenExchange.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"골드 → 토큰 고정 환율(A안). 환율 수치를 ShopController에 박지 않고 격리한다. 진짜 데이터가 오면 StubTokenExchange → TokenExchangeConfigSO로 한 줄만 교체.","src":"namespace Wooduduk.UI\r\n{\r\n    /// <summary>\r\n    /// 골드 → 토큰 고정 환율(A안). 환율 수치를 ShopController에 박지 않고 격리한다.\r\n    /// 진짜 데이터가 오면 StubTokenExchange → TokenExchangeConfigSO로 한 줄만 교체.\r\n    /// </summary>\r\n    public interface ITokenExchange\r\n    {\r\n        int GetGoldCost();    // 1회 구매 시 드는 골드\r\n        int GetTokenAmount(); // 그때 받는 토큰\r\n    }\r\n\r\n    public class StubTokenExchange : ITokenExchange\r\n    {\r\n        public int GetGoldCost() => 100;   // 임시값 (밸런스로 확정)\r\n        public int GetTokenAmount() => 10;  // 임시값\r\n    }\r\n}","lines":18},{"id":"Scripts/UI/PlayerInventory.cs","name":"PlayerInventory","path":"Scripts/UI/PlayerInventory.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"[A안 어댑터] 예전엔 자체 지갑(메모리)이었지만, 이제는 진짜 지갑인 UserManager.CurrentUserData로 심부름을 보내는 \"창구\"다. 왜 클래스를 남겼나: - ShopController 등 UI는 기존처럼 inv.뭐시기()만 부른다(호출부 안 바뀜). - 내부 구현만 UserManager 호출로 교체 → 서버 저장까지 자동. - UserManager 구조가 또 바뀌어도 이 파일 한 곳만 고치면 됨(격리). 주","src":"using System.Collections.Generic;\r\nusing Wooduduk.Network.Firebase;   // UserManager\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    /// <summary>\r\n    /// [A안 어댑터] 예전엔 자체 지갑(메모리)이었지만, 이제는\r\n    /// 진짜 지갑인 UserManager.CurrentUserData로 심부름을 보내는 \"창구\"다.\r\n    ///\r\n    /// 왜 클래스를 남겼나:\r\n    ///  - ShopController 등 UI는 기존처럼 inv.뭐시기()만 부른다(호출부 안 바뀜).\r\n    ///  - 내부 구현만 UserManager 호출로 교체 → 서버 저장까지 자동.\r\n    ///  - UserManager 구조가 또 바뀌어도 이 파일 한 곳만 고치면 됨(격리).\r\n    ///\r\n    /// 주의: 읽기(gold/token)는 CurrentUserData에서 그때그때 읽으므로 항상 최신.\r\n    ///       쓰기(Spend/Add)는 UserManager가 차감·지급 + 서버 저장을 함께 처리.\r\n    /// </summary>\r\n    public class PlayerInventory\r\n    {\r\n        // UserManager 싱글톤 단축 접근. 아직 유저 데이터 로드 전이면 null일 수 있음.\r\n        private static UserManager UM => UserManager.Instance;\r\n        private static bool Ready => UM != null && UM.CurrentUserData != null;\r\n\r\n        // ── 재화 읽기 (프로퍼티로: 항상 진짜 지갑의 최신값) ──\r\n        public int gold => Ready ? UM.CurrentUserData._gold : 0;\r\n        public int token => Ready ? UM.CurrentUserData._token : 0;\r\n\r\n        // ── 재화 검사 ──\r\n        public bool CanAfford(int tokenCost) => token >= tokenCost;\r\n        public bool CanAffordGold(int goldCost) => gold >= goldCost;\r\n\r\n        // ── 재화 쓰기 (UserManager가 차감/지급 + 서버 저장) ──\r\n        // 반환값을 무시하던 기존 호출부와 호환되도록 void 시그니처 유지.\r\n        public void SpendToken(int amount) { if (Ready) UM.SpendTokens(amount); }\r\n        public void SpendGold(int amount) { if (Ready) UM.SpendGold(amount); }\r\n        public void AddToken(int amount) { if (Ready) UM.AddTokens(amount); }\r\n\r\n        // 골드 증가: 가챠 환급은 UserManager.AddRouletteSkin이 직접 처리하므로\r\n        // 단독 AddGold는 더 이상 쓰지 않는다. 잘못된 직접 증가를 막기 위해 무시.\r\n        public void AddGold(int amount) { /* 환급은 AddRouletteSkin/AddWeapon이 담당 */ }\r\n\r\n        // ── 스킨 소유 여부 (카테고리로 갈라 UserManager에 질의) ──\r\n        public bool IsOwned(SkinData skin)\r\n        {\r\n            if (skin == null || !Ready) return false;\r\n            return skin.category == SkinCategory.Slot\r\n                ? UM.IsRouletteOwned(skin.id)\r\n                : UM.IsWeaponOwned(skin.id);\r\n        }\r\n\r\n        // ── 장착 여부 (카테고리별 장착 ID와 비교) ──\r\n        public bool IsEquipped(SkinData skin)\r\n        {\r\n            if (skin == null || !Ready) return false;\r\n            string equippedId = skin.category == SkinCategory.Slot\r\n                ? UM.CurrentUserData._equippedRouletteSkinId\r\n                : UM.CurrentUserData._equippedWeaponId;\r\n            return !string.IsNullOrEmpty(equippedId) && equippedId == skin.id;\r\n        }\r\n\r\n        // ── 장착 (UserManager가 미보유 검증 + 서버 저장) ──\r\n        public void Equip(SkinData skin)\r\n        {\r\n            if (skin == null || !Ready) return;\r\n            if (skin.category == SkinCategory.Slot)\r\n                UM.EquipRouletteSkin(skin.id);\r\n            else\r\n                UM.EquipWeapon(skin.id);\r\n        }\r\n\r\n        public string GetEquippedId(SkinCategory category)\r\n        {\r\n            if (!Ready) return null;\r\n            return category == SkinCategory.Slot\r\n                ? UM.CurrentUserData._equippedRouletteSkinId\r\n                : UM.CurrentUserData._equippedWeaponId;\r\n        }\r\n    }\r\n}","lines":79},{"id":"Scripts/UI/ScriptableObjectSkinSource.cs","name":"ScriptableObjectSkinSource","path":"Scripts/UI/ScriptableObjectSkinSource.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"진짜 데이터(DataManagerSO)를 상점 UI의 ISkinSource 계약으로 변환하는 어댑터. StubSkinSource 자리에 끼운다 → ShopController.Awake 한 줄 교체. 핵심 역할 3가지: 1) 두 리스트(_rouletteSkinDataList, _weaponDataList)를 한 목록으로 합침. 2) 데이터팀 SO 필드 → 내 SkinData(SO) 필드로 매핑. 3) category는 \"어느 리","src":"using System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.DataSO;        // DataManagerSO, RouletteSkinDataSO, WeaponDataSO\r\nusing DataRarity = Wooduduk.Data.Static.StaticEnum.Rarity;  // 데이터팀 Rarity (내 Rarity와 이름 충돌 회피)\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    /// <summary>\r\n    /// 진짜 데이터(DataManagerSO)를 상점 UI의 ISkinSource 계약으로 변환하는 어댑터.\r\n    /// StubSkinSource 자리에 끼운다 → ShopController.Awake 한 줄 교체.\r\n    ///\r\n    /// 핵심 역할 3가지:\r\n    ///  1) 두 리스트(_rouletteSkinDataList, _weaponDataList)를 한 목록으로 합침.\r\n    ///  2) 데이터팀 SO 필드 → 내 SkinData(SO) 필드로 매핑.\r\n    ///  3) category는 \"어느 리스트에서 왔나\"로 결정 (SO엔 슬롯/도끼 구분이 없음).\r\n    ///\r\n    /// 주의: CreateInstance로 만든 SkinData는 메모리에만 존재 → 런타임 표시용으론 충분.\r\n    ///       (Stub과 동일한 방식. icon은 데이터팀 SO의 _icon 을 그대로 넘긴다.)\r\n    /// </summary>\r\n    public class ScriptableObjectSkinSource : ISkinSource\r\n    {\r\n        private readonly DataManagerSO data;\r\n\r\n        public ScriptableObjectSkinSource(DataManagerSO dataManager)\r\n        {\r\n            data = dataManager;\r\n        }\r\n\r\n        public IReadOnlyList<SkinData> GetAll()\r\n        {\r\n            var result = new List<SkinData>();\r\n\r\n            // --- 슬롯(룰렛) 스킨 ---\r\n            if (data._rouletteSkinDataList != null)\r\n            {\r\n                foreach (var so in data._rouletteSkinDataList)\r\n                {\r\n                    if (so == null || so._data == null) continue;\r\n                    result.Add(Make(\r\n                        id: so._data._id,\r\n                        name: so._data._name,\r\n                        rarity: MapRarity(so._data._rarity),\r\n                        category: SkinCategory.Slot,\r\n                        returnGold: so._data._returnGold,\r\n                        icon: so._data._icon));\r\n                }\r\n            }\r\n\r\n            // --- 도끼(무기) 스킨 ---\r\n            if (data._weaponDataList != null)\r\n            {\r\n                foreach (var so in data._weaponDataList)\r\n                {\r\n                    if (so == null || so._data == null) continue;\r\n                    result.Add(Make(\r\n                        id: so._data._id,\r\n                        name: so._data._name,\r\n                        rarity: MapRarity(so._data._rarity),\r\n                        category: SkinCategory.Axe,\r\n                        returnGold: so._data._returnGold,\r\n                        icon: so._data._icon));\r\n                }\r\n            }\r\n\r\n            return result;\r\n        }\r\n\r\n        /// <summary>\r\n        /// 데이터팀 Rarity(대문자) → 내 Rarity 변환.\r\n        /// 4단계가 1:1로 대응 (이름·순서 동일, 대소문자만 다름).\r\n        /// 새 등급이 양쪽에 추가되면 여기 한 줄만 늘리면 됨.\r\n        /// </summary>\r\n        private static Rarity MapRarity(DataRarity r)\r\n        {\r\n            switch (r)\r\n            {\r\n                case DataRarity.COMMON: return Rarity.Common;\r\n                case DataRarity.RARE: return Rarity.Rare;\r\n                case DataRarity.EPIC: return Rarity.Epic;\r\n                case DataRarity.LEGENDARY: return Rarity.Legendary;\r\n                default: return Rarity.Common;  // 모르는 값은 안전하게 일반\r\n            }\r\n        }\r\n\r\n        /// <summary>\r\n        /// 내 SkinData(SO) 한 장 생성. StubSkinSource.Make와 동일한 패턴.\r\n        /// icon은 데이터팀 SO의 _icon 을 그대로 받아 넣는다.\r\n        /// hiddenUntilOwned는 데이터팀 SO에 대응 필드가 생기면 매핑.\r\n        /// </summary>\r\n        private static SkinData Make(string id, string name, Rarity rarity, SkinCategory category,\r\n                                     int returnGold = 0, Sprite icon = null)\r\n        {\r\n            var s = ScriptableObject.CreateInstance<SkinData>();\r\n            s.id = id;\r\n            s.displayName = name;\r\n            s.rarity = rarity;\r\n            s.category = category;\r\n            s.returnGold = returnGold;   // 가챠 중복 환급액 (데이터팀 _returnGold)\r\n            s.hiddenUntilOwned = false;  // ❓ 데이터팀 SO에 hidden 필드 생기면 매핑\r\n            s.icon = icon;               // 데이터팀 _icon 을 그대로 전달\r\n            return s;\r\n        }\r\n    }\r\n}","lines":104},{"id":"Scripts/UI/StubSkinSource.cs","name":"StubSkinSource","path":"Scripts/UI/StubSkinSource.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"상점 UI가 의존하는 유일한 데이터 계약. UI는 \"스킨 목록을 주는 무언가\"에만 의존하고, 출처가 스텁인지 진짜 SO인지는 모른다.","src":"using System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    /// <summary>\r\n    /// 상점 UI가 의존하는 유일한 데이터 계약.\r\n    /// UI는 \"스킨 목록을 주는 무언가\"에만 의존하고, 출처가 스텁인지 진짜 SO인지는 모른다.\r\n    /// </summary>\r\n    public interface ISkinSource\r\n    {\r\n        IReadOnlyList<SkinData> GetAll();\r\n    }\r\n\r\n    /// <summary>\r\n    /// 임시 데이터 출처. SO 에셋 없이 코드 안에서 SkinData를 즉석 생성한다.\r\n    /// 데이터 파트의 진짜 SO가 오면 ScriptableObjectSkinSource로 교체. UI 코드는 안 바뀐다.\r\n    /// 주의: CreateInstance로 만든 SO는 메모리에만 존재 → 플레이 종료 시 사라짐(테스트용으론 충분).\r\n    /// </summary>\r\n    public class StubSkinSource : ISkinSource\r\n    {\r\n        public IReadOnlyList<SkinData> GetAll()\r\n        {\r\n            return new List<SkinData>\r\n            {\r\n                Make(\"slot_basic\",    \"기본 슬롯\",   Rarity.Common,    SkinCategory.Slot),\r\n                Make(\"slot_wildfire\", \"산불 슬롯\",   Rarity.Rare,      SkinCategory.Slot),\r\n                Make(\"slot_maple\",    \"단풍 슬롯\",   Rarity.Rare,      SkinCategory.Slot),\r\n                Make(\"slot_gold\",     \"황금 슬롯\",   Rarity.Epic,      SkinCategory.Slot),\r\n                Make(\"slot_snow\",     \"눈꽃 슬롯\",   Rarity.Epic,      SkinCategory.Slot),\r\n                Make(\"slot_spirit\",   \"정령의 슬롯\", Rarity.Legendary, SkinCategory.Slot, hidden: true),\r\n                Make(\"axe_wood\",      \"나무 도끼\",   Rarity.Common,    SkinCategory.Axe),\r\n                Make(\"axe_stone\",     \"돌 도끼\",     Rarity.Common,    SkinCategory.Axe),\r\n                Make(\"axe_flame\",     \"불꽃 도끼\",   Rarity.Rare,      SkinCategory.Axe),\r\n                Make(\"axe_diamond\",   \"다이아 도끼\", Rarity.Epic,      SkinCategory.Axe),\r\n                Make(\"axe_fate\",      \"운명의 도끼\", Rarity.Legendary, SkinCategory.Axe, hidden: true),\r\n            };\r\n        }\r\n\r\n        static SkinData Make(string id, string name, Rarity r, SkinCategory c, bool hidden = false)\r\n        {\r\n            var s = ScriptableObject.CreateInstance<SkinData>();\r\n            s.id = id; s.displayName = name; s.rarity = r; s.category = c;\r\n            s.hiddenUntilOwned = hidden;\r\n            s.icon = null;   // 아트 전이라 비움 → USS 기본색으로 보임\r\n            return s;\r\n        }\r\n    }\r\n\r\n\r\n}","lines":51},{"id":"Scripts/UI/WeaponEquipEvent.cs","name":"WeaponEquipEvent","path":"Scripts/UI/WeaponEquipEvent.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"무기 스킨이 \"장착된 순간\"을 알리는 전용 신호 채널. 프로젝트에 이미 있는 CardEvent.OnCardBought 와 완전히 같은 패턴(정적 이벤트). 발행(Raise): ShopController가 EquipWeapon(id) 직후 한 줄로 호출. 구독: WeaponSkinSwapper 가 OnEnable에서 구독, OnDisable에서 해제. (static 이벤트는 구독 해제 안 하면 누수 반드시 짝 맞출 것)","src":"using System;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    // 무기 스킨이 \"장착된 순간\"을 알리는 전용 신호 채널.\r\n    // 프로젝트에 이미 있는 CardEvent.OnCardBought 와 완전히 같은 패턴(정적 이벤트).\r\n    //\r\n    // 발행(Raise): ShopController가 EquipWeapon(id) 직후 한 줄로 호출.\r\n    // 구독:        WeaponSkinSwapper 가 OnEnable에서 구독, OnDisable에서 해제.\r\n    //             (static 이벤트는 구독 해제 안 하면 누수 — 반드시 짝 맞출 것)\r\n    public static class WeaponEquipEvent\r\n    {\r\n        public static event Action<string> OnWeaponEquipped;\r\n\r\n        public static void Raise(string skinId)\r\n        {\r\n            OnWeaponEquipped?.Invoke(skinId);\r\n        }\r\n    }\r\n}","lines":20},{"id":"Scripts/UI/ILeaderboardSource.cs","name":"ILeaderboardSource","path":"Scripts/UI/ILeaderboardSource.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"namespace Wooduduk.UI\r\n{\r\n    public struct ScoreEntry\r\n    {\r\n        public int rank;\r\n        public string name;\r\n        public int score;\r\n    }\r\n\r\n    public interface ILeaderboardSource\r\n    {\r\n        ScoreEntry[] GetMyRecords();\r\n        ScoreEntry[] GetGlobal();\r\n        int Submit(int score);\r\n    }\r\n\r\n    public class StubLeaderboardSource : ILeaderboardSource\r\n    {\r\n        public ScoreEntry[] GetMyRecords() => new[]\r\n        {\r\n            new ScoreEntry { rank = 1, name = \"최고 기록\", score = 12500 },\r\n            new ScoreEntry { rank = 2, name = \"—\",        score = 11000 },\r\n            new ScoreEntry { rank = 3, name = \"—\",        score = 8400  },\r\n        };\r\n\r\n        public ScoreEntry[] GetGlobal() => new[]\r\n        {\r\n            new ScoreEntry { rank = 1, name = \"장작왕\",   score = 98200 },\r\n            new ScoreEntry { rank = 2, name = \"도끼고수\", score = 77100 },\r\n            new ScoreEntry { rank = 3, name = \"나\",       score = 12500 },\r\n        };\r\n\r\n        public int Submit(int score) => 3;\r\n    }\r\n}","lines":35},{"id":"Scripts/UI/Leaderboardadaptersource.cs","name":"Leaderboardadaptersource","path":"Scripts/UI/Leaderboardadaptersource.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"번역가 + 캐시. 데이터팀 LeaderboardService(비동기 push, OnLoaded) ↔ 내 UI ILeaderboardSource(동기 pull) 사이 변환. 최신 LeaderboardViewData를 보관하고, 내 그릇(ScoreEntry)으로 번역해 컨트롤러가 동기적으로 꺼내 쓰게 함. 데이터가 새로 도착하면 OnUpdated로 \"다시 그려\" 신호만 보냄.","src":"using System;\r\nusing System.Collections.Generic;\r\nusing System.Linq;\r\nusing Wooduduk.Data.Result;\r\nusing Wooduduk.Network.Firebase;\r\nusing Wooduduk.Network.Firebase.Leaderboard;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    /// <summary>\r\n    /// 번역가 + 캐시.\r\n    /// 데이터팀 LeaderboardService(비동기 push, OnLoaded) ↔ 내 UI ILeaderboardSource(동기 pull) 사이 변환.\r\n    /// 최신 LeaderboardViewData를 보관하고, 내 그릇(ScoreEntry)으로 번역해 컨트롤러가 동기적으로 꺼내 쓰게 함.\r\n    /// 데이터가 새로 도착하면 OnUpdated로 \"다시 그려\" 신호만 보냄.\r\n    /// </summary>\r\n    public class LeaderboardAdapterSource : ILeaderboardSource, IDisposable\r\n    {\r\n        private LeaderboardViewData _latest;\r\n\r\n        /// 새 데이터 도착 → 컨트롤러가 현재 탭을 다시 그리도록 알림\r\n        public event Action OnUpdated;\r\n\r\n        /// 아직 첫 데이터가 안 들어왔는지(로딩 표시용)\r\n        public bool HasData => _latest != null;\r\n\r\n        /// 직전 판 점수(_latestRecord._score). 없거나 0이면 null.\r\n        public int? LatestScore =>\r\n            (_latest?._latestRecord != null && _latest._latestRecord._score > 0)\r\n                ? _latest._latestRecord._score\r\n                : (int?)null;\r\n\r\n        public LeaderboardAdapterSource()\r\n        {\r\n            LeaderboardEvents.OnLoaded += HandleLoaded;\r\n        }\r\n\r\n        public void Dispose()\r\n        {\r\n            // static 이벤트라 구독 해제 필수(누수 방지)\r\n            LeaderboardEvents.OnLoaded -= HandleLoaded;\r\n        }\r\n\r\n        private void HandleLoaded(LeaderboardViewData data)\r\n        {\r\n            _latest = data;\r\n            OnUpdated?.Invoke();\r\n        }\r\n\r\n        /// 서버에서 최신 데이터 요청. 패널 열 때 호출.\r\n        /// (인메모리 캐시·서버 왕복은 LeaderboardService 내부에서 처리)\r\n        public void RequestLoad()\r\n        {\r\n            var um = UserManager.Instance;\r\n            if (um == null || um.CurrentUserData == null)\r\n                return;\r\n\r\n            var user = um.CurrentUserData;\r\n\r\n            LeaderboardCache.Clear();\r\n            LeaderboardService.Load(user, true); // 강제 새로고침\r\n        }\r\n\r\n        // ── 글로벌 탭: TOP100 ──────────────────────────────\r\n        public ScoreEntry[] GetGlobal()\r\n        {\r\n            if (_latest?._top100 == null) return Array.Empty<ScoreEntry>();\r\n            return _latest._top100\r\n                .Select(r => new ScoreEntry { rank = r._rank, name = r._nickname, score = r._score })\r\n                .ToArray();\r\n        }\r\n\r\n        // ── 내 기록 탭: 내 전체순위 + 개인 TOP3 ────────────\r\n        public ScoreEntry[] GetMyRecords()\r\n        {\r\n            var list = new List<ScoreEntry>();\r\n            if (_latest == null) return list.ToArray();\r\n\r\n            // 내 전체 순위(서버 캐시) 한 줄 — 있을 때만\r\n            if (_latest._myRankRecord != null && _latest._myRankRecord._rank > 0)\r\n            {\r\n                list.Add(new ScoreEntry\r\n                {\r\n                    rank = _latest._myRankRecord._rank,\r\n                    name = \"내 순위\",\r\n                    score = _latest._myRankRecord._score\r\n                });\r\n            }\r\n\r\n            // 개인 최고 점수 TOP3\r\n            if (_latest._myTop3Scores != null)\r\n            {\r\n                for (int i = 0; i < _latest._myTop3Scores.Length; i++)\r\n                {\r\n                    int s = _latest._myTop3Scores[i];\r\n                    if (s <= 0) continue;   // 아직 안 채워진 슬롯은 숨김\r\n                    list.Add(new ScoreEntry { rank = i + 1, name = $\"{i + 1}위 기록\", score = s });\r\n                }\r\n            }\r\n\r\n            return list.ToArray();\r\n        }\r\n\r\n        // ── 점수 제출 ──────────────────────────────────────\r\n        public int Submit(int score)\r\n        {\r\n            // 실제 점수 저장은 데이터팀(LeaderboardRepository/UserManager)이 처리.\r\n            // 여기서는 알고 있는 내 순위만 돌려줌(컨트롤러는 라벨 표시에만 사용).\r\n            return _latest?._myRankRecord?._rank ?? 0;\r\n        }\r\n    }\r\n}","lines":111},{"id":"Scripts/Tutorial/TutorialTrigger.cs","name":"TutorialTrigger","path":"Scripts/Tutorial/TutorialTrigger.cs","layer":"Tutorial","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"한 스텝을 끝내는 조건. 전부 \"현재 존재하는 SlotEvent\"로만 판정(코어 비침습).","src":"﻿using System;\r\nusing Wooduduk.Slot;   // SymbolId\r\n\r\nnamespace Wooduduk.Tutorial\r\n{\r\n    // 한 스텝을 끝내는 조건. 전부 \"현재 존재하는 SlotEvent\"로만 판정(코어 비침습).\r\n    public enum TutorialTrigger\r\n    {\r\n        TapToContinue, // 독백만 보고 탭으로 진행(이벤트 없음)\r\n        OnSwing,       // 스윙 1회        -> OnSpinStarted\r\n        OnHit,         // 명중            -> OnSpinJudged(Judgment.IsHit)\r\n        OnFailNoSwing, // 헛스윙 실패      -> OnSpinJudged(FailReason.NOSWING)\r\n        OnFailWorm,    // 좀벌레 실패      -> OnSpinJudged(FailReason.WORM)\r\n        OnKnotSeen,    // 옹이 등장        -> OnReelsDecided(릴에 KNOT 포함)\r\n        OnComboReach,  // 콤보 N 도달      -> OnSpinJudged(Combo >= IntParam)\r\n        OnFireFed,     // 모닥불 투입      -> OnFireFed\r\n        OnSettle,      // 정산            -> OnSettled\r\n        OnMakgeolli,   // 막걸리 발동      -> OnSpinJudged(Judgment.MGLTriggered)\r\n        OnCardBought,  // 카드 구매 성공   -> OnCardBought(_, true)\r\n    }\r\n\r\n    // 스텝 동안 특정 심볼 출현 가중치를 비틀어 \"가르칠 심볼\"이 잘 뜨게 한다.\r\n    // Percent: 100=무변, 0=제거, 300=×3 (WeightTable.MultiplyPercent 규칙 그대로).\r\n    [Serializable]\r\n    public struct SymbolSkew\r\n    {\r\n        public SymbolId Symbol;\r\n        public int Percent;\r\n    }\r\n}","lines":30},{"id":"Scripts/Tutorial/TutorialWeightCard.cs","name":"TutorialWeightCard","path":"Scripts/Tutorial/TutorialWeightCard.cs","layer":"Tutorial","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"튜토리얼 전용 가중치 카드. 기존 효과 시스템(EffectsWeightStage가 SlotEffect.ModifyWeights를 파이프라인에서 호출)을 그대로 타므로 코어 추첨 코드를 건드리지 않고 챕터별 심볼 스큐를 줄 수 있다. Director가 머신에 1회 Add한 뒤, 스텝마다 SetSkew로 내용만 갈아끼운다.","src":"﻿using System;\r\nusing Wooduduk.Slot;   // SlotEffect, WeightTable, SpinContext, SymbolId\r\n\r\nnamespace Wooduduk.Tutorial\r\n{\r\n    // 튜토리얼 전용 가중치 카드.\r\n    // 기존 효과 시스템(EffectsWeightStage가 SlotEffect.ModifyWeights를 파이프라인에서 호출)을 그대로 타므로\r\n    // 코어 추첨 코드를 건드리지 않고 챕터별 심볼 스큐를 줄 수 있다.\r\n    // Director가 머신에 1회 Add한 뒤, 스텝마다 SetSkew로 내용만 갈아끼운다.\r\n    public sealed class TutorialWeightCard : SlotEffect\r\n    {\r\n        private SymbolSkew[] _skew = Array.Empty<SymbolSkew>();\r\n\r\n        public override string Id => \"tutorial_weight\";\r\n        public override string DisplayName => \"Tutorial\";\r\n\r\n        public TutorialWeightCard()\r\n        {\r\n            RemainingSpins = -1; // 영구(튜토리얼 내내 유지). TickDown 영향 없음.\r\n        }\r\n\r\n        // 스텝 진입 시 호출 — 이번 스텝 동안 적용할 심볼 스큐로 교체\r\n        public void SetSkew(SymbolSkew[] skew) => _skew = skew ?? Array.Empty<SymbolSkew>();\r\n\r\n        // 추첨 전 가중치 보정(기존 카드들과 동일한 훅)\r\n        public override void ModifyWeights(WeightTable table, in SpinContext ctx)\r\n        {\r\n            for (int i = 0; i < _skew.Length; i++)\r\n                table.MultiplyPercent(_skew[i].Symbol, _skew[i].Percent);\r\n        }\r\n    }\r\n}","lines":32},{"id":"Scripts/Core/IInteractable.cs","name":"IInteractable","path":"Scripts/Core/IInteractable.cs","layer":"Core","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿using UnityEngine;\r\n\r\nnamespace Wooduduk.Core\r\n{\r\n    public interface IInteractable\r\n    {\r\n        string Prompt { get; }\r\n        bool CanInteract { get; }\r\n        void Interact(IInteractor source);\r\n    }\r\n    public interface IInteractor { GameObject Owner { get; } }\r\n}\r\n","lines":13},{"id":"Scripts/Core/IHighlightable.cs","name":"IHighlightable","path":"Scripts/Core/IHighlightable.cs","layer":"Core","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿namespace Wooduduk.Core\r\n{\r\n    public interface IHighlightable\r\n    {\r\n        void SetHighlight(bool on);\r\n    }\r\n}\r\n","lines":8},{"id":"Scripts/Slot/WoodEvent.cs","name":"WoodEvent","path":"Scripts/Slot/WoodEvent.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"장작 물리 충돌 채널. WoodLog가 Raise → 오디오/VFX 바인더가 구독","src":"﻿using System;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 장작 물리 충돌 채널. WoodLog가 Raise → 오디오/VFX 바인더가 구독\r\n    public static class WoodEvent\r\n    {\r\n        // 충돌 위치, 정규화 강도(0~1, 속도 기반)\r\n        public static event Action<Vector3, float> OnWoodImpact;\r\n        public static void RaiseWoodImpact(Vector3 pos, float strength01) => OnWoodImpact?.Invoke(pos, strength01);\r\n    }\r\n}","lines":13},{"id":"Scripts/UI/IEffectSource.cs","name":"IEffectSource","path":"Scripts/UI/IEffectSource.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"효과의 정적 정의(이름·분류·버프여부). 안 변하는 것만. \"켜졌는지 / 남은 스핀\"은 여기 없음 런타임에 게임플레이가 통보(체온 정신). 진짜 데이터가 오면 StubEffectSource → EffectData SO 기반으로 한 줄만 교체.","src":"using System.Collections.Generic;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    public enum EffectCategory { Card, Makgeolli }\r\n\r\n    /// <summary>\r\n    /// 효과의 정적 정의(이름·분류·버프여부). 안 변하는 것만.\r\n    /// \"켜졌는지 / 남은 스핀\"은 여기 없음 — 런타임에 게임플레이가 통보(체온 정신).\r\n    /// 진짜 데이터가 오면 StubEffectSource → EffectData SO 기반으로 한 줄만 교체.\r\n    /// </summary>\r\n    public struct EffectInfo\r\n    {\r\n        public string id;\r\n        public string displayName;\r\n        public EffectCategory category;\r\n        public bool isBuff;   // 막걸리에서만 의미(버프/디버프). 카드는 무시.\r\n        public string description;   // hover 상세 설명. 없으면 \"\" (실데이터는 SO에서 채워짐).\r\n\r\n        public EffectInfo(string id, string displayName, EffectCategory category, bool isBuff = false, string description = \"\")\r\n        {\r\n            this.id = id;\r\n            this.displayName = displayName;\r\n            this.category = category;\r\n            this.isBuff = isBuff;\r\n            this.description = description;\r\n        }\r\n    }\r\n\r\n    public interface IEffectSource\r\n    {\r\n        IReadOnlyList<EffectInfo> GetAll();\r\n    }\r\n\r\n    // 기획서 카드/아이템 8종 + 막걸리 10종(버프5/디버프5)을 임시로 박아둠.\r\n    // 이 목록이 데이터 파트 EffectData SO의 계약(이름/분류/버프여부) 역할도 한다.\r\n    public class StubEffectSource : IEffectSource\r\n    {\r\n        // ⚠️ 아래 description은 hover UI 검증용 임시 문구다.\r\n        //    실서비스 문구는 DataManagerSO의 카드/막걸리 SO에서 와야 하며,\r\n        //    ScriptableObjectEffectSource가 SO의 설명을 EffectInfo.description으로 매핑해주면 자동 반영된다.\r\n        static readonly EffectInfo[] all =\r\n        {\r\n            // ── 카드 (런 지속) ──\r\n            new EffectInfo(\"card_aluminum_bat\",  \"알루미늄 배트\", EffectCategory.Card, false, \"일반 도끼보다 타격 판정이 넓어집니다. (임시 설명)\"),\r\n            new EffectInfo(\"card_lucky_sapling\", \"행운 묘목\",     EffectCategory.Card, false, \"희귀 심볼 등장 확률이 소폭 증가합니다. (임시 설명)\"),\r\n            new EffectInfo(\"card_insurance\",     \"보험 증서\",     EffectCategory.Card, false, \"실패 시 미정산 장작 일부를 보존합니다. (임시 설명)\"),\r\n            new EffectInfo(\"card_oil_can\",       \"기름통\",        EffectCategory.Card, false, \"체온 감소 속도가 느려집니다. (임시 설명)\"),\r\n            new EffectInfo(\"card_acorn_sack\",    \"도토리 자루\",   EffectCategory.Card, false, \"정산 시 추가 장작을 얻습니다. (임시 설명)\"),\r\n            new EffectInfo(\"card_fourth_reel\",   \"4번째 릴\",      EffectCategory.Card, false, \"릴이 하나 더 늘어 매치 기회가 증가합니다. (임시 설명)\"),\r\n            new EffectInfo(\"card_makgeolli_jar\", \"막걸리 항아리\", EffectCategory.Card, false, \"막걸리 발동 확률이 증가합니다. (임시 설명)\"),\r\n            new EffectInfo(\"card_pesticide\",     \"살충제\",        EffectCategory.Card, false, \"디버프 막걸리의 지속 스핀이 줄어듭니다. (임시 설명)\"),\r\n\r\n            // ── 막걸리 (임시 · 버프 5) ──\r\n            new EffectInfo(\"mak_burning_axe\", \"불타는 도끼\",   EffectCategory.Makgeolli, true,  \"지속 동안 타격 점수가 크게 증가합니다. (임시 설명)\"),\r\n            new EffectInfo(\"mak_golden_hand\", \"황금 손\",       EffectCategory.Makgeolli, true,  \"골드 획득량이 증가합니다. (임시 설명)\"),\r\n            new EffectInfo(\"mak_focus\",       \"장인의 집중\",   EffectCategory.Makgeolli, true,  \"정확한 타이밍 판정 범위가 넓어집니다. (임시 설명)\"),\r\n            new EffectInfo(\"mak_excitement\",  \"흥 폭발\",       EffectCategory.Makgeolli, true,  \"연속 성공 시 콤보 배율이 상승합니다. (임시 설명)\"),\r\n            new EffectInfo(\"mak_lucky_wind\",  \"행운목 바람\",   EffectCategory.Makgeolli, true,  \"잭팟 심볼 확률이 일시적으로 상승합니다. (임시 설명)\"),\r\n\r\n            // ── 막걸리 (임시 · 디버프 5) ──\r\n            new EffectInfo(\"mak_hiccup\",        \"딸꾹질\",     EffectCategory.Makgeolli, false, \"레버 조작이 가끔 어긋납니다. (임시 설명)\"),\r\n            new EffectInfo(\"mak_blurred_eyes\",  \"풀린 눈\",    EffectCategory.Makgeolli, false, \"릴 심볼이 흐릿하게 보입니다. (임시 설명)\"),\r\n            new EffectInfo(\"mak_heavy_axe\",     \"무거운 도끼\", EffectCategory.Makgeolli, false, \"스윙 속도가 느려집니다. (임시 설명)\"),\r\n            new EffectInfo(\"mak_whiff\",         \"헛손질\",     EffectCategory.Makgeolli, false, \"일정 확률로 타격이 빗나갑니다. (임시 설명)\"),\r\n            new EffectInfo(\"mak_upset_stomach\", \"배탈\",       EffectCategory.Makgeolli, false, \"정산 획득 장작이 감소합니다. (임시 설명)\"),\r\n        };\r\n\r\n        public IReadOnlyList<EffectInfo> GetAll() => all;\r\n    }\r\n}","lines":71},{"id":"Scripts/UI/Scriptableobjecteffectsource.cs","name":"Scriptableobjecteffectsource","path":"Scripts/UI/Scriptableobjecteffectsource.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"진짜 데이터(DataManagerSO)를 효과 패널의 IEffectSource 계약으로 변환하는 어댑터. StubEffectSource 자리에 끼운다 → EffectsController.Awake 한 줄 교체. 스킨 어댑터와 같은 \"번역가\" 패턴: 1) 두 리스트(_cardDataList, _makgeolliDataList)를 한 목록으로 합침. 2) 데이터팀 SO 필드 → 내 EffectInfo로 매핑. 3) category","src":"using System.Collections.Generic;\r\nusing Wooduduk.Data.DataSO;        // DataManagerSO, CardDataSO, MakgeolliEffectDataSO\r\nusing DataBuffType = Wooduduk.Data.Static.StaticEnum.BuffType;  // 데이터팀 버프타입\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    /// <summary>\r\n    /// 진짜 데이터(DataManagerSO)를 효과 패널의 IEffectSource 계약으로 변환하는 어댑터.\r\n    /// StubEffectSource 자리에 끼운다 → EffectsController.Awake 한 줄 교체.\r\n    ///\r\n    /// 스킨 어댑터와 같은 \"번역가\" 패턴:\r\n    ///  1) 두 리스트(_cardDataList, _makgeolliDataList)를 한 목록으로 합침.\r\n    ///  2) 데이터팀 SO 필드 → 내 EffectInfo로 매핑.\r\n    ///  3) category는 \"어느 리스트에서 왔나\"로 결정 (카드=Card / 막걸리=Makgeolli).\r\n    ///\r\n    /// 주의: 여긴 \"정의(이름/분류/버프여부)\"만 변환한다.\r\n    ///       켜짐·남은스핀 같은 런타임 상태는 게임플레이가 진입점으로 통보(체온 정신).\r\n    /// </summary>\r\n    public class ScriptableObjectEffectSource : IEffectSource\r\n    {\r\n        private readonly DataManagerSO data;\r\n\r\n        public ScriptableObjectEffectSource(DataManagerSO dataManager)\r\n        {\r\n            data = dataManager;\r\n        }\r\n\r\n        public IReadOnlyList<EffectInfo> GetAll()\r\n        {\r\n            var result = new List<EffectInfo>();\r\n\r\n            // --- 카드 (런 지속, 버프/디버프 구분 없음) ---\r\n            if (data._cardDataList != null)\r\n            {\r\n                foreach (var so in data._cardDataList)\r\n                {\r\n                    if (so == null || so._data == null) continue;\r\n                    result.Add(new EffectInfo(\r\n                        so._data._id,\r\n                        so._data._name,\r\n                        EffectCategory.Card,\r\n                        false,                    // 카드는 isBuff 미사용 → 고정 false\r\n                        so._data._description));  // hover 상세 설명(시트 Description)\r\n                }\r\n            }\r\n\r\n            // --- 막걸리 (임시, 버프/디버프 태그 색칠에 isBuff 사용) ---\r\n            //   막걸리 설명은 시트가 아니라 아래 MakgeolliDesc 표에서 하드코딩으로 가져온다.\r\n            //   매칭 키 = so._data._name (막걸리 이름). 표에 없으면 \"\" → hover는 \"설명 준비 중\".\r\n            if (data._makgeolliDataList != null)\r\n            {\r\n                foreach (var so in data._makgeolliDataList)\r\n                {\r\n                    if (so == null || so._data == null) continue;\r\n\r\n                    string desc = MakgeolliDesc.TryGetValue(so._data._name, out var d) ? d : \"\";\r\n\r\n                    result.Add(new EffectInfo(\r\n                        so._data._id,\r\n                        so._data._name,\r\n                        EffectCategory.Makgeolli,\r\n                        IsBuff(so._data._type),\r\n                        desc));\r\n                }\r\n            }\r\n\r\n            return result;\r\n        }\r\n\r\n        // ★ 막걸리 설명 하드코딩 표 (키 = 막걸리 이름, so._data._name과 정확히 일치해야 함).\r\n        //   여기 문자열만 실제 기획 문구로 바꿔 넣으면 hover 상세에 그대로 뜬다.\r\n        //   이름을 못 찾으면 빈 문자열 → EffectsController가 \"설명 준비 중\"으로 폴백.\r\n        private static readonly Dictionary<string, string> MakgeolliDesc = new Dictionary<string, string>\r\n        {\r\n            // ── 버프 ──\r\n            { \"불타는도끼\", \"다음 5스핀 스윙 심볼 출현율 +15%\" },\r\n            { \"황금손\",     \"다음 5스핀 도토리 가치 ×2\" },\r\n            { \"장인의집중\", \"다음 3스핀 정타 출현율 +25%\" },\r\n            { \"흥폭발\",     \"다음 1스핀 명중 시 콤보 +2\" },\r\n            { \"행운목바람\", \"다음 5스핀 행운 출현율 ↑\" },\r\n\r\n            // ── 디버프 ──\r\n            { \"딸꾹질\",   \"다음 3스핀 좀벌레 출현율 소폭 ↑\" },\r\n            { \"풀린눈\",  \"다음 3스핀 정타 출현율 ↓\" },\r\n            { \"무거운도끼\", \"다음 1스핀 강제 약스윙(스윙 1개 고정)\" },\r\n            { \"헛손질\",   \"다음 1스핀 장작 0 (콤보는 유지)\" },\r\n            { \"배탈\",     \"다음 2스핀 도토리 가치 0\" },\r\n        };\r\n\r\n        /// <summary>\r\n        /// 데이터팀 BuffType → 내 isBuff(bool) 변환.\r\n        /// 막걸리 패널의 초록(버프)/빨강(디버프) 태그 색을 가른다.\r\n        /// BUFF만 true, 나머지(DEBUFF·NONE)는 false.\r\n        /// → NONE을 디버프(빨강)로 두는 건 안전한 기본값: 정체불명 효과를\r\n        ///   \"좋은 것\"처럼 초록으로 칠해 오해를 주느니 중립/주의 쪽으로.\r\n        /// </summary>\r\n        private static bool IsBuff(DataBuffType type)\r\n        {\r\n            return type == DataBuffType.BUFF;\r\n        }\r\n    }\r\n}","lines":102},{"id":"Scripts/Data/Result/RunResultData.cs","name":"RunResultData","path":"Scripts/Data/Result/RunResultData.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"이번 런에서 획득한 총 골드","src":"﻿namespace Wooduduk.Data.Result\r\n{\r\n\r\n    [System.Serializable]\r\n    public class RunResultData\r\n    {\r\n        public string _userId;\r\n        public string _userNick;\r\n\r\n        // 최종 점수\r\n        public int _finalScore;\r\n        // 이번 런에서 획득한 총 골드\r\n        public int _earnedGold;\r\n        // 최고 콤보\r\n        public int _maxCombo;\r\n        // 생존 시간(초)\r\n        public float _survivalTime;\r\n        // 정산 횟수\r\n        public int _settlementCount;\r\n\r\n        // 멀티용\r\n        public long _rawScore;       // ★ 티어용 (배율 적용 전 순수 점수)\r\n        public int _rank;            // ★ 멀티 등수 (1등=1, 동점 시 공동)\r\n\r\n\r\n        // 최고 점수 갱신 여부\r\n        public bool _isNewRecord;\r\n        // 종료 시각 (UTC Unix Timestamp)\r\n        public long _timestamp;\r\n    }\r\n}","lines":31},{"id":"Scripts/Data/Service/RunResultUIService.cs","name":"RunResultUIService","path":"Scripts/Data/Service/RunResultUIService.cs","layer":"Data","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"비동기 등수 확정 후 결과창 업데이트용","src":"﻿using System;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.Result;\r\n\r\nnamespace Wooduduk.Data.Service\r\n{\r\n    public static class RunResultUIService\r\n    {\r\n        public static Action<RunResultData> OnResultShown;\r\n        public static event Action<RunResultData> OnShow;\r\n        // 비동기 등수 확정 후 결과창 업데이트용\r\n        public static event Action<int> OnRankUpdated;\r\n\r\n        public static void Show(RunResultData result)\r\n        {\r\n            if (result == null)\r\n            {\r\n                Debug.LogWarning(\"[RunResultUIService] result가 null입니다.\");\r\n                return;\r\n            }\r\n\r\n            Debug.Log(\r\n                $\"[RunResultUI] 결과 표시 / \" +\r\n                $\"Score={result._finalScore}, \" +\r\n                $\"Gold={result._earnedGold}, \" +\r\n                $\"Rank={result._rank}, \" +\r\n                $\"Survival={result._survivalTime:F1}, \" +\r\n                $\"Settle={result._settlementCount}, \" +\r\n                $\"MaxCombo={result._maxCombo}\");\r\n\r\n            OnResultShown?.Invoke(result);\r\n\r\n            // TODO: 실제 결과창 연결\r\n            OnShow?.Invoke(result);\r\n        }\r\n\r\n        public static void UpdateRank(int rank)\r\n        {\r\n            OnRankUpdated?.Invoke(rank);\r\n        }\r\n    }\r\n}","lines":42},{"id":"Scripts/Network/Firebase/Matchmaking/FirebaseRoomMatchSource.cs","name":"FirebaseRoomMatchSource","path":"Scripts/Network/Firebase/Matchmaking/FirebaseRoomMatchSource.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"게임에 참여할 총 인원 (실제 + 고스트 포함)","src":"﻿using System;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Matchmaking;\r\nusing Wooduduk.Network.Firebase.Leaderboard;\r\nusing Wooduduk.Tier;\r\n\r\nnamespace Wooduduk.Network.Firebase.Matchmaking\r\n{\r\n    public class FirebaseRoomMatchSource : IRoomMatchSource\r\n    {\r\n        #region --- 설정 (외부에서 제어 가능) ---\r\n\r\n        /// <summary>게임에 참여할 총 인원 (실제 + 고스트 포함)</summary>\r\n        public int DesiredPlayerCount { get; set; } = 2;\r\n\r\n        /// <summary>고스트로 빈자리를 채울지 여부</summary>\r\n        public bool AllowGhostFill { get; set; } = true;\r\n\r\n        /// <summary>고스트를 채우기까지 기다리는 시간 (초)</summary>\r\n        public float GhostFillTimeout { get; set; } = 4f;\r\n\r\n        #endregion\r\n\r\n        #region --- 상태 ---\r\n\r\n        private enum Phase { Idle, Searching, Waiting, Matched, Failed }\r\n        private Phase _phase = Phase.Idle;\r\n\r\n        public bool IsMatched => _phase == Phase.Matched;\r\n        public bool IsFailed => _phase == Phase.Failed;\r\n\r\n        private List<GhostEntry> _ghostCandidates = new();\r\n\r\n        private readonly GhostRepository _ghostRepo = new GhostRepository();\r\n\r\n        #endregion\r\n\r\n        #region --- 의존성 ---\r\n\r\n        private readonly RoomRepository _repo;\r\n        private readonly RoomSession _session;\r\n        private readonly string _myUid;\r\n        private readonly string _myNick;\r\n        private readonly int _myTier;\r\n        private readonly int _myGamesPlayed;\r\n\r\n        public int MyTier => _myTier;\r\n\r\n        #endregion\r\n\r\n        #region --- 내부 상태 ---\r\n\r\n        private float _waitTimer;\r\n        private bool _ghostFilled;\r\n\r\n        #endregion\r\n\r\n        #region --- 이벤트 ---\r\n\r\n        public event Action<long> OnMatchReady;\r\n        public event Action OnMatchFailed;\r\n\r\n        #endregion\r\n\r\n        public FirebaseRoomMatchSource(string myUid, string myNick, int myTier, int myGamesPlayed)\r\n        {\r\n            _repo = new RoomRepository();\r\n            _session = new RoomSession();\r\n\r\n            _myUid = myUid;\r\n            _myNick = myNick;\r\n            _myTier = myTier;\r\n            _myGamesPlayed = myGamesPlayed;\r\n        }\r\n\r\n        public RoomSession Session => _session;\r\n        public RoomRepository Repository => _repo;\r\n\r\n        #region ===== Begin / Cancel =====\r\n\r\n        public void BeginMatch()\r\n        {\r\n            if (_phase != Phase.Idle) return;\r\n            _phase = Phase.Searching;\r\n            _waitTimer = 0f;\r\n            _ghostFilled = false;\r\n            _session.MinPlayers = DesiredPlayerCount;\r\n            _session.MaxPlayers = DesiredPlayerCount;\r\n\r\n            // 고스트 후보 로드는 방 탐색과 무관하게 병렬로 시작\r\n            _ghostRepo.LoadCandidates(_myTier, entries =>\r\n            {\r\n                _ghostCandidates = entries ?? new List<GhostEntry>();\r\n                _session.GhostCandidates = _ghostCandidates;\r\n            });\r\n\r\n            // 이전 세션 잔존 방 정리 후 탐색 시작\r\n            // (유니티 에디터 중지 등으로 onDisconnect가 아직 처리 안 됐을 경우 대비)\r\n            _repo.CleanupMyPreviousRoom(_myUid, () =>\r\n                _repo.FindWaitingRoomByTier(_myTier, OnFindWaitingRoom)\r\n            );\r\n        }\r\n\r\n        public void CancelMatch()\r\n        {\r\n            if (_phase == Phase.Idle) return;\r\n\r\n            string roomId = _session.RoomId;\r\n            if (!string.IsNullOrEmpty(roomId))\r\n            {\r\n                _repo.UnsubscribeAll(roomId);\r\n                _repo.LeaveRoom(roomId, _myUid);\r\n\r\n                if (_session.IsHost && _session.RealPlayerCount <= 1)\r\n                    _repo.DeleteRoom(roomId);\r\n            }\r\n\r\n            _session.Clear();\r\n            _phase = Phase.Idle;\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region ===== 방 탐색 / 생성 =====\r\n\r\n        private void OnFindWaitingRoom(string roomId)\r\n        {\r\n            if (_phase != Phase.Searching) return;\r\n\r\n            if (string.IsNullOrEmpty(roomId))\r\n            {\r\n                CreateNewRoom();\r\n                return;\r\n            }\r\n\r\n            _repo.GetRoom(roomId, room =>\r\n            {\r\n                if (_phase != Phase.Searching) return;\r\n\r\n                if (room == null || room.state != \"waiting\" || string.IsNullOrEmpty(room.hostUid))\r\n                {\r\n                    CreateNewRoom();\r\n                    return;\r\n                }\r\n\r\n                JoinExistingRoom(roomId, room.hostUid);\r\n            });\r\n        }\r\n\r\n\r\n        private void CreateNewRoom()\r\n        {\r\n            string roomId = _repo.GenerateRoomId();\r\n\r\n            var roomData = new RoomData\r\n            {\r\n                state = \"waiting\",\r\n                stateAndTier = $\"waiting_{_myTier}\",\r\n                hostUid = _myUid\r\n            };\r\n\r\n            var playerData = new RoomPlayerData\r\n            {\r\n                uid = _myUid,\r\n                nick = _myNick,\r\n                tier = _myTier,\r\n                ready = true,\r\n                isGhost = false\r\n            };\r\n\r\n            // ★ 원자적 생성: 방 + 내 플레이어 동시 기록\r\n            _repo.CreateRoomWithPlayer(roomId, roomData, playerData, success =>\r\n            {\r\n                if (_phase != Phase.Searching) return;\r\n                if (!success) { FailMatch(); return; }\r\n\r\n                EnterRoomAsHost(roomId); // 구독만 (이미 player 등록됨)\r\n            });\r\n        }\r\n\r\n        /// <summary>\r\n        /// 새 방 호스트용: JoinRoom 없이 구독만 시작\r\n        /// </summary>\r\n        private void EnterRoomAsHost(string roomId)\r\n        {\r\n            _session.Initialize(roomId, \"waiting\", _myUid);\r\n\r\n            _repo.SubscribePlayers(roomId, OnPlayersChanged, OnRoomDeleted);\r\n            _repo.SubscribeState(roomId, OnStateChanged);\r\n\r\n            _phase = Phase.Waiting;\r\n            _waitTimer = 0f;\r\n        }\r\n\r\n        /// <summary>\r\n        /// 기존 방 참가자용: JoinRoom + 구독\r\n        /// </summary>\r\n        private void JoinExistingRoom(string roomId, string hostUid)\r\n        {\r\n            _session.Initialize(roomId, \"waiting\", _myUid);\r\n\r\n            _repo.JoinRoom(roomId, new RoomPlayerData\r\n            {\r\n                uid = _myUid,\r\n                nick = _myNick,\r\n                tier = _myTier,\r\n                ready = true,\r\n                isGhost = false\r\n            });\r\n\r\n            _repo.SubscribePlayers(roomId, OnPlayersChanged, OnRoomDeleted);\r\n            _repo.SubscribeState(roomId, OnStateChanged);\r\n\r\n            _phase = Phase.Waiting;\r\n            _waitTimer = 0f;\r\n        }\r\n\r\n        private void OnRoomDeleted()\r\n        {\r\n            if (_phase != Phase.Waiting) return;\r\n\r\n            string oldRoomId = _session.RoomId;\r\n\r\n            // ★ players가 비었어도 방 루트가 살아있으면 삭제가 아님\r\n            _repo.GetRoom(oldRoomId, room =>\r\n            {\r\n                if (_phase != Phase.Waiting) return;\r\n\r\n                if (room != null)\r\n                {\r\n                    // 방은 살아있는데 내 player 노드만 날아간 것\r\n                    // (onDisconnect 지연 발화 or 쓰기 거부 롤백)\r\n                    Debug.LogWarning($\"[MatchSource] players 비었지만 방 존재 → 재입장: {oldRoomId}\");\r\n                    _repo.JoinRoom(oldRoomId, new RoomPlayerData\r\n                    {\r\n                        uid = _myUid,\r\n                        nick = _myNick,\r\n                        tier = _myTier,\r\n                        ready = true,\r\n                        isGhost = false\r\n                    });\r\n                    return;\r\n                }\r\n\r\n                // 진짜 삭제됨 → 재탐색\r\n                _repo.UnsubscribeAll(oldRoomId);\r\n                _session.Clear();\r\n                _phase = Phase.Searching;\r\n                _waitTimer = 0f;\r\n                _ghostFilled = false;\r\n                _repo.FindWaitingRoomByTier(_myTier, OnFindWaitingRoom);\r\n            });\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region ===== 인원 감지 =====\r\n\r\n        private void OnPlayersChanged(System.Collections.Generic.Dictionary<string, RoomPlayerData> players)\r\n        {\r\n            if (_phase != Phase.Waiting) return;\r\n\r\n            _session.Players.Clear();\r\n            foreach (var p in players.Values)\r\n                _session.AddOrUpdatePlayer(p);\r\n\r\n            TryStartIfReady();\r\n        }\r\n\r\n        private void OnStateChanged(string state)\r\n        {\r\n            _session.SetState(state);\r\n\r\n            if (state == \"playing\" && _phase == Phase.Waiting)\r\n            {\r\n                CompleteMatch();\r\n            }\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region ===== Tick + 고스트 백필 =====\r\n\r\n        public void Tick(float deltaTime)\r\n        {\r\n            if (_phase != Phase.Waiting) return;\r\n\r\n            _waitTimer += deltaTime;\r\n\r\n            // 조건: 고스트 채우기 허용 + 타임아웃 + 내가 호스트 + 아직 고스트 안 채움\r\n            if (AllowGhostFill &&\r\n                _waitTimer >= GhostFillTimeout &&\r\n                !_ghostFilled &&\r\n                _session.IsHost)\r\n            {\r\n                FillWithGhosts();\r\n            }\r\n        }\r\n\r\n        private void FillWithGhosts()\r\n        {\r\n            _ghostFilled = true;\r\n\r\n            int need = DesiredPlayerCount - _session.PlayerCount;\r\n            if (need <= 0) return;\r\n\r\n            var svc = MatchmakingService.Instance;\r\n            if (svc == null)\r\n            {\r\n                FillWithGhostsFallback(need);\r\n                return;\r\n            }\r\n\r\n            var self = new MatchQuery(_myUid, (AxeTier)_myTier, _myGamesPlayed);\r\n\r\n            svc.RequestPool(self, _session.Seed, pool =>\r\n            {\r\n                int toFill = DesiredPlayerCount - _session.PlayerCount;\r\n                var opponents = pool.Opponents;\r\n\r\n                for (int i = 0; i < toFill; i++)\r\n                {\r\n                    string nick = (opponents != null && i < opponents.Count)\r\n                        ? opponents[i]._nick\r\n                        : $\"AI플레이어{i + 1}\";\r\n\r\n                    _repo.JoinRoom(_session.RoomId, new RoomPlayerData\r\n                    {\r\n                        uid = $\"ghost_{_session.RoomId}_{i}\",\r\n                        nick = nick,\r\n                        tier = _myTier,\r\n                        ready = true,\r\n                        isGhost = true\r\n                    });\r\n                }\r\n\r\n                _session.GhostCandidates = opponents ?? new List<GhostEntry>();\r\n            });\r\n        }\r\n\r\n        // 폴백 (MatchmakingService 없을 때 기존 방식)\r\n        private void FillWithGhostsFallback(int need)\r\n        {\r\n            Debug.Log($\"[MatchSource] 폴백: 고스트 {need}명 백필\");\r\n            for (int i = 0; i < need; i++)\r\n                _repo.JoinRoom(_session.RoomId, CreateGhostPlayer(i));\r\n        }\r\n\r\n        private RoomPlayerData CreateGhostPlayer(int index)\r\n        {\r\n            // 로드된 후보 있으면 실제 닉 사용, 없으면 폴백\r\n            string nick = (index < _ghostCandidates.Count)\r\n                ? _ghostCandidates[index]._nick\r\n                : $\"AI플레이어{index + 1}\";\r\n\r\n            return new RoomPlayerData\r\n            {\r\n                uid = $\"ghost_{_session.RoomId}_{index}\",  // uid는 기존 그대로\r\n                nick = nick,\r\n                tier = _myTier,\r\n                ready = true,\r\n                isGhost = true\r\n            };\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region ===== 매칭 완료 판단 =====\r\n\r\n        private void TryStartIfReady()\r\n        {\r\n            if (_phase != Phase.Waiting) return;\r\n            if (!_session.IsReady) return;\r\n\r\n            // ★★ 호스트가 인원 충족 시 → OnMatchReady만 발행 ★★\r\n            // state 변경은 MatchmakingFlow가 담당 (자동 시작 시퀀스에서)\r\n            if (_session.IsHost)\r\n            {\r\n                CompleteMatch();\r\n            }\r\n        }\r\n\r\n        // CompleteMatch는 state를 직접 바꾸지 않고 매칭 완료만 알림\r\n        private void CompleteMatch()\r\n        {\r\n            if (_phase == Phase.Matched) return; // 중복 방지\r\n            _phase = Phase.Matched;\r\n            Debug.Log($\"[MatchSource] 매칭 완료! 방={_session.RoomId}, Seed={_session.Seed}, 인원={_session.PlayerCount}\");\r\n            OnMatchReady?.Invoke(_session.Seed);\r\n        }\r\n\r\n        private void FailMatch()\r\n        {\r\n            _phase = Phase.Failed;\r\n            OnMatchFailed?.Invoke();\r\n        }\r\n\r\n        #endregion\r\n    }\r\n}","lines":401},{"id":"Scripts/Network/Firebase/Matchmaking/IMatchSource.cs","name":"IMatchSource","path":"Scripts/Network/Firebase/Matchmaking/IMatchSource.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿using System;\r\n\r\nnamespace Wooduduk.Network.Firebase.Matchmaking\r\n{\r\n    public interface IMatchSource\r\n    {\r\n        event Action<long> OnMatchReady; // 매칭 완료 및 공유 Seed 전달\r\n        event Action OnMatchFailed;      // 매칭 실패\r\n\r\n        void BeginMatch();\r\n        void CancelMatch();\r\n    }\r\n}","lines":13},{"id":"Scripts/UI/IMatchSource.cs","name":"IMatchSource","path":"Scripts/UI/IMatchSource.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"using UnityEngine;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    public interface IMatchSource\r\n    {\r\n        void Begin();\r\n        void Cancel();\r\n        int CurrentCount { get; }\r\n        int RequiredCount { get; }\r\n        bool IsMatched { get; }\r\n        string Seed { get; }\r\n    }\r\n\r\n    public class StubMatchSource : IMatchSource\r\n    {\r\n        public int RequiredCount => 4;\r\n        public int CurrentCount { get; private set; }\r\n        public bool IsMatched => CurrentCount >= RequiredCount;\r\n        public string Seed { get; private set; } = \"----\";\r\n\r\n        private float startTime;\r\n        private bool running;\r\n\r\n        public void Begin()\r\n        {\r\n            running = true;\r\n            CurrentCount = 1;\r\n            startTime = Time.time;\r\n            Seed = \"----\";\r\n        }\r\n\r\n        public void Cancel()\r\n        {\r\n            running = false;\r\n            CurrentCount = 0;\r\n        }\r\n\r\n        public void Tick()\r\n        {\r\n            if (!running || IsMatched) return;\r\n            int target = 1 + (int)((Time.time - startTime) / 1.5f);\r\n            CurrentCount = Mathf.Min(target, RequiredCount);\r\n            if (IsMatched) Seed = \"A7F3\";\r\n        }\r\n    }\r\n}","lines":47},{"id":"Scripts/Network/Firebase/Matchmaking/IRoomMatchSource.cs","name":"IRoomMatchSource","path":"Scripts/Network/Firebase/Matchmaking/IRoomMatchSource.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"FirebaseRoomMatchSource 등 Room 기반 매칭 소스 전용 확장 인터페이스. IMatchSource를 상속합니다.","src":"﻿namespace Wooduduk.Network.Firebase.Matchmaking\r\n{\r\n    /// <summary>\r\n    /// FirebaseRoomMatchSource 등 Room 기반 매칭 소스 전용 확장 인터페이스.\r\n    /// IMatchSource를 상속합니다.\r\n    /// </summary>\r\n    public interface IRoomMatchSource : IMatchSource\r\n    {\r\n        /// <summary>매칭 완료 여부</summary>\r\n        bool IsMatched { get; }\r\n\r\n        /// <summary>매칭 실패 여부</summary>\r\n        bool IsFailed { get; }\r\n\r\n        /// <summary>현재 세션 (Room 정보)</summary>\r\n        RoomSession Session { get; }\r\n\r\n        /// <summary>타임아웃 처리를 위한 매 프레임 호출</summary>\r\n        void Tick(float deltaTime);\r\n    }\r\n}","lines":21},{"id":"Scripts/Network/Firebase/Matchmaking/RoomContext.cs","name":"RoomContext","path":"Scripts/Network/Firebase/Matchmaking/RoomContext.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"단일 씬에서 매칭 → 게임 데이터를 전달하는 정적 컨텍스트 어디서든 RoomContext.Instance로 접근 가능","src":"﻿using UnityEngine;\r\n\r\nnamespace Wooduduk.Network.Firebase.Matchmaking\r\n{\r\n    /// <summary>\r\n    /// 단일 씬에서 매칭 → 게임 데이터를 전달하는 정적 컨텍스트\r\n    /// 어디서든 RoomContext.Instance로 접근 가능\r\n    /// </summary>\r\n    public class RoomContext\r\n    {\r\n        public static readonly RoomContext Instance = new RoomContext();\r\n\r\n        public RoomSession Session { get; private set; }\r\n        public RoomRepository Repository { get; private set; }\r\n\r\n        public bool IsInMultiplayer => Session != null && !string.IsNullOrEmpty(Session.RoomId);\r\n\r\n        private RoomContext() { } // 싱글톤 방어\r\n\r\n        /// <summary>\r\n        /// 매칭 완료 후 호출 (MultiplayerController에서 호출)\r\n        /// </summary>\r\n        public void SetMatchResult(RoomSession session, RoomRepository repository)\r\n        {\r\n            Session = session;\r\n            Repository = repository;\r\n            Debug.Log($\"[RoomContext] 멀티 세션 설정 완료 - RoomId: {session.RoomId}, Seed: {session.Seed}\");\r\n        }\r\n\r\n        /// <summary>\r\n        /// 게임 종료 후 반드시 호출 (방 나가기 + 구독 정리)\r\n        /// </summary>\r\n        public void Clear()\r\n        {\r\n            if (IsInMultiplayer && Repository != null)\r\n            {\r\n                Repository.UnsubscribeAll(Session.RoomId);\r\n                Repository.LeaveRoom(Session.RoomId, Session.MyUid);\r\n            }\r\n\r\n            Session = null;\r\n            Repository = null;\r\n            Debug.Log(\"[RoomContext] 멀티 세션 정리 완료\");\r\n        }\r\n    }\r\n}","lines":46},{"id":"Scripts/Network/Firebase/Matchmaking/RoomPlayerData.cs","name":"RoomPlayerData","path":"Scripts/Network/Firebase/Matchmaking/RoomPlayerData.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"방에 참가한 플레이어의 기본 정보입니다. 게임 시작 전 한 번만 등록되는 데이터입니다.","src":"﻿using System;\r\n\r\nnamespace Wooduduk.Network.Firebase.Matchmaking\r\n{\r\n    /// <summary>\r\n    /// 방에 참가한 플레이어의 기본 정보입니다.\r\n    /// 게임 시작 전 한 번만 등록되는 데이터입니다.\r\n    /// </summary>\r\n    [Serializable]\r\n    public class RoomPlayerData\r\n    {\r\n        /// <summary>플레이어 UID</summary>\r\n        public string uid;\r\n\r\n        /// <summary>닉네임</summary>\r\n        public string nick;\r\n\r\n        /// <summary>현재 티어</summary>\r\n        public int tier;\r\n\r\n        /// <summary>게임 준비 완료 여부</summary>\r\n        public bool ready;\r\n\r\n        /// <summary>고스트(AI) 여부</summary>\r\n        public bool isGhost;\r\n    }\r\n}","lines":27},{"id":"Scripts/Network/Firebase/Matchmaking/RoomSession.cs","name":"RoomSession","path":"Scripts/Network/Firebase/Matchmaking/RoomSession.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"현재 참가 중인 Room 정보를 메모리에 보관합니다. Seed는 roomId 해시로 자동 계산되어 모든 클라가 같은 값을 갖습니다.","src":"﻿using System;\r\nusing System.Collections.Generic;\r\nusing System.Security.Cryptography;\r\nusing System.Text;\r\nusing Wooduduk.Network.Firebase.Leaderboard;\r\n\r\nnamespace Wooduduk.Network.Firebase.Matchmaking\r\n{\r\n    /// <summary>\r\n    /// 현재 참가 중인 Room 정보를 메모리에 보관합니다.\r\n    /// Seed는 roomId 해시로 자동 계산되어 모든 클라가 같은 값을 갖습니다.\r\n    /// </summary>\r\n    public class RoomSession\r\n    {\r\n        #region --- Room 정보 ---\r\n\r\n        /// <summary>현재 참가 중인 Room ID</summary>\r\n        public string RoomId { get; private set; }\r\n\r\n        /// <summary>공유 Seed (roomId 해시로 결정론적 계산)</summary>\r\n        public long Seed { get; private set; }\r\n\r\n        /// <summary>Room 상태 (waiting / playing / finished)</summary>\r\n        public string State { get; private set; }\r\n\r\n        #endregion\r\n\r\n        #region --- Player 정보 ---\r\n\r\n        /// <summary>내 UID</summary>\r\n        public string MyUid { get; private set; }\r\n\r\n        /// <summary>Room 참가 플레이어</summary>\r\n        public Dictionary<string, RoomPlayerData> Players { get; } = new();\r\n        public List<GhostEntry> GhostCandidates { get; set; } = new();\r\n\r\n        #endregion\r\n\r\n        #region --- Config ---\r\n\r\n        /// <summary>게임 시작에 필요한 최소 인원</summary>\r\n        public int MinPlayers { get; set; } = 2;\r\n\r\n        /// <summary>방 최대 인원</summary>\r\n        public int MaxPlayers { get; set; } = 4;\r\n\r\n        #endregion\r\n\r\n        #region --- 생성 / 초기화 ---\r\n\r\n        /// <summary>\r\n        /// Room 정보를 초기화합니다.\r\n        /// Seed는 roomId 해시로 자동 계산됩니다.\r\n        /// </summary>\r\n        public void Initialize(string roomId, string state, string myUid)\r\n        {\r\n            RoomId = roomId;\r\n            Seed = HashRoomIdToSeed(roomId);\r\n            State = state;\r\n            MyUid = myUid;\r\n\r\n            Players.Clear();\r\n        }\r\n\r\n        /// <summary>세션을 정리합니다.</summary>\r\n        public void Clear()\r\n        {\r\n            RoomId = null;\r\n            Seed = 0;\r\n            State = null;\r\n
