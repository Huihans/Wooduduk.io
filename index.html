           MyUid = null;\r\n\r\n            Players.Clear();\r\n            GhostCandidates.Clear();\r\n        }\r\n\r\n        /// <summary>\r\n        /// roomId를 SHA256 해시 후 long으로 변환합니다.\r\n        /// 같은 roomId는 항상 같은 Seed를 반환합니다.\r\n        /// </summary>\r\n        private static long HashRoomIdToSeed(string roomId)\r\n        {\r\n            if (string.IsNullOrEmpty(roomId))\r\n                return 0;\r\n\r\n            using var sha = SHA256.Create();\r\n            byte[] hash = sha.ComputeHash(Encoding.UTF8.GetBytes(roomId));\r\n            return BitConverter.ToInt64(hash, 0);\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region --- Player 관리 ---\r\n\r\n        public void AddOrUpdatePlayer(RoomPlayerData player)\r\n        {\r\n            if (player == null || string.IsNullOrEmpty(player.uid)) return;\r\n            Players[player.uid] = player;\r\n        }\r\n\r\n        public void RemovePlayer(string uid)\r\n        {\r\n            Players.Remove(uid);\r\n        }\r\n\r\n        /// <summary>현재 플레이어 수</summary>\r\n        public int PlayerCount => Players.Count;\r\n\r\n        /// <summary>실제(고스트 제외) 플레이어 수</summary>\r\n        public int RealPlayerCount\r\n        {\r\n            get\r\n            {\r\n                int count = 0;\r\n                foreach (var p in Players.Values)\r\n                    if (!p.isGhost) count++;\r\n                return count;\r\n            }\r\n        }\r\n\r\n        /// <summary>게임 시작 가능 여부</summary>\r\n        public bool IsReady => PlayerCount >= MinPlayers;\r\n\r\n        /// <summary>방이 가득 찼는지</summary>\r\n        public bool IsFull => PlayerCount >= MaxPlayers;\r\n\r\n        /// <summary>내가 방 첫 입장자인지 (= 방 생성자)</summary>\r\n        public bool IsHost\r\n        {\r\n            get\r\n            {\r\n                if (string.IsNullOrEmpty(MyUid) || Players.Count == 0) return false;\r\n                // ★ 실플레이어(고스트 제외) 중 사전식 최소 uid가 호스트.\r\n                //   고스트를 포함하면 고스트 uid(\"ghost_...\")가 최소로 잡혀 고스트가 \"호스트\"가 되고,\r\n                //   고스트는 코디네이터(startAt 기록 등) 로직을 안 돌려 실플레이어가 무한 대기 → 게임 시작 불가.\r\n                string first = null;\r\n                foreach (var kvp in Players)\r\n                {\r\n                    if (kvp.Value != null && kvp.Value.isGhost) continue; // 고스트 제외\r\n                    if (first == null || string.CompareOrdinal(kvp.Key, first) < 0)\r\n                        first = kvp.Key;\r\n                }\r\n                return first != null && first == MyUid; // 실플레이어 없으면 false\r\n            }\r\n        }\r\n\r\n        /// <summary>\r\n        /// 실호스트(고스트 제외 선출) 존재 여부. false면 방에 실플레이어가 하나도 없는\r\n        /// \"고아 방\" — 아무도 startAt을 기록하지 못해 전원 무한 대기하므로 파괴 대상.\r\n        /// (= RealPlayerCount &gt; 0 과 동치. 호출부 가독성용 별칭.)\r\n        /// </summary>\r\n        public bool HasRealHost => RealPlayerCount > 0;\r\n\r\n        /// <summary>\r\n        /// (진단용) 고스트를 포함해 나이브하게 최소 uid를 뽑으면 그게 고스트인가.\r\n        /// IsHost는 고스트를 제외하므로 실제 선출엔 영향 없음(실플레이어가 승계).\r\n        /// true면 \"예전 로직이라면 고스트가 호스트로 잡혔을\" 상황 — 로그로만 가시화하고 방은 유지한다\r\n        /// (솔로+고스트 정상 매치의 절반이 여기 해당하므로 파괴하면 정상 매치를 부순다).\r\n        /// </summary>\r\n        public bool GhostWouldBeNaiveHost\r\n        {\r\n            get\r\n            {\r\n                if (Players.Count == 0) return false;\r\n                string first = null;\r\n                bool firstIsGhost = false;\r\n                foreach (var kvp in Players)\r\n                {\r\n                    if (kvp.Value == null) continue;\r\n                    if (first == null || string.CompareOrdinal(kvp.Key, first) < 0)\r\n                    {\r\n                        first = kvp.Key;\r\n                        firstIsGhost = kvp.Value.isGhost;\r\n                    }\r\n                }\r\n                return first != null && firstIsGhost;\r\n            }\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region --- Room 상태 ---\r\n\r\n        public void SetState(string state)\r\n        {\r\n            State = state;\r\n        }\r\n\r\n        #endregion\r\n    }\r\n}","lines":191},{"id":"Scripts/Data/Service/MultiRunResultService.cs","name":"MultiRunResultService","path":"Scripts/Data/Service/MultiRunResultService.cs","layer":"Data","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"멀티 플레이 런 종료 처리 (2단계) 1단계 CreateProvisional : 사망 직후 임시 등수 기준 결과 생성 (UI 선표시용) 2단계 ConfirmRank : 서버 등수 확정 후 골드/티어/저장 최종 처리","src":"﻿using UnityEngine;\r\nusing Wooduduk.Data.Result;\r\nusing Wooduduk.Data.Static;\r\nusing Wooduduk.Network.Firebase;\r\nusing Wooduduk.Slot;\r\nusing Wooduduk.Tier;\r\n\r\nnamespace Wooduduk.Data.Service\r\n{\r\n    /// <summary>\r\n    /// 멀티 플레이 런 종료 처리 (2단계)\r\n    /// 1단계 CreateProvisional : 사망 직후 임시 등수 기준 결과 생성 (UI 선표시용)\r\n    /// 2단계 ConfirmRank       : 서버 등수 확정 후 골드/티어/저장 최종 처리\r\n    /// </summary>\r\n    public static class MultiRunResultService\r\n    {\r\n        // ── 1단계: 사망 직후 (임시) ──\r\n        public static RunResultData CreateProvisional(\r\n            RunProgress run, SlotScoreCalculator score, UserData user, int provisionalRank)\r\n        {\r\n            if (run == null || score == null || user == null)\r\n            {\r\n                Debug.LogWarning(\"[MultiRunResultService] 유효하지 않은 인자\");\r\n                return null;\r\n            }\r\n\r\n            long rawScore = score.MultiScore(run);\r\n\r\n            var result = new RunResultData\r\n            {\r\n                _userId = user._userId,\r\n                _userNick = user._userNick,\r\n                _finalScore = (int)rawScore,\r\n                _maxCombo = run.MaxCombo,\r\n                _survivalTime = run.SurvivalSeconds,\r\n                _settlementCount = run.SettleCount,\r\n                _rank = provisionalRank,\r\n                _rawScore = rawScore,\r\n                _earnedGold = (int)score.MultiCurrency(run, provisionalRank)\r\n            };\r\n\r\n            // ★ 여기서는 저장/티어 적용 안 함 — 아직 확정이 아니므로!\r\n            Debug.Log($\"[MultiRunResultService] 임시 결과 생성: rank={provisionalRank}, score={rawScore}\");\r\n            return result;\r\n        }\r\n\r\n        // ── 2단계: 등수 확정 후 (최종) ──\r\n        public static void ConfirmRank(RunResultData result, RunProgress run, SlotScoreCalculator score, UserData user, int confirmedRank, int playerCount)\r\n        {\r\n            if (result == null || run == null || score == null || user == null) return;\r\n\r\n            result._rank = confirmedRank;\r\n            result._earnedGold = (int)score.MultiCurrency(run, confirmedRank);\r\n\r\n            // ★ 티어: 멀티는 순위(rank+playerCount)로 판정 → TierCalculator가 상위 절반 성공(+LP)/하위 실패(-LP).\r\n            TierService.Instance?.ApplyRun(new RunResult((int)score.MultiScore(run), confirmedRank, playerCount));\r\n\r\n            RunResultSaveService.Save(result, user);\r\n\r\n            Debug.Log($\"[MultiRunResultService] 확정 완료: rank={confirmedRank}, gold={result._earnedGold}, \" +\r\n                      $\"tier={TierService.Instance?.CurrentRank}\");\r\n        }\r\n    }\r\n}","lines":64},{"id":"Scripts/Network/Firebase/Leaderboard/GhostEntry.cs","name":"GhostEntry","path":"Scripts/Network/Firebase/Leaderboard/GhostEntry.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿namespace Wooduduk.Network.Firebase.Leaderboard\r\n{\r\n    [System.Serializable]\r\n    public class GhostEntry\r\n    {\r\n        public string _userId;\r\n        public string _nick;\r\n\r\n        public int _score;\r\n\r\n        public int _maxCombo;\r\n        public int _settlementCount;\r\n\r\n        public int _tier;        // AxeTier 대신 int (단순 비교용)\r\n        public int _gamesPlayed; // 나중 확장용\r\n    }\r\n}","lines":17},{"id":"Scripts/Slot/SlotScoreCalculator.cs","name":"SlotScoreCalculator","path":"Scripts/Slot/SlotScoreCalculator.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"생존 구간 점수 -> 멀티플레이 티어 점수","src":"﻿namespace Wooduduk.Slot\r\n{\r\n    public class SlotScoreCalculator\r\n    {\r\n        private readonly SlotScoreConfig _cfg;\r\n        public SlotScoreCalculator(SlotScoreConfig cfg) { _cfg = cfg; }\r\n\r\n        // 생존 구간 점수 -> 멀티플레이 티어 점수\r\n        public long SurvivalTierBand(RunProgress r)\r\n        {\r\n            int pts = 0; float best = -1f;\r\n            if (_cfg._survivalBands != null)\r\n                foreach (var b in _cfg._survivalBands)\r\n                    if (r.SurvivalSeconds >= b._minSeconds && b._minSeconds > best) { best = b._minSeconds; pts = b._points; }\r\n            return pts;\r\n        }\r\n        // 생존 기본 점수 -> 싱글/멀티 점수\r\n        public long SurvivalBase(RunProgress r) => (long)(r.SurvivalSeconds * _cfg._survivalBasePerSecond);\r\n        public long BankedWood(RunProgress r) => (long)r.BankedWood * _cfg._bankedWoodScoreBp / 10000;\r\n        public long Rank(int rank)\r\n        {\r\n            var t = _cfg._rankPoints;\r\n            int i = rank - 1;\r\n            return (t != null && i >= 0 && i < t.Count) ? t[i] : 0;\r\n        }\r\n\r\n        // 확정 5출력\r\n        public long SingleScore(RunProgress r) => SurvivalBase(r) + BankedWood(r);          // 싱글 점수\r\n        public long SingleCurrency(RunProgress r) => SurvivalBase(r);                          // 싱글 재화\r\n        public long MultiScore(RunProgress r) => SurvivalBase(r) + BankedWood(r);          // 멀티 점수(기록용)\r\n        public long MultiTierScore(RunProgress r, int rank) => SurvivalTierBand(r) + Rank(rank);   // S + R\r\n        public long MultiCurrency(RunProgress r, int rank) => SurvivalBase(r) + Rank(rank) + BankedWood(r); // S + R + W\r\n    }\r\n}\r\n","lines":35},{"id":"Scripts/Network/Firebase/Matchmaking/RoomLiveData.cs","name":"RoomLiveData","path":"Scripts/Network/Firebase/Matchmaking/RoomLiveData.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"게임 플레이 중 실시간으로 동기화되는 플레이어 상태입니다. 각 플레이어는 자신의 데이터만 RTDB에 Write합니다. 2~4Hz 주기로 throttle 됩니다.","src":"﻿using System;\r\n\r\nnamespace Wooduduk.Network.Firebase.Matchmaking\r\n{\r\n    /// <summary>\r\n    /// 게임 플레이 중 실시간으로 동기화되는 플레이어 상태입니다.\r\n    /// 각 플레이어는 자신의 데이터만 RTDB에 Write합니다.\r\n    /// 2~4Hz 주기로 throttle 됩니다.\r\n    /// </summary>\r\n    [Serializable]\r\n    public class RoomLiveData\r\n    {\r\n        /// <summary>현재 점수</summary>\r\n        public long score;\r\n\r\n        /// <summary>현재 콤보</summary>\r\n        public int combo;\r\n\r\n        /// <summary>현재 체온</summary>\r\n        public float temperature;\r\n\r\n        /// <summary>생존 여부</summary>\r\n        public bool alive = true;\r\n\r\n        /// <summary>현재 스핀 횟수(진행도)</summary>\r\n        public int spinIndex;\r\n\r\n        /// <summary>모닥불 켜짐 여부(FireBurnSeconds > 0). ON/OFF만 표시(남은시간/횟수 아님).</summary>\r\n        public bool fireLit;\r\n    }\r\n}","lines":31},{"id":"Scripts/Network/Firebase/Matchmaking/RoomRepository.cs","name":"RoomRepository","path":"Scripts/Network/Firebase/Matchmaking/RoomRepository.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"Room 데이터를 관리합니다. Room 생성, 참가, 상태 변경, 실시간 데이터 동기화를 담당합니다. RTDB 입출력만 담당합니다.","src":"﻿using Firebase.Database;\r\nusing Firebase.Extensions;\r\nusing System;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.Network.Firebase.Matchmaking\r\n{\r\n    /// <summary>\r\n    /// Room 데이터를 관리합니다.\r\n    /// Room 생성, 참가, 상태 변경, 실시간 데이터 동기화를 담당합니다.\r\n    /// RTDB 입출력만 담당합니다.\r\n    /// </summary>\r\n    public class RoomRepository\r\n    {\r\n        /// <summary>Firebase Root Reference</summary>\r\n        private readonly DatabaseReference _database;\r\n\r\n        /// <summary>구독 해제용 핸들러 보관 (key: subscribeKey, value: handler)</summary>\r\n        private readonly Dictionary<string, EventHandler<ValueChangedEventArgs>> _handlers = new();\r\n\r\n        public RoomRepository()\r\n        {\r\n            _database = FirebaseDatabase.DefaultInstance.RootReference;\r\n        }\r\n\r\n        #region ===== 방 =====\r\n\r\n        /// <summary>\r\n        /// Firebase Push key로 unique한 roomId를 생성합니다.\r\n        /// 시간순 정렬되는 unique key입니다.\r\n        /// </summary>\r\n        public string GenerateRoomId()\r\n        {\r\n            return _database.Child(\"rooms\").Push().Key;\r\n        }\r\n\r\n        /// <summary>\r\n        /// 방 생성과 첫 플레이어 등록을 원자적으로 처리합니다.\r\n        /// 빈 방이 노출되는 타이밍을 제거하여 레이스 컨디션을 방지합니다.\r\n        /// </summary>\r\n        public void CreateRoomWithPlayer(string roomId, RoomData room, RoomPlayerData firstPlayer, Action<bool> callback)\r\n        {\r\n            // ★ 문자열이 아니라 Dictionary로 저장 (객체 구조 유지)\r\n            var playerDict = new Dictionary<string, object>\r\n            {\r\n                [\"uid\"] = firstPlayer.uid,\r\n                [\"nick\"] = firstPlayer.nick,\r\n                [\"tier\"] = firstPlayer.tier,\r\n                [\"ready\"] = firstPlayer.ready,\r\n                [\"isGhost\"] = firstPlayer.isGhost\r\n            };\r\n\r\n            var updates = new Dictionary<string, object>\r\n            {\r\n                [$\"rooms/{roomId}/state\"] = room.state,\r\n                [$\"rooms/{roomId}/stateAndTier\"] = room.stateAndTier,\r\n                [$\"rooms/{roomId}/hostUid\"] = room.hostUid,\r\n                [$\"rooms/{roomId}/players/{firstPlayer.uid}\"] = playerDict,  // ★ Dictionary\r\n                [$\"activeRooms/{firstPlayer.uid}\"] = roomId\r\n            };\r\n\r\n            // onDisconnect 설정\r\n            var playerRef = _database.Child(\"rooms\").Child(roomId).Child(\"players\").Child(firstPlayer.uid);\r\n            var liveRef = _database.Child(\"rooms\").Child(roomId).Child(\"live\").Child(firstPlayer.uid);\r\n            var activeRef = _database.Child(\"activeRooms\").Child(firstPlayer.uid);\r\n\r\n            playerRef.OnDisconnect().RemoveValue();\r\n            liveRef.OnDisconnect().RemoveValue();\r\n            activeRef.OnDisconnect().RemoveValue();\r\n\r\n            _database.UpdateChildrenAsync(updates)\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    bool success = !(task.IsCanceled || task.IsFaulted);\r\n                    if (!success)\r\n                        Debug.LogError($\"[RoomRepository] CreateRoomWithPlayer 실패: {task.Exception?.Message}\");\r\n                    else\r\n                        Debug.Log($\"[RoomRepository] 원자적 방 생성 완료: {roomId}\");\r\n\r\n                    callback?.Invoke(success);\r\n                });\r\n        }\r\n\r\n        /// <summary>새로운 Room을 생성합니다.</summary>\r\n        public void CreateRoom(string roomId, RoomData room, Action<bool> callback)\r\n        {\r\n            string json = JsonUtility.ToJson(room);\r\n\r\n            _database\r\n                .Child(\"rooms\")\r\n                .Child(roomId)\r\n                .SetRawJsonValueAsync(json)\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    bool success = !(task.IsCanceled || task.IsFaulted);\r\n                    if (!success)\r\n                        Debug.LogError($\"[RoomRepository] CreateRoom 실패: {roomId}\");\r\n\r\n                    callback?.Invoke(success);\r\n                });\r\n        }\r\n\r\n        /// <summary>Room을 삭제합니다.</summary>\r\n        public void DeleteRoom(string roomId)\r\n        {\r\n            _database\r\n                .Child(\"rooms\")\r\n                .Child(roomId)\r\n                .RemoveValueAsync()\r\n                .ContinueWithOnMainThread(LogIfFailed(\"DeleteRoom\"));\r\n        }\r\n\r\n        /// <summary>\r\n        /// 대기 중(waiting)인 Room을 찾습니다.\r\n        /// 없으면 null을 반환합니다.\r\n        /// TODO: 동시 생성 race condition은 MVP에서 무시 (실패 시 그냥 대기방 추가됨)\r\n        /// </summary>\r\n        public void FindWaitingRoom(Action<string> callback)\r\n        {\r\n            _database\r\n                .Child(\"rooms\")\r\n                .OrderByChild(\"state\")\r\n                .EqualTo(\"waiting\")\r\n                .LimitToFirst(1)\r\n                .GetValueAsync()\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    if (task.IsFaulted || task.IsCanceled)\r\n                    {\r\n                        Debug.LogError(\"[RoomRepository] FindWaitingRoom 실패\");\r\n                        callback?.Invoke(null);\r\n                        return;\r\n                    }\r\n\r\n                    foreach (var child in task.Result.Children)\r\n                    {\r\n                        callback?.Invoke(child.Key);\r\n                        return;\r\n                    }\r\n\r\n                    callback?.Invoke(null);\r\n                });\r\n        }\r\n\r\n        /// <summary>Room 전체를 실시간 구독합니다.</summary>\r\n        public void SubscribeRoom(string roomId, Action<DataSnapshot> callback)\r\n        {\r\n            string key = $\"room_{roomId}\";\r\n            UnsubscribeByKey(key, _database.Child(\"rooms\").Child(roomId));\r\n\r\n            EventHandler<ValueChangedEventArgs> handler = (sender, args) =>\r\n            {\r\n                callback?.Invoke(args.Snapshot);\r\n            };\r\n\r\n            _database.Child(\"rooms\").Child(roomId).ValueChanged += handler;\r\n            _handlers[key] = handler;\r\n        }\r\n\r\n        public void UnsubscribeRoom(string roomId)\r\n        {\r\n            UnsubscribeByKey($\"room_{roomId}\", _database.Child(\"rooms\").Child(roomId));\r\n        }\r\n\r\n        /// <summary>Room 상태를 구독합니다.</summary>\r\n        public void SubscribeState(string roomId, Action<string> callback)\r\n        {\r\n            string key = $\"state_{roomId}\";\r\n            var reference = _database.Child(\"rooms\").Child(roomId).Child(\"state\");\r\n            UnsubscribeByKey(key, reference);\r\n\r\n            EventHandler<ValueChangedEventArgs> handler = (sender, args) =>\r\n            {\r\n                if (!args.Snapshot.Exists) return;\r\n                callback?.Invoke(args.Snapshot.Value.ToString());\r\n            };\r\n\r\n            reference.ValueChanged += handler;\r\n            _handlers[key] = handler;\r\n        }\r\n\r\n        public void UnsubscribeState(string roomId)\r\n        {\r\n            UnsubscribeByKey($\"state_{roomId}\",\r\n                _database.Child(\"rooms\").Child(roomId).Child(\"state\"));\r\n        }\r\n\r\n        // ===== 동기 시작 (startAt) — P1: 서버시간 동기 카운트다운 =====\r\n        // 추가만(additive), 기존 방/라이브/사망 로직 무변경. rooms/{roomId}/startAt = 게임 시작 절대 서버시각(ms).\r\n\r\n        // 호스트가 \"게임 시작 절대 서버시각(ms)\"을 기록 → 전원이 이 값에 맞춰 동시 시작.\r\n        public void WriteStartAt(string roomId, long startAtMs)\r\n        {\r\n            _database.Child(\"rooms\").Child(roomId).Child(\"startAt\")\r\n                .SetValueAsync(startAtMs)\r\n                .ContinueWithOnMainThread(LogIfFailed(\"WriteStartAt\"));\r\n        }\r\n\r\n        // rooms/{roomId}/startAt 구독. long 수신 시 콜백. (SubscribeState 패턴 미러)\r\n        public void SubscribeStartAt(string roomId, Action<long> callback)\r\n        {\r\n            string key = $\"startAt_{roomId}\";\r\n            var reference = _database.Child(\"rooms\").Child(roomId).Child(\"startAt\");\r\n            UnsubscribeByKey(key, reference);\r\n\r\n            EventHandler<ValueChangedEventArgs> handler = (sender, args) =>\r\n            {\r\n                if (!args.Snapshot.Exists) return;\r\n                if (long.TryParse(args.Snapshot.Value.ToString(), out long startAtMs))\r\n                    callback?.Invoke(startAtMs);\r\n            };\r\n\r\n            reference.ValueChanged += handler;\r\n            _handlers[key] = handler;\r\n        }\r\n\r\n        public void UnsubscribeStartAt(string roomId)\r\n        {\r\n            UnsubscribeByKey($\"startAt_{roomId}\",\r\n                _database.Child(\"rooms\").Child(roomId).Child(\"startAt\"));\r\n        }\r\n\r\n        // Firebase 서버-클라 시계 오프셋(ms). 절대 서버시각 = 로컬now + offset. (.info/serverTimeOffset)\r\n        public void ReadServerTimeOffset(Action<double> callback)\r\n        {\r\n            FirebaseDatabase.DefaultInstance.GetReference(\".info/serverTimeOffset\")\r\n                .GetValueAsync()\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    double offset = 0;\r\n                    if (!task.IsFaulted && !task.IsCanceled && task.Result.Exists)\r\n                        double.TryParse(task.Result.Value.ToString(), out offset);\r\n                    callback?.Invoke(offset);\r\n                });\r\n        }\r\n\r\n        /// <summary>Room 정보를 한 번 조회합니다.</summary>\r\n        public void GetRoom(string roomId, Action<RoomData> callback)\r\n        {\r\n            _database\r\n                .Child(\"rooms\")\r\n                .Child(roomId)\r\n                .GetValueAsync()\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    if (task.IsFaulted || task.IsCanceled || !task.Result.Exists)\r\n                    {\r\n                        callback?.Invoke(null);\r\n                        return;\r\n                    }\r\n\r\n                    RoomData room =\r\n                        JsonUtility.FromJson<RoomData>(task.Result.GetRawJsonValue());\r\n\r\n                    callback?.Invoke(room);\r\n                });\r\n        }\r\n\r\n        // 티어 기반 대기방 탐색.\r\n        // 정확히 내 티어 → 아래 티어 → 위 티어 순으로 찾고\r\n        // 셋 다 없으면 null 반환 (새 방 만들라는 신호).\r\n        public void FindWaitingRoomByTier(int tier, Action<string> callback)\r\n        {\r\n            TryFindTier(tier, roomId =>\r\n            {\r\n                if (roomId != null) { callback(roomId); return; }\r\n\r\n                TryFindTier(tier - 1, roomId2 =>\r\n                {\r\n                    if (roomId2 != null) { callback(roomId2); return; }\r\n\r\n                    TryFindTier(tier + 1, callback);\r\n                });\r\n            });\r\n        }\r\n\r\n        // stateAndTier = \"waiting_{tier}\" 인 방 1개 찾기.\r\n        // tier 범위 밖(0 미만, 6 초과)이면 바로 null.\r\n        // 방에 실제 플레이어가 1명 이상 있는지 확인.\r\n        // 강제 종료 후 players/{uid}만 onDisconnect로 삭제되고 방 자체는 남은 경우를 걸러내기 위해 사용.\r\n        public void HasActivePlayers(string roomId, Action<bool> callback)\r\n        {\r\n            _database.Child(\"rooms\").Child(roomId).Child(\"players\")\r\n                .GetValueAsync()\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    if (task.IsFaulted || task.IsCanceled || !task.Result.Exists)\r\n                    {\r\n                        callback?.Invoke(false);\r\n                        return;\r\n                    }\r\n                    callback?.Invoke(task.Result.ChildrenCount > 0);\r\n                });\r\n        }\r\n\r\n        private void TryFindTier(int tier, Action<string> callback)\r\n        {\r\n            if (tier < 0 || tier > 6) { callback(null); return; }\r\n\r\n            _database\r\n                .Child(\"rooms\")\r\n                .OrderByChild(\"stateAndTier\")\r\n                .EqualTo($\"waiting_{tier}\")\r\n                .LimitToFirst(5)\r\n                .GetValueAsync()\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    if (task.IsFaulted || task.IsCanceled) { callback(null); return; }\r\n\r\n                    string candidateWithPlayers = null;\r\n                    string candidateEmpty = null;\r\n\r\n                    foreach (var child in task.Result.Children)\r\n                    {\r\n                        if (child.Child(\"players\").ChildrenCount > 0)\r\n                        {\r\n                            candidateWithPlayers = child.Key;\r\n                            break;\r\n                        }\r\n                        else if (candidateEmpty == null)\r\n                        {\r\n                            // ★ 삭제하지 말고 그냥 보관 (나중에 OnFindWaitingRoom 에서 처리)\r\n                            candidateEmpty = child.Key;\r\n                        }\r\n                    }\r\n\r\n                    // 플레이어 있는 방 우선, 없으면 빈 방이라도 반환\r\n                    callback(candidateWithPlayers ?? candidateEmpty);\r\n                });\r\n        }\r\n\r\n        // 기존 SetRoomState에 tier 파라미터 추가.\r\n        // tier >= 0 이면 stateAndTier도 같이 업데이트.\r\n        // \"playing_3\" 으로 바뀌면 대기방 목록에서 자동으로 제외됨.\r\n        public void SetRoomState(string roomId, string state, int tier = -1)\r\n        {\r\n            _database\r\n                .Child(\"rooms\").Child(roomId).Child(\"state\")\r\n                .SetValueAsync(state)\r\n                .ContinueWithOnMainThread(LogIfFailed(\"SetRoomState\"));\r\n\r\n            if (tier >= 0)\r\n            {\r\n                _database\r\n                    .Child(\"rooms\").Child(roomId).Child(\"stateAndTier\")\r\n                    .SetValueAsync($\"{state}_{tier}\")\r\n                    .ContinueWithOnMainThread(LogIfFailed(\"SetRoomStateAndTier\"));\r\n            }\r\n        }\r\n\r\n        // 내가 현재 점유 중인 방 ID를 Firebase에 기록.\r\n        // 앱이 비정상 종료되면 onDisconnect가 이 기록을 자동 삭제.\r\n        public void TrackMyRoom(string uid, string roomId)\r\n        {\r\n            var r = _database.Child(\"activeRooms\").Child(uid);\r\n            r.SetValueAsync(roomId);\r\n            r.OnDisconnect().RemoveValue(); // 연결 끊기면 추적 기록도 자동 제거\r\n        }\r\n\r\n        // 매칭 시작 전 호출. 이전 세션에서 남은 방이 있으면 삭제 완료 후 onDone 실행.\r\n        // 1차: activeRooms/{uid}에 저장된 방 ID로 삭제.\r\n        // 2차(fallback): 강제 종료로 activeRooms 저장 자체가 안 됐을 때,\r\n        //               rooms/ 전체를 uid로 검색해서 내가 들어가 있는 방을 삭제.\r\n        public void CleanupMyPreviousRoom(string uid, Action onDone)\r\n        {\r\n            _database.Child(\"activeRooms\").Child(uid).GetValueAsync()\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    if (task.IsFaulted || task.IsCanceled || !task.Result.Exists)\r\n                    {\r\n                        // activeRooms 기록 없음 → rooms/ 전체 검색으로 fallback\r\n                        FindAndDeleteRoomsByPlayer(uid, onDone);\r\n                        return;\r\n                    }\r\n\r\n                    string oldRoomId = task.Result.Value?.ToString();\r\n                    if (string.IsNullOrEmpty(oldRoomId))\r\n                    {\r\n                        FindAndDeleteRoomsByPlayer(uid, onDone);\r\n                        return;\r\n                    }\r\n\r\n                    Debug.Log($\"[RoomRepository] 잔존 방 삭제 (activeRooms): {oldRoomId}\");\r\n                    _database.Child(\"activeRooms\").Child(uid).RemoveValueAsync();\r\n                    // 방 삭제 완료 후 onDone — 완료 전에 FindWaitingRoom이 먼저 실행되는 걸 방지\r\n                    _database.Child(\"rooms\").Child(oldRoomId).RemoveValueAsync()\r\n                        .ContinueWithOnMainThread(_ => onDone?.Invoke());\r\n                });\r\n        }\r\n\r\n        // activeRooms 추적이 없을 때 rooms/ 전체에서 내 uid가 포함된 방을 찾아 삭제.\r\n        // 강제 종료로 추적 기록이 저장 안 됐을 때의 안전망.\r\n        private void FindAndDeleteRoomsByPlayer(string uid, Action onDone)\r\n        {\r\n            _database.Child(\"rooms\").GetValueAsync()\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    if (task.IsFaulted || task.IsCanceled || !task.Result.Exists)\r\n                    {\r\n                        onDone?.Invoke();\r\n                        return;\r\n                    }\r\n\r\n                    var toDelete = new List<string>();\r\n                    foreach (var room in task.Result.Children)\r\n                    {\r\n                        if (room.Child(\"players\").HasChild(uid))\r\n                            toDelete.Add(room.Key);\r\n                    }\r\n\r\n                    if (toDelete.Count == 0)\r\n                    {\r\n                        onDone?.Invoke();\r\n                        return;\r\n                    }\r\n\r\n                    Debug.Log($\"[RoomRepository] 잔존 방 {toDelete.Count}개 발견 (fallback 검색) → 삭제\");\r\n                    int remaining = toDelete.Count;\r\n                    foreach (var roomId in toDelete)\r\n                    {\r\n                        _database.Child(\"rooms\").Child(roomId).RemoveValueAsync()\r\n                            .ContinueWithOnMainThread(_ =>\r\n                            {\r\n                                remaining--;\r\n                                if (remaining == 0) onDone?.Invoke();\r\n                            });\r\n                    }\r\n                });\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region ===== Player =====\r\n\r\n        /// <summary>\r\n        /// Room에 플레이어를 등록합니다.\r\n        /// onDisconnect를 등록해서 연결이 끊기면 자동 삭제됩니다.\r\n        /// </summary>\r\n        public void JoinRoom(string roomId, RoomPlayerData player)\r\n        {\r\n            string json = JsonUtility.ToJson(player);\r\n\r\n            var playerRef = _database\r\n                .Child(\"rooms\").Child(roomId)\r\n                .Child(\"players\").Child(player.uid);\r\n\r\n            var liveRef = _database\r\n                .Child(\"rooms\").Child(roomId)\r\n                .Child(\"live\").Child(player.uid);\r\n\r\n            playerRef.SetRawJsonValueAsync(json)\r\n                .ContinueWithOnMainThread(LogIfFailed(\"JoinRoom\"));\r\n\r\n            // ★ 앱 종료/네트워크 끊김 시 자동 삭제 — 고스트가 아닐 때만\r\n            if (!player.isGhost)\r\n            {\r\n                playerRef.OnDisconnect().RemoveValue();\r\n                liveRef.OnDisconnect().RemoveValue();\r\n            }\r\n        }\r\n\r\n        /// <summary>Room에서 플레이어를 제거합니다.</summary>\r\n        public void LeaveRoom(string roomId, string uid)\r\n        {\r\n            _database.Child(\"rooms\").Child(roomId)\r\n                .Child(\"players\").Child(uid)\r\n                .RemoveValueAsync()\r\n                .ContinueWithOnMainThread(LogIfFailed(\"LeaveRoom-players\"));\r\n\r\n            _database.Child(\"rooms\").Child(roomId)\r\n                .Child(\"live\").Child(uid)\r\n                .RemoveValueAsync()\r\n                .ContinueWithOnMainThread(LogIfFailed(\"LeaveRoom-live\"));\r\n        }\r\n\r\n        /// <summary>플레이어 목록을 실시간 구독합니다.</summary>\r\n        public void SubscribePlayers(string roomId, Action<Dictionary<string, RoomPlayerData>> callback, Action onRoomDeleted = null)\r\n        {\r\n            string key = $\"players_{roomId}\";\r\n            var reference = _database.Child(\"rooms\").Child(roomId).Child(\"players\");\r\n            UnsubscribeByKey(key, reference);\r\n\r\n            bool hadPlayers = false; // ★ 처음 빈 상태는 삭제가 아님\r\n\r\n            EventHandler<ValueChangedEventArgs> handler = (sender, args) =>\r\n            {\r\n                if (!args.Snapshot.Exists)\r\n                {\r\n                    if (hadPlayers) onRoomDeleted?.Invoke(); // ★ 실제로 사라진 경우만\r\n                    return;\r\n                }\r\n\r\n                hadPlayers = true;\r\n                var result = new Dictionary<string, RoomPlayerData>();\r\n                foreach (var child in args.Snapshot.Children)\r\n                {\r\n                    var player = JsonUtility.FromJson<RoomPlayerData>(child.GetRawJsonValue());\r\n                    result.Add(child.Key, player);\r\n                }\r\n                callback?.Invoke(result);\r\n            };\r\n\r\n            reference.ValueChanged += handler;\r\n            _handlers[key] = handler;\r\n        }\r\n\r\n        public void UnsubscribePlayers(string roomId)\r\n        {\r\n            UnsubscribeByKey($\"players_{roomId}\",\r\n                _database.Child(\"rooms\").Child(roomId).Child(\"players\"));\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region ===== 실시간 =====\r\n\r\n        /// <summary>자신의 실시간 플레이 데이터를 업데이트합니다.</summary>\r\n        public void UpdateLive(string roomId, string uid, RoomLiveData live)\r\n        {\r\n            string json = JsonUtility.ToJson(live);\r\n\r\n            _database\r\n                .Child(\"rooms\").Child(roomId)\r\n                .Child(\"live\").Child(uid)\r\n                .SetRawJsonValueAsync(json);\r\n            // 빈번한 호출이므로 콜백/에러 로그 생략\r\n        }\r\n\r\n        /// <summary>Room의 실시간 데이터를 구독합니다.</summary>\r\n        public void SubscribeLive(string roomId, Action<Dictionary<string, RoomLiveData>> callback)\r\n        {\r\n            string key = $\"live_{roomId}\";\r\n            var reference = _database.Child(\"rooms\").Child(roomId).Child(\"live\");\r\n            UnsubscribeByKey(key, reference);\r\n\r\n            EventHandler<ValueChangedEventArgs> handler = (sender, args) =>\r\n            {\r\n                var result = new Dictionary<string, RoomLiveData>();\r\n\r\n                if (args.Snapshot.Exists)\r\n                {\r\n                    foreach (var child in args.Snapshot.Children)\r\n                    {\r\n                        var live = JsonUtility.FromJson<RoomLiveData>(child.GetRawJsonValue());\r\n                        result.Add(child.Key, live);\r\n                    }\r\n                }\r\n\r\n                callback?.Invoke(result);\r\n            };\r\n\r\n            reference.ValueChanged += handler;\r\n            _handlers[key] = handler;\r\n        }\r\n\r\n        public void UnsubscribeLive(string roomId)\r\n        {\r\n            UnsubscribeByKey($\"live_{roomId}\",\r\n                _database.Child(\"rooms\").Child(roomId).Child(\"live\"));\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region ===== 이벤트 =====\r\n\r\n        /// <summary>\r\n        /// 이벤트를 Room에 추가합니다.\r\n        /// (예: Perfect, Destiny, Card, Makgeolli)\r\n        /// </summary>\r\n        public void PushEvent<T>(string roomId, string uid, T data) where T : class\r\n        {\r\n            string json = JsonUtility.ToJson(data);\r\n\r\n            _database\r\n                .Child(\"rooms\").Child(roomId)\r\n                .Child(\"events\").Child(uid)\r\n                .Push()\r\n                .SetRawJsonValueAsync(json);\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region ===== 결과값 =====\r\n\r\n        /// <summary>게임 종료 결과를 제출합니다.</summary>\r\n        public void SubmitResult<T>(string roomId, string uid, T result) where T : class\r\n        {\r\n            string json = JsonUtility.ToJson(result);\r\n\r\n            _database\r\n                .Child(\"rooms\").Child(roomId)\r\n                .Child(\"result\").Child(uid)\r\n                .SetRawJsonValueAsync(json)\r\n                .ContinueWithOnMainThread(LogIfFailed(\"SubmitResult\"));\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region ===== 사망/순위 =====\r\n\r\n        /// <summary>사망 기록을 Firebase에 씁니다. 타임스탬프는 서버 시각 기준.</summary>\r\n        public void WriteDeath(string roomId, string uid, long score)\r\n        {\r\n            var data = new Dictionary<string, object>\r\n            {\r\n                { \"score\", (long)score },\r\n                { \"time\", ServerValue.Timestamp }\r\n            };\r\n            _database.Child(\"rooms\").Child(roomId).Child(\"deaths\").Child(uid)\r\n                .UpdateChildrenAsync(data)\r\n                .ContinueWithOnMainThread(LogIfFailed(\"WriteDeath\"));\r\n        }\r\n\r\n        /// <summary>deaths 노드 전체를 실시간 구독합니다.</summary>\r\n        public void SubscribeDeaths(string roomId, Action<DataSnapshot> callback)\r\n        {\r\n            string key = $\"deaths_{roomId}\";\r\n            var reference = _database.Child(\"rooms\").Child(roomId).Child(\"deaths\");\r\n            UnsubscribeByKey(key, reference);\r\n\r\n            EventHandler<ValueChangedEventArgs> handler = (sender, args) =>\r\n            {\r\n                callback?.Invoke(args.Snapshot);\r\n            };\r\n\r\n            reference.ValueChanged += handler;\r\n            _handlers[key] = handler;\r\n        }\r\n\r\n        public void UnsubscribeDeaths(string roomId)\r\n        {\r\n            UnsubscribeByKey($\"deaths_{roomId}\",\r\n                _database.Child(\"rooms\").Child(roomId).Child(\"deaths\"));\r\n        }\r\n\r\n        /// <summary>호스트가 최종 등수 맵을 Firebase에 씁니다.</summary>\r\n        public void WriteRanks(string roomId, Dictionary<string, int> ranks)\r\n        {\r\n            var data = new Dictionary<string, object>();\r\n            foreach (var kvp in ranks)\r\n                data[kvp.Key] = (long)kvp.Value;\r\n            _database.Child(\"rooms\").Child(roomId).Child(\"ranks\")\r\n                .SetValueAsync(data)\r\n                .ContinueWithOnMainThread(LogIfFailed(\"WriteRanks\"));\r\n        }\r\n\r\n        /// <summary>특정 uid의 등수가 기록되면 콜백을 호출합니다.</summary>\r\n        public void SubscribeRank(string roomId, string uid, Action<int> callback)\r\n        {\r\n            string key = $\"rank_{roomId}_{uid}\";\r\n            var reference = _database.Child(\"rooms\").Child(roomId).Child(\"ranks\").Child(uid);\r\n            UnsubscribeByKey(key, reference);\r\n\r\n            EventHandler<ValueChangedEventArgs> handler = (sender, args) =>\r\n            {\r\n                if (!args.Snapshot.Exists) return;\r\n                if (int.TryParse(args.Snapshot.Value.ToString(), out int rank))\r\n                    callback?.Invoke(rank);\r\n            };\r\n\r\n            reference.ValueChanged += handler;\r\n            _handlers[key] = handler;\r\n        }\r\n\r\n        public void UnsubscribeRank(string roomId, string uid)\r\n        {\r\n            UnsubscribeByKey($\"rank_{roomId}_{uid}\",\r\n                _database.Child(\"rooms\").Child(roomId).Child(\"ranks\").Child(uid));\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region ===== 정리 =====\r\n\r\n        /// <summary>\r\n        /// 특정 방의 모든 구독을 해제합니다.\r\n        /// 방을 떠날 때 반드시 호출하세요.\r\n        /// </summary>\r\n        public void UnsubscribeAll(string roomId)\r\n        {\r\n            UnsubscribeRoom(roomId);\r\n            UnsubscribeState(roomId);\r\n            UnsubscribePlayers(roomId);\r\n            UnsubscribeLive(roomId);\r\n            UnsubscribeDeaths(roomId);\r\n        }\r\n\r\n        private void UnsubscribeByKey(string key, DatabaseReference reference)\r\n        {\r\n            if (_handlers.TryGetValue(key, out var handler))\r\n            {\r\n                reference.ValueChanged -= handler;\r\n                _handlers.Remove(key);\r\n            }\r\n        }\r\n\r\n        private Action<System.Threading.Tasks.Task> LogIfFailed(string label)\r\n        {\r\n            return task =>\r\n            {\r\n                if (task.IsFaulted || task.IsCanceled)\r\n                    Debug.LogError($\"[RoomRepository] {label} 실패: {task.Exception?.Message}\");\r\n            };\r\n        }\r\n\r\n        #endregion\r\n    }\r\n}","lines":709},{"id":"Scripts/Player/IMoveCommandInput.cs","name":"IMoveCommandInput","path":"Scripts/Player/IMoveCommandInput.cs","layer":"Player","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿using System;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.Player\r\n{\r\n    public interface IMoveCommandInput\r\n    {\r\n        event Action<Vector2> MoveCommand;\r\n        void Enable();\r\n        void Disable();\r\n    }\r\n}\r\n","lines":13},{"id":"Scripts/Data/Core/TSVConvert/ISheetData.cs","name":"ISheetData","path":"Scripts/Data/Core/TSVConvert/ISheetData.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"using System.Collections.Generic;\r\n\r\nnamespace Wooduduk.Data.Core.TSVConvert\r\n{\r\n    public interface ISheetData\r\n    {\r\n        string ID { get; set; }\r\n        void SetData(Dictionary<string, string> dict);\r\n    }\r\n}","lines":10},{"id":"Scripts/Data/DataSO/CardDataSO.cs","name":"CardDataSO","path":"Scripts/Data/DataSO/CardDataSO.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"시트 'Cost' 컬럼 미사용 카드 비용은 SlotEconomy 권위. 임포트 안 함(있어도 무시).","src":"﻿using System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.Static.Shop;\r\nusing Wooduduk.Data.Static.StaticEnum;\r\n\r\nnamespace Wooduduk.Data.DataSO\r\n{\r\n    [CreateAssetMenu(fileName = \"CardData\", menuName = \"GameData/CardData\")]\r\n    public class CardDataSO : BaseSheetDataSO\r\n    {\r\n        public CardData _data;\r\n\r\n        public override string ID\r\n        {\r\n            get => _data?._id ?? \"Unknown\";\r\n            set { _data ??= new CardData(); _data._id = value; }\r\n        }\r\n\r\n        public override void SetData(Dictionary<string, string> dict)\r\n        {\r\n            _data ??= new CardData();\r\n\r\n            _data._id = ParseString(dict, \"ID\");\r\n            _data._name = ParseString(dict, \"Name\");\r\n            // 시트 'Cost' 컬럼 미사용 — 카드 비용은 SlotEconomy 권위. 임포트 안 함(있어도 무시).\r\n            _data._count = ParseInt(dict, \"Count\");\r\n            _data._rarity = ParseEnum<Rarity>(dict, \"Rarity\");\r\n            _data._description = ParseString(dict, \"Description\");\r\n            _data._effects = ParseEffects(dict, \"Effects\");\r\n        }\r\n    }\r\n}","lines":32},{"id":"Scripts/Data/DataSO/GameBalanceDataSO.cs","name":"GameBalanceDataSO","path":"Scripts/Data/DataSO/GameBalanceDataSO.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"게임 전역 밸런스 SO 값은 인스펙터에서 직접 편집","src":"﻿using UnityEngine;\r\nusing Wooduduk.Data.Static;\r\n\r\nnamespace Wooduduk.Data.DataSO\r\n{\r\n    /// <summary>\r\n    /// 게임 전역 밸런스 SO\r\n    /// 값은 인스펙터에서 직접 편집\r\n    /// </summary>\r\n    [CreateAssetMenu(fileName = \"GameBalance\", menuName = \"GameData/GameBalance\")]\r\n    public class GameBalanceDataSO : ScriptableObject\r\n    {\r\n        public GameBalanceData _data;\r\n    }\r\n}","lines":15},{"id":"Scripts/Data/DataSO/MakgeolliEffectDataSO.cs","name":"MakgeolliEffectDataSO","path":"Scripts/Data/DataSO/MakgeolliEffectDataSO.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿using System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.Static;\r\nusing Wooduduk.Data.Static.StaticEnum;\r\n\r\nnamespace Wooduduk.Data.DataSO\r\n{\r\n    [CreateAssetMenu(fileName = \"MakgeolliEffectData\", menuName = \"GameData/MakgeolliEffectData\")]\r\n    public class MakgeolliEffectDataSO : BaseSheetDataSO\r\n    {\r\n        public MakgeolliEffectData _data;\r\n\r\n        public override string ID\r\n        {\r\n            get => _data?._id ?? \"Unknown\";\r\n            set { _data ??= new MakgeolliEffectData(); _data._id = value; }\r\n        }\r\n\r\n        public override void SetData(Dictionary<string, string> dict)\r\n        {\r\n            _data ??= new MakgeolliEffectData();\r\n\r\n            _data._id = ParseString(dict, \"ID\");\r\n            _data._name = ParseString(dict, \"Name\");\r\n            _data._type = ParseEnum<BuffType>(dict, \"Type\");\r\n            _data._durationSpin = ParseInt(dict, \"Dur\");\r\n            _data._effects = ParseEffects(dict, \"Effects\");\r\n        }\r\n    }\r\n}","lines":30},{"id":"Scripts/Data/DataSO/RouletteDataSO.cs","name":"RouletteDataSO","path":"Scripts/Data/DataSO/RouletteDataSO.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"룰렛 정의 SO (인스펙터에서 직접 세팅 시트 임포트 아님). 룰렛이 1종이라 단일 SO로 두고, 릴 구조 + 심볼 풀(SymbolDataSO)을 _data 안에서 인스펙터로 연결한다.","src":"using UnityEngine;\nusing Wooduduk.Data.Static;\n\nnamespace Wooduduk.Data.DataSO\n{\n    /// <summary>\n    /// 룰렛 정의 SO (인스펙터에서 직접 세팅 — 시트 임포트 아님).\n    /// 룰렛이 1종이라 단일 SO로 두고, 릴 구조 + 심볼 풀(SymbolDataSO)을\n    /// _data 안에서 인스펙터로 연결한다.\n    /// </summary>\n    [CreateAssetMenu(fileName = \"RouletteData\", menuName = \"GameData/RouletteData\")]\n    public class RouletteDataSO : ScriptableObject\n    {\n        public RouletteData _data;\n    }\n}\n","lines":17},{"id":"Scripts/Data/DataSO/RouletteSkinDataSO.cs","name":"RouletteSkinDataSO","path":"Scripts/Data/DataSO/RouletteSkinDataSO.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿using Wooduduk.Data.Static.Roulette;\r\nusing Wooduduk.Data.Static.StaticEnum;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.Data.DataSO\r\n{\r\n    [CreateAssetMenu(fileName = \"RouletteSkinData\", menuName = \"GameData/RouletteSkinData\")]\r\n    public class RouletteSkinDataSO : BaseSheetDataSO\r\n    {\r\n        public RouletteSkinData _data;\r\n\r\n        public override string ID\r\n        {\r\n            get => _data?._id ?? \"Unknown\";\r\n            set { _data ??= new RouletteSkinData(); _data._id = value; }\r\n        }\r\n\r\n        public override void SetData(Dictionary<string, string> dict)\r\n        {\r\n            _data ??= new RouletteSkinData();\r\n\r\n            _data._id = ParseString(dict, \"ID\");\r\n            _data._name = ParseString(dict, \"Name\");\r\n            _data._rarity = ParseEnum<Rarity>(dict, \"Rarity\"); // Rarity Enum 파싱\r\n            _data._token = ParseInt(dict, \"Token\");\r\n            _data._returnGold = ParseInt(dict, \"ReturnGold\");\r\n            _data._weight = ParseFloat(dict, \"Weight\");\r\n            _data._description = ParseString(dict, \"Description\");\r\n            _data._visualEffectSetId = ParseString(dict, \"VfxSet\");\r\n        }\r\n    }\r\n}","lines":33},{"id":"Scripts/Data/DataSO/SymbolDataSO.cs","name":"SymbolDataSO","path":"Scripts/Data/DataSO/SymbolDataSO.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿using System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.Static.Roulette;\r\nusing Wooduduk.Data.Static.StaticEnum;\r\n\r\nnamespace Wooduduk.Data.DataSO\r\n{\r\n    [CreateAssetMenu(fileName = \"SymbolData\", menuName = \"GameData/SymbolData\")]\r\n    public class SymbolDataSO : BaseSheetDataSO\r\n    {\r\n        public SymbolData _data;\r\n\r\n        public override string ID\r\n        {\r\n            get => _data?._id ?? \"Unknown\";\r\n            set { _data ??= new SymbolData(); _data._id = value; }\r\n        }\r\n\r\n        public override void SetData(Dictionary<string, string> dict)\r\n        {\r\n            _data ??= new SymbolData();\r\n\r\n            _data._id = ParseString(dict, \"ID\");\r\n            _data._name = ParseString(dict, \"Name\");\r\n            _data._symbolType = ParseEnum<SymbolType>(dict, \"Symbol\");\r\n            _data._baseWeight = ParseFloat(dict, \"Weight\");\r\n        }\r\n    }\r\n}","lines":29},{"id":"Scripts/Data/DataSO/WeaponDataSO.cs","name":"WeaponDataSO","path":"Scripts/Data/DataSO/WeaponDataSO.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"무기 스킨 SO (코스메틱 게임플레이 영향 없음). 로비에서 UserData._equippedWeaponId 로 외형만 적용.","src":"﻿using Wooduduk.Data.Static.Shop;\r\nusing Wooduduk.Data.Static.StaticEnum;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.Data.DataSO\r\n{\r\n    /// <summary>\r\n    /// 무기 스킨 SO (코스메틱 — 게임플레이 영향 없음).\r\n    /// 로비에서 UserData._equippedWeaponId 로 외형만 적용.\r\n    /// </summary>\r\n    [CreateAssetMenu(fileName = \"WeaponData\", menuName = \"GameData/WeaponData\")]\r\n    public class WeaponDataSO : BaseSheetDataSO\r\n    {\r\n        public WeaponData _data;\r\n\r\n        public override string ID\r\n        {\r\n            get => _data?._id ?? \"Unknown\";\r\n            set { _data ??= new WeaponData(); _data._id = value; }\r\n        }\r\n\r\n        public override void SetData(Dictionary<string, string> dict)\r\n        {\r\n            _data ??= new WeaponData();\r\n\r\n            _data._id = ParseString(dict, \"ID\");\r\n            _data._name = ParseString(dict, \"Name\");\r\n            _data._rarity = ParseEnum<Rarity>(dict, \"Rarity\");\r\n            _data._token = ParseInt(dict, \"Token\");\r\n            _data._returnGold = ParseInt(dict, \"ReturnGold\");\r\n            _data._weight = ParseFloat(dict, \"Weight\");\r\n            _data._description = ParseString(dict, \"Description\");\r\n            _data._visualEffectSetId = ParseString(dict, \"VfxSet\");\r\n            Debug.Log($\"[WeaponData] ID={_data._id} Token={_data._token} ReturnGold={_data._returnGold}\");\r\n        }\r\n    }\r\n}","lines":38},{"id":"Scripts/Data/Static/StaticEnum/SymbolType.cs","name":"SymbolType","path":"Scripts/Data/Static/StaticEnum/SymbolType.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"namespace Wooduduk.Data.Static.StaticEnum\r\n{\r\n    public enum SymbolType\r\n    {\r\n        SWING,    // 1+ 명중, 갯수만큼 배율\r\n        PERFECT,  // 2+ 퍼펙트 격상\r\n        INSTANT,  // 도토리 즉발 재화\r\n        WILD,     // 행운, 과반수 치환\r\n        BOOST,    // 불빠따 이번배율+다음스핀 디버프\r\n        BLANK,    // 옹이 무효\r\n        FAIL,     // 좀벌레 2+ 실패\r\n        TRIGGER,  // 막걸리 3매치 → 막걸리표 발동\r\n    }\r\n}\r\n","lines":15},{"id":"Scripts/Slot/Determinism.cs","name":"Determinism","path":"Scripts/Slot/Determinism.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"결정론 난수 추상화 같은 시드 -> 같은 수열(싱글/멀티 공정성의 기반) 상태 스냅샷/복원 지원(서버 재접속·리플레이 대비)","src":"﻿using System;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 결정론 난수 추상화\r\n    // 같은 시드 -> 같은 수열(싱글/멀티 공정성의 기반)\r\n    // 상태 스냅샷/복원 지원(서버 재접속·리플레이 대비)\r\n    public interface IDeterministicRng\r\n    {\r\n        uint NextUInt();\r\n        ulong NextULong();\r\n        // [min, max) 정수\r\n        int Range(int minInclusive, int maxExclusive);\r\n        RngState Snapshot();\r\n        void Restore(RngState state);\r\n    }\r\n\r\n    // RNG 내부 상태(직렬화·스냅샷용)\r\n    [Serializable]\r\n    public struct RngState\r\n    {\r\n        public uint X, Y, Z, W;\r\n    }\r\n\r\n    // 순수 정수 연산만 사용\r\n    public sealed class XorShift128Rng : IDeterministicRng\r\n    {\r\n        private uint _x, _y, _z, _w;\r\n\r\n        public XorShift128Rng(RngState state) { Restore(state); }\r\n        public XorShift128Rng(ulong seed) { Restore(RngFactory.StateFromSeed(seed)); }\r\n\r\n        public uint NextUInt()\r\n        {\r\n            unchecked\r\n            {\r\n                uint t = _x ^ (_x << 11);\r\n                _x = _y; _y = _z; _z = _w;\r\n                _w = _w ^ (_w >> 19) ^ (t ^ (t >> 8));\r\n                return _w;\r\n            }\r\n        }\r\n\r\n        public ulong NextULong()\r\n        {\r\n            unchecked\r\n            {\r\n                ulong hi = NextUInt();\r\n                ulong lo = NextUInt();\r\n                return (hi << 32) | lo;\r\n            }\r\n        }\r\n\r\n        public int Range(int minInclusive, int maxExclusive)\r\n        {\r\n            if (maxExclusive <= minInclusive) return minInclusive;\r\n            uint span = (uint)(maxExclusive - minInclusive);\r\n            return minInclusive + (int)(NextUInt() % span);\r\n        }\r\n\r\n        public RngState Snapshot() => new RngState { X = _x, Y = _y, Z = _z, W = _w };\r\n\r\n        public void Restore(RngState s)\r\n        {\r\n            _x = s.X; _y = s.Y; _z = s.Z; _w = s.W;\r\n            // xorshift는 상태가 모두 0이면 0만 반환 -> 방지\r\n            if ((_x | _y | _z | _w) == 0u) _x = 0x9E3779B9u;\r\n        }\r\n    }\r\n\r\n    // 시드 생성 헬퍼. 정수/문자열(matchId 등) -> RNG\r\n    public static class RngFactory\r\n    {\r\n        public static IDeterministicRng FromSeed(ulong seed) => new XorShift128Rng(seed);\r\n        public static IDeterministicRng FromSeed(int seed) => new XorShift128Rng((ulong)(uint)seed);\r\n        public static IDeterministicRng FromSeed(string seed) => new XorShift128Rng(Hash64(seed));\r\n\r\n        /// SplitMix64로 시드 1개 -> 4워드 채움(초기 분산 품질 확보)\r\n        public static RngState StateFromSeed(ulong seed)\r\n        {\r\n            unchecked\r\n            {\r\n                uint[] o = new uint[4];\r\n                ulong s = seed;\r\n                for (int i = 0; i < 4; i++)\r\n                {\r\n                    s += 0x9E3779B97F4A7C15UL;\r\n                    ulong z = s;\r\n                    z = (z ^ (z >> 30)) * 0xBF58476D1CE4E5B9UL;\r\n                    z = (z ^ (z >> 27)) * 0x94D049BB133111EBUL;\r\n                    z ^= z >> 31;\r\n                    o[i] = (uint)z ^ (uint)(z >> 32);\r\n                }\r\n                if ((o[0] | o[1] | o[2] | o[3]) == 0u) o[0] = 0x9E3779B9u;\r\n                return new RngState { X = o[0], Y = o[1], Z = o[2], W = o[3] };\r\n            }\r\n        }\r\n\r\n        /// FNV-1a 64bit. 문자열 시드(예: matchId) 안정 해시\r\n        public static ulong Hash64(string text)\r\n        {\r\n            unchecked\r\n            {\r\n                ulong h = 1469598103934665603UL;\r\n                if (text != null)\r\n                {\r\n                    foreach (char c in text)\r\n                    {\r\n                        h ^= (byte)(c & 0xFF); h *= 1099511628211UL;\r\n                        h ^= (byte)((c >> 8) & 0xFF); h *= 1099511628211UL;\r\n                    }\r\n                }\r\n                return h;\r\n            }\r\n        }\r\n    }\r\n}\r\n","lines":118},{"id":"Scripts/Slot/WeightPipeline.cs","name":"WeightPipeline","path":"Scripts/Slot/WeightPipeline.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"한 스핀 추첨 컨텍스트. 가중치 스테이지가 참조하는 결정론 상태 모든 값이 결정론 상태에서 파생 -> 같은 시드 + 같은 선택 = 같은 컨텍스트 Combo, DryStreak은 세션/판정이 갱신, 여긴 readonly","src":"﻿using System;\r\nusing System.Collections.Generic;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 한 스핀 추첨 컨텍스트. 가중치 스테이지가 참조하는 결정론 상태\r\n    // 모든 값이 결정론 상태에서 파생 -> 같은 시드 + 같은 선택 = 같은 컨텍스트\r\n    // Combo, DryStreak은 세션/판정이 갱신, 여긴 readonly\r\n    public readonly struct SpinContext\r\n    {\r\n        public readonly int SpinIndex;  // 0부터\r\n        public readonly int Combo;      // 현재 콤보\r\n        public readonly int DryStreak;  // 연속 '아쉬운' 스핀 수(운빨 보정 입력)\r\n        public readonly int ReelCount;  // 릴 수 (기본 5, '4번째 릴' 카드 시 6)\r\n\r\n        public SpinContext(int spinIndex, int combo, int dryStreak, int reelCount)\r\n        {\r\n            SpinIndex = spinIndex;\r\n            Combo = combo;\r\n            DryStreak = dryStreak;\r\n            ReelCount = reelCount;\r\n        }\r\n    }\r\n    // 가중치 보정. 콤보 난이도, 운빨 보정, 카드, 막걸리가 각각 구현\r\n    // 새 규칙 = 새 스테이지 추가\r\n    public interface IWeightStage\r\n    {\r\n        void Apply(WeightTable table, in SpinContext ctx);\r\n    }\r\n    // 심볼별 가중치 테이블. 스테이지가 순차적으로 변형\r\n    // 정수 연산 사용 / 플랫폼 간 동일 결과\r\n    public sealed class WeightTable\r\n    {\r\n        private readonly long[] _w;\r\n        public WeightTable(ISymbolCatalog catalog)\r\n        {\r\n            _w = new long[Enum.GetValues(typeof(SymbolId)).Length];\r\n            foreach (var d in catalog.All)\r\n                _w[(int)d._id] = d._baseWeight < 0 ? 0 : d._baseWeight;\r\n        }\r\n        public int Length => _w.Length;\r\n        public long WeightAt(int index) => _w[index];\r\n        public long Get(SymbolId id) => _w[(int)id];\r\n        public void MultiplyPercent(SymbolId id, int percent)\r\n        {\r\n            if (percent < 0) percent = 0;\r\n            long v = _w[(int)id] * percent / 100;\r\n            _w[(int)id] = v < 0 ? 0 : v;\r\n        }\r\n        public long Total\r\n        {\r\n            get\r\n            {\r\n                long s = 0;\r\n                for (int i = 0; i < _w.Length; i++)\r\n                {\r\n                    s += _w[i];\r\n                }\r\n                return s;\r\n            }\r\n        }\r\n    }\r\n    // 확률 보정 파이프라인. 기본 가중치 -> 등록된 스테이지 순차 적용 -> 최종 가중치\r\n    // 콤보/막걸리/카드가 모두 이 한 곳을 통과 -> 동일 메커니즘으로 합쳐짐\r\n    public sealed class WeightPipeline\r\n    {\r\n        private readonly List<IWeightStage> _stages = new List<IWeightStage>();\r\n        public WeightPipeline Add(IWeightStage stage)\r\n        {\r\n            if (stage != null) _stages.Add(stage);\r\n            return this;\r\n        }\r\n        public void Build(WeightTable table, in SpinContext ctx)\r\n        {\r\n            for (int i = 0; i < _stages.Count; i++)\r\n                _stages[i].Apply(table, ctx);\r\n        }\r\n    }\r\n}\r\n","lines":80},{"id":"Scripts/Slot/BalanceStages.cs","name":"BalanceStages","path":"Scripts/Slot/BalanceStages.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"콤보별 난이도 밴드. 콤보 0 -> max 동안 percent를 100 -> _percentAtMaxCombo로 보간","src":"﻿using System;\r\nusing System.Collections.Generic;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 콤보별 난이도 밴드. 콤보 0 -> max 동안 percent를 100 -> _percentAtMaxCombo로 보간\r\n    public sealed class DifficultyBand\r\n    {\r\n        public SymbolId _symbol;\r\n        public int _percentAtMaxCombo; // 100 미만=감소, 초과=증가\r\n\r\n        public DifficultyBand() { }\r\n        public DifficultyBand(SymbolId symbol, int percentAtMaxCombo)\r\n        {\r\n            _symbol = symbol; _percentAtMaxCombo = percentAtMaxCombo;\r\n        }\r\n    }\r\n\r\n    // 슬롯 밸런스 상수\r\n    // 코드 수정 없이 튜닝\r\n    [Serializable]\r\n    public sealed class SlotBalanceConfig\r\n    {\r\n        // 콤보 난이도 / 콤보↑ -> 스윙↓ / 옹이, 좀벌레↑\r\n        public int _difficultyMaxCombo = 30;\r\n        public List<DifficultyBand> _difficulty = new List<DifficultyBand>\r\n        {\r\n            new DifficultyBand(SymbolId.SWING, 60), new DifficultyBand(SymbolId.PERFECT, 80),\r\n        new DifficultyBand(SymbolId.KNOT, 140), new DifficultyBand(SymbolId.WORM, 200),\r\n        };\r\n\r\n        // 운빨 보정\r\n        public int _luckStepPercent = 12;       // 아쉬운 스핀 1회당 행운계 심볼 +12%\r\n        public int _luckMaxBonusPercent = 90;   // 상한 +90%(절대 보장 X -> 도박 긴장 유지)\r\n        public List<SymbolId> _luckTargets = new List<SymbolId>();\r\n    }\r\n\r\n\r\n    // 콤보가 오를수록 가중치를 밴드대로 보간 변형\r\n    public sealed class ComboDifficultyStage : IWeightStage\r\n    {\r\n        private readonly SlotBalanceConfig _cfg;\r\n        public ComboDifficultyStage(SlotBalanceConfig cfg) { _cfg = cfg; }\r\n\r\n        public void Apply(WeightTable table, in SpinContext ctx)\r\n        {\r\n            int cap = _cfg._difficultyMaxCombo <= 0 ? 1 : _cfg._difficultyMaxCombo;\r\n            int c = ctx.Combo < 0 ? 0 : (ctx.Combo > cap ? cap : ctx.Combo);\r\n\r\n            var bands = _cfg._difficulty;\r\n            for (int i = 0; i < bands.Count; i++)\r\n            {\r\n                var b = bands[i];\r\n                // 정수 선형 보간: 100 + (target-100) * c/cap\r\n                int percent = 100 + (b._percentAtMaxCombo - 100) * c / cap;\r\n                table.MultiplyPercent(b._symbol, percent);\r\n            }\r\n        }\r\n    }\r\n\r\n    // 운빨 보정 스테이지\r\n    // '아쉬운' 스핀이 연속될수록(DryStreak↑) 행운계 심볼 가중치를 상한까지 점증\r\n    // 명중하면 세션이 DryStreak = 0으로 리셋\r\n    // 상한(_luckMaxBonusPercent)으로 절대 보장은 막아 도박 긴장 유지\r\n    // DryStreak는 결정론 결과 이력의 순수 함수 -> 같은 시드 + 같은 선택이면 동일 -> 멀티 공정!!!!!!\r\n    // 체감 : 적당히 운이 좋은 느낌.\r\n    public sealed class LuckCompensationStage : IWeightStage\r\n    {\r\n        private readonly SlotBalanceConfig _cfg;\r\n        public LuckCompensationStage(SlotBalanceConfig cfg) { _cfg = cfg; }\r\n\r\n        public void Apply(WeightTable table, in SpinContext ctx)\r\n        {\r\n            if (ctx.DryStreak <= 0) return;\r\n\r\n            int bonus = _cfg._luckStepPercent * ctx.DryStreak;\r\n            if (bonus > _cfg._luckMaxBonusPercent) bonus = _cfg._luckMaxBonusPercent;\r\n\r\n            int percent = 100 + bonus;\r\n            var targets = _cfg._luckTargets;\r\n            for (int i = 0; i < targets.Count; i++)\r\n                table.MultiplyPercent(targets[i], percent);\r\n        }\r\n    }\r\n\r\n}","lines":86},{"id":"Scripts/Matchmaking/MatchBucket.cs","name":"MatchBucket","path":"Scripts/Matchmaking/MatchBucket.cs","layer":"Matchmaking","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"매칭 버킷 좌표. (TierBand, GamesBand) 로 식별되는 값 타입.","src":"using System;\n\nnamespace Wooduduk.Matchmaking\n{\n    // ============================================================\n    // MatchBucket — 매칭 버킷 좌표(티어밴드 × 판수밴드)\n    // ------------------------------------------------------------\n    // 사용법:\n    //   - 플레이어/고스트를 (TierBand, GamesBand) 고정 버킷으로 분류한 결과.\n    //   - 같은 버킷 안에서만 base 풀을 구성한다(스펙 §2/§4).\n    //   - Dictionary/HashSet 키로 쓸 수 있도록 값 동등성(Equals/GetHashCode) 제공.\n    // 필드:\n    //   TierBand  : 티어밴드 인덱스(기본 0=Stick~Stone / 1=Iron~Silver / 2=Gold~Diamond).\n    //   GamesBand : 판수밴드 인덱스(기본 0=0~9 / 1=10~49 / 2=50+).\n    // 주의:\n    //   - 값 타입(struct). 두 밴드가 모두 같아야 동일 버킷.\n    //   - 밴드 산출 규칙은 MatchmakingConfigSO 가 소유(여기는 좌표만 보관).\n    // ============================================================\n\n    /// <summary>\n    /// 매칭 버킷 좌표. (TierBand, GamesBand) 로 식별되는 값 타입.\n    /// </summary>\n    [Serializable]\n    public struct MatchBucket : IEquatable<MatchBucket>\n    {\n        /// <summary>티어밴드 인덱스.</summary>\n        public int TierBand;\n\n        /// <summary>판수밴드 인덱스.</summary>\n        public int GamesBand;\n\n        /// <summary>버킷 좌표를 직접 지정해 생성.</summary>\n        public MatchBucket(int tierBand, int gamesBand)\n        {\n            TierBand = tierBand;\n            GamesBand = gamesBand;\n        }\n\n        #region 값 동등성 (Equality — 딕셔너리 키용)\n\n        public bool Equals(MatchBucket other)\n        {\n            return TierBand == other.TierBand && GamesBand == other.GamesBand;\n        }\n\n        public override bool Equals(object obj)\n        {\n            return obj is MatchBucket other && Equals(other);\n        }\n\n        public override int GetHashCode()\n        {\n            // 두 작은 정수의 안정 결합 해시(딕셔너리 분포용). 결정론적.\n            unchecked\n            {\n                return (TierBand * 397) ^ GamesBand;\n            }\n        }\n\n        public static bool operator ==(MatchBucket a, MatchBucket b) => a.Equals(b);\n        public static bool operator !=(MatchBucket a, MatchBucket b) => !a.Equals(b);\n\n        #endregion\n\n        public override string ToString()\n        {\n            return $\"MatchBucket(TierBand={TierBand}, GamesBand={GamesBand})\";\n        }\n    }\n}\n","lines":71},{"id":"Scripts/Data/Tier/TierRunResult.cs","name":"TierRunResult","path":"Scripts/Data/Tier/TierRunResult.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿namespace Wooduduk.Data.Tier\r\n{\r\n    [System.Serializable]\r\n    public class TierRunResult\r\n    {\r\n        public string _userId;\r\n        public string _userNick;\r\n\r\n        // 티어 계산용\r\n        public int _rawScore;\r\n\r\n        // 고스트 저장용\r\n        public int _settlementCount;\r\n        public int _maxCombo;\r\n\r\n        public long _timestamp;\r\n    }\r\n}","lines":18},{"id":"Scripts/Data/Result/LeaderboardViewData.cs","name":"LeaderboardViewData","path":"Scripts/Data/Result/LeaderboardViewData.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"TOP100 탭","src":"﻿using System.Collections.Generic;\r\n\r\nnamespace Wooduduk.Data.Result\r\n{\r\n    [System.Serializable]\r\n    public class LeaderboardViewData\r\n    {\r\n        // 내 기록 탭\r\n        public RankingData _latestRecord;     // 최신 기록\r\n        public int[] _myTop3Scores;           // 최고 점수 1,2,3위\r\n\r\n        // TOP100 탭\r\n        public RankingData _myRankRecord;     // 내 전체 순위 기록 (100밖도 가능)\r\n        public List<RankingData> _top100;     // TOP100 리스트\r\n    }\r\n}","lines":16},{"id":"Scripts/Data/Result/RankingData.cs","name":"RankingData","path":"Scripts/Data/Result/RankingData.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿namespace Wooduduk.Data.Result\r\n{\r\n    [System.Serializable]\r\n    public class RankingData\r\n    {\r\n        public int _rank;\r\n\r\n        public string _userId;\r\n        public string _nickname;\r\n\r\n        public int _score; // 최고 점수\r\n\r\n        // 확장용\r\n        public int _maxCombo; // 최대 콤보\r\n        public int _settlementCount; // 정산 횟수\r\n\r\n        public long _timestamp;\r\n    }\r\n}","lines":19},{"id":"Scripts/Network/Firebase/Leaderboard/LeaderboardEvents.cs","name":"LeaderboardEvents","path":"Scripts/Network/Firebase/Leaderboard/LeaderboardEvents.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿using System;\r\nusing Wooduduk.Data.Result;\r\n\r\nnamespace Wooduduk.Network.Firebase.Leaderboard\r\n{\r\n    public static class LeaderboardEvents\r\n    {\r\n        public static event Action<LeaderboardViewData> OnLoaded;\r\n\r\n        public static void RaiseLoaded(LeaderboardViewData data)\r\n        {\r\n            OnLoaded?.Invoke(data);\r\n        }\r\n    }\r\n}","lines":15},{"id":"Scripts/Network/Firebase/Leaderboard/LeaderboardRepository.cs","name":"LeaderboardRepository","path":"Scripts/Network/Firebase/Leaderboard/LeaderboardRepository.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"★ 점수 저장 + 내 순위 캐시 갱신","src":"﻿using Firebase.Database;\r\nusing Firebase.Extensions;\r\nusing System;\r\nusing System.Collections.Generic;\r\nusing System.Linq;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.Result;\r\n\r\nnamespace Wooduduk.Network.Firebase.Leaderboard\r\n{\r\n    public class LeaderboardRepository\r\n    {\r\n        private readonly DatabaseReference _database;\r\n\r\n        public LeaderboardRepository()\r\n        {\r\n            _database = FirebaseDatabase.DefaultInstance.RootReference;\r\n        }\r\n\r\n        // ★ 점수 저장 + 내 순위 캐시 갱신\r\n        public void Save(RankingData data)\r\n        {\r\n            if (data == null || string.IsNullOrEmpty(data._userId)) return;\r\n\r\n            string json = JsonUtility.ToJson(data);\r\n            _database.Child(\"leaderboard\").Child(data._userId).SetRawJsonValueAsync(json);\r\n        }\r\n\r\n        // ★ 내 순위 캐시 저장\r\n        public void SaveMyRank(string userId, int rank, int score)\r\n        {\r\n            var data = new Dictionary<string, object>\r\n            {\r\n                { \"_rank\", rank },\r\n                { \"_score\", score },\r\n                { \"_updatedAt\", DateTimeOffset.UtcNow.ToUnixTimeMilliseconds() }\r\n            };\r\n            _database.Child(\"user_ranks\").Child(userId).UpdateChildrenAsync(data);\r\n        }\r\n\r\n        // ★ TOP100 로드\r\n        public void LoadTop100(Action<List<RankingData>> callback)\r\n        {\r\n            _database.Child(\"leaderboard\").GetValueAsync().ContinueWithOnMainThread(task =>\r\n            {\r\n                if (task.IsFaulted || task.IsCanceled)\r\n                {\r\n                    Debug.LogError(\"[LeaderboardRepository] LoadTop100 실패: \" + task.Exception?.GetBaseException().Message);\r\n                    callback?.Invoke(new List<RankingData>());\r\n                    return;\r\n                }\r\n\r\n                DataSnapshot snapshot = task.Result;\r\n                Debug.Log($\"[LeaderboardRepository] snapshot 수신: {snapshot.ChildrenCount}건\");\r\n\r\n                List<RankingData> rankings = new();\r\n                foreach (var child in snapshot.Children)\r\n                {\r\n                    RankingData data = JsonUtility.FromJson<RankingData>(child.GetRawJsonValue());\r\n                    if (data != null && data._score > -1) rankings.Add(data);\r\n                }\r\n\r\n                rankings = rankings.OrderByDescending(x => x._score).Take(100).ToList();\r\n\r\n                for (int i = 0; i < rankings.Count; i++)\r\n                    rankings[i]._rank = i + 1;\r\n\r\n                callback?.Invoke(rankings);\r\n            });\r\n        }\r\n\r\n        // ★ 내 순위 캐시 로드 (1건만)\r\n        public void LoadMyRank(string userId, Action<int, int> callback)\r\n        {\r\n            _database.Child(\"user_ranks\").Child(userId)\r\n                .GetValueAsync()\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    if (task.IsFaulted || task.IsCanceled || !task.Result.Exists)\r\n                    {\r\n                        callback?.Invoke(-1, 0);\r\n                        return;\r\n                    }\r\n\r\n                    var snap = task.Result;\r\n                    var rankNode = snap.Child(\"_rank\");\r\n                    var scoreNode = snap.Child(\"_score\");\r\n\r\n                    if (!rankNode.Exists || !scoreNode.Exists)\r\n                    {\r\n                        callback?.Invoke(-1, 0);\r\n                        return;\r\n                    }\r\n\r\n                    if (!int.TryParse(rankNode.Value?.ToString(), out int rank)) rank = -1;\r\n                    if (!int.TryParse(scoreNode.Value?.ToString(), out int score)) score = 0;\r\n\r\n                    callback?.Invoke(rank, score);\r\n                });\r\n        }\r\n    }\r\n}","lines":102},{"id":"Scripts/Data/Service/SingleRunResultService.cs","name":"SingleRunResultService","path":"Scripts/Data/Service/SingleRunResultService.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"싱글 플레이 런 종료 처리를 담당 결과 데이터만 생성하고, UI 표시는 호출하는 쪽에서 담당","src":"﻿using System;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.Result;\r\nusing Wooduduk.Data.Static;\r\nusing Wooduduk.Network.Firebase;\r\nusing Wooduduk.Slot;\r\n\r\nnamespace Wooduduk.Data.Service\r\n{\r\n    /// <summary>\r\n    /// 싱글 플레이 런 종료 처리를 담당\r\n    /// 결과 데이터만 생성하고, UI 표시는 호출하는 쪽에서 담당\r\n    /// </summary>\r\n    public static class SingleRunResultService\r\n    {\r\n        public static RunResultData Process(RunProgress run, SlotScoreCalculator score, UserData user)\r\n        {\r\n            if (run == null || score == null || user == null)\r\n            {\r\n                Debug.LogWarning(\"[SingleRunResultService] 유효하지 않은 인자입니다.\");\r\n                return null;\r\n            }\r\n\r\n            RunResultData result = RunResultBuilder.Build(run, score, RunMode.Single);\r\n\r\n            if (result == null)\r\n            {\r\n                Debug.LogWarning(\"[SingleRunResultService] 결과 생성 실패\");\r\n                return null;\r\n            }\r\n\r\n            // 유저 정보 부여\r\n            result._userId = user._userId;\r\n            result._userNick = user._userNick;\r\n\r\n            // 티어/비교용 원점수\r\n            result._rawScore = score.SingleScore(run);\r\n\r\n            // 싱글은 등수 개념이 없으므로 0 유지\r\n            result._rank = 0;\r\n\r\n            // 싱글 결과 저장\r\n            RunResultSaveService.Save(result, user);\r\n\r\n\r\n            Debug.Log($\"[SingleRunResultService] 싱글 결과 생성 완료 / \" +\r\n                      $\"User={user._userId}, Score={result._finalScore}, Raw={result._rawScore}\");\r\n\r\n            return result;\r\n        }\r\n    }\r\n}","lines":52},{"id":"Scripts/Data/Tier/TierRunResultBuilder.cs","name":"TierRunResultBuilder","path":"Scripts/Data/Tier/TierRunResultBuilder.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"멀티 전용. _rawScore = 멀티 최종 점수 티어 승강 점수(S+R)는 순위 확정 후 TierService.ApplyRun(MultiTierScore)로 별도 적용.","src":"﻿using System;\r\nusing Wooduduk.Data.Static;\r\nusing Wooduduk.Network.Firebase;\r\nusing Wooduduk.Slot;\r\n\r\nnamespace Wooduduk.Data.Tier\r\n{\r\n    public static class TierRunResultBuilder\r\n    {\r\n        // 멀티 전용. _rawScore = 멀티 최종 점수\r\n        // 티어 승강 점수(S+R)는 순위 확정 후 TierService.ApplyRun(MultiTierScore)로 별도 적용.\r\n        public static TierRunResult Build(RunProgress run, SlotScoreCalculator score)\r\n        {\r\n            if (run == null || score == null)\r\n            {\r\n                UnityEngine.Debug.LogWarning(\"[TierRunResultBuilder] run/score null\");\r\n                return null;\r\n            }\r\n\r\n            UserData user = UserManager.Instance?.CurrentUserData;\r\n\r\n            long raw = score.MultiScore(run);                 // S + W (순위 무관)\r\n            int safeScore = raw > int.MaxValue ? int.MaxValue : (int)raw;\r\n\r\n            return new TierRunResult\r\n            {\r\n                _userId = user?._userId ?? string.Empty,\r\n                _userNick = user?._userNick ?? string.Empty,\r\n                _rawScore = safeScore,\r\n                _settlementCount = run.SettleCount,\r\n                _maxCombo = run.MaxCombo, \r\n                _timestamp = DateTimeOffset.UtcNow.ToUnixTimeSeconds()\r\n            };\r\n        }\r\n    }\r\n}","lines":36},{"id":"Scripts/Slot/SurvivalProcessor.cs","name":"SurvivalProcessor","path":"Scripts/Slot/SurvivalProcessor.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"체온/생존 처리 RunProgress 체온, 생존시간, 생사 컨트롤 멀티 = 서버 틱 / 싱글 = Update","src":"﻿using System;\r\nusing Wooduduk.Player;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    \r\n\r\n    // 체온/생존 처리\r\n    // RunProgress 체온, 생존시간, 생사 컨트롤\r\n    // 멀티 = 서버 틱 / 싱글 = Update\r\n    public sealed class SurvivalProcessor\r\n    {\r\n        private readonly SurvivalConfig _config;\r\n\r\n        public int MaxFireLogs\r\n        {\r\n            get\r\n            {\r\n                float per = _config._burnSecondsPerLog;\r\n                if (per <= 0f) return 0;\r\n                return (int)Math.Ceiling(_config._maxBurnSeconds / per);\r\n            }\r\n        }\r\n        public SurvivalProcessor(SurvivalConfig config)\r\n        {\r\n            _config = config;\r\n        }\r\n        public SurvivalConfig Config => _config;\r\n\r\n        public void Init(RunProgress run)\r\n        {\r\n            run.MaxBodyTemp = _config._maxBodyTemp;\r\n            run.BodyTemp = _config._maxBodyTemp;\r\n            run.SurvivalSeconds = 0f;\r\n            run.IsAlive = true;\r\n            run.FireBurnSeconds = 0f;\r\n        }\r\n        // 정산 횟수에 따라 가속되는 현재 초당 체온 감소량 (삭제될수도 있음)\r\n        public float CurrentDrainPerSeconds(RunProgress run)\r\n        {\r\n            return _config._drainBasePerSecond + run.SettleCount * _config._drainPerSettleStep;\r\n        }\r\n        // 시작 & 생존 중일 때만 체온 감소 + 생존 시간 누적\r\n        public bool Advance(RunProgress run, float deltaSeconds)\r\n        {\r\n            if (!run.Started || !run.IsAlive || deltaSeconds <= 0f) return false;\r\n            run.SurvivalSeconds += deltaSeconds;\r\n\r\n\r\n            if (run.FireBurnSeconds > 0f)\r\n            {\r\n                // 연소 중 : 드레인 정지 + 서서히 회복\r\n                run.FireBurnSeconds -= deltaSeconds;\r\n                if (run.FireBurnSeconds < 0f) run.FireBurnSeconds = 0f;\r\n                run.BodyTemp += _config._warmHealPerSecond * deltaSeconds;\r\n                if (run.BodyTemp > run.MaxBodyTemp) run.BodyTemp = run.MaxBodyTemp;\r\n                return false;\r\n            }\r\n            // 연소 정지 : 드레인\r\n            run.BodyTemp -= CurrentDrainPerSeconds(run) * deltaSeconds;\r\n            if (run.BodyTemp <= 0f) \r\n            { \r\n                run.BodyTemp = 0f; run.IsAlive = false; return true; \r\n            }\r\n            return false;\r\n        }\r\n        // 모닥불 투입 시 체온 회복\r\n        public void Warm(RunProgress run)\r\n        {\r\n            run.FireBurnSeconds += _config._burnSecondsPerLog;\r\n            if (run.FireBurnSeconds > _config._maxBurnSeconds) run.FireBurnSeconds = _config._maxBurnSeconds;\r\n        }\r\n        // 위험 구간 여부 (연출용)\r\n        public bool IsCritical(RunProgress run) => run.IsAlive && run.BodyTemp <= _config._criticalThreshold;\r\n\r\n        public int FireLogLoaded(RunProgress run)\r\n        {\r\n            float per = _config._burnSecondsPerLog;\r\n            if (per <= 0f) return 0;\r\n            return (int)Math.Ceiling(run.FireBurnSeconds / per);\r\n        }\r\n        \r\n    }\r\n}\r\n","lines":85},{"id":"Scripts/Data/Static/StaticEnum/BuffType.cs","name":"BuffType","path":"Scripts/Data/Static/StaticEnum/BuffType.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿namespace Wooduduk.Data.Static.StaticEnum\r\n{\r\n    public enum BuffType\r\n    {\r\n        NONE,\r\n        BUFF,\r\n        DEBUFF\r\n    }\r\n}\r\n","lines":10},{"id":"Scripts/Network/Firebase/Matchmaking/RoomData.cs","name":"RoomData","path":"Scripts/Network/Firebase/Matchmaking/RoomData.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":false,"summary":"Room 자체의 정보입니다. 플레이어 정보와 별도로 관리됩니다. Seed는 roomId에서 결정론적으로 계산되므로 저장하지 않습니다.","src":"﻿using System;\r\n\r\nnamespace Wooduduk.Network.Firebase.Matchmaking\r\n{\r\n    /// <summary>\r\n    /// Room 자체의 정보입니다.\r\n    /// 플레이어 정보와 별도로 관리됩니다.\r\n    /// Seed는 roomId에서 결정론적으로 계산되므로 저장하지 않습니다.\r\n    /// </summary>\r\n    [Serializable]\r\n    public class RoomData\r\n    {\r\n        /// <summary>\r\n        /// 현재 방 상태\r\n        /// waiting → 플레이어 대기\r\n        /// playing → 게임 진행 중\r\n        /// finished → 게임 종료\r\n        /// </summary>\r\n        public string state;\r\n\r\n        // Firebase RTDB는 쿼리를 한 필드만 할 수 있어서\r\n        // \"state=waiting AND tier=3\" 같은 복합 조건이 불가능함.\r\n        // 그래서 \"waiting_3\" 처럼 두 값을 합친 복합키 필드를 만들어서\r\n        // 이 하나로 쿼리함.\r\n        public string stateAndTier;\r\n\r\n        public string hostUid;\r\n    }\r\n}","lines":29},{"id":"Scripts/Network/Firebase/RunResultSaveService.cs","name":"RunResultSaveService","path":"Scripts/Network/Firebase/RunResultSaveService.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿using System.Collections.Generic;\r\nusing Wooduduk.Data.Result;\r\nusing Wooduduk.Data.Service;\r\nusing Wooduduk.D
