rtyBlock(); // 방어: Awake 미실행/인스턴스화 타이밍 대비(GetPropertyBlock dest null 방지)\r\n\r\n            // 체온 감소 비율 (1 = 따뜻함 -> 0 = 얼어죽음 상태이므로 반대로 뒤집음)\r\n            float freezeAmount = 1f - _controller.BodyTempNormalized;\r\n\r\n            // 본체 머티리얼 쉐이더로 프로퍼티 블록을 이용해 값 전달\r\n            for (int i = 0; i < _targetRenderer.Length; i++)\r\n            {\r\n                Renderer target = _targetRenderer[i];\r\n                if (target == null) continue;\r\n\r\n                target.GetPropertyBlock(_propBlock);\r\n                _propBlock.SetFloat(_freezePropertyID, freezeAmount);\r\n                target.SetPropertyBlock(_propBlock);\r\n            }\r\n        }\r\n    }\r\n}","lines":52},{"id":"Scripts/Slot/Slotmachine/SlotmachineEffectController.cs","name":"SlotmachineEffectController","path":"Scripts/Slot/Slotmachine/SlotmachineEffectController.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"스윙 시 타격 피드백과 스윙 이펙트 동시 재생","src":"﻿using MoreMountains.Feedbacks;\nusing UnityEngine;\nusing Wooduduk.Data.Service;\nusing Wooduduk.Slot;\nusing static UnityEngine.Rendering.DebugManager;\n\nnamespace Wooduduk.Slot.Machine\n{\n    public class SlotmachineEffectController : MonoBehaviour\n    {\n        [Header(\"Swing Effects (스윙 & 타격)\")]\n        [Tooltip(\"도끼 스윙 궤적이나 이펙트\")]\n        [SerializeField] private ParticleSystem _swingVFX;\n\n        [Header(\"Freezing Effects (얼어붙는 연기)\")]\n        [Tooltip(\"얼음/연기 이펙트\")]\n        [SerializeField] private ParticleSystem _freezingSmokeVFX;\r\n        [SerializeField] private ParticleSystem _freezingSnowVFX;\n\n        private void OnEnable()\n        {\n            // 결합도를 낮추기 위해 SlotEvent에 자동 연결\n            SlotEvent.OnSpinStarted += PlaySwingAndHitEffects;\n            SlotEvent.OnBodyTempCritical += FreezingEffect; // 체온 위험 시 연기 시작\n            SlotEvent.OnDeath += FreezingSnowEffect;         // 사망 시 완전 결빙\n            SlotEvent.OnFireFed += StopFreezingEffect;           // 불을 쬐면 얼음 녹음\n            SlotEvent.OnRunReset += HandleRunReset;\r\n        }\n\n        private void OnDisable()\n        {\n            SlotEvent.OnSpinStarted -= PlaySwingAndHitEffects;\n            SlotEvent.OnBodyTempCritical -= FreezingEffect;\n            SlotEvent.OnDeath -= FreezingSnowEffect;\n            SlotEvent.OnFireFed -= StopFreezingEffect;\n            SlotEvent.OnRunReset -= HandleRunReset;\r\n        }\n\n        /// <summary>\n        /// 스윙 시 타격 피드백과 스윙 이펙트 동시 재생\n        /// </summary>\n        public void PlaySwingAndHitEffects()\n        {\n            if (_swingVFX != null)\n            {\n                // Play를 호출하면 파티클이 처음부터 재생됩니다.\n                _swingVFX.Stop();\n                _swingVFX.Play();\n            }\n        }\n\n        /// <summary>\n        /// 체온이 위험할 때 연기가 피어오르는 이펙트 시작\n        /// </summary>\n        public void FreezingEffect(RunProgress run = null)\n        {\n            if (_freezingSmokeVFX != null && !_freezingSmokeVFX.isPlaying)\n            {\n                _freezingSmokeVFX.Play();\n            }\n        }\n\n        /// <summary>\n        /// 사망(체온 0) 시 연기가 최대치에 달하거나 완전히 얼어붙는 연출\n        /// </summary>\n        public void FreezingSnowEffect(RunProgress run = null)\n        {\n            if (_freezingSnowVFX != null && !_freezingSnowVFX.isPlaying)\n            {\n                _freezingSnowVFX.Play();\n            }\n        }\n        \n        /// <summary>\n        /// 모닥불에 장작을 넣어 체온이 회복되었을 때 연기 이펙트 정지 및 초기화\n        /// </summary>\n        public void StopFreezingEffect(RunProgress run = null)\n        {\n            if (_freezingSmokeVFX != null && _freezingSmokeVFX.isPlaying)\n            {\n                // 더 이상 파티클을 방출하지 않되, 이미 나온 파티클은 자연스럽게 사라지게 함\n                _freezingSmokeVFX.Stop(true, ParticleSystemStopBehavior.StopEmitting);\n            }\n            if (_freezingSnowVFX != null && _freezingSnowVFX.isPlaying)\r\n            {\r\n                _freezingSnowVFX.Stop(true, ParticleSystemStopBehavior.StopEmitting);\r\n            }\n        }\n\n        private void HandleRunReset(RunProgress run = null)\r\n        {\r\n            if (_freezingSmokeVFX != null && _freezingSmokeVFX.isPlaying)\r\n                _freezingSmokeVFX.Stop(true, ParticleSystemStopBehavior.StopEmittingAndClear);\r\n            if (_freezingSnowVFX != null && _freezingSnowVFX.isPlaying)\r\n                _freezingSnowVFX.Stop(true, ParticleSystemStopBehavior.StopEmittingAndClear);\r\n        }\n    }\n}","lines":98},{"id":"Scripts/Slot/Slotmachine/SlotSymbolManager.cs","name":"SlotSymbolManager","path":"Scripts/Slot/Slotmachine/SlotSymbolManager.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"인덱스에 맞는 머티리얼 반환","src":"using UnityEngine;\n\nnamespace Wooduduk.Slot.Machine\n{\n    public class SlotSymbolManager : MonoBehaviour\n    {\n        [Header(\"Symbol Materials\")]\n        [Tooltip(\"SymbolId enum 순서(0~7)에 맞춰 8개의 머티리얼을 할당하세요.\")]\n        [SerializeField] private Material[] _symbolMaterials = new Material[8];\n\n        public int MaterialCount => _symbolMaterials.Length;\n\n        // 인덱스에 맞는 머티리얼 반환\n        public Material GetMaterial(int index)\n        {\n            if (index < 0 || index >= _symbolMaterials.Length) return null;\n            return _symbolMaterials[index];\n        }\n    }\n}","lines":20},{"id":"Scripts/Slot/Slotmachine/SlotInteractable.cs","name":"SlotInteractable","path":"Scripts/Slot/Slotmachine/SlotInteractable.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"(요약 없음)","src":"﻿using UnityEngine;\r\nusing Wooduduk.Core;\r\nusing Wooduduk.Slot.Machine;\r\n\r\nnamespace Wooduduk.Slot.Slotmachine\r\n{\r\n    // 슬롯 상호작용\r\n    public class SlotInteractable : MonoBehaviour, IInteractable\r\n    {\r\n        [SerializeField] private SlotmachineController _controller;\r\n        [SerializeField] private string _prompt = \"쾅!!\";\r\n\r\n        public string Prompt => _prompt;\r\n\r\n        public bool CanInteract => _controller != null && !_controller.IsSpinning;\r\n        private void Awake()\r\n        {\r\n            if (_controller == null)\r\n                _controller = GetComponentInParent<SlotmachineController>();\r\n        }\r\n\r\n        public void Interact(IInteractor source)\r\n        {\r\n            Debug.Log($\"3.Interact / controller = {(_controller == null ? \"null!\" : \"OK\")} / IsSpinning={_controller?.IsSpinning}\");\r\n            if (!CanInteract) { Debug.Log(\"[3.Interact] CanInteract=false → 차단\"); return; }\r\n            _controller.Swing();\r\n        }\r\n    }\r\n}\r\n","lines":30},{"id":"Scripts/Slot/Animation/SlotWoodSpawner.cs","name":"SlotWoodSpawner","path":"Scripts/Slot/Animation/SlotWoodSpawner.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"정산 완료 시점","src":"﻿using System.Collections;\nusing UnityEngine;\nusing Wooduduk.Core;\nusing Wooduduk.Interactables;\nusing Wooduduk.Slot;\nusing Wooduduk.Slot.Machine;\n\nnamespace Wooduduk.Slot.Slotmachine\n{\n    public class SlotWoodSpawner : MonoBehaviour\n    {\n        [SerializeField] private GameObject _woodPrefab;\n        [SerializeField] private Transform _spawnPoint;\n        [SerializeField] private float _ejectForce = 3f;\n        [SerializeField] private float _spawnDelay = 0.05f; // 장작이 뿜어져 나오는 간격\n        [SerializeField] private int _maxVisualSpawn = 30;  // 렉 방지용 물리 생성 최대치\n\n\n        private void OnEnable()\n        {\n            SlotEvent.OnSettled += HandleSettled;\n        }\n\n        private void OnDisable()\n        {\n            SlotEvent.OnSettled -= HandleSettled;\n        }\r\n\r\n        // 정산 완료 시점\r\n        private void HandleSettled(RunProgress run, long movedWood)\n        {\n            if (movedWood > 0)\n            {\n                StartCoroutine(EjectWoodRoutine((int)movedWood));\n            }\n        }\n\n        private IEnumerator EjectWoodRoutine(int amount)\n        {\n            // 실제 수치가 너무 높아 물리 연산으로 게임이 멈추는 것을 방지\n            int actualSpawnCount = Mathf.Min(amount, _maxVisualSpawn);\n\n            for (int i = 0; i < actualSpawnCount; i++)\n            {\n                GameObject go = GenericObjectPool.Instance.Spawn(_woodPrefab, _spawnPoint.position, UnityEngine.Random.rotation);\n                if (go.TryGetComponent<WoodLog>(out var woodLog))\n                {\n                    // 정면을 기준으로 약간의 부채꼴(원뿔) 형태로 퍼지면서 날아가도록 벡터 계산\n                    Vector3 spreadDir = (_spawnPoint.forward + UnityEngine.Random.insideUnitSphere * 0.1f).normalized;\n                    woodLog.Throw(spreadDir, _ejectForce);\n                }\r\n\r\n                yield return new WaitForSeconds(_spawnDelay);\n            }\n        }\n    }\n}","lines":57},{"id":"Scripts/Slot/Animation/SlotMachineFreezenObejct.cs","name":"SlotMachineFreezenObejct","path":"Scripts/Slot/Animation/SlotMachineFreezenObejct.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"위험 진입 시점 체온(0~1 사이)부터 사망(0)까지의 구간을 0.0 ~ 1.0 비율로 정규화","src":"﻿using UnityEngine;\n\nnamespace Wooduduk.Slot.Machine\n{\n    public class SlotMachineFreezenObejct : MonoBehaviour\n    {\n        [Header(\"References\")]\n        [SerializeField] private SlotmachineController _controller;\n        [SerializeField] private Renderer[] _iceAlphaRenderers;\n\n        private MaterialPropertyBlock _propBlock;\n        private int _baseColorPropertyID;\n        \n        private bool _isCriticalPhase = false;\n        private float _criticalStartTemp = -1f;\n\n        private void Awake()\n        {\n            if (_controller == null) \n                _controller = GetComponentInParent<SlotmachineController>();\n\n            _baseColorPropertyID = Shader.PropertyToID(\"_BaseColor\");\n            _propBlock = new MaterialPropertyBlock();\n        }\n\n        private void OnEnable()\n        {\n            SlotEvent.OnBodyTempCritical += HandleBodyTempCritical;\n            SlotEvent.OnRunReset += HandleRunReset;\n        }\n\n        private void OnDisable()\n        {\n            SlotEvent.OnBodyTempCritical -= HandleBodyTempCritical;\n            SlotEvent.OnRunReset -= HandleRunReset;\n        }\n\n        private void HandleBodyTempCritical(RunProgress run)\n        {\n            _isCriticalPhase = true;\n            if (_controller != null)\n            {\n                _criticalStartTemp = _controller.BodyTempNormalized;\n            }\n        }\n\n        private void HandleRunReset(RunProgress run)\n        {\n            _isCriticalPhase = false;\n            _criticalStartTemp = -1f;\n            ApplyIceAlpha(0f); // 즉시 완전히 투명하게 초기화\n        }\n\n        private void Update()\n        {\n            if (_controller == null || _iceAlphaRenderers == null || _iceAlphaRenderers.Length == 0) return;\n\n            float targetAlpha = 0f;\n            if (_isCriticalPhase && _criticalStartTemp > 0f)\n            {\n                // 위험 진입 시점 체온(0~1 사이)부터 사망(0)까지의 구간을 0.0 ~ 1.0 비율로 정규화\n                targetAlpha = Mathf.InverseLerp(_criticalStartTemp, 0f, _controller.BodyTempNormalized);\n            }\n\n            ApplyIceAlpha(targetAlpha);\n        }\n\n        private void ApplyIceAlpha(float alphaValue)\n        {\n            if (_propBlock == null) _propBlock = new MaterialPropertyBlock(); // 방어: Awake 미실행/인스턴스화 타이밍 대비\n            for (int i = 0; i < _iceAlphaRenderers.Length; i++)\n            {\n                Renderer target = _iceAlphaRenderers[i];\n                if (target == null) continue;\n\n                target.GetPropertyBlock(_propBlock);\n\n                // 원본 머티리얼의 기존 컬러 속성을 안전하게 가져옴\n                Color currentColor = target.sharedMaterial.HasProperty(_baseColorPropertyID) \n                    ? target.sharedMaterial.GetColor(_baseColorPropertyID) \n                    : Color.white;\n\n                // 계산된 타겟 알파값만 교체\n                currentColor.a = alphaValue;\n\n                _propBlock.SetColor(_baseColorPropertyID, currentColor);\n                target.SetPropertyBlock(_propBlock);\n            }\n        }\n    }\n}","lines":91},{"id":"Scripts/Slot/Animation/SlotMonitorUI.cs","name":"SlotMonitorUI","path":"Scripts/Slot/Animation/SlotMonitorUI.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"판정 즉시 배율은 캐싱하되, UI 갱신은 보류 (스포일러 방지)","src":"﻿using MoreMountains.Feedbacks;\nusing TMPro; // Unity 6.3 LTS 표준 Text UI\nusing UnityEngine;\nusing Wooduduk.Data.DataSO;\nusing Wooduduk.Slot;\nusing Wooduduk.Slot.Machine;\n\nnamespace Wooduduk.Slot.Slotmachine\n{\n    public class SlotMonitorUI : MonoBehaviour\n    {\n        [Header(\"UI References\")]\n        [SerializeField] private TextMeshPro _monitorText;\r\n\r\n        [Header(\"Data References\")]\n        [SerializeField] private SlotmachineController _controller;\n        [SerializeField] private DataManagerSO _data;\n\n        // 캐싱 데이터\n        private int _currentCost = 0;\n        private int _currentCombo = 0;\n        private float _currentMultiplier = 0f;\n        private long _unsettledWood = 0; \n        private long _lastSettled = 0;\n\n        private void OnEnable()\n        {\n            SlotEvent.OnSpinJudged += HandleSpinJudged;\n            SlotEvent.OnSpinCompleted += HandleSpinCompleted;\n            SlotEvent.OnSettled += HandleSettled;\n            SlotEvent.OnRunReset += HandleRunReset;\n        }\n\n        private void OnDisable()\n        {\n            SlotEvent.OnSpinJudged -= HandleSpinJudged;\n            SlotEvent.OnSpinCompleted -= HandleSpinCompleted;\n            SlotEvent.OnSettled -= HandleSettled;\n            SlotEvent.OnRunReset -= HandleRunReset;\n        }\n\n        private void Start()\n        {\n            if (_controller != null && _controller.Run != null)\n            {\n                UpdateCost(_controller.Run);\n                UpdateRunState(_controller.Run);\n            }\n            RefreshUI();\n        }\n\n        // 판정 즉시 배율은 캐싱하되, UI 갱신은 보류 (스포일러 방지)\n        private void HandleSpinJudged(SpinOutcome outcome)\n        {\r\n            if (_data != null && _data._gameBalance != null)\r\n                _currentMultiplier = _data._gameBalance._data._slotEconomy.ComboMultBp(outcome.Combo) / 10000f;\r\n        }\n\n        // 릴 회전이 완전히 끝난 후 RunProgress의 최신 상태를 불러와서 UI 갱신\n        private void HandleSpinCompleted()\n        {\n            if (_controller != null && _controller.Run != null)\n            {\n                UpdateRunState(_controller.Run);\r\n                UpdateCost(_controller.Run);\n\n            }\r\n            RefreshUI();\n        }\n\n        // 정산 시\n        private void HandleSettled(RunProgress run, long movedWood)\n        {\n            _lastSettled = movedWood;\n            _currentMultiplier = 0f; // 정산 시 배율 표기 초기화\r\n\r\n            UpdateCost(run);\n            UpdateRunState(run); // 정산 후 콤보(0)와 미정산 장작(0) 갱신\n            RefreshUI();\n        }\n\n        // 런 리셋 시\n        private void HandleRunReset(RunProgress run)\n        {\n            _currentMultiplier = 0f;\n            _lastSettled = 0;\r\n\r\n            UpdateCost(run);\n            UpdateRunState(run);\n            RefreshUI();\n        }\n\n        // 콤보와 미정산 장작 상태 갱신\n        private void UpdateRunState(RunProgress run)\n        {\n            if (run == null) return;\n            _currentCombo = run.Combo;\n            _unsettledWood = run.UnsettledWood;\n        }\n\n        // 다음 스핀 비용 갱신\n        private void UpdateCost(RunProgress run)\n        {\n            if (run == null || _data == null || _data._gameBalance == null) return;\r\n\r\n            var ecoConfig = _data._gameBalance._data._slotEconomy;\n            _currentCost = ecoConfig.SpinCost(run.SpinCostTier);\n        }\n\n        // 실제 텍스트 갱신\n        private void RefreshUI()\n        {\n            if (_monitorText == null) return;\n\n            _monitorText.text =\r\n                $\"▶ 회전 비용 : {_currentCost} 장작\\n\" +\n                $\"▶ 현재 콤보 : {_currentCombo}\\n\" +\n                $\"▶ 콤보 배율 : {_currentMultiplier:F1}x\\n\" +\n                $\"▶ 미정산 장작 : {_unsettledWood}\";\n        }\n    }\n}","lines":122},{"id":"Scripts/Slot/Animation/SlotmachineAxeAnimationController.cs","name":"SlotmachineAxeAnimationController","path":"Scripts/Slot/Animation/SlotmachineAxeAnimationController.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"(요약 없음)","src":"﻿using MoreMountains.Feedbacks;\nusing UnityEngine;\nusing Wooduduk.UI;\n\nnamespace Wooduduk.Slot.Machine\n{\n    public class SlotmachineAxeAnimationController : MonoBehaviour\n    {\n\n        private WeaponSkinSwapper _skinSwapper;\n\n        [Header(\"References\")]\n        [SerializeField] private Transform _swingDestination;\n\n        private GameObject _axeModel; \n        \n        private MMF_Player _axeSwingPlayer;\n\n        private void Awake()\n        {\n\n            _skinSwapper = GetComponent<WeaponSkinSwapper>();\n            UpdateAxeReference(_skinSwapper.CurrentAxe);\n            \n        }\n\n        private void OnEnable()\n        {\n            SlotEvent.OnAxeSwing += PlayAxeSwing;\n            SlotEvent.OnSpinCompleted += HideAxe;\n            if (_skinSwapper != null)\n            {\n                _skinSwapper.OnAxeSpawned += UpdateAxeReference;\n                if (_skinSwapper.CurrentAxe != null)\n                {\n                    UpdateAxeReference(_skinSwapper.CurrentAxe);\n                }\n            }\n        }\n\n        private void OnDisable()\n        {\n            SlotEvent.OnAxeSwing -= PlayAxeSwing;\n            SlotEvent.OnSpinCompleted -= HideAxe;\n\n            if (_skinSwapper != null)\n            {\n                _skinSwapper.OnAxeSpawned -= UpdateAxeReference;\n            }\n        }\n        private void UpdateAxeReference(GameObject newAxe)\n        {\n            if (newAxe == null) return;\n\n            _axeModel = newAxe;\r\n\r\n            _axeSwingPlayer = _axeModel.GetComponentInChildren<MMF_Player>();\n\n            if (_axeSwingPlayer != null && _swingDestination != null)\n            {\n                var positionFeedback = _axeSwingPlayer.GetFeedbackOfType<MMF_Position>();\n                if (positionFeedback != null)\n                {\n                    positionFeedback.DestinationPositionTransform = _swingDestination;\n                }\n\n                var rotationFeedback = _axeSwingPlayer.GetFeedbackOfType<MMF_Rotation>();\r\n                if (rotationFeedback != null)\r\n                {\r\n                    rotationFeedback.ToDestinationTransform = _swingDestination;\r\n                }\r\n\r\n            }\n            _axeModel.SetActive(false);\n        }\n        private void PlayAxeSwing()\n        {\n            if (_axeModel != null)\n            {\n                _axeModel.SetActive(true);\n            }\n            \n            // Feel 연출 재생\n            _axeSwingPlayer?.PlayFeedbacks();\n        }\n\n        private void HideAxe()\n        {\n            // 연출 강제 종료 및 메쉬 숨기기\n            _axeSwingPlayer?.StopFeedbacks();\n            \n            if (_axeModel != null)\n            {\n                _axeModel.SetActive(false);\n            }\n\n            // 도끼의 위치/회전값을 치기 전 초기 상태\n            _axeSwingPlayer?.RestoreInitialValues(); \n        }\n    }\n}","lines":101},{"id":"Scripts/UI/WeaponSkinSwapper.cs","name":"WeaponSkinSwapper","path":"Scripts/UI/WeaponSkinSwapper.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"월드 도끼를 \"통째로\" 교체하는 구조 (무기 파트 요청안). 외형 정의는 데이터팀 WeaponDataSO._data._prefab 을 그대로 읽는다. (별도 카탈로그를 만들지 않는 이유: 한 스킨 정보를 두 그릇에 흩으면 id 이중관리 → 예전 노트의 id 불일치 함정을 자초함. 표준 자리 _prefab 하나만 쓴다.) 동작: 현재 도끼 오브젝트를 Destroy 하고, 그 스킨의 _prefab 을 새로 Instantiate. ","src":"﻿using System;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.DataSO;   // DataManagerSO, WeaponDataSO\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    // 월드 도끼를 \"통째로\" 교체하는 구조 (무기 파트 요청안).\r\n    //\r\n    // 외형 정의는 데이터팀 WeaponDataSO._data._prefab 을 그대로 읽는다.\r\n    //   (별도 카탈로그를 만들지 않는 이유: 한 스킨 정보를 두 그릇에 흩으면 id 이중관리 →\r\n    //    예전 노트의 id 불일치 함정을 자초함. 표준 자리 _prefab 하나만 쓴다.)\r\n    //\r\n    // 동작: 현재 도끼 오브젝트를 Destroy 하고, 그 스킨의 _prefab 을 새로 Instantiate.\r\n    //   => MMF Player·던지기 등 이전 오브젝트 참조는 끊긴다(의도된 것).\r\n    //      전제: 프리팹이 자기완결이거나, 무기 파트가 OnAxeSpawned 훅으로 재연결.\r\n    //\r\n    // 두는 곳: 바뀌지 않는 안정 부모(앵커)에 붙인다. 도끼는 그 자식으로 스폰된다.\r\n    [DisallowMultipleComponent]\r\n    public class WeaponSkinSwapper : MonoBehaviour\r\n    {\r\n        [Header(\"무기 목록 출처 (ShopController와 같은 것 드래그)\")]\r\n        [SerializeField] private DataManagerSO dataManager;\r\n\r\n        [Header(\"생성 위치 기준 (도끼가 들어갈 부모/앵커)\")]\r\n        [Tooltip(\"바뀌지 않는 안정 부모. 여기 자식으로 도끼가 스폰된다. 비워두면 초기 도끼의 부모를 자동 사용.\")]\r\n        [SerializeField] private Transform anchor;\r\n\r\n        [Header(\"씬에 이미 놓인 초기 도끼 (첫 교체 때 파괴 대상)\")]\r\n        [Tooltip(\"현재 씬에 배치된 Axe 오브젝트를 연결. 첫 스왑 때 이걸 지우고 새 프리팹을 생성한다.\")]\r\n        [SerializeField] private GameObject initialAxe;\r\n\r\n        // 무기 파트가 새로 생성된 도끼를 받아 참조를 다시 연결할 수 있는 훅.\r\n        public event Action<GameObject> OnAxeSpawned;\r\n        public GameObject CurrentAxe { get; private set; }\r\n\r\n        private void Awake()\r\n        {\r\n            CurrentAxe = initialAxe;\r\n            if (anchor == null && initialAxe != null)\r\n                anchor = initialAxe.transform.parent; // 기본값: 초기 도끼의 부모를 앵커로\r\n\r\n            StartCoroutine(WaitForUserDataAndApply());\r\n        }\r\n\r\n        private void OnEnable() { WeaponEquipEvent.OnWeaponEquipped += Apply; }\r\n        private void OnDisable() { WeaponEquipEvent.OnWeaponEquipped -= Apply; }\r\n\r\n        private void Start()\r\n        {\r\n            // 씬 진입 시 저장된 장착 스킨 즉시 반영(재접속해도 유지).\r\n            string equipped = GetEquippedWeaponId();\r\n            if (!string.IsNullOrEmpty(equipped))\r\n                Apply(equipped);\r\n        }\r\n        private System.Collections.IEnumerator WaitForUserDataAndApply()\r\n        {\r\n            // Firebase UserManager와 CurrentUserData가 완전히 초기화될 때까지 안전하게 대기\r\n            yield return new WaitUntil(() =>\r\n                Wooduduk.Network.Firebase.UserManager.Instance != null &&\r\n                Wooduduk.Network.Firebase.UserManager.Instance.CurrentUserData != null\r\n            );\r\n\r\n            string equipped = GetEquippedWeaponId();\r\n            if (!string.IsNullOrEmpty(equipped))\r\n            {\r\n                Apply(equipped);\r\n            }\r\n        }\r\n        // 스킨 하나를 실제 오브젝트로 교체. (상점 이벤트 / 시작 반영 둘 다 여기로 수렴)\r\n        public void Apply(string skinId)\r\n        {\r\n            GameObject prefab = FindPrefab(skinId);\r\n            if (prefab == null)\r\n            {\r\n                // 프리팹을 못 찾으면 현재 도끼 유지(빈손보다 안전).\r\n                Debug.LogWarning($\"[WeaponSkin] 프리팹 없음: '{skinId}' — 현재 도끼 유지\");\r\n                return;\r\n            }\r\n\r\n            // 현재 도끼의 부모/위치/회전/스케일을 승계 → 교체해도 배치가 유지됨.\r\n            Transform parent = anchor;\r\n            Vector3 pos = Vector3.zero;\r\n            Quaternion rot = Quaternion.identity;\r\n            Vector3 scale = Vector3.one;\r\n\r\n            if (CurrentAxe != null)\r\n            {\r\n                Transform t = CurrentAxe.transform;\r\n                if (parent == null) parent = t.parent;\r\n                pos = t.localPosition;\r\n                rot = t.localRotation;\r\n                scale = t.localScale;\r\n                Destroy(CurrentAxe);\r\n            }\r\n\r\n            GameObject spawned = (parent != null)\r\n                ? Instantiate(prefab, parent)\r\n                : Instantiate(prefab);\r\n\r\n            spawned.transform.localPosition = pos;\r\n            spawned.transform.localRotation = rot;\r\n            spawned.transform.localScale = scale;\r\n\r\n            CurrentAxe = spawned;\r\n\r\n            // 무기 파트가 여기서 새 도끼 참조를 받아 MMF/던지기를 다시 연결.\r\n            OnAxeSpawned?.Invoke(spawned);\r\n        }\r\n\r\n        // DataManagerSO._weaponDataList 에서 id가 일치하는 무기의 _prefab 을 찾는다.\r\n        private GameObject FindPrefab(string skinId)\r\n        {\r\n            if (string.IsNullOrEmpty(skinId)) return null;\r\n            if (dataManager == null) { Debug.LogWarning(\"[WeaponSkin] dataManager 미할당\"); return null; }\r\n            if (dataManager._weaponDataList == null) return null;\r\n\r\n            foreach (var so in dataManager._weaponDataList)\r\n            {\r\n                if (so == null || so._data == null) continue;\r\n                if (so._data._id == skinId)\r\n                    return so._data._prefab;\r\n            }\r\n            return null;\r\n        }\r\n\r\n        // 씬 진입 시 저장된 장착 무기 id를 UserData에서 읽는다.\r\n        // UserData._equippedWeaponId 는 public 이라 그대로 접근 가능.\r\n        private string GetEquippedWeaponId()\r\n        {\r\n            var user = Wooduduk.Network.Firebase.UserManager.Instance?.CurrentUserData;\r\n            return user?._equippedWeaponId;\r\n        }\r\n    }\r\n}","lines":134},{"id":"Scripts/Slot/Slotmachine/SettleInteractable.cs","name":"SettleInteractable","path":"Scripts/Slot/Slotmachine/SettleInteractable.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"정산 큐브 상호작용 미정산 -> 정산 확정","src":"using UnityEngine;\r\nusing Wooduduk.Core;\r\nusing Wooduduk.Slot.Machine;\r\n\r\nnamespace Wooduduk.Slot.Slotmachine\r\n{\r\n    // 정산 큐브 상호작용\r\n    // 미정산 -> 정산 확정\r\n    public class SettleInteractable : MonoBehaviour, IInteractable\r\n    {\r\n        [SerializeField] private SlotmachineController _controller;\r\n        [SerializeField] private string _prompt = \"정산하기\";\r\n\r\n        public string Prompt => _prompt;\r\n\r\n        // 회전 중 차단 + 미정산 장작이 있을 때만 허용.\r\n        // 이유 : Settle()은 미정산이 0이어도 SettleCount를 올려 비용·체온 드레인을 가속시킴(헛정산 방지).\r\n        public bool CanInteract =>\r\n            _controller != null && !_controller.IsSpinning\r\n            && _controller.Run != null && _controller.Run.UnsettledWood > 0;\r\n\r\n        private void Awake()\r\n        {\r\n            if (_controller == null)\r\n                Debug.LogError(\"_controller 미연결\");\r\n        }\r\n\r\n        public void Interact(IInteractor source)\r\n        {\r\n            if (!CanInteract) return;\r\n            _controller.Settle(); // 미정산 -> BankedWood 확정 + SettleCount++ -> OnSettled 발행\r\n        }\r\n    }\r\n}","lines":34},{"id":"Scripts/Slot/Animation/SlotResultUIObejct.cs","name":"SlotResultUIObejct","path":"Scripts/Slot/Animation/SlotResultUIObejct.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"(요약 없음)","src":"﻿using MoreMountains.Feedbacks;\nusing System.Collections;\nusing System.Collections.Generic;\nusing TMPro;\nusing UnityEngine;\nusing Wooduduk.Slot;\nusing Wooduduk.Slot.Machine;\n\nnamespace Wooduduk.Slot.Slotmachine\n{\n    public class SlotResultUIObejct : MonoBehaviour\n    {\n        [Header(\"3D Objects References\")]\n        [SerializeField] private GameObject _symbolPopupGroup;     \n        [SerializeField] private MeshRenderer _symbolRenderer;     \n        [SerializeField] private TextMeshPro _symbolText;          \n        [SerializeField] private TextMeshPro _finalWoodText;\r\n\r\n        [SerializeField] private MMF_Player _hoverFeedback;\n\n        [Header(\"Symbol Materials (0~7 Enum 순서 맞춤)\")]\n        [SerializeField] private Material[] _symbolMaterials;      \n\n        // 데이터 캐싱용\n        private SpinOutcome _cachedOutcome;\n        private Dictionary<SymbolId, int> _currentReelCounts = new Dictionary<SymbolId, int>();\n        private Coroutine _finalResultCoroutine;\n\n        private void OnEnable()\n        {\n            SlotEvent.OnSpinStarted += HandleSpinStarted;\n            SlotEvent.OnSpinJudged += HandleSpinJudged;\n            SlotEvent.OnReelStopped += HandleReelStopped;\n            SlotEvent.OnSpinCompleted += HandleSpinCompleted;\n            SlotEvent.OnRunReset += HandleReset;\n        }\n\n        private void OnDisable()\n        {\n            SlotEvent.OnSpinStarted -= HandleSpinStarted;\n            SlotEvent.OnSpinJudged -= HandleSpinJudged;\n            SlotEvent.OnReelStopped -= HandleReelStopped;\n            SlotEvent.OnSpinCompleted -= HandleSpinCompleted;\r\n            SlotEvent.OnRunReset -= HandleReset;\n\n        }\n\n        private void Start()\n        {\n            _symbolPopupGroup.SetActive(false);\n            _finalWoodText.gameObject.SetActive(false);\n        }\n\n        private void HandleReset(RunProgress run)\r\n        {\r\n            ResetFeedback();\r\n            StopFinalResultCoroutine();\r\n            _symbolPopupGroup.SetActive(false);\n            _finalWoodText.gameObject.SetActive(false);\r\n        }\n        private void HandleSpinStarted()\n        {\r\n            ResetFeedback();\n            StopFinalResultCoroutine();\n            _currentReelCounts.Clear();\n            _symbolPopupGroup.SetActive(false);\n            _finalWoodText.gameObject.SetActive(false);\n        }\n\n        private void HandleSpinJudged(SpinOutcome outcome)\n        {\n            _cachedOutcome = outcome;\n        }\n\n        private void HandleReelStopped(int reelIndex)\n        {\n            if (_cachedOutcome.Result == null) return;\n\n            SymbolId stoppedSymbol = _cachedOutcome.Result.Reels[reelIndex];\n\n            if (!_currentReelCounts.ContainsKey(stoppedSymbol))\n            {\n                _currentReelCounts[stoppedSymbol] = 0;\n            }\n            _currentReelCounts[stoppedSymbol]++;\n\n            // 각 릴이 멈출 때마다 누적 카운트 표기\n            ShowSymbolPopup(stoppedSymbol, _currentReelCounts[stoppedSymbol]);\n\n        }\n\n        private void HandleSpinCompleted()\n        {\n            long gainedWood = _cachedOutcome.Applied.WoodStack;\n\n            if (gainedWood > 0)\n            {\n                _finalWoodText.text = $\"미정산 장작 \\n획득! + {gainedWood}\";\n                _finalWoodText.gameObject.SetActive(true);\n            }\n\n            // 스핀 종료 후 1초 뒤에 최종 결과 표기 로직 실행\n            _finalResultCoroutine = StartCoroutine(ShowFinalResultRoutine());\r\n\n        }\n\n        IEnumerator ShowFinalResultRoutine()\n        {\n            // 1f 대기\n            yield return new WaitForSeconds(1f);\n\n            SymbolId finalSymbol = SymbolId.SWING; // 기본값\n            int maxCount = 0;\n            bool isWormPenalty = false;\n\n            // 좀벌레 특수 실패 조건 최우선\n            if (_currentReelCounts.TryGetValue(SymbolId.WORM, out int wormCount) && wormCount >= 2)\n            {\n                finalSymbol = SymbolId.WORM;\n                isWormPenalty = true;\n            }\n\n            // 가장 많이 나온 심볼 찾기\n            if (!isWormPenalty)\n            {\n                foreach (var kvp in _currentReelCounts)\n                {\n                    if (kvp.Value > maxCount)\n                    {\n                        maxCount = kvp.Value;\n                        finalSymbol = kvp.Key;\n                    }\n                }\n            }\n\n            // 최종 선정된 심볼과 그 카운트를 팝업에 표시\n            if (_currentReelCounts.TryGetValue(finalSymbol, out int finalCount))\n            {\n                ShowSymbolPopup(finalSymbol, finalCount);\n            }\r\n\r\n\r\n            if (_hoverFeedback != null && !_hoverFeedback.IsPlaying)\n            {\n                _hoverFeedback.PlayFeedbacks();\n            }\n        }\n\n        private void StopFinalResultCoroutine()\n        {\n            if (_finalResultCoroutine != null)\n            {\n                StopCoroutine(_finalResultCoroutine);\n                _finalResultCoroutine = null;\n            }\n        }\n\n        private void ResetFeedback()\n        {\n            if (_hoverFeedback != null)\n            {\n                _hoverFeedback.StopFeedbacks();\n                _hoverFeedback.RestoreInitialValues();\n            }\n        }\n        private void ShowSymbolPopup(SymbolId symbol, int count)\n        {\n            _symbolPopupGroup.SetActive(true);\n\n            int symbolIndex = (int)symbol;\n            if (symbolIndex >= 0 && symbolIndex < _symbolMaterials.Length)\n            {\n                // 인스턴싱으로 인한 메모리 릭 방지를 위해 sharedMaterial 사용\n                _symbolRenderer.sharedMaterial = _symbolMaterials[symbolIndex];\n            }\n\n            string symbolName = GetSymbolNameKOR(symbol);\r\n            _symbolText.text = $\"{symbolName} \\nx {count}\";\n\n\n        }\n\n        private string GetSymbolNameKOR(SymbolId id)\n        {\n            switch (id)\n            {\n                case SymbolId.SWING: return \"스윙\";\n                case SymbolId.PERFECT: return \"퍼펙트\";\n                case SymbolId.ACORN: return \"도토리\";\n                case SymbolId.LUCK: return \"네잎클로버\";\n                case SymbolId.FRIEBAT: return \"불빠따\";\n                case SymbolId.KNOT: return \"옹이\";\n                case SymbolId.WORM: return \"좀벌레\";\n                case SymbolId.MAKGEOLLI: return \"막걸리\";\n                default: return id.ToString();\n            }\n        }\n    }\n}","lines":199},{"id":"Scripts/Slot/Slotmachine/CardController.cs","name":"CardController","path":"Scripts/Slot/Slotmachine/CardController.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"카드 컨트롤러 CardEvent 구독해 로직(구매) 실행 + 비주얼 연결점. 흐름: CardInteractable.RaiseCardSelected → 여기서 BuyCardById(로직) → RaiseCardBought(UI/VFX용).","src":"using UnityEngine;\nusing Wooduduk.Slot.Machine;\n\nnamespace Wooduduk.Slot.Slotmachine\n{\n    // 카드 컨트롤러 — CardEvent 구독해 로직(구매) 실행 + 비주얼 연결점.\n    // 흐름: CardInteractable.RaiseCardSelected → 여기서 BuyCardById(로직) → RaiseCardBought(UI/VFX용).\n    public class CardController : MonoBehaviour\n    {\n        [SerializeField] private SlotmachineController _controller;\n\n        // CardEvent.OnCardSelected는 static → 활성 구독자 수 추적(구매 가드).\n        // 슬롯머신당 1개 가정. 2개 이상이면 카드 1회 선택에 중복 구매(장작 N배 차감) 발생.\n        private static int _activeCount;\n\n        private void Awake()\n        {\n            if (_controller == null) _controller = GetComponentInParent<SlotmachineController>();\n        }\n\n        private void OnEnable()\n        {\n            _activeCount++;\n            if (_activeCount > 1)\n                Debug.LogError($\"[CardController] 씬에 CardController {_activeCount}개 활성 — 카드 1회 선택에 중복 구매! 슬롯머신당 1개만 두세요.\");\n            CardEvent.OnCardSelected += HandleCardSelected;\n        }\n\n        private void OnDisable()\n        {\n            _activeCount--;\n            CardEvent.OnCardSelected -= HandleCardSelected;\n        }\n\n        // 카드 선택 수신 → 구매 로직 실행 → 결과 이벤트 발행(UI/VFX 분기).\n        private void HandleCardSelected(string cardId)\n        {\n            if (_controller == null) { Debug.LogError(\"[CardController] _controller 미연결 — 구매 불가\"); return; }\n            bool ok = _controller.BuyCardById(cardId);\n            Debug.Log($\"[CardController] BuyCard cardId={cardId} → bought={ok}\");\n            CardEvent.RaiseCardBought(cardId, ok);\n            // TODO(비주얼): 카드 구매 연출 — 이찬영 UI / 박건호 VFX 가 CardEvent.OnCardBought 구독해 처리.\n        }\n    }\n}\n","lines":46},{"id":"Scripts/Slot/Slotmachine/SlotMachineReel.cs","name":"SlotMachineReel","path":"Scripts/Slot/Slotmachine/SlotMachineReel.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"애니메이션 컨트롤러가 릴을 정지시킬 때 호출하는 함수","src":"﻿using UnityEngine;\n\nnamespace Wooduduk.Slot.Machine\n{\n    public class SlotMachineReel : MonoBehaviour\n    {\n        [Header(\"Reel Renderers (This Reel Only)\")]\n        [SerializeField] private MeshRenderer _resultRenderer;\n        [SerializeField] private MeshRenderer _dummyRenderer1;\n        [SerializeField] private MeshRenderer _dummyRenderer2;\n\n        private static readonly int EmissionColorId = Shader.PropertyToID(\"_EmissionColor\");\n        private MaterialPropertyBlock _propBlock;\n\n        /// <summary>\n        /// 애니메이션 컨트롤러가 릴을 정지시킬 때 호출하는 함수\n        /// </summary>\n        public void ChangeSymbol(SymbolId resultSymbol, SlotSymbolManager manager)\n        {\n            if (manager == null || manager.MaterialCount == 0) return;\n\n            int resultIndex = (int)resultSymbol;\n            int count = manager.MaterialCount;\n\n            // 순환 구조로 더미 인덱스 계산\n            int dummy1Index = (resultIndex + 1) % count;\n            int dummy2Index = (resultIndex + 2) % count;\n\n            // 머티리얼 적용 (.sharedMaterial로 메모리 릭 방지)\n            if (_resultRenderer != null)\n                _resultRenderer.sharedMaterial = manager.GetMaterial(resultIndex);\n                \n            if (_dummyRenderer1 != null)\n                _dummyRenderer1.sharedMaterial = manager.GetMaterial(dummy1Index);\n                \n            if (_dummyRenderer2 != null)\n                _dummyRenderer2.sharedMaterial = manager.GetMaterial(dummy2Index);\n        }\n\n        /// <summary>\n        /// 심볼의 Emission을 제어합니다. 연출용 더미는 항상 발광을 차단합니다.\n        /// </summary>\n        public void SetSymbolGlow(bool isHighlighted, Color glowColor, float intensity = 2.0f)\n        {\n            if (_propBlock == null) _propBlock = new MaterialPropertyBlock();\n\n            // 연출용 더미는 무조건 발광 Off (검은색)\n            if (_dummyRenderer1 != null)\n            {\n                _dummyRenderer1.GetPropertyBlock(_propBlock);\n                _propBlock.SetColor(EmissionColorId, Color.black);\n                _dummyRenderer1.SetPropertyBlock(_propBlock);\n            }\n            if (_dummyRenderer2 != null)\n            {\n                _dummyRenderer2.GetPropertyBlock(_propBlock);\n                _propBlock.SetColor(EmissionColorId, Color.black);\n                _dummyRenderer2.SetPropertyBlock(_propBlock);\n            }\n\n            // 결과 렌더러에만 판정 발광 적용\n            if (_resultRenderer != null)\n            {\n                _resultRenderer.GetPropertyBlock(_propBlock);\n                _propBlock.SetColor(EmissionColorId, isHighlighted ? glowColor * intensity : Color.black);\n                _resultRenderer.SetPropertyBlock(_propBlock);\n            }\n        }\n    }\n}","lines":70},{"id":"Scripts/Slot/CardPriceBinder.cs","name":"CardPriceBinder","path":"Scripts/Slot/CardPriceBinder.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"카드 가격 표시 바인더","src":"using TMPro;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 카드 가격 표시 바인더\r\n    public class CardPriceBinder : MonoBehaviour\r\n    {\r\n        [SerializeField] private TextMeshPro _priceText;   // 카드 가격 라벨\r\n        private int _lastPrice = -1;\r\n\r\n        void OnEnable() => CardEvent.OnCardPriceChanged += OnPriceChanged;\r\n        void OnDisable() => CardEvent.OnCardPriceChanged -= OnPriceChanged;\r\n\r\n        // 값이 바뀐 경우에만 재작성(GC 최소화)\r\n        private void OnPriceChanged(int price)\r\n        {\r\n            if (_priceText == null || price == _lastPrice) return;\r\n            _lastPrice = price;\r\n            _priceText.text = $\"현재 가격 : {price}\";   // 카드는 banked 장작으로 결제\r\n        }\r\n    }\r\n}\r\n","lines":24},{"id":"Scripts/Slot/Slotmachine/CardInteractable.cs","name":"CardInteractable","path":"Scripts/Slot/Slotmachine/CardInteractable.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"카드 상호작용 조준+상호작용 시 CardEvent.RaiseCardSelected 발행. 구매 로직은 CardController가 CardEvent 구독해 처리 (이벤트 완전 전환).","src":"using UnityEngine;\nusing Wooduduk.Core;\nusing Wooduduk.Slot.Machine;\n\nnamespace Wooduduk.Slot.Slotmachine\n{\n    // 카드 상호작용 — 조준+상호작용 시 CardEvent.RaiseCardSelected 발행.\n    // 구매 로직은 CardController가 CardEvent 구독해 처리 (이벤트 완전 전환).\n    public class CardInteractable : MonoBehaviour, IInteractable\n    {\n        [SerializeField] private SlotmachineController _controller;\n        [SerializeField] private string _cardId;            // \"C001\"~\"C008\"\n        [SerializeField] private string _prompt = \"구매\";\n\n        public string Prompt => _prompt;\n\n        // 결정 B1: 회전 중만 차단(못 사면 BuyCard가 false 반환)\n        public bool CanInteract => _controller != null && !_controller.IsSpinning;\n\n        private void Awake()\n        {\n            // SlotInteractable과 동일 폴백\n            if (_controller == null)\n                _controller = GetComponentInParent<SlotmachineController>();\n        }\n\n        public void Interact(IInteractor source)\n        {\n            if (!CanInteract) { Debug.Log($\"[CardInteractable] CanInteract=false → 차단 cardId={_cardId}\"); return; }\n            // 완전 이벤트 전환: 직접 BuyCard 대신 CardEvent 발행 → CardController가 구매 처리.\n            CardEvent.RaiseCardSelected(_cardId);\n            Debug.Log($\"[CardInteractable] RaiseCardSelected cardId={_cardId}\");\n        }\n    }\n}\n","lines":36},{"id":"Scripts/Slot/Slotmachine/CardHoverFeedback.cs","name":"CardHoverFeedback","path":"Scripts/Slot/Slotmachine/CardHoverFeedback.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"레이캐스트가 카드에 향하면(호버) 클릭 전에 FEEL로 카메라 쪽으로 스케일업, 벗어나면 원복.","src":"﻿using UnityEngine;\r\nusing MoreMountains.Feedbacks;   // MMF_Player (FEEL)\r\nusing Wooduduk.Core;             // IHighlightable\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 레이캐스트가 카드에 향하면(호버) 클릭 전에 FEEL로 카메라 쪽으로 스케일업, 벗어나면 원복.\r\n    public class CardHoverFeedback : MonoBehaviour, IHighlightable\r\n    {\r\n        [SerializeField] private Transform _target;          // 커질 대상(비우면 자기 자신)\r\n        [SerializeField] private float _hoverScale = 1.3f;   // 호버 시 배율\r\n        [SerializeField] private float _speed = 12f;         // 접근 속도(클수록 빠름, 부드러움 유지)\r\n        [Tooltip(\"함께 켤 다른 IHighlightable \")]\r\n        [SerializeField] private MonoBehaviour[] _alsoHighlight;\r\n\r\n        private bool _on;\r\n        private Transform _t;\r\n        private Vector3 _baseScale;\r\n\r\n        private void Awake()\r\n        {\r\n            _t = _target != null ? _target : transform;\r\n            _baseScale = _t.localScale;\r\n        }\r\n        private void Update()\r\n        {\r\n            if (_t == null) return;\r\n            Vector3 goal = _on ? _baseScale * _hoverScale : _baseScale;\r\n            float k = 1f - Mathf.Exp(-_speed * Time.deltaTime);\r\n            _t.localScale = Vector3.Lerp(_t.localScale, goal, k);\r\n        }\r\n        public void SetHighlight(bool on)\r\n        {\r\n            if (on == _on) return;                 // 상태 바뀔 때만(아웃라인 중복 호출 방지)\r\n            CardEvent.RaiseCardHover(on);\r\n            _on = on;                              // 스케일은 Update가 목표로 부드럽게 이동\r\n\r\n            if (_alsoHighlight != null)\r\n                for (int i = 0; i < _alsoHighlight.Length; i++)\r\n                    if (_alsoHighlight[i] is IHighlightable h && !ReferenceEquals(h, this))\r\n                        h.SetHighlight(on);\r\n        }\r\n    }\r\n}","lines":44},{"id":"Scripts/Player/CursorController.cs","name":"CursorController","path":"Scripts/Player/CursorController.cs","layer":"Player","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"게임 모드 : 커서 잠금, 숨김 / 메뉴 패널은 포인터 무시 UI 모드 : 커서 잠금 해제, 표시 / 패널 포인터 입력 수신","src":"using System.Collections.Generic;\r\nusing UnityEngine;\r\nusing UnityEngine.UIElements;\r\n\r\nnamespace Wooduduk.Player\r\n{\r\n    // 게임 모드 : 커서 잠금, 숨김 / 메뉴 패널은 포인터 무시\r\n    // UI 모드 : 커서 잠금 해제, 표시 / 패널 포인터 입력 수신\r\n    public class CursorController : MonoBehaviour\r\n    {\r\n        [SerializeField] private List<UIDocument> _interactiveUis = new List<UIDocument>();\r\n        bool _uiMode;\r\n        public bool IsUIMode => _uiMode;\r\n\r\n        private void Start() => SetUiMode(true);\r\n\r\n        public void SetUiMode(bool on)\r\n        {\r\n            if (_uiMode == on) return;\r\n            _uiMode = on;\r\n            UnityEngine.Cursor.lockState = on ? CursorLockMode.None : CursorLockMode.Locked;\r\n            UnityEngine.Cursor.visible = on;\r\n\r\n            var mode = on ? PickingMode.Position : PickingMode.Ignore;\r\n            for (int i = 0; i < _interactiveUis.Count; i++)\r\n            {\r\n                var doc = _interactiveUis[i];\r\n                if (doc != null && doc.rootVisualElement != null)\r\n                    doc.rootVisualElement.pickingMode = mode;   // 등록된 모든 UI를 함께 토글\r\n            }\r\n\r\n        }\r\n        public void Toggle() => SetUiMode(!_uiMode);\r\n        public void Register(UIDocument doc)\r\n        {\r\n            if (doc == null || _interactiveUis.Contains(doc)) return;\r\n            _interactiveUis.Add(doc);\r\n            if (doc.rootVisualElement != null)\r\n                doc.rootVisualElement.pickingMode = _uiMode ? PickingMode.Position : PickingMode.Ignore;\r\n        }\r\n    }\r\n}","lines":42},{"id":"Scripts/Player/InputController.cs","name":"InputController","path":"Scripts/Player/InputController.cs","layer":"Player","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"마우스 + 터치 동시 지원","src":"﻿using System;\r\nusing System.Collections.Generic;\r\nusing System.Text;\r\nusing UnityEngine;\r\nusing UnityEngine.EventSystems;\r\nusing UnityEngine.InputSystem;\r\n\r\nnamespace Wooduduk.Player\r\n{\r\n    // 마우스 + 터치 동시 지원\r\n    public class InputController : MonoBehaviour, IMoveCommandInput\r\n    {\r\n        public event Action<Vector2> MoveCommand;\r\n        [SerializeField] private PlayerInput _playerInput;\r\n        [SerializeField] private CursorController _cursor;\r\n        [SerializeField] private PlayerInteractor _interactor;\r\n\r\n        private Vector2 _pointerScreen;\r\n\r\n        private void Awake()\r\n        {\r\n            if (_playerInput == null) _playerInput = GetComponent<PlayerInput>();\r\n            if (_cursor == null) _cursor = GetComponent<CursorController>();\r\n            if (_interactor == null) _interactor = GetComponent<PlayerInteractor>();\r\n        }\r\n        public void Enable() => _playerInput?.ActivateInput();\r\n        public void Disable() => _playerInput?.DeactivateInput();\r\n        public void OnPoint(InputValue value) => _pointerScreen = value.Get<Vector2>();\r\n        public void OnPress(InputValue value)\r\n        {\r\n            if (!value.isPressed) return;\r\n            if (_cursor != null && _cursor.IsUIMode) return;\r\n            _interactor?.TryInteract();\r\n            \r\n        }\r\n        public void OnToggleUI(InputValue value)\r\n        {\r\n            if (!value.isPressed) return;\r\n            _cursor?.Toggle();\r\n        }\r\n    }\r\n}\r\n","lines":43},{"id":"Scripts/Player/PlayerInteractor.cs","name":"PlayerInteractor","path":"Scripts/Player/PlayerInteractor.cs","layer":"Player","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"Range 안 + 상호작용 가능 + 아직 상호작용 안 함 -> 켜기 / 아니면 끄기","src":"using UnityEngine;\r\nusing Wooduduk.Core;\r\nnamespace Wooduduk.Player\r\n{\r\n    public class PlayerInteractor : MonoBehaviour, IInteractor\r\n    {\r\n        [SerializeField] Camera _cam;\r\n        [SerializeField] float _range = 3;\r\n        [SerializeField] LayerMask _mask = ~0;\r\n        [SerializeField] private CursorController _cursor;\r\n        [SerializeField] float _sphereRadius = 0.15f;\r\n        [SerializeField] bool _drawGizmo = true;\r\n\r\n        private IHighlightable _highlight;\r\n        private bool _interacted;\r\n        private Vector3 _gizmoEnd;\r\n        private bool _gizmoHit;\r\n\r\n        private IInteractable _debug;\r\n        public GameObject Owner => gameObject;\r\n        public IInteractable Current {  get; private set; } // HUD\r\n        private void Awake()\r\n        {\r\n            if (_cam == null) _cam = Camera.main;\r\n            if (_cursor == null) _cursor = GetComponent<CursorController>();\r\n        }\r\n        void Update()\r\n        {\r\n            if (_cursor != null && _cursor.IsUIMode)\r\n            {\r\n                if (Current != null) \r\n                { \r\n                    _highlight?.SetHighlight(false); Current = null; _highlight = null; _interacted = false; \r\n                }\r\n                return;\r\n            }\r\n            \r\n            var ray = _cam.ViewportPointToRay(new Vector3(0.5f, 0.5f, 0f));\r\n            bool hitOK = Physics.SphereCast(ray, _sphereRadius, out var hit, _range, _mask);\r\n            _gizmoHit = hitOK;\r\n            _gizmoEnd = hitOK ? hit.point : ray.origin + ray.direction * _range;\r\n            var next = hitOK ? hit.collider.GetComponentInParent<IInteractable>() : null;\r\n\r\n            if (next != Current)   // 조준 대상이 바뀐 순간\r\n            {\r\n                _highlight?.SetHighlight(false);                                  // 이전 대상 끄기\r\n                Current = next;\r\n                _highlight = hitOK ? hit.collider.GetComponentInParent<IHighlightable>() : null;\r\n                _interacted = false;                                             // 새 대상 -> 상호작용 플래그 리셋\r\n            }\r\n\r\n            // Range 안 + 상호작용 가능 + 아직 상호작용 안 함 -> 켜기 / 아니면 끄기\r\n            bool show = Current != null && !_interacted;\r\n            _highlight?.SetHighlight(show);\r\n        }\r\n        public void TryInteract()\r\n        {\r\n            if (Current != null && Current.CanInteract)\r\n            {\r\n                Current.Interact(this);\r\n                _interacted = true;                 // 성공 -> 하이라이트 off, 대상 바뀔 때까지 유지\r\n                _highlight?.SetHighlight(false);\r\n            }\r\n        }\r\n        private void OnDrawGizmos()\r\n        {\r\n            if (!_drawGizmo) return;\r\n            Camera cam = _cam != null ? _cam : Camera.main;\r\n            if (cam == null) return;\r\n\r\n            Ray ray = cam.ViewportPointToRay(new Vector3(0.5f, 0.5f, 0f));\r\n            Vector3 end = ray.origin + ray.direction * _range;\r\n\r\n            Gizmos.color = Color.yellow;                          // 캐스트 경로 + 두께\r\n            Gizmos.DrawLine(ray.origin, end);\r\n            Gizmos.DrawWireSphere(ray.origin, _sphereRadius);\r\n            Gizmos.DrawWireSphere(end, _sphereRadius);\r\n\r\n            if (Application.isPlaying && _gizmoHit)                 // 실제 히트 지점(플레이 중)\r\n            {\r\n                Gizmos.color = Color.green;\r\n                Gizmos.DrawWireSphere(_gizmoEnd, _sphereRadius);\r\n            }\r\n        }\r\n\r\n    }\r\n}","lines":87},{"id":"Scripts/Player/PlayerCamera.cs","name":"PlayerCamera","path":"Scripts/Player/PlayerCamera.cs","layer":"Player","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"(요약 없음)","src":"﻿using UnityEngine;\r\nusing UnityEngine.InputSystem;\r\n\r\nnamespace Wooduduk.Player\r\n{\r\n    public class CameraLookController : MonoBehaviour\r\n    {\r\n        [SerializeField] private CursorController _cursor;\r\n        [SerializeField] private Transform _pivot;          // 회전시킬 피벗 (Cinemachine 카메라 X)\r\n        [SerializeField] private float _sensitivity = 0.2f; // 감도\r\n        [SerializeField] private float _minPitch = -30f;    // 위/아래 각 제한\r\n        [SerializeField] private float _maxPitch = 60f;\r\n\r\n        private float _yaw;\r\n        private float _pitch;\r\n        private void Awake()\r\n        {\r\n            if (_cursor == null) _cursor = GetComponentInParent<CursorController>();\r\n            if (_pivot == null)\r\n            {\r\n                enabled = false;\r\n                return;\r\n            }\r\n            Vector3 e = _pivot.localEulerAngles;\r\n            _yaw = e.y;\r\n            _pitch = e.x;\r\n        }\r\n\r\n        private void Update()\r\n        {\r\n            if (_cursor != null && _cursor.IsUIMode) return;\r\n            var mouse = Mouse.current;\r\n            if (mouse == null) return;\r\n\r\n            Vector2 delta = mouse.delta.ReadValue() * _sensitivity;\r\n            _yaw += delta.x;\r\n            _pitch = Mathf.Clamp(_pitch - delta.y, _minPitch, _maxPitch);\r\n\r\n            if (_pivot != null)\r\n                _pivot.localRotation = Quaternion.Euler(_pitch, _yaw, 0f);\r\n        }\r\n    }\r\n}","lines":43},{"id":"Scripts/Network/Firebase/Matchmaking/MatchmakingDebugger.cs","name":"MatchmakingDebugger","path":"Scripts/Network/Firebase/Matchmaking/MatchmakingDebugger.cs","layer":"Network","scenes":["Dev","Multi"],"entry":true,"summary":"(요약 없음)","src":"﻿using UnityEngine;\r\nusing Wooduduk.Network;\r\n\r\nnamespace Wooduduk.Network.Firebase.Matchmaking\r\n{\r\n    public class MatchmakingDebugger : MonoBehaviour\r\n    {\r\n        [SerializeField] private MatchmakingFlow _matchmakingFlow;\r\n        [SerializeField] private GameController _gameController;\r\n\r\n        [Header(\"디버그 GUI 설정\")]\r\n        [SerializeField] private bool _showDebugGUI = true;\r\n        [SerializeField] private KeyCode _toggleKey = KeyCode.F1;\r\n\r\n        [Header(\"GUI 위치/크기 설정\")]\r\n        [SerializeField] private float _panelWidth = 380f;\r\n        [SerializeField] private float _panelHeight = 500f;\r\n        [SerializeField] private float _marginX = 10f;\r\n        [SerializeField] private float _marginY = 10f;\r\n\r\n        [Header(\"로그 설정\")]\r\n        [SerializeField] private float _logHeight = 120f;\r\n        [SerializeField] private int _maxVisibleLogs = 20;\r\n        [SerializeField] private bool _autoScrollLog = true;\r\n\r\n        private Vector2 _logScroll;\r\n        private int _lastLogCount;\r\n        private float _countdownRemaining;\r\n        private bool _isLoading;\r\n        private float _loadingRemaining;\r\n\r\n        private void Awake()\r\n        {\r\n            if (_matchmakingFlow == null)\r\n                _matchmakingFlow = FindAnyObjectByType<MatchmakingFlow>();\r\n            if (_gameController == null)\r\n                _gameController = FindAnyObjectByType<GameController>();\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            if (_matchmakingFlow == null) return;\r\n            _matchmakingFlow.OnCountdownTick += t => _countdownRemaining = t;\r\n            _matchmakingFlow.OnLoadingStarted += d => { _isLoading = true; _loadingRemaining = d; };\r\n            _matchmakingFlow.OnLoadingFinished += () => { _isLoading = false; _loadingRemaining = 0f; };\r\n        }\r\n\r\n        private void OnDisable()\r\n        {\r\n            if (_matchmakingFlow == null) return;\r\n            _matchmakingFlow.OnCountdownTick -= t => _countdownRemaining = t;\r\n            _matchmakingFlow.OnLoadingStarted -= d => { _isLoading = true; _loadingRemaining = d; };\r\n            _matchmakingFlow.OnLoadingFinished -= () => { _isLoading = false; _loadingRemaining = 0f; };\r\n        }\r\n\r\n        private void Update()\r\n        {\r\n            if (Input.GetKeyDown(_toggleKey))\r\n                _showDebugGUI = !_showDebugGUI;\r\n\r\n            if (_isLoading)\r\n                _loadingRemaining = Mathf.Max(0f, _loadingRemaining - Time.deltaTime);\r\n        }\r\n\r\n        private void OnGUI()\r\n        {\r\n            if (!_showDebugGUI) return;\r\n\r\n            float panelHeight = Mathf.Min(_panelHeight, Screen.height - _marginY * 2f);\r\n            float posX = _marginX;\r\n            float posY = Screen.height - panelHeight - _marginY;\r\n            if (posY < _marginY) posY = _marginY;\r\n\r\n            GUILayout.BeginArea(new Rect(posX, posY, _panelWidth, panelHeight), GUI.skin.box);\r\n\r\n            DrawHeader();\r\n            GUILayout.Space(6);\r\n\r\n            DrawMatchStatus();\r\n            GUILayout.Space(8);\r\n\r\n            if (_gameController != null && _gameController.IsGameActive)\r\n            {\r\n                DrawPlaySection();\r\n                GUILayout.Space(8);\r\n            }\r\n\r\n            DrawFooterActions();\r\n            GUILayout.Space(8);\r\n\r\n            DrawLogs();\r\n\r\n            GUILayout.EndArea();\r\n        }\r\n\r\n        // ── 헤더 ──────────────────────────────────────────\r\n        private void DrawHeader()\r\n        {\r\n            GUILayout.Label($\"== 멀티 디버그  [{GetPhaseLabel()}] ==\");\r\n        }\r\n\r\n        private string GetPhaseLabel()\r\n        {\r\n            if (_gameController != null && _gameController.IsGameEnded) return \"ENDED\";\r\n            if (_gameController != null && _gameController.IsGameActive) return \"PLAYING\";\r\n            if (_isLoading) return $\"LOADING {_loadingRemaining:F1}s\";\r\n            if (_matchmakingFlow != null && _matchmakingFlow.IsCountingDown) return $\"START {_countdownRemaining:F0}s\";\r\n            if (_matchmakingFlow != null && _matchmakingFlow.IsMatched) return \"MATCHED ✓\";\r\n            if (_matchmakingFlow != null && _matchmakingFlow.IsSearching) return \"SEARCHING...\";\r\n            if (_matchmakingFlow != null && _matchmakingFlow.HasRoom) return \"ROOM\";\r\n            return \"IDLE\";\r\n        }\r\n\r\n        // ── 매칭 상태 ──────────────────────────────────────\r\n        private void DrawMatchStatus()\r\n        {\r\n            GUILayout.Label(\"-- 매칭 상태 --\");\r\n\r\n            if (_matchmakingFlow == null)\r\n            {\r\n                GUILayout.Label(\"MatchmakingFlow 없음\");\r\n                return;\r\n            }\r\n\r\n            var session = _matchmakingFlow.CurrentSession;\r\n            bool matched = _matchmakingFlow.IsMatched || (_gameController != null && _gameController.IsGameActive);\r\n\r\n            GUILayout.Label(matched ? \"● 매칭됨\" : \"○ 대기중\");\r\n\r\n            if (session != null && !string.IsNullOrEmpty(session.RoomId))\r\n            {\r\n                GUILayout.Label($\"Room: {Short(session.RoomId)}  |  Seed: {session.Seed}\");\r\n                GUILayout.Label($\"Players: {session.PlayerCount}  |  Host: {session.IsHost}\");\r\n            }\r\n            else\r\n            {\r\n                GUILayout.Label(\"Room: -\");\r\n            }\r\n        }\r\n\r\n        // ── 게임 중 플레이어 실시간 ────────────────────────\r\n        private void DrawPlaySection()\r\n        {\r\n            GUILayout.Label(\"-- 플레이어 실시간 --\");\r\n\r\n            var session = _matchmakingFlow?.CurrentSession;\r\n            var liveSync = _gameController.LiveSync;\r\n\r\n            // 내 슬롯머신 직접 읽기\r\n            var slot = _gameController.CurrentSlotMachine;\r\n            if (slot != null)\r\n            {\r\n                var run = slot.Run;\r\n                string myUid = session?.MyUid ?? \"?\";\r\n                GUILayout.Label($\"[나] {Short(myUid)}\");\r\n                GUILayout.Label($\"  스핀:{run.SpinIndex}  점수:{run.BankedWood}  콤보:{run.Combo}(최대:{run.MaxCombo})\");\r\n                GUILayout.Label($\"  체온:{run.BodyTemp:F1}°  생존:{run.SurvivalSeconds:F0}s  {(slot.IsAlive ? \"생존\" : \"사망\")}\");\r\n            }\r\n\r\n            // 상대 / 고스트 라이브 캐시\r\n            if (liveSync != null && liveSync.LiveCache != null)\r\n            {\r\n                string myUid = session?.MyUid ?? \"\";\r\n\r\n                foreach (var kvp in liveSync.LiveCache)\r\n                {\r\n                    if (kvp.Key == myUid) continue; // 내 건 위에서 이미 표시\r\n\r\n                    bool isGhost = kvp.Key.StartsWith(\"ghost_\");\r\n                    string tag = isGhost ? \"[고스트]\" : \"[상대]\";\r\n                    var d = kvp.Value;\r\n\r\n                    GUILayout.Space(4);\r\n                    GUILayout.Label($\"{tag} {Short(kvp.Key)}\");\r\n                    GUILayout.Label($\"  스핀:{d.spinIndex}  점수:{d.score}  콤보:{d.combo}\");\r\n                    GUILayout.Label($\"  체온:{d.temperature:F1}°  {(d.alive ? \"생존\" : \"사망\")}\");\r\n                }\r\n            }\r\n        }\r\n\r\n        // ── 하단 액션 ──────────────────────────────────────\r\n        private void DrawFooterActions()\r\n        {\r\n            if (_gameController != null && (_gameController.IsGameActive || _gameController.IsGameEnded))\r\n            {\r\n                if (GUILayout.Button(\"게임 강제 종료\"))\r\n                    _gameController.EndGame();\r\n            }\r\n        }\r\n\r\n        // ── 로그 ───────────────────────────────────────────\r\n        private void DrawLogs()\r\n        {\r\n            if (_matchmakingFlow == null) return;\r\n\r\n            GUILayout.BeginHorizontal();\r\n            GUILayout.Label(\"-- 로그 --\");\r\n            if (GUILayout.Button(\"지우기\", GUILayout.Width(55)))\r\n                _matchmakingFlow.ClearLogs();\r\n            GUILayout.EndHorizontal();\r\n\r\n            var logs = _matchmakingFlow.DebugLogs;\r\n\r\n            if (_autoScrollLog && logs.Count != _lastLogCount)\r\n            {\r\n                _logScroll.y = float.MaxValue;\r\n                _lastLogCount = logs.Count;\r\n            }\r\n\r\n            _logScroll = GUILayout.BeginScrollView(_logScroll, GUI.skin.box, GUILayout.Height(_logHeight));\r\n\r\n            int start = Mathf.Max(0, logs.Count - _maxVisibleLogs);\r\n            for (int i = start; i < logs.Count; i++)\r\n                GUILayout.Label(logs[i]);\r\n\r\n            GUILayout.EndScrollView();\r\n        }\r\n\r\n        private string Short(string text, int length = 8)\r\n        {\r\n            if (string.IsNullOrEmpty(text)) return \"-\";\r\n            return text.Length <= length ? text : text.Substring(0, length);\r\n        }\r\n    }\r\n}","lines":225},{"id":"Scripts/Slot/SymbolTableView.cs","name":"SymbolTableView","path":"Scripts/Slot/SymbolTableView.cs","layer":"Slot","scenes":["Dev","Multi"],"entry":true,"summary":"조건 숫자(N개+)는 SlotJudgeConfig에서 인용 -> 임계 튜닝하면 족보도 자동 갱신.","src":"﻿using System.Text;\r\nusing UnityEngine;\r\nusing TMPro;                       \r\nusing Wooduduk.Data.DataSO; \r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 조건 숫자(N개+)는 SlotJudgeConfig에서 인용 -> 임계 튜닝하면 족보도 자동 갱신.\r\n    public class SymbolPaytableView : MonoBehaviour\r\n    {\r\n        [SerializeField] private TMP_Text _tmp;            // 메뉴판 위 TMP(3D 또는 UGUI)\r\n        [SerializeField] private SymbolTableSO _table;\r\n        [SerializeField] private DataManagerSO _data;      // 조건 인용용\r\n\r\n        [Header(\"컬럼 위치(%)\")]\r\n        [SerializeField, Range(0, 100)] private int _condPos = 46;\r\n        [SerializeField, Range(0, 100)] private int _effectPos = 60;\r\n\r\n        private void Start() => Rebuild();\r\n\r\n        [ContextMenu(\"Rebuild\")]   // 밸런싱 바꾼 뒤 에디터에서 수동 갱신\r\n        public void Rebuild()\r\n        {\r\n            if (_tmp == null || _table == null) return;\r\n            var j = _data != null && _data._gameBalance != null && _data._gameBalance._data != null\r\n                ? _data._gameBalance._data._slotJudge : null;\r\n\r\n            var sb = new StringBuilder();\r\n            foreach (var r in _table._rows)\r\n            {\r\n                if (r._spriteIndex >= 0) sb.Append(\"<sprite index=\").Append(r._spriteIndex).Append(\"> \");\r\n                sb.Append(r._displayName);\r\n                sb.Append(\"<pos=\").Append(_condPos).Append(\"%>\").Append(Condition(r._symbol, j));\r\n                sb.Append(\"<pos=\").Append(_effectPos).Append(\"%><color=#\")\r\n                  .Append(ColorUtility.ToHtmlStringRGB(r._color)).Append('>')\r\n                  .Append(r._effectSign).Append(' ').Append(r._effectText).Append(\"</color>\");\r\n                sb.Append('\\n');\r\n            }\r\n            _tmp.text = sb.ToString();\r\n        }\r\n\r\n        // 발동 조건 숫자는 판정 config가 단독 소유\r\n        private static string Condition(SymbolId s, SlotJudgeConfig j)\r\n        {\r\n            if (j == null) return \"\";\r\n            switch (s)\r\n            {\r\n                case SymbolId.SWING: return \"등급\";\r\n                case SymbolId.PERFECT: return $\"{j._perfectThreshold}개+\";\r\n                case SymbolId.FRIEBAT: return $\"{j._fireBatThreshold}개+\";\r\n                case SymbolId.MAKGEOLLI: return $\"{j._makgeolliThreshold}개+\";\r\n                case SymbolId.WORM: return $\"{j._wormFailThreshold}개+\";\r\n                case SymbolId.KNOT: return \"—\";\r\n                default: return \"1개+\";   \r\n            }\r\n        }\r\n    }\r\n}","lines":58},{"id":"Scripts/Network/OpponentSeatView.cs","name":"OpponentSeatView","path":"Scripts/Network/OpponentSeatView.cs","layer":"Network","scenes":["Multi"],"entry":true,"summary":"OpponentSeatView 상대 좌석(2P~4P) 표시전용 뷰. 무엇을 하나: · 배정된 uid 1명의 RoomLiveData(RoomLiveSync 폴링)를 읽어 자기 좌석 비주얼만 구동. · 모닥불 on/off(fireLit), 사망 딤(!alive), 점수·콤보·체온 라벨. · 실제 슬롯머신 아님 릴 결과는 동기화 안 되므로 표시 불가(설계: 표시전용 쉘). 왜 이렇게(중요): · SlotEvent는 \"정적\" 이벤트다","src":"using UnityEngine;\nusing TMPro;\nusing Wooduduk.Network.Firebase.Matchmaking; // RoomLiveData\n\nnamespace Wooduduk.Network\n{\n    // ─────────────────────────────────────────────────────────────────────────────\n    // OpponentSeatView — 상대 좌석(2P~4P) 표시전용 뷰.\n    //\n    // 무엇을 하나:\n    //   · 배정된 uid 1명의 RoomLiveData(RoomLiveSync 폴링)를 읽어 자기 좌석 비주얼만 구동.\n    //   · 모닥불 on/off(fireLit), 사망 딤(!alive), 점수·콤보·체온 라벨.\n    //   · 실제 슬롯머신 아님 — 릴 결과는 동기화 안 되므로 표시 불가(설계: 표시전용 쉘).\n    //\n    // 왜 이렇게(중요):\n    //   · SlotEvent는 \"정적\" 이벤트다. SlotmachineController/AnimationController/CampfireController를\n    //     상대 좌석에 붙이면 내 스핀 1회에 상대 슬롯머신이 전부 반응하고, 상대 모닥불이 내 SFX를 유발한다.\n    //   · 그래서 이 뷰는 전역 SlotEvent를 \"구독도 발신도 안 한다\". 오직 RoomLiveData 폴링만.\n    //\n    // [씬/프리팹 조립법] (OpponentSeat.prefab — 유저가 Unity에서 1회 제작)\n    //   1) SlotMachineFeel 프리팹을 복제(또는 Variant 생성) → 이름 OpponentSeat.\n    //   2) 복제본에서 게임플레이 컴포넌트 제거:\n    //        SlotmachineController, SlotmachineAnimationController, (슬롯) 오디오 관련, CampfireController.\n    //        → 릴/머신 메쉬는 육안용으로 그대로 둔다(정적).\n    //   3) 모닥불 불꽃 오브젝트(CampFire의 flameRoot 격) 하나를 자식으로 두거나 남긴다.\n    //   4) 월드스페이스 라벨(TextMeshPro) 몇 개 배치: 닉/점수/콤보/체온(원하는 것만).\n    //   5) 루트에 이 OpponentSeatView 컴포넌트 부착 → 아래 참조들 연결(원하는 것만, 나머지 비워도 안전).\n    //   6) 이 프리팹을 MultiSeatSpawner._opponentSeatPrefab 에 연결.\n    //\n    // 주의: Bind()는 MultiSeatSpawner가 스폰 직후 호출한다(수동 호출 불필요).\n    // ─────────────────────────────────────────────────────────────────────────────\n    [DisallowMultipleComponent]\n    public class OpponentSeatView : MonoBehaviour\n    {\n        #region --- 인스펙터 참조 (전부 선택 — 없는 건 조용히 스킵) ---\n\n        [Header(\"표시 참조 (프리팹 내부, 원하는 것만 연결)\")]\n        [Tooltip(\"모닥불 불꽃 루트. fireLit=true일 때만 SetActive(true).\")]\n        [SerializeField] private GameObject _flameRoot;\n\n        [Tooltip(\"사망 딤/오버레이. alive=false일 때 SetActive(true).\")]\n        [SerializeField] private GameObject _deadOverlay;\n\n        [Tooltip(\"사망 시 얼어붙는 연출 루트(예: FreezeSlotMachine). 생존=비활성(기본), 사망(alive=false)=활성. fireLit→불꽃과 동일 패턴.\")]\n        [SerializeField] private GameObject _deathFreezeRoot;\n\n        [Tooltip(\"사망(체온0/alive=false) 시 비활성화할 오브젝트들 — 예: point light, (1)~(4) 5개. 생존=활성 / 사망=비활성. _deathFreezeRoot와 반대 방향.\")]\n        [SerializeField] private GameObject[] _deathHideObjects;\n\n        [SerializeField] private TMP_Text _nickLabel;\n        [SerializeField] private TMP_Text _scoreLabel;\n        [SerializeField] private TMP_Text _comboLabel;\n        [SerializeField] private TMP_Text _tempLabel;\n\n        [Tooltip(\"통합 라벨(선택) — 기존 슬롯 모니터 TMP 하나 재활용용. 닉/점수/콤보/체온을 여러 줄로 한 텍스트에 표시. 개별 라벨과 동시 사용 가능(둘 다 연결하면 둘 다 갱신).\")]\n        [SerializeField] private TMP_Text _statusLabel;\n\n        [Header(\"설정\")]\n        [Tooltip(\"라이브 데이터 폴링 주기(초). RoomLiveSync/보드와 맞춤 0.33s ≈ 3Hz.\")]\n        [SerializeField] private float _refreshInterval = 0.33f;\n\n        #endregion\n\n        #region --- 내부 상태 ---\n\n        private string _uid;\n        private string _nick;\n        private RoomLiveSync _liveSync;\n        private float _timer;\n        private bool _bound;\n\n        #endregion\n\n        // 스포너가 스폰 직후 1회 호출. nick은 RoomLiveData에 없어 여기서 주입(매치 중 고정).\n        public void Bind(string uid, string nick, RoomLiveSync liveSync)\n        {\n            _uid = uid;\n            _nick = string.IsNullOrEmpty(nick) ? uid : nick;\n            _liveSync = liveSync;\n            _bound = !string.IsNullOrEmpty(uid) && liveSync != null;\n\n            if (_nickLabel != null) _nickLabel.text = _nick;\n            _timer = 0f;\n\n            if (!_bound)\n                Debug.LogWarning($\"[OpponentSeatView] Bind 부실 — uid='{uid}', liveSync={(liveSync != null)}. 이 좌석은 갱신 안 됨.\");\n            else\n                Debug.Log($\"[OpponentSeatView] Bind 완료 — uid={uid}, nick={nick}\");\n\n            ApplyLive(); // 스폰 즉시 1회 반영(첫 폴링까지 대기 안 함)\n        }\n\n        private void Update()\n        {\n            if (!_bound) return;\n\n            _timer += Time.deltaTime;\n            if (_timer < _refreshInterval) return;\n            _timer = 0f;\n\n            ApplyLive();\n        }\n\n        // RoomLiveData → 좌석 비주얼. GetPlayerLiveData는 non-null 기본객체를 반환하지만 방어적으로 널체크.\n        private void ApplyLive()\n        {\n            RoomLiveData live = _liveSync != null ? _liveSync.GetPlayerLiveData(_uid) : null;\n\n            bool alive = live != null && live.alive;\n            bool fireLit = live != null && live.fireLit;\n            long score = live != null ? live.score : 0;\n            int combo = live != null ? live.combo : 0;\n            float temp = live != null ? live.temperature : 0f;\n\n            if (_flameRoot != null && _flameRoot.activeSelf != fireLit) _flameRoot.SetActive(fireLit);\n            if (_deadOverlay != null && _deadOverlay.activeSelf != !alive) _deadOverlay.SetActive(!alive);\n            // 사망 시 얼음 연출 ON(생존=OFF). fireLit→불꽃과 같은 on/off 토글.\n            if (_deathFreezeRoot != null && _deathFreezeRoot.activeSelf != !alive) _deathFreezeRoot.SetActive(!alive);\n            // 사망 시 지정 오브젝트(포인트 라이트 등) OFF(생존=ON). _deathFreezeRoot와 반대 방향.\n            if (_deathHideObjects != null)\n            {\n                for (int i = 0; i < _deathHideObjects.Length; i++)\n                {\n                    var o = _deathHideObjects[i];\n                    if (o != null && o.activeSelf != alive) o.SetActive(alive);\n                }\n            }\n\n            if (_scoreLabel != null) _scoreLabel.text = score.ToString();\n            if (_comboLabel != null) _comboLabel.text = \"x\" + combo;\n            if (_tempLabel != null) _tempLabel.text = Mathf.RoundToInt(temp) + \"°\";\n\n            // 통합 라벨(기존 모니터 재활용) — 닉/점수/콤보/체온 여러 줄. 사망 시 닉 옆 ☠.\n            if (_statusLabel != null)\n            {\n                _statusLabel.text =\n                    (_nick ?? string.Empty) + (alive ? string.Empty : \" ☠\") + \"\\n\" +\n                    \"▶ 점수 : \" + score + \"\\n\" +\n                    \"▶ 콤보 : x\" + combo + \"\\n\" +\n                    \"▶ 체온 : \" + Mathf.RoundToInt(temp) + \"°\";\n            }\n        }\n    }\n}\n","lines":145},{"id":"Scripts/Network/MultiSessionCoordinator.cs","name":"MultiSessionCoordinator","path":"Scripts/Network/MultiSessionCoordinator.cs","layer":"Network","scenes":["Multi"],"entry":true,"summary":"MultiSessionCoordinator 멀티 세션 \"서버시간 동기 시작\"(P1). 무엇을 하나: · MultiScene 진입 후(StartMultiGame 완료 감지) 카운트다운 시작. · 호스트가 rooms/{roomId}/startAt(절대 서버시각 ms)을 기록, 전원이 자기 serverTimeOffset로 그 절대시각에 맞춰 카운트다운 → 전원 \"같은 순간\" 동시 발화. · 발화 시: run.Started=true(","src":"using System;\nusing System.Collections;\nusing UnityEngine;\nusing Wooduduk.Network.Firebase.Matchmaking; // RoomContext\nusing Wooduduk.Slot;                          // RunContext/RunProgress (var 체인 안전)\nusing Wooduduk.Slot.Machine;                  // SlotmachineController\n\nnamespace Wooduduk.Network\n{\n    // ─────────────────────────────────────────────────────────────────────────────\n    // MultiSessionCoordinator — 멀티 세션 \"서버시간 동기 시작\"(P1).\n    //\n    // 무엇을 하나:\n    //   · MultiScene 진입 후(StartMultiGame 완료 감지) 카운트다운 시작.\n    //   · 호스트가 rooms/{roomId}/startAt(절대 서버시각 ms)을 기록, 전원이 자기 serverTimeOffset로\n    //     그 절대시각에 맞춰 카운트다운 → 전원 \"같은 순간\" 동시 발화.\n    //   · 발화 시: run.Started=true(체온 동시 드레인 시작) + 스핀 잠금 해제.\n    //   · 카운트다운 중: 스핀 봉인(SlotmachineController.SetSpinLocked(true)).\n    //\n    // 왜 이렇게:\n    //   · 체온 드레인은 PlayerSurvival이 run.Started 게이팅 → Started를 동일 절대시각에 켜면 전원 동시 드레인.\n    //   · 스핀 잠금은 run.Started 게이팅 대신 별도 플래그(단일플레이 데드락 방지).\n    //   · GameController.CreateSlotMachine은 더 이상 Started를 즉시 켜지 않음(P1) → 여기서 켠다.\n    //\n    // [씬 배치 사용법] (MultiScene, 수동)\n    //   1) 빈 GameObject \"MultiSessionCoordinator\" → 이 스크립트 부착.\n    //   2) (선택) _gameController / _slotmachineController 연결(비우면 FindAnyObjectByType 자동).\n    //   3) _countdownSeconds = 5~10 (로드 편차 흡수 위해 넉넉히).\n    //   4) 카운트다운 UI 배선(선택): OnCountdownStarted(남은초) 이벤트를 HUD에 연결.\n    //        예) coordinator.OnCountdownStarted += s => InGameHUDController.Instance.ShowCountdownEvent(\"게임 시작까지 {0}\", s, \"시작!\");\n    //\n    // 안전: 멀티 아님/Repository 없음 → 아무것도 안 함(단독 씬 안전). RoomContext(정적)는 씬 전환 넘어와 있음.\n    // ─────────────────────────────────────────────────────────────────────────────\n    [DisallowMultipleComponent]\n    public class MultiSessionCoordinator : MonoBehaviour\n    {\n        #region --- 인스펙터 ---\n\n        [Header(\"참조 (선택 — 비우면 자동 탐색)\")]\n        [SerializeField] private GameController _gameController;\n        [SerializeField] private SlotmachineController _slotmachineController;\n\n        [Header(\"설정\")]\n        [Tooltip(\"카운트다운 길이(초). 로드 시점 편차 흡수 위해 넉넉히(5~10).\")]\n        [SerializeField] private float _countdownSeconds = 7f;\n\n        #endregion\n\n        // UI 배선용. OnCountdownStarted(남은초) → ShowCountdownEvent 등에 연결. OnSessionStarted = 발화 완료.\n        public event Action<float> OnCountdownStarted;\n        public event Action OnSessionStarted;\n\n        #region --- 내부 상태 ---\n\n        private bool _begun;          // 카운트다운 절차 시작됨(1회)\n        private bool _started;         // 세션 발화 완료(1회)\n        private long _serverOffsetMs;  // .info/serverTimeOffset (로컬 → 서버 시각 보정)\n        private string _roomId;\n\n        #endregion\n\n        private void Update()\n        {\n            if (_begun) return;\n\n            var ctx = RoomContext.Instance;\n            if (ctx == null || !ctx.IsInMultiplayer || ctx.Session == null || ctx.Repository == null) return;\n\n            var gc = ResolveGameController();\n            // StartMultiGame 완료 대기. 멀티는 SlotmachineController.Init 경로라 _runContext가 아니라\n            // CurrentSlotMachine에 머신/런이 잡힌다 → CurrentSlotMachine으로 준비 판정(양쪽 경로 커버).\n            if (gc == null || gc.CurrentSlotMachine == null) return;\n\n            _begun = true;\n            BeginCountdown(ctx);\n        }\n\n        private void BeginCountdown(RoomContext ctx)\n        {\n            _roomId = ctx.Session.RoomId;\n\n            // ── 손찬성 요청: 고스트-호스트 안전망 ────────────────────────────────\n            // IsHost가 고스트를 제외하므로 정상 상황에선 항상 실플레이어가 호스트다.\n            //  (a) 방에 실플레이어가 하나도 없으면(=고아 방) 아무도 startAt을 못 써 전원 무한 대기 →\n            //      \"고스트만 호스트 후보\"인 broken 상태이므로 방을 파괴하고 세션 시작을 중단한다.\n            //  (b) 고스트가 '나이브 최소 uid'인 경우는 IsHost 픽스로 실플레이어가 호스트를 승계하므로\n            //      파괴하지 않고 경고 로그만 남긴다(솔로+고스트 정상 매치의 절반이 여기 해당 → 파괴 금지).\n            if (!ctx.Session.HasRealHost)\n            {\n                Debug.LogError($\"[MultiSessionCoordinator] 실플레이어 0 — 고스트만 남은 고아 방({_roomId}) → 방 파괴, 세션 시작 중단.\");\n                ctx.Repository.DeleteRoom(_roomId);\n                return;\n            }\n            if (ctx.Session.GhostWouldBeNaiveHost)\n                Debug.LogWarning($\"[MultiSessionCoordinator] 나이브 선출이면 고스트가 호스트였을 상황 — IsHost 픽스로 실플레이어가 승계, 방 유지({_roomId}).\");\n            // ─────────────────────────────────────────────────────────────────────\n\n            ResolveSlot()?.SetSpinLocked(true); // 카운트다운 동안 스핀 봉인(즉시)\n            Debug.Log(\"[MultiSessionCoordinator] 카운트다운 준비 — 스핀 잠금, 서버시간 오프셋 조회.\");\n\n            ctx.Repository.ReadServerTimeOffset(offset =>\n            {\n                _serverOffsetMs = (long)offset;\n                ctx.Repository.SubscribeStartAt(_roomId, OnStartAt);\n\n                if (ctx.Session.IsHost)\n                {\n                    long nowMs = DateTimeOffset.UtcNow.ToUnixTimeMilliseconds() + _serverOffsetMs;\n                    long startAtMs = nowMs + (long)(_countdownSeconds * 1000f);\n                    ctx.Repository.WriteStartAt(_roomId, startAtMs);\n                    Debug.Log($\"[MultiSessionCoordinator] (호스트) startAt={startAtMs} 기록 (offset={_serverOffsetMs}ms, 카운트다운 {_countdownSeconds}s).\");\n                }\n                else\n                {\n                    Debug.Log($\"[MultiSessionCoordinator] (비호스트) startAt 구독 대기 (offset={_serverOffsetMs}ms).\");\n                }\n            });\n        }\n\n        // startAt 수신(전원) → 절대시각까지 남은 시간 계산 → 카운트다운 후 발화.\n        private void OnStartAt(long startAtMs)\n        {\n            if (_started) return;\n\n            long nowMs = DateTimeOffset.UtcNow.ToUnixTimeMilliseconds() + _serverOffsetMs;\n            float secLeft = Mathf.Max(0f, (startAtMs - nowMs) / 1000f);\n            Debug.Log($\"[MultiSessionCoordinator] startAt 수신 → {secLeft:F2}s 후 세션 시작 (startAt={startAtMs}, now={nowMs}).\");\n\n            OnCountdownStarted?.Invoke(secLeft); // UI(ShowCountdownEvent 등) 배선용\n\n            StopAllCoroutines();\n            StartCoroutine(CountdownThenBegin(secLeft));\n        }\n\n        private IEnumerator CountdownThenBegin(float secLeft)\n        {\n            float t = secLeft;\n            while (t > 0f)\n            {\n                yield return null;\n                t -= Time.deltaTime;\n            }\n            BeginSession();\n        }\n\n        // 발화 — 전원 동일 절대시각에 도달: 체온 드레인 ON + 스핀 해제.\n        private void BeginSession()\n        {\n            if (_started) return;\n            _started = true;\n\n            // 멀티 실제 런 = CurrentSlotMachine.Run (SlotmachineController.Init가 만든 그 run, PlayerSurvival이 드레인).\n            var run = ResolveGameController()?.CurrentSlotMachine?.Run;\n            if (run != null) run.Started = true;   // PlayerSurvival이 이걸 게이팅 → 동시 드레인 시작\n            else Debug.LogError(\"[MultiSessionCoordinator] CurrentSlotMachine.Run 없음 — Started 설정 실패(GameController/머신 확인).\");\n\n            ResolveSlot()?.SetSpinLocked(false);    // 스핀 해제\n            OnSessionStarted?.Invoke();\n            Debug.Log(\"[MultiSessionCoordinator] ▶ 세션 시작 — 체온 드레인 ON, 스핀 해제.\");\n        }\n\n        private void OnDisable()\n        {\n            var repo = RoomContext.Instance?.Repository;\n            if (repo != null && !string.IsNullOrEmpty(_roomId)) repo.UnsubscribeStartAt(_roomId);\n        }\n\n        private GameController ResolveGameController()\n        {\n            if (_gameController == null) _gameController = FindAnyObjectByType<GameController>();\n            return _gameController;\n        }\n\n        private SlotmachineController ResolveSlot()\n        {\n            if (_slotmachineController == null) _slotmachineController = FindAnyObjectByType<SlotmachineController>();\n            return _slotmachineController;\n        }\n    }\n}\n","lines":181},{"id":"Scripts/Network/MultiGameBootstrap.cs","name":"MultiGameBootstrap","path":"Scripts/Network/MultiGameBootstrap.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"MultiGameBootstrap 멀티 씬(Chunghui_DevMulti) 진입 시 멀티 게임을 시작하는 트리거. 무엇을 하나: · 씬 로드 후 Start()에서 RoomContext(정적 싱글턴, 매칭 씬에서 적재됨)를 보고, 멀티 컨텍스트가 있으면 이 씬의 GameController.StartMultiGame()을 1회 호출. · MatchmakingFlow(LoadScene 모드)가 SceneManager.LoadSce","src":"using UnityEngine;\nusing UnityEngine.SceneManagement;\nusing Wooduduk.Network.Firebase.Matchmaking; // RoomContext\nusing Wooduduk.UI;                            // ResultController (결과창 복귀 버튼)\n\nnamespace Wooduduk.Network\n{\n    // ─────────────────────────────────────────────────────────────────────────────\n    // MultiGameBootstrap — 멀티 씬(Chunghui_DevMulti) 진입 시 멀티 게임을 시작하는 트리거.\n    //\n    // 무엇을 하나:\n    //   · 씬 로드 후 Start()에서 RoomContext(정적 싱글턴, 매칭 씬에서 적재됨)를 보고,\n    //     멀티 컨텍스트가 있으면 이 씬의 GameController.StartMultiGame()을 1회 호출.\n    //   ·
