<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>우드득 — 아키텍처 대시보드</title>
<style>
  :root{ --bg:#0b1220; --bg2:#0e1830; --panel:#121d33; --panel2:#16233c; --line:#243350; --tx:#e9f0f8; --tx2:#8ea3c2; --acc:#38d9a9; --acc2:#4dabf7; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--tx); font-family:"Segoe UI",system-ui,"Malgun Gothic",sans-serif; }
  #app{ display:grid; grid-template-columns:250px 1fr; grid-template-rows:62px 1fr; height:100vh; }
  header{ grid-column:1/3; display:flex; align-items:center; gap:18px; padding:0 22px; border-bottom:1px solid var(--line); background:linear-gradient(180deg,var(--bg2),var(--bg)); }
  header h1{ font-size:19px; margin:0; font-weight:800; }
  header h1 span{ color:var(--acc); }
  .flow{ display:flex; align-items:center; gap:8px; margin-left:8px; }
  .flow .s{ font-size:12px; padding:4px 12px; border-radius:20px; background:var(--panel); border:1px solid var(--line); color:var(--tx2); cursor:pointer; user-select:none; }
  .flow .s.on{ background:var(--acc); color:#04101f; border-color:var(--acc); font-weight:700; }
  .flow .arw{ color:var(--tx2); font-size:12px; }
  .chips{ margin-left:auto; display:flex; gap:8px; }
  .chip{ font-size:12.5px; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:5px 11px; color:var(--tx2); }
  .chip b{ color:var(--tx); font-size:14px; }
  aside{ border-right:1px solid var(--line); background:var(--bg2); overflow-y:auto; padding:16px 14px; }
  #q{ width:100%; padding:9px 11px; background:var(--bg); border:1px solid var(--line); border-radius:8px; color:var(--tx); font-size:13px; margin-bottom:16px; }
  #q:focus{ outline:none; border-color:var(--acc); }
  aside h4{ font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--tx2); margin:6px 0 8px; }
  .lnav a{ display:flex; align-items:center; gap:9px; padding:6px 8px; border-radius:6px; color:var(--tx); text-decoration:none; font-size:13px; cursor:pointer; }
  .lnav a:hover{ background:var(--panel); }
  .lnav .dot{ width:10px; height:10px; border-radius:3px; flex:0 0 auto; }
  .lnav .c{ margin-left:auto; color:var(--tx2); font-variant-numeric:tabular-nums; font-size:12px; }
  .deadbox{ margin-top:18px; font-size:11.5px; color:var(--tx2); line-height:1.6; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
  main{ overflow-y:auto; padding:8px 26px 60px; scroll-behavior:smooth; }
  .layer{ margin-top:30px; }
  .layer > .lh{ display:flex; align-items:center; gap:12px; position:sticky; top:0; background:linear-gradient(180deg,var(--bg) 70%,transparent); padding:12px 0 10px; z-index:5; }
  .lh .bar{ width:5px; height:26px; border-radius:3px; }
  .lh .name{ font-size:22px; font-weight:800; }
  .lh .en{ font-family:ui-monospace,Consolas,monospace; font-size:13px; color:var(--tx2); }
  .lh .cnt{ margin-left:auto; font-size:13px; color:var(--tx2); }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-left-width:4px; border-radius:12px; padding:14px 16px; cursor:pointer; transition:none; }
  .card:hover{ background:var(--panel2); border-color:var(--acc); }
  .card .nm{ font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .card .star{ color:var(--acc); font-size:13px; }
  .card .pth{ font-family:ui-monospace,Consolas,monospace; font-size:11px; color:var(--tx2); margin:3px 0 8px; word-break:break-all; }
  .card .sum{ font-size:12.5px; color:var(--tx); line-height:1.55; opacity:.92; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .card .meta{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; align-items:center; }
  .bdg{ font-size:10.5px; padding:2px 7px; border-radius:5px; border:1px solid var(--line); color:var(--tx2); }
  .bdg.sc{ background:var(--bg); }
  .deg{ margin-left:auto; font-size:11px; color:var(--tx2); font-family:ui-monospace,monospace; }
  .hidden{ display:none !important; }
  /* detail drawer */
  #drawer{ position:fixed; top:0; right:0; width:420px; height:100vh; background:var(--bg2); border-left:1px solid var(--line); padding:24px; overflow-y:auto; transform:translateX(460px); transition:transform .2s ease; box-shadow:-12px 0 40px rgba(0,0,0,.45); z-index:20; }
  #drawer.show{ transform:none; }
  #drawer .x{ position:absolute; top:16px; right:20px; cursor:pointer; color:var(--tx2); font-size:22px; }
  #drawer .x:hover{ color:var(--tx); }
  #drawer .dn{ font-size:24px; font-weight:800; margin-right:24px; word-break:break-all; }
  #drawer .dp{ font-family:ui-monospace,Consolas,monospace; font-size:12px; color:var(--tx2); margin:5px 0 14px; word-break:break-all; }
  #drawer .dsum{ font-size:14px; line-height:1.7; background:var(--panel); border-radius:10px; padding:14px 15px; }
  #drawer .code{ max-height:460px; overflow:auto; background:#0b1220; border:1px solid var(--line); border-radius:8px; padding:12px 14px; font-family:ui-monospace,Consolas,monospace; font-size:11.5px; line-height:1.55; color:#c7d2e0; white-space:pre; margin-top:2px; tab-size:4; }
  .copybtn{ cursor:pointer; color:var(--acc); font-size:11px; border:1px solid var(--line); padding:1px 8px; border-radius:5px; margin-left:8px; }
  .copybtn:hover{ background:var(--panel); }
  #drawer .lc{ color:var(--tx2); font-weight:400; text-transform:none; letter-spacing:0; }
  #drawer h5{ font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--tx2); margin:18px 0 8px; }
  #drawer .dep{ font-size:13px; color:var(--acc2); padding:3px 0; cursor:pointer; word-break:break-all; }
  #drawer .dep:hover{ text-decoration:underline; }
  #empty{ color:var(--tx2); padding:40px; text-align:center; font-size:15px; }
</style>
</head>

  <header>
    <h1>🪓 우드득 <span>아키텍처</span></h1>
    <div class="flow" id="flow"></div>
    <div class="chips" id="chips"></div>
  </header>
  <aside>
    <input id="q" placeholder="스크립트·요약 검색…" autocomplete="off">
    <h4>레이어</h4>
    <div class="lnav" id="lnav"></div>
    <div class="deadbox" id="deadbox"></div>
  </aside>
  <main id="main"></main>
</div>
<div id="drawer"></div>
<script>
const DATA = {"meta":{"totalCs":249,"live":183,"dead":66,"edges":526,"perScene":{"Title":102,"Tutorial":176,"Dev":175,"Multi":180},"perLayer":{"UI":31,"Data":39,"FX":11,"Network":30,"Matchmaking":6,"Tier":8,"Core":4,"Slot":42,"Player":6,"Tutorial":6},"generated":"2026-07-06","project":"Wooduduk (우드득)","scenes":["Title","Tutorial","Dev","Multi"]},"colors":{"Slot":"#ff6b6b","Network":"#4dabf7","UI":"#ffd43b","Data":"#51cf66","Tier":"#da77f2","Player":"#ff922b","FX":"#38d9a9","Matchmaking":"#a9e34b","Tutorial":"#f783ac","Core":"#adb5bd"},"nodes":[{"id":"Scripts/UI/SettingsController.cs","name":"SettingsController","path":"Scripts/UI/SettingsController.cs","layer":"UI","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"계정 탈퇴 성공 후 되돌아갈 씬 이름.","src":"using UnityEngine;\r\nusing UnityEngine.UIElements;\r\nusing UnityEngine.Audio;\r\nusing UnityEngine.SceneManagement;\r\nusing Wooduduk.Network.Firebase;   // FirebaseManager\r\nusing Wooduduk.FX;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    public class SettingsController : MonoBehaviour\r\n    {\r\n        [SerializeField] private UIDocument uiDocument;\r\n        [SerializeField] private AudioMixer mixer;\r\n\r\n        // 계정 탈퇴 성공 후 되돌아갈 씬 이름.\r\n        [SerializeField] private string titleSceneName = \"Title\";\r\n\r\n        private const float DefaultVolume = 0.8f;\r\n        private const string DeleteMsgDefault = \"정말 탈퇴하시겠어요?\\n계정과 모든 데이터가 영구히 삭제됩니다.\";\r\n\r\n        private VisualElement overlay;\r\n\r\n        // 탈퇴 확인 팝업 요소들\r\n        private VisualElement deleteConfirmOverlay;\r\n        private Label deleteConfirmMsg;\r\n        private Button deleteConfirmBtn;\r\n        private Button deleteCancelBtn;\r\n\r\n        // OnEnable이 아니라 Start에서: AudioMixer는 첫 프레임 전(Awake)에\r\n        // SetFloat가 무시되는 경우가 있어 Start가 안전하다.\r\n        private void Start()\r\n        {\r\n            var root = uiDocument.rootVisualElement;\r\n            UiSfxHover.BindAll(root);\r\n\r\n            overlay = root.Q(\"settings-overlay\");\r\n            Hide();\r\n\r\n            Bind(root, \"master-slider\", \"master-value\", \"Master\");\r\n            Bind(root, \"bgm-slider\", \"bgm-value\", \"BGM\");\r\n            Bind(root, \"sfx-slider\", \"sfx-value\", \"SFX\");\r\n\r\n            var closeBtn = root.Q<Button>(\"settings-close\");\r\n            if (closeBtn != null)\r\n                closeBtn.clicked += () => { UiSfxEvent.Raise(UiSfxKind.Close); Hide(); };\r\n\r\n            // ── 계정 탈퇴 배선 ──────────────────────────────\r\n            deleteConfirmOverlay = root.Q(\"delete-confirm-overlay\");\r\n            deleteConfirmMsg = root.Q<Label>(\"delete-confirm-msg\");\r\n            deleteConfirmBtn = root.Q<Button>(\"delete-confirm-btn\");\r\n            deleteCancelBtn = root.Q<Button>(\"delete-cancel-btn\");\r\n\r\n            var deleteBtn = root.Q<Button>(\"account-delete-btn\");\r\n            Debug.Log($\"[Settings] deleteBtn={deleteBtn != null} confirmOverlay={deleteConfirmOverlay != null} \" +\r\n                      $\"confirmBtn={deleteConfirmBtn != null} cancelBtn={deleteCancelBtn != null}\");\r\n\r\n            if (deleteBtn != null) deleteBtn.clicked += ShowDeleteConfirm;\r\n            if (deleteCancelBtn != null) deleteCancelBtn.clicked += () => { UiSfxEvent.Raise(UiSfxKind.Close); HideDeleteConfirm(); };\r\n            if (deleteConfirmBtn != null) deleteConfirmBtn.clicked += OnConfirmDelete;\r\n\r\n            HideDeleteConfirm();   // 시작 시 팝업 숨김\r\n        }\r\n\r\n        public void Show()\r\n        {\r\n            UiSfxEvent.Raise(UiSfxKind.Open);\r\n            if (overlay != null) overlay.style.display = DisplayStyle.Flex;\r\n        }\r\n\r\n        public void Hide()\r\n        {\r\n            if (overlay != null) overlay.style.display = DisplayStyle.None;\r\n        }\r\n\r\n        // ── 탈퇴 확인 팝업 ──────────────────────────────────\r\n        private void ShowDeleteConfirm()\r\n        {\r\n            UiSfxEvent.Raise(UiSfxKind.Open);\r\n            if (deleteConfirmMsg != null) deleteConfirmMsg.text = DeleteMsgDefault;\r\n            SetConfirmInteractable(true);\r\n            if (deleteConfirmOverlay != null) deleteConfirmOverlay.style.display = DisplayStyle.Flex;\r\n        }\r\n\r\n        private void HideDeleteConfirm()\r\n        {\r\n            if (deleteConfirmOverlay != null) deleteConfirmOverlay.style.display = DisplayStyle.None;\r\n        }\r\n\r\n        private void OnConfirmDelete()\r\n        {\r\n            if (FirebaseManager.Instance == null)\r\n            {\r\n                UiSfxEvent.Error();\r\n                if (deleteConfirmMsg != null)\r\n                    deleteConfirmMsg.text = \"로그인 정보를 찾을 수 없습니다.\\n앱을 재시작 후 다시 시도해주세요.\";\r\n                return;\r\n            }\r\n\r\n            SetConfirmInteractable(false);\r\n            if (deleteConfirmMsg != null) deleteConfirmMsg.text = \"탈퇴 처리 중...\";\r\n\r\n            FirebaseManager.Instance.RequestAccountDeletion(\r\n                onDeleted: () =>\r\n                {\r\n                    Debug.Log(\"[Settings] 계정 탈퇴 완료 → Title 씬으로 이동\");\r\n                    // 탈퇴 시 발행되는 RaiseNeedLogin을 Title 컨트롤러가 놓치므로,\r\n                    // 플래그로 \"복귀 즉시 로그인 화면\"을 지시한다.\r\n                    TitleController.StartOnLoginScreen = true;\r\n                    SceneManager.LoadScene(titleSceneName);\r\n                },\r\n                onError: (msg) =>\r\n                {\r\n                    UiSfxEvent.Error();\r\n                    Debug.LogWarning($\"[Settings] 계정 탈퇴 실패: {msg}\");\r\n                    SetConfirmInteractable(true);\r\n                    if (deleteConfirmMsg != null) deleteConfirmMsg.text = msg;\r\n                });\r\n        }\r\n\r\n        private void SetConfirmInteractable(bool on)\r\n        {\r\n            deleteConfirmBtn?.SetEnabled(on);\r\n            deleteCancelBtn?.SetEnabled(on);\r\n        }\r\n\r\n        private void Bind(VisualElement root, string sliderName, string valueLabelName, string param)\r\n        {\r\n            var slider = root.Q<Slider>(sliderName);\r\n            var label = root.Q<Label>(valueLabelName);\r\n            if (slider == null) return;\r\n\r\n            // 저장된 값 불러오기(없으면 기본 0.8)\r\n            float saved = PlayerPrefs.GetFloat(param, DefaultVolume);\r\n            slider.value = saved;\r\n            Apply(param, saved, label);\r\n\r\n            // 슬라이더 움직일 때마다 즉시 적용 + 저장\r\n            slider.RegisterValueChangedCallback(evt =>\r\n            {\r\n                Apply(param, evt.newValue, label);\r\n                PlayerPrefs.SetFloat(param, evt.newValue);\r\n            });\r\n        }\r\n\r\n        private void Apply(string param, float value01, Label label)\r\n        {\r\n            mixer.SetFloat(param, AudioUtil.Linear01ToDecibel(value01));\r\n            if (label != null)\r\n                label.text = Mathf.RoundToInt(value01 * 100f) + \"%\";\r\n        }\r\n    }\r\n}","lines":152},{"id":"Scripts/Data/Core/DataManager.cs","name":"DataManager","path":"Scripts/Data/Core/DataManager.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"(요약 없음)","src":"﻿using UnityEngine;\r\nusing Wooduduk.Data.DataSO;\r\n\r\nnamespace Wooduduk.Data.Core\r\n{\r\n    public class DataManager : MonoBehaviour\r\n    {\r\n        public static DataManager Instance { get; private set; }\r\n\r\n        [SerializeField]\r\n        private DataManagerSO _data;\r\n\r\n        public DataManagerSO Data => _data;\r\n\r\n        private void Awake()\r\n        {\r\n            if (Instance == null)\r\n            {\r\n                Instance = this;\r\n                DontDestroyOnLoad(gameObject);\r\n\r\n                _data.Initialize();\r\n            }\r\n            else\r\n            {\r\n                Destroy(gameObject);\r\n            }\r\n        }\r\n    }\r\n}","lines":30},{"id":"Scripts/UI/TitleLoginController.cs","name":"TitleLoginController","path":"Scripts/UI/TitleLoginController.cs","layer":"UI","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"로그인 폼 패널. TitleController가 필요할 때 Show()로 띄운다. 게스트/커스텀 로그인 호출만 담당하며, 로그인 완료 후 씬 라우팅은 TitleController가 AccountEvents.OnUserDataLoaded를 받아 처리한다(여기선 안 함).","src":"using UnityEngine;\r\nusing UnityEngine.UIElements;\r\nusing Wooduduk.Network.Firebase;   // FirebaseManager\r\nusing Wooduduk.FX;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    /// <summary>\r\n    /// 로그인 폼 패널. TitleController가 필요할 때 Show()로 띄운다.\r\n    /// 게스트/커스텀 로그인 호출만 담당하며, 로그인 완료 후 씬 라우팅은\r\n    /// TitleController가 AccountEvents.OnUserDataLoaded를 받아 처리한다(여기선 안 함).\r\n    /// </summary>\r\n    [RequireComponent(typeof(UIDocument))]\r\n    public class TitleLoginController : MonoBehaviour\r\n    {\r\n        [SerializeField] private UIDocument uiDocument;\r\n\r\n        private VisualElement _overlay;\r\n        private TextField _nickField;\r\n        private Button _guestBtn;\r\n        private Button _customBtn;\r\n        private Label _statusLabel;\r\n\r\n        private void Start()\r\n        {\r\n            if (uiDocument == null) uiDocument = GetComponent<UIDocument>();\r\n            var root = uiDocument.rootVisualElement;\r\n\r\n            _overlay = root.Q<VisualElement>(\"login-overlay\");\r\n            _nickField = root.Q<TextField>(\"nick-field\");\r\n            _guestBtn = root.Q<Button>(\"guest-btn\");\r\n            _customBtn = root.Q<Button>(\"custom-btn\");\r\n            _statusLabel = root.Q<Label>(\"status-label\");\r\n\r\n            // 노트 함정: Q null = uxml/타입 참조 문제. 요소 잡힌 직후 콕 집어 로그.\r\n            Debug.Log($\"[Login] overlay={_overlay != null} nick={_nickField != null} \" +\r\n                      $\"guest={_guestBtn != null} custom={_customBtn != null}\");\r\n\r\n            if (_guestBtn != null) _guestBtn.clicked += OnGuestClicked;\r\n            if (_customBtn != null) _customBtn.clicked += OnCustomClicked;\r\n\r\n            Hide();   // 시작 시 숨김 — TitleController가 필요할 때 Show()\r\n        }\r\n\r\n        public void Show()\r\n        {\r\n            UiSfxEvent.Raise(UiSfxKind.Open);\r\n            if (_overlay != null) _overlay.style.display = DisplayStyle.Flex;\r\n            SetInteractable(true);\r\n            if (_statusLabel != null) _statusLabel.text = \"\";\r\n        }\r\n\r\n        public void Hide()\r\n        {\r\n            if (_overlay != null) _overlay.style.display = DisplayStyle.None;\r\n        }\r\n\r\n        private void OnGuestClicked()\r\n        {\r\n            UiSfxEvent.Click();\r\n            SetBusy(\"게스트 로그인 중...\");\r\n            FirebaseManager.Instance.SignInAsGuest();\r\n            // 완료는 TitleController가 OnUserDataLoaded로 받아 튜토리얼로 라우팅.\r\n        }\r\n\r\n        private void OnCustomClicked()\r\n        {\r\n            string nick = _nickField != null ? (_nickField.value ?? \"\").Trim() : \"\";\r\n            if (string.IsNullOrEmpty(nick))\r\n            {\r\n                UiSfxEvent.Error();\r\n                if (_statusLabel != null)\r\n                    _statusLabel.text = \"닉네임을 입력하거나 아래 '게스트로 시작'을 누르세요.\";\r\n                return;\r\n            }\r\n            UiSfxEvent.Click();\r\n            SetBusy($\"'{nick}' (으)로 로그인 중...\");\r\n            FirebaseManager.Instance.SignInWithCustomNickname(nick);\r\n        }\r\n\r\n        private void SetBusy(string msg)\r\n        {\r\n            SetInteractable(false);\r\n            if (_statusLabel != null) _statusLabel.text = msg;\r\n        }\r\n\r\n        private void SetInteractable(bool on)\r\n        {\r\n            _guestBtn?.SetEnabled(on);\r\n            _customBtn?.SetEnabled(on);\r\n            _nickField?.SetEnabled(on);\r\n        }\r\n    }\r\n}","lines":94},{"id":"Scripts/UI/TitleController.cs","name":"TitleController","path":"Scripts/UI/TitleController.cs","layer":"UI","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"계정 탈퇴 후 Title로 복귀 시, 로그인이 필요함을 알리는 플래그. (탈퇴 시 FirebaseManager가 RaiseNeedLogin을 씬 로드 전에 쏴서 신호를 놓치므로 필요)","src":"using System.Collections;\r\nusing UnityEngine;\r\nusing UnityEngine.SceneManagement;\r\nusing UnityEngine.UIElements;\r\nusing Wooduduk.Network.Firebase;   // AccountEvents\r\nusing Wooduduk.Data.Static;        // UserData\r\nusing Wooduduk.FX;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    public class TitleController : MonoBehaviour\r\n    {\r\n        [SerializeField] private UIDocument document;\r\n        [SerializeField] private SettingsController settingsController;\r\n        [SerializeField] private TitleLoginController loginController;   // 로그인 폼 패널\r\n        [SerializeField] private Sprite backgroundSprite;\r\n\r\n        [Tooltip(\"튜토리얼을 이미 끝낸 유저가 갈 메인 게임 씬. Build Profiles의 Scene List 이름과 정확히 일치해야 함.\")]\r\n        [SerializeField] private string gameSceneName = \"\";\r\n\r\n        [Tooltip(\"튜토리얼 미완료 유저가 갈 튜토리얼 씬.\")]\r\n        [SerializeField] private string tutorialSceneName = \"Tutorial\";\r\n\r\n        // 계정 탈퇴 후 Title로 복귀 시, 로그인이 필요함을 알리는 플래그.\r\n        // (탈퇴 시 FirebaseManager가 RaiseNeedLogin을 씬 로드 전에 쏴서 신호를 놓치므로 필요)\r\n        public static bool StartOnLoginScreen;\r\n\r\n        private VisualElement overlay;\r\n        private Button startBtn;\r\n        private Button settingsBtn;\r\n        private bool loading;\r\n\r\n        // 로그인 상태 추적\r\n        private bool _startPressed;        // 게임 시작 눌렀나\r\n        private bool _needLogin;           // OnNeedLogin 받았나\r\n        private bool _hasPendingUser;      // 게임 시작 전에 로그인이 먼저 끝났나\r\n        private UserData _pendingUserData; // 그때 받은 UserData 보관(라우팅에 _tutorialDone 필요)\r\n\r\n        private void OnEnable()\r\n        {\r\n            if (document == null) document = GetComponent<UIDocument>();\r\n            var root = document.rootVisualElement;\r\n\r\n            overlay = root.Q<VisualElement>(\"title-overlay\");\r\n            if (overlay != null && backgroundSprite != null)\r\n            {\r\n                overlay.style.backgroundImage = new StyleBackground(backgroundSprite);\r\n                overlay.style.unityBackgroundScaleMode = ScaleMode.ScaleAndCrop;\r\n            }\r\n\r\n            startBtn = root.Q<Button>(\"title-start\");\r\n            settingsBtn = root.Q<Button>(\"title-settings\");\r\n\r\n            if (startBtn != null) startBtn.clicked += HandleStart;\r\n\r\n            // 설정 컨트롤러가 이 타이틀 씬에 없으면 설정 버튼은 숨김\r\n            if (settingsBtn != null)\r\n            {\r\n                if (settingsController != null) settingsBtn.clicked += HandleSettings;\r\n                else settingsBtn.style.display = DisplayStyle.None;\r\n            }\r\n\r\n            // 로그인 분기 신호 구독 (게임 시작 누를 때까지 보류했다가 처리)\r\n            AccountEvents.OnNeedLogin += HandleNeedLogin;\r\n            AccountEvents.OnUserDataLoaded += HandleUserDataLoaded;\r\n\r\n            // 계정 탈퇴 후 복귀: OnNeedLogin을 놓쳤으므로 \"로그인 필요\"로 간주.\r\n            if (StartOnLoginScreen)\r\n            {\r\n                StartOnLoginScreen = false;\r\n                _needLogin = true;\r\n            }\r\n        }\r\n\r\n        private void OnDisable()\r\n        {\r\n            if (startBtn != null) startBtn.clicked -= HandleStart;\r\n            if (settingsBtn != null && settingsController != null) settingsBtn.clicked -= HandleSettings;\r\n\r\n            AccountEvents.OnNeedLogin -= HandleNeedLogin;\r\n            AccountEvents.OnUserDataLoaded -= HandleUserDataLoaded;\r\n        }\r\n\r\n        // ── 네트워크 이벤트 (게임 시작 전이면 보류) ──────────\r\n        private void HandleNeedLogin()\r\n        {\r\n            _needLogin = true;\r\n            if (_startPressed) ShowLoginForm();\r\n        }\r\n\r\n        private void HandleUserDataLoaded(UserData data)\r\n        {\r\n            if (!_startPressed)\r\n            {\r\n                // 게임 시작 전에 로그인이 먼저 끝난 경우 → 데이터만 보관.\r\n                _pendingUserData = data;\r\n                _hasPendingUser = true;\r\n                return;\r\n            }\r\n            RouteAfterLogin(data);\r\n        }\r\n\r\n        // ── 게임 시작 버튼 ───────────────────────────────────\r\n        private void HandleStart()\r\n        {\r\n            if (loading) return;   // 더블클릭 가드\r\n            UiSfxEvent.Click();\r\n            _startPressed = true;\r\n\r\n            if (_hasPendingUser)        // 이미 로그인됨 → 튜토리얼 여부로 라우팅\r\n                RouteAfterLogin(_pendingUserData);\r\n            else if (_needLogin)        // 로그인 필요 → 로그인 폼\r\n                ShowLoginForm();\r\n            else                        // 아직 분기 전 → 버튼 잠그고 대기(이벤트 오면 처리)\r\n                SetStartWaiting();\r\n        }\r\n\r\n        private void ShowLoginForm()\r\n        {\r\n            if (loginController != null) loginController.Show();\r\n            else Debug.LogError(\"[Title] loginController 미할당 — 인스펙터에 로그인 패널을 드래그하세요.\");\r\n        }\r\n\r\n        // ── 라우팅: 튜토리얼 완료 여부가 유일한 기준 ─────────\r\n        private void RouteAfterLogin(UserData data)\r\n        {\r\n            if (loading) return;\r\n\r\n            bool done = data != null && data._tutorialDone;\r\n            string scene = done ? gameSceneName : tutorialSceneName;\r\n\r\n            Debug.Log($\"[Title] 로그인 완료 nick={data?._userNick} tutorialDone={done} → \" +\r\n                      $\"{(done ? \"메인\" : \"튜토리얼\")} scene='{scene}'\");\r\n\r\n            BeginLoad(scene);\r\n        }\r\n\r\n        private void SetStartWaiting()\r\n        {\r\n            if (startBtn != null)\r\n            {\r\n                startBtn.text = \"로그인 확인 중…\";\r\n                startBtn.SetEnabled(false);\r\n            }\r\n        }\r\n\r\n        private void BeginLoad(string scene)\r\n        {\r\n            if (loading) return;\r\n\r\n            if (string.IsNullOrEmpty(scene))\r\n            {\r\n                Debug.LogError(\"[Title] 로드할 씬 이름이 비어있음. 인스펙터에 씬 이름을 넣어줘.\");\r\n                return;\r\n            }\r\n\r\n            loading = true;\r\n\r\n            // 시작 버튼을 \"불러오는 중…\"으로 바꾸고 누름 방지\r\n            if (startBtn != null)\r\n            {\r\n                startBtn.text = \"불러오는 중…\";\r\n                startBtn.SetEnabled(false);\r\n            }\r\n            if (settingsBtn != null) settingsBtn.SetEnabled(false);\r\n\r\n            StartCoroutine(LoadSceneAsync(scene));\r\n        }\r\n\r\n        private IEnumerator LoadSceneAsync(string scene)\r\n        {\r\n            // 비동기 로드: 프레임마다 조금씩 → 화면 안 얼음\r\n            var op = SceneManager.LoadSceneAsync(scene);\r\n            while (!op.isDone)\r\n            {\r\n                // op.progress(0~1)로 진행률을 알 수 있음. 진행바 붙일 때 여기 사용.\r\n                yield return null;\r\n            }\r\n        }\r\n\r\n        private void HandleSettings()\r\n        {\r\n            settingsController.Show();\r\n        }\r\n    }\r\n}","lines":186},{"id":"Scripts/FX/SFX/SceneBgm.cs","name":"SceneBgm","path":"Scripts/FX/SFX/SceneBgm.cs","layer":"FX","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"씬 로드 시 지정 BGM 재생","src":"using System.Collections;\r\nusing UnityEngine;\r\nusing Wooduduk.SFX;\r\n\r\nnamespace Wooduduk.Audio\r\n{\r\n    // 씬 로드 시 지정 BGM 재생\r\n    public class SceneBgm : MonoBehaviour\r\n    {\r\n        [SerializeField] private BgmId _bgm = BgmId.Ingame;  // 이 씬의 배경음\r\n        [SerializeField] private float _readyTimeout = 6f;   // SoundManager 대기 한도(초)\r\n        [SerializeField] private bool _stopOnDisable = false;\r\n\r\n        private void OnEnable() => StartCoroutine(PlayWhenReady());\r\n        private void OnDisable()\r\n        {\r\n            if (_stopOnDisable && SoundManager.Instance != null) SoundManager.Instance.StopBgm();\r\n        }\r\n\r\n        private IEnumerator PlayWhenReady()\r\n        {\r\n            float t = _readyTimeout;\r\n            while (SoundManager.Instance == null && t > 0f) { t -= Time.unscaledDeltaTime; yield return null; }\r\n\r\n            var sm = SoundManager.Instance;\r\n            if (sm == null)\r\n            {\r\n                Debug.LogWarning($\"SoundManager 없음/ BGM({_bgm}) 미재생\");\r\n                yield break;\r\n            }\r\n            sm.PlayBgm(_bgm);   // 같은 id면 SoundManager가 무시, 다른 id면 페이드 전환(기존 로직)\r\n        }\r\n    }\r\n}","lines":34},{"id":"Scripts/FX/SFX/SceneAmbient.cs","name":"SceneAmbient","path":"Scripts/FX/SFX/SceneAmbient.cs","layer":"FX","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"(요약 없음)","src":"using System.Collections;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.SFX\r\n{ \r\n    public sealed class SceneAmbient : MonoBehaviour\r\n    {\r\n        [SerializeField] private AmbientId _ambient = AmbientId.Map; // 이 씬의 환경음\r\n        [SerializeField] private float _readyTimeout = 5f;           // SoundManager 대기 한도(초)\r\n\r\n        private bool _playing;\r\n\r\n        private void OnEnable() => StartCoroutine(PlayWhenReady());\r\n        private void OnDisable() => Stop();\r\n\r\n        private IEnumerator PlayWhenReady()\r\n        {\r\n            float t = _readyTimeout;\r\n            while (SoundManager.Instance == null && t > 0f) { t -= Time.unscaledDeltaTime; yield return null; }\r\n\r\n            var sm = SoundManager.Instance;\r\n            if (sm == null)\r\n            {\r\n                Debug.LogWarning($\"[SceneAmbience] SoundManager 없음 — 환경음({_ambient}) 미재생. 씬에 SoundManager가 있는지/부트스트랩을 거쳤는지 확인\");\r\n                yield break;\r\n            }\r\n            sm.PlayAmbient(_ambient);\r\n            _playing = true;\r\n        }\r\n\r\n        private void Stop()\r\n        {\r\n            if (!_playing) return;\r\n            _playing = false;\r\n            if (SoundManager.Instance != null) SoundManager.Instance.StopAmbient(_ambient);\r\n        }\r\n    }\r\n}","lines":38},{"id":"Scripts/Network/Firebase/FirebaseManager.cs","name":"FirebaseManager","path":"Scripts/Network/Firebase/FirebaseManager.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"로그인 UI에서 [게스트로 시작하기] 버튼을 눌렀을 때 호출됩니다.","src":"using Firebase;\r\nusing Firebase.Auth;\r\nusing Firebase.Extensions;\r\nusing UnityEngine;\r\nusing System;\r\n\r\nnamespace Wooduduk.Network.Firebase\r\n{\r\n    public class FirebaseManager : MonoBehaviour\r\n    {\r\n        public static FirebaseManager Instance { get; private set; }\r\n\r\n        private FirebaseAuth _auth;\r\n        private bool _isDeletingAccount = false; // 탈퇴 진행 중 플래그\r\n\r\n        public string UserId => _auth?.CurrentUser?.UserId;\r\n        public bool IsDeletingAccount => _isDeletingAccount; // SaveManager가 참조함\r\n\r\n        private void Awake()\r\n        {\r\n            if (Instance == null)\r\n            {\r\n                Instance = this;\r\n                DontDestroyOnLoad(gameObject);\r\n            }\r\n            else\r\n            {\r\n                Destroy(gameObject);\r\n                return;\r\n            }\r\n        }\r\n\r\n        private void Start()\r\n        {\r\n            InitializeFirebase();\r\n        }\r\n\r\n        private void InitializeFirebase()\r\n        {\r\n            FirebaseApp.CheckAndFixDependenciesAsync().ContinueWithOnMainThread(task =>\r\n            {\r\n                DependencyStatus status = task.Result;\r\n                if (status != DependencyStatus.Available)\r\n                {\r\n                    Debug.LogError($\"Firebase 초기화 실패 : {status}\");\r\n                    return;\r\n                }\r\n\r\n                Debug.Log(\"Firebase 초기화 성공\");\r\n                _auth = FirebaseAuth.DefaultInstance;\r\n\r\n                // ★ 자동 로그인 확인 (무조건 익명 로그인하지 않음)\r\n                CheckExistingLogin();\r\n            });\r\n        }\r\n\r\n        // =========================================================\r\n        // 1. 기존 로그인 기록 확인 (자동 로그인)\r\n        // =========================================================\r\n        private void CheckExistingLogin()\r\n        {\r\n            FirebaseUser currentUser = _auth.CurrentUser;\r\n\r\n            // 2-1. 이미 로그인된 유저라면 → 토큰 검증 후 자동 로그인\r\n            if (currentUser != null)\r\n            {\r\n                Debug.Log($\"[FirebaseManager] 캐시된 유저 발견: {currentUser.UserId}, 토큰 검증 중...\");\r\n\r\n                currentUser.ReloadAsync().ContinueWithOnMainThread(reloadTask =>\r\n                {\r\n                    if (reloadTask.IsFaulted || reloadTask.IsCanceled)\r\n                    {\r\n                        Debug.LogWarning(\"[FirebaseManager] 캐시된 유저 무효 → 로그인 UI 표시\");\r\n                        _auth.SignOut();\r\n                        AccountEvents.RaiseNeedLogin();\r\n                    }\r\n                    else\r\n                    {\r\n                        Debug.Log($\"[FirebaseManager] 자동 로그인 성공: {currentUser.UserId}\");\r\n                        AccountEvents.RaiseLoginSucceeded(currentUser.UserId, string.Empty);\r\n                    }\r\n                });\r\n            }\r\n            // 2-2. 로그인 기록이 없다면 → 로그인 선택 UI 표시\r\n            else\r\n            {\r\n                Debug.Log(\"[FirebaseManager] 로그인 기록 없음 → 로그인 UI 표시\");\r\n                AccountEvents.RaiseNeedLogin();\r\n            }\r\n        }\r\n\r\n        // =========================================================\r\n        // 2. 게스트(익명) 로그인 - 버튼 클릭 시에만 호출\r\n        // =========================================================\r\n        /// <summary>\r\n        /// 로그인 UI에서 [게스트로 시작하기] 버튼을 눌렀을 때 호출됩니다.\r\n        /// </summary>\r\n        public void SignInAsGuest()\r\n        {\r\n            if (_auth.CurrentUser != null)\r\n            {\r\n                Debug.LogWarning(\"[FirebaseManager] 이미 로그인된 상태입니다.\");\r\n                return;\r\n            }\r\n\r\n            Debug.Log(\"[FirebaseManager] 게스트(익명) 로그인 시작...\");\r\n            _auth.SignInAnonymouslyAsync().ContinueWithOnMainThread(task =>\r\n            {\r\n                if (task.IsCanceled || task.IsFaulted)\r\n                {\r\n                    Debug.LogError($\"[FirebaseManager] 게스트 로그인 실패: {task.Exception}\");\r\n                    return;\r\n                }\r\n\r\n                string uid = _auth.CurrentUser.UserId;\r\n                string nickname = UserService.GenerateRandomNickname();\r\n                Debug.Log($\"[FirebaseManager] 게스트 로그인 성공: {uid}, 닉네임: {nickname}\");\r\n\r\n                AccountEvents.RaiseLoginSucceeded(uid, nickname);\r\n            });\r\n        }\r\n\r\n        // =========================================================\r\n        // 2-1. 게스트 로그인 + 닉네임 직접 입력 (아이디 생성 버튼용)\r\n        // =========================================================\r\n        /// <summary>\r\n        /// 닉네임 입력 UI 에서 입력 완료 후 호출됩니다.\r\n        /// </summary>\r\n        public void SignInWithCustomNickname(string nickname)\r\n        {\r\n            if (_auth.CurrentUser != null)\r\n            {\r\n                Debug.LogWarning(\"[FirebaseManager] 이미 로그인된 상태입니다.\");\r\n                return;\r\n            }\r\n\r\n            Debug.Log($\"[FirebaseManager] 커스텀 닉네임 로그인 시작... (닉네임: {nickname})\");\r\n            _auth.SignInAnonymouslyAsync().ContinueWithOnMainThread(task =>\r\n            {\r\n                if (task.IsCanceled || task.IsFaulted)\r\n                {\r\n                    Debug.LogError($\"[FirebaseManager] 커스텀 닉네임 로그인 실패: {task.Exception}\");\r\n                    return;\r\n                }\r\n\r\n                string uid = _auth.CurrentUser.UserId;\r\n                Debug.Log($\"[FirebaseManager] 커스텀 닉네임 로그인 성공: {uid}\");\r\n\r\n                // ★ 입력된 닉네임 전달 (빈 값이 아님)\r\n                AccountEvents.RaiseLoginSucceeded(uid, nickname);\r\n            });\r\n        }\r\n\r\n        // =========================================================\r\n        // 3. 구글 로그인 / 연동 (기존 유지)\r\n        // =========================================================\r\n        public void LoginWithGoogle(string idToken)\r\n        {\r\n            Credential credential = GoogleAuthProvider.GetCredential(idToken, null);\r\n            _auth.SignInWithCredentialAsync(credential).ContinueWithOnMainThread(task =>\r\n            {\r\n                if (task.IsFaulted)\r\n                {\r\n                    Debug.LogError(task.Exception);\r\n                    return;\r\n                }\r\n                string uid = _auth.CurrentUser.UserId;\r\n                AccountEvents.RaiseLoginSucceeded(uid, \"\");\r\n            });\r\n        }\r\n\r\n        public void LinkGoogleAccount(string idToken)\r\n        {\r\n            FirebaseUser currentUser = _auth.CurrentUser;\r\n            if (currentUser == null) return;\r\n\r\n            Credential credential = GoogleAuthProvider.GetCredential(idToken, null);\r\n            currentUser.LinkWithCredentialAsync(credential).ContinueWithOnMainThread(task =>\r\n            {\r\n                if (task.IsFaulted)\r\n                {\r\n                    Debug.LogError(task.Exception);\r\n                    return;\r\n                }\r\n                Debug.Log(\"[FirebaseManager] 구글 계정 연동 성공\");\r\n            });\r\n        }\r\n\r\n        // =========================================================\r\n        // 4. 로그아웃\r\n        // =========================================================\r\n        public void Logout()\r\n        {\r\n            if (_auth == null) return;\r\n            _auth.SignOut();\r\n            Debug.Log(\"[FirebaseManager] 로그아웃 완료\");\r\n\r\n            // 로그아웃 시 다시 로그인 선택 UI로 돌아감\r\n            AccountEvents.RaiseNeedLogin();\r\n        }\r\n\r\n        // =========================================================\r\n        // 5. 계정 탈퇴 (설정 메뉴에서 호출 - DB 먼저 삭제!)\r\n        // =========================================================\r\n        // =========================================================\r\n        // ★★★ 계정 탈퇴 (익명 전용, 클라이언트 직접 삭제 + 토큰 갱신 안전장치) ★★★\r\n        // =========================================================\r\n        /// <summary>\r\n        /// 익명 계정 전용 탈퇴 처리.\r\n        /// 삭제 직전 토큰을 강제 갱신하여 requires-recent-login 에러를 방지합니다.\r\n        /// 순서: DB 데이터 삭제 → 토큰 갱신 → Auth 계정 삭제 → SignOut\r\n        /// </summary>\r\n        public void RequestAccountDeletion(Action onDeleted, Action<string> onError)\r\n        {\r\n            if (_auth?.CurrentUser == null)\r\n            {\r\n                onError?.Invoke(\"로그인이 필요합니다.\");\r\n                return;\r\n            }\r\n\r\n            var user = _auth.CurrentUser;\r\n\r\n            // ★ 안전장치: 익명 계정이 아니면 (구글 등 연동된 경우) 별도 처리 필요할 수 있음\r\n            if (!user.IsAnonymous)\r\n            {\r\n                Debug.LogWarning(\"[FirebaseManager] 익명 계정이 아닙니다. 삭제 정책을 확인하세요.\");\r\n                // 필요하면 여기서 onError로 막을 수도 있음\r\n            }\r\n\r\n            _isDeletingAccount = true;\r\n            string uid = user.UserId;\r\n\r\n            Debug.Log($\"[FirebaseManager] 계정 탈퇴 시작 - UID: {uid}\");\r\n\r\n            // 1단계: DB 데이터 먼저 삭제 (Auth가 살아있어야 권한이 있음)\r\n            if (SaveManager.Instance == null)\r\n            {\r\n                _isDeletingAccount = false;\r\n                onError?.Invoke(\"SaveManager를 찾을 수 없습니다.\");\r\n                return;\r\n            }\r\n\r\n            SaveManager.Instance.DeleteUserData(\r\n              uid,\r\n              () =>\r\n              {\r\n                  Debug.Log(\"[FirebaseManager] DB 데이터 삭제 완료 - 토큰 갱신 시작\");\r\n\r\n                  user.TokenAsync(true).ContinueWithOnMainThread(tokenTask =>\r\n                  {\r\n                      if (tokenTask.IsFaulted || tokenTask.IsCanceled)\r\n                      {\r\n                          _isDeletingAccount = false;\r\n                          Debug.LogError($\"[FirebaseManager] 토큰 갱신 실패: {tokenTask.Exception}\");\r\n                          onError?.Invoke(\"인증 갱신에 실패했습니다. 다시 시도해주세요.\");\r\n                          return;\r\n                      }\r\n\r\n                      Debug.Log(\"[FirebaseManager] 토큰 갱신 완료 - Auth 계정 삭제 시작\");\r\n\r\n                      user.DeleteAsync().ContinueWithOnMainThread(deleteTask =>\r\n                      {\r\n                          if (deleteTask.IsCanceled)\r\n                          {\r\n                              _isDeletingAccount = false;\r\n                              onError?.Invoke(\"작업이 취소되었습니다.\");\r\n                              return;\r\n                          }\r\n\r\n                          if (deleteTask.IsFaulted)\r\n                          {\r\n                              _isDeletingAccount = false;\r\n                              Debug.LogError($\"[FirebaseManager] Auth 계정 삭제 실패: {deleteTask.Exception}\");\r\n\r\n                              string msg = \"계정 삭제에 실패했습니다.\";\r\n\r\n                              if (deleteTask.Exception != null)\r\n                              {\r\n                                  foreach (var ex in deleteTask.Exception.Flatten().InnerExceptions)\r\n                                  {\r\n                                      if (ex is FirebaseException firebaseException)\r\n                                      {\r\n                                          Debug.LogError($\"Firebase ErrorCode : {firebaseException.ErrorCode}\");\r\n                                      }\r\n                                  }\r\n                              }\r\n\r\n                              onError?.Invoke(msg);\r\n                              return;\r\n                          }\r\n\r\n                          _auth.SignOut();\r\n                          _isDeletingAccount = false;\r\n\r\n                          Debug.Log(\"[FirebaseManager] 탈퇴 완료 - 모든 데이터 삭제됨\");\r\n                          onDeleted?.Invoke();\r\n\r\n                          AccountEvents.RaiseNeedLogin();\r\n                      });\r\n                  });\r\n              },\r\n              error =>\r\n              {\r\n                  _isDeletingAccount = false;\r\n                  Debug.LogError($\"[FirebaseManager] DB 삭제 실패 : {error}\");\r\n                  onError?.Invoke(error);\r\n              });\r\n        }\r\n    }\r\n}","lines":310},{"id":"Scripts/FX/SFX/SoundManager.cs","name":"SoundManager","path":"Scripts/FX/SFX/SoundManager.cs","layer":"FX","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"단일 오디오 권한자. BGM/환경음/SFX/UI를 한 곳에서 관리 순수 로컬 연출","src":"﻿using System.Collections;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing UnityEngine.Audio;\r\nusing Wooduduk.Data.DataSO;\r\n\r\nnamespace Wooduduk.SFX\r\n{\r\n    // 단일 오디오 권한자. BGM/환경음/SFX/UI를 한 곳에서 관리\r\n    // 순수 로컬 연출\r\n    public sealed class SoundManager : MonoBehaviour\r\n    {\r\n        public static SoundManager Instance { get; private set; }\r\n\r\n        [Header(\"Data\")]\r\n        [SerializeField] private SoundCatalogSO _catalog;\r\n\r\n        [Header(\"Mixer Group\")]\r\n        [SerializeField] private AudioMixerGroup _bgmGroup;\r\n        [SerializeField] private AudioMixerGroup _sfxGroup;\r\n\r\n        [Header(\"SFX Pool\")]\r\n        [SerializeField, Min(1)] private int _sfxVoices = 8;       // 동시 재생 보이스\r\n        [SerializeField, Min(0)] private int _noRepeatWindow = 2;  // 직전 n개 클립 회피\r\n\r\n        [Header(\"BGM\")]\r\n        [SerializeField] private float _bgmFadeSeconds = 1f;\r\n        private Coroutine _bgmRotate;\r\n        private int _bgmCursor;              // 순차 재생 커서\r\n        private int _recentBgmTrack = -1;    // 셔플 직전 곡 회피\r\n\r\n        public SoundCatalogSO Catalog => _catalog;\r\n        public AudioMixerGroup SfxGroup => _sfxGroup;\r\n\r\n        private AudioSource _bgmSource;\r\n        private AudioSource[] _sfxPool;\r\n        private int _sfxCursor;\r\n        private Coroutine _bgmFade;\r\n        private BgmId _currentBgm = BgmId.None;\r\n\r\n        private readonly Dictionary<AmbientId, AudioSource> _ambientSources = new(); // 채널별 독립 루프\r\n        private readonly Dictionary<AudioClip[], List<int>> _recent = new(); // 무반복 랜덤 상태\r\n        private readonly Dictionary<SfxId, SoundCatalogSO.SfxEntry> _sfxCache = new();   // 핫패스 캐싱\r\n\r\n        private void Awake()\r\n        {\r\n            if (Instance != null && Instance != this) { Destroy(gameObject); return; }\r\n            Instance = this;\r\n            DontDestroyOnLoad(gameObject);\r\n            BuildCache();\r\n            BuildSources();\r\n        }\r\n        private void OnDestroy() { if (Instance == this) Instance = null; }\r\n\r\n        private void BuildCache()\r\n        {\r\n            _sfxCache.Clear();\r\n            if (_catalog?._sfx == null) return;\r\n            foreach (var e in _catalog._sfx) if (e != null && !_sfxCache.ContainsKey(e._id)) _sfxCache[e._id] = e;\r\n        }\r\n        private void BuildSources()\r\n        {\r\n            _bgmSource = CreateSource(\"BGM\", _bgmGroup, loop: true, priority: 0);          // 음악은 0 고정(유니티 공식 권장)\r\n            _bgmSource.bypassReverbZones = true;\r\n            _sfxPool = new AudioSource[_sfxVoices];\r\n            for (int i = 0; i < _sfxVoices; i++)\r\n                _sfxPool[i] = CreateSource(\"SFX_\" + i, _sfxGroup, loop: false, priority: 170);\r\n\r\n        }\r\n        private AudioSource CreateSource(string label, AudioMixerGroup group, bool loop, int priority = 170)\r\n        {\r\n            var go = new GameObject(label); go.transform.SetParent(transform);\r\n            var src = go.AddComponent<AudioSource>();\r\n            src.playOnAwake = false; src.loop = loop; src.spatialBlend = 0f;\r\n            src.priority = priority;\r\n            src.outputAudioMixerGroup = group;\r\n            return src;\r\n        }\r\n\r\n        // SFX / UI\r\n        public void PlaySfx(SfxId id) => PlaySfxCore(id, 1f, null);\r\n        public void PlaySfx(SfxId id, float pitchScale) => PlaySfxCore(id, pitchScale, null);\r\n        public void PlaySfxAt(SfxId id, Vector3 pos, float pitchScale = 1f) => PlaySfxCore(id, pitchScale, pos);\r\n        private void PlaySfxCore(SfxId id, float pitchScale, Vector3? pos)\r\n        {\r\n            if (_catalog == null) return;\r\n            if (!_sfxCache.TryGetValue(id, out var e))\r\n            { BuildCache(); if (!_sfxCache.TryGetValue(id, out e)) return; }\r\n\r\n            PlayOneLayer(e, e._clips, e._volume, e._pitchRange, pitchScale, 0f, pos);\r\n            if (e._layers == null) return;\r\n            for (int i = 0; i < e._layers.Length; i++)\r\n            {\r\n                var l = e._layers[i];\r\n                if (l != null) PlayOneLayer(e, l._clips, l._volume, l._pitchRange, pitchScale, l._delay, pos);\r\n            }\r\n        }\r\n        private void PlayOneLayer(SoundCatalogSO.SfxEntry e, AudioClip[] clips, float volume,\r\n                          Vector2 pitchRange, float pitchScale, float delay, Vector3? pos)\r\n        {\r\n            if (clips == null || clips.Length == 0) return;\r\n            var src = _sfxPool[_sfxCursor];\r\n            _sfxCursor = (_sfxCursor + 1) % _sfxPool.Length;\r\n\r\n            // 위치·공간감은 샷 단위로 설정. pos 없으면 2D(리스너 부착) + 리버브 존 제외\r\n            if (pos.HasValue)\r\n            {\r\n                src.transform.position = pos.Value;\r\n                src.spatialBlend = e._spatialBlend;        // 엔트리가 0이면 pos 줘도 2D(비다이제틱 예외 허용)\r\n                src.minDistance = e._minDistance;\r\n                src.maxDistance = e._maxDistance;\r\n                src.bypassReverbZones = false;\r\n            }\r\n            else\r\n            {\r\n                src.spatialBlend = 0f;\r\n                src.bypassReverbZones = true;              // UI가 동굴 울림 먹는 것 방지\r\n            }\r\n\r\n            float pitch = Random.Range(pitchRange.x, pitchRange.y) * pitchScale;\r\n            var clip = PickNoRepeat(clips);\r\n            if (delay <= 0f) { src.pitch = pitch; src.PlayOneShot(clip, volume); }\r\n            else StartCoroutine(DelayedOneShot(src, clip, volume, pitch, delay));\r\n        }\r\n        private IEnumerator DelayedOneShot(AudioSource src, AudioClip clip, float volume, float pitch, float delay)\r\n        {\r\n            yield return new WaitForSecondsRealtime(delay);     // timeScale 무관(슬로모 연출 중 타이밍 유지)\r\n            if (src != null) { src.pitch = pitch; src.PlayOneShot(clip, volume); }\r\n        }\r\n        private AudioClip PickNoRepeat(AudioClip[] clips)\r\n        {\r\n            if (clips.Length == 1) return clips[0];\r\n            if (!_recent.TryGetValue(clips, out var recent)) { recent = new List<int>(); _recent[clips] = recent; }\r\n            int window = Mathf.Clamp(_noRepeatWindow, 0, clips.Length - 1);\r\n            int idx, guard = 0;\r\n            do { idx = Random.Range(0, clips.Length); guard++; } while (recent.Contains(idx) && guard < 32);\r\n            recent.Add(idx); while (recent.Count > window) recent.RemoveAt(0);\r\n            return clips[idx];\r\n        }\r\n\r\n        // BGM\r\n        public void PlayBgm(BgmId id, bool fade = true)\r\n        {\r\n            if (_catalog == null || id == _currentBgm) return;\r\n            var e = _catalog.GetBgm(id);\r\n            if (e == null || e._clips == null || e._clips.Length == 0) return;\r\n            _currentBgm = id;\r\n            _bgmCursor = 0;\r\n            StopBgmRotation();\r\n            if (_bgmFade != null) StopCoroutine(_bgmFade);\r\n            if (fade && _bgmFadeSeconds > 0f && isActiveAndEnabled) _bgmFade = StartCoroutine(FadeToBgm(e));\r\n            else StartBgmTrack(e, NextBgmClip(e), e._volume);\r\n        }\r\n        public void StopBgm()\r\n        {\r\n            _currentBgm = BgmId.None;\r\n            StopBgmRotation();\r\n            if (_bgmSource != null) _bgmSource.Stop();\r\n        }\r\n        private void StartBgmTrack(SoundCatalogSO.BgmEntry e, AudioClip clip, float volume)\r\n        {\r\n            _bgmSource.clip = clip;\r\n            _bgmSource.volume = volume;\r\n            _bgmSource.loop = e._clips.Length == 1;               // 단일 곡만 하드 루프\r\n            _bgmSource.Play();\r\n            if (e._clips.Length > 1) _bgmRotate = StartCoroutine(RotateBgm(e)); // 곡 끝 감시 → 다음 곡\r\n        }\r\n\r\n        private IEnumerator RotateBgm(SoundCatalogSO.BgmEntry e)\r\n        {\r\n            while (true)\r\n            {\r\n                while (_bgmSource.isPlaying) yield return null;   // 곡 종료 대기(앱 일시정지 중엔 게임째 멈추므로 안전)\r\n                _bgmSource.clip = NextBgmClip(e);\r\n                _bgmSource.Play();\r\n            }\r\n        }\r\n\r\n        private AudioClip NextBgmClip(SoundCatalogSO.BgmEntry e)\r\n        {\r\n            if (e._clips.Length == 1) return e._clips[0];\r\n            if (!e._shuffle) return e._clips[_bgmCursor++ % e._clips.Length];  // 순차\r\n            int idx, guard = 0;                                                // 셔플: 직전 곡만 회피\r\n            do { idx = Random.Range(0, e._clips.Length); guard++; } while (idx == _recentBgmTrack && guard < 8);\r\n            _recentBgmTrack = idx;\r\n            return e._clips[idx];\r\n        }\r\n        private void StopBgmRotation()\r\n        {\r\n            if (_bgmRotate != null)\r\n            {\r\n                StopCoroutine(_bgmRotate);\r\n                _bgmRotate = null;\r\n            }\r\n        }\r\n        private IEnumerator FadeToBgm(SoundCatalogSO.BgmEntry e)\r\n        {\r\n            float half = _bgmFadeSeconds * 0.5f, t = 0f, start = _bgmSource.volume;\r\n            while (t < half) { t += Time.unscaledDeltaTime; _bgmSource.volume = Mathf.Lerp(start, 0f, t / half); yield return null; }\r\n            StartBgmTrack(e, NextBgmClip(e), 0f);                 // 볼륨 0으로 시작 → 페이드 인\r\n            t = 0f;\r\n            while (t < half) { t += Time.unscaledDeltaTime; _bgmSource.volume = Mathf.Lerp(0f, e._volume, t / half); yield return null; }\r\n            _bgmSource.volume = e._volume; _bgmFade = null;\r\n        }\r\n\r\n        // 환경음\r\n        public void PlayAmbient(AmbientId id) => PlayAmbientInternal(id, null);\r\n\r\n        // 위치기반(3D) 환경음\r\n        public void PlayAmbientAt(AmbientId id, Vector3 worldPos) => PlayAmbientInternal(id, worldPos);\r\n\r\n        private void PlayAmbientInternal(AmbientId id, Vector3? worldPos)\r\n        {\r\n            if (_catalog == null) return;\r\n            var e = _catalog.GetAmbient(id);\r\n            if (e == null || e._clip == null) return;\r\n\r\n            if (!_ambientSources.TryGetValue(id, out var src) || src == null)\r\n            {\r\n                src = CreateSource(\"Ambient_\" + id, _sfxGroup, loop: true, priority: 16);\r\n                _ambientSources[id] = src;\r\n            }\r\n            src.spatialBlend = e._spatialBlend;\r\n            src.bypassReverbZones = e._spatialBlend <= 0f; // 2D 환경음은 리버브 존 제외\r\n            src.minDistance = e._minDistance;\r\n            src.maxDistance = e._maxDistance;\r\n            if (worldPos.HasValue) src.transform.position = worldPos.Value;\r\n\r\n            if (src.isPlaying && src.clip == e._clip) return;  // 재시작 팝 방지(기존 유지)\r\n            src.clip = e._clip; src.volume = e._volume; src.Play();\r\n        }\r\n        public void StopAmbient(AmbientId id)\r\n        {\r\n            if (_ambientSources.TryGetValue(id, out var src) && src != null) src.Stop();\r\n        }\r\n        // 씬 전환 정리\r\n        public void StopAll()\r\n        {\r\n            StopBgm();\r\n            if (_sfxPool != null) foreach (var s in _sfxPool) if (s != null) s.Stop();\r\n        }\r\n        public void StopAllAmbient()\r\n        {\r\n            foreach (var kv in _ambientSources) if (kv.Value != null) kv.Value.Stop();\r\n        }\r\n    }\r\n}","lines":247},{"id":"Scripts/FX/SFX/ReelAudioDirector.cs","name":"ReelAudioDirector","path":"Scripts/FX/SFX/ReelAudioDirector.cs","layer":"FX","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"단일 슬롯 오디오 디렉터","src":"﻿using System.Collections;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.DataSO;\r\nusing Wooduduk.Slot;\r\nusing Wooduduk.Slot.Machine;\r\n\r\nnamespace Wooduduk.SFX\r\n{\r\n    // 단일 슬롯 오디오 디렉터\r\n    public sealed class ReelAudioDirector : MonoBehaviour\r\n    {\r\n        private SoundManager S => SoundManager.Instance;\r\n\r\n        // 릴 개수가 인게임 중에 변할 수 있으므로 List 사용\r\n        private List<AudioSource> _reelSources = new List<AudioSource>();\r\n        private List<Coroutine> _reelRoutines = new List<Coroutine>();\r\n        private int _recentStopClipIndex = -1;\r\n\r\n        private void OnEnable()\r\n        {\r\n            SlotEvent.OnReelsDecided += HandleReelsDecided; \r\n            SlotEvent.OnReelStopped += HandleReelStopped;\r\n        }\r\n\r\n        private void OnDisable()\r\n        {\r\n            SlotEvent.OnReelsDecided -= HandleReelsDecided;\r\n            SlotEvent.OnReelStopped -= HandleReelStopped;\r\n\r\n            StopAllReelCoroutines();\r\n        }\r\n\r\n        // 실제 필요한 릴 개수(targetCount)만큼만 AudioSource를 동적으로 생성 및 풀링\r\n        private void EnsureReelCapacity(int targetCount)\r\n        {\r\n            while (_reelSources.Count < targetCount)\r\n            {\r\n                int i = _reelSources.Count;\r\n                var go = new GameObject($\"ReelAudioSource_{i}\");\r\n                go.transform.SetParent(transform);\r\n\r\n                var src = go.AddComponent<AudioSource>();\r\n                src.playOnAwake = false;\r\n                src.loop = false;\r\n                src.spatialBlend = 1f;                      \r\n                go.transform.position = transform.position;\r\n                // 생성 즉시 믹서 그룹 할당\r\n                if (S != null && S.SfxGroup != null)\r\n                {\r\n                    src.outputAudioMixerGroup = S.SfxGroup;\r\n                }\r\n\r\n                _reelSources.Add(src);\r\n                _reelRoutines.Add(null);\r\n            }\r\n        }\r\n\r\n        //// 슬롯 애니메이션 연동 사운드\r\n\r\n        //private void HandleAxeSwing()\r\n        //{\r\n        //    if (S) S.PlaySfx(SfxId.AxeSwing);\r\n        //}\r\n\r\n        //private void HandleSpinStarted()\r\n        //{\r\n        //    if (S == null || S.Catalog == null) return;\r\n        //    S.PlaySfx(SfxId.LeverPull);\r\n        //}\r\n\r\n        // 스윙 즉시 결과가 확정되며 브로드캐스트됨. 여기서 이번 턴의 정확한 릴 개수를 알 수 있음.\r\n        private void HandleReelsDecided(SpinResult result)\r\n        {\r\n            if (S == null || S.Catalog == null || result == null) return;\r\n\r\n            int actualReelCount = result.Reels.Length;\r\n            EnsureReelCapacity(actualReelCount); // 부족한 오디오 소스가 있다면 동적 생성\r\n\r\n            var reelConfig = S.Catalog._reel;\r\n            if (reelConfig?._rollTickClips == null || reelConfig._rollTickClips.Length == 0) return;\r\n\r\n            // 확정된 릴 개수만큼 회전음 코루틴 시작\r\n            for (int i = 0; i < actualReelCount; i++)\r\n            {\r\n                if (_reelRoutines[i] != null) StopCoroutine(_reelRoutines[i]);\r\n                _reelRoutines[i] = StartCoroutine(ReelTickingRoutine(i, reelConfig));\r\n            }\r\n        }\r\n\r\n        private void HandleReelStopped(int reelIndex)\r\n        {\r\n            if (S == null || S.Catalog == null) return;\r\n\r\n            // 방어 코드: 생성된 AudioSource 범위를 넘어서면 무시\r\n            if (reelIndex < 0 || reelIndex >= _reelSources.Count) return;\r\n\r\n            var reelConfig = S.Catalog._reel;\r\n\r\n            // 돌고 있던 틱 사운드 코루틴 종료\r\n            if (_reelRoutines[reelIndex] != null)\r\n            {\r\n                StopCoroutine(_reelRoutines[reelIndex]);\r\n                _reelRoutines[reelIndex] = null;\r\n            }\r\n            _reelSources[reelIndex].Stop();\r\n\r\n            // 정지 사운드 재생\r\n            if (reelConfig._stopClips != null && reelConfig._stopClips.Length > 0)\r\n            {\r\n                var src = _reelSources[reelIndex];\r\n                // 왼쪽에서 오른쪽으로 갈수록 피치가 상승하는 연출 (찰진 타격감)\r\n                src.pitch = reelConfig._stopBasePitch + (reelIndex * reelConfig._stopPitchStep);\r\n                src.PlayOneShot(PickRandomStopClip(reelConfig._stopClips), reelConfig._volume);\r\n            }\r\n        }\r\n\r\n        private IEnumerator ReelTickingRoutine(int index, SoundCatalogSO.ReelConfig config)\r\n        {\r\n            var src = _reelSources[index];\r\n            var wait = new WaitForSeconds(Mathf.Max(0.01f, config._tickInterval));\r\n\r\n            // 각 릴마다 약간의 시작 오프셋을 주어 기계적인 동시 재생 방지\r\n            yield return new WaitForSeconds(Random.Range(0f, 0.05f));\r\n\r\n            while (true)\r\n            {\r\n                var clip = config._rollTickClips[Random.Range(0, config._rollTickClips.Length)];\r\n                src.pitch = Random.Range(0.95f, 1.05f); // 틱마다 미세한 피치 변화\r\n                src.PlayOneShot(clip, config._volume);\r\n                yield return wait;\r\n            }\r\n        }\r\n\r\n        private AudioClip PickRandomStopClip(AudioClip[] clips)\r\n        {\r\n            if (clips.Length == 1) return clips[0];\r\n            int idx;\r\n            int guard = 0;\r\n            // 소리가 연달아 나지 않도록 방지\r\n            do { idx = Random.Range(0, clips.Length); guard++; }\r\n            while (idx == _recentStopClipIndex && guard < 10);\r\n\r\n            _recentStopClipIndex = idx;\r\n            return clips[idx];\r\n        }\r\n\r\n        private void StopAllReelCoroutines()\r\n        {\r\n            for (int i = 0; i < _reelRoutines.Count; i++)\r\n            {\r\n                if (_reelRoutines[i] != null)\r\n                {\r\n                    StopCoroutine(_reelRoutines[i]);\r\n                    _reelRoutines[i] = null;\r\n                }\r\n            }\r\n        }\r\n\r\n\r\n        //// 판정 및 시스템 이벤트 연동\r\n        //private void HandleSpinJudged(SpinOutcome outcome)\r\n        //{\r\n        //    var j = outcome.Judgment;\r\n        //    if (S == null || j == null) return;\r\n\r\n        //    if (!j.IsHit)\r\n        //    {\r\n        //        S.PlaySfx(j.FailReason == FailReason.WORM ? SfxId.WormFail : SfxId.WhiffFail);\r\n        //        return;\r\n        //    }\r\n\r\n        //    S.PlaySfx((int)j.Tier >= (int)SwingTier.Full ? SfxId.HitFull : SfxId.HitWeak);\r\n        //    if (j.IsPerfect) S.PlaySfx(SfxId.Perfect);\r\n        //}\r\n\r\n        //private void HandleEffectApplied(SlotEffect _) { if (S) S.PlaySfx(SfxId.Makgeolli); }\r\n        //private void HandleSettled(RunProgress _, long movedWood) { if (S) S.PlaySfx(SfxId.Settle); }\r\n        //private void HandleFireFed(RunProgress _) \r\n        //{\r\n        //    if (S) S.PlaySfx(SfxId.FireFeed);\r\n        //    S.StopAmbient(AmbientId.HeartbeatCritical);\r\n        //}\r\n        //private void HandleCritical(RunProgress _) { if (S) S.PlayAmbient(AmbientId.HeartbeatCritical); }\r\n\r\n        //private void HandleDeath(RunProgress _)\r\n        //{\r\n        //    if (S == null) return;\r\n        //    S.PlaySfx(SfxId.Death);\r\n        //    S.StopAllAmbient();\r\n        //}\r\n    }\r\n}","lines":193},{"id":"Scripts/FX/SFX/SlotSfxBinder.cs","name":"SlotSfxBinder","path":"Scripts/FX/SFX/SlotSfxBinder.cs","layer":"FX","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"SlotEvent -> SoundManager 라우팅 어댑터 슬롯 사운드 매핑","src":"﻿\r\nusing System;\r\nusing UnityEngine;\r\nusing Wooduduk.SFX;\r\nusing Wooduduk.Slot;          \r\nusing Wooduduk.Slot.Machine; \r\n\r\nnamespace Wooduduk.Audio\r\n{\r\n    // SlotEvent -> SoundManager 라우팅 어댑터\r\n    // 슬롯 사운드 매핑\r\n    public sealed class SlotSfxBinder : MonoBehaviour\r\n    {\r\n        private static SoundManager S => SoundManager.Instance;\r\n        [SerializeField] private Transform _machineAnchor;  // 슬롯머신 본체: 타격/레버/심볼매치/에러\r\n        [SerializeField] private Transform _cardAnchor;     // 카드 진열대: 호버/구매\r\n        [SerializeField] private Transform _campfireAnchor; // 모닥불: FireFed/FireOut 폴백(Lit pos가 오면 그걸 캐시)\r\n        [SerializeField] private Transform _settleAnchor;    // 정산 큐브(비우면 머신 위치)\r\n\r\n        private Vector3 _campfirePos;      // OnCampfireLit가 준 실제 위치 캐시(앵커보다 우선)\r\n        private bool _campfirePosValid;\r\n        private SymbolId[] _decidedReels; // 이번 스핀 릴 결과 \r\n        private int[] _symbolSeen;\r\n        private static readonly int SymbolCount = Enum.GetValues(typeof(SymbolId)).Length;\r\n        private bool _pendingMakgeolli;   // 이번 스핀 막걸리 발동 여부(판정 후 발동)\r\n        private SpinOutcome? _pendingOutcome;    // 판정 캐시\r\n        private int _pendingMilestoneIndex = -1; // 콤보 마일스톤 캐시\r\n\r\n        private static SfxId LadderSfxFor(SymbolId s)\r\n        {\r\n            switch (s)\r\n            {\r\n                case SymbolId.SWING: return SfxId.SwingHit;\r\n                case SymbolId.PERFECT: return SfxId.Perfect;\r\n                case SymbolId.FRIEBAT: return SfxId.FireBatOn;\r\n                case SymbolId.ACORN: return SfxId.AcornPop;\r\n                case SymbolId.LUCK: return SfxId.LuckWild;\r\n                case SymbolId.MAKGEOLLI: return SfxId.Makgeolli;\r\n                    case SymbolId.KNOT: return SfxId.Knot;\r\n                    case SymbolId.WORM: return SfxId.WormFail;\r\n                default: return SfxId.None;   // KNOT/WORM/MAKGEOLLI\r\n            }\r\n        }\r\n\r\n        // 앵커 미연결 시 자기 위치 폴백(소리 누락보다 오배치가 낫다)\r\n        private Vector3 MachinePos => _machineAnchor ? _machineAnchor.position : transform.position;\r\n        private Vector3 CardPos => _cardAnchor ? _cardAnchor.position : MachinePos;\r\n        private Vector3 SettlePos => _settleAnchor ? _settleAnchor.position : MachinePos;\r\n        private Vector3 CampfirePos => _campfirePosValid ? _campfirePos\r\n                                     : _campfireAnchor ? _campfireAnchor.position : MachinePos;\r\n\r\n        private void OnEnable()\r\n        {\r\n            SlotEvent.OnAxeSwing += HandleAxeSwing;\r\n            SlotEvent.OnSpinStarted += HandleSpinStarted;\r\n            SlotEvent.OnSpinJudged += HandleSpinJudged;\r\n            //SlotEvent.OnEffectApplied += HandleEffectApplied;\r\n            SlotEvent.OnSettled += HandleSettled;\r\n            SlotEvent.OnFireFed += HandleFireFed;\r\n            SlotEvent.OnBodyTempCritical += HandleCritical;\r\n            SlotEvent.OnDeath += HandleDeath;\r\n            SlotEvent.OnCampfireLit += HandleCampfireLit;\r\n            SlotEvent.OnCampfireOut += HandleCampfireOut;\r\n            SlotEvent.OnReelsDecided += HandleReelsDecided;\r\n            SlotEvent.OnComboMilestone += HandleComboMilestone;\r\n            SlotEvent.OnCostRejected += HandleCostRejected;\r\n            SlotEvent.OnRunReset += HandleRunReset;\r\n            CardEvent.OnCardHover += HandleCardHover;\r\n            CardEvent.OnCardBought += HandleCardBought;\r\n            SlotEvent.OnReelStopped += HandleReelStopped;\r\n            SlotEvent.OnBodyTempRecovered += HandleRecovered;\r\n            SlotEvent.OnSpinCompleted += HandleSpinCompleted;\r\n        }\r\n        private void OnDisable()\r\n        {\r\n            SlotEvent.OnAxeSwing -= HandleAxeSwing;\r\n            SlotEvent.OnSpinStarted -= HandleSpinStarted;\r\n            SlotEvent.OnSpinJudged -= HandleSpinJudged;\r\n            //SlotEvent.OnEffectApplied -= HandleEffectApplied;\r\n            SlotEvent.OnSettled -= HandleSettled;\r\n            SlotEvent.OnFireFed -= HandleFireFed;\r\n            SlotEvent.OnBodyTempCritical -= HandleCritical;\r\n            SlotEvent.OnDeath -= HandleDeath;\r\n            SlotEvent.OnCampfireLit -= HandleCampfireLit;\r\n            SlotEvent.OnCampfireOut -= HandleCampfireOut;\r\n            SlotEvent.OnReelsDecided -= HandleReelsDecided;\r\n            SlotEvent.OnComboMilestone -= HandleComboMilestone;\r\n            SlotEvent.OnCostRejected -= HandleCostRejected;\r\n            SlotEvent.OnRunReset -= HandleRunReset;\r\n            CardEvent.OnCardHover -= HandleCardHover;\r\n            CardEvent.OnCardBought -= HandleCardBought;\r\n            SlotEvent.OnReelStopped -= HandleReelStopped;\r\n            SlotEvent.OnBodyTempRecovered -= HandleRecovered;\r\n            SlotEvent.OnSpinCompleted -= HandleSpinCompleted;\r\n        }\r\n\r\n        private void HandleAxeSwing() { if (S) S.PlaySfxAt(SfxId.AxeSwing, MachinePos); }\r\n        private void HandleSpinStarted() { if (S) S.PlaySfxAt(SfxId.LeverPull, MachinePos); }\r\n        private void HandleReelStopped(int reelIndex)\r\n        {\r\n            if (S == null || _decidedReels == null || _symbolSeen == null) return;\r\n            if (reelIndex < 0 || reelIndex >= _decidedReels.Length) return;\r\n\r\n            var symbol = _decidedReels[reelIndex];\r\n            var sfx = LadderSfxFor(symbol);\r\n            if (sfx == SfxId.None) return;\r\n\r\n            int seen = ++_symbolSeen[(int)symbol];        // 같은 심볼 n번째 등장 = n계단\r\n            float pitchScale = 1f;\r\n            var hp = S.Catalog != null ? S.Catalog._hitPitch : null;\r\n            if (hp != null)\r\n            {\r\n                int step = Mathf.Clamp(seen, 1, hp._maxSwingSteps);\r\n                pitchScale = hp._basePitch + (step - 1) * hp._pitchPerSwing;\r\n            }\r\n            S.PlaySfxAt(sfx, MachinePos, pitchScale);\r\n        }\r\n        // 릴에 뜬 특수 심볼 알림음\r\n        private void HandleReelsDecided(SpinResult r)\r\n        {\r\n            if (r == null || r.Reels == null) return;\r\n\r\n            _decidedReels = r.Reels;\r\n            if (_symbolSeen == null) _symbolSeen = new int[SymbolCount];\r\n            else System.Array.Clear(_symbolSeen, 0, _symbolSeen.Length);   // 스핀마다 계단 리셋\r\n\r\n            // 옹이: 결과 시점 알림음(등장 여부만, 스핀당 1회)\r\n            if (S == null) return;\r\n            for (int i = 0; i < r.Reels.Length; i++)\r\n                if (r.Reels[i] == SymbolId.KNOT) { S.PlaySfxAt(SfxId.Knot, MachinePos); break; }\r\n        }\r\n\r\n        // 판정 : 심볼매치별 + 스윙 등급 피치 사다리\r\n        private void HandleSpinJudged(SpinOutcome outcome) => _pendingOutcome = outcome;\r\n        private void HandleComboMilestone(int milestone, int index) => _pendingMilestoneIndex = index;\r\n\r\n        // 모닥불/슬롯/카드 공용 에러음(kind별 다른 음 원하면 여기서 switch로 분기)\r\n\r\n        private void HandleCostRejected(CostKind kind) \r\n        {\r\n            if (S == null) return;\r\n            switch (kind)\r\n            {\r\n                case CostKind.Fire: S.PlaySfxAt(SfxId.CostReject, CampfirePos); break;\r\n                case CostKind.Card: S.PlaySfxAt(SfxId.CostReject, CardPos); break;\r\n                default: S.PlaySfxAt(SfxId.CostReject, MachinePos); break; // Spin\r\n            }\r\n        }\r\n        private void HandleRunReset(RunProgress _)\r\n        {\r\n            _campfirePosValid = false;\r\n            if (S == null) return;\r\n            S.StopAmbient(AmbientId.HeartbeatCritical);   // 리셋 잔류 방지\r\n            _pendingMakgeolli = false;\r\n            _pendingMilestoneIndex = -1;\r\n            S.PlaySfx(SfxId.Revive);\r\n        }\r\n        private void HandleCardHover(bool on) { if (S) S.PlaySfxAt(on ? SfxId.CardHoverOn : SfxId.CardHoverOff, CardPos); }\r\n        private void HandleCardBought(string _, bool ok) { if (ok && S) S.PlaySfxAt(SfxId.CardBuy, CardPos); }\r\n\r\n        //private void HandleEffectApplied(SlotEffect e)\r\n        //{\r\n        //    if (e == null || e.IsPermanent) return;   // 카드(영구)는 OnCardBought 담당\r\n        //    _pendingMakgeolli = true;\r\n        //}\r\n        private void HandleSpinCompleted()\r\n        {\r\n            if (S == null || _pendingOutcome == null) return;\r\n            var o = _pendingOutcome.Value;     // 값 꺼내기\r\n            _pendingOutcome = null;            // 소비 처리(중복 재생 방지)\r\n\r\n            var j = o.Judgment;                // SpinJudgment는 class라 null 체크 가능\r\n            if (j == null) return;\r\n\r\n            // 결과음 우선순위\r\n            bool luck = false;\r\n            int knotCount = 0;\r\n            if (_decidedReels != null)\r\n                for (int i = 0; i < _decidedReels.Length; i++)\r\n                {\r\n                    if (_decidedReels[i] == SymbolId.LUCK) luck = true;\r\n                    else if (_decidedReels[i] == SymbolId.KNOT) knotCount++;\r\n                }\r\n            bool knotMajority = _decidedReels != null && knotCount > _decidedReels.Length;\r\n            // 결과음 줄 순서 = 우선순위\r\n            if (j.FailReason == FailReason.WORM) S.PlaySfxAt(SfxId.ResultWorm, MachinePos);        // 1. 좀벌레 실패\r\n            else if (j.MGLTriggered) S.PlaySfxAt(SfxId.MakgeolliDrink, MachinePos);  // 2. 막걸리 발동\r\n            else if (!j.IsHit) S.PlaySfxAt(knotMajority ? SfxId.ResultKnot : SfxId.WhiffFail, MachinePos);             // 3. 꽝(옹이 탓이면 전용음)\r\n                                                               \r\n            else if (j.IsPerfect) S.PlaySfxAt(SfxId.ResultPerfect, MachinePos);   // 4. 퍼펙트\r\n            else if (j.FireBatActive) S.PlaySfxAt(SfxId.ResultFireBat, MachinePos);   // 5. 불빠따\r\n            else if (luck) S.PlaySfxAt(SfxId.ResultLuck, MachinePos);      // 6. 행운 복제 명중\r\n            else S.PlaySfxAt(SfxId.ResultHit, MachinePos);       // 7. 일반 명중\r\n\r\n            // 독립 레이어(결과음과 겹쳐도 의미 충돌 없음)\r\n            if (j.AcornCount > 0) S.PlaySfx(SfxId.ResultAcorn);   // 도토리 즉발(실패해도 획득)\r\n            if (j.ComboBreak) S.PlaySfx(SfxId.ComboLost);\r\n            else if (j.ComboDelta > 0) S.PlaySfx(SfxId.ComboTick);\r\n\r\n            // 콤보 마일스톤\r\n            if (_pendingMilestoneIndex >= 0)\r\n            {\r\n                int idx = _pendingMilestoneIndex;\r\n                _pendingMilestoneIndex = -1;\r\n                float pitchScale = 1f;\r\n                var cp = S.Catalog != null ? S.Catalog._comboPitch : null;\r\n                if (cp != null)\r\n                {\r\n                    int step = Mathf.Clamp(idx + 1, 1, cp._maxSwingSteps);\r\n                    pitchScale = cp._basePitch + (step - 1) * cp._pitchPerSwing;\r\n                }\r\n                S.PlaySfxAt(SfxId.ComboMilestone, MachinePos, pitchScale); \r\n            }\r\n        }\r\n        private void HandleSettled(RunProgress _, long movedWood)\r\n        {\r\n            if (S == null) return;\r\n            S.PlaySfxAt(SfxId.Settle, SettlePos);\r\n            S.PlaySfx(SfxId.ComboLost);                 // 정산 = 콤보 리셋\r\n        }\r\n        private void HandleFireFed(RunProgress _) { if (S) S.PlaySfxAt(SfxId.FireFeed, CampfirePos); }\r\n        private void HandleCampfireLit(Vector3 pos)\r\n        {\r\n            _campfirePos = pos; _campfirePosValid = true;\r\n            if (S) S.PlayAmbientAt(AmbientId.Campfire, pos);\r\n        }\r\n        private void HandleCampfireOut()\r\n        {\r\n            if (S == null) return;\r\n            S.PlaySfxAt(SfxId.FireOut, CampfirePos);                    // 꺼지는 소리(단발)\r\n            S.StopAmbient(AmbientId.Campfire);           // 루프 정지\r\n        }\r\n        private void HandleCritical(RunProgress _)\r\n        {\r\n            if (S == null) return;\r\n            S.PlayAmbient(AmbientId.HeartbeatCritical);\r\n            S.PlaySfx(SfxId.TempWarn);\r\n        }\r\n        private void HandleRecovered(RunProgress _)\r\n        { \r\n            if (S) S.StopAmbient(AmbientId.HeartbeatCritical); \r\n        }\r\n        private void HandleDeath(RunProgress _)\r\n        {\r\n            if (S == null) return;\r\n            S.PlaySfx(SfxId.Death);\r\n            S.StopAmbient(AmbientId.HeartbeatCritical);\r\n        }\r\n\r\n    }\r\n}","lines":251},{"id":"Scripts/FX/SFX/UISfxBinder.cs","name":"UISfxBinder","path":"Scripts/FX/SFX/UISfxBinder.cs","layer":"FX","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"UiSfxEvent → SoundManager 라우팅","src":"﻿using UnityEngine;\r\nusing Wooduduk.FX;\r\nusing Wooduduk.SFX;\r\nusing Wooduduk.UI;\r\n\r\nnamespace Wooduduk.Audio\r\n{\r\n    // UiSfxEvent → SoundManager 라우팅\r\n    public sealed class UISfxBinder : MonoBehaviour\r\n    {\r\n        private static SoundManager S => SoundManager.Instance;\r\n\r\n        [SerializeField, Min(0f)] private float _repeatGuard = 0.04f; // 같은 종류 연타 최소 간격(슬라이더 드래그 스팸 컷)\r\n        private readonly float[] _lastPlay = new float[8];            // UiSfxKind 개수 이상\r\n\r\n        private void OnEnable() => UiSfxEvent.OnPlay += Handle;\r\n        private void OnDisable() => UiSfxEvent.OnPlay -= Handle;\r\n\r\n        private void Handle(UiSfxKind kind)\r\n        {\r\n            if (S == null) return;\r\n            int k = (int)kind;\r\n            if (Time.unscaledTime - _lastPlay[k] < _repeatGuard) return; // UI라 unscaled(일시정지 메뉴에서도 동작)\r\n            _lastPlay[k] = Time.unscaledTime;\r\n            switch (kind)\r\n            {\r\n                case UiSfxKind.Click: S.PlaySfx(SfxId.UiClick); break;\r\n                case UiSfxKind.Open: S.PlaySfx(SfxId.UiOpen); break;\r\n                case UiSfxKind.Close: S.PlaySfx(SfxId.UiClose); break;\r\n                case UiSfxKind.Purchase: S.PlaySfx(SfxId.UiPurchase); break;\r\n                case UiSfxKind.Hover: S.PlaySfx(SfxId.UiHover); break;\r\n                case UiSfxKind.Toggle: S.PlaySfx(SfxId.UiToggle); break;\r\n                case UiSfxKind.Error: S.PlaySfx(SfxId.UiError); break;\r\n            }\r\n        }\r\n    }\r\n}","lines":37},{"id":"Scripts/Matchmaking/MatchmakingService.cs","name":"MatchmakingService","path":"Scripts/Matchmaking/MatchmakingService.cs","layer":"Matchmaking","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"매칭 시스템의 런타임 진입점(얇은 래퍼). 순수 로직은 MatchmakingSelector 가 담당.","src":"using System;\nusing System.Collections.Generic;\nusing UnityEngine;\nusing Wooduduk.Matchmaking;\nusing Wooduduk.Network.Firebase.Leaderboard; // GhostRepository 사용을 위해 필요\n\nnamespace Wooduduk.Matchmaking\n{\n    /// <summary>\n    /// 매칭 시스템의 런타임 진입점(얇은 래퍼). 순수 로직은 MatchmakingSelector 가 담당.\n    /// </summary>\n    public class MatchmakingService : MonoBehaviour\n    {\n        #region 직렬화 필드 (Serialized)\n\n        [Header(\"설정\")]\n        [Tooltip(\"매칭 시스템 설정 SO. 필수.\")]\n        [SerializeField] private MatchmakingConfigSO _config;\n\n        /// <summary>싱글톤 인스턴스 — 로비 UI(MultiplayerController) 등에서 RequestPool 호출용 접근점.</summary>\n        public static MatchmakingService Instance { get; private set; }\n\n        #endregion\n\n        #region 생명주기 (Lifecycle)\n\n        private void Awake()\n        {\n            // 싱글톤 — 외부(로비 UI 등)에서 RequestPool 호출 접근점 (팀 매니저 패턴).\n            if (Instance != null && Instance != this) { Destroy(gameObject); return; }\n            Instance = this;\n\n            // DontDestroyOnLoad 는 root 오브젝트에만 작동. 씬에서 그룹(NETWORK&DATA 등) 자식으로\n            // 배치되면 경고 + 미작동(씬 전환 시 유실) → 런타임에 root 로 분리한다.\n            if (transform.parent != null)\n            {\n                Debug.Log($\"[MatchmakingService] 그룹 자식 배치 감지 → root 분리(DontDestroyOnLoad 위해). 이전 부모={transform.parent.name}\");\n                transform.SetParent(null);\n            }\n\n            DontDestroyOnLoad(gameObject);\n\n            if (_config == null)\n                Debug.LogError($\"[MatchmakingService] _config 가 비어 있습니다. 인스펙터에서 MatchmakingConfigSO 를 지정하세요. (obj={name})\");\n        }\n\n        #endregion\n\n        #region 공개 API (비동기 매칭 요청)\n\n        /// <summary>\n        /// Firebase(GhostRepository)에서 후보를 비동기로 조달해 매칭 풀을 만들고 콜백으로 반환합니다.\n        /// FirebaseRoomMatchSource에서 호출하는 실제 진입점입니다.\n        /// </summary>\n        public void RequestPool(MatchQuery self, long seed, Action<MatchPool> callback)\n        {\n            if (_config == null)\n            {\n                Debug.LogError(\"[MatchmakingService] RequestPool 중단: _config 가 null.\");\n                callback?.Invoke(new MatchPool { Underfilled = true, RequestedN = 0 });\n                return;\n            }\n\n            // GhostRepository를 통해 현재 Tier에 맞는 고스트 후보를 비동기로 가져옴\n            new GhostRepository().LoadCandidates((int)self.Tier, candidates =>\n            {\n                // 후보가 없거나 비어있는 경우 예외 처리\n                if (candidates == null || candidates.Count == 0)\n                {\n                    Debug.LogWarning(\"[MatchmakingService] 후보가 없거나 비어있음 → 빈 풀 반환.\");\n                    callback?.Invoke(new MatchPool { Underfilled = true, RequestedN = _config.PoolSize });\n                    return;\n                }\n\n                // 순수 매칭 로직(Selector) 호출\n                var pool = MatchmakingSelector.SelectPool(self, candidates, _config, (int)seed);\r\n\r\n                // 결과 콜백 반환\r\n                callback?.Invoke(pool);\n            });\n        }\n\n        #endregion\n    }\n}","lines":85},{"id":"Scripts/Network/Firebase/UserManager.cs","name":"UserManager","path":"Scripts/Network/Firebase/UserManager.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"유저의 현재 세션 데이터(CurrentUserData)를 관리하고, 아이템 보유 여부 확인, 장착, 데이터 갱신 및 중복 보상 처리를 총괄하는 매니저입니다.","src":"﻿using System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.Static;\r\nusing Wooduduk.Network.Firebase.Leaderboard;\r\n\r\nnamespace Wooduduk.Network.Firebase\r\n{\r\n    /// <summary>\r\n    /// 유저의 현재 세션 데이터(CurrentUserData)를 관리하고, \r\n    /// 아이템 보유 여부 확인, 장착, 데이터 갱신 및 중복 보상 처리를 총괄하는 매니저입니다.\r\n    /// </summary>\r\n    public class UserManager : MonoBehaviour\r\n    {\r\n        public static UserManager Instance { get; private set; }\r\n\r\n        // 현재 메모리에 로드된 유저의 전체 데이터\r\n        public UserData CurrentUserData { get; private set; }\r\n\r\n        private void Awake()\r\n        {\r\n            // 싱글톤 패턴: 씬 전환 시에도 파괴되지 않게 설정\r\n            if (Instance == null) { Instance = this; DontDestroyOnLoad(gameObject); }\r\n            else { Destroy(gameObject); return; }\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            // 서버로부터 데이터 로드가 완료되었을 때 호출되는 이벤트 구독\r\n            AccountEvents.OnUserDataLoaded += SetUserData;\r\n            // 로그아웃 시 데이터 초기화 구독\r\n
