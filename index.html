res[0]) { scores[2] = scores[1]; scores[1] = scores[0]; scores[0] = newScore; }\r\n            else if (newScore > scores[1]) { scores[2] = scores[1]; scores[1] = newScore; }\r\n            else if (newScore > scores[2]) { scores[2] = newScore; }\r\n        }\r\n    }\r\n}","lines":57},{"id":"Scripts/Slot/SlotScoreConfig.cs","name":"SlotScoreConfig","path":"Scripts/Slot/SlotScoreConfig.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"생존 점수: 시간 구간별 1~10점 차등 (가장 높은 도달 구간의 점수 적용)","src":"﻿using System;\r\nusing System.Collections.Generic;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    [Serializable]\r\n    public class SlotScoreConfig\r\n    {\r\n        // 생존 점수: 시간 구간별 1~10점 차등 (가장 높은 도달 구간의 점수 적용)\r\n        public List<SurvivalScoreBand> _survivalBands = new List<SurvivalScoreBand>\r\n        {\r\n            new SurvivalScoreBand { _minSeconds = 0,   _points = 1 },\r\n            new SurvivalScoreBand { _minSeconds = 30,  _points = 3 },\r\n            new SurvivalScoreBand { _minSeconds = 60,  _points = 5 },\r\n            new SurvivalScoreBand { _minSeconds = 90,  _points = 7 },\r\n            new SurvivalScoreBand { _minSeconds = 120, _points = 10 },\r\n        };\r\n        // 초당 생존 기본 보너스\r\n        public float _survivalBasePerSecond = 5f;\r\n\r\n        // 정산 장작 점수 배율(BP, 10000 = ×1.0)\r\n        public long _bankedWoodScoreBp = 10000;\r\n\r\n        // 순위 점수: 등수별 개별 점수 (인덱스 0 = 1등). 범위 밖 등수는 0점\r\n        public List<int> _rankPoints = new List<int> { 100, 60, 30, 10 };\r\n    }\r\n\r\n    [Serializable]\r\n    public struct SurvivalScoreBand\r\n    {\r\n        public float _minSeconds; // 이 시간(초) 이상이면\r\n        public int _points;       // 이 구간 점수(1~10)\r\n    }\r\n}\r\n\r\n","lines":36},{"id":"Scripts/Data/Core/TSVConvert/BaseSheetDataSO.cs","name":"BaseSheetDataSO","path":"Scripts/Data/Core/TSVConvert/BaseSheetDataSO.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"===== 기본 파서 =====","src":"﻿using Wooduduk.Data.Core.TSVConvert;\r\nusing Wooduduk.Data.Static;\r\nusing System;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.Static.StaticEnum;\r\n\r\nnamespace Wooduduk.Data.DataSO\r\n{\r\n    public abstract class BaseSheetDataSO : ScriptableObject, ISheetData\r\n    {\r\n        public abstract string ID { get; set; }\r\n        public abstract void SetData(Dictionary<string, string> dict);\r\n\r\n        // ===== 기본 파서 =====\r\n\r\n        protected float ParseFloat(Dictionary<string, string> dict, string key)\r\n            => dict.TryGetValue(key, out string raw) && float.TryParse(raw, out float v) ? v : 0f;\r\n\r\n        protected int ParseInt(Dictionary<string, string> dict, string key)\r\n            => dict.TryGetValue(key, out string raw) && int.TryParse(raw, out int v) ? v : 0;\r\n\r\n        protected long ParseLong(Dictionary<string, string> dict, string key)\r\n            => dict.TryGetValue(key, out string raw) && long.TryParse(raw, out long v) ? v : 0L;\r\n\r\n        protected string ParseString(Dictionary<string, string> dict, string key)\r\n            => dict.TryGetValue(key, out string raw) ? raw.Trim() : \"Unknown\";\r\n\r\n        protected bool ParseBool(Dictionary<string, string> dict, string key)\r\n        {\r\n            if (!dict.TryGetValue(key, out string raw)) return false;\r\n            return raw.Trim().ToLower() is \"true\" or \"1\" or \"yes\";\r\n        }\r\n\r\n        protected T ParseEnum<T>(Dictionary<string, string> dict, string key) where T : struct, Enum\r\n        {\r\n            if (!dict.TryGetValue(key, out string raw) || string.IsNullOrWhiteSpace(raw))\r\n                return default;\r\n            return Enum.TryParse(raw.Trim(), true, out T result) ? result : default;\r\n        }\r\n\r\n        protected List<string> ParseStringList(Dictionary<string, string> dict, string key)\r\n        {\r\n            if (!dict.TryGetValue(key, out string raw) || string.IsNullOrWhiteSpace(raw))\r\n                return new List<string>();\r\n\r\n            var list = new List<string>();\r\n            foreach (var s in raw.Split(','))\r\n            {\r\n                var trimmed = s.Trim();\r\n                if (!string.IsNullOrEmpty(trimmed)) list.Add(trimmed);\r\n            }\r\n            return list;\r\n        }\r\n\r\n        // ===== 효과 파서 =====\r\n        // 포맷 : EffectType|Target|TargetSymbol|Value1|Value2|Duration\r\n        // 여러 효과는 , 로 구분. TargetSymbol 없으면 빈칸(||)으로 둔다.\r\n\r\n        protected List<EffectData> ParseEffects(Dictionary<string, string> dict, string key)\r\n        {\r\n            var result = new List<EffectData>();\r\n\r\n            if (!dict.TryGetValue(key, out string raw) || string.IsNullOrWhiteSpace(raw))\r\n                return result;\r\n\r\n            if (raw.StartsWith(\"#\")) // 시트에서 임시 비활성화용 주석\r\n                return result;\r\n\r\n            foreach (var effectPart in raw.Split(','))\r\n            {\r\n                if (string.IsNullOrWhiteSpace(effectPart)) continue;\r\n\r\n                var parts = effectPart.Trim().Split('|');\r\n\r\n                var effect = new EffectData();\r\n                effect._effectType = parts.Length > 0 ? parts[0].Trim() : \"\";\r\n\r\n                string targetRaw = parts.Length > 1 ? parts[1].Trim() : \"Self\";\r\n                effect._target = Enum.TryParse(targetRaw, true, out EffectTarget t) ? t : EffectTarget.SELF;\r\n\r\n                effect._targetSymbolId = parts.Length > 2 ? parts[2].Trim() : \"\";\r\n\r\n                effect._value1 = parts.Length > 3 && float.TryParse(parts[3], out float v1) ? v1 : 0f;\r\n                effect._value2 = parts.Length > 4 && float.TryParse(parts[4], out float v2) ? v2 : 0f;\r\n                effect._durationSpin = parts.Length > 5 && int.TryParse(parts[5], out int d) ? d : 0;\r\n\r\n                if (effect._durationSpin == -1)\r\n                    effect._durationSpin = int.MaxValue; // -1 = 영구\r\n\r\n                result.Add(effect);\r\n            }\r\n\r\n            return result;\r\n        }\r\n    }\r\n}","lines":97},{"id":"Scripts/Data/Static/Shop/CardData.cs","name":"CardData","path":"Scripts/Data/Static/Shop/CardData.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"카드 = 게임 규칙을 바꾸는 장착형 아이템 (룰렛 확률 / 구조 / 보상 변경)","src":"﻿using Wooduduk.Data.Static.StaticEnum;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\n\r\n\r\nnamespace Wooduduk.Data.Static.Shop\r\n{\r\n    /// <summary>\r\n    /// 카드 = 게임 규칙을 바꾸는 장착형 아이템\r\n    /// (룰렛 확률 / 구조 / 보상 변경)\r\n    /// </summary>\r\n    [System.Serializable]\r\n    public class CardData\r\n    {\r\n        public string _id;\r\n        public string _name;\r\n\r\n        // 카드 구매 비용 = SlotEconomy 권위(_cardBaseCost/_cardCostStep, 전역 점증). 카드별 cost 필드 없음(중복 제거).\r\n        public int _count;\r\n\r\n        /// <summary>\r\n        /// 등급\r\n        /// </summary>\r\n        public Rarity _rarity;\r\n\r\n        [TextArea]\r\n        public string _description;\r\n\r\n        /// <summary>\r\n        /// 아이콘\r\n        /// </summary>\r\n        public Sprite _icon;\r\n\r\n        /// <summary>\r\n        /// 카드가 적용하는 효과 (룰렛 전에 항상 적용)\r\n        /// </summary>\r\n        public List<EffectData> _effects;\r\n    }\r\n}\r\n","lines":40},{"id":"Scripts/Data/Static/GameBalanceData.cs","name":"GameBalanceData","path":"Scripts/Data/Static/GameBalanceData.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"전체 게임 템포를 조절하는 핵심 밸런스 (게임당 1개, 전역값)","src":"﻿using UnityEngine;\r\nusing Wooduduk.Player;\r\nusing Wooduduk.Slot;\r\n\r\nnamespace Wooduduk.Data.Static\r\n{\r\n    /// <summary>\r\n    /// 전체 게임 템포를 조절하는 핵심 밸런스 (게임당 1개, 전역값)\r\n    /// </summary>\r\n    [System.Serializable]\r\n    public class GameBalanceData\r\n    {\r\n\r\n        #region 슬롯 밸런스\r\n        public SlotBalanceConfig _slotBalance = new SlotBalanceCo ), 싱글 재화 = S","src":"using System;\r\nusing Wooduduk.Data.Result;\r\nusing Wooduduk.Data.Static;\r\nusing Wooduduk.Network.Firebase;\r\nusing Wooduduk.Slot; // RunProgress 참조\r\n\r\nnamespace Wooduduk.Data.Service\r\n{\r\n\r\n    public static class RunResultBuilder\r\n    {\r\n        public static RunResultData Build(RunProgress run, SlotScoreCalculator score, RunMode mode)\r\n        {\r\n            if (run == null || score == null)\r\n            { UnityEngine.Debug.LogWarning(\"[RunResultBuilder] run/score null\"); return null; }\r\n\r\n            UserData user = UserManager.Instance?.CurrentUserData;\r\n            if (user == null)\r\n            { UnityEngine.Debug.LogWarning(\"[RunResultBuilder] UserData가 없습니다.\"); return null; }\r\n\r\n            // 최종 점수 = S + W (싱글/멀티 동일), 싱글 재화 = S\r\n            long finalScore = (mode == RunMode.Single) ? score.SingleScore(run) : score.MultiScore(run);\r\n            long currency = score.SingleCurrency(run);   // 멀티 재화는 rank 필요 → 아래 플래그\r\n            int finalI = finalScore > int.MaxValue ? int.MaxValue : (int)finalScore;\r\n\r\n            return new RunResultData\r\n            {\r\n                _userId = user._userId,\r\n                _userNick = user._userNick,\r\n                _finalScore = finalI,\r\n                _earnedGold = (int)currency,               // 싱글 재화 = 생존 구간 점수(S)\r\n                _survivalTime = run.SurvivalSeconds,\r\n                _settlementCount = run.SettleCount,\r\n                _isNewRecord = false,\r\n                _timestamp = DateTimeOffset.UtcNow.ToUnixTimeMilliseconds()\r\n            };\r\n        }\r\n    }\r\n}","lines":39},{"id":"Scripts/Data/Service/RankingBuilder.cs","name":"RankingBuilder","path":"Scripts/Data/Service/RankingBuilder.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"리더보드에는 사용자의 역대 최고 점수(TOP 1)를 등록","src":"﻿using System;\r\nusing Wooduduk.Data.Result;\r\nusing Wooduduk.Data.Static;\r\n\r\nnamespace Wooduduk.Data.Service\r\n{\r\n    public static class RankingBuilder\r\n    {\r\n        public static RankingData Build(UserData user, RunResultData result)\r\n        {\r\n            if (user == null || result == null) return null;\r\n\r\n            return new RankingData\r\n            {\r\n                _rank = 0, // 로드 시 계산되므로 0으로 전송\r\n\r\n                _userId = user._userId,\r\n                _nickname = user._userNick ?? \"Unknown\",\r\n\r\n                // 리더보드에는 사용자의 역대 최고 점수(TOP 1)를 등록\r\n                _score = user._bestScores[0],\r\n\r\n                // 이번 런의 기록을 함께 저장 (선택 사항)\r\n                _maxCombo = result._maxCombo,\r\n                _settlementCount = result._settlementCount,\r\n\r\n                _timestamp = DateTimeOffset.UtcNow.ToUnixTimeMilliseconds()\r\n            };\r\n        }\r\n    }\r\n}","lines":31},{"id":"Scripts/Data/Static/EffectData.cs","name":"EffectData","path":"Scripts/Data/Static/EffectData.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"모든 시스템(카드 / 막걸리 / 아이템 / 심볼)이 사용하는 공통 효과 언어","src":"﻿using Wooduduk.Data.Static.StaticEnum;\r\nusing System;\r\n\r\nnamespace Wooduduk.Data.Static\r\n{\r\n    /// <summary>\r\n    /// 모든 시스템(카드 / 막걸리 / 아이템 / 심볼)이 사용하는 공통 효과 언어\r\n    /// </summary>\r\n    [Serializable]\r\n    public class EffectData\r\n    {\r\n        /// <summary>\r\n        /// 효과 종류 (확률 / 배율 / 실패 / 보호 등)\r\n        /// </summary>\r\n        public string _effectType;\r\n\r\n        /// <summary>\r\n        /// 적용 대상 (Self / All / Enemy / Global)\r\n        /// </summary>\r\n        public EffectTarget _target;\r\n\r\n        /// <summary>\r\n        /// 효과 대상 심볼 ID (출현율/가치 변경 대상. 없으면 빈 문자열)\r\n        /// 예) 막걸리 \"불타는 도끼\" → 스윙 심볼 출현율 ↑ 일 때 스윙 ID\r\n        /// </summary>\r\n        public string _targetSymbolId;\r\n\r\n        /// <summary>\r\n        /// 주요 값 (배율 / 증가량 등)\r\n        /// </summary>\r\n        public float _value1;\r\n\r\n        /// <summary>\r\n (function(){
  const D=DATA, N=D.nodes, C=D.colors, M=D.meta;
  const byId={}; N.forEach(n=>byId[n.id]=n);
  const outAdj={}, inAdj={}; N.forEach(n=>{outAdj[n.id]=[];inAdj[n.id]=[];});
  D.edges.forEach(e=>{ if(byId[e.source]&&byId[e.target]){ outAdj[e.source].push(e.target); inAdj[e.target].push(e.source);} });

  document.getElementById('chips').innerHTML =
    `<div class="chip">라이브 <b>${M.live}</b></div><div class="chip">레이어 <b>${Object.keys(M.perLayer).length}</b></div><div class="chip">의존 <b>${M.edges}</b></div><div class="chip">죽은코드 <b>${M.dead}</b> 제외</div>`;

  const state={ scene:null, q:'' };
  // scene flow tabs
  const flow=document.getElementById('flow'); const order=['Title','Tutorial','Dev','Multi'];
  const mk=(label,val)=>{ const s=document.createElement('div'); s.className='s'+(val===state.scene?' on':''); s.textContent=label; s.dataset.v=String(val);
    s.onclick=()=>{ state.scene=(state.scene===val)?null:val; [...flow.querySelectorAll('.s')].forEach(x=>x.classList.toggle('on',x.dataset.v===String(state.scene))); render(); }; return s; };
  flow.appendChild(mk('전체',null));
  order.forEach((s,i)=>{ const a=document.createElement('span'); a.className='arw'; a.textContent='▸'; flow.appendChild(a); flow.appendChild(mk(s,s)); });

  // layers sorted by count desc
  const layers=Object.keys(M.perLayer).sort((a,b)=>M.perLayer[b]-M.perLayer[a]);
  const LNAME={Network:'Network · 멀티/Firebase',Slot:'Slot · 슬롯 엔진',Tier:'Tier · 티어정산',Data:'Data · 데이터',UI:'UI',Player:'Player',FX:'FX · 연출/사운드',Matchmaking:'Matchmaking',Tutorial:'Tutorial',Core:'Core'};
  const lnav=document.getElementById('lnav');
  layers.forEach(L=>{ const a=document.createElement('a'); a.innerHTML=`<span class="dot" style="background:${C[L]||'#888'}"></span><span>${L}</span><span class="c">${M.perLayer[L]}</span>`;
    a.onclick=()=>document.getElementById('lay-'+L)?.scrollIntoView({block:'start'}); lnav.appendChild(a); });
  document.getElementById('deadbox').innerHTML=`4개 씬(타이틀·튜토리얼·데브·멀티)에서 실제 사용되는 <b>라이브 코드 ${M.live}개</b>만 표시. 미도달 <b>${M.dead}개</b>(구 FishNet·폐기 로비·Fruit·에디터툴)는 제외.`;

  const main=document.getElementById('main');
  function cardHtml(n){
    const sc=(n.scenes||[]).map(s=>`<span class="bdg sc">${s}</span>`).join('');
    return `<div class="card" data-id="${n.id}" style="border-left-color:${C[n.layer]||'#888'}">
      <div class="nm">${n.entry?'<span class="star">★</span>':''}${n.name}</div>
      <div class="pth">${n.path}</div>
      <div class="sum">${esc(n.summary||'')}</div>
      <div class="meta">${sc}<span class="deg">↔ ${(outAdj[n.id]||[]).length+(inAdj[n.id]||[]).length}</span></div>
    </div>`;
  }
  function match(n){
    if(state.scene && !(n.scenes||[]).includes(state.scene)) return false;
    if(state.q){ const q=state.q; return (n.name.toLowerCase().includes(q)||(n.summary||'').toLowerCase().includes(q)||n.path.toLowerCase().includes(q)); }
    return true;
  }
  function render(){
    let html=''; let total=0;
    layers.forEach(L=>{
      const items=N.filter(n=>n.layer===L && match(n));
      if(!items.length) return; total+=items.length;
      items.sort((a,b)=>(b.entry-a.entry)|| ((outAdj[b.id].length+inAdj[b.id].length)-(outAdj[a.id].length+inAdj[a.id].length)));
      html+=`<div class="layer" id="lay-${L}"><div class="lh"><div class="bar" style="background:${C[L]||'#888'}"></div><div class="name">${(LNAME[L]||L).split(' · ')[0]}</div><div class="en">${(LNAME[L]||L).split(' · ')[1]||''}</div><div class="cnt">${items.length}</div></div><div class="grid">${items.map(cardHtml).join('')}</div></div>`;
    });
    main.innerHTML = total? html : '<div id="empty">일치하는 스크립트가 없습니다.</div>';
    main.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDrawer(byId[c.dataset.id]));
  }
  function esc(s){ return (s+'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  const drawer=document.getElementById('drawer');
  function depList(ids){ if(!ids.length) return '<div style="color:var(--tx2);font-size:13px">없음</div>';
    return ids.map(id=>byId[id]).filter(Boolean).sort((a,b)=>a.name.localeCompare(b.name)).map(d=>`<div class="dep" data-id="${d.id}">${d.name} <span style="color:var(--tx2)">· ${d.layer}</span></div>`).join(''); }
  function openDrawer(n){
    if(!n) return;
    drawer.innerHTML=`<span class="x">×</span>
      <div class="dn">${n.entry?'★ ':''}${n.name}</div><div class="dp">${n.path}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px"><span class="bdg" style="border-color:${C[n.layer]};color:${C[n.layer]}">${n.layer}</span>${(n.scenes||[]).map(s=>`<span class="bdg sc">${s}</span>`).join('')}${n.entry?'<span class="bdg" style="color:var(--acc)">씬 엔트리</span>':''}</div>
      <div class="dsum">${esc(n.summary||'')}</div>
      <h5>소스 코드 <span class="lc">${n.lines||0}줄</span> <span class="copybtn">복사</span></h5>
      <pre class="code">${esc(n.src||'(소스 없음)')}</pre>
      <h5>의존 → (${(outAdj[n.id]||[]).length})</h5>${depList(outAdj[n.id]||[])}
      <h5>← 피의존 (${(inAdj[n.id]||[]).length})</h5>${depList(inAdj[n.id]||[])}`;
    drawer.classList.add('show');
    drawer.querySelector('.x').onclick=()=>drawer.classList.remove('show');
    drawer.querySelectorAll('.dep').forEach(d=>d.onclick=()=>openDrawer(byId[d.dataset.id]));
    var cb=drawer.querySelector('.copybtn'); if(cb) cb.onclick=()=>{ try{ navigator.clipboard.writeText(n.src||''); }catch(e){ var ta=document.createElement('textarea'); ta.value=n.src||''; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(_){} ta.remove(); } cb.textContent='복사됨'; setTimeout(function(){cb.textContent='복사';},1200); };
  }
  document.getElementById('q').addEventListener('input',e=>{ state.q=e.target.value.trim().toLowerCase(); render(); });
  render();
})();
</script>
