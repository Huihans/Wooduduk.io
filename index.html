     var mods = new SpinModifiers\r\n            {\r\n                WoodMultiplierBp = _effects.CombinedWoodMultiplierBp(),\r\n                AcornValueMultiplier = _effects.CombinedAcornMultiplier(),\r\n                PreventFailPenalty = !judgment.IsHit && _effects.TryConsumeFailGuard(), // 실패일 때만 보험 소모\r\n                ExtraComboOnHit = _effects.CombinedExtraComboOnHit(),\r\n            };\r\n            SpinApplied applied = _processor.Apply(_run, judgment, mods);\r\n\r\n            // 기존 임시 효과를 카운트 다운 -> 새 막걸리 효과는 다음 스핀 부터\r\n            _effects.TickDown(Run);\r\n\r\n            // ── (3) 불빠따 페널티: 다음 스핀 명중률↓ 임시효과 추가(기름통이 페널티 더 강화). ──\r\n            if (judgment.FireBatActive)\r\n            {\r\n                int penaltyPct = _judgeCfg._fireBatPenaltyPercent - _effects.CombinedFireBatPenaltyBonusPercent();\r\n                if (penaltyPct < 0) penaltyPct = 0;\r\n                _effects.Add(new FireBatPenaltyEffect(1, penaltyPct), _run);\r\n            }\r\n\r\n            SlotEffect rolled = null;\r\n            if (judgment.MGLTriggered)\r\n            {\r\n                rolled = _mglRoller.Roll(_rng);\r\n                if (rolled != null)\r\n                {\r\n                    // ── (4) 막걸리 항아리: 디버프 막걸리면 지속 절반(⌈dur/2⌉). ──\r\n                    if (rolled.IsDebuff && _effects.AnyHalvesDebuffDuration())\r\n                        rolled.RemainingSpins = (rolled.RemainingSpins + 1) / 2;\r\n                    _effects.Add(rolled, _run);\r\n                }\r\n            }\r\n            return new SpinOutcome\r\n            {\r\n                Result = result,\r\n                Judgment = judgment,\r\n                Applied = applied,\r\n                Combo = _run.Combo,\r\n                UnsettledWood = _run.UnsettledWood,\r\n                BankedWood = _run.BankedWood,\r\n                RolledMGL = rolled,\r\n            };\r\n        }\r\n        public long Settle() => _processor.Settle(_run);\r\n        // 모닥불 투입 : 장작 소모 + 횟수 증가 + 체온 회복. 성공 여부 반환\r\n        public bool FeedFire() => _processor.TryFeedFire(_run);\r\n\r\n        public bool PaySpin() => _processor.TryPaySpin(_run);\r\n        public void Reseed(ulong seed) => _rng.Restore(RngFactory.StateFromSeed(seed));\r\n        public bool TryBuyCard(SlotEffect card)\r\n        {\r\n            if (card == null) return false;\r\n\r\n            // 릴 추가 카드 상한 가드 — 장작 차감 전 검사(거절 시 장작 보존)\r\n            if (card.ExtraReels > 0 &&\r\n                _baseReelCount + _effects.TotalExtraReels() + card.ExtraReels > MAX_REELS)\r\n            {\r\n                Debug.LogWarning($\"[릴가드] 릴 상한 도달 — 카드 거절: {card.Id} ({_baseReelCount}+{_effects.TotalExtraReels()}+{card.ExtraReels} > {MAX_REELS})\");\r\n                return false;\r\n            }\r\n\r\n            if (!_processor.TryBuyCard(_run)) return false;\r\n            _effects.Add(card, _run);\r\n            return true;\r\n        }\r\n  \r\n    }\r\n    // 슬롯 머신 기본 설정\r\n    // 모든 config, 풀은 임시 -> TODO : SO/시트로 교체\r\n    public static class SlotMachineFactory\r\n    {\r\n        public static SlotMachine CreateDefault(RunContext ctx, DataManagerSO data)\r\n        {\r\n            if (data == null)\r\n                throw new InvalidOperationException(\"DataManagerSO 미연결\");\r\n            var gb = data._gameBalance?._data\r\n                ?? throw new InvalidOperationException(\"GameBalanceDataSO 미연결\");\r\n\r\n            var rng = RngFactory.FromSeed(ctx.Seed);\r\n            var balance = gb._slotBalance;\r\n            var catalog = data.BuildSymbolCatalog();\r\n            var registry = new EffectRegistry();\r\n            int reel = data._roulette._data._reelData._reelCount;\r\n\r\n            var pipeline = new WeightPipeline()\r\n                .Add(new ComboDifficultyStage(balance))\r\n                .Add(new LuckCompensationStage(balance))\r\n                .Add(new EffectsWeightStage(registry));\r\n\r\n            var engine = new SlotDrawEngine(catalog, pipeline);\r\n            var roller = MGLPool.CreateRoller(data);\r\n            var judge = gb._slotJudge;\r\n\r\n            return new SlotMachine(rng, engine, judge, ctx.Economy, \r\n                                   registry, roller, ctx.Run, reel);\r\n        }\r\n    }\r\n}\r\n","lines":204},{"id":"Scripts/Slot/SlotSymbol.cs","name":"SlotSymbol","path":"Scripts/Slot/SlotSymbol.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"슬롯 심볼 종류 값은 0부터 연속 / 가중치 배열 인덱스로 사용. 확장 시 반드시 끝에 추가(중간 삽입 금지: 직렬화/인덱스 안정성).","src":"﻿using System;\r\nusing System.Collections.Generic;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 슬롯 심볼 종류\r\n    // 값은 0부터 연속 / 가중치 배열 인덱스로 사용.\r\n    // 확장 시 반드시 끝에 추가(중간 삽입 금지: 직렬화/인덱스 안정성).\r\n    public enum SymbolId\r\n    {\r\n        SWING = 0,      // 스윙\r\n        PERFECT = 1,    // 퍼펙트\r\n        ACORN = 2,      // 도토리\r\n        LUCK = 3,       // 행운\r\n        FRIEBAT = 4,    // 불빠따\r\n        KNOT = 5,       // 옹이\r\n        WORM = 6,       // 좀벌레\r\n        MAKGEOLLI = 7,  // 막걸리\r\n    }\r\n\r\n    // 심볼 정의. SO로 정해질 런타임 형태\r\n    [Serializable]\r\n    public sealed class SymbolDef\r\n    {\r\n        public SymbolId _id;\r\n        public string _displayName;\r\n        public int _baseWeight;     // 기본 가중치(정수). 모든 확률 보정의 출발점\r\n\r\n        public SymbolDef() { }\r\n        public SymbolDef(SymbolId id, string displayName, int baseWeight)\r\n        {\r\n            _id = id; _displayName = displayName; _baseWeight = baseWeight;\r\n        }\r\n    }\r\n\r\n    /// 심볼 카탈로그 추상화. 슬롯 로직은 SO가 아니라 이 인터페이스에만 의존\r\n    /// -> SO 기반 구현과 테스트용 InMemory 구현을 자유롭게 교체\r\n    public interface ISymbolCatalog\r\n    {\r\n        IReadOnlyList<SymbolDef> All { get; }\r\n        SymbolDef Get(SymbolId id);\r\n    }\r\n\r\n    /// 테스트/프로토타입용 인메모리 카탈로그\r\n    public sealed class InMemorySymbolCatalog : ISymbolCatalog\r\n    {\r\n        private readonly List<SymbolDef> _all = new List<SymbolDef>();\r\n        private readonly SymbolDef[] _byId;\r\n\r\n        public InMemorySymbolCatalog(IEnumerable<SymbolDef> defs)\r\n        {\r\n            int count = Enum.GetValues(typeof(SymbolId)).Length;\r\n            _byId = new SymbolDef[count];\r\n            foreach (var d in defs)\r\n            {\r\n                _all.Add(d);\r\n                _byId[(int)d._id] = d;\r\n            }\r\n        }\r\n\r\n        public IReadOnlyList<SymbolDef> All => _all;\r\n        public SymbolDef Get(SymbolId id) => _byId[(int)id];\r\n    }\r\n}\r\n","lines":65},{"id":"Scripts/Slot/SpinJudge.cs","name":"SpinJudge","path":"Scripts/Slot/SpinJudge.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"스윙 등급 스윙 카운트 기준 인덱스","src":"﻿using System;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 스윙 등급\r\n    // 스윙 카운트 기준 인덱스\r\n    public enum SwingTier\r\n    {\r\n        Whiff = 0,    // 헛스윙(실패)\r\n        Weak = 1,     // 약스윙 ×1.0\r\n        Strong = 2,   // 강스윙 ×1.5\r\n        Full = 3,     // 풀스윙 ×3.0\r\n        Mega = 4,     // 메가스윙 ×6.0\r\n        Destiny = 5,  // 운명 ×10.0\r\n    }\r\n    // 실패 사유\r\n    // 헛스윙 vs 좀벌레 VFX 구분용\r\n    public enum FailReason\r\n    {\r\n        NONE = 0,\r\n        NOSWING = 1,\r\n        WORM = 2,\r\n    }\r\n    // 스핀 판정 결과\r\n    // 세션은 이 지시대로 상태 갱신\r\n    // 연출에 필요한 신호 포함 : 퍼펙트, 막걸리, 등급, 실패사유\r\n    public sealed class SpinJudgment\r\n    {\r\n        public bool IsHit;\r\n        public FailReason FailReason;\r\n        public SwingTier Tier;\r\n        public int EffectiveSwingCount;\r\n\r\n        public bool IsPerfect;           // 퍼펙트 격상(2개+)\r\n        public bool MGLTriggered;  // 막걸리 3매치(판정과 별개, 콤보 안 끊음)\r\n        public bool FireBatActive;       // 불빠따(이번 배율 증가)\r\n        public int AcornCount;           // 도토리 즉발 개수(명중/실패 무관)\r\n\r\n        public long BaseMultiplierBp;    // 장작 배율(bp). 실패=0\r\n\r\n        // 세션이 적용할 상태 변화 지시\r\n        public int ComboDelta;           // 명중 +1\r\n        public bool ComboBreak;          // 실패 시 콤보 0\r\n        public bool UnsettledCleared;      // 실패 시 미정산 재화 소실\r\n    }\r\n    // 판정 상수. 추후 SO로 교체\r\n    [Serializable]\r\n    public sealed class SlotJudgeConfig\r\n    {\r\n        // 스윙 등급별 배율. index = SwingTier (0 헛 / 1 약 / 2 강 / 3 풀 / 4 메가 / 5 운명)\r\n        public long[] _tierMultiplierBp = { 0, 10000, 15000, 30000, 60000, 100000 };\r\n\r\n        public int _wormFailThreshold = 2;    // 좀벌레 N개+ -> 즉시 실패\r\n        public int _perfectThreshold = 2;     // 퍼펙트 N개+ -> 격상\r\n        public int _makgeolliThreshold = 3;   // 막걸리 N개+ -> 발동\r\n        public int _fireBatThreshold = 1;     // 불빠따 N개+ -> 활성\r\n\r\n        public long _perfectExtraBp = 15000;  // 퍼펙트 격상 시 ×1.5 \r\n        public long _fireBatExtraBp = 15000;  // 불빠따 이번 스핀 ×1.5\r\n        public int _fireBatPenaltyPercent = 80;  // 불빠따 다음 스핀 SWING 가중치(80=×0.8=명중률 20%↓, 기획 Val2=0.2)\r\n        // 행운 : 이번 슬롯에 가장 많은 심볼을 복제\r\n    }\r\n    // 스핀 판정기.\r\n    // SpinResult -> SpinJudgment\r\n    // 우선 순위 : 좀벌레 실패 > 헛스윙 실패 > 명중(기본, 퍼펙트, 불빠따). 막거리 및 도토리는 별개 처리\r\n    public static class SpinJudge\r\n    {\r\n        public static SpinJudgment Judge(SpinResult result, SlotJudgeConfig config)\r\n        {\r\n            int[] clover = BuildEffectiveCounts(result);   // 행운효과 반영된 유효 카운트\r\n            int swing = clover[(int)SymbolId.SWING];\r\n            int perfect = clover[(int)SymbolId.PERFECT];\r\n            int worm = clover[(int)SymbolId.WORM];\r\n            int acorn = clover[(int)SymbolId.ACORN];\r\n            int firebat = clover[(int)SymbolId.FRIEBAT];\r\n            int makgeolli = clover[(int)SymbolId.MAKGEOLLI];\r\n\r\n            bool keepCombo = false;\r\n            var reels = result.Reels;\r\n            for (int i = 0; i < reels.Length; i++)\r\n            {\r\n                var s = reels[i];\r\n                if (s == SymbolId.MAKGEOLLI || s == SymbolId.LUCK || s == SymbolId.FRIEBAT || s == SymbolId.ACORN || s == SymbolId.PERFECT)\r\n                {\r\n                    keepCombo = true;\r\n                    break;\r\n                }\r\n            }\r\n\r\n            var j = new SpinJudgment\r\n            {\r\n                EffectiveSwingCount = swing,\r\n                AcornCount = acorn,                                             // 즉발 - 항상\r\n                MGLTriggered = makgeolli >= config._makgeolliThreshold,   // 별개 - 항상\r\n                FireBatActive = firebat >= config._fireBatThreshold,\r\n            };\r\n\r\n            // 실패 판정. 좀벌레 우선\r\n            if (worm >= config._wormFailThreshold) return Fail(j, FailReason.WORM, !keepCombo);\r\n            if (swing <= 0) return Fail(j, FailReason.NOSWING, !keepCombo);\r\n            // 명중\r\n            j.IsHit = true;\r\n            j.FailReason = FailReason.NONE;\r\n\r\n            int maxTier = config._tierMultiplierBp.Length - 1;\r\n            int t = swing > maxTier ? maxTier : swing;  // 6릴 카드 시 초과분은 상한\r\n            j.Tier = (SwingTier)t;\r\n\r\n            long bp = config._tierMultiplierBp[t];\r\n            j.IsPerfect = perfect >= config._perfectThreshold;\r\n            if (j.IsPerfect) bp = bp * config._perfectExtraBp / 10000;     // 정수 bp 합성\r\n            if (j.FireBatActive) bp = bp * config._fireBatExtraBp / 10000;\r\n            j.BaseMultiplierBp = bp;\r\n\r\n            j.ComboDelta = 1;\r\n            j.ComboBreak = false;\r\n            j.UnsettledCleared = false;\r\n            return j;\r\n        }\r\n        private static SpinJudgment Fail(SpinJudgment j, FailReason reason, bool comboBreak = true)\r\n        {\r\n            j.IsHit = false;\r\n            j.FailReason = reason;\r\n            j.Tier = SwingTier.Whiff;\r\n            j.BaseMultiplierBp = 0;\r\n            j.ComboDelta = 0;\r\n            j.ComboBreak = comboBreak;       // 콤보 끊김\r\n            j.UnsettledCleared = true;   // 미정산 소실 \r\n            // 실패해도 즉발/막걸리는 별개\r\n            return j;\r\n        }\r\n        private static readonly int SymbolCount = Enum.GetValues(typeof(SymbolId)).Length;\r\n        // 행운은 행운 심볼을 제외한 과반수 슬롯을 복제해 유효 카운트 배열 반환\r\n        // 동률 시 SymbolId 낮은 쪽 채택\r\n        // 지배 심볼이 좀벌레/막걸리/퍼펙트면 그 효과도 함께 증폭\r\n        // 전부 행운 시 ... 효과 고민해봐야할듯? 추후 추가\r\n        public static int[] BuildEffectiveCounts(SpinResult result)\r\n        {\r\n            int[] counts = new int[SymbolCount];\r\n            var reels = result.Reels;\r\n            for (int i = 0; i < reels.Length; i++) counts[(int)reels[i]]++;\r\n\r\n            int luck = counts[(int)SymbolId.LUCK];\r\n            if (luck <= 0) return counts;\r\n\r\n            int dominant = -1, best = 0;\r\n            for (int i = 0; i < SymbolCount; i++)\r\n            {\r\n                if (i == (int)SymbolId.LUCK) continue;\r\n                if (counts[i] > best) { best = counts[i]; dominant = i; } // 부등호 -> 동률은 낮은 id 유지\r\n            }\r\n            if (dominant < 0) return counts;        // 비-행운 심볼 없음 -> 행운 그대로(비득점)\r\n\r\n            counts[dominant] += luck;               // 지배 심볼로 복제\r\n            counts[(int)SymbolId.LUCK] = 0;         // 행운 자체는 사라짐\r\n            return counts;\r\n        }\r\n    }\r\n}\r\n","lines":160},{"id":"Scripts/Matchmaking/MatchmakingConfigSO.cs","name":"MatchmakingConfigSO","path":"Scripts/Matchmaking/MatchmakingConfigSO.cs","layer":"Matchmaking","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"매칭 시스템 전역 설정 + 밴드 매핑 테이블.","src":"using System;\nusing UnityEngine;\nusing UnityEngine.Serialization;\nusing Wooduduk.Tier;\n\nnamespace Wooduduk.Matchmaking\n{\n    // ============================================================\n    // MatchmakingConfigSO — 매칭 시스템 설정(ScriptableObject)\n    // ------------------------------------------------------------\n    // 사용법:\n    //   - Project 창에서 [Create > GameData > MatchmakingConfig] 로 에셋 생성 후 인스펙터에서 값 편집.\n    //   - MatchmakingSelector / MatchmakingService 가 이 SO 를 읽어 버킷/풀크기/확장을 결정.\n    // 밴드 규칙(스펙 §4.5):\n    //   - 티어밴드: TierBandStarts 의 \"밴드 시작 티어\" 경계로 AxeTier 를 밴드로 매핑.\n    //              기본 {Stick, Iron, Gold} → 밴드0=Stick~Stone / 밴드1=Iron~Silver / 밴드2=Gold~Diamond.\n    //   - 판수밴드: GamesBandThresholds 임계 배열. 기본 {10,50} → 0~9 / 10~49 / 50+.\n    // 헬퍼:\n    //   GetTierBand(AxeTier)    : 등급 → 티어밴드 인덱스.\n    //   GetGamesBand(int)       : 판수 → 판수밴드 인덱스.\n    //   GetBucket(AxeTier, int) : 위 둘을 묶은 MatchBucket.\n    // 주의:\n    //   - 필드를 public 으로 둔 이유: 인스펙터 편집 + EditMode 테스트에서 직접 주입(Tier 모듈 TierConfigSO 와 동일).\n    //   - 모든 수치는 추후 밸런싱 대상. 코드 기본값은 합리적 출발점일 뿐(스펙 §5/§7).\n    //   - 봇 채움(부족분)·고스트 공급·시드 발급은 범위 밖(스펙 §6).\n    // ============================================================\n\n    /// <summary>\n    /// 매칭 시스템 전역 설정 + 밴드 매핑 테이블.\n    /// </summary>\n    [CreateAssetMenu(fileName = \"MatchmakingConfig\", menuName = \"GameData/MatchmakingConfig\")]\n    public class MatchmakingConfigSO : ScriptableObject\n    {\n        #region 티어밴드 설정 (Tier Band)\n\n        [Header(\"티어밴드 (밴드별 '시작 티어' 경계, 오름차순)\")]\n        [Tooltip(\"각 밴드가 시작되는 티어. 기본 {Stick, Iron, Gold} → 밴드0=Stick~Stone / 밴드1=Iron~Silver / 밴드2=Gold~Diamond. \" +\n                 \"AxeTier 는 이 경계들 중 자신 이하인 마지막 경계의 인덱스를 밴드로 가진다.\")]\n        [FormerlySerializedAs(\"tierBandStarts\")]\n        public AxeTier[] TierBandStarts = CreateDefaultTierBandStarts();\n\n        #endregion\n\n        #region 판수밴드 설정 (Games Band)\n\n        [Header(\"판수밴드 (오름차순 임계)\")]\n        [Tooltip(\"판수밴드 경계. 기본 {10,50} → 0~9=밴드0 / 10~49=밴드1 / 50+=밴드2. \" +\n                 \"gamesPlayed 가 임계 이상이면 다음 밴드로 올라간다(경계 포함은 위쪽 밴드).\")]\n        [FormerlySerializedAs(\"gamesBandThresholds\")]\n        public int[] GamesBandThresholds = { 10, 50 };\n\n        #endregion\n\n        #region 풀/확장 설정 (Pool / Expansion)\n\n        [Header(\"풀 구성\")]\n        [Tooltip(\"매칭 풀 목표 인원(본인 제외 상대 수).\")]\n        public int PoolSize = 10;\n\n        [Tooltip(\"인접 밴드 확장 최대 단계(±step). 기본 2.\")]\n        public int MaxExpansionSteps = 2;\n\n        #endregion\n\n        #region 조회 헬퍼 (Lookup Helpers)\n\n        /// <summary>\n        /// 등급 → 티어밴드 인덱스. TierBandStarts 중 등급 이하인 마지막 경계의 인덱스.\n        /// 경계가 비었거나 첫 경계보다 낮으면 0 으로 폴백.\n        /// </summary>\n        public int GetTierBand(AxeTier tier)\n        {\n            // 경계 미설정 방어: 전부 밴드 0.\n            if (TierBandStarts == null || TierBandStarts.Length == 0)\n                return 0;\n\n            int band = 0;\n            // 경계는 오름차순 가정. 등급이 i번째 시작 티어 이상이면 그 밴드(i)로 갱신.\n            for (int i = 0; i < TierBandStarts.Length; i++)\n            {\n                if ((int)tier >= (int)TierBandStarts[i])\n                    band = i;\n                else\n                    break; // 오름차순이므로 더 볼 필요 없음.\n            }\n            return band;\n        }\n\n        /// <summary>\n        /// 판수 → 판수밴드 인덱스. GamesBandThresholds 임계마다 +1.\n        /// 임계 배열이 비면 항상 0.\n        /// </summary>\n        public int GetGamesBand(int gamesPlayed)\n        {\n            if (GamesBandThresholds == null || GamesBandThresholds.Length == 0)\n                return 0;\n\n            int band = 0;\n            // 임계 이상이면 한 밴드 위(경계값은 위쪽 밴드에 포함 — 스펙 §5 의 10·50 경계 규칙).\n            for (int i = 0; i < GamesBandThresholds.Length; i++)\n            {\n                if (gamesPlayed >= GamesBandThresholds[i])\n                    band = i + 1;\n                else\n                    break; // 오름차순 가정.\n            }\n            return band;\n        }\n\n        /// <summary>\n        /// 등급+판수 → 버킷 좌표(MatchBucket).\n        /// </summary>\n        public MatchBucket GetBucket(AxeTier tier, int gamesPlayed)\n        {\n            return new MatchBucket(GetTierBand(tier), GetGamesBand(gamesPlayed));\n        }\n\n        #endregion\n\n        #region 기본값 (Defaults)\n\n        // 기본 티어밴드 경계: 3밴드 (Stick~Stone / Iron~Silver / Gold~Diamond).\n        // 인스펙터에서 자유롭게 덮어쓸 수 있음(밴드 수도 가변).\n        private static AxeTier[] CreateDefaultTierBandStarts()\n        {\n            return new AxeTier[]\n            {\n                AxeTier.Stick, // 밴드0 시작 (Stick~Stone)\n                AxeTier.Iron,  // 밴드1 시작 (Iron~Silver)\n                AxeTier.Gold,  // 밴드2 시작 (Gold~Diamond)\n            };\n        }\n\n        #endregion\n    }\n}\n","lines":137},{"id":"Scripts/Matchmaking/MatchmakingSelector.cs","name":"MatchmakingSelector","path":"Scripts/Matchmaking/MatchmakingSelector.cs","layer":"Matchmaking","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"비동기 고스트풀 선택기. 순수 정적 로직(결정론·무부작용).","src":"using System.Collections.Generic;\nusing UnityEngine;\nusing Wooduduk.Tier;\nusing Wooduduk.Network.Firebase.Leaderboard; // 통일된 GhostEntry(손찬성, Firebase 키 매핑)\n\nnamespace Wooduduk.Matchmaking\n{\n    // ============================================================\n    // MatchmakingSelector — 비동기 고스트풀 선택 순수 로직 (코어)\n    // ------------------------------------------------------------\n    // 사용법:\n    //   MatchPool pool = MatchmakingSelector.SelectPool(self, candidates, config, seed);\n    //   // pool.Opponents 로 비교 화면 구성, 플래그(Underfilled/ExpansionUsed)로 분기.\n    // 원칙:\n    //   - 전부 static · 결정론 · 부작용 없음(I/O·시간·전역 랜덤 없음). 오직 seed 만 무작위원.\n    //   - 동일 (self, 후보 '집합', config, seed) → 동일 풀(순서까지). 후보 '입력 순서' 와 무관.\n    //     → 비결정성 차단 핵심: 셔플 전에 UserId(Ordinal)로 안정 정렬해 입력 순서를 제거한다.\n    //   - 결정 수치 계산 중 로그 금지. 마지막에 결정 요약 1줄만 Debug.Log(팀 진단 규칙).\n    // 알고리즘(스펙 §4.6 정확히):\n    //   1) myBucket = config.GetBucket(self.Tier, self.GamesPlayed).\n    //   2) 후보에서 본인(UserId == self.SelfUserId) 제외.\n    //   3) base = myBucket 과 같은 버킷 후보 → 시드 결정론 셔플 후 앞에서 PoolSize 개.\n    //   4) 부족하면 step=1..MaxExpansionSteps: 인접 밴드(체비쇼프 거리 = max(|dTier|,|dGames|) == step)\n    //      후보를 시드 결정론 순서로 추가(이미 포함/ base 제외). PoolSize 도달 시 중단. ExpansionUsed 갱신.\n    //   5) 그래도 부족 → 있는 만큼 채우고 Underfilled = true.\n    //   6) MatchPool 반환(Opponents, 플래그, 버킷밴드, ExpansionUsed, RequestedN = PoolSize).\n    // 거리 정의:\n    //   - \"인접 밴드\" = 티어밴드 차와 판수밴드 차의 최대값(체비쇼프). step==0 이면 base 버킷.\n    //   - 한 step 묶음을 통째로 셔플 후 앞에서 채우므로, 가까운 밴드를 먼저 소진한다.\n    // ============================================================\n\n    /// <summary>\n    /// 비동기 고스트풀 선택기. 순수 정적 로직(결정론·무부작용).\n    /// </summary>\n    public static class MatchmakingSelector\n    {\n        #region 핵심 선택 (SelectPool)\n\n        /// <summary>\n        /// 본인 입력·후보·설정·시드로 결정론적 매칭 풀을 만든다.\n        /// </summary>\n        /// <param name=\"self\">매칭 요청자(본인) 입력.</param>\n        /// <param name=\"candidates\">백엔드가 공급한 고스트 후보(입력 순서 무관).</param>\n        /// <param name=\"config\">매칭 설정 SO(버킷/풀크기/확장).</param>\n        /// <param name=\"seed\">백엔드가 발급한 시드(같은 시드 → 같은 결과).</param>\n        /// <returns>선택 결과 MatchPool(상대 목록 + 메타).</returns>\n        public static MatchPool SelectPool(MatchQuery self, IReadOnlyList<GhostEntry> candidates, MatchmakingConfigSO config, int seed)\n        {\n            // config 누락 방어: 빈 풀을 반환하되 호출 실수를 즉시 드러낸다.\n            if (config == null)\n            {\n                Debug.LogError(\"[MatchmakingSelector] config 가 null 입니다. 빈 풀을 반환합니다.\");\n                return new MatchPool { Underfilled = true, RequestedN = 0 };\n            }\n\n            int poolSize = Mathf.Max(0, config.PoolSize);\n            int maxSteps = Mathf.Max(0, config.MaxExpansionSteps);\n\n            // 1) 내 버킷\n            MatchBucket myBucket = config.GetBucket(self.Tier, self.GamesPlayed);\n\n            MatchPool result = new MatchPool\n            {\n                BucketTierBand = myBucket.TierBand,\n                BucketGamesBand = myBucket.GamesBand,\n                RequestedN = poolSize,\n                ExpansionUsed = 0,\n                Underfilled = false,\n            };\n\n            // 후보 없음/풀크기 0 방어: 빈 풀(필요 시 언더필).\n            if (candidates == null || candidates.Count == 0 || poolSize == 0)\n            {\n                result.Underfilled = result.Opponents.Count < poolSize;\n                Debug.Log($\"[MatchmakingSelector] 후보 없음 또는 PoolSize=0 → {result}\");\n                return result;\n            }\n\n            // 2) 본인 제외 + 입력 순서 제거(안정 정렬).\n            //    UserId 오름차순(Ordinal)으로 정렬해 \"같은 집합이면 항상 같은 시작 배열\"을 보장.\n            //    null UserId 는 빈 문자열로 취급(정렬 안정성). 본인은 여기서 제외.\n            List<GhostEntry> sorted = new List<GhostEntry>(candidates.Count);\n            for (int i = 0; i < candidates.Count; i++)\n            {\n                GhostEntry c = candidates[i];\n                if (c == null) continue;                        // 잘못된 항목 방어\n                if (c._userId == self.SelfUserId) continue;     // 본인 제외(스펙 §4.6-2), 키=_userId\n                sorted.Add(c);\n            }\n            sorted.Sort(CompareByUserId);\n\n            // step 별 후보 분류: 같은 버킷(=0) / 확장(=1..maxSteps) / 그 밖(버림).\n            //   buckets[step] = 해당 거리 후보 목록. 입력 정렬을 그대로 물려받아 결정적.\n            List<GhostEntry>[] byStep = new List<GhostEntry>[maxSteps + 1];\n            for (int s = 0; s <= maxSteps; s++)\n                byStep[s] = new List<GhostEntry>();\n\n            for (int i = 0; i < sorted.Count; i++)\n            {\n                GhostEntry c = sorted[i];\n                // _tier 는 int → 버킷 분류에 AxeTier 필요하므로 캐스트(스펙: 손찬성 _tier == AxeTier 정수값).\n                MatchBucket b = config.GetBucket((AxeTier)c._tier, c._gamesPlayed);\n                int dist = BucketDistance(myBucket, b); // 체비쇼프 거리\n                if (dist <= maxSteps)\n                    byStep[dist].Add(c);\n                // dist > maxSteps 인 후보는 범위 밖 → 버림.\n            }\n\n            // 단일 RNG 스트림(seed). base→step1→step2 순으로 같은 RNG 를 이어 써서 전체가 한 결정 흐름.\n            System.Random rng = new System.Random(seed);\n\n            // 3) base 버킷 셔플 후 채우기.\n            ShuffleInPlace(byStep[0], rng);\n            AppendUntilFull(result.Opponents, byStep[0], poolSize);\n\n            // 4) 부족하면 인접 밴드 확장(가까운 step 부터).\n            for (int step = 1; step <= maxSteps; step++)\n            {\n                if (result.Opponents.Count >= poolSize)\n                    break;\n\n                ShuffleInPlace(byStep[step], rng);\n                int before = result.Opponents.Count;\n                AppendUntilFull(result.Opponents, byStep[step], poolSize);\n\n                // 이 step 에서 실제로 한 명이라도 보탰으면 확장 단계 갱신.\n                if (result.Opponents.Count > before)\n                    result.ExpansionUsed = step;\n            }\n\n            // 5) 그래도 부족 → 있는 만큼 + 언더필 플래그.\n            result.Underfilled = result.Opponents.Count < poolSize;\n\n            // 진단: 결정 요약 1줄(수치 계산 종료 후). 결정론에 영향 없음.\n            Debug.Log($\"[MatchmakingSelector] SelectPool 결정 → bucket=({myBucket.TierBand},{myBucket.GamesBand}), \" +\n                      $\"picked={result.Opponents.Count}/{poolSize}, expansion={result.ExpansionUsed}, underfilled={result.Underfilled} \" +\n                      $\"(candidates={candidates.Count}, self={self.SelfUserId})\");\n\n            return result;\n        }\n\n        #endregion\n\n        #region 결정론 보조 (Deterministic Helpers)\n\n        /// <summary>\n        /// UserId 오름차순 안정 비교(Ordinal). 입력 순서 제거용 정렬 키.\n        /// null 은 빈 문자열로 간주. 동률은 입력에 없다고 가정(UserId 는 고유 키).\n        /// </summary>\n        private static int CompareByUserId(GhostEntry a, GhostEntry b)\n        {\n            string ua = a != null && a._userId != null ? a._userId : string.Empty;\n            string ub = b != null && b._userId != null ? b._userId : string.Empty;\n            return string.CompareOrdinal(ua, ub);\n        }\n\n        /// <summary>\n        /// 체비쇼프 거리 = max(|티어밴드 차|, |판수밴드 차|). 0=같은 버킷, 1=인접(±1) ...\n        /// </summary>\n        private static int BucketDistance(MatchBucket a, MatchBucket b)\n        {\n            int dTier = Mathf.Abs(a.TierBand - b.TierBand);\n            int dGames = Mathf.Abs(a.GamesBand - b.GamesBand);\n            return Mathf.Max(dTier, dGames);\n        }\n\n        /// <summary>\n        /// 시드 결정론 Fisher-Yates(in-place). 주어진 rng 만 사용 → 같은 seed 면 같은 순서.\n        /// </summary>\n        private static void ShuffleInPlace(List<GhostEntry> list, System.Random rng)\n        {\n            // 끝에서 앞으로 스왑. rng.Next(0, i+1) 로 0..i 균등 선택.\n            for (int i = list.Count - 1; i > 0; i--)\n            {\n                int j = rng.Next(0, i + 1);\n                GhostEntry tmp = list[i];\n                list[i] = list[j];\n                list[j] = tmp;\n            }\n        }\n\n        /// <summary>\n        /// source 를 앞에서부터 dest 에 추가하되 dest 크기가 poolSize 에 닿으면 멈춘다.\n        /// </summary>\n        private static void AppendUntilFull(List<GhostEntry> dest, List<GhostEntry> source, int poolSize)\n        {\n            for (int i = 0; i < source.Count && dest.Count < poolSize; i++)\n                dest.Add(source[i]);\n        }\n\n        #endregion\n    }\n}\n","lines":194},{"id":"Scripts/Matchmaking/MatchPool.cs","name":"MatchPool","path":"Scripts/Matchmaking/MatchPool.cs","layer":"Matchmaking","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"매칭 선택 결과. 고른 상대 목록과 버킷/확장/언더필 메타를 함께 노출.","src":"using System;\nusing System.Collections.Generic;\nusing Wooduduk.Network.Firebase.Leaderboard; // 통일된 GhostEntry(손찬성)\n\nnamespace Wooduduk.Matchmaking\n{\n    // ============================================================\n    // MatchPool — 매칭 선택 결과(출력)\n    // ------------------------------------------------------------\n    // 사용법:\n    //   - MatchmakingSelector.SelectPool 의 반환값. 고른 상대 목록 + 메타.\n    //   - 호출부(서비스/UI)는 Opponents 로 비교 화면을 구성, 플래그로 분기.\n    // 필드:\n    //   Opponents       : 선택된 상대 고스트 목록(시드 결정론 순서 보존, 본인 제외).\n    //   Underfilled     : 확장까지 했는데도 PoolSize 미달이면 true(있는 만큼 채움).\n    //   BucketTierBand  : 요청자 버킷의 티어밴드(진단/표시용).\n    //   BucketGamesBand : 요청자 버킷의 판수밴드(진단/표시용).\n    //   ExpansionUsed   : 사용한 인접 밴드 확장 최대 단계(0=확장 없음, 1..MaxExpansionSteps).\n    //   RequestedN      : 목표 인원(= config.PoolSize). 실제 인원은 Opponents.Count.\n    // 설계 메모:\n    //   - 출력 집계용이라 object-initializer 로 채운다(Tier 모듈 TierProgress 와 동일 스타일).\n    // ============================================================\n\n    /// <summary>\n    /// 매칭 선택 결과. 고른 상대 목록과 버킷/확장/언더필 메타를 함께 노출.\n    /// </summary>\n    public class MatchPool\n    {\n        /// <summary>선택된 상대 고스트(시드 결정론 순서, 본인 제외).</summary>\n        public List<GhostEntry> Opponents = new List<GhostEntry>();\n\n        /// <summary>확장까지 해도 목표 인원 미달이면 true.</summary>\n        public bool Underfilled;\n\n        /// <summary>요청자 버킷의 티어밴드(진단/표시용).</summary>\n        public int BucketTierBand;\n\n        /// <summary>요청자 버킷의 판수밴드(진단/표시용).</summary>\n        public int BucketGamesBand;\n\n        /// <summary>사용한 인접 밴드 확장 최대 단계(0=확장 없음).</summary>\n        public int ExpansionUsed;\n\n        /// <summary>목표 인원(= config.PoolSize). 실제 인원은 Opponents.Count.</summary>\n        public int RequestedN;\n\n        public override string ToString()\n        {\n            int count = Opponents != null ? Opponents.Count : 0;\n            return $\"MatchPool(picked={count}/{RequestedN}, bucket=({BucketTierBand},{BucketGamesBand}), \" +\n                   $\"expansion={ExpansionUsed}, underfilled={Underfilled})\";\n        }\n    }\n}\n","lines":55},{"id":"Scripts/Matchmaking/MatchQuery.cs","name":"MatchQuery","path":"Scripts/Matchmaking/MatchQuery.cs","layer":"Matchmaking","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"매칭 요청자(본인) 입력. 버킷 산출 + 본인 제외에 사용.","src":"using System;\nusing Wooduduk.Tier;\n\nnamespace Wooduduk.Matchmaking\n{\n    // ============================================================\n    // MatchQuery — 본인(매칭 요청자) 입력\n    // ------------------------------------------------------------\n    // 사용법:\n    //   - 매칭을 요청하는 \"나\" 의 정보. MatchmakingSelector.SelectPool 의 첫 인자.\n    //   - 이 값으로 내 버킷을 구하고, 후보에서 나(SelfUserId)를 제외한다.\n    // 필드:\n    //   SelfUserId  : 요청자 식별자(후보에서 본인 제외 키).\n    //   Tier        : 요청자의 도끼 등급(티어밴드 분류 입력).\n    //   GamesPlayed : 요청자의 누적 판수(판수밴드 분류 입력).\n    // ============================================================\n\n    /// <summary>\n    /// 매칭 요청자(본인) 입력. 버킷 산출 + 본인 제외에 사용.\n    /// </summary>\n    [Serializable]\n    public struct MatchQuery\n    {\n        /// <summary>요청자 식별자(후보에서 본인 제외 키).</summary>\n        public string SelfUserId;\n\n        /// <summary>요청자 도끼 등급(티어밴드 분류 입력).</summary>\n        public AxeTier Tier;\n\n        /// <summary>요청자 누적 판수(판수밴드 분류 입력).</summary>\n        public int GamesPlayed;\n\n        public MatchQuery(string selfUserId, AxeTier tier, int gamesPlayed)\n        {\n            SelfUserId = selfUserId;\n            Tier = tier;\n            GamesPlayed = gamesPlayed;\n        }\n\n        public override string ToString()\n        {\n            return $\"MatchQuery(SelfUserId={SelfUserId}, Tier={Tier}, Games={GamesPlayed})\";\n        }\n    }\n}\n","lines":46},{"id":"Scripts/Network/Firebase/Leaderboard/GhostRepository.cs","name":"GhostRepository","path":"Scripts/Network/Firebase/Leaderboard/GhostRepository.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"Firebase ghosts/{userId} 경로에 런 기록을 저장하고 불러오는 저장소. 저장: 런 종료 시 내 기록을 고스트로 남겨 다른 유저의 매칭 후보가 됨. 로드: 게임 시작 시 내 티어와 비슷한 고스트들을 불러와 게임 내 비교 대상으로 배치.","src":"﻿using Firebase.Database;\r\nusing Firebase.Extensions;\r\nusing System;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.Tier;\r\nusing Wooduduk.Network.Firebase.Matchmaking;\r\n\r\nnamespace Wooduduk.Network.Firebase.Leaderboard\r\n{\r\n    // Firebase ghosts/{userId} 경로에 런 기록을 저장하고 불러오는 저장소.\r\n    // 저장: 런 종료 시 내 기록을 고스트로 남겨 다른 유저의 매칭 후보가 됨.\r\n    // 로드: 게임 시작 시 내 티어와 비슷한 고스트들을 불러와 게임 내 비교 대상으로 배치.\r\n    public class GhostRepository\r\n    {\r\n        private readonly DatabaseReference _db;\r\n\r\n        // 고스트 후보 허용 티어 차이 (내 티어 ±1 → 1단계 위아래까지 매칭)\r\n        private const int DEFAULT_TIER_BAND = 1;\r\n\r\n        public GhostRepository()\r\n        {\r\n            _db = FirebaseDatabase.DefaultInstance.RootReference;\r\n        }\r\n\r\n        // 런 종료 시 내 기록을 ghosts/{userId}에 저장.\r\n        // 유저당 최신 1개만 유지 (UpdateChildrenAsync로 덮어쓰기).\r\n        // currentTier: TierRunResult에 티어 필드가 없으므로 호출 측에서 전달.\r\n        public void Save(TierRunResult result, int currentTier)\r\n        {\r\n            if (result == null || string.IsNullOrEmpty(result._userId))\r\n            {\r\n                Debug.LogWarning(\"[GhostRepository] result가 null이거나 userId가 없습니다.\");\r\n                return;\r\n            }\r\n\r\n            int gamesPlayed = 0;\r\n\r\n            if (UserManager.Instance != null && UserManager.Instance.TryGetUser(out var user))\r\n                gamesPlayed = user._gamesPlayed;\r\n\r\n            Debug.Log(\r\n                $\"[GhostRepository] Save 시도: \" +\r\n                $\"uid={result._userId}, score={result._rawScore}, tier={currentTier}, games={gamesPlayed}\"\r\n            );\r\n\r\n            var data = new Dictionary<string, object>\r\n            {\r\n                { \"_userId\",          result._userId },\r\n                { \"_nick\",            result._userNick ?? \"\" },\r\n                { \"_score\",           result._rawScore },\r\n                { \"_maxCombo\",        result._maxCombo },\r\n                { \"_settlementCount\", result._settlementCount },\r\n                { \"_tier\",            currentTier },\r\n                { \"_gamesPlayed\",     gamesPlayed },\r\n                { \"_timestamp\",       result._timestamp },\r\n            };\r\n\r\n            _db.Child(\"ghosts\").Child(result._userId)\r\n                .UpdateChildrenAsync(data)\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    if (task.IsFaulted || task.IsCanceled)\r\n                    {\r\n                        Debug.LogError(\r\n                            $\"[GhostRepository] Save 실패 uid={result._userId}: \" +\r\n                            $\"{task.Exception?.GetBaseException()?.Message}\"\r\n                        );\r\n                    }\r\n                    else\r\n                    {\r\n                        Debug.Log($\"[GhostRepository] Save 성공 uid={result._userId}\");\r\n                    }\r\n                });\r\n        }\r\n\r\n        // 게임 시작 시 내 티어 ±bandSize 범위의 고스트 목록을 가져옴.\r\n        // 결과는 MatchmakingService가 받아서 게임 내 배치 대상으로 사용.\r\n        // 현재는 ghosts/ 전체 읽기 후 클라 필터링. 유저 수 증가 시 Firebase 인덱스 쿼리로 교체 예정.\r\n        public void LoadCandidates(int targetTier, Action<List<GhostEntry>> callback, int bandSize = DEFAULT_TIER_BAND)\r\n        {\r\n            _db.Child(\"ghosts\")\r\n                .OrderByChild(\"_tier\")\r\n                .StartAt(targetTier - bandSize)\r\n                .EndAt(targetTier + bandSize)\r\n                .GetValueAsync()\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    if (task.IsFaulted || task.IsCanceled)\r\n                    {\r\n                        Debug.LogError(\"[GhostRepository] LoadCandidates 실패\");\r\n                        callback?.Invoke(new List<GhostEntry>());\r\n                        return;\r\n                    }\r\n\r\n                    var list = new List<GhostEntry>();\r\n                    if (!task.Result.Exists)\r\n                    {\r\n                        callback?.Invoke(list);\r\n                        return;\r\n                    }\r\n\r\n                    foreach (var child in task.Result.Children)\r\n                    {\r\n                        GhostEntry entry = ParseEntry(child);\r\n                        if (entry != null) list.Add(entry);\r\n                    }\r\n\r\n                    Debug.Log($\"[GhostRepository] LoadCandidates tier={targetTier}±{bandSize} → {list.Count}개\");\r\n                    callback?.Invoke(list);\r\n                });\r\n        }\r\n\r\n        // Firebase 스냅샷 1개를 GhostEntry로 변환. 파싱 실패 시 null 반환.\r\n        private GhostEntry ParseEntry(DataSnapshot child)\r\n        {\r\n            try\r\n            {\r\n                return JsonUtility.FromJson<GhostEntry>(child.GetRawJsonValue());\r\n            }\r\n            catch (Exception e)\r\n            {\r\n                Debug.LogWarning($\"[GhostRepository] 파싱 실패 key={child.Key}: {e.Message}\");\r\n                return null;\r\n            }\r\n        }\r\n    }\r\n}","lines":128},{"id":"Scripts/Network/Firebase/Leaderboard/LeaderboardCache.cs","name":"LeaderboardCache","path":"Scripts/Network/Firebase/Leaderboard/LeaderboardCache.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"인메모리 캐시: 같은 데이터를 매번 서버에서 안 읽도록","src":"﻿using UnityEngine;\r\nusing Wooduduk.Data.Result;\r\n\r\nnamespace Wooduduk.Network.Firebase.Leaderboard\r\n{\r\n    /// <summary>\r\n    /// 인메모리 캐시: 같은 데이터를 매번 서버에서 안 읽도록\r\n    /// </summary>\r\n    public static class LeaderboardCache\r\n    {\r\n        private static LeaderboardViewData _cachedData;\r\n        private static string _cachedUserId;\r\n        private static float _lastLoadTime;\r\n\r\n        private const float CACHE_DURATION = 60f;\r\n\r\n        public static bool TryGet(string userId, out LeaderboardViewData data)\r\n        {\r\n            data = _cachedData;\r\n\r\n            if (_cachedData == null) return false;\r\n            if (_cachedUserId != userId) return false;\r\n            if (Time.time - _lastLoadTime > CACHE_DURATION) return false;\r\n\r\n            return true;\r\n        }\r\n\r\n        public static void Save(string userId, LeaderboardViewData data)\r\n        {\r\n            _cachedData = data;\r\n            _cachedUserId = userId;\r\n            _lastLoadTime = Time.time;\r\n        }\r\n\r\n        public static void Clear()\r\n        {\r\n            _cachedData = null;\r\n            _cachedUserId = null;\r\n        }\r\n    }\r\n}","lines":41},{"id":"Scripts/Network/Firebase/Leaderboard/LeaderboardService.cs","name":"LeaderboardService","path":"Scripts/Network/Firebase/Leaderboard/LeaderboardService.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"★ forceRefresh 기본값을 true로 설정! (열 때마다 무조건 서버에서 갱신)","src":"﻿using System.Collections.Generic;\r\nusing Wooduduk.Data.Result;\r\nusing Wooduduk.Data.Static;\r\n\r\nnamespace Wooduduk.Network.Firebase.Leaderboard\r\n{\r\n    public static class LeaderboardService\r\n    {\r\n        // ★ forceRefresh 기본값을 true로 설정! (열 때마다 무조건 서버에서 갱신)\r\n        public static void Load(UserData user, bool forceRefresh = true)\r\n        {\r\n            if (user == null)\r\n            {\r\n                LeaderboardEvents.RaiseLoaded(new LeaderboardViewData\r\n                {\r\n                    _latestRecord = null,\r\n                    _myTop3Scores = new int[3],\r\n                    _myRankRecord = null,\r\n                    _top100 = new List<RankingData>()\r\n                });\r\n                return;\r\n            }\r\n\r\n            // ★ 1단계: forceRefresh가 false일 때만 캐시를 사용함\r\n            if (!forceRefresh && LeaderboardCache.TryGet(user._userId, out var cached))\r\n            {\r\n                LeaderboardEvents.RaiseLoaded(cached);\r\n                return;\r\n            }\r\n\r\n            // ★ 2단계: 서버 캐시(user_ranks) + TOP100 로드 (서버 통신)\r\n            var repository = new LeaderboardRepository();\r\n\r\n            repository.LoadMyRank(user._userId, (myRank, myScore) =>\r\n            {\r\n                repository.LoadTop100(top100 =>\r\n                {\r\n                    RankingData latestRecord = new()\r\n                    {\r\n                        _rank = 0,\r\n                        _userId = user._userId,\r\n                        _nickname = user._userNick,\r\n                        _score = user._latestScore\r\n                    };\r\n\r\n                    RankingData myRankRecord = myRank > 0\r\n                        ? new RankingData\r\n                        {\r\n                            _rank = myRank,\r\n                            _userId = user._userId,\r\n                            _nickname = user._userNick,\r\n                            _score = myScore\r\n                        }\r\n                        : null;\r\n\r\n                    int[] top3 = user._bestScores != null\r\n                        ? (int[])user._bestScores.Clone()\r\n                        : new int[3];\r\n\r\n                    LeaderboardViewData data = new()\r\n                    {\r\n                        _latestRecord = latestRecord,\r\n                        _myTop3Scores = top3,\r\n                        _myRankRecord = myRankRecord,\r\n                        _top100 = top100\r\n                    };\r\n\r\n                    // 다음을 위해 캐시에 저장은 해둠\r\n                    LeaderboardCache.Save(user._userId, data);\r\n\r\n                    LeaderboardEvents.RaiseLoaded(data);\r\n                });\r\n            });\r\n        }\r\n    }\r\n}","lines":76},{"id":"Scripts/Network/Firebase/UserRepository.cs","name":"UserRepository","path":"Scripts/Network/Firebase/UserRepository.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"(요약 없음)","src":"﻿using Firebase.Database;\r\nusing Firebase.Extensions;\r\nusing System;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing static System.Net.WebRequestMethods;\r\n\r\nnamespace Wooduduk.Network.Firebase\r\n{\r\n    public class UserRepository\r\n    {\r\n        private DatabaseReference _db;\r\n\r\n        public UserRepository()\r\n        {\r\n            _db = FirebaseDatabase.DefaultInstance.RootReference;\r\n        }\r\n\r\n        public void GetUserData(string userId, Action<DataSnapshot> callback)\r\n        {\r\n            _db.Child(\"Users\").Child(userId).GetValueAsync().ContinueWithOnMainThread(task =>\r\n            {\r\n                if (task.IsFaulted || task.IsCanceled)\r\n                {\r\n                    Debug.LogError($\"[UserRepository] 유저 로드 실패: {userId}\");\r\n                    callback?.Invoke(null);\r\n                    return;\r\n                }\r\n                callback?.Invoke(task.Result);\r\n            });\r\n        }\r\n\r\n        public void SaveUserData(string userId, string json)\r\n        {\r\n            if (string.IsNullOrEmpty(userId) || string.IsNullOrEmpty(json))\r\n            {\r\n                Debug.LogError($\"[UserRepository] 저장 실패: 빈 데이터. uid={userId}\");\r\n                return;\r\n            }\r\n\r\n            Debug.Log($\"[UserRepository] 저장 요청 전송: uid={userId} (Json 길이: {json.Length})\");\r\n\r\n            _db.Child(\"Users\").Child(userId).SetRawJsonValueAsync(json)\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    if (task.IsCompleted)\r\n                        Debug.Log($\"[UserRepository] ✅ 저장 성공: {userId}\");\r\n                    else if (task.IsCanceled)\r\n                        Debug.LogError($\"[UserRepository] ❌ 저장 취소됨: {userId}\");\r\n                    else\r\n                        Debug.LogError($\"[UserRepository] ❌ 저장 실패: {userId} | {task.Exception?.GetBaseException()?.Message}\");\r\n                });\r\n        }\r\n\r\n        public void UpdateFields(string userId, Dictionary<string, object> fields)\r\n        {\r\n            if (string.IsNullOrEmpty(userId) || fields == null || fields.Count == 0) return;\r\n\r\n            Debug.Log($\"[UserRepository] 필드 갱신 요청: uid={userId}, 필드수={fields.Count}\");\r\n            _db.Child(\"Users\").Child(userId).UpdateChildrenAsync(fields)\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    if (!task.IsCompleted)\r\n                        Debug.LogError($\"[UserRepository] 필드 갱신 실패: {task.Exception?.GetBaseException()?.Message}\");\r\n                });\r\n        }\r\n\r\n        // 데이터 삭제\r\n        public void DeleteUserData(string userId, Action onComplete = null, Action<string> onError = null)\r\n        {\r\n            _db.Child(\"Users\").Child(userId).RemoveValueAsync()\r\n                .ContinueWithOnMainThread(task =>\r\n                {\r\n                    if (task.IsFaulted || task.IsCanceled)\r\n                    {\r\n                        string msg = task.Exception?.GetBaseException()?.Message ?? \"삭제 실패\";\r\n                        Debug.LogError($\"[UserRepository] 삭제 실패: {msg}\");\r\n                        onError?.Invoke(msg);  // ← 에러 콜백 호출\r\n                    }\r\n                    else\r\n                    {\r\n                        Debug.Log($\"[UserRepository] 삭제 완료: {userId}\");\r\n                        onComplete?.Invoke();\r\n                    }\r\n                });\r\n        }\r\n    }\r\n}","lines":88},{"id":"Scripts/Data/Tier/TierSaveService.cs","name":"TierSaveService","path":"Scripts/Data/Tier/TierSaveService.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"★ 중요: 메모리 UserData도 즉시 갱신","src":"﻿using System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Network.Firebase;\r\n\r\nnamespace Wooduduk.Data.Tier\r\n{\r\n    public class TierSaveService\r\n    {\r\n        public void SaveTierState(int axeTier, int lp, int protection)\r\n        {\r\n            if (UserManager.Instance == null || !UserManager.Instance.TryGetUser(out var user))\r\n            {\r\n                Debug.LogWarning(\"[TierSaveService] UserData가 없습니다.\");\r\n                return;\r\n            }\r\n\r\n            if (SaveManager.Instance == null)\r\n            {\r\n                Debug.LogError(\"[TierSaveService] SaveManager가 없습니다.\");\r\n                return;\r\n            }\r\n\r\n            // ★ 중요: 메모리 UserData도 즉시 갱신\r\n            user._axeTier = axeTier;\r\n            user._tierLp = lp;\r\n            user._tierProtection = protection;\r\n\r\n            Debug.Log(\r\n                $\"[TierSaveService] SaveTierState 요청 → \" +\r\n                $\"axeTier={axeTier}, lp={lp}, protection={protection}, user={user._userId}\"\r\n            );\r\n\r\n            SaveManager.Instance.UpdateUserFields(user._userId, new Dictionary<string, object>\r\n            {\r\n                { \"_axeTier\",        axeTier },\r\n                { \"_tierLp\",         lp },\r\n                { \"_tierProtection\", protection },\r\n            });\r\n        }\r\n\r\n        public bool LoadTierState(out int axeTier, out int lp, out int protection)\r\n        {\r\n            axeTier = 0;\r\n            lp = 0;\r\n            protection = 0;\r\n\r\n            if (UserManager.Instance == null || !UserManager.Instance.TryGetUser(out var user))\r\n            {\r\n                Debug.LogWarning(\"[TierSaveService] LoadTierState: UserData가 없습니다. 기본값(0/0/0) 반환.\");\r\n                return false;\r\n            }\r\n\r\n            axeTier = user._axeTier;\r\n            lp = user._tierLp;\r\n            protection = user._tierProtection;\r\n\r\n            Debug.Log(\r\n                $\"[TierSaveService] LoadTierState 성공 → \" +\r\n                $\"axeTier={axeTier}, lp={lp}, protection={protection}, user={user._userId}\"\r\n            );\r\n\r\n            return true;\r\n        }\r\n    }\r\n}","lines":65},{"id":"Scripts/Tier/AxeTier.cs","name":"AxeTier","path":"Scripts/Tier/AxeTier.cs","layer":"Tier","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"플레이어 도끼 등급. 최저 Stick(막대기) ~ 최고 Diamond(다이아).","src":"namespace Wooduduk.Tier\n{\n    // ============================================================\n    // AxeTier — 플레이어 등급(도끼 티어) enum\n    // ------------------------------------------------------------\n    // 사용법:\n    //   - 플레이어의 랭크를 표현. 낮을수록 하위, 높을수록 상위.\n    //   - 정수 비교로 승급/강등 판정에 사용 (Rank < Diamond, Rank > Stick 등).\n    // 주의:\n    //   - Slot 모듈의 SwingTier(스윙 등급: 헛/약/강/풀/메가/운명)와 별개 타입.\n    //     플레이어 등급은 반드시 이 AxeTier 사용.\n    //   - 값 순서(0..6)는 승강 로직이 의존하므로 임의로 재배치 금지.\n    // ============================================================\n\n    /// <summary>\n    /// 플레이어 도끼 등급. 최저 Stick(막대기) ~ 최고 Diamond(다이아).\n    /// </summary>\n    public enum AxeTier\n    {\n        Stick = 0,    // 막대기 (최저)\n        Wood = 1,     // 나무\n        Stone = 2,    // 돌\n        Iron = 3,     // 철\n        Silver = 4,   // 은\n        Gold = 5,     // 금\n        Diamond = 6,  // 다이아 (최고)\n    }\n}\n","lines":29},{"id":"Scripts/Tier/RunResult.cs","name":"RunResult","path":"Scripts/Tier/RunResult.cs","layer":"Tier","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"한 런의 결과. 티어 계산의 입력값.","src":"using System;\n\nnamespace Wooduduk.Tier\n{\n    // ============================================================\n    // RunResult — 티어 계산 입력(한 런의 결과)\n    // ------------------------------------------------------------\n    // 사용법:\n    //   - 슬롯 런이 끝나면 그 런의 \"최종 raw 점수\"를 담아 전달.\n    //   - TierCalculator.Apply 가 RawScore 만으로 성공/실패를 판정.\n    // 주의:\n    //   - RawScore 는 배율 적용 \"전\"의 순수 정산 점수(스펙 §2). 티어/LP는 실력만으로 판정.\n    //   - Combo/Precision 등은 추후 확장 여지. 현재 티어 로직은 RawScore 만 사용(YAGNI).\n    //   - 이 모듈은 점수를 \"산출\"하지 않음. 외부에서 계산된 결과를 받기만 함(범위 §6).\n    // ============================================================\n\n    /// <summary>\n    /// 한 런의 결과. 티어 계산의 입력값.\n    /// </summary>\n    [Serializable]\n    public struct RunResult\n    {\n        /// <summary>런 최종 raw 점수(배율 적용 전). 티어 성공/실패 판정 기준.</summary>\n        public int RawScore;\r\n        public int Rank;\r\n        public int PlayerCount;\r\n\r\n        public bool IsMultiplayer => Rank > 0 && PlayerCount > 1;\r\n\r\n        public RunResult(int rawScore)\r\n        {\r\n            RawScore = rawScore;\r\n            Rank = 0;\r\n            PlayerCount = 0;\r\n        }\r\n\r\n        public RunResult(int rawScore, int rank, int playerCount)\r\n        {\r\n            RawScore = rawScore;\r\n            Rank = rank;\r\n            PlayerCount = playerCount;\r\n        }\r\n\n\n        public override string ToString()\n        {\n            return $\"RunResult(RawScore={RawScore})\";\n        }\n    }\n}\n","lines":51},{"id":"Scripts/Tier/TierCalculator.cs","name":"TierCalculator","path":"Scripts/Tier/TierCalculator.cs","layer":"Tier","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"티어 승강 계산기. 순수 정적 로직(결정론·무부작용).","src":"using UnityEngine;\n\nnamespace Wooduduk.Tier\n{\n    // ============================================================\n    // TierCalculator — 티어 승강 순수 로직 (코어)\n    // ------------------------------------------------------------\n    // 사용법:\n    //   var progress = TierCalculator.Apply(currentState, runResult, config);\n    //   // progress.NewState 를 저장/적용, progress.Change 로 연출 분기.\n    // 원칙:\n    //   - 전부 static · 결정론 · 부작용 없음(I/O·랜덤·시간 없음). 같은 입력 → 같은 출력.\n    //   - 결정 수치 계산 중에는 로그 금지. 마지막에 결정 요약 1줄만 Debug.Log(팀 진단 규칙).\n    // 알고리즘(스펙 §4.6 정확히):\n    //   1) target = config.GetTargetScore(Rank); success = RawScore >= target (경계 일치=성공)\n    //   2) lpDelta = success ? +Gain : -Loss; newLp = Lp + lpDelta\n    //   3) newProtection = Max(0, Protect - 1)   (매 런 1 감소)\n    //   4) 승급: newLp >= Threshold && Rank < Diamond → Rank+1, newLp -= Threshold(이월),\n    //            newProtection = DemoteProtectionRuns, Change=Promoted\n    //            Diamond에서 임계 초과 → newLp = Threshold 클램프, Change=None\n    //   5) 강등: newLp < 0 →\n    //            보호>0 → newLp=0, Change=None, DemoteBlockedByProtection=true\n    //            보호==0 && Rank>Stick → Rank-1, newLp = DemoteLandingLp, Change=Demoted\n    //            Rank==Stick → newLp=0(바닥), Change=None\n    //   6) 그 외 → Change=None\n    // ============================================================\n\n    /// <summary>\n    /// 티어 승강 계산기. 순수 정적 로직(결정론·무부작용).\n    /// </summary>\n    public static class TierCalculator\n    {\n        #region 핵심 계산 (Apply)\n\n        /// <summary>\n        /// 한 런 결과를 현재 상태에 적용해 갱신 상태/변화를 계산한다.\n        /// </summary>\n        /// <param name=\"current\">현재 티어 상태.</param>\n        /// <param name=\"run\">이번 런 결과(RawScore 사용).</param>\n        /// <param name=\"config\">티어 설정 SO.</param>\n        /// <returns>갱신 상태 + 변화 종류 + LP 증감 + 보호 차단 여부.</returns>\n        public static TierProgress Apply(TierState current, RunResult run, TierConfigSO config)\n        {\n            // config 누락 방어: 결정론은 유지하되, 잘못된 호출을 조기에 드러낸다.\n            if (config == null)\n            {\n                Debug.LogError(\"[TierCalculator] config 가 null 입니다. 변화 없이 현재 상태를 반환합니다.\");\n                return new TierProgress\n                {\n                    NewState = current,\n                    Change = TierChangeKind.None,\n                    LpDelta = 0,\n                    DemoteBlockedByProtection = false,\n                };\n            }\n\n            // 1) LP 증감 계산 — 멀티는 등수별 차등(1등 최대 → 하위 감소), 싱글은 점수 vs 목표.\n            int target = config.GetTargetScore(current.Rank);\n            int lpDelta;\n            if (run.IsMultiplayer)\n            {\n                lpDelta = MultiLpDelta(run.Rank, config);   // 1=+Gain, 2=+Gain/2, 3=0, 4↓=-Loss\n            }\n            else\n            {\n                bool success = run.RawScore >= target;       // 싱글: 점수 >= 목표점수\n                lpDelta = success ? config.LpGainOnSuccess : -config.LpLossOnFail;\n            }\n\n            // 2) LP 적용\n            int newLp = current.Lp + lpDelta;\n\n            // 3) 보호 카운트 매 런 1 감소(0 미만 클램프)\n            int newProtection = Mathf.Max(0, current.PromoteProtectionRemaining - 1);\n\n            // 결과 누적용 로컬\n            AxeTier newRank = current.Rank;\n            TierChangeKind change = TierChangeKind.None;\n            bool demoteBlocked = false;\n\n            // 4) 승급 판정\n            if (newLp >= config.PromoteThreshold && current.Rank < AxeTier.Diamond)\n            {\n                newRank = current.Rank + 1;          // 한 등급 상승\n                newLp -= config.PromoteThreshold;    // 오버플로우 이월\n                newProtection = config.DemoteProtectionRuns; // 승급 직후 강등 보호 부여\n                change = TierChangeKind.Promoted;\n            }\n            // Diamond(최고)에서 임계 초과 → 더 안 오르고 클램프\n            else if (newLp >= config.PromoteThreshold && current.Rank >= AxeTier.Diamond)\n            {\n                newLp = config.PromoteThreshold;     // 상한 클램프\n                change = TierChangeKind.None;\n            }\n            // 5) 강등 판정 (LP가 0 미만일 때만)\n            else if (newLp < 0)\n            {\n                if (newProtection > 0)\n                {\n                    // 보호 남음 → 강등 차단, LP 바닥 처리\n                    newLp = 0;\n                    change = TierChangeKind.None;\n                    demoteBlocked = true;\n                }\n                else if (current.Rank > AxeTier.Stick)\n                {\n                    // 보호 없음 + 하위 등급 여지 있음 → 한 등급 강등, 재시작 LP 부여\n                    newRank = current.Rank - 1;\n                    newLp = config.DemoteLandingLp;\n                    change = TierChangeKind.Demoted;\n                }\n                else\n                {\n                    // 최저(Stick)에서는 더 못 내려감 → 바닥 유지\n                    newLp = 0;\n                    change = TierChangeKind.None;\n                }\n            }\n            // 6) 그 외 → 변화 없음 (change 는 이미 None)\n\n            TierProgress progress = new TierProgress\n            {\n                NewState = new TierState(newRank, newLp, newProtection),\n                Change = change,\n                LpDelta = lpDelta,\n                DemoteBlockedByProtection = demoteBlocked,\n            };\n\n            // 진단: 결정 요약 1줄(수치 계산 종료 후). 결정론에 영향 없음.\n            Debug.Log($\"[TierCalculator] Apply 결정 → multi={run.IsMultiplayer} rank={run.Rank}/{run.PlayerCount} (raw={run.RawScore}/target={target}), \" +\n                      $\"lpDelta={lpDelta}, change={change}, blocked={demoteBlocked} | {current} → {progress.NewState}\");\n\n            return progress;\n        }\n\n        // 멀티 등수 → LP 증감. 요청 스펙: 1등·2등 차등 보상(+), 3등 유지(0), 4등 이하 감소(-).\n        // 기존 config 재사용(1등=풀 Gain, 2등=Gain 절반). 정확 수치는 밸런스에서 튜닝.\n        // ※ 4인 매치 기준. 5인+ 등 확장 시 여기 등수 분기 조정.\n        private static int MultiLpDelta(int rank, TierConfigSO config)\n        {\n            if (rank <= 1) return config.LpGainOnSuccess;                         // 1등: 풀 보상\n            if (rank == 2) return Mathf.CeilToInt(config.LpGainOnSuccess * 0.5f); // 2등: 절반 보상(차등)\n            if (rank == 3) return 0;                                              // 3등: 유지\n            return -config.LpLossOnFail;                                          // 4등 이하: 감소\n        }\n\n        #endregion\n\n        #region 배율 조회 (Score Multiplier)\n\n        /// <summary>\n        /// 등급의 점수 배율을 반환(스코어링 측 편의). config 의 헬퍼에 위임.\n        /// </summary>\n        public static float GetScoreMultiplier(AxeTier rank, TierConfigSO config)\n        {\n            if (config == null)\n            {\n                Debug.LogError(\"[TierCalculator] GetScoreMultiplier: config 가 null. 1f 반환.\");\n                return 1f;\n            }\n            return config.GetMultiplier(rank);\n        }\n\n        #endregion\n\n        #region 시즌 훅 (Soft Reset)\n\n        /// <summary>\n        /// 시즌 소프트 리셋 훅(현재 미사용). 기본 규칙:\n        /// Stick 초과면 한 등급 강등, LP = DemoteLandingLp, 보호 0.\n        /// Stick 이면 등급 유지, LP = 0, 보호 0.\n        /// </summary>\n        public static TierState SoftReset(TierState current, TierConfigSO config)\n        {\n            if (config == null)\n            {\n                Debug.LogError(\"[TierCalculator] SoftReset: config 가 null. 현재 상태 반환.\");\n                return current;\n            }\n\n            AxeTier rank = current.Rank;\n            int lp;\n\n            if (current.Rank > AxeTier.Stick)\n            {\n                rank = current.Rank - 1;             // 한 등급 강등\n                lp = config.DemoteLandingLp;          // 재시작 LP\n            }\n            else\n            {\n                lp = 0;                              // 최저는 등급 유지, LP만 바닥\n            }\n\n            TierState reset = new TierState(rank, lp, 0);\n            Debug.Log($\"[TierCalculator] SoftReset(시즌 훅) {current} → {reset}\");\n            return reset;\n        }\n\n        #endregion\n    }\n}\n","lines":202},{"id":"Scripts/Tier/TierConfigSO.cs","name":"TierConfigSO","path":"Scripts/Tier/TierConfigSO.cs","layer":"Tier","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"등급별 설정 한 항목. 표시명/목표점수/배율.","src":"using System;\nusing UnityEngine;\n\nnamespace Wooduduk.Tier\n{\n    // ============================================================\n    // TierConfigSO — 티어 시스템 설정(ScriptableObject)\n    // ------------------------------------------------------------\n    // 사용법:\n    //   - Project 창에서 [Create > GameData > TierConfig] 로 에셋 생성 후 인스펙터에서 값 편집.\n    //   - TierCalculator / TierService 가 이 SO를 읽어 승강/배율을 결정.\n    //   - 등급별 TierEntry 배열로 표시명/목표점수/배율을 보유.\n    // 헬퍼:\n    //   GetEntry(AxeTier)       : 해당 등급의 TierEntry (없으면 null).\n    //   GetTargetScore(AxeTier) : 해당 등급의 목표 점수 (없으면 0).\n    //   GetMultiplier(AxeTier)  : 해당 등급의 점수 배율 (없으면 1f).\n    // 주의:\n    //   - 모든 수치는 추후 밸런싱 대상(스펙 §7). 코드 기본값은 합리적 출발점일 뿐.\n    //   - ScoreMultiplier 는 LP 계산엔 미적용. 리더보드/프레스티지용으로 스코어링 측이 읽음(스펙 §2).\n    //   - 필드를 public 으로 둔 이유: 인스펙터 편집 + EditMode 테스트에서 직접 채우기 위함.\n    // ============================================================\n\n    /// <summary>\n    /// 등급별 설정 한 항목. 표시명/목표점수/배율.\n    /// </summary>\n    [Serializable]\n    public class TierEntry\n    {\n        /// <summary>이 항목이 적용되는 등급.</summary>\n        public AxeTier Rank;\n\n        /// <summary>UI 표시용 등급 이름.</summary>\n        public string DisplayName;\n\n        /// <summary>이 등급에서 \"성공\" 으로 판정되는 raw 점수 임계(이상이면 성공).</summary>\n        public int TargetScore;\n\n        /// <summary>점수 배율(기본 1.0). LP엔 미적용, 스코어링/표시용.</summary>\n        public float ScoreMultiplier = 1f;\n\n        public TierEntry() { }\n\n        public TierEntry(AxeTier rank, string displayName, int targetScore, float scoreMultiplier = 1f)\n        {\n            Rank = rank;\n            DisplayName = displayName;\n            TargetScore = targetScore;\n            ScoreMultiplier = scoreMultiplier;\n        }\n    }\n\n    /// <summary>\n    /// 티어 시스템 전역 설정 + 등급별 테이블.\n    /// </summary>\n    [CreateAssetMenu(fileName = \"TierConfig\", menuName = \"GameData/TierConfig\")]\n    public class TierConfigSO : ScriptableObject\n    {\n        #region 전역 설정 (Global)\n\n        [Header(\"전역 LP 설정\")]\n        [Tooltip(\"승급에 필요한 LP 임계. LP가 이 값 이상이면 승급.\")]\n        public int PromoteThreshold = 100;\n\n        [Tooltip(\"성공(목표 달성) 시 얻는 LP.\")]\n        public int LpGainOnSuccess = 30;\n\n        [Tooltip(\"실패(목표 미달) 시 잃는 LP.\")]\n        public int LpLossOnFail = 25;\n\n        [Tooltip(\"승급 직후 강등 보호가 적용되는 판수.\")]\n        public int DemoteProtectionRuns = 2;\n\n        // 강등 직후 재시작 LP (기본: PromoteThreshold 절반 의도)\n        [Tooltip(\"강등 직후 재시작 LP. 기본값은 PromoteThreshold 의 절반 의도.\")]\n        public int DemoteLandingLp = 50;\n\n        #endregion\n\n        #region 등급별 테이블 (Per-Tier)\n\n        [Header(\"등급별 테이블 (Stick → Diamond 순 권장)\")]\n        [Tooltip(\"등급별 표시명/목표점수/배율. 비우면 헬퍼는 기본값(0, 1f)을 반환.\")]\n        public TierEntry[] Entries = CreateDefaultEntries();\n\n        #endregion\n\n        #region 조회 헬퍼 (Lookup Helpers)\n\n        /// <summary>\n        /// 등급에 해당하는 TierEntry 반환. 없으면 null.\n        /// </summary>\n        public TierEntry GetEntry(AxeTier rank)\n        {\n            if (Entries == null) return null;\n\n            // 등급별 항목은 보통 7개로 작아 선형 탐색으로 충분(가독성 우선).\n            for (int i = 0; i < Entries.Length; i++)\n            {\n                if (Entries[i] != null && Entries[i].Rank == rank)\n                    return Entries[i];\n            }\n            return null;\n        }\n\n        /// <summary>\n        /// 등급의 목표 점수 반환. 항목이 없으면 0(=항상 성공)으로 폴백.\n        /// </summary>\n        public int GetTargetScore(AxeTier rank)\n        {\n            TierEntry entry = GetEntry(rank);\n            return entry != null ? entry.TargetScore : 0;\n        }\n\n        /// <summary>\n        /// 등급의 점수 배율 반환. 항목이 없으면 1f 로 폴백.\n        /// </summary>\n        public float GetMultiplier(AxeTier rank)\n        {\n            TierEntry entry = GetEntry(rank);\n            return entry != null ? entry.ScoreMultiplier : 1f;\n        }\n\n        #endregion\n\n        #region 기본값 (Defaults)\n\n        // 코드 기본 테이블. 막대기~다이아, 목표 점수 오름차순.\n        // 인스펙터에서 자유롭게 덮어쓸 수 있으며 최종 밸런스는 추후 튜닝(스펙 §7).\n        private static TierEntry[] CreateDefaultEntries()\n        {\n            return new TierEntry[]\n            {\n                new TierEntry(AxeTier.Stick,   \"막대기\",      1000,  1.0f),\n                new TierEntry(AxeTier.Wood,    \"나무 도끼\",   2000,  1.1f),\n                new TierEntry(AxeTier.Stone,   \"돌 도끼\",     3500,  1.25f),\n                new TierEntry(AxeTier.Iron,    \"철 도끼\",     5500,  1.5f),\n                new TierEntry(AxeTier.Silver,  \"은 도끼\",     8000,  1.75f),\n                new TierEntry(AxeTier.Gold,    \"금 도끼\",     11000, 2.0f),\n                new TierEntry(AxeTier.Diamond, \"다이아 도끼\", 15000, 2.5f),\n            };\n        }\n\n        #endregion\n    }\n}\n","lines":146},{"id":"Scripts/Tier/TierEvents.cs","name":"TierEvents","path":"Scripts/Tier/TierEvents.cs","layer":"Tier","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"티어 변화 이벤트 허브. 정적 채널(팀 표준 패턴).","src":"using System;\nusing UnityEngine;\n\nnamespace Wooduduk.Tier\n{\n    // ============================================================\n    // TierEvents — 티어 이벤트 정적 허브 (팀 패턴)\n    // ------------------------------------------------------------\n    // 사용법:\n    //   구독:   TierEvents.OnTierChanged += HandleTierChanged;\n    //   해제:   TierEvents.OnTierChanged -= HandleTierChanged;\n    //   발행:   TierEvents.RaiseTierChanged(progress);   // 보통 TierService 가 호출\n    // 패턴:\n    //   - 프로젝트의 GameEvents 와 동일한 정적 이벤트 채널 방식.\n    //   - 발행자/구독자 디커플링. UI·연출은 여기에만 의존.\n    // 주의:\n    //   - 정적 이벤트는 씬 전환에도 살아있다. 구독한 객체는 파괴 시 반드시 -= 해제할 것(누수 방지).\n    // ============================================================\n\n    /// <summary>\n    /// 티어 변화 이벤트 허브. 정적 채널(팀 표준 패턴).\n    /// </summary>\n    public static class TierEvents\n    {\n        /// <summary>티어 계산 결과가 적용될 때 발행. 인자는 TierProgress.</summary>\n        public static event Action<TierProgress> OnTierChanged;\n\n        /// <summary>\n        /// 티어 변화 이벤트 발행. 구독자가 없으면 조용히 무시.\n        /// </summary>\n        public static void RaiseTierChanged(TierProgress progress)\n        {\n            // 진단: 발행 시점 1줄(구독자 유무는 OnTierChanged null 여부로 추정).\n            Debug.Log($\"[TierEvents] RaiseTierChanged 발행 → {progress} (구독자 있음={(OnTierChanged != null)})\");\n            OnTierChanged?.Invoke(progress);\n        }\n    }\n}\n","lines":39},{"id":"Scripts/Tier/TierProgress.cs","name":"TierProgress","path":"Scripts/Tier/TierProgress.cs","layer":"Tier","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"이번 런으로 발생한 티어 변화 종류.","src":"using System;\n\nnamespace Wooduduk.Tier\n{\n    // ============================================================\n    // TierProgress / TierChangeKind — Apply 결과(UI·연출용)\n    // ------------------------------------------------------------\n    // 사용법:\n    //   - TierCalculator.Apply 의 반환값. 갱신된 상태 + 변화 종류 + 부가 정보.\n    //   - UI/연출 측이 Change, LpDelta, DemoteBlockedByProtection 을 읽어 표시.\n    // 필드:\n    //   NewState                  : 계산 후 갱신된 티어 상태(이 값을 저장/적용).\n    //   Change                    : 이번 런의 변화(None/Promoted/Demoted).\n    //   LpDelta                   : 이번 런의 LP 증감(성공 +Gain, 실패 -Loss). 승급 이월 차감은 미반영.\n    //   DemoteBlockedByProtection : 강등될 상황이었으나 보호로 막혔으면 true.\n    // 설계 메모:\n    //   - 출력 집계용 구조체라 생성자 없이 의도적으로 객체 초기자(object-initializer)로 채운다.\n    // ============================================================\n\n    /// <summary>이번 런으로 발생한 티어 변화 종류.</summary>\n    public enum TierChangeKind\n    {\n        None = 0,        // 변화 없음\n        Promoted = 1,    // 승급\n        Demoted = 2,     // 강등\n        SeasonReset = 3, // 시즌 소프트 리셋(ApplySeasonReset 로 발생). 값 순서 유지 위해 끝에 추가.\n    }\n\n    /// <summary>\n    /// 티어 계산 결과. 갱신된 상태와 연출에 필요한 신호를 함께 노출.\n    /// </summary>\n    [Serializable]\n    public struct TierProgress\n    {\n        /// <summary>계산 후 갱신된 티어 상태. 이 값을 저장/적용한다.</summary>\n        public TierState NewState;\n\n        /// <summary>이번 런의 변화 종류(None/Promoted/Demoted).</summary>\n        public TierChangeKind Change;\n\n        /// <summary>이번 런의 LP 증감(성공 +LpGain, 실패 -LpLoss). 승급 임계 차감은 별도.</summary>\n        public int LpDelta;\n\n        /// <summary>강등될 상황이었으나 보호로 막힌 경우 true.</summary>\n        public bool DemoteBlockedByProtection;\n\n        public override string ToString()\n        {\n            return $\"TierProgress(Change={Change}, LpDelta={LpDelta}, \" +\n                   $\"BlockedByProtection={DemoteBlockedByProtection}, New={NewState})\";\n        }\n    }\n}\n","lines":54},{"id":"Scripts/Tier/TierState.cs","name":"TierState","path":"Scripts/Tier/TierState.cs","layer":"Tier","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"플레이어 티어 진행 상태. 직렬화 가능(영구 저장 대상).","src":"using System;\n\nnamespace Wooduduk.Tier\n{\n    // ============================================================\n    // TierState — 플레이어 티어 진행 상태(영구 저장 대상)\n    // ------------------------------------------------------------\n    // 사용법:\n    //   - 한 플레이어의 현재 등급/LP/강등 보호 잔여 판수를 보관.\n    //   - TierCalculator.Apply 의 입력이자, 결과 NewState 로 갱신됨.\n    //   - 저장/로드는 외부 담당(손찬성). 이 모듈은 상태만 노출.\n    // 필드:\n    //   Rank                        : 현재 도끼 등급.\n    //   Lp                          : 현재 LP(0 ~ PromoteThreshold 범위에서 운용).\n    //   PromoteProtectionRemaining  : 승급 직후 강등 보호가 남은 판수(매 런 1 감소).\n    // ============================================================\n\n    /// <summary>\n    /// 플레이어 티어 진행 상태. 직렬화 가능(영구 저장 대상).\n    /// </summary>\n    [Serializable]\n    public struct TierState\n    {\n        /// <summary>현재 도끼 등급.</summary>\n        public AxeTier Rank;\n\n        /// <summary>현재 LP. 승급 임계 도달 시 승급, 0 미만 시 강등 판정.</summary>\n        public int Lp;\n\n        /// <summary>승급 직후 강등 보호가 남은 판수. 매 런 1 감소(0 미만 클램프).</summary>\n        public int PromoteProtectionRemaining;\n\n        public TierState(AxeTier rank, int lp, int promoteProtectionRemaining)\n        {\n            Rank = rank;\n            Lp = lp;\n            PromoteProtectionRemaining = promoteProtectionRemaining;\n        }\n\n        /// <summary>신규 플레이어 기본 상태: Stick / LP 0 / 보호 0.</summary>\n        public static TierState CreateDefault()\n        {\n            return new TierState(AxeTier.Stick, 0, 0);\n        }\n\n        public override string ToString()\n        {\n            return $\"TierState(Rank={Rank}, Lp={Lp}, Protect={PromoteProtectionRemaining})\";\n        }\n    }\n}\n","lines":52},{"id":"Scripts/Core/IPoolable.cs","name":"IPoolable","path":"Scripts/Core/IPoolable.cs","layer":"Core","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"풀에서 꺼내져 활성화될 때 실행할 로직 (예: 체력 가득 채우기, 위치 설정 등)","src":"using UnityEngine;\n\nnamespace Wooduduk.Core\n{\n    public interface IPoolable\n    {\n        // 풀에서 꺼내져 활성화될 때 실행할 로직 (예: 체력 가득 채우기, 위치 설정 등)\n        void OnSpawn();\n        \n        // 풀로 반환되어 비활성화될 때 실행할 로직 (예: 코루틴 정지, 물리 연산 초기화 등)\n        void OnReturn();\n        \n        // 풀로 자신을 돌려보내기 위해 호출할 델리게이트를 등록하는 메서드\n        void SetupPoolReturn(System.Action<GameObject> returnAction);\n    }\n}","lines":16},{"id":"Scripts/Data/Service/RunEndService.cs","name":"RunEndService","path":"Scripts/Data/Service/RunEndService.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"기존 호출 호환용 메서드 UserManager.Instance.CurrentUserData에서 유저를 가져와 처리","src":"﻿using UnityEngine;\r\nusing Wooduduk.Data.Result;\r\nusing Wooduduk.Data.Static;\r\nusing Wooduduk.Data.Tier;\r\nusing Wooduduk.Network.Firebase;\r\nusing Wooduduk.Network.Firebase.Leaderboard;\r\nusing Wooduduk.Slot;\r\n\r\nnamespace Wooduduk.Data.Service\r\n{\r\n    public enum RunMode\r\n    {\r\n        Single,\r\n        Multi\r\n    }\r\n\r\n    public static class RunEndService\r\n    {\r\n        /// <summary>\r\n        /// 기존 호출 호환용 메서드\r\n        /// UserManager.Instance.CurrentUserData에서 유저를 가져와 처리\r\n        /// </summary>\r\n        public static RunResultData EndRun(RunProgress run, SlotScoreCalculator score, RunMode mode)\r\n        {\r\n            UserData user = UserManager.Instance != null ? UserManager.Instance.CurrentUserData : null;\r\n\r\n            return EndRun(run, score, mode, user);\r\n        }\r\n\r\n        /// <summary>\r\n        /// 런 종료 진입점\r\n        /// user를 명시적으로 넘겨 싱글/멀티 모두 사용\r\n        /// - Single: 즉시 결과 계산 가능하므로 RunResultData 반환\r\n        /// - Multi : 서버 RPC 비동기 처리이므로 즉시 결과를 알 수 없어 null 반환\r\n        /// </summary>\r\n        public static RunResultData EndRun(RunProgress run, SlotScoreCalculator score, RunMode mode, UserData user)\r\n        {\r\n            if (run == null || score == null || user == null) { /* log */ return null; }\r\n\r\n            // ★ 공통: 고스트 저장은 모드 무관\r\n            SaveGhost(run, score, user);\r\n\r\n            switch (mode)\r\n            {\r\n                case RunMode.Single:\r\n                    // 싱글: 로컬에서 결과 계산\r\n                    RunResultData result = SingleRunResultService.Process(run, score, user);\r\n\r\n                    return result;\r\n\r\n                case RunMode.Multi:\r\n                    // 멀티: 임시 결과만. 확정은 GameController가 등수 수신 후\r\n                    // MultiRunResultService.ConfirmRank 호출\r\n                    return null; // 또는 provisionalRank를 못 구하므로 여기선 안 만들고 컨트롤러에서 \r\n\r\n                default:\r\n                    Debug.LogError($\"[RunEndService] 알 수 없는 RunMode: {mode}\");\r\n                    return null;\r\n            }\r\n        }\r\n        public static void SaveGhost(RunProgress run, SlotScoreCalculator score, UserData user)\r\n        {\r\n            // 유저 데이터 없으면 저장 불가\r\n            if (user == null)\r\n            {\r\n                Debug.LogWarning(\"[RunEndService] UserData 없음 — 고스트 저장 생략\");\r\n                return;\r\n            }\r\n\r\n            // 점수 계산기 없으면 저장 불가\r\n            if (score == null)\r\n            {\r\n                Debug.LogWarning(\"[RunEndService] SlotScoreCalculator 없음 — 고스트 저장 생략\");\r\n                return;\r\n            }\r\n\r\n            // TierRunResult 빌드\r\n            TierRunResult tierResult = TierRunResultBuilder.Build(run, score);\r\n            if (tierResult == null)\r\n            {\r\n                Debug.LogWarning(\"[RunEndService] TierRunResult 빌드 실패 — 고스트 저장 생략\");\r\n                return;\r\n            }\r\n\r\n            // 고스트 저장 (유저 티어 기준)\r\n            new GhostRepository().Save(tierResult, user._axeTier);\r\n\r\n            Debug.Log($\"[RunEndService] 고스트 저장 완료: userId={user._userId}, tier={user._axeTier}\");\r\n        }\r\n    }\r\n}","lines":91},{"id":"Scripts/Slot/EffectCatalog.cs","name":"EffectCatalog","path":"Scripts/Slot/EffectCatalog.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"카드 (영구: RemainingSpins = -1). 수치는 생성자 주입. 추후 시트/SO로 공급. 알루미늄 배트 : 스윙 출현 가중치↑.","src":"﻿using System;\r\nusing System.Collections.Generic;\r\nusing Wooduduk.Data.DataSO;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    // 카드 (영구: RemainingSpins = -1). 수치는 생성자 주입. 추후 시트/SO로 공급.\r\n    // 알루미늄 배트 : 스윙 출현 가중치↑.\r\n    public sealed class AluminumBatCard : SlotEffect\r\n    {\r\n        private readonly int _swingPercent;\r\n        public AluminumBatCard(int swingPercent = 130) { _swingPercent = swingPercent; RemainingSpins = -1; }\r\n        public override string Id => \"C001\";\r\n        public override string DisplayName => \"알루미늄 배트\";\r\n        public override void ModifyWeights(WeightTable t, in SpinContext ctx) => t.MultiplyPercent(SymbolId.SWING, _swingPercent);\r\n    }\r\n\r\n    // 살충제 : 좀벌레 출현 가중치↓.\r\n    public sealed class PesticideCard : SlotEffect\r\n    {\r\n        private readonly int _wormPercent;\r\n        public PesticideCard(int wormPercent = 50) { _wormPercent = wormPercent; RemainingSpins = -1; }\r\n        public override string Id => \"C008\";\r\n        public override string DisplayName => \"살충제\";\r\n        public override void ModifyWeights(WeightTable t, in SpinContext ctx) => t.MultiplyPercent(SymbolId.WORM, _wormPercent);\r\n    }\r\n\r\n    // 보험 증서 : 실패 시 콤보/미정산 보존(차지 소모).\r\n    public sealed class InsuranceCard : SlotEffect\r\n    {\r\n        private int _charges;\r\n        public InsuranceCard(int charges = 1) { _charges = charges; RemainingSpins = -1; }\r\n        public override string Id => \"C003\";\r\n        public override string DisplayName => \"보험 증서\";\r\n        public override bool TryConsumeFailGuard()\r\n        {\r\n            if (_charges <= 0) return false;\r\n            _charges--;\r\n            return true;\r\n        }\r\n    }\r\n\r\n    // 도토리 자루 : 도토리 즉시 보너스 \r\n    public sealed class AcornSackCard : SlotEffect\r\n    {\r\n        private readonly int _mult;\r\n        public AcornSackCard(int mult = 2) { _mult = mult; RemainingSpins = -1; }\r\n        public override string Id => \"C005\";\r\n        public override string DisplayName => \"도토리 자루\";\r\n        public override int AcornValueMultiplier => _mult;\r\n    }\r\n\r\n    // 4번째 릴 : 릴 +1. '풀스윙 기준 상향'은 판정 임계 확정 후 별도 적용.\r\n    public sealed class FourthReelCard : SlotEffect\r\n    {\r\n        public FourthReelCard() { RemainingSpins = -1; }\r\n        public override string Id => \"C006\";\r\n        public override string DisplayName => \"6번째 릴\";\r\n        public override int ExtraReels => 1;\r\n    }\r\n\r\n    // 행운 묘목 카드(영구) : 행운 심볼 가중치↑. AluminumBatCard 패턴.\r\n    public sealed class LuckySaplingCard : SlotEffect\r\n    {\r\n        private readonly int _luckPercent;\r\n        public LuckySaplingCard(int luckPercent = 108) { _luckPercent = luckPercent; RemainingSpins = -1; }\r\n        public override string Id => \"C002\";\r\n        public override string DisplayName => \"행운 묘목\";\r\n        public override void ModifyWeights(WeightTable t, in SpinContext ctx) => t.MultiplyPercent(SymbolId.LUCK, _luckPercent);\r\n    }\r\n\r\n    // 막걸리 항아리 카드(영구) : 막걸리 심볼 가중치↑ + 디버프 막걸리 지속 절반(기획서 C007).\r\n    public sealed class MakgeolliJarCard : SlotEffect\r\n    {\r\n        private readonly int _makgeolliPercent;\r\n        public MakgeolliJarCard(int makgeolliPercent = 108) { _makgeolliPercent = makgeolliPercent; RemainingSpins = -1; }\r\n        public override string Id => \"C007\";\r\n        public override string DisplayName => \"막걸리 항아리\";\r\n        public override bool HalvesDebuffDuration => true;\r\n        public override void ModifyWeights(WeightTable t, in SpinContext ctx) => t.MultiplyPercent(SymbolId.MAKGEOLLI, _makgeolliPercent);\r\n    }\r\n\r\n    // 막걸리 효과 (임시: RemainingSpins = 지속 스핀 수). GDD 막걸리 10종(M001~M010) 전부 구현.\r\n\r\n    // 황금 손(버프) : 도토리 가치 ×2 (기획서). [기존 장작배율 → 도토리로 정렬]\r\n    public sealed class GoldenHandEffect : SlotEffect\r\n    {\r\n        private readonly int _mult;\r\n        public GoldenHandEffect(int durationSpins = 5, int acornMult = 2) { RemainingSpins = durationSpins; _mult = acornMult; }\r\n        public override string Id => \"M002\";\r\n        public override string DisplayName => \"황금 손\";\r\n        public override int AcornValueMultiplier => _mult;\r\n    }\r\n\r\n    // 무거운 도끼(디버프) : 명중 시 강제 약스윙(×1.0). 헛스윙/좀벌레 실패는 그대로(SlotMachine서 처리).\r\n    public sealed class HeavyAxeEffect : SlotEffect\r\n    {\r\n        public HeavyAxeEffect(int durationSpins = 1) { RemainingSpins = durationSpins; }\r\n        public override string Id => \"M008\";\r\n        public override string DisplayName => \"무거운 도끼\";\r\n        public override bool ForcesWeakSwing => true;\r\n        public override bool IsDebuff => true;\r\n    }\r\n\r\n    // 행운목 바람(버프) : 행운 출현 가중치↑.\r\n    public sealed class LuckyWindEffect : SlotEffect\r\n    {\r\n        private readonly int _luckPercent;\r\n        public LuckyWindEffect(int durationSpins = 3, int luckPercent = 200) { RemainingSpins = durationSpins; _luckPercent = luckPercent; }\r\n        public override string Id => \"M005\";\r\n        public override string DisplayName => \"행운목 바람\";\r\n        public override void ModifyWeights(WeightTable t, in SpinContext ctx) => t.MultiplyPercent(SymbolId.LUCK, _luckPercent);\r\n    }\r\n\r\n    // 불타는 도끼(막걸리 버프) : 스윙 출현 가중치↑.\r\n    public sealed class BurningAxeEffect : SlotEffect\r\n    {\r\n        private readonly int _swingPercent;\r\n        public BurningAxeEffect(int durationSpins = 5, int swingPercent = 115) { RemainingSpins = durationSpins; _swingPercent = swingPercent; }\r\n        public override string Id => \"M001\";\r\n        public override string DisplayName => \"불타는 도끼\";\r\n        public override void ModifyWeights(WeightTable t, in SpinContext ctx) => t.MultiplyPercent(SymbolId.SWING, _swingPercent);\r\n    }\r\n\r\n    // 장인의 집중(막걸리 버프) : 퍼펙트 출현 가중치↑.\r\n    public sealed class ArtisanFocusEffect : SlotEffect\r\n    {\r\n        private readonly int _perfectPercent;\r\n        public ArtisanFocusEffect(int durationSpins = 3, int perfectPercent = 125) { RemainingSpins = durationSpins; _perfectPercent = perfectPercent; }\r\n        public override string Id => \"M003\";\r\n        public override string DisplayName => \"장인의 집중\";\r\n        public override void ModifyWeights(WeightTable t, in SpinContext ctx) => t.MultiplyPercent(SymbolId.PERFECT, _perfectPercent);\r\n    }\r\n\r\n    // 딸꾹질(막걸리 디버프) : 좀벌레 출현 가중치↑.\r\n    public sealed class HiccupEffect : SlotEffect\r\n    {\r\n        private readonly int _wormPercent;\r\n        public HiccupEffect(int durationSpins
