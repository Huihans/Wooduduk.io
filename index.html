MatchmakingFlow(LoadScene 모드)가 SceneManager.LoadSceneAsync로 이 씬을 로드하면\n    //     seed/session/Repository는 정적 RoomContext로 넘어와 있고, 여기서 게임을 켠다.\n    //\n    // 왜 필요:\n    //   · MatchmakingFlow는 매칭 씬(DevScene)에 있고 씬 전환 시 파괴됨.\n    //     실제 게임 GameController는 이 멀티 씬에 있으므로, 전환 후 \"시작\"을 눌러줄 주체가 필요.\n    //\n    // [씬 배치 사용법] (Chunghui_DevMulti.unity)\n    //   1) 빈 GameObject \"MultiGameBootstrap\" 생성 → 이 스크립트 부착.\n    //   2) (권장) 씬의 GameController를 _gameController에 연결. 비우면 FindAnyObjectByType로 자동 탐색.\n    //   3) 매칭 씬 MatchmakingFlow의 _startMode=LoadScene, _multiSceneName=이 씬 이름, Build Settings에 두 씬 등록.\n    //\n    // 안전:\n    //   · 매칭 없이 이 씬을 단독 오픈하면 RoomContext가 비어있음 → 아무것도 안 함(크래시 없음, 로그만).\n    //   · _started 가드로 중복 호출 방지.\n    // ─────────────────────────────────────────────────────────────────────────────\n    [DisallowMultipleComponent]\n    public class MultiGameBootstrap : MonoBehaviour\n    {\n        [Tooltip(\"이 씬의 GameController. 비우면 FindAnyObjectByType로 자동 탐색.\")]\n        [SerializeField] private GameController _gameController;\n\n        [Tooltip(\"멀티 종료 후 결과창 '다시하기/확인' 시 돌아갈 매칭 씬 이름(예: Chunghui_DevScene). Build Settings에 등록돼 있어야 함.\")]\n        [SerializeField] private string _returnSceneName = \"Chunghui_DevScene\";\n\n        private bool _started;\n\n        // 결과창 복귀 버튼 구독(정적 이벤트 → 대칭 구독, 씬 파괴 시 자동 해지).\n        private void OnEnable()  { ResultController.OnRestartRequested += HandleReturnToMatchmaking; }\n        private void OnDisable() { ResultController.OnRestartRequested -= HandleReturnToMatchmaking; }\n\n        // 멀티 종료 후 결과창 확인/다시하기 → 매칭 씬으로 복귀. (EndGame이 이미 RoomContext.Clear 했음)\n        private void HandleReturnToMatchmaking()\n        {\n            if (string.IsNullOrEmpty(_returnSceneName))\n            {\n                Debug.LogError(\"[MultiGameBootstrap] _returnSceneName 비어있음 — 복귀 씬 설정 필요.\");\n                return;\n            }\n            Debug.Log($\"[MultiGameBootstrap] 결과창 복귀 → 씬 로드: {_returnSceneName}\");\n            SceneManager.LoadScene(_returnSceneName);\n        }\n\n        private void Start()\n        {\n            TryStart();\n        }\n\n        private void TryStart()\n        {\n            if (_started) return;\n\n            var ctx = RoomContext.Instance;\n            if (ctx == null || !ctx.IsInMultiplayer)\n            {\n                // 매칭 없이 씬 단독 실행 등 — 정상 스킵(안전).\n                Debug.Log(\"[MultiGameBootstrap] 멀티 컨텍스트 없음(RoomContext 비어있음) — StartMultiGame 스킵(씬 단독 실행으로 간주).\");\n                return;\n            }\n\n            GameController gc = _gameController != null ? _gameController : FindAnyObjectByType<GameController>();\n            if (gc == null)\n            {\n                Debug.LogError(\"[MultiGameBootstrap] GameController 못 찾음 — 멀티 게임 시작 불가. 이 씬에 GameController 배치/연결 확인.\");\n                return;\n            }\n\n            _started = true;\n            gc.StartMultiGame();\n            Debug.Log($\"[MultiGameBootstrap] StartMultiGame 호출 완료 (RoomId={ctx.Session.RoomId}, Seed={ctx.Session.Seed}).\");\n        }\n    }\n}\n","lines":87},{"id":"Scripts/UI/MultiStatusBoard.cs","name":"MultiStatusBoard","path":"Scripts/UI/MultiStatusBoard.cs","layer":"UI","scenes":["Multi"],"entry":true,"summary":"패널 1개에 바인딩할 뷰모델. UI 프레임워크 의존 없는 순수 값 묶음. TempPct는 0~1 정규화 값(폭 % 환산은 호출부에서).","src":"// MultiStatusBoard — Firebase 서버리스 멀티 세션 4명(나+상대3) 실시간 상태판.\n//   · 슬롯 릴 미러 아님 — 점수·체온·콤보·생존만 요약 표시(경쟁 긴장감).\n//   · 별도 UIDocument라 이찬영 HudController와 완전 독립(PanelSettings만 공유).\n//   · 읽기 전용: 외부(RoomLiveSync/RoomContext/GameController) 상태 절대 변경 안 함.\n//\n// [씬 배치 사용법] (Chunghui_DevMulti.unity, 수동)\n//   1) 빈 GameObject \"MultiStatusBoard\" 생성.\n//   2) UIDocument 컴포넌트 추가 → PanelSettings(HUD 것 재사용) + Source Asset = MultiStatusBoard.uxml.\n//   3) 이 스크립트 부착 → uiDocument 연결, gameController = 씬의 GameController 연결(미할당 시 자동 탐색).\n//\n// [의존 타입 정합 메모]\n//   RoomLiveSync.GetPlayerLiveData(string uid) → RoomLiveData{ int score; int combo; float temperature; bool alive; int spinIndex; }\n//   RoomContext.Instance.IsInMultiplayer / .Session(RoomSession)\n//   RoomSession.Players(Dictionary<string,RoomPlayerData>) / .MyUid\n//   RoomPlayerData{ string uid; string nick; int tier; bool ready; bool isGhost; }\n//   GameController.LiveSync(public RoomLiveSync getter)\n\nusing System.Collections.Generic;\nusing UnityEngine;\nusing UnityEngine.UIElements;\nusing Wooduduk.Network;                       // GameController, RoomLiveSync\nusing Wooduduk.Network.Firebase.Matchmaking;  // RoomContext, RoomSession, RoomPlayerData, RoomLiveData\nusing Wooduduk.Slot;                          // SlotEvent (B-6: 내 패널 스핀중 프리즌)\n\nnamespace Wooduduk.UI\n{\n    public class MultiStatusBoard : MonoBehaviour\n    {\n        #region --- 상수 ---\n\n        // 표시 가능한 최대 플레이어 패널 수(방 최대 인원과 동일).\n        private const int MaxPanels = 4;\n\n        // 폴링 주기 — RoomLiveSync/HudController 동기 주기와 맞춤(0.33s ≈ 3Hz).\n        private const float RefreshInterval = 0.33f;\n\n        #endregion\n\n        #region --- 매핑 순수함수 (Unity 런타임 의존 없음 → EditMode 테스트 대상) ---\n\n        /// <summary>\n        /// 패널 1개에 바인딩할 뷰모델. UI 프레임워크 의존 없는 순수 값 묶음.\n        /// TempPct는 0~1 정규화 값(폭 % 환산은 호출부에서).\n        /// </summary>\n        public struct PanelVM\n        {\n            public string Nick;\n            public int Score;\n            public int Combo;\n            public float TempPct;  // 0~1\n            public bool Dead;\n            public bool Mine;\n            public bool FireLit;   // 모닥불 켜짐 여부(ON/OFF만)\n            public int Rank;       // P3: 라이브 순위(점수순 1..4). 0=미계산.\n        }\n\n        /// <summary>\n        /// 라이브 데이터 + 플레이어 정보 → 패널 뷰모델 순수 변환.\n        /// Unity 런타임(씬/UIDocument) 의존 없음 — EditMode에서 단독 검증 가능.\n        /// </summary>\n        /// <param name=\"live\">RoomLiveSync.GetPlayerLiveData 결과(없으면 기본값 객체가 넘어옴).</param>\n        /// <param name=\"player\">방 플레이어 정보.</param>\n        /// <param name=\"myUid\">내 UID(내 패널 강조 판별용).</param>\n        /// <param name=\"maxTemp\">체온 만점(폭 정규화 분모). 0 이하면 TempPct=0.</param>\n        public static PanelVM Map(RoomLiveData live, RoomPlayerData player, string myUid, float maxTemp)\n        {\n            // null 방어 — 데이터가 비어도 UI가 죽지 않도록 안전 기본값.\n            string nick = player != null ? player.nick : string.Empty;\n            string uid = player != null ? player.uid : null;\n\n            // live == null 분기: 스펙 §5는 \"없는 uid→alive=true\"지만, RoomLiveSync.GetPlayerLiveData는\n            // 항상 alive=true 기본객체를 반환(null 미반환)하므로 이 null 분기는 실경로 없는 방어 코드.\n            // EditMode에서 null 입력 시 Dead=true가 나오는 건 의도된 방어값.\n            int score = live != null ? (int)live.score : 0;   // RoomLiveData.score(long) → int 캐스트\n            int combo = live != null ? live.combo : 0;\n            float temp = live != null ? live.temperature : 0f;\n            bool alive = live != null && live.alive;\n\n            // 체온 정규화: maxTemp>0 일 때만 나눗셈, 그 외 0. 0~1로 클램프.\n            float tempPct = maxTemp > 0f ? Mathf.Clamp01(temp / maxTemp) : 0f;\n\n            return new PanelVM\n            {\n                Nick = nick,\n                Score = score,\n                Combo = combo,\n                TempPct = tempPct,\n                Dead = !alive,\n                Mine = uid != null && uid == myUid,\n                FireLit = live != null && live.fireLit,  // null-live면 false(OFF)\n            };\n        }\n\n        #endregion\n\n        #region --- 인스펙터 필드 ---\n\n        [Header(\"참조\")]\n        [Tooltip(\"이 상태판 전용 UIDocument (MultiStatusBoard.uxml 소스).\")]\n        [SerializeField] private UIDocument uiDocument;\n\n        [Tooltip(\"LiveSync 접근용. 미할당 시 Refresh에서 FindAnyObjectByType로 자동 탐색.\")]\n        [SerializeField] private GameController gameController;\n\n        [Header(\"설정\")]\n        [Tooltip(\"체온 게이지 만점(폭 100% 기준). SurvivalConfig 만점과 맞출 것. 기본 100.\")]\n        [SerializeField] private float maxTemp = 100f;\n\n        #endregion\n\n        #region --- 내부 상태(요소 캐시 / 폴링 타이머) ---\n\n        // 보드 루트(전체 표시/숨김 토글용).\n        private VisualElement _board;\n\n        // 패널 4개와 각 하위 요소 캐시(매 프레임 Q 호출 방지).\n        private readonly VisualElement[] _panels = new VisualElement[MaxPanels];\n        private readonly Label[] _nickLabels = new Label[MaxPanels];\n        private readonly Label[] _scoreLabels = new Label[MaxPanels];\n        private readonly Label[] _comboLabels = new Label[MaxPanels];\n        private readonly VisualElement[] _tempFills = new VisualElement[MaxPanels];\n        private readonly VisualElement[] _deadOverlays = new VisualElement[MaxPanels];\n        // 모닥불 ON/OFF 표시 요소(신규). uxml name=\"fire-indicator\".\n        private readonly VisualElement[] _fireIndicators = new VisualElement[MaxPanels];\n        // P3: 라이브 순위 뱃지. uxml name=\"rank-label\"(선택 — 없어도 무해).\n        private readonly Label[] _rankLabels = new Label[MaxPanels];\n\n        // 누적 폴링 타이머(HudController 폴링 패턴).\n        private float _refreshTimer;\n\n        // 캐시 준비 여부(요소 못 찾으면 Refresh 스킵).\n        private bool _initialized;\n\n        // 정렬 재사용 버퍼(GC 방지).\n        private readonly List<RoomPlayerData> _ordered = new List<RoomPlayerData>(MaxPanels);\n\n        // 직전 표시 인원(폴링 로그 스팸 방지 — 값 변화 시에만 로그).\n        private int _lastShown = -1;\n\n        // B-6 스포일러 방지: 내 스핀 애니 진행 중엔 내 패널 점수/콤보를 직전 표시값으로 고정.\n        private bool _mySpinPending;   // OnSpinStarted~OnSpinCompleted 사이 true\n        private int _myShownScore;     // 마지막으로 표시한(스핀 확정 전) 내 점수\n        private int _myShownCombo;     // 마지막으로 표시한 내 콤보\n\n        #endregion\n\n        #region --- 라이프사이클 ---\n\n        // B-6: 내 스핀 애니 동안 내 패널 프리즌(릴 정지 전 결과 스포일러 방지). 기존 SlotEvent 재사용, 대칭 구독.\n        void OnEnable()\n        {\n            SlotEvent.OnSpinStarted += HandleMySpinStarted;\n            SlotEvent.OnSpinCompleted += HandleMySpinCompleted;\n        }\n\n        void OnDisable()\n        {\n            SlotEvent.OnSpinStarted -= HandleMySpinStarted;\n            SlotEvent.OnSpinCompleted -= HandleMySpinCompleted;\n        }\n\n        private void HandleMySpinStarted() => _mySpinPending = true;   // 스핀 시작 → 내 패널 고정\n        private void HandleMySpinCompleted() => _mySpinPending = false; // 릴 정지 → 고정 해제(다음 폴에 갱신)\n\n        void Start()\n        {\n            // 요소 캐시: uxml 이름과 반드시 일치해야 함(아래 이름은 MultiStatusBoard.uxml과 동일).\n            if (uiDocument == null)\n            {\n                Debug.LogWarning(\"[MultiStatusBoard] uiDocument 미할당 — 인스펙터에서 UIDocument 연결 필요. 비활성화.\");\n                enabled = false;\n                return;\n            }\n\n            var root = uiDocument.rootVisualElement;\n            if (root == null)\n            {\n                Debug.LogWarning(\"[MultiStatusBoard] rootVisualElement 없음(UIDocument 소스 uxml 확인). 비활성화.\");\n                enabled = false;\n                return;\n            }\n\n            _board = root.Q<VisualElement>(\"multi-status-board\");\n            if (_board == null)\n            {\n                Debug.LogWarning(\"[MultiStatusBoard] 루트 'multi-status-board' 요소 없음 — uxml 이름 확인. 비활성화.\");\n                enabled = false;\n                return;\n            }\n\n            // player-panel-0 ~ player-panel-3 및 하위 요소 캐시.\n            for (int i = 0; i < MaxPanels; i++)\n            {\n                var panel = root.Q<VisualElement>(\"player-panel-\" + i);\n                _panels[i] = panel;\n                if (panel == null)\n                {\n                    Debug.LogWarning($\"[MultiStatusBoard] 'player-panel-{i}' 요소 없음 — uxml 확인.\");\n                    continue;\n                }\n\n                // 하위 요소는 패널 스코프에서 Q(이름 중복 안전).\n                _nickLabels[i] = panel.Q<Label>(\"nick-label\");\n                _scoreLabels[i] = panel.Q<Label>(\"score-label\");\n                _comboLabels[i] = panel.Q<Label>(\"combo-label\");\n                _tempFills[i] = panel.Q<VisualElement>(\"temp-fill\");\n                _deadOverlays[i] = panel.Q<VisualElement>(\"dead-overlay\");\n                _fireIndicators[i] = panel.Q<VisualElement>(\"fire-indicator\");  // 모닥불 ON/OFF(신규)\n                if (_fireIndicators[i] == null)\n                    Debug.LogWarning($\"[MultiStatusBoard] 'fire-indicator' 요소 없음(panel {i}) — uxml 확인.\");\n                _rankLabels[i] = panel.Q<Label>(\"rank-label\");  // P3: 순위 뱃지(선택, 없어도 무해)\n            }\n\n            _initialized = true;\n\n            // 초기엔 숨김 시작(멀티 진입 시 Refresh가 켬).\n            SetBoardVisible(false);\n\n            Debug.Log($\"[MultiStatusBoard] 초기화 완료 ✅ (패널 {MaxPanels}개 캐시, maxTemp={maxTemp}, 폴링 {RefreshInterval}s)\");\n        }\n\n        void Update()\n        {\n            if (!_initialized) return;\n\n            // 누적 타이머 폴링(HudController 방식과 동일한 주기 게이팅).\n            _refreshTimer += Time.deltaTime;\n            if (_refreshTimer < RefreshInterval) return;\n            _refreshTimer = 0f;\n\n            Refresh();\n        }\n\n        #endregion\n\n        #region --- 갱신 로직(읽기 전용) ---\n\n        /// <summary>\n        /// 멀티 여부 확인 → LiveSync 확보 → 세션 플레이어를 정렬해 각 패널에 반영.\n        /// 어떤 단계든 조건 불충족이면 보드를 숨기고 조기 반환(안전).\n        /// </summary>\n        private void Refresh()\n        {\n            // 1) 싱글/미초기화 → 보드 숨김.\n            var ctx = RoomContext.Instance;\n            if (ctx == null || !ctx.IsInMultiplayer)\n            {\n                SetBoardVisible(false);\n                return;\n            }\n\n            // 2) LiveSync 확보(인스펙터 → 자동 탐색 → 그래도 없으면 숨김).\n            RoomLiveSync liveSync = gameController != null ? gameController.LiveSync : null;\n            if (liveSync == null)\n            {\n                var found = FindAnyObjectByType<GameController>();\n                liveSync = found != null ? found.LiveSync : null;\n            }\n            if (liveSync == null)\n            {\n                Debug.LogWarning(\"[MultiStatusBoard] LiveSync 확보 실패(GameController/LiveSync 없음) — 보드 숨김.\");\n                SetBoardVisible(false);\n                return;\n            }\n\n            // 3) 세션/플레이어 확보.\n            RoomSession session = ctx.Session;\n            if (session == null || session.Players == null)\n            {\n                SetBoardVisible(false);\n                return;\n            }\n\n            // 4) 정렬: 내 uid를 index 0, 나머지는 딕셔너리 순회 순 고정. 최대 4명.\n            BuildOrderedPlayers(session);\n\n            SetBoardVisible(true);\n\n            // P3: 표시 대상 라이브/점수 먼저 수집 → 라이브 순위(점수 desc) 계산.\n            int shownCount = Mathf.Min(_ordered.Count, MaxPanels);\n            var liveByPanel = new RoomLiveData[shownCount];\n            var scoreByPanel = new long[shownCount];\n            for (int i = 0; i < shownCount; i++)\n            {\n                liveByPanel[i] = liveSync.GetPlayerLiveData(_ordered[i].uid);\n                long s = liveByPanel[i] != null ? liveByPanel[i].score : 0;\n                // B-6: 내 패널은 스핀 애니 중(pending) 직전 표시 점수로 고정(스포일러 방지) → 순위도 함께 고정.\n                if (_mySpinPending && _ordered[i].uid == session.MyUid) s = _myShownScore;\n                scoreByPanel[i] = s;\n            }\n\n            int shown = 0;\n            for (int i = 0; i < MaxPanels; i++)\n            {\n                if (_panels[i] == null) continue;\n\n                if (i < shownCount)\n                {\n                    var p = _ordered[i];\n                    var vm = Map(liveByPanel[i], p, session.MyUid, maxTemp);\n                    vm.Score = (int)scoreByPanel[i]; // B-6: 프리즌 반영(내 패널 pending 시 고정값, 상대는 라이브)\n\n                    // B-6: 내 패널 콤보도 스핀 중 고정 / 아니면 스냅샷 갱신(다음 스핀 프리즌 기준값).\n                    if (vm.Mine)\n                    {\n                        if (_mySpinPending) vm.Combo = _myShownCombo;\n                        else { _myShownScore = vm.Score; _myShownCombo = vm.Combo; }\n                    }\n\n                    // 순위 = 1 + (나보다 점수 높은 사람 수). 동률은 같은 순위 근사.\n                    int rank = 1;\n                    for (int j = 0; j < shownCount; j++)\n                        if (scoreByPanel[j] > scoreByPanel[i]) rank++;\n                    vm.Rank = rank;\n\n                    ApplyPanel(i, vm);\n                    SetElementVisible(_panels[i], true);\n                    shown++;\n                }\n                else\n                {\n                    // 5) 플레이어 4명 미만 → 남는 패널 숨김.\n                    SetElementVisible(_panels[i], false);\n                }\n            }\n\n            // 매 폴링(3Hz)마다 찍으면 콘솔 도배 + 문자열보간 GC → 표시 인원 변화 시에만 로그.\n            if (shown != _lastShown)\n            {\n                Debug.Log($\"[MultiStatusBoard] 갱신 완료 — 표시 인원 {shown}/{MaxPanels} (세션 {session.PlayerCount}명)\");\n                _lastShown = shown;\n            }\n        }\n\n        /// <summary>\n        /// 세션 플레이어를 \"내 uid 먼저, 나머지 순회순 고정\"으로 정렬해 _ordered에 담음(최대 4).\n        /// </summary>\n        private void BuildOrderedPlayers(RoomSession session)\n        {\n            _ordered.Clear();\n            string myUid = session.MyUid;\n\n            // 내 플레이어 먼저.\n            if (!string.IsNullOrEmpty(myUid) &&\n                session.Players.TryGetValue(myUid, out var me) && me != null)\n            {\n                _ordered.Add(me);\n            }\n\n            // 나머지(내 것 제외) 순회순.\n            foreach (var kvp in session.Players)\n            {\n                if (_ordered.Count >= MaxPanels) break;\n                var p = kvp.Value;\n                if (p == null) continue;\n                if (p.uid == myUid) continue; // 이미 index 0에 넣음\n                _ordered.Add(p);\n            }\n        }\n\n        /// <summary>\n        /// 뷰모델을 패널 i의 실제 UI 요소에 반영. (텍스트/게이지 폭/딤/내꺼 강조)\n        /// </summary>\n        private void ApplyPanel(int i, PanelVM vm)\n        {\n            if (_nickLabels[i] != null) _nickLabels[i].text = vm.Nick;\n            if (_scoreLabels[i] != null) _scoreLabels[i].text = vm.Score.ToString();\n            if (_comboLabels[i] != null) _comboLabels[i].text = \"x\" + vm.Combo;\n\n            // 체온 게이지 폭: 0~1 → 0~100%.\n            if (_tempFills[i] != null)\n                _tempFills[i].style.width = Length.Percent(vm.TempPct * 100f);\n\n            // 사망 딤: 죽으면 Flex, 살아있으면 None.\n            if (_deadOverlays[i] != null)\n                _deadOverlays[i].style.display = vm.Dead ? DisplayStyle.Flex : DisplayStyle.None;\n\n            // 모닥불 ON/OFF: 켜짐 → fire-on(주황/밝음), 꺼짐 → fire-off(회색/어둠). 두 클래스 배타 토글.\n            if (_fireIndicators[i] != null)\n            {\n                if (vm.FireLit)\n                {\n                    _fireIndicators[i].AddToClassList(\"fire-on\");\n                    _fireIndicators[i].RemoveFromClassList(\"fire-off\");\n                }\n                else\n                {\n                    _fireIndicators[i].AddToClassList(\"fire-off\");\n                    _fireIndicators[i].RemoveFromClassList(\"fire-on\");\n                }\n            }\n\n            // P3: 라이브 순위 뱃지(\"N위\"). rank-label 없으면 스킵(무해).\n            if (_rankLabels[i] != null) _rankLabels[i].text = vm.Rank > 0 ? vm.Rank + \"위\" : \"\";\n\n            // 내 패널 강조: mine 클래스 토글.\n            if (_panels[i] != null)\n            {\n                if (vm.Mine) _panels[i].AddToClassList(\"mine\");\n                else _panels[i].RemoveFromClassList(\"mine\");\n            }\n        }\n\n        #endregion\n\n        #region --- 표시/숨김 유틸 ---\n\n        // 보드 전체 표시/숨김(display 토글).\n        private void SetBoardVisible(bool visible)\n        {\n            if (_board == null) return;\n            var target = visible ? DisplayStyle.Flex : DisplayStyle.None;\n            if (_board.style.display != target)\n            {\n                _board.style.display = target;\n                if (!visible) Debug.Log(\"[MultiStatusBoard] 멀티 아님/조건 불충족 — 보드 숨김.\");\n            }\n        }\n\n        // 개별 요소 표시/숨김.\n        private static void SetElementVisible(VisualElement el, bool visible)\n        {\n            if (el == null) return;\n            el.style.display = visible ? DisplayStyle.Flex : DisplayStyle.None;\n        }\n\n        #endregion\n    }\n}\n","lines":430},{"id":"Scripts/Network/MultiSeatSpawner.cs","name":"MultiSeatSpawner","path":"Scripts/Network/MultiSeatSpawner.cs","layer":"Network","scenes":["Multi"],"entry":true,"summary":"MultiSeatSpawner 멀티 매치마다 상대 좌석(2P~4P) 표시 쉘을 관리. 두 가지 모드 (인스펙터 필드 연결로 자동 분기): · 고정 모드 _fixedSeats(씬에 미리 배치한 좌석) 연결 시: SetActive+Bind / SetActive(false). · 앵커 모드 _fixedSeats 비우고 _opponentSeatPrefab + _opponentAnchors 연결 시: 런타임 Instantiate/Des","src":"using System.Collections.Generic;\nusing UnityEngine;\nusing Wooduduk.Network.Firebase.Matchmaking; // RoomContext, RoomSession, RoomPlayerData\n\nnamespace Wooduduk.Network\n{\n    // ─────────────────────────────────────────────────────────────────────────────\n    // MultiSeatSpawner — 멀티 매치마다 상대 좌석(2P~4P) 표시 쉘을 관리.\n    //\n    // 두 가지 모드 (인스펙터 필드 연결로 자동 분기):\n    //   · 고정 모드  — _fixedSeats(씬에 미리 배치한 좌석) 연결 시: SetActive+Bind / SetActive(false).\n    //   · 앵커 모드  — _fixedSeats 비우고 _opponentSeatPrefab + _opponentAnchors 연결 시: 런타임 Instantiate/Destroy.\n    //\n    // 무엇을 하나:\n    //   · 멀티 진입을 자가 감지(RoomContext.IsInMultiplayer 폴링) → 상대 쉘 활성/스폰.\n    //   · 멀티 종료 감지 → 쉘 비활성/파괴.\n    //   · 1P(나)는 기존 씬 리그 그대로 → 스포너는 \"상대만\" 다룬다(MyUid 제외).\n    //\n    // 왜 자가구동:\n    //   · MultiStatusBoard와 동일 패턴. GameController 등 기존 코드 수정 0.\n    //   · 좌석 배정은 로컬 표현 — 각 클라가 자기를 1P로 보고 상대만 채운다(전역 합의 아님).\n    //   · 인원 부족분은 MatchmakingFlow의 고스트 백필(_allowGhostFill)이 session.Players에 채워넣으므로,\n    //     여기선 실/고스트 구분 없이 그냥 바인드한다(고스트도 RoomLiveSync.SimulateGhosts가 시뮬).\n    //\n    // [씬 배치 — 고정 모드] (MultiScene, 수동)\n    //   1) 빈 GameObject \"MultiSeatSpawner\" (또는 프리팹 인스턴스) → 이 스크립트 부착.\n    //   2) OpponentSeat.prefab(표시전용 쉘) 3개를 2P/3P/4P 월드좌표에 배치 → 기본 비활성.\n    //   3) 그 3개를 _fixedSeats 에 순서대로 연결. (_opponentSeatPrefab/_opponentAnchors 는 비움)\n    //   4) MatchmakingFlow._desiredPlayerCount = 4 (고스트 백필로 항상 4자리).\n    //   5) 플레이 → 매칭 진입 시 좌석 활성 + 바인드.\n    //\n    // [씬 배치 — 앵커 모드] (Chunghui_DevMulti 등, 기존)\n    //   _fixedSeats 비움 + _opponentSeatPrefab + _opponentAnchors(빈 앵커) 연결 → 런타임 스폰.\n    //\n    // 주의: 로스터는 매치 시작 시 방이 닫혀 고정 → 배치는 진입 시 1회. 이후 각 좌석은 자체 폴링으로 갱신.\n    // ─────────────────────────────────────────────────────────────────────────────\n    [DisallowMultipleComponent]\n    public class MultiSeatSpawner : MonoBehaviour\n    {\n        #region --- 인스펙터 ---\n\n        [Header(\"좌석 모드 (둘 중 하나만 연결)\")]\n        [Tooltip(\"고정 모드: 씬에 미리 배치한 상대 좌석(기본 비활성). 연결되면 앵커 대신 이걸 SetActive+Bind. 비우면 앵커 모드.\")]\n        [SerializeField] private OpponentSeatView[] _fixedSeats;\n\n        [Header(\"앵커 모드 (고정 모드 안 쓸 때)\")]\n        [Tooltip(\"상대 좌석 표시 쉘 프리팹(OpponentSeatView 부착). 앵커 모드 전용.\")]\n        [SerializeField] private OpponentSeatView _opponentSeatPrefab;\n\n        [Tooltip(\"상대 좌석 위치 앵커. 최대 3개(1P는 기존 리그라 제외). 앵커 모드 전용.\")]\n        [SerializeField] private Transform[] _opponentAnchors;\n\n        [Header(\"참조 (선택)\")]\n        [Tooltip(\"LiveSync 접근용. 비우면 FindAnyObjectByType로 자동 탐색.\")]\n        [SerializeField] private GameController _gameController;\n\n        [Header(\"설정\")]\n        [Tooltip(\"멀티 진입/종료 감지 폴링 주기(초).\")]\n        [SerializeField] private float _pollInterval = 0.33f;\n\n        #endregion\n\n        #region --- 내부 상태 ---\n\n        private readonly List<OpponentSeatView> _spawned = new List<OpponentSeatView>();\n        private bool _seatsSpawned;\n        private float _timer;\n\n        // _fixedSeats가 하나라도 연결되면 고정 모드.\n        private bool FixedMode => _fixedSeats != null && _fixedSeats.Length > 0;\n\n        #endregion\n\n        // 고정 좌석은 씬에서 켜져 있어도 멀티 진입 전엔 숨긴다(단일플레이/대기 중 안 보이게).\n        private void Awake()\n        {\n            if (!FixedMode) return;\n            for (int i = 0; i < _fixedSeats.Length; i++)\n                if (_fixedSeats[i] != null) _fixedSeats[i].gameObject.SetActive(false);\n            Debug.Log($\"[MultiSeatSpawner] 고정 모드 — 좌석 {_fixedSeats.Length}개 대기(비활성).\");\n        }\n\n        private void Update()\n        {\n            _timer += Time.deltaTime;\n            if (_timer < _pollInterval) return;\n            _timer = 0f;\n\n            var ctx = RoomContext.Instance;\n            bool inMulti = ctx != null && ctx.IsInMultiplayer && ctx.Session != null;\n\n            if (inMulti && !_seatsSpawned) SpawnSeats(ctx.Session);\n            else if (!inMulti && _seatsSpawned) DespawnSeats();\n        }\n\n        // 상대(=MyUid 제외) 플레이어를 좌석에 배치. 모드에 따라 고정 바인드 or 앵커 스폰.\n        private void SpawnSeats(RoomSession session)\n        {\n            RoomLiveSync liveSync = ResolveLiveSync();\n            if (liveSync == null)\n            {\n                // GameController.StartMultiGame 전이면 아직 LiveSync 준비 전일 수 있음 → 재시도(플래그 안 세움).\n                Debug.LogWarning(\"[MultiSeatSpawner] LiveSync 못 찾음 — 이번 폴 스킵(다음에 재시도).\");\n                return;\n            }\n\n            int count = FixedMode ? SpawnFixed(session, liveSync) : SpawnAnchored(session, liveSync);\n            _seatsSpawned = true;\n            Debug.Log($\"[MultiSeatSpawner] 상대 좌석 {count}개 {(FixedMode ? \"고정 바인드\" : \"스폰\")} (세션 {session.PlayerCount}명).\");\n        }\n\n        // 고정 모드: 미리 배치된 _fixedSeats를 활성화 + 바인드. 반환 = 바인드한 좌석 수.\n        private int SpawnFixed(RoomSession session, RoomLiveSync liveSync)\n        {\n            string myUid = session.MyUid;\n            int seat = 0;\n\n            foreach (var kvp in session.Players)\n            {\n                if (seat >= _fixedSeats.Length) break;      // 좌석 다 참\n                var p = kvp.Value;\n                if (p == null || p.uid == myUid) continue;   // 나(1P) 제외\n\n                var view = _fixedSeats[seat];\n                if (view == null)\n                {\n                    Debug.LogWarning($\"[MultiSeatSpawner] 고정좌석[{seat}] 비어있음 — 스킵.\");\n                    seat++;\n                    continue;\n                }\n\n                view.gameObject.SetActive(true);\n                view.Bind(p.uid, p.nick, liveSync);\n                seat++;\n            }\n            return seat;\n        }\n\n        // 앵커 모드(기존): 프리팹을 앵커에 스폰 + 바인드. 반환 = 스폰한 좌석 수.\n        private int SpawnAnchored(RoomSession session, RoomLiveSync liveSync)\n        {\n            if (_opponentSeatPrefab == null)\n            {\n                Debug.LogWarning(\"[MultiSeatSpawner] (앵커 모드) OpponentSeat 프리팹 미할당 — 스폰 스킵.\");\n                return 0;\n            }\n            if (_opponentAnchors == null || _opponentAnchors.Length == 0)\n            {\n                Debug.LogWarning(\"[MultiSeatSpawner] (앵커 모드) 앵커 미할당 — 스폰 스킵.\");\n                return 0;\n            }\n\n            string myUid = session.MyUid;\n            int seat = 0;\n\n            foreach (var kvp in session.Players)\n            {\n                if (seat >= _opponentAnchors.Length) break; // 앵커 다 참\n                var p = kvp.Value;\n                if (p == null || p.uid == myUid) continue;    // 나(1P) 제외\n\n                Transform anchor = _opponentAnchors[seat];\n                if (anchor == null)\n                {\n                    Debug.LogWarning($\"[MultiSeatSpawner] 앵커[{seat}] 비어있음 — 이 좌석 스킵.\");\n                    seat++;\n                    continue;\n                }\n\n                OpponentSeatView view = Instantiate(_opponentSeatPrefab, anchor);\n                view.transform.localPosition = Vector3.zero;\n                view.transform.localRotation = Quaternion.identity;\n                view.Bind(p.uid, p.nick, liveSync);\n\n                _spawned.Add(view);\n                seat++;\n            }\n            return _spawned.Count;\n        }\n\n        private void DespawnSeats()\n        {\n            if (FixedMode)\n            {\n                // 고정: 파괴 안 하고 숨김(재사용).\n                for (int i = 0; i < _fixedSeats.Length; i++)\n                    if (_fixedSeats[i] != null) _fixedSeats[i].gameObject.SetActive(false);\n            }\n            else\n            {\n                // 앵커: 스폰본 파괴.\n                for (int i = 0; i < _spawned.Count; i++)\n                    if (_spawned[i] != null) Destroy(_spawned[i].gameObject);\n                _spawned.Clear();\n            }\n\n            _seatsSpawned = false;\n            Debug.Log($\"[MultiSeatSpawner] 상대 좌석 정리 ({(FixedMode ? \"고정 비활성\" : \"스폰 파괴\")}, 멀티 종료).\");\n        }\n\n        private RoomLiveSync ResolveLiveSync()\n        {\n            if (_gameController != null && _gameController.LiveSync != null)\n                return _gameController.LiveSync;\n\n            var found = FindAnyObjectByType<GameController>();\n            return found != null ? found.LiveSync : null;\n        }\n    }\n}\n","lines":211},{"id":"Scripts/UI/MultiCountdownUI.cs","name":"MultiCountdownUI","path":"Scripts/UI/MultiCountdownUI.cs","layer":"UI","scenes":["Multi"],"entry":true,"summary":"MultiCountdownUI 멀티 시작 카운트다운 화면 UI + SFX. MultiSessionCoordinator의 OnCountdownStarted(남은초)/OnSessionStarted(GO)에 물려, 화면 중앙 큰 텍스트에 \"3 → 2 → 1 → START\" 순차 표시 + 초당 SFX(SoundManager 경유). · 카운트다운 로직/타이밍은 전부 코디네이터(서버시간 동기)가 소유 여기선 표시/소리 트리거만. · S","src":"using System.Collections;\nusing UnityEngine;\nusing TMPro;\nusing Wooduduk.Network; // MultiSessionCoordinator\nusing Wooduduk.SFX;     // SoundManager, SfxId\n\nnamespace Wooduduk.UI\n{\n    // ─────────────────────────────────────────────────────────────────────────────\n    // MultiCountdownUI — 멀티 시작 카운트다운 화면 UI + SFX.\n    //\n    // MultiSessionCoordinator의 OnCountdownStarted(남은초)/OnSessionStarted(GO)에 물려,\n    // 화면 중앙 큰 텍스트에 \"3 → 2 → 1 → START\" 순차 표시 + 초당 SFX(SoundManager 경유).\n    //   · 카운트다운 로직/타이밍은 전부 코디네이터(서버시간 동기)가 소유 — 여기선 표시/소리 트리거만.\n    //   · SFX = 프로젝트 사운드 인프라(SoundManager.PlaySfx(SfxId)) 경유. 클립은 SoundManager 카탈로그(SO)에서 관리.\n    //     → 이 컴포넌트엔 어떤 SfxId를 울릴지만 인스펙터로 지정(직접 AudioClip 안 물림).\n    //\n    // [씬 배치 사용법] (MultiScene, 수동)\n    //   1) 캔버스에 화면 중앙 큰 TMP 텍스트 1개 배치(폰트 크게, 가운데 정렬) → _label 에 연결.\n    //   2) 빈 GameObject 에 이 컴포넌트 부착 → _coordinator 연결(비우면 자동 탐색).\n    //   3) SFX 지정: _tickSfx(3/2/1음), _startSfx(START음) 에 SfxId 선택.\n    //        · 전용음 원하면 SFXIds.cs 에 CountdownTick/CountdownStart 추가 + SoundManager 카탈로그에 클립 매핑.\n    //        · 급하면 기존 UI SfxId(예 UiClick) 재사용도 가능.\n    //   4) _countFrom = 3 → \"3,2,1,START\"만 표시(코디네이터 7초여도 마지막 3초만).\n    // ─────────────────────────────────────────────────────────────────────────────\n    [DisallowMultipleComponent]\n    public class MultiCountdownUI : MonoBehaviour\n    {\n        #region --- 인스펙터 ---\n\n        [Header(\"참조\")]\n        [Tooltip(\"화면 중앙 큰 숫자 텍스트(TMP). 이 컴포넌트가 표시/숨김 자동 토글.\")]\n        [SerializeField] private TMP_Text _label;\n        [Tooltip(\"비우면 씬에서 MultiSessionCoordinator 자동 탐색.\")]\n        [SerializeField] private MultiSessionCoordinator _coordinator;\n\n        [Header(\"SFX (SoundManager 경유 — SfxId만 지정)\")]\n        [Tooltip(\"숫자 카운트(3/2/1) 시 울릴 SfxId. 클립은 SoundManager 카탈로그에서 관리. None=무음.\")]\n        [SerializeField] private SfxId _tickSfx = SfxId.None;\n        [Tooltip(\"START 시 울릴 SfxId. None=무음.\")]\n        [SerializeField] private SfxId _startSfx = SfxId.None;\n\n        [Header(\"표시 설정\")]\n        [Tooltip(\"이 숫자부터 카운트 표시(예 3 → 3,2,1). 코디네이터 카운트다운이 더 길어도 마지막 N초만 보임.\")]\n        [SerializeField] private int _countFrom = 3;\n        [SerializeField] private string _startText = \"START\";\n        [Tooltip(\"START 표시 유지 시간(초) 후 숨김.\")]\n        [SerializeField] private float _startHoldSeconds = 1f;\n\n        [Header(\"연출 (선택)\")]\n        [Tooltip(\"숫자/START 뜰 때 펀치 스케일(1 = 연출 끔).\")]\n        [SerializeField] private float _punchScale = 1.4f;\n        [Tooltip(\"펀치 스케일 원복 시간(초).\")]\n        [SerializeField] private float _punchReturn = 0.25f;\n\n        #endregion\n\n        private Coroutine _countRoutine;\n\n        private void Awake()\n        {\n            if (_coordinator == null) _coordinator = FindAnyObjectByType<MultiSessionCoordinator>();\n            HideLabel();\n        }\n\n        private void OnEnable()\n        {\n            if (_coordinator == null)\n            {\n                Debug.LogWarning(\"[MultiCountdownUI] MultiSessionCoordinator 못 찾음 — 카운트다운 표시 비활성. 인스펙터에서 연결 필요.\");\n                return;\n            }\n            _coordinator.OnCountdownStarted += HandleCountdownStarted;\n            _coordinator.OnSessionStarted += HandleSessionStarted;\n        }\n\n        private void OnDisable()\n        {\n            if (_coordinator == null) return;\n            _coordinator.OnCountdownStarted -= HandleCountdownStarted;\n            _coordinator.OnSessionStarted -= HandleSessionStarted;\n        }\n\n        // 남은초 수신(코디네이터, 1회) → 숫자 카운트다운 표시 코루틴.\n        private void HandleCountdownStarted(float secLeft)\n        {\n            Debug.Log($\"[MultiCountdownUI] 카운트다운 표시 시작 — {secLeft:F1}s (표시는 {_countFrom}부터).\");\n            if (_countRoutine != null) StopCoroutine(_countRoutine);\n            _countRoutine = StartCoroutine(CountdownRoutine(secLeft));\n        }\n\n        private IEnumerator CountdownRoutine(float secLeft)\n        {\n            float remaining = secLeft;\n            int lastShown = -1;\n            while (remaining > 0.05f)\n            {\n                int n = Mathf.CeilToInt(remaining);\n                if (n <= _countFrom && n >= 1 && n != lastShown)   // 마지막 N초만, 값 바뀔 때만\n                {\n                    lastShown = n;\n                    ShowText(n.ToString());\n                    PlaySfx(_tickSfx);\n                    Punch();\n                }\n                remaining -= Time.deltaTime;\n                yield return null;\n            }\n            // 0 도달 — START는 권위 이벤트(OnSessionStarted)가 표시. 여기선 종료만.\n            _countRoutine = null;\n        }\n\n        // GO 발화(코디네이터) → START 표시 + 소리 + 잠시 후 숨김.\n        private void HandleSessionStarted()\n        {\n            Debug.Log(\"[MultiCountdownUI] 세션 시작(GO) — START 표시.\");\n            if (_countRoutine != null) { StopCoroutine(_countRoutine); _countRoutine = null; }\n            ShowText(_startText);\n            PlaySfx(_startSfx);\n            Punch();\n            StartCoroutine(HideAfter(_startHoldSeconds));\n        }\n\n        private IEnumerator HideAfter(float sec)\n        {\n            yield return new WaitForSeconds(sec);\n            HideLabel();\n        }\n\n        #region --- 표시/소리/연출 유틸 ---\n\n        private void ShowText(string s)\n        {\n            if (_label == null) return;\n            if (!_label.gameObject.activeSelf) _label.gameObject.SetActive(true);\n            _label.text = s;\n        }\n\n        private void HideLabel()\n        {\n            if (_label == null) return;\n            _label.text = string.Empty;\n            _label.gameObject.SetActive(false);\n        }\n\n        // 사운드 인프라 경유. SfxId.None이면 무음. SoundManager 미존재 시 조용히 스킵.\n        private void PlaySfx(SfxId id)\n        {\n            if (id == SfxId.None) return;\n            if (SoundManager.Instance != null) SoundManager.Instance.PlaySfx(id);\n        }\n\n        private void Punch()\n        {\n            if (_label == null || _punchScale <= 1f) return;\n            StartCoroutine(PunchRoutine());\n        }\n\n        private IEnumerator PunchRoutine()\n        {\n            var tr = _label.transform;\n            float dur = Mathf.Max(0.01f, _punchReturn);\n            float t = 0f;\n            tr.localScale = Vector3.one * _punchScale;\n            while (t < dur)\n            {\n                t += Time.deltaTime;\n                tr.localScale = Vector3.one * Mathf.Lerp(_punchScale, 1f, t / dur);\n                yield return null;\n            }\n            tr.localScale = Vector3.one;\n        }\n\n        #endregion\n    }\n}\n","lines":177},{"id":"Scripts/FX/SFX/UISfxEvent.cs","name":"UISfxEvent","path":"Scripts/FX/SFX/UISfxEvent.cs","layer":"FX","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"UI 사운드 채널","src":"﻿using System;\r\n\r\nnamespace Wooduduk.FX\r\n{\r\n    public enum UiSfxKind { Click = 0, Open, Close, Purchase, Hover, Toggle, Error }\r\n\r\n    // UI 사운드 채널\r\n    public static class UiSfxEvent\r\n    {\r\n        public static event Action<UiSfxKind> OnPlay;\r\n        public static void Raise(UiSfxKind kind) => OnPlay?.Invoke(kind);\r\n        public static void Click() => Raise(UiSfxKind.Click); \r\n        public static void Error() => Raise(UiSfxKind.Error);\r\n    }\r\n}","lines":15},{"id":"Scripts/UI/AudioUtil.cs","name":"AudioUtil","path":"Scripts/UI/AudioUtil.cs","layer":"UI","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"슬라이더 0~1 → 데시벨(dB)","src":"using UnityEngine;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    public static class AudioUtil\r\n    {\r\n        public const float MinDb = -80f; // 사실상 무음\r\n\r\n        // 슬라이더 0~1 → 데시벨(dB)\r\n        public static float Linear01ToDecibel(float value01)\r\n        {\r\n            // 0 또는 0 이하면 log10이 음의 무한대 → 무음 처리로 가드\r\n            if (value01 <= 0.0001f) return MinDb;\r\n            return Mathf.Log10(value01) * 20f;\r\n        }\r\n    }\r\n}","lines":17},{"id":"Scripts/UI/UiSfxHover.cs","name":"UiSfxHover","path":"Scripts/UI/UiSfxHover.cs","layer":"UI","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"PC 환경 전용: 버튼 위에 마우스가 들어오면 Hover 효과음. 각 컨트롤러에서 BindAll(root) 한 줄이면 그 화면의 모든 Button에 적용된다. hover 정책(제외 대상·스로틀 등)을 바꾸고 싶으면 여기 한 곳만 고치면 됨.","src":"using UnityEngine.UIElements;\r\n\r\nnamespace Wooduduk.FX\r\n{\r\n    // PC 환경 전용: 버튼 위에 마우스가 들어오면 Hover 효과음.\r\n    // 각 컨트롤러에서 BindAll(root) 한 줄이면 그 화면의 모든 Button에 적용된다.\r\n    // hover 정책(제외 대상·스로틀 등)을 바꾸고 싶으면 여기 한 곳만 고치면 됨.\r\n    public static class UiSfxHover\r\n    {\r\n        // root 아래의 모든 Button에 hover 효과음을 건다.\r\n        // 주의: UXML에 이미 존재하는(정적) 버튼만 잡힌다.\r\n        //       코드로 나중에 생성되는 요소는 생성 지점에서 Bind(el)로 따로 걸 것.\r\n        public static void BindAll(VisualElement root)\r\n        {\r\n            if (root == null) return;\r\n            root.Query<Button>().ForEach(Bind);\r\n        }\r\n\r\n        // 개별 요소(동적 생성 카드 등)에 hover 효과음을 건다.\r\n        public static void Bind(VisualElement el)\r\n        {\r\n            if (el == null) return;\r\n            el.RegisterCallback<PointerEnterEvent>(_ => UiSfxEvent.Raise(UiSfxKind.Hover));\r\n        }\r\n    }\r\n}","lines":26},{"id":"Scripts/Data/DataSO/DataManagerSO.cs","name":"DataManagerSO","path":"Scripts/Data/DataSO/DataManagerSO.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"TSV 미사용, 인스펙터에서 직접 연결","src":"using System.Collections.Generic;\nusing UnityEngine;\nusing Wooduduk.Data.Core.TSVConvert;\nusing Wooduduk.Data.Static.StaticEnum;\nusing Wooduduk.Slot;\n\nnamespace Wooduduk.Data.DataSO\n{\n    [CreateAssetMenu(fileName = \"DataManager\", menuName = \"GameData/DataManager\")]\n    public class DataManagerSO : ScriptableObject\n    {\n        #region 인스펙터 — 에디터에서 드래그\n        public List<SymbolDataSO> _symbolDataList;\n        public List<CardDataSO> _cardDataList;\n        public List<MakgeolliEffectDataSO> _makgeolliDataList;\n        public List<WeaponDataSO> _weaponDataList;\n        public List<RouletteSkinDataSO> _rouletteSkinDataList;\n\n        // TSV 미사용, 인스펙터에서 직접 연결\n        public GameBalanceDataSO _gameBalance;\n        public RouletteDataSO _roulette;\n        #endregion\n\n        #region 런타임 딕셔너리\n        private Dictionary<string, SymbolDataSO> _symbolDict;\n        private Dictionary<string, CardDataSO> _cardDict;\n        private Dictionary<string, MakgeolliEffectDataSO> _makgeolliDict;\n        private Dictionary<string, WeaponDataSO> _weaponDict;\n        private Dictionary<string, RouletteSkinDataSO> _rouletteSkinDict;\n        #endregion\n\n        public void Initialize()\n        {\n            _symbolDict = BuildDict(_symbolDataList);\n            _cardDict = BuildDict(_cardDataList);\n            _makgeolliDict = BuildDict(_makgeolliDataList);\n            _weaponDict = BuildDict(_weaponDataList);\n            _rouletteSkinDict = BuildDict(_rouletteSkinDataList);\n\n            Debug.Log(\"[DataManager] 초기화 완료\");\n        }\n\n        private Dictionary<string, T> BuildDict<T>(List<T> list) where T : ScriptableObject, ISheetData\n        {\n            var dict = new Dictionary<string, T>();\n            if (list == null) return dict;\n            foreach (var item in list)\n            {\n                if (item == null) continue;\n                if (dict.ContainsKey(item.ID))\n                    Debug.LogWarning($\"[DataManager] 중복 ID: {item.ID}\");\n                else\n                    dict.Add(item.ID, item);\n            }\n            return dict;\n        }\n\n        #region 게터\n        public SymbolDataSO GetSymbol(string id)\n        {\n            if (_symbolDict == null) Initialize();\n            return _symbolDict.TryGetValue(id, out var so) ? so : null;\n        }\n\n        public CardDataSO GetCard(string id)\n        {\n            if (_cardDict == null) Initialize();\n            return _cardDict.TryGetValue(id, out var so) ? so : null;\n        }\n\n        public MakgeolliEffectDataSO GetMakgeolli(string id)\n        {\n            if (_makgeolliDict == null) Initialize();\n            return _makgeolliDict.TryGetValue(id, out var so) ? so : null;\n        }\n\n        public WeaponDataSO GetWeapon(string id)\n        {\n            if (_weaponDict == null) Initialize();\n            return _weaponDict.TryGetValue(id, out var so) ? so : null;\n        }\n\n        public RouletteSkinDataSO GetRouletteSkin(string id)\n        {\n            if (_rouletteSkinDict == null) Initialize();\n            return _rouletteSkinDict.TryGetValue(id, out var so) ? so : null;\n        }\r\n        #endregion\n\r\n        #region 런타임 빌더\r\n\r\n        // symbolDataList(TSV 임포트)에서 슬롯 추첨 엔진용 ISymbolCatalog를 빌드.\r\n        // SymbolType(룰렛/UI 열거형) → SymbolId(슬롯 엔진 열거형) 변환 + 가중치 ×10(TSV 32 → 엔진 320).\r\n        // SlotMachineFactory에서 SlotSymbolDefaults.CreateCatalog() 대신 이걸 호출.\r\n        public ISymbolCatalog BuildSymbolCatalog()\r\n        {\r\n            var defs = new List<SymbolDef>();\r\n            foreach (var s in _symbolDataList)\r\n            {\r\n                if (s?._data == null) continue;\r\n                if (TryMapSymbolId(s._data._symbolType, out SymbolId id))\r\n                    defs.Add(new SymbolDef(id, s._data._name, (int)(s._data._baseWeight * 10)));\r\n            }\r\n            return new InMemorySymbolCatalog(defs);\r\n        }\r\n\r\n        // SymbolType과 SymbolId는 이름이 다른 같은 심볼 (INSTANT=도토리, WILD=행운, BLANK=옹이...).\r\n        // 매핑 실패한 타입은 조용히 스킵 → symbolDataList에 모르는 타입 추가돼도 엔진 안 깨짐\r\n        private static bool TryMapSymbolId(SymbolType t, out SymbolId id)\r\n        {\r\n            switch (t)\r\n            {\r\n                case SymbolType.SWING: id = SymbolId.SWING; return true;\r\n                case SymbolType.PERFECT: id = SymbolId.PERFECT; return true;\r\n                case SymbolType.INSTANT: id = SymbolId.ACORN; return true;\r\n                case SymbolType.WILD: id = SymbolId.LUCK; return true;\r\n                case SymbolType.BOOST: id = SymbolId.FRIEBAT; return true;\r\n                case SymbolType.BLANK: id = SymbolId.KNOT; return true;\r\n                case SymbolType.FAIL: id = SymbolId.WORM; return true;\r\n                case SymbolType.TRIGGER: id = SymbolId.MAKGEOLLI; return true;\r\n                default: id = default; return false;\r\n            }\r\n        }\r\n\r\n        #endregion\n\n    }\n}\n","lines":129},{"id":"Scripts/Data/Static/UserData.cs","name":"UserData","path":"Scripts/Data/Static/UserData.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"접속 시각 기록 (Unix ms, UTC). Firebase Auth의 lastSignInTime은 캐시된 익명 세션에선 갱신 안 되므로 직접 기록.","src":"using System.Collections.Generic;\r\n\r\nnamespace Wooduduk.Data.Static\r\n{\r\n    [System.Serializable]\r\n    public class UserData\r\n    {\r\n        public string _userId;\r\n        public string _userNick;\r\n        public int _gold;   // 보유 재화\r\n        public int _token;\r\n\r\n        // 접속 시각 기록 (Unix ms, UTC).\r\n        // Firebase Auth의 lastSignInTime은 캐시된 익명 세션에선 갱신 안 되므로 직접 기록.\r\n        public long _createdAt;    // 최초 생성(가입) 시각\r\n        public long _lastLoginAt;  // 최근 로그인 시각\r\n\r\n        // 튜토리얼\r\n        public bool _tutorialDone;  // 튜토리얼 완료 여부\r\n\r\n        // 기록\r\n        public int[] _bestScores = new int[3]; // Top 1, 2, 3\r\n        public int _latestScore; // 최근 점수 기록\r\n        public int _latestMaxCombo; // 최근 콤보 기록\r\n        public int _latestSettlementCount; // 최근 정산 기록\r\n        public int _gamesPlayed; // 플레이 횟수\r\n\r\n        // 티어 시스템\r\n        public int _axeTier; // 도끼 티어 (enum 예정 저장을 위해 int)\r\n        public int _tierLp; // 티어 랭크포인트\r\n        public int _tierProtection; // 강등 보호 횟수\r\n\r\n        // 무기 (메타 progression)\r\n        public List<string> _ownedWeaponIds;      // 보유(제작) 무기\r\n        public string _equippedWeaponId;          // 들고 들어갈 무기\r\n\r\n        // 룰렛\r\n        public List<string> _rouletteSkinIds;   // 보유(제작) 스킨\r\n        public string _equippedRouletteSkinId;  // 들고 들어갈 스킨\r\n    }\r\n}","lines":41},{"id":"Scripts/Network/Firebase/AccountEvents.cs","name":"AccountEvents","path":"Scripts/Network/Firebase/AccountEvents.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"로그인 성공 Raise : FirebaseManager Listen : SaveManager","src":"﻿using Wooduduk.Data.Static;\r\nusing System;\r\n\r\nnamespace Wooduduk.Network.Firebase\r\n{\r\n    public static class AccountEvents\r\n    {\r\n        /// <summary>\r\n        /// 로그인 성공\r\n        /// Raise : FirebaseManager\r\n        /// Listen : SaveManager\r\n        /// </summary>\r\n        public static event Action<string, string> OnLoginSucceeded;\r\n        public static void RaiseLoginSucceeded(string uid, string nickname)\r\n        {\r\n            OnLoginSucceeded?.Invoke(uid, nickname);\r\n        }\r\n\r\n        /// <summary>\r\n        /// 유저 데이터 로드 완료\r\n        /// Raise : SaveManager\r\n        /// Listen : UserManager, TitleRouter 등\r\n        /// </summary>\r\n        public static event Action<UserData> OnUserDataLoaded;\r\n        public static void RaiseUserDataLoaded(UserData data)\r\n        {\r\n            OnUserDataLoaded?.Invoke(data);\r\n        }\r\n\r\n        /// <summary>\r\n        /// 로그아웃\r\n        /// Raise : FirebaseManager\r\n        /// Listen : SaveManager, UserManager\r\n        /// </summary>\r\n        public static event Action<UserData> OnLogout;\r\n        public static void RaiseLogout(UserData data)\r\n        {\r\n            OnLogout?.Invoke(data);\r\n        }\r\n\r\n        /// <summary>\r\n        /// ★ 로그인 기록이 없어 로그인 선택 UI가 필요한 경우\r\n        /// Raise : FirebaseManager\r\n        /// Listen : LobbyUIManager (로그인 패널 활성화)\r\n        /// </summary>\r\n        public static event Action OnNeedLogin;\r\n        public static void RaiseNeedLogin()\r\n        {\r\n            OnNeedLogin?.Invoke();\r\n        }\r\n    }\r\n}","lines":52},{"id":"Scripts/FX/SFX/SFXIds.cs","name":"SFXIds","path":"Scripts/FX/SFX/SFXIds.cs","layer":"FX","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"사운드 키. 호출부 오타 방지용 enum(클립/볼륨/피치 같은 튜닝 값은 SoundCatalogSO가 보유) 확장 시 반드시 끝에 추가","src":"﻿namespace Wooduduk.SFX\r\n{\r\n    // 사운드 키. 호출부 오타 방지용 enum(클립/볼륨/피치 같은 튜닝 값은 SoundCatalogSO가 보유)\r\n    // 확장 시 반드시 끝에 추가\r\n    public enum SfxId\r\n    {\r\n        None = 0,\r\n        UiClick, UiOpen, UiClose, UiPurchase,   // UI\r\n        AxeSwing, LeverPull,                     // 도끼 스윙 / 레버 강타\r\n        SwingHit, ResultHit, Perfect,           // 스윙 등장(계단) / 스윙 명중 결과 / 퍼펙트 등장(계단)\r\n        WhiffFail, WormFail,                    // 헛스윙 / 좀벌레 실패\r\n        Makgeolli, Settle, FireFeed, Death,     // 막걸리·정산·모닥불·사망\r\n        FireIgnite, FireOut,                    // 모닥불 점화, 소화\r\n        ResultPerfect, ResultFireBat,            // 퍼펙트/불빠따 결과음\r\n        AcornPop, FireBatOn, LuckWild, Knot,     // 도토리 즉발 / 불빠따 활성 / 행운 / 옹이\r\n        ComboTick, ComboLost,                    // 콤보 누적 틱 / 끊김\r\n        ComboMilestone, ResultLuck, ResultKnot, ResultAcorn,     // 콤보(피치 사다리) / 행운·옹이·도토리 결과음\r\n        WoodGain, CostReject, TempWarn, Revive,  // 장작획득 / 비용부족 에러 / 체온경고 / 부활\r\n        CardHoverOn, CardHoverOff, CardBuy,      // 카드 호버 in/out / 구매 성공\r\n        WoodImpact,                              // 장작 물리 충돌(3D)\r\n        UiHover, UiToggle, UiError,              // UI 호버·포커스 / 토글·슬라이더 / 에러·막힘\r\n        ResultWorm, MakgeolliDrink,              // 좀벌레 실패 결과 / 막걸리 발동 결과\r\n        SpinResult,                              // 전 릴 정지 후 공용 결과음\r\n        CountdownTick, CountdownStart,           // 멀티 시작 카운트다운 3/2/1 틱 / START(GO)\r\n    }\r\n    public enum BgmId \r\n    { \r\n        None = 0, \r\n        Title, \r\n        Tutorial, \r\n        Ingame, \r\n        Result \r\n    }\r\n    public enum AmbientId { None = 0, Campfire, HeartbeatCritical, Map } // 환경음(루프)\r\n}","lines":35},{"id":"Scripts/Network/Firebase/UserService.cs","name":"UserService","path":"Scripts/Network/Firebase/UserService.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"신규 유저 데이터를 생성합니다. suggestedNickname이 있으면 우선 사용하고, 없으면 랜덤 닉네임을 생성합니다.","src":"﻿using System;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.Static;\r\n\r\nnamespace Wooduduk.Network.Firebase\r\n{\r\n    public class UserService\r\n    {\r\n        /// <summary>\r\n        /// 신규 유저 데이터를 생성합니다.\r\n        /// suggestedNickname이 있으면 우선 사용하고, 없으면 랜덤 닉네임을 생성합니다.\r\n        /// </summary>\r\n        public UserData CreateUserData(string userId, string suggestedNickname = \"\")\r\n        {\r\n            long now = DateTimeOffset.UtcNow.ToUnixTimeMilliseconds();\r\n\r\n            string finalNickname = suggestedNickname;\r\n\r\n            // suggestedNickname이 없거나 빈 값이면 랜덤 닉네임 생성\r\n            if (string.IsNullOrEmpty(finalNickname))\r\n            {\r\n                finalNickname = GenerateRandomNickname();\r\n            }\r\n\r\n            return new UserData\r\n            {\r\n                _userId = userId,\r\n                _userNick = finalNickname,    \r\n                _tutorialDone = false,\r\n                _gold = 0,\r\n                _token = 0,\r\n\r\n                _createdAt = now,\r\n                _lastLoginAt = now,\r\n\r\n                _bestScores = new int[3],\r\n                _latestScore = 0,\r\n\r\n                _axeTier = 0,\r\n                _tierLp = 0,\r\n                _tierProtection = 0,\r\n                _gamesPlayed = 0,\r\n\r\n                _ownedWeaponIds = new List<string> { \"W001\" },\r\n                _equippedWeaponId = \"W001\",\r\n\r\n                _rouletteSkinIds = new List<string>(),\r\n                _equippedRouletteSkinId = string.Empty,\r\n            };\r\n        }\r\n\r\n        /// <summary>\r\n        /// 랜덤 닉네임 생성 (김진왕#1234 형식)\r\n        /// </summary>\r\n        internal static string GenerateRandomNickname()\r\n        {\r\n            return $\"김진왕#{UnityEngine.Random.Range(1000, 9999)}\";\r\n        }\r\n    }\r\n}","lines":61},{"id":"Scripts/Data/DataSO/SoundCatalogSO.cs","name":"SoundCatalogSO","path":"Scripts/Data/DataSO/SoundCatalogSO.cs","layer":"Data","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"데이터 구동 카탈로그: 클립·볼륨·피치 전부 인스펙터 튜닝(코드 수정 불필요). CreateAssetMenu 경로는 기존 TierConfig/MatchmakingConfig(\"GameData/...\") 컨벤션을 따름.","src":"﻿using System;\r\nusing UnityEngine;\r\nusing UnityEngine.Serialization;\r\nusing Wooduduk.SFX;\r\n\r\nnamespace Wooduduk.Data.DataSO\r\n{\r\n    // 데이터 구동 카탈로그: 클립·볼륨·피치 전부 인스펙터 튜닝(코드 수정 불필요).\r\n    // CreateAssetMenu 경로는 기존 TierConfig/MatchmakingConfig(\"GameData/...\") 컨벤션을 따름.\r\n    [CreateAssetMenu(fileName = \"SoundCatalog\", menuName = \"GameData/SoundCatalog\")]\r\n    public sealed class SoundCatalogSO : ScriptableObject\r\n    {\r\n        [Header(\"콤보 마일스톤\")] \r\n        public HitPitchConfig _comboPitch = new HitPitchConfig();\r\n\r\n        [Serializable]\r\n        public sealed class SfxEntry\r\n        {\r\n            public SfxId _id;\r\n            public AudioClip[] _clips;                              // 여러 개면 무반복 랜덤\r\n            [Range(0f, 1f)] public float _volume = 1f;\r\n            public Vector2 _pitchRange = new Vector2(0.97f, 1.03f); // 미세 피치 변화\r\n            public SfxLayer[] _layers;\r\n            [Range(0f, 1f)] public float _spatialBlend = 1f; // 0=2D(UI·콤보 팡파레 등 비다이제틱), 1=3D\r\n            public float _minDistance = 2f;                  // 풀볼륨 반경\r\n            public float _maxDistance = 20f;                 // 감쇠 끝\r\n        }\r\n        [Serializable]\r\n        public sealed class SfxLayer\r\n        {\r\n            public AudioClip[] _clips;                              // 여러 개면 무반복 랜덤\r\n            [Range(0f, 1f)] public float _volume = 1f;\r\n            public Vector2 _pitchRange = new Vector2(0.97f, 1.03f);\r\n            [Min(0f)] public float _delay = 0f;                     // 발사 지연(초). 잔향 레이어용\r\n        }\r\n\r\n        [Serializable]\r\n        public sealed class BgmEntry\r\n        {\r\n            public BgmId _id;\r\n            public AudioClip[] _clips;            // 1개 = 무한 루프 / 여러 개 = 로테이션\r\n            [Range(0f, 1f)] public float _volume = 0.8f;\r\n            public bool _shuffle = true;          // ON: 무반복 랜덤 / OFF: 등록 순서 반복\r\n        }\r\n        [Serializable]\r\n        public sealed class AmbientEntry\r\n        {\r\n            public AmbientId _id; \r\n            public AudioClip _clip; \r\n            [Range(0f, 1f)] public float _volume = 0.6f;\r\n            [Range(0f, 1f)] public float _spatialBlend = 0f;  // 0=2D, 1=3D 위치기반. 모닥불=1, 숲(Map)=0\r\n            public float _minDistance = 2.5f;                   // 3D 풀볼륨 반경\r\n            public float _maxDistance = 15f;                  // 3D 감쇠 끝\r\n        }\r\n        [Serializable]\r\n        public sealed class ReelConfig\r\n        {\r\n            [Header(\"회전\")]\r\n            public AudioClip[] _rollTickClips;                 // 번갈아(순차) 재생할 짧은 클릭들\r\n            [Min(0.01f)] public float _tickInterval = 0.06f;   // 클릭 간격(초). 작을수록 빠른 회전감\r\n            [Header(\"정지\")]\r\n            public AudioClip[] _stopClips;                     // 정지 (무반복 랜덤)\r\n            [Range(0f, 1f)] public float _volume = 0.9f;\r\n            public float _stopBasePitch = 1f;\r\n            public float _stopPitchStep = 0.05f;               // 릴 인덱스마다 +피치(왼→오 상승감)\r\n        }\r\n        [Serializable]\r\n        public sealed class HitPitchConfig\r\n        {\r\n            public float _basePitch = 1f;                     // 스윙 1개 기준 피치\r\n            [FormerlySerializedAs(\"_pitchPerTier\")]\r\n            public float _pitchPerSwing = 0.06f;              // 스윙 1개 추가마다 +피치\r\n            [Min(1)] public int _maxSwingSteps = 6;           // 사다리 상한(1~6 = 총 6계단)\r\n        }\r\n\r\n        [Header(\"타격 피치\")] public HitPitchConfig _hitPitch = new HitPitchConfig();\r\n        [Header(\"효과음\")] public SfxEntry[] _sfx;\r\n        [Header(\"배경음\")] public BgmEntry[] _bgm;\r\n        [Header(\"환경음\")] public AmbientEntry[] _ambient;\r\n        [Header(\"릴\")] public ReelConfig _reel = new ReelConfig();\r\n\r\n        // 선형 탐색\r\n        public BgmEntry GetBgm(BgmId id)\r\n        { if (_bgm == null) return null; for (int i = 0; i < _bgm.Length; i++) if (_bgm[i] != null && _bgm[i]._id == id) return _bgm[i]; return null; }\r\n        public AmbientEntry GetAmbient(AmbientId id)\r\n        { if (_ambient == null) return null; for (int i = 0; i < _ambient.Length; i++) if (_ambient[i] != null && _ambient[i]._id == id) return _ambient[i]; return null; }\r\n        public SfxEntry GetSfx(SfxId id)\r\n        { if (_sfx == null) return null; for (int i = 0; i < _sfx.Length; i++) if (_sfx[i] != null && _sfx[i]._id == id) return _sfx[i]; return null; }\r\n    }\r\n}","lines":90},{"id":"Scripts/Slot/SlotDrawEngine.cs","name":"SlotDrawEngine","path":"Scripts/Slot/SlotDrawEngine.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"한 스핀 추첨 결과","src":"﻿namespace Wooduduk.Slot\r\n{\r\n    // 한 스핀 추첨 결과\r\n    public sealed class SpinResult\r\n    {\r\n        public int SpinIndex;\r\n        public SymbolId[] Reels;\r\n\r\n        public SpinResult(int spinIndex, SymbolId[] reels)\r\n        {\r\n            SpinIndex = spinIndex; Reels = reels;\r\n        }\r\n\r\n        // 특정 심볼 개수(스윙 카운트 판정 등에 사용)\r\n        public int CountOf(SymbolId id)\r\n        {\r\n            int n = 0;\r\n            for (int i = 0; i < Reels.Length; i++)\r\n                if (Reels[i] == id) n++;\r\n            return n;\r\n        }\r\n    }\r\n\r\n    // 5릴 독립 추첨 엔진 순수 결정론.\r\n    // 스핀마다 : 기본 가중치 테이블 생성 -> 파이프라인 보정 -> 릴 수만큼 독립 추첨.\r\n    public sealed class SlotDrawEngine\r\n    {\r\n        private readonly ISymbolCatalog _catalog;\r\n        private readonly WeightPipeline _pipeline;\r\n\r\n        public SlotDrawEngine(ISymbolCatalog catalog, WeightPipeline pipeline)\r\n        {\r\n            _catalog = catalog;\r\n            _pipeline = pipeline;\r\n        }\r\n\r\n        public SpinResult Draw(IDeterministicRng rng, in SpinContext ctx)\r\n        {\r\n            var table = new WeightTable(_catalog);\r\n            _pipeline.Build(table, in ctx);\r\n\r\n            int reelCount = ctx.ReelCount <= 0 ? 5 : ctx.ReelCount;\r\n            var reels = new SymbolId[reelCount];\r\n            for (int i = 0; i < reelCount; i++)\r\n                reels[i] = PickOne(rng, table);   // 릴마다 독립 추첨(복원 추출)\r\n\r\n            return new SpinResult(ctx.SpinIndex, reels);\r\n        }\r\n\r\n        private static SymbolId PickOne(IDeterministicRng rng, WeightTable table)\r\n        {\r\n            long total = table.Total;\r\n            if (total <= 0) return SymbolId.KNOT; // 안전장치(가중치 합 0 방지)\r\n\r\n            ulong r = rng.NextULong() % (ulong)total;\r\n            long acc = 0;\r\n            int n = table.Length;\r\n            for (int i = 0; i < n; i++)\r\n            {\r\n                acc += table.WeightAt(i);\r\n                if ((long)r < acc) return (SymbolId)i;\r\n            }\r\n            return (SymbolId)(n - 1);\r\n        }\r\n    }\r\n}","lines":66},{"id":"Scripts/Slot/SlotEvent.cs","name":"SlotEvent","path":"Scripts/Slot/SlotEvent.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"슬롯 연출 이벤트 채널 상위 슬롯 컨트롤러가 결과를 바독 여기서 Raise 애니/VFX/SFX가 구독하면 됨","src":"﻿using System;\r\nusing UnityEngine;\r\nusing Wooduduk.Slot.Machine;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n    public enum CostKind\r\n    {\r\n        Spin,\r\n        Fire,\r\n        Card,\r\n    }\r\n    // 슬롯 연출 이벤트 채널\r\n    // 상위 슬롯 컨트롤러가 결과를 바독 여기서 Raise\r\n    // 애니/VFX/SFX가 구독하면 됨\r\n    public static class SlotEvent\r\n    {\r\n        // 도끼 스윙 애니메이션 용\r\n        public static event Action OnAxeSwing;\r\n        public static void RaiseAxeSwing() => OnAxeSwing?.Invoke();\r\n\r\n        // 릴 회전 애니 시작, 도끼 타격 SFX\r\n        public static event Action OnSpinStarted;\r\n        public static void RaiseSpinStarted() => OnSpinStarted?.Invoke();\r\n\r\n        // 개별 릴 정지 이벤트\r\n        public static event Action<int> OnReelStopped;\r\n        public static void RaiseReelStopped(int reelIndex) => OnReelStopped?.Invoke(reelIndex);\r\n\r\n        // 릴 결정. 각 릴을 Reels[i] 심볼에 멈추는 정지 애니. \r\n        public static event Action<SpinResult> OnReelsDecided;\r\n        public static void RaiseReelsDecided(SpinResult result) => OnReelsDecided?.Invoke(result);\r\n\r\n        // 스핀이 완전히 완료될 때\r\n        public static event Action OnSpinCompleted;\r\n        public static void RaiseSpinCompleted() => OnSpinCompleted?.Invoke();\r\n\r\n        // 판정 확정. 등급별 셰이크/퍼펙트/막걸리/좀벌레 실패 VFX·SFX, 콤보 UI. \r\n        public static event Action<SpinOutcome> OnSpinJudged;\r\n        public static void RaiseSpinJudged(SpinOutcome outcome) => OnSpinJudged?.Invoke(outcome);\r\n\r\n        // 정산. 정산 연출, 미정산→banked 이동 UI. \r\n        public static event Action<RunProgress, long> OnSettled;\r\n        public static void RaiseSettled(RunProgress run, long movedWood) => OnSettled?.Invoke(run, movedWood);\r\n\r\n        // 모닥불 투입. 불 키우기 연출, 체온 게이지 상승 반응. \r\n        public static event Action<RunProgress> OnFireFed;\r\n        public static void RaiseFireFed(RunProgress run) => OnFireFed?.Invoke(run);\r\n\r\n        // 체온 위험 구간 진입(1회). 심장박동 SFX, 붉은 비네트 VFX. \r\n        public static event Action<RunProgress> OnBodyTempCritical;\r\n        public static void RaiseBodyTempCritical(RunProgress run) => OnBodyTempCritical?.Invoke(run);\r\n        // 체온 위험 구간 이탈(1회성). 심박 정지·비네트 해제 등 복귀 연출용\r\n        public static event Action<RunProgress> OnBodyTempRecovered;\r\n        public static void RaiseBodyTempRecovered(RunProgress run) => OnBodyTempRecovered?.Invoke(run);\r\n        // 체온 0 → 사망/게임 종료. 결과 화면, 사망 연출. payload: 최종 재화, 런 상태. \r\n        public static event Action<RunProgress> OnDeath;\r\n        public static void RaiseDeath(RunProgress run) => OnDeath?.Invoke(run);\r\n\r\n        // 효과 발동(막걸리 발동/카드 장착). 버프·디버프 아이콘 표시, 발동 연출. \r\n        public static event Action<SlotEffect> OnEffectApplied;\r\n        public static void RaiseEffectApplied(SlotEffect effect) => OnEffectApplied?.Invoke(effect);\r\n        // 런 리셋/부활. 결빙 연출 정리/HUD 초기화 \r\n        public static event Action<RunProgress> OnRunReset;\r\n        public static void RaiseRunReset(RunProgress run) => OnRunReset?.Invoke(run);\r\n        // 모닥불 점화/소화 / 화염 VFX, SFX\r\n        public static event Action<Vector3> OnCampfireLit;    \r\n        public static void RaiseCampfireLit(Vector3 pos) => OnCampfireLit?.Invoke(pos);\r\n        public static event Action OnCampfireOut;\r\n        public static void RaiseCampfireOut() => OnCampfireOut?.Invoke();\r\n        // 모닥불 연료 변동\r\n        public static event Action<int, int, int> OnFireFuelChanged;\r\n        public static void RaiseFireFuelChanged(int current, int max, int cost) => OnFireFuelChanged?.Invoke(current, max, cost);\r\n\r\n        // 콤보 마일스톤 도달(5/10/20/30…)\r\n        public static event Action<int, int> OnComboMilestone;\r\n        public static void RaiseComboMilestone(int milestone, int index) => OnComboMilestone?.Invoke(milestone, index);\r\n\r\n        // 비용 부족/사용 불가 거부\r\n        public static event Action<CostKind> OnCostRejected;\r\n        public static void RaiseCostRejected(CostKind kind) => OnCostRejected?.Invoke(kind);\r\n\r\n\r\n    }\r\n}\r\n\r\n\r\n","lines":88},{"id":"Scripts/Slot/CardEvent.cs","name":"CardEvent","path":"Scripts/Slot/CardEvent.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"카드 상호작용 이벤트 채널 (SlotEvent 패턴). CardInteractable이 Raise → CardController(로직)·UI(이찬영)·VFX(박건호)가 구독.","src":"using System;\n\nnamespace Wooduduk.Slot\n{\n    // 카드 상호작용 이벤트 채널 (SlotEvent 패턴).\n    // CardInteractable이 Raise → CardController(로직)·UI(이찬영)·VFX(박건호)가 구독.\n    public static class CardEvent\n    {\n        // 카드 선택(조준+상호작용). payload: 선택된 카드 id.\n        public static event Action<string> OnCardSelected;\n        public static void RaiseCardSelected(string cardId) => OnCardSelected?.Invoke(cardId);\n\n        // 구매 결과. payload: 카드 id, 성공 여부. UI/VFX 분기용.\n        public static event Action<string, bool> OnCardBought;\n        public static void RaiseCardBought(string cardId, bool success) => OnCardBought?.Invoke(cardId, success);\n        // 카드 구매 변동 \n        private static int _lastCardPrice = int.MinValue;\n        public static Action<int> _onCardPriceChanged;\r\n        public static event Action<int> OnCardPriceChanged\r\n        {\r\n            add\r\n            {\r\n                _onCardPriceChanged += value;\r\n                if (_lastCardPrice != int.MinValue) value.Invoke(_lastCardPrice); // 놓친 초기값 보정\r\n            }\r\n            remove => _onCardPriceChanged -= value;\r\n        }\r\n        public static void RaiseCardPriceChanged(int price)\r\n        {\r\n            if (_lastCardPrice != price)\r\n            {\r\n                _lastCardPrice = price;\r\n                _onCardPriceChanged?.Invoke(price);\r\n            }\r\n        }\r\n        public static void ResetCardPriceCache() => _lastCardPrice = int.MinValue;\r\n        // 카드 호버 in/out UI/SFX 공용\r\n        public static event Action<bool> OnCardHover;\r\n        public static void RaiseCardHover(bool on) => OnCardHover?.Invoke(on);\n    }\n}\n","lines":42},{"id":"Scripts/Slot/Progression.cs","name":"Progression","path":"Scripts/Slot/Progression.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"한 런의 진행 상태. 싱글/멀티 공유 / 변경은 RunProcessor를 통해서","src":"﻿using System;\r\nusing System.Collections.Generic;\r\n\r\nnamespace Wooduduk.Slot\r\n{\r\n\r\n    // 한 런의 진행 상태.\r\n    // 싱글/멀티 공유 / 변경은 RunProcessor를 통해서\r\n    public sealed class RunProgress\r\n    {\r\n        // 진행\r\n        public int SpinIndex;\r\n        public int Combo;\r\n        public int MaxCombo;\r\n        public int DryStreak;       // 연속 아쉬운 스핀 -> 운빨 보정 입력\r\n        public bool Started;        // 첫 스윙에 true -> 체온 드레인/생존시간 시작\r\n        // 스핀이 Started를 자동으로 켤지 여부. 싱글=true(첫 스윙에 즉시 시작).\r\n        // 멀티=false → SlotMachine.Spin이 Started를 안 켬 → MultiSessionCoordinator(서버시간 GO)만 소유.\r\n        //   카운트다운/startAt 대기 중 조기 체온 드레인(저온 시작 버그) 방지.\r\n        public bool AutoStartOnSpin = true;\r\n        public bool IsAlive = true; // 체온 0 사망은 Layer5에서 토글\r\n\r\n        // 체온/생존\r\n        public float BodyTemp;        // 현재 체온 / 실시간 감소\r\n        public float MaxBodyTemp;     // 최대 체온(게이지 정규화용)\r\n        public float SurvivalSeconds; // 생존 누적 시간 -> 최종재화 = 생존시간 * 모닥불 횟수\r\n\r\n        // 장작 경제\r\n        public long UnsettledWood;   // 미정산 / 명중 누적, 실패 시 소실\r\n        public long BankedWood;      // 정산됨 / 이거 사용처는 -> 모닥불 투입,  슬롯\r\n        public int FireLogCount;    // 모닥불 장작 투입 횟수 -> 최종 점수 동력, 투입 비용 점증\r\n        public int FireFeedStreak;\r\n        public int SettleCount;     // 정산 횟수 -> 비용 점증 기준\r\n        public int CardBuyCount;    // 카드 구매 횟수 -> 카드 비용 점증 기준\r\n        public int SpinCostTier;    // 스핀 비용 단계\r\n\r\n        // 모닥불\r\n        public float FireBurnSeconds; // 모닥불 남은 연소 시간\r\n    }\r\n    // 한 스핀 반영 결과(연출/이벤트 전달용)\r\n    public struct SpinApplied\r\n    {\r\n        public long WoodStack;        // 이번 명중으로 미정산에 더해진 장작\r\n        public long AcornWood;        // 도토리 효과로 banked에 더해진 장작\r\n        public bool UnsettledCleared;// 이번 스핀에 미정산이 소실됐는가\r\n        public bool MGLTriggered;    // 막걸리 발동\r\n        public bool Guarded;         // 보험 효과 \r\n\r\n    }\r\n    // 진행/경제 상수. 추후 SO/시트 전환 가능\r\n    // TODO : 비용 점증 수치\r\n    [Serializable]\r\n    public sealed class SlotEconomyConfig\r\n    {\r\n        [Serializable] public struct ComboMultBand\r\n        {\r\n            public int _atCombo;\r\n            public long _multBp; // 10000 = ×1.0\r\n        }\r\n        // 기본 제공 장작\r\n        public long _startWood = 5;\r\n        // 배율 공식 : 장작 = 기본 × 등급배율 × 콤보보너스\r\n        public int _baseWoodPerHit = 10;        // 약스윙·콤보0 기준 기본 장작\r\n        public List<ComboMultBand> _comboCurve = new List<ComboMultBand>\r\n        {\r\n            new ComboMultBand{ _atCombo=0,   _multBp=10000    }, // ×1.0\r\n            new ComboMultBand{ _atCombo=5,   _multBp=13000    }, // ×1.3   ── 초반 완만\r\n            new ComboMultBand{ _atCombo=10,  _multBp=18000    }, // ×1.8\r\n            new ComboMultBand{ _atCombo=20,  _multBp=40000    }, // ×4\r\n            new ComboMultBand{ _atCombo=30,  _multBp=80000    }, // ×8\r\n            new ComboMultBand{ _atCombo=50,  _multBp=200000   }, // ×20    ── 여기부터 개방\r\n            new ComboMultBand{ _atCombo=100, _multBp=600000   }, // ×60\r\n            new ComboMultBand{ _atCombo=150, _multBp=1500000  }, // ×150\r\n            new ComboMultBand{ _atCombo=200, _multBp=3000000  }, // ×300\r\n            new ComboMultBand{ _atCombo=300, _multBp=7000000  }, // ×700\r\n            new ComboMultBand{ _atCombo=400, _multBp=15000000 }, // ×1500\r\n            new ComboMultBand{ _atCombo=500, _multBp=30000000 }, // ×3000  ── 폭발\r\n        };\r\n        public int[] _comboMilestones = { 5, 10, 20, 30, 50, 100, 150, 200, 300, 400, 500 }; // 콤보 마일스톤\r\n        public int _acornWoodEach = 15;         // 도토리 1개당 즉발 장작(즉발 → banked 직행)\r\n\r\n        // 정산 시 비용 점증 : 정확한 수치 픽스 필요~~~~~~~~~~\r\n        public int _fireFeedBaseCost = 20;      // 모닥불 1회 투입 기본 비용(banked 장작)\r\n        public int _fireFeedCostStep = 10;      // 정산 1회마다 +10\r\n        public int _spinBaseCost = 0;           // 슬롯 1회 기본 비용(0 = 무료 시작 가정)\r\n        public int _spinCostStep = 5;           // 정산 1회마다 슬롯 비용 +5\r\n\r\n        // 카드 구매 비용\r\n        public int _cardBaseCost = 30;          // 첫 카드 구매 비용\r\n        public int _cardCostStep = 20;          // 구매 1회 마다 +\r\n\r\n        // 비용 단일 출처 프로퍼티\r\n        public int SpinCost(int tier) => _spinBaseCost + tier * _spinCostStep;\r\n        public int FireFeedCost(int streak) => _fireFeedBaseCost + streak * _fireFeedCostStep;\r\n\r\n        public long ComboMultBp(int combo)\r\n        {\r\n            long bp = 10000;\r\n            for (int i = 0; i < _comboCurve.Count; i++)\r\n                if (combo >= _comboCurve[i]._atCombo) bp = _comboCurve[i]._multBp;\r\n            return bp;\r\n        }\r\n\r\n    }\r\n    // 런 진행 처리\r\n    // 판정 -> 상태 반영, 정산, 모닥불 투입, 최종 재화 계산\r\n    // 정수 연산\r\n    public sealed class RunProcessor\r\n    {\r\n        private readonly SlotEconomyConfig _config;\r\n        public RunProcessor(SlotEconomyConfig config)\r\n        {\r\n            _config = config;\r\n        }\r\n\r\n        // 판정 결과를 진행 상태에 반영 / 연출용 요약 반환\r\n        public SpinApplied Apply(RunProgress run, SpinJudgment j, SpinModifiers mods)\r\n        {\r\n            run.SpinIndex++;\r\n            long woodStack = 0;\r\n            bool cleared = false;\r\n            bool guarded = false;\r\n\r\n            if (j.IsHit)\r\n            {\r\n                run.Combo += j.ComboDelta + mods.ExtraComboOnHit;   // 흥폭발 등 추가 콤보(명중 시만)\r\n                run.DryStreak = 0;                               // 명중 -> 운빨 보정 리셋\r\n                woodStack = CalcHitWood(j, run.Combo);           // 배율 공식\r\n                long woodBp = mods.WoodMultiplierBp <= 0 ? 10000 : mods.WoodMultiplierBp;\r\n                if (woodBp != 10000)\r\n                    woodStack = woodStack * woodBp / 10000;\r\n                run.UnsettledWood += woodStack;                  // 미정산 누적\r\n            }\r\n            else if (mods.PreventFailPenalty)\r\n            {\r\n                guarded = true; // 보험 \r\n                run.DryStreak++;\r\n            }\r\n            else\r\n            {\r\n                if (j.ComboBreak) run.Combo = 0;                    // 콤보 끊김\r\n                run.DryStreak++;                                    // 연속 실패 -> 운빨 보정 증가\r\n                run.SpinCostTier++;                                 // 실패 시 스핀 비용 점증\r\n                if (j.UnsettledCleared && run.UnsettledWood > 0)    // 미정산 소실\r\n                {\r\n                    cleared = true;\r\n                    run.UnsettledWood = 0;\r\n                }\r\n            }\r\n\r\n            // 도토리 : 콤보/정산/명중 무관 -> 즉시 보너스 재화 정산\r\n            int acornMult = mods.AcornValueMultiplier < 1 ? 1 : mods.AcornValueMultiplier;\r\n            long acornWood = (long)j.AcornCount * _config._acornWoodEach * acornMult;\r\n            if (acornWood > 0) run.BankedWood += acornWood;\r\n\r\n            return new SpinApplied\r\n            {\r\n                WoodStack = woodStack,\r\n                AcornWood = acornWood,\r\n                UnsettledCleared = cleared,\r\n                MGLTriggered = j.MGLTriggered,\r\n                Guarded = guarded,\r\n            };\r\n\r\n        }\r\n        /// 이번 스핀에 적용할 효과 보정(카드·막걸리 → SlotMachine이 집계해 주입). 모두 중립값 안전.\r\n        public struct SpinModifiers\r\n        {\r\n            public long WoodMultiplierBp;     // 명중 장작 배율(10000=×1.0, <=0이면 ×1.0)\r\n            public int AcornValueMultiplier;  // 도토리 가치 배수(<1이면 1)\r\n            public bool PreventFailPenalty;   // 보험 : 이번 실패의 콤보 끊김·미정산 소실 무효\r\n            public int ExtraComboOnHit;       // 명중 시 추가 콤보(카드·막걸리 집계, 0=무효)\r\n        }\r\n        // 배율 공식 : 기본 장작 * 등급 배율(퍼펙트/불빠따 포함) * 콤보 보너스\r\n        public long CalcHitWood(SpinJudgment j, int comboAfterHit)\r\n        {\r\n            long w = (long)_config._baseWoodPerHit * j.BaseMultiplierBp / 10000; // 등급 배율\r\n            w = w * _config.ComboMultBp(comboAfterHit) / 10000;                  // 콤보 곡선\r\n            return w;\r\n        }\r\n        // 정산 : 미정산 -> 사용가능(정산) 장작으로 확정\r\n        // 비용 점증 카운터 증가\r\n        public long Settle(RunProgress run)\r\n        {\r\n            long moved = run.UnsettledWood;\r\n            run.BankedWood += moved;\r\n            run.UnsettledWood = 0;\r\n            run.SettleCount++;      // 정산할 때마다 비용 상승\r\n            run.SpinCostTier++;\r\n            run.Combo = 0;\r\n            return moved;\r\n        }\r\n        // 모닥불에 장작 1개 투입 시도 / 성공 시 FireLogCount ++\r\n        public bool TryFeedFire(RunProgress run)\r\n        {\r\n            int cost = FireFeedCost(run.FireFeedStreak); // 0회차는 base\r\n            if (run.BankedWood < cost) return false;\r\n            run.BankedWood -= cost;\r\n            run.FireLogCount++;     // step+\r\n            run.FireFeedStreak++;   // 연속 투입 +1 다음 투입부터 비용 점증\r\n            return true;\r\n        }\r\n        // 슬롯 1회 시도 / 무료 시작이면 항상 true\r\n        public bool TryPaySpin(RunProgress run)\r\n        {\r\n            int cost = SpinCost(run.SpinCostTier);\r\n            if (cost <= 0) return true;\r\n            if (run.BankedWood < cost) return false;\r\n            run.BankedWood -= cost;\r\n            return true;\r\n        }\r\n        public int FireFeedCost(int feedStreak)\r\n        {\r\n            return _config.FireFeedCost(feedStreak);\r\n        }\r\n        public int SpinCost(int tier)\r\n        {\r\n            return _config.SpinCost(tier);\r\n        }\r\n        private int _cardCostOverride = -1;\r\n        public void SetCardCostOverride(int cost)\r\n        {\r\n            _cardCostOverride = cost;\r\n        }\r\n        public int CardCost(int cardBuyCount)\r\n            => _cardCostOverride >= 0\r\n        ? _cardCostOverride\r\n        : _config._cardBaseCost + cardBuyCount * _config._cardCostStep;\r\n        public bool TryBuyCard(RunProgress run)\r\n        {\r\n            int cost = CardCost(run.CardBuyCount);\r\n            if (run.BankedWood < cost) return false;\r\n            run.BankedWood -= cost;\r\n            run.CardBuyCount++;\r\n            return true;\r\n        }\r\n    }\r\n    // 임시 경제 기본값 / 수치 확정 시 교체\r\n    public static class SlotEconomyDefaults\r\n    {\r\n        public static SlotEconomyConfig Create() => new SlotEconomyConfig();\r\n    }\r\n\r\n}\r\n","lines":245},{"id":"Scripts/Slot/Slotmachine/SlotMachine.cs","name":"SlotMachine","path":"Scripts/Slot/Slotmachine/SlotMachine.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":false,"summary":"한 스핀의 패키징된 결과 추첨 + 판정 + 상태 반영을 한 번에 묶음 연출에 필요한 값 포함","src":"﻿using Wooduduk.Data.DataSO;\r\nusing static Wooduduk.Slot.RunProcessor;\r\nusing static Wooduduk.Slot.SpinJudge;\r\nusing System;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.Slot.Machine\r\n{\r\n    // 한 스핀의 패키징된 결과\r\n    // 추첨 + 판정 + 상태 반영을 한 번에 묶음\r\n    // 연출에 필요한 값 포함\r\n    public struct SpinOutcome\r\n    {\r\n        public SpinResult Result;       // 릴별 심볼\r\n        public SpinJudgment Judgment; // 명중/등급/퍼펙트/막걸리/실패사유\r\n        public SpinApplied Applied;     // 이번 스핀 장작/소실/보험/막걸리 발동\r\n\r\n        // 반영 후 런 상태 스냅샷 / HUD, 연출\r\n        public int Combo;\r\n        public long UnsettledWood;\r\n        public long BankedWood;\r\n\r\n        public SlotEffect RolledMGL;    // 이번 스핀 막걸리로 새로 발동된 효과 / 없으면 Null\r\n    }\r\n    // 슬롯 머신 코어\r\n    // 추첨, 판정, 진행, 체온, 효과를 하나의 진입점으로 묶음\r\n    public sealed class SlotMachine\r\n    {\r\n        private readonly IDeterministicRng _rng;\r\n        private readonly SlotDrawEngine _engine;\r\n        private readonly SlotJudgeConfig _judgeCfg;\r\n        private readonly RunProcessor _processor;\r\n        private readonly EffectRegistry _effects;\r\n        private readonly IMGLSource _mglRoller;\r\n        private readonly RunProgress _run;\r\n        private readonly int _baseReelCount;\r\n        private const int MAX_REELS = 6;   // 릴 상한(기본5 + 4번째릴 카드1). 방어1(TryBuyCard)·방어2(Spin) 공유.\r\n\r\n        public RunProgress Run => _run;\r\n        public EffectRegistry Effects => _effects; // 카드 추가용 (상점/로비)\r\n        public int CardCost => _processor.CardCost(_run.CardBuyCount); // 현재 카드 구매가\r\n        public void SetCardCostOverride(int cost) => _processor.SetCardCostOverride(cost);\r\n        public bool IsAlive => _run.IsAlive;\r\n        //public bool IsCritical => _survival.IsCritical(_run);\r\n\r\n        public SlotMachine(\r\n            IDeterministicRng rng,\r\n            SlotDrawEngine engine,\r\n            SlotJudgeConfig judgeCfg,\r\n            RunProcessor processor,\r\n            EffectRegistry effects,\r\n            MGLRoller mglRoller,\r\n            RunProgress run,\r\n            int reelCount = 5)\r\n        {\r\n            _rng = rng;\r\n            _engine = engine;\r\n            _judgeCfg = judgeCfg;\r\n            _processor = processor;\r\n            _effects = effects;\r\n            _mglRoller = mglRoller;\r\n            _run = run;\r\n            _baseReelCount = reelCount < 1 ? 5 : reelCount;\r\n            if (_baseReelCount > MAX_REELS)\r\n                Debug.LogError($\"[SlotMachine] baseReelCount({_baseReelCount}) > MAX_REELS({MAX_REELS}) — 릴 상한이 기본 릴 수보다 작음. 4번째릴 카드 영구 비활성·매 스핀 클램프 발생. 데이터시트 reelCount 확인.\");\r\n\r\n        }\r\n        // 스핀 : 추첨 -> 판정 -> 효과 보정 반영 -> 막걸리 롤/ 첫 스핀에 런 시작\r\n        public SpinOutcome Spin()\r\n        {\r\n            // 싱글: 첫 스윙에 런 시작(체온 드레인 ON). 멀티: AutoStartOnSpin=false라 여기서 안 켬 →\r\n            //   MultiSessionCoordinator가 서버시간 GO에 Started를 켠다(카운트다운/대기 중 조기 드레인 방지).\r\n            if (_run.AutoStartOnSpin) _run.Started = true;\r\n            _run.FireFeedStreak = 0;\r\n            // 효과 반영된 릴 수\r\n            int extra = _effects.TotalExtraReels();\r\n            int reels = _baseReelCount + (extra < 0 ? 0 : extra);\r\n            if (reels > MAX_REELS)\r\n            {\r\n                Debug.LogWarning($\"[릴클램프] reels {reels}→{MAX_REELS} 상한 적용\");\r\n                reels = MAX_REELS;\r\n            }\r\n\r\n            var ctx = new SpinContext(_run.SpinIndex, _run.Combo, _run.DryStreak, reels);\r\n            SpinResult result = _engine.Draw(_rng, in ctx);\r\n            SpinJudgment judgment = SpinJudge.Judge(result, _judgeCfg);\r\n\r\n            // ── (1) 무거운도끼: 명중일 때만 강제 약스윙(×1.0). 헛스윙/좀벌레 실패는 손대지 않음. ──\r\n            //     약스윙 강제 = 퍼펙트/불빠따 보너스 무효 + 이번 스핀 불빠따 자체 취소(배율·페널티 둘 다).\r\n            if (judgment.IsHit && _effects.AnyForcesWeakSwing())\r\n            {\r\n                judgment.Tier = SwingTier.Weak;\r\n                judgment.EffectiveSwingCount = 1;\r\n                judgment.BaseMultiplierBp = _judgeCfg._tierMultiplierBp[1]; // ×1.0\r\n                judgment.IsPerfect = false;\r\n                judgment.FireBatActive = false;\r\n            }\r\n            // ── (2) 기름통: 불빠따 배율 추가 증폭(불빠따 살아있을 때만). ──\r\n            if (judgment.FireBatActive)\r\n            {\r\n                long fbBonus = _effects.CombinedFireBatMultBonusBp();\r\n                if (fbBonus != 10000)\r\n                    judgment.BaseMultiplierBp = judgment.BaseMultiplierBp * fbBonus / 10000;\r\n            }\r\n\r\n
