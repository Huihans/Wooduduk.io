      AccountEvents.OnLogout += ClearCurrentUser;\r\n        }\r\n\r\n        private void OnDisable()\r\n        {\r\n            // 메모리 누수 방지를 위해 이벤트 구독 해제\r\n            AccountEvents.OnUserDataLoaded -= SetUserData;\r\n            AccountEvents.OnLogout -= ClearCurrentUser;\r\n        }\r\n\r\n        #region --- 데이터 라이프사이클 ---\r\n\r\n        /// <summary>\r\n        /// 서버/DB에서 불러온 데이터를 세션에 적용합니다.\r\n        /// </summary>\r\n        private void SetUserData(UserData userData)\r\n        {\r\n            if (userData == null) return;\r\n            CurrentUserData = userData;\r\n\r\n            // 데이터 로드 직후, 혹시 모를 비정상적인 장착 상태를 검증합니다.\r\n            ValidateEquipment();\r\n\r\n            // 유저 데이터 확정 즉시 리더보드 사전 로드 (패널 열기 전에 준비)\r\n            LeaderboardCache.Clear();\r\n            LeaderboardService.Load(userData);\r\n\r\n            Debug.Log($\"[UserManager] 유저 데이터 적용: {userData._userId}\");\r\n        }\r\n\r\n        /// <summary>\r\n        /// 로그아웃 시 메모리 내 유저 데이터를 비웁니다.\r\n        /// </summary>\r\n        private void ClearCurrentUser(UserData user)\r\n        {\r\n            string uid = user != null ? user._userId : CurrentUserData != null ? CurrentUserData._userId : null;\r\n\r\n            CurrentUserData = null;\r\n        }\r\n\r\n        /// <summary>\r\n        /// 안전하게 유저 데이터를 가져옵니다. (데이터 로드 여부를 bool로 반환)\r\n        /// </summary>\r\n        public bool TryGetUser(out UserData user)\r\n        {\r\n            user = CurrentUserData;\r\n            return user != null;\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region --- 아이템 및 재화 관리 ---\r\n\r\n        /// <summary>\r\n        /// 무기를 획득 처리합니다. 중복 시 재화를 환불합니다.\r\n        /// </summary>\r\n        public bool AddWeapon(string weaponId, int refundGold, out bool isNewAcquisition)\r\n        {\r\n            return ProcessItemAcquisition(weaponId, refundGold, out isNewAcquisition, true);\r\n        }\r\n\r\n        /// <summary>\r\n        /// 룰렛 스킨을 획득 처리합니다. 중복 시 재화를 환불합니다.\r\n        /// </summary>\r\n        public bool AddRouletteSkin(string skinId, int refundGold, out bool isNewAcquisition)\r\n        {\r\n            return ProcessItemAcquisition(skinId, refundGold, out isNewAcquisition, false);\r\n        }\r\n\r\n        /// <summary>\r\n        /// 무기와 스킨 획득 로직을 통합한 내부 메서드입니다.\r\n        /// </summary>\r\n        private bool ProcessItemAcquisition(string itemId, int refundGold, out bool isNewAcquisition, bool isWeapon)\r\n        {\r\n            isNewAcquisition = false;\r\n            if (string.IsNullOrEmpty(itemId) || !HasCurrentUser()) return false;\r\n\r\n            EnsureUserDataLists();\r\n\r\n            // 대상 리스트 참조\r\n            var list = isWeapon ? CurrentUserData._ownedWeaponIds : CurrentUserData._rouletteSkinIds;\r\n            string listFieldName = isWeapon ? \"_ownedWeaponIds\" : \"_rouletteSkinIds\";\r\n\r\n            // 1. 중복 보유 시: 환불 로직\r\n            if (list.Contains(itemId))\r\n            {\r\n                CurrentUserData._gold += refundGold;\r\n                SaveField(\"_gold\", CurrentUserData._gold);\r\n                Debug.Log($\"[UserManager] 중복 획득 ({itemId})! {refundGold} 골드 환불됨.\");\r\n                return false;\r\n            }\r\n\r\n            // 2. 신규 획득 시: 리스트 추가 후 동기화\r\n            list.Add(itemId);\r\n            isNewAcquisition = true;\r\n            SaveField(listFieldName, SaveManager.ToFirebaseList(list));\r\n            return true;\r\n        }\r\n\r\n        /// <summary> \r\n        /// 골드를 차감합니다. 보유량이 부족하면 false를 반환합니다. \r\n        /// </summary>\r\n        public bool SpendGold(int amount)\r\n        {\r\n            if (!HasCurrentUser() || CurrentUserData._gold < amount) return false;\r\n            CurrentUserData._gold -= amount;\r\n            SaveField(\"_gold\", CurrentUserData._gold);\r\n            return true;\r\n        }\r\n\r\n        /// <summary> \r\n        /// 토큰을 차감합니다. 보유량이 부족하면 false를 반환합니다. \r\n        /// </summary>\r\n        public bool SpendTokens(int amount)\r\n        {\r\n            if (!HasCurrentUser() || CurrentUserData._token < amount) return false;\r\n            CurrentUserData._token -= amount;\r\n            SaveField(\"_token\", CurrentUserData._token);\r\n            return true;\r\n        }\r\n\r\n        /// <summary> \r\n        /// 토큰을 증가시킵니다. \r\n        /// </summary>\r\n        public bool AddTokens(int amount)\r\n        {\r\n            if (!HasCurrentUser()) return false;\r\n            CurrentUserData._token += amount;\r\n            SaveField(\"_token\", CurrentUserData._token);\r\n            return true;\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region --- 보유 여부 및 장착 ---\r\n\r\n        /// <summary> 무기 ID를 리스트에서 찾아 보유 여부를 반환합니다. </summary>\r\n        public bool IsWeaponOwned(string weaponId) => ContainsId(CurrentUserData?._ownedWeaponIds, weaponId);\r\n\r\n        /// <summary> 스킨 ID를 리스트에서 찾아 보유 여부를 반환합니다. </summary>\r\n        public bool IsRouletteOwned(string rouletteId) => ContainsId(CurrentUserData?._rouletteSkinIds, rouletteId);\r\n\r\n        /// <summary> 무기를 장착합니다. 미보유 시 장착 불가능. </summary>\r\n        public bool EquipWeapon(string weaponId)\r\n        {\r\n            if (string.IsNullOrEmpty(weaponId) || !IsWeaponOwned(weaponId)) return false;\r\n            CurrentUserData._equippedWeaponId = weaponId;\r\n            SaveField(\"_equippedWeaponId\", weaponId);\r\n            return true;\r\n        }\r\n\r\n        /// <summary> 룰렛 스킨을 장착합니다. 미보유 시 장착 불가능. </summary>\r\n        public bool EquipRouletteSkin(string skinId)\r\n        {\r\n            if (string.IsNullOrEmpty(skinId) || !IsRouletteOwned(skinId)) return false;\r\n            CurrentUserData._equippedRouletteSkinId = skinId;\r\n            SaveField(\"_equippedRouletteSkinId\", skinId);\r\n            return true;\r\n        }\r\n\r\n        #endregion\r\n\r\n        #region --- 내부 유틸리티 ---\r\n\r\n        /// <summary> null 체크와 리스트 포함 여부를 한 번에 처리하는 내부 유틸리티 </summary>\r\n        private bool ContainsId(List<string> list, string id)\r\n        {\r\n            return !string.IsNullOrEmpty(id) && list != null && list.Contains(id);\r\n        }\r\n\r\n        /// <summary>\r\n        /// 서버 데이터 로드 시, '장착 중인 아이템'이 '보유 목록'에 없는 경우를 찾아 초기화합니다.\r\n        /// 데이터 오염(데이터 꼬임)을 방지하는 안전장치입니다.\r\n        /// </summary>\r\n        private void ValidateEquipment()\r\n        {\r\n            if (CurrentUserData == null) return;\r\n\r\n            // 장착 무기 검증\r\n            if (!string.IsNullOrEmpty(CurrentUserData._equippedWeaponId) && !IsWeaponOwned(CurrentUserData._equippedWeaponId))\r\n            {\r\n                CurrentUserData._equippedWeaponId = null;\r\n                SaveField(\"_equippedWeaponId\", null);\r\n            }\r\n\r\n            // 장착 스킨 검증\r\n            if (!string.IsNullOrEmpty(CurrentUserData._equippedRouletteSkinId) && !IsRouletteOwned(CurrentUserData._equippedRouletteSkinId))\r\n            {\r\n                CurrentUserData._equippedRouletteSkinId = null;\r\n                SaveField(\"_equippedRouletteSkinId\", null);\r\n            }\r\n        }\r\n\r\n        /// <summary> 특정 필드만 Firebase에 업데이트하여 전체 덮어쓰기 위험을 방지합니다. </summary>\r\n        private void SaveField(string field, object value)\r\n        {\r\n            if (CurrentUserData == null || SaveManager.Instance == null) return;\r\n            SaveManager.Instance.UpdateUserFields(CurrentUserData._userId, new Dictionary<string, object> { { field, value } });\r\n        }\r\n\r\n        private bool HasCurrentUser() => CurrentUserData != null;\r\n\r\n        /// <summary> 리스트가 null일 경우 초기화하여 NullReference 예외를 방지합니다. </summary>\r\n        private void EnsureUserDataLists()\r\n        {\r\n            if (CurrentUserData == null) return;\r\n            if (CurrentUserData._rouletteSkinIds == null) CurrentUserData._rouletteSkinIds = new List<string>();\r\n            if (CurrentUserData._ownedWeaponIds == null) CurrentUserData._ownedWeaponIds = new List<string>();\r\n        }\r\n\r\n        #endregion\r\n    }\r\n}","lines":243},{"id":"Scripts/Network/Firebase/SaveManager.cs","name":"SaveManager","path":"Scripts/Network/Firebase/SaveManager.cs","layer":"Network","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"★ 신규 유저 (자동으로 _tutorialDone = false 상태로 생성됨)","src":"﻿using System;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.Static;\r\nusing Wooduduk.Tutorial;\r\n\r\nnamespace Wooduduk.Network.Firebase\r\n{\r\n    public class SaveManager : MonoBehaviour\r\n    {\r\n        public static SaveManager Instance { get; private set; }\r\n\r\n        private UserRepository _repository;\r\n        private UserService _service;\r\n        private bool _isHardExit;\r\n\r\n        private void Awake()\r\n        {\r\n            if (Instance == null)\r\n            {\r\n                Instance = this;\r\n                DontDestroyOnLoad(gameObject);\r\n                _repository = new UserRepository();\r\n                _service = new UserService();\r\n            }\r\n            else\r\n            {\r\n                Destroy(gameObject);\r\n            }\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            AccountEvents.OnLoginSucceeded += LoadUserData;\r\n            AccountEvents.OnLogout += HandleLogout;\r\n            TutorialDirector.OnTutorialCompleted += HandleTutorialCompleted;\r\n        }\r\n\r\n        private void OnDisable()\r\n        {\r\n            AccountEvents.OnLoginSucceeded -= LoadUserData;\r\n            AccountEvents.OnLogout -= HandleLogout;\r\n            TutorialDirector.OnTutorialCompleted -= HandleTutorialCompleted;\r\n        }\r\n\r\n        public void LoadUserData(string userId, string nickname)\r\n        {\r\n            Debug.Log($\"[SaveManager] LoadUserData 시작: {userId}, 제안된 닉네임: {nickname}\");\r\n\r\n            _repository.GetUserData(userId, snapshot =>\r\n            {\r\n                UserData userData;\r\n\r\n                if (snapshot == null || !snapshot.Exists)\r\n                {\r\n                    // ★ 신규 유저 (자동으로 _tutorialDone = false 상태로 생성됨)\r\n                    Debug.Log($\"[SaveManager] 신규 유저 생성: {userId}\");\r\n                    userData = _service.CreateUserData(userId, nickname);\r\n                    SaveUserData(userData);\r\n                }\r\n                else\r\n                {\r\n                    // ★ 기존 유저 — 로드 후 누락 필드 보정\r\n                    Debug.Log($\"[SaveManager] 기존 유저 로드: {userId}\");\r\n                    userData = JsonUtility.FromJson<UserData>(snapshot.GetRawJsonValue());\r\n                    userData = EnsureDefaults(userData, userId);\r\n\r\n                    // 데이터베이스에 닉네임이 없는데 Firebase에서 닉네임이 넘어왔다면 업데이트\r\n                    if (string.IsNullOrEmpty(userData._userNick) && !string.IsNullOrEmpty(nickname))\r\n                    {\r\n                        userData._userNick = nickname;\r\n                        UpdateUserFields(userId, new Dictionary<string, object>\r\n                        {                \r\n                            { \"_userNick\", nickname }          \r\n                        });\r\n                    }\r\n\r\n                    long now = DateTimeOffset.UtcNow.ToUnixTimeMilliseconds();\r\n                    userData._lastLoginAt = now;\r\n                    _repository.UpdateFields(userId, new Dictionary<string, object>\r\n                    {\r\n                        { \"_lastLoginAt\", now }\r\n                    });\r\n                }\r\n\r\n                Debug.Log($\"[SaveManager] UserData 로드 완료 — \" + $\"Gold:{userData._gold} \" + $\"Best:{userData._bestScores[0]} \" + $\"Tier:{userData._axeTier}\");\r\n\r\n                // TitleRouter가 이 이벤트를 받아 _tutorialDone 여부로 씬을 분기함\r\n                AccountEvents.RaiseUserDataLoaded(userData);\r\n            });\r\n        }\r\n\r\n        private UserData EnsureDefaults(UserData data, string userId)\r\n        {\r\n            if (data == null)\r\n                return _service.CreateUserData(userId);\r\n\r\n            if (string.IsNullOrEmpty(data._userId))\r\n                data._userId = userId;\r\n\r\n            if (data._bestScores == null || data._bestScores.Length < 3)\r\n                data._bestScores = new int[3];\r\n\r\n            if (data._ownedWeaponIds == null)\r\n                data._ownedWeaponIds = new List<string>();\r\n\r\n            if (data._rouletteSkinIds == null)\r\n                data._rouletteSkinIds = new List<string>();\r\n\r\n            return data;\r\n        }\r\n\r\n        public void SaveUserData(UserData userData)\r\n        {\r\n            // ★★ 탈퇴 처리 중일 경우 절대 저장하지 않음 (삭제한 데이터를 다시 덮어쓰는 것 방지)\r\n            if (FirebaseManager.Instance != null && FirebaseManager.Instance.IsDeletingAccount)\r\n            {\r\n                Debug.Log(\"[SaveManager] 탈퇴 처리 중이므로 저장 스킵\");\r\n                return;\r\n            }\r\n\r\n            if (userData == null) return;\r\n            if (string.IsNullOrEmpty(userData._userId)) return;\r\n\r\n            string json = JsonUtility.ToJson(userData, true);\r\n            Debug.Log($\"[SaveManager] 저장할 JSON:\\n{json}\");\r\n\r\n            if (string.IsNullOrEmpty(json) || json == \"{}\")\r\n            {\r\n                Debug.LogError(\"[SaveManager] 직렬화 실패! UserData 클래스에 [Serializable]이 있나요?\");\r\n                return;\r\n            }\r\n\r\n            _repository.SaveUserData(userData._userId, json);\r\n        }\r\n\r\n        private void HandleTutorialCompleted()\r\n        {\r\n            if (UserManager.Instance == null || !UserManager.Instance.TryGetUser(out var user))\r\n                return;\r\n\r\n            user._tutorialDone = true;\r\n\r\n            _repository.UpdateFields(user._userId, new Dictionary<string, object>\r\n        {        { \"_tutorialDone\", true }    });\r\n\r\n            Debug.Log(\"[SaveManager] 튜토리얼 완료 → _tutorialDone 즉시 저장\");\r\n        }\r\n\r\n        private void HandleLogout(UserData user)\r\n        {\r\n            if (user == null) return;\r\n            _repository.UpdateFields(user._userId, new Dictionary<string, object>\r\n            {\r\n                { \"_equippedWeaponId\", user._equippedWeaponId },\r\n                { \"_equippedRouletteSkinId\", user._equippedRouletteSkinId },\r\n            });\r\n        }\r\n\r\n        public void UpdateUserFields(string userId, Dictionary<string, object> fields)\r\n        {\r\n            if (string.IsNullOrEmpty(userId)) return;\r\n            _repository.UpdateFields(userId, fields);\r\n        }\r\n\r\n        public static List<object> ToFirebaseList(List<string> src)\r\n        {\r\n            var list = new List<object>();\r\n            if (src != null) foreach (var s in src) list.Add(s);\r\n            return list;\r\n        }\r\n\r\n        // 데이터 삭제 부분 (탈퇴 시 호출됨)\r\n        public void DeleteUserData(string userId, Action onComplete, Action<string> onError)\r\n        {\r\n            // ★ 기존에 return만 하면 onComplete가 안 불려서 FirebaseManager 탈퇴 로직이 멈추는 버그 수정\r\n            if (string.IsNullOrEmpty(userId))\r\n            {\r\n                onComplete?.Invoke();\r\n                return;\r\n            }\r\n            _repository.DeleteUserData(userId, onComplete, onError);\r\n        }\r\n\r\n        public void DeleteAndRecreate(string userId)\r\n        {\r\n            _repository.DeleteUserData(userId, () =>\r\n            {\r\n                UserData fresh = _service.CreateUserData(userId);\r\n                SaveUserData(fresh);\r\n                AccountEvents.RaiseUserDataLoaded(fresh);\r\n                Debug.Log(\"[SaveManager] 삭제 후 기본값으로 재생성 완료\");\r\n            });\r\n        }\r\n\r\n        #region 강제 종료 저장\r\n\r\n        private void OnApplicationPause(bool pauseStatus)\r\n        {\r\n            if (!pauseStatus) return;\r\n            _isHardExit = false; // 복귀 가능한 일시정지\r\n            ForceSaveSession(soft: true);\r\n        }\r\n\r\n        private void OnApplicationQuit()\r\n        {\r\n            _isHardExit = true;\r\n            ForceSaveSession(soft: false);\r\n        }\r\n\r\n        private void ForceSaveSession(bool soft)\r\n        {\r\n            if (FirebaseManager.Instance != null && FirebaseManager.Instance.IsDeletingAccount) return;\r\n            if (UserManager.Instance == null || !UserManager.Instance.TryGetUser(out var user)) return;\r\n\r\n            var fields = new Dictionary<string, object>\r\n    {\r\n        { \"_gold\", user._gold },\r\n        { \"_token\", user._token },\r\n        { \"_tutorialDone\", user._tutorialDone },\r\n        { \"_equippedWeaponId\", user._equippedWeaponId },\r\n        { \"_equippedRouletteSkinId\", user._equippedRouletteSkinId },\r\n        { \"_ownedWeaponIds\", user._ownedWeaponIds },\r\n        { \"_rouletteSkinIds\", user._rouletteSkinIds },\r\n    };\r\n\r\n            if (soft) // 일반 일시정지에서는 최근 플레이 기록도 살림\r\n            {\r\n                fields[\"_latestScore\"] = user._latestScore;\r\n                fields[\"_latestMaxCombo\"] = user._latestMaxCombo;\r\n                fields[\"_latestSettlementCount\"] = user._latestSettlementCount;\r\n                fields[\"_gamesPlayed\"] = user._gamesPlayed;\r\n                fields[\"_bestScores\"] = new List<int>\r\n            { user._bestScores[0], user._bestScores[1], user._bestScores[2] };\r\n                fields[\"_axeTier\"] = user._axeTier;\r\n                fields[\"_tierLp\"] = user._tierLp;\r\n                fields[\"_tierProtection\"] = user._tierProtection;\r\n            }\r\n\r\n            _repository.UpdateFields(user._userId, fields);\r\n        }\r\n\r\n#if UNITY_EDITOR\r\n        private void OnDestroy()\r\n        {\r\n            if (Instance == this)\r\n            {\r\n                Debug.Log(\"[SaveManager] 에디터 정지 — 최종 저장 시도\");\r\n                ForceSaveSession(soft: false);\r\n            }\r\n        }\r\n#endif\r\n\r\n        #endregion\r\n    }\r\n}","lines":256},{"id":"Scripts/Tier/TierService.cs","name":"TierService","path":"Scripts/Tier/TierService.cs","layer":"Tier","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"티어 시스템의 런타임 진입점(얇은 래퍼). 순수 로직은 TierCalculator 가 담당.","src":"using UnityEngine;\nusing Wooduduk.Core;          // ServerEvents (로그인 후 데이터 로드 이벤트)\nusing Wooduduk.Data.Static;   // UserData (OnUserDataLoaded 핸들러 인자)\nusing Wooduduk.Data.Tier;\nusing Wooduduk.Network.Firebase;     // TierSaveService (Firebase 티어 3필드 저장/로드)\n\nnamespace Wooduduk.Tier\n{\n    // ============================================================\n    // TierService — 티어 시스템 얇은 MonoBehaviour 래퍼\n    // ------------------------------------------------------------\n    // 사용법:\n    //   - 씬의 GameObject 에 부착하고 인스펙터에서 _config(TierConfigSO) 지정.\n    //   - 런 종료 시: tierService.ApplyRun(new RunResult(rawScore));\n    //   - 현재 상태 조회: tierService.CurrentState / tierService.CurrentRank\n    // 역할:\n    //   - 인메모리 TierState 보유 + TierCalculator 호출 + 결과 적용 + TierEvents 발행.\n    //   - 로직은 전부 TierCalculator(순수). 이 클래스는 상태 보관·연결만 담당.\n    // 통합 지점:\n    //   - 영구 저장/로드 = 손찬성 TierSaveService(Firebase) 연동 완료. LoadState/SaveState 참고.\n    //     로드는 로그인 완료(ServerEvents.OnUserDataLoaded) 시점에 수행.\n    //   - 런 종료 이벤트 구독 = 슬롯 세션 완성 후 연결(미구현 — 훅만). TODO 참고.\n    // ============================================================\n\n    /// <summary>\n    /// 티어 시스템의 런타임 진입점(얇은 래퍼). 순수 로직은 TierCalculator 가 담당.\n    /// </summary>\n    public class TierService : MonoBehaviour\n    {\n        #region 직렬화 필드 (Serialized)\n\n        [Header(\"설정\")]\n        [Tooltip(\"티어 시스템 설정 SO. 필수.\")]\n        [SerializeField] private TierConfigSO _config;\n\n        [Header(\"현재 상태 (런타임)\")]\n        [Tooltip(\"현재 티어 상태. 로그인 시 TierSaveService 로 로드, 변경 시 저장.\")]\n        [SerializeField] private TierState _currentState = TierState.CreateDefault();\n\n        #endregion\n\n        #region 영구 저장 서비스 (Persistence)\n\n        // 손찬성 TierSaveService(Wooduduk.Data.Tier) — UserData 의 _axeTier/_tierLp/_tierProtection 를\n        // Firebase 에 저장/로드. MonoBehaviour 아니므로 직접 인스턴스 보유.\n        private readonly TierSaveService _tierSave = new TierSaveService();\n\n        #endregion\n\n        #region 공개 프로퍼티 (Public Accessors)\n\n        /// <summary>싱글톤 인스턴스 — 외부(RunEndService 등)에서 ApplyRun 호출용 접근점.</summary>\n        public static TierService Instance { get; private set; }\n\n        /// <summary>현재 티어 상태(읽기 전용 노출).</summary>\n        public TierState CurrentState => _currentState;\n\n        /// <summary>현재 등급.</summary>\n        public AxeTier CurrentRank => _currentState.Rank;\n\n        /// <summary>현재 LP.</summary>\n        public int CurrentLp => _currentState.Lp;\n\n        #endregion\n\n        #region 생명주기 (Lifecycle)\n\n        private void Awake()\n        {\n            // 싱글톤 — RunEndService 등 외부에서 ApplyRun 호출 접근점 (팀 매니저 패턴).\n            if (Instance != null && Instance != this) { Destroy(gameObject); return; }\n            Instance = this;\n\n            // DontDestroyOnLoad 는 root 오브젝트에만 작동. 씬에서 그룹(NETWORK&DATA 등) 자식으로\n            // 배치되면 경고 + 미작동(씬 전환 시 유실) → 런타임에 root 로 분리한다(에디터 그룹 정리는 유지).\n            if (transform.parent != null)\n            {\n                Debug.Log($\"[TierService] 그룹 자식 배치 감지 → root 분리(DontDestroyOnLoad 위해). 이전 부모={transform.parent.name}\");\n                transform.SetParent(null);\n            }\n\n            DontDestroyOnLoad(gameObject);\n\n            if (_config == null)\n                Debug.LogError($\"[TierService] _config 가 비어 있습니다. 인스펙터에서 TierConfigSO 를 지정하세요. (obj={name})\");\n\n            // 로드는 Awake 가 아니라 로그인 완료(OnUserDataLoaded) 시점에 수행한다.\n            //   이유: Awake 는 로그인/유저데이터 로드보다 먼저 돌 수 있어 UserData 가 아직 없음.\n        }\n\n        private void OnEnable()\n        {\n            // 로그인 후 UserData 로드 완료 시점에 저장된 티어 상태를 주입한다.\n            AccountEvents.OnUserDataLoaded += HandleUserDataLoaded;\n\n            // TODO(슬롯 세션 완성 후 연결): 런 종료 이벤트 구독.\n            //   예) SlotSession.OnRunEnded += HandleRunEnded;  // → ApplyRun(result) 호출\n        }\n\n        private void OnDisable()\n        {\n            AccountEvents.OnUserDataLoaded -= HandleUserDataLoaded;\n\n            // TODO(슬롯 세션 완성 후 연결): 위 구독 해제.\n            //   예) SlotSession.OnRunEnded -= HandleRunEnded;\n        }\n\n        /// <summary>\n        /// 로그인 후 UserData 로드 완료 콜백. 저장된 티어 3필드를 읽어 현재 상태로 주입한다.\n        /// </summary>\n        private void HandleUserDataLoaded(UserData _)\n        {\n            // 인자 UserData 는 사용하지 않고, TierSaveService 가 UserManager 에서 현재 유저를 직접 읽는다.\n            LoadState();\n        }\n\n        #endregion\n\n        #region 핵심 동작 (Apply)\n\n        /// <summary>\n        /// 한 런 결과를 적용한다. 계산 → 상태 갱신 → 이벤트 발행.\n        /// </summary>\n        public void ApplyRun(RunResult run)\n        {\n            if (_config == null)\n            {\n                Debug.LogError(\"[TierService] ApplyRun 중단: _config 가 null.\");\n                return;\n            }\n\n            Debug.Log($\"[TierService] ApplyRun 시작 → {run}, 현재 {_currentState}\");\n\n            // 순수 계산\n            TierProgress progress = TierCalculator.Apply(_currentState, run, _config);\n\n            // 상태 갱신\n            _currentState = progress.NewState;\n\n            if (progress.Change != TierChangeKind.None)\n                Debug.Log($\"[TierService] 티어 변화 발생 → {progress.Change}, 갱신 상태 {_currentState}\");\n            else\n                Debug.Log($\"[TierService] 티어 변화 없음 → 갱신 상태 {_currentState}\");\n\n            // 이벤트 발행(UI·연출 측 소비)\n            TierEvents.RaiseTierChanged(progress);\n\n            // 갱신된 _currentState 를 Firebase 에 영구 저장(TierSaveService 경유).\n            SaveState();\n        }\n\n        /// <summary>\n        /// 시즌 소프트 리셋을 적용한다. 순수 SoftReset 계산 → 상태 갱신 → 저장 → 이벤트 발행.\n        /// 이 메서드는 \"리셋 동작\" 자체만 수행한다. 언제 리셋할지(시즌 스케줄러/트리거)는\n        /// 게임 디자인 영역으로 이 모듈 밖에서 호출해 준다.\n        /// </summary>\n        // TODO(시즌 트리거 외부 연결): 시즌 종료 스케줄러/서버 신호가 이 메서드를 호출하도록 연결.\n        //   이 모듈은 \"리셋 동작\"만 제공하며, 발동 시점은 외부(게임 디자인)에서 결정한다.\n        public void ApplySeasonReset()\n        {\n            if (_config == null)\n            {\n                Debug.LogError(\"[TierService] ApplySeasonReset 중단: _config 가 null.\");\n                return;\n            }\n\n            Debug.Log($\"[TierService] ApplySeasonReset 시작 → 현재 {_currentState}\");\n\n            // 순수 계산(SoftReset). 결정론·무부작용.\n            TierState newState = TierCalculator.SoftReset(_currentState, _config);\n\n            // 연출/표시용 부가정보: LP 증감과 이전 등급을 갱신 전에 캡처.\n            int lpDelta = newState.Lp - _currentState.Lp;\n            AxeTier oldRank = _currentState.Rank;\n\n            // 상태 갱신\n            _currentState = newState;\n\n            Debug.Log($\"[TierService] 시즌 리셋 적용 → 이전Rank={oldRank}, 갱신 상태 {_currentState}, LpDelta={lpDelta}\");\n\n            // 갱신된 _currentState 를 Firebase 에 영구 저장(TierSaveService 경유).\n            SaveState();\n\n            // 이벤트 발행(UI·연출 측 소비). 리셋은 별도 변화 종류(SeasonReset)로 알린다.\n            TierEvents.RaiseTierChanged(new TierProgress\n            {\n                NewState = newState,\n                Change = TierChangeKind.SeasonReset,\n                LpDelta = lpDelta,\n                DemoteBlockedByProtection = false,\n            });\n        }\n\n        #endregion\n\n        #region 상태 설정 보조 (State Helpers)\n\n        /// <summary>\n        /// 외부(로드 결과 등)에서 상태를 주입한다. 로드/디버그 주입 전용.\n        /// 주의: 이 메서드는 <see cref=\"TierEvents.OnTierChanged\"/> 를 발행하지 않으며 저장도 하지 않는다.\n        /// UI 갱신·영구 저장이 필요한 호출부는 직접 처리해야 한다(이벤트 발행/SaveState 등).\n        /// </summary>\n        public void SetState(TierState state)\n        {\n            _currentState = state;\n            Debug.Log($\"[TierService] SetState → {_currentState}\");\n        }\n\n        // 저장/로드는 손찬성 TierSaveService(Firebase) 경유.\n\n        /// <summary>\n        /// 저장된 티어 3필드(_axeTier/_tierLp/_tierProtection)를 읽어 현재 상태로 주입.\n        /// 유저 없음/로드 실패 시 인메모리 기본값을 유지한다.\n        /// </summary>\n        private void LoadState()\n        {\n            if (_tierSave.LoadTierState(out int axeTier, out int lp, out int protection))\n            {\n                SetState(new TierState((AxeTier)axeTier, lp, protection)); // int → AxeTier 캐스트\n                Debug.Log($\"[TierService] LoadState 완료 → {_currentState}\");\n            }\n            else\n            {\n                Debug.LogWarning(\"[TierService] LoadState: 저장값 없음/실패 → 인메모리 기본값 유지.\");\n            }\n        }\n\n        /// <summary>\n        /// 현재 상태를 손찬성 TierSaveService 로 Firebase 에 영구 저장(Rank→int 캐스트).\n        /// </summary>\n        private void SaveState()\n        {\n            Debug.Log($\"[TierService] SaveState 호출 → {_currentState}\");\n            _tierSave.SaveTierState((int)_currentState.Rank, _currentState.Lp, _currentState.PromoteProtectionRemaining);\n        }\n\n        #endregion\n    }\n}\n","lines":240},{"id":"Scripts/Core/GenericObjectPool.cs","name":"GenericObjectPool","path":"Scripts/Core/GenericObjectPool.cs","layer":"Core","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"싱글톤 인스턴스","src":"﻿using System.Collections.Generic;\r\nusing UnityEngine;\r\nusing UnityEngine.Pool;\r\n\r\nnamespace Wooduduk.Core\r\n{\r\n    public class GenericObjectPool : MonoBehaviour\r\n    {\r\n        // 싱글톤 인스턴스\r\n        public static GenericObjectPool Instance { get; private set; }\r\n\r\n        // 프리팹(원본)을 Key로, 유니티 내장 풀을 Value로 관리하는 딕셔너리\r\n        private Dictionary<GameObject, ObjectPool<GameObject>> _pools = new Dictionary<GameObject, ObjectPool<GameObject>>();\r\n\r\n        private void Awake()\r\n        {\r\n            if (Instance == null) Instance = this;\r\n            else Destroy(gameObject);\r\n        }\r\n        public void Prewarm(GameObject prefab, int count)\r\n        {\r\n            if (prefab == null) return;\r\n\r\n            if (!_pools.ContainsKey(prefab))\r\n            {\r\n                _pools[prefab] = new ObjectPool<GameObject>(\r\n                    createFunc: () => CreatePooledItem(prefab),\r\n                    actionOnGet: null,\r\n                    actionOnRelease: OnReturnedToPool,\r\n                    actionOnDestroy: OnDestroyPoolObject,\r\n                    collectionCheck: true,\r\n                    defaultCapacity: count,\r\n                    maxSize: 200\r\n                );\r\n            }\r\n\r\n            GameObject[] tempItems = new GameObject[count];\r\n            for (int i = 0; i < count; i++)\r\n            {\r\n                tempItems[i] = _pools[prefab].Get();\r\n            }\r\n            for (int i = 0; i < count; i++)\r\n            {\r\n                _pools[prefab].Release(tempItems[i]);\r\n            }\r\n        }\r\n\r\n        public GameObject Spawn(GameObject prefab, Vector3 position, Quaternion rotation)\r\n        {\r\n            // 넘어온 프리팹 전용 풀이 없다면 즉석에서 생성 (자동 확장)\r\n            if (!_pools.ContainsKey(prefab))\r\n            {\r\n                _pools[prefab] = new ObjectPool<GameObject>(\r\n                    createFunc: () => CreatePooledItem(prefab),\r\n                    actionOnGet: null,\r\n                    actionOnRelease: OnReturnedToPool,\r\n                    actionOnDestroy: OnDestroyPoolObject,\r\n                    collectionCheck: true,\r\n                    defaultCapacity: 10,\r\n                    maxSize: 200\r\n                );\r\n            }\r\n\r\n            // 해당 프리팹의 풀에서 꺼내어 전달\r\n            GameObject go = _pools[prefab].Get();\r\n            go.transform.position = position;\r\n            go.transform.rotation = rotation;\r\n\r\n            go.SetActive(true);\r\n            if (go.TryGetComponent<IPoolable>(out var poolable)) poolable.OnSpawn();\r\n\r\n            return go;\r\n        }\r\n\r\n        private GameObject CreatePooledItem(GameObject prefab)\r\n        {\r\n            GameObject go = Instantiate(prefab, transform);\r\n\r\n            go.SetActive(false);\r\n\r\n            // 프리팹에 IPoolable이 있다면 \"자신이 속한 딕셔너리의 풀\"로 돌아가도록 세팅\r\n            if (go.TryGetComponent<IPoolable>(out var poolable))\r\n            {\r\n                poolable.SetupPoolReturn((obj) => _pools[prefab].Release(obj));\r\n            }\r\n\r\n            return go;\r\n        }\r\n\r\n        private void OnReturnedToPool(GameObject go)\r\n        {\r\n            if (go.TryGetComponent<IPoolable>(out var poolable)) poolable.OnReturn();\r\n            go.SetActive(false);\r\n        }\r\n\r\n        private void OnDestroyPoolObject(GameObject go)\r\n        {\r\n            Destroy(go);\r\n        }\r\n    }\r\n}","lines":101},{"id":"Scripts/UI/MultiplayerController.cs","name":"MultiplayerController","path":"Scripts/UI/MultiplayerController.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"[B 구조] 매칭의 흐름은 MatchmakingFlow가 주도한다. 이 컨트롤러는 MatchmakingFlow의 이벤트를 \"구독해서 화면만 그린다\". (기존 StubMatchSource/Update Tick 폴링은 테스트용이라 제거)","src":"using UnityEngine;\r\nusing UnityEngine.UIElements;\r\nusing Wooduduk.Network.Firebase.Matchmaking;\r\nusing Wooduduk.FX;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    // [B 구조] 매칭의 흐름은 MatchmakingFlow가 주도한다.\r\n    // 이 컨트롤러는 MatchmakingFlow의 이벤트를 \"구독해서 화면만 그린다\".\r\n    // (기존 StubMatchSource/Update Tick 폴링은 테스트용이라 제거)\r\n    public class MultiplayerController : MonoBehaviour\r\n    {\r\n        [SerializeField] private UIDocument uiDocument;\r\n\r\n        // ★ 매칭의 두뇌. 씬에서 인스펙터로 드래그해서 연결.\r\n        [SerializeField] private MatchmakingFlow matchmakingFlow;\r\n\r\n        private VisualElement overlay, idle, searching, matched;\r\n        private Label countLabel, seedLabel;\r\n\r\n        void OnEnable()\r\n        {\r\n            var root = uiDocument.rootVisualElement;\r\n            UiSfxHover.BindAll(root);\r\n            overlay = root.Q<VisualElement>(\"multi-overlay\");\r\n            idle = root.Q<VisualElement>(\"state-idle\");\r\n            searching = root.Q<VisualElement>(\"state-searching\");\r\n            matched = root.Q<VisualElement>(\"state-matched\");\r\n            countLabel = root.Q<Label>(\"match-count\");\r\n            seedLabel = root.Q<Label>(\"match-seed\");\r\n\r\n            root.Q<Button>(\"multi-close\").clicked += CloseByUser;\r\n            root.Q<Button>(\"multi-start\").clicked += BeginMatch;\r\n            root.Q<Button>(\"multi-cancel\").clicked += CancelMatch;\r\n\r\n            // ★ MatchmakingFlow 이벤트 구독 (밥상은 이미 차려져 있음)\r\n            if (matchmakingFlow != null)\r\n            {\r\n                matchmakingFlow.OnCountChanged += HandleCountChanged;\r\n                matchmakingFlow.OnMatchSuccess += HandleMatchSuccess;\r\n                matchmakingFlow.OnMatchFailed += HandleMatchFailed;\r\n                matchmakingFlow.OnCountdownTick += HandleCountdownTick;\r\n                matchmakingFlow.OnLoadingFinished += HandleLoadingFinished;\r\n            }\r\n            else\r\n            {\r\n                Debug.LogWarning(\"[MultiplayerController] MatchmakingFlow가 인스펙터에 연결되지 않았습니다. 매칭이 동작하지 않습니다.\");\r\n            }\r\n\r\n            HideOnly();\r\n        }\r\n\r\n        void OnDisable()\r\n        {\r\n            // ★ 구독 해제 필수 (안 하면 누수 — v6 교훈)\r\n            if (matchmakingFlow != null)\r\n            {\r\n                matchmakingFlow.OnCountChanged -= HandleCountChanged;\r\n                matchmakingFlow.OnMatchSuccess -= HandleMatchSuccess;\r\n                matchmakingFlow.OnMatchFailed -= HandleMatchFailed;\r\n                matchmakingFlow.OnCountdownTick -= HandleCountdownTick;\r\n                matchmakingFlow.OnLoadingFinished -= HandleLoadingFinished;\r\n            }\r\n        }\r\n\r\n        // ───────────────────────── 외부 진입점 (HUD가 호출) ─────────────────────────\r\n\r\n        public void Show()\r\n        {\r\n            UiSfxEvent.Raise(UiSfxKind.Open);\r\n            overlay.style.display = DisplayStyle.Flex;\r\n            GoIdle();\r\n        }\r\n\r\n        // 패널만 시각적으로 닫음 (매칭은 건드리지 않음)\r\n        public void Hide() => HideOnly();\r\n\r\n        private void HideOnly()\r\n        {\r\n            overlay.style.display = DisplayStyle.None;\r\n        }\r\n\r\n        // X 버튼: 사용자가 완전히 빠져나감 → 매칭 취소 + 패널 닫기\r\n        private void CloseByUser()\r\n        {\r\n            UiSfxEvent.Raise(UiSfxKind.Close);\r\n            matchmakingFlow?.CancelMatch();\r\n            HideOnly();\r\n        }\r\n\r\n        // ───────────────────────── 버튼 핸들러 ─────────────────────────\r\n\r\n        private void BeginMatch()\r\n        {\r\n            if (matchmakingFlow == null) return;\r\n\r\n            UiSfxEvent.Click();\r\n            matchmakingFlow.BeginMatch();\r\n            GoSearching();\r\n\r\n            int desired = matchmakingFlow.DesiredPlayerCount;\r\n            countLabel.text = \"0 / \" + desired + \" 명\";\r\n        }\r\n\r\n        // 취소 버튼: 검색만 멈추고 패널은 유지 → 처음(idle) 화면으로\r\n        private void CancelMatch()\r\n        {\r\n            UiSfxEvent.Click();\r\n            matchmakingFlow?.CancelMatch();\r\n            GoIdle();\r\n        }\r\n\r\n        // ───────────────────────── MatchmakingFlow 이벤트 수신 ─────────────────────────\r\n\r\n        // 인원 변동: (현재, 목표). 화면이 검색 중일 때만 카운트 갱신.\r\n        private void HandleCountChanged(int current, int desired)\r\n        {\r\n            countLabel.text = current + \" / \" + desired + \" 명\";\r\n        }\r\n\r\n        // 매칭 성사 → 시드 표시 + 매칭 완료 화면\r\n        private void HandleMatchSuccess()\r\n        {\r\n            var session = matchmakingFlow != null ? matchmakingFlow.CurrentSession : null;\r\n            if (session != null)\r\n                seedLabel.text = \"방 시드 #\" + session.Seed;\r\n\r\n            GoMatched();\r\n        }\r\n\r\n        // 매칭 실패 → 처음 화면으로 복귀\r\n        private void HandleMatchFailed()\r\n        {\r\n            GoIdle();\r\n        }\r\n\r\n        // 자동 시작 카운트다운 → 매칭 완료 화면에서 \"곧 시작\" 안내\r\n        private void HandleCountdownTick(float remaining)\r\n        {\r\n            var session = matchmakingFlow != null ? matchmakingFlow.CurrentSession : null;\r\n            long seed = session != null ? session.Seed : 0;\r\n            seedLabel.text = \"방 시드 #\" + seed + \"\\n\" + Mathf.CeilToInt(remaining) + \"초 후 시작\";\r\n        }\r\n\r\n        // 로딩 끝 = 게임 시작 → 패널을 닫고 인게임 HUD에 넘김 (매칭 취소 아님)\r\n        private void HandleLoadingFinished()\r\n        {\r\n            HideOnly();\r\n        }\r\n\r\n        // ───────────────────────── 3상태 토글 ─────────────────────────\r\n\r\n        private void GoIdle()\r\n        {\r\n            idle.style.display = DisplayStyle.Flex;\r\n            searching.style.display = DisplayStyle.None;\r\n            matched.style.display = DisplayStyle.None;\r\n        }\r\n\r\n        private void GoSearching()\r\n        {\r\n            idle.style.display = DisplayStyle.None;\r\n            searching.style.display = DisplayStyle.Flex;\r\n            matched.style.display = DisplayStyle.None;\r\n        }\r\n\r\n        private void GoMatched()\r\n        {\r\n            idle.style.display = DisplayStyle.None;\r\n            searching.style.display = DisplayStyle.None;\r\n            matched.style.display = DisplayStyle.Flex;\r\n        }\r\n    }\r\n}","lines":174},{"id":"Scripts/Slot/Slotmachine/SlotmachineController.cs","name":"SlotmachineController","path":"Scripts/Slot/Slotmachine/SlotmachineController.cs","layer":"Slot","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"슬롯 머신 컨트롤러 결과는 Swing 시 즉시 결정 체온은 실시간 감소 -> 추후 분리 예정","src":"﻿using System.Collections;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.DataSO;\r\nusing Wooduduk.Data.Service;\r\nusing Wooduduk.Player;\r\n\r\nnamespace Wooduduk.Slot.Machine\r\n{\r\n    // 슬롯 머신 컨트롤러\r\n    // 결과는 Swing 시 즉시 결정\r\n    // 체온은 실시간 감소 -> 추후 분리 예정\r\n    public class SlotmachineController : MonoBehaviour\r\n    {\r\n        [SerializeField] private PlayerSurvival _survival;\r\n        [SerializeField] private CampfireController _campfire;\r\n        [Header(\"MachineSetting\")]\r\n        [SerializeField] private DataManagerSO _data;\r\n        [SerializeField] private string _seed = \"Local_Test\";\r\n        [SerializeField] private bool _initOnAwake = true;\r\n        [SerializeField] private bool _randomizeSeed = true;    // 싱글/로컬 매 런 새 시드.\r\n        [SerializeField] private RunMode _mode = RunMode.Single;    // 싱글 = 로컬 랜덤 / 멀티 = 첫 스핀 공유 시드\r\n        [SerializeField] private float _autoCompleteSeconds = 0f; // n초 후 회전 종료. CompleteSpin 미연결 시 락 방지용(테스트용)\r\n        [Header(\"Revive\")]\r\n        [SerializeField] private bool _autoReviveOnDeath = true;    // 싱글 : 사망 후 자동 초기화/부활\r\n        [SerializeField] private float _reviveDelaySeconds = 3f;    // 사망 연출 시간\r\n\r\n        private Coroutine _reviveRoutine;\r\n\r\n        private RunContext _ctx;\r\n        private SlotMachine _machine;\r\n        private bool _spinning;\r\n        private bool _spinLocked; // P1: 멀티 카운트다운 중 스핀 봉인(코디네이터 제어). 기본 false = 단일플레이/기존 씬 무영향.\r\n        private float _spinTimer;\r\n        private bool _branched;\r\n        private int[] _comboMilestones;\r\n        private int _lastCombo;\r\n\r\n\r\n        // 릴 회전 중 여부\r\n        public SlotMachine Machine => _machine;\r\n        public bool IsSpinning => _spinning;\r\n\r\n        // P1: 멀티 세션 코디네이터가 카운트다운 중 lock(true), 시작 시 unlock(false).\r\n        // 단일플레이/기존 씬은 호출 안 하면 항상 false → 무영향.\r\n        public bool IsSpinLocked => _spinLocked;\r\n        public void SetSpinLocked(bool locked) => _spinLocked = locked;\r\n        public RunProgress Run => _ctx?.Run;\r\n        public EffectRegistry Effects => _machine != null ? _machine.Effects : null;\r\n        // 활성 효과 / UI\r\n        public IReadOnlyList<SlotEffect> ActiveEffects => _machine?.Effects.Active;\r\n        // 체온 게이지 정규화 / UI\r\n        public float BodyTempNormalized\r\n            => (_ctx != null && _ctx.Run.MaxBodyTemp > 0f)\r\n            ? Mathf.Clamp01(_ctx.Run.BodyTemp / _ctx.Run.MaxBodyTemp)\r\n            : 1f;\r\n\r\n        private void Awake()\r\n        {\r\n            if (_initOnAwake) Init(ResolveInitSeed(_mode), _mode);\r\n        }\r\n        private void OnEnable() { SlotEvent.OnDeath += HandleDeath; }\r\n        private void OnDisable() { SlotEvent.OnDeath -= HandleDeath; }\r\n        private void Update()\r\n        {\r\n            if (_machine == null) return;\r\n            // 자동 완료 테스트\r\n            if (_spinning && _autoCompleteSeconds > 0f)\r\n            {\r\n                _spinTimer += Time.deltaTime;\r\n                if (_spinTimer >= _autoCompleteSeconds) CompleteSpin();\r\n            }\r\n        }\r\n        public void Init(string seed) => Init(seed, _mode);\r\n        // 초기화\r\n        public void Init(string seed, RunMode mode)\r\n        {\r\n            CardEvent.ResetCardPriceCache();\r\n            _mode = mode;\r\n            _branched = false;\r\n            var gb = _data != null ? _data._gameBalance?._data : null;\r\n            if (gb == null)\r\n            {\r\n                Debug.LogError(\"DataManagerSO/_gameBalance 미연결. 슬롯 초기화 불가\");\r\n                return;\r\n            }\r\n            _comboMilestones = gb._slotEconomy._comboMilestones;\r\n            _lastCombo = 0;   // 부활/리셋 콤보 동기화 겸함\r\n            _ctx = RunContextFactory.CreateDefault(seed, gb._slotEconomy, gb._survival); // 폴백 제거\r\n            // 멀티: Started를 코디네이터(서버시간 GO)만 켜도록 스핀 자동시작 차단. 싱글: 첫 스윙에 시작(기존).\r\n            _ctx.Run.AutoStartOnSpin = (mode != RunMode.Multi);\r\n            Debug.Log($\"[SlotmachineController] Init mode={mode}, AutoStartOnSpin={_ctx.Run.AutoStartOnSpin} (멀티면 코디네이터가 Started 소유 → GO 전 체온 드레인 없음).\");\r\n            _machine = SlotMachineFactory.CreateDefault(_ctx, _data);                     // reelCount 인자 제거\r\n            if (_survival != null) _survival.Bind(_ctx);\r\n            if (_campfire != null) _campfire.Bind(_ctx);\r\n            CardEvent.RaiseCardPriceChanged(_machine.CardCost);\r\n            _spinning = false;\r\n            _spinTimer = 0f;\r\n        }\r\n        // 모드별 초기시드 해석.\r\n        // 멀티 시드는 여기서 만들지 않고 Init(serverSeed, Multi)로 주입\r\n        private string ResolveInitSeed(RunMode mode)\r\n            => (mode == RunMode.Single && _randomizeSeed)\r\n            ? System.Guid.NewGuid().ToString(\"N\")\r\n            : _seed;\r\n        // 멀티 분기용 클라 로컬 엔트로피\r\n        private static ulong NewBranchSeed()\r\n        {\r\n            ulong hi = (uint)System.Guid.NewGuid().GetHashCode();\r\n            ulong lo = (uint)System.Guid.NewGuid().GetHashCode();\r\n            return (hi << 32) | lo;\r\n        }\r\n        // 스윙 버튼이지만 레버 돌리는 효과. 근데 도끼로 치는 건 맞으니까 \r\n        public void Swing()\r\n        {\r\n            //Debug.Log(\"[4.Swing] 진입\");\r\n            if (_machine == null) Init(ResolveInitSeed(_mode), _mode);\r\n            if (_spinLocked) { Debug.Log(\"[4.Swing] 스핀 잠금 — 무시(멀티 카운트다운/세션 시작 대기)\"); return; }\r\n            if (_spinning || !_machine.IsAlive) return;\r\n            //{ Debug.Log($\"[4.Swing] 차단: _spinning={_spinning}, IsAlive={_machine.IsAlive}\"); return; }\r\n            if (!_machine.PaySpin()) { SlotEvent.RaiseCostRejected(CostKind.Spin); return; }\r\n\r\n            _spinning = true;\r\n            _spinTimer = 0f;\r\n            SpinOutcome outcome = _machine.Spin();  // 클릭 즉시 결과 결정\r\n            // 멀티 : 첫 스핀 공유시드 전원 동일 -> 직후 분기 -> 이후 싱글과 동일\r\n            if (_mode == RunMode.Multi && !_branched && _machine.Run.SpinIndex == 1)\r\n            {\r\n                _machine.Reseed(NewBranchSeed());\r\n                _branched = true;\r\n            }\r\n            //Debug.Log(\"[4.Swing] RaiseSpinStarted 직전 (여기까지 오면 로직 정상)\");\r\n            SlotEvent.RaiseSpinStarted();\r\n            SlotEvent.RaiseReelsDecided(outcome.Result);        // 릴 정지 타겟 심볼\r\n            SlotEvent.RaiseSpinJudged(outcome);                 // 등급/퍼펙트/막걸리/실패 VFX, SFX\r\n            if (outcome.RolledMGL != null)\r\n            {\r\n                SlotEvent.RaiseEffectApplied(outcome.RolledMGL);// 막걸리 발동 효과 아이콘/연출\r\n            }\r\n            if (_comboMilestones != null)\r\n            {\r\n                for (int i = 0; i < _comboMilestones.Length; i++)\r\n                {\r\n                    int m = _comboMilestones[i];\r\n                    if (_lastCombo < m && outcome.Combo >= m) SlotEvent.RaiseComboMilestone(m, i);\r\n                }\r\n            }\r\n            _lastCombo = outcome.Combo;\r\n        }\r\n        // 릴 정지 애니메이션 완료 시 다음 스윙 허용\r\n        public void CompleteSpin()\r\n        {\r\n            _spinning = false;\r\n            _spinTimer = 0f;\r\n        }\r\n        // 정산 : 미정산 -> 사용 가능 장작\r\n        public void Settle()\r\n        {\r\n            if (_machine == null) return;\r\n            long moved = _machine.Settle();\r\n            SlotEvent.RaiseSettled(_machine.Run, moved);\r\n            _lastCombo = 0;\r\n        }\r\n        // 모닥불에 장작 투입 : 장작 소모 + 투입 횟수 증가 + 체온 회복\r\n        public void FeedFire()\r\n        {\r\n            if (_machine == null) return;\r\n            if (_machine.FeedFire()) SlotEvent.RaiseFireFed(_machine.Run);\r\n            else SlotEvent.RaiseCostRejected(CostKind.Fire);   // 장작 부족 에러음\r\n        }\r\n        // 카드 장착\r\n        public bool BuyCard(SlotEffect card)\r\n        {\r\n            if (_machine == null || card == null) return false;\r\n            if (!_machine.TryBuyCard(card)) { SlotEvent.RaiseCostRejected(CostKind.Card); return false; }\r\n            SlotEvent.RaiseEffectApplied(card);\r\n            CardEvent.RaiseCardPriceChanged(_machine.CardCost);\r\n            return true;\r\n        }\r\n        // id로 카드 생성(SO 수치) 후 구매. 인터랙터블 진입점. 알 수 없는 id/머신 없음 → false.\r\n        public bool BuyCardById(string cardId)\r\n        {\r\n            if (_machine == null) return false;\r\n            var card = CardCatalog.Create(cardId, _data);   // CardCatalog: Wooduduk.Slot (using 추가)\r\n            if (card == null) { Debug.LogWarning($\"[SlotmachineController] BuyCardById: 알 수 없는 cardId={cardId}\"); return false; }\r\n            return BuyCard(card);                           // 기존 BuyCard → TryBuyCard(장작 차감) + Effects.Add\r\n        }\r\n        private void HandleDeath(RunProgress run)\r\n        {\r\n            // 멀티는 서버 권위. 점수 제출/티어/고스트는 네트워크가 검증 후 처리.\r\n            // 클라 로컬 컨트롤러는 싱글에서만 직접 종료(이중 제출·미검증 반영 방지).\r\n            if (_mode != RunMode.Single) return;\r\n            //var gb = _data._gameBalance._data;\r\n            //var score = new SlotScoreCalculator(gb._slotScore);\r\n            //RunEndService.EndRun(run, score, RunMode.Single);   // RunMode: 신규 enum(Single/Multi)\r\n\r\n            if (_autoReviveOnDeath && _reviveRoutine == null)\r\n                _reviveRoutine = StartCoroutine(ReviveRoutine());\r\n        }\r\n        private IEnumerator ReviveRoutine()\r\n        {\r\n            yield return new WaitForSecondsRealtime(_reviveDelaySeconds);\r\n            _reviveRoutine = null;\r\n            Revive();\r\n        }\r\n        public void Revive()\r\n        {\r\n            Init(ResolveInitSeed(_mode), _mode);\r\n            SlotEvent.RaiseRunReset(_ctx.Run);\r\n        }\r\n\r\n        // 멀티용 자동 부활 멈춤\r\n        public void SetAutoRevive(bool value)\r\n        {\r\n            _autoReviveOnDeath = value;\r\n        }\r\n        public void SetCardCostOverride(int cost)\r\n        {\r\n            if (_machine == null) return;\r\n            _machine.SetCardCostOverride(cost);\r\n            CardEvent.RaiseCardPriceChanged(_machine.CardCost);\r\n        }\r\n    }\r\n}","lines":224},{"id":"Scripts/Player/PlayerSurvival.cs","name":"PlayerSurvival","path":"Scripts/Player/PlayerSurvival.cs","layer":"Player","scenes":["Dev","Multi","Title","Tutorial"],"entry":true,"summary":"체온/생존 설정","src":"﻿using System;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.DataSO;\r\nusing Wooduduk.Slot;\r\n\r\n\r\n\r\nnamespace Wooduduk.Player\r\n{\r\n    // 체온/생존 설정\r\n    [Serializable]\r\n    public sealed class SurvivalConfig\r\n    {\r\n        public float _maxBodyTemp = 100f;\r\n        public float _drainBasePerSecond = 4f;   // 기본 초당 체온 감소\r\n        public float _drainPerSettleStep = 1f;   // 정산 1회마다 초당 감소 +1 (생존에 필요한 장작↑)\r\n        //public float _warmthPerLog = 25f;        // 모닥불 1회 투입당 체온 회복\r\n        public float _criticalThreshold = 25f;   // 이 아래 -> 위험 신호(연출용)\r\n        public float _tickSeconds = 0.05f;      // 체온 드레인 고정 틱\r\n        public float _burnSecondsPerLog = 6f;   // 장작 1개당 연소 시간(초)\r\n        public float _maxBurnSeconds = 30f;   // 연료 누적 상한\r\n        public float _warmHealPerSecond = 3f;    // 연소 중 초당 체온 회복\r\n    }\r\n    // 플레이어 생존 관리\r\n    public class PlayerSurvival : MonoBehaviour\r\n    {\r\n\r\n        private RunContext _ctx;       // 상위(컨트롤러/세션)가 주입한 공유 컨텍스트\r\n        private bool _wasCritical;\r\n        private bool _deathRaised;     // 사망 1회만 발행\r\n        private float _drainAcc;       // 고정틱 누산\r\n\r\n        // Debug\r\n        [SerializeField] private bool _debugLogTemp = true;    // 디버그 체온 로그 on/off\r\n        [SerializeField] private float _debugLogInterval = 1f; // 로그 주기(초). 0.1 등으로 줄이면 더 촘촘\r\n        private float _debugLogAcc;\r\n\r\n        public void Bind(RunContext ctx)\r\n        {\r\n            _ctx = ctx;\r\n            _wasCritical = false;\r\n            _deathRaised = false; \r\n            _drainAcc = 0f;\r\n        }\r\n\r\n        private void OnEnable()\r\n        {\r\n            //SlotEvent.OnSpinStarted += HandleSpinStarted; // 첫 스윙 -> 드레인 시작\r\n            SlotEvent.OnFireFed += HandleFireFed;         // 모닥불 투입 -> 회복\r\n            //SlotEvent.OnSettled += HandleSettled;         // 정산 -> 드레인 가속\r\n        }\r\n        private void OnDisable()\r\n        {\r\n            //SlotEvent.OnSpinStarted -= HandleSpinStarted;\r\n            SlotEvent.OnFireFed -= HandleFireFed;\r\n            //SlotEvent.OnSettled -= HandleSettled;\r\n        }\r\n        private void Update()\r\n        {\r\n            if (_ctx == null) return;\r\n\r\n            float step = _ctx.Survival.Config._tickSeconds;\r\n            if (step <= 0f) step = 0.05f;             // SO 미설정 안전장치\r\n            bool justDied = false;\r\n            _drainAcc += Time.deltaTime;\r\n            while (_drainAcc >= step)                  // dt를 고정 step으로 분해\r\n            {\r\n                _drainAcc -= step;\r\n                if (_ctx.Survival.Advance(_ctx.Run, step)) { justDied = true; break; } // 사망 시 잔여 틱 무시\r\n            }\r\n            // 디버그\r\n            if (_debugLogTemp)\r\n            {\r\n                _debugLogAcc += Time.deltaTime;\r\n                if (_debugLogAcc >= _debugLogInterval)\r\n                {\r\n                    _debugLogAcc = 0f;\r\n                    var run = _ctx.Run;\r\n                    float pct = run.MaxBodyTemp > 0f ? run.BodyTemp / run.MaxBodyTemp * 100f : 0f;\r\n                    // 현재 체온 / 최대 (퍼센트) | 생존시간 | 초당 드레인 | 시작여부\r\n                    Debug.Log($\"[체온] {run.BodyTemp:F1}/{run.MaxBodyTemp:F0} ({pct:F0}%) | 생존 {run.SurvivalSeconds:F1}s | -{_ctx.Survival.CurrentDrainPerSeconds(run):F1}/s | Started={run.Started}\");\r\n                }\r\n            }\r\n            bool critical = _ctx.Survival.IsCritical(_ctx.Run);\r\n            if (critical && !_wasCritical)\r\n                SlotEvent.RaiseBodyTempCritical(_ctx.Run);            // 위험 진입(1회)\r\n            else if (!critical && _wasCritical && _ctx.Run.IsAlive)\r\n                SlotEvent.RaiseBodyTempRecovered(_ctx.Run);           // 위험 이탈(1회)\r\n            _wasCritical = critical;\r\n\r\n            if (justDied && !_deathRaised)\r\n            {\r\n                _deathRaised = true;\r\n                SlotEvent.RaiseDeath(_ctx.Run);                 // 게임 종료 -> 결과/연출\r\n            }\r\n        }\r\n\r\n        private void HandleFireFed(RunProgress run) => _ctx?.Survival.Warm(_ctx.Run);\r\n    }\r\n}","lines":100},{"id":"Scripts/UI/ShopController.cs","name":"ShopController","path":"Scripts/UI/ShopController.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"상점 패널의 심장. 그리드 생성 · 탭 전환 · 장착 · 가챠를 담당한다. 데이터/수치는 ISkinSource, IGachaConfig를 통해서만 받으므로, 진짜 SO 교체 시 Awake의 두 줄만 바꾸면 된다.","src":"using System.Collections;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing UnityEngine.UIElements;\r\nusing Wooduduk.FX;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    /// <summary>\r\n    /// 상점 패널의 심장. 그리드 생성 · 탭 전환 · 장착 · 가챠를 담당한다.\r\n    /// 데이터/수치는 ISkinSource, IGachaConfig를 통해서만 받으므로,\r\n    /// 진짜 SO 교체 시 Awake의 두 줄만 바꾸면 된다.\r\n    /// </summary>\r\n    public class ShopController : MonoBehaviour\r\n    {\r\n        [SerializeField] UIDocument doc;\r\n        [SerializeField] VisualTreeAsset cardTemplate;  // SkinCard.uxml\r\n        [SerializeField] Sprite[] reelIcons;            // 가챠 연출용 임시 아이콘 (비어 있어도 동작)\r\n        [SerializeField] Wooduduk.Data.DataSO.DataManagerSO dataManager;  // 진짜 스킨 목록 출처 (Inspector 드래그)\r\n\r\n        // [임시 표시용] 여기 넣은 id(예: 기본롤렛)는 상점에서 항상 \"보유\"로 표시된다.\r\n        // 주의: 서버 소유는 안 바꾸므로 장착 검증까진 안 닿음(정석은 UserManager 초기화).\r\n        [SerializeField] string[] defaultOwnedIds;\r\n\r\n        // [임시 표시용] 여기 넣은 id는 상점에서 항상 \"장착중\"으로 표시된다(보유 표시를 덮음).\r\n        [SerializeField] string[] defaultEquippedIds;\r\n\r\n        // 릴 연출 튜닝값 (인스펙터에서 조절).\r\n        [Header(\"릴 연출\")]\r\n        [SerializeField] float reelBaseDuration = 1.2f;   // 첫 릴이 멈추기까지 걸리는 시간\r\n        [SerializeField] float reelStagger = 0.28f;       // 릴 간 정지 시각 간격(왼→오 착착)\r\n        [SerializeField] int reelCellCount = 22;          // 띠에 쌓는 심볼 수(많을수록 오래 돎)\r\n\r\n        ISkinSource skinSource;\r\n        IGachaConfig gacha;\r\n        ITokenExchange exchange;\r\n        IReadOnlyList<SkinData> allSkins;\r\n        PlayerInventory inv;\r\n\r\n        VisualElement root, grid, reveal, overlay;\r\n        VisualElement noticeOverlay, noticeBox;\r\n        Label noticeIcon, noticeTitle, noticeDetail;\r\n        SkinCategory currentTab = SkinCategory.Slot;\r\n\r\n        // 결과판(reveal)을 \"확인\" 버튼으로 닫기 위한 상태.\r\n        bool _revealDismissed;   // 확인 버튼이 눌리면 true\r\n        bool _hasRevealOk;       // reveal-ok 버튼이 UXML에 존재하는가(없으면 아무 키 폴백)\r\n\r\n        // 골드→토큰 구매: 구매 버튼을 누르면 뜨는 팝업에서 −/+ 로 수량 조절(묶음 단위).\r\n        int buyQty = 1;\r\n        bool reopenBuyAfterNotice;  // 골드 부족 경고를 확인하면 구매 팝업을 다시 연다\r\n        VisualElement buyOverlay;  // 수량 선택 팝업\r\n        Label buyQtyLabel;         // 현재 살 토큰 수 표시(buy-qty-tokens)\r\n        Label buyCostLabel;        // 필요 골드 표시(buy-cost)\r\n\r\n        static readonly Dictionary<Rarity, string> RarityClass = new()\r\n        {\r\n            { Rarity.Common, \"scell--common\" }, { Rarity.Rare, \"scell--rare\" },\r\n            { Rarity.Epic,   \"scell--epic\" },   { Rarity.Legendary, \"scell--legendary\" },\r\n        };\r\n        static readonly Dictionary<Rarity, string> RarityName = new()\r\n        {\r\n            { Rarity.Common, \"일반\" }, { Rarity.Rare, \"희귀\" },\r\n            { Rarity.Epic,   \"영웅\" }, { Rarity.Legendary, \"전설\" },\r\n        };\r\n        // 결과판 칸 테두리색(희귀도 4색). 프로젝트 팔레트에 맞춰 조정 가능.\r\n        static readonly Dictionary<Rarity, string> RarityHex = new()\r\n        {\r\n            { Rarity.Common, \"#9a8c7a\" }, { Rarity.Rare, \"#4a90d9\" },\r\n            { Rarity.Epic,   \"#a05fd8\" }, { Rarity.Legendary, \"#f5c542\" },\r\n        };\r\n\r\n        void Awake()\r\n        {\r\n            // dataManager가 꽂혀 있으면 진짜 데이터, 아니면 스텁으로 폴백(안전)\r\n            skinSource = dataManager != null\r\n                ? (ISkinSource)new ScriptableObjectSkinSource(dataManager)\r\n                : new StubSkinSource();\r\n            gacha = new StubGachaConfig();  // ← 진짜 SO 오면 이 줄 교체\r\n            exchange = new StubTokenExchange();  // ← 진짜 SO 오면 이 줄 교체\r\n            allSkins = skinSource.GetAll();\r\n\r\n            inv = InventoryService.GetOrCreate();\r\n        }\r\n\r\n        void OnEnable()\r\n        {\r\n            root = doc.rootVisualElement;\r\n            UiSfxHover.BindAll(root);\r\n            overlay = root.Q<VisualElement>(\"shop-overlay\");\r\n            grid = root.Q<VisualElement>(\"skin-grid\");\r\n            reveal = root.Q<VisualElement>(\"reveal\");\r\n\r\n            root.Q<Button>(\"tab-slot\").clicked += () => SwitchTab(SkinCategory.Slot);\r\n            root.Q<Button>(\"tab-axe\").clicked += () => SwitchTab(SkinCategory.Axe);\r\n            root.Q<Button>(\"pull-1\").clicked += () => StartCoroutine(Pull(1));\r\n            root.Q<Button>(\"pull-10\").clicked += () => StartCoroutine(Pull(10));\r\n\r\n            var buyBtn = root.Q<Button>(\"buy-token-btn\");\r\n            if (buyBtn != null) buyBtn.clicked += OpenBuyPopup;\r\n\r\n            // 헤더 버튼의 안내 라벨엔 기본 환율만 표시(실제 수량/비용은 팝업에서).\r\n            var headerRate = root.Q<Label>(\"buy-token-rate\");\r\n            if (headerRate != null)\r\n                headerRate.text = \"골드 \" + exchange.GetGoldCost() + \" → 토큰 \" + exchange.GetTokenAmount();\r\n\r\n            // 구매 수량 팝업.\r\n            buyOverlay = root.Q<VisualElement>(\"buy-overlay\");\r\n            buyQtyLabel = root.Q<Label>(\"buy-qty-tokens\");\r\n            buyCostLabel = root.Q<Label>(\"buy-cost\");\r\n            var qtyMinus = root.Q<Button>(\"buy-qty-minus\");\r\n            var qtyPlus = root.Q<Button>(\"buy-qty-plus\");\r\n            if (qtyMinus != null) qtyMinus.clicked += () => { UiSfxEvent.Click(); buyQty = Mathf.Max(1, buyQty - 1); RefreshBuyQty(); };\r\n            if (qtyPlus != null) qtyPlus.clicked += () => { UiSfxEvent.Click(); buyQty = Mathf.Min(99, buyQty + 1); RefreshBuyQty(); };\r\n\r\n            var buyConfirm = root.Q<Button>(\"buy-confirm\");\r\n            if (buyConfirm != null) buyConfirm.clicked += ConfirmBuy;\r\n            var buyCancel = root.Q<Button>(\"buy-cancel\");\r\n            if (buyCancel != null) buyCancel.clicked += () => { UiSfxEvent.Raise(UiSfxKind.Close); CloseBuyPopup(); };\r\n            CloseBuyPopup();\r\n\r\n            noticeOverlay = root.Q<VisualElement>(\"notice-overlay\");\r\n            noticeBox = root.Q<VisualElement>(\"notice-box\");\r\n            noticeIcon = root.Q<Label>(\"notice-icon\");\r\n            noticeTitle = root.Q<Label>(\"notice-title\");\r\n            noticeDetail = root.Q<Label>(\"notice-detail\");\r\n            var okBtn = root.Q<Button>(\"notice-ok\");\r\n            if (okBtn != null) okBtn.clicked += () => { UiSfxEvent.Click(); HideNotice(); };\r\n            HideNotice();\r\n\r\n            var closeBtn = root.Q<Button>(\"close-btn\");\r\n            if (closeBtn != null) closeBtn.clicked += () => { UiSfxEvent.Raise(UiSfxKind.Close); Hide(); };\r\n\r\n            // 결과판 확인 버튼: 있으면 이 버튼으로만 닫는다(없으면 아무 키 폴백).\r\n            var revealOk = root.Q<Button>(\"reveal-ok\");\r\n            _hasRevealOk = revealOk != null;\r\n            if (revealOk != null) revealOk.clicked += () => { UiSfxEvent.Click(); _revealDismissed = true; };\r\n\r\n            Hide();\r\n            RefreshCoinLabel();\r\n            Populate();\r\n        }\r\n\r\n        public void Show()\r\n        {\r\n            UiSfxEvent.Raise(UiSfxKind.Open);\r\n            if (overlay != null) overlay.style.display = DisplayStyle.Flex;\r\n        }\r\n\r\n        public void Hide()\r\n        {\r\n            if (overlay != null) overlay.style.display = DisplayStyle.None;\r\n            reopenBuyAfterNotice = false;\r\n            CloseBuyPopup();\r\n        }\r\n\r\n        void RefreshCoinLabel()\r\n        {\r\n            var coin = root.Q<Label>(\"coin-value\");\r\n            if (coin != null) coin.text = inv.token.ToString();\r\n        }\r\n\r\n        // 현재 선택 수량(buyQty)에 맞춰 팝업 표시 갱신: 살 토큰 수와 필요 골드.\r\n        void RefreshBuyQty()\r\n        {\r\n            int tokens = buyQty * exchange.GetTokenAmount();\r\n            int cost = buyQty * exchange.GetGoldCost();\r\n            if (buyQtyLabel != null) buyQtyLabel.text = tokens.ToString();\r\n            if (buyCostLabel != null) buyCostLabel.text = \"골드 \" + cost;\r\n        }\r\n\r\n        // 구매 버튼 → 수량 선택 팝업 열기(수량 1로 초기화).\r\n        void OpenBuyPopup()\r\n        {\r\n            UiSfxEvent.Raise(UiSfxKind.Open);\r\n            buyQty = 1;\r\n            RefreshBuyQty();\r\n            if (buyOverlay != null) buyOverlay.RemoveFromClassList(\"hidden\");\r\n        }\r\n\r\n        void CloseBuyPopup()\r\n        {\r\n            if (buyOverlay != null) buyOverlay.AddToClassList(\"hidden\");\r\n        }\r\n\r\n        // 팝업의 \"구매\" → 선택 수량만큼 환율로 계산해 결제. 부족하면 팝업 유지 + 경고.\r\n        void ConfirmBuy()\r\n        {\r\n            int goldCost = buyQty * exchange.GetGoldCost();\r\n            int tokenGain = buyQty * exchange.GetTokenAmount();\r\n\r\n            if (!inv.CanAffordGold(goldCost))\r\n            {\r\n                UiSfxEvent.Error();\r\n                CloseBuyPopup();   // 경고가 구매창에 가리지 않도록 먼저 닫는다\r\n                reopenBuyAfterNotice = true;   // 확인 누르면 구매창 되살리기\r\n                ShowNotice(\"골드가 부족합니다\", \"필요 골드 \" + goldCost, true);\r\n                return;\r\n            }\r\n\r\n            UiSfxEvent.Raise(UiSfxKind.Purchase);\r\n            inv.SpendGold(goldCost);\r\n            inv.AddToken(tokenGain);\r\n            RefreshCoinLabel();\r\n            CloseBuyPopup();\r\n            ShowNotice(\"구매 완료\", \"골드 -\" + goldCost + \" · 토큰 +\" + tokenGain, false);\r\n        }\r\n\r\n        // 공용 안내 팝업(중앙). isError=true 경고색 / false 정상색. 확인 버튼(notice-ok)으로만 닫힘.\r\n        void ShowNotice(string title, string detail, bool isError)\r\n        {\r\n            if (noticeOverlay == null) return;\r\n            if (noticeTitle != null) noticeTitle.text = title;\r\n            if (noticeDetail != null) noticeDetail.text = detail;\r\n            if (noticeIcon != null) noticeIcon.text = isError ? \"!\" : \"✓\";\r\n            if (noticeBox != null) noticeBox.EnableInClassList(\"notice-box--ok\", !isError);\r\n            noticeOverlay.RemoveFromClassList(\"hidden\");\r\n        }\r\n\r\n        void HideNotice()\r\n        {\r\n            if (noticeOverlay != null) noticeOverlay.AddToClassList(\"hidden\");\r\n\r\n            // 골드 부족으로 잠깐 닫았던 구매창이면, 확인과 동시에 다시 연다(수량은 그대로 유지).\r\n            if (reopenBuyAfterNotice)\r\n            {\r\n                reopenBuyAfterNotice = false;\r\n                if (buyOverlay != null) buyOverlay.RemoveFromClassList(\"hidden\");\r\n                RefreshBuyQty();\r\n            }\r\n        }\r\n\r\n        void SwitchTab(SkinCategory cat)\r\n        {\r\n            UiSfxEvent.Raise(UiSfxKind.Toggle);\r\n            currentTab = cat;\r\n            root.Q<Button>(\"tab-slot\").EnableInClassList(\"tab--active\", cat == SkinCategory.Slot);\r\n            root.Q<Button>(\"tab-axe\").EnableInClassList(\"tab--active\", cat == SkinCategory.Axe);\r\n            Populate();\r\n        }\r\n\r\n        // [임시 표시용] 인스펙터 defaultOwnedIds에 든 id면 보유로 친다.\r\n        bool IsDefaultOwned(string id)\r\n        {\r\n            if (defaultOwnedIds == null || string.IsNullOrEmpty(id)) return false;\r\n            return System.Array.IndexOf(defaultOwnedIds, id) >= 0;\r\n        }\r\n\r\n        // [임시 표시용] 인스펙터 defaultEquippedIds에 든 id면 장착중으로 친다.\r\n        bool IsDefaultEquipped(string id)\r\n        {\r\n            if (defaultEquippedIds == null || string.IsNullOrEmpty(id)) return false;\r\n            return System.Array.IndexOf(defaultEquippedIds, id) >= 0;\r\n        }\r\n\r\n        void Populate()\r\n        {\r\n            grid.Clear();\r\n            foreach (var skin in allSkins)\r\n            {\r\n                if (skin.category != currentTab) continue;\r\n\r\n                var card = cardTemplate.Instantiate();\r\n                var cell = card.Q<VisualElement>(className: \"scell\");\r\n\r\n                bool equipped = inv.IsEquipped(skin) || IsDefaultEquipped(skin.id);\r\n                bool owned = inv.IsOwned(skin) || IsDefaultOwned(skin.id) || equipped;\r\n                bool hidden = skin.hiddenUntilOwned && !owned;\r\n\r\n                cell.AddToClassList(RarityClass[skin.rarity]);\r\n                cell.EnableInClassList(\"scell--owned\", owned && !equipped);\r\n                cell.EnableInClassList(\"scell--equipped\", equipped);\r\n                cell.EnableInClassList(\"scell--locked\", !owned);\r\n\r\n                if (!hidden)\r\n                    card.Q<VisualElement>(\"thumb\").style.backgroundImage =\r\n                        new StyleBackground(skin.icon);\r\n\r\n                card.Q<Label>(\"skin-name\").text = hidden ? \"???\" : skin.displayName;\r\n                card.Q<Label>(\"rarity-badge\").text = RarityName[skin.rarity];\r\n                card.Q<Label>(\"state-label\").text =\r\n                    equipped ? \"장착중\" : owned ? \"보유\" : (hidden ? \"미발견\" : \"미보유\");\r\n\r\n                if (owned && !equipped)\r\n                {\r\n                    cell.RegisterCallback<ClickEvent>(_ => { Equip(skin); Populate(); });\r\n                    UiSfxHover.Bind(cell);\r\n                }\r\n\r\n                grid.Add(card);\r\n            }\r\n        }\r\n\r\n        // 장착 처리. 데이터 장착(inv.Equip)에 더해, 도끼(무기) 스킨이면\r\n        // 월드 도끼 외형을 교체하도록 WeaponEquipEvent 신호를 함께 쏜다.\r\n        // 룰렛(Slot) 스킨은 도끼와 무관하므로 신호를 쏘지 않는다.\r\n        void Equip(SkinData skin)\r\n        {\r\n            inv.Equip(skin);\r\n            if (skin.category == SkinCategory.Axe)\r\n                WeaponEquipEvent.Raise(skin.id);\r\n        }\r\n\r\n        // 가챠 진입점: 비용 차감 → 1연차면 단일 릴 스크롤, 다연차(10연 등)면 결과판(한 방에 좌르륵).\r\n        IEnumerator Pull(int count)\r\n        {\r\n            int cost = gacha.GetPullCost(count);\r\n            if (!inv.CanAfford(cost))\r\n            {\r\n                UiSfxEvent.Error();\r\n                ShowNotice(\"토큰이 부족합니다\", \"필요 토큰 \" + cost, true);\r\n                yield break;\r\n            }\r\n            UiSfxEvent.Raise(UiSfxKind.Purchase);\r\n            inv.SpendToken(cost);\r\n            RefreshCoinLabel();\r\n\r\n            if (count <= 1)\r\n                yield return RevealSingle();\r\n            else\r\n                yield return RevealMulti(count);\r\n        }\r\n\r\n        // 결과판 닫힘 대기: 확인 버튼이 있으면 그 버튼으로만, 없으면 아무 키/클릭 폴백.\r\n        IEnumerator WaitRevealDismiss()\r\n        {\r\n            _revealDismissed = false;\r\n            if (_hasRevealOk)\r\n                yield return new WaitUntil(() => _revealDismissed);\r\n            else\r\n                yield return new WaitUntil(() => Input.anyKeyDown || Input.GetMouseButtonDown(0));\r\n        }\r\n\r\n        // 1연차: 3릴 잭팟. 세 릴이 위로 스크롤하다 릴별로 어긋난 시각에 감속·정지하며,\r\n        // 모두 당첨 심볼에 착지한다(잭팟 매치 연출).\r\n        IEnumerator RevealSingle()\r\n        {\r\n            // ① 당첨을 먼저 확정 (weight 가중). 연출은 이 결과에 맞춰 멈춘다 → 화면↔지급 불일치 차단.\r\n            var won = RollOneSkin();\r\n            if (won == null) yield break;\r\n\r\n            reveal.RemoveFromClassList(\"hidden\");\r\n\r\n            // 3릴 모두 사용 (양옆 릴 숨김 없음). 혹시 이전 뽑기에서 숨겨졌다면 복구.\r\n            var reels = new[]\r\n            {\r\n                reveal.Q<VisualElement>(\"reel-0\"),\r\n                reveal.Q<VisualElement>(\"reel-1\"),\r\n                reveal.Q<VisualElement>(\"reel-2\"),\r\n            };\r\n            foreach (var r in reels)\r\n                if (r != null) r.style.display = DisplayStyle.Flex;\r\n\r\n            var resultLabel = reveal.Q<Label>(\"reveal-result\");\r\n            if (resultLabel != null) resultLabel.text = \"\";\r\n\r\n            // ② 진짜 릴 스크롤: 세 릴이 위로 흐르다 어긋난 시각에 감속해 당첨 심볼에 착지.\r\n            yield return null;   // 방금 reveal을 켰으니 릴 높이가 잡히도록 한 프레임 양보\r\n            yield return SpinReels(reels, BuildSymbolPool(won), won.icon);\r\n\r\n            // ③ 확정 당첨 지급. (스크롤이 이미 당첨 심볼에서 멈춰 있으므로 화면은 그대로 둔다)\r\n            bool isNew;\r\n            var um = Wooduduk.Network.Firebase.UserManager.Instance;\r\n            if (won.category == SkinCategory.Slot)\r\n                um.AddRouletteSkin(won.id, won.returnGold, out isNew);\r\n            else\r\n                um.AddWeapon(won.id, won.returnGold, out isNew);\r\n\r\n            if (resultLabel != null)\r\n                resultLabel.text = isNew\r\n                    ? \"NEW · \" + RarityName[won.rarity] + \" \" + won.displayName\r\n                    : \"중복 · 골드 +\" + won.returnGold + \" 환급\";\r\n\r\n            RefreshCoinLabel();\r\n\r\n            yield return WaitRevealDismiss();\r\n            reveal.AddToClassList(\"hidden\");\r\n            Populate();\r\n        }\r\n\r\n        // 스핀 중 스쳐 갈 심볼들을 모은다. (임시 아이콘 + 현재 탭 스킨 아이콘 + 당첨 아이콘)\r\n        Sprite[] BuildSymbolPool(SkinData won)\r\n        {\r\n            var pool = new List<Sprite>();\r\n            if (reelIcons != null)\r\n                foreach (var s in reelIcons) if (s != null) pool.Add(s);\r\n            foreach (var sk in allSkins)\r\n                if (sk.category == currentTab && sk.icon != null) pool.Add(sk.icon);\r\n            if (won != null && won.icon != null) pool.Add(won.icon);\r\n            return pool.ToArray();\r\n        }\r\n\r\n        // 3릴을 각각 \"구멍 + 세로 심볼 띠\"로 구성해 위로 스크롤시키고, ease-out으로 감속시켜\r\n        // 릴마다 어긋난 시각에 마지막 칸(당첨 심볼)에 정지시킨다(잭팟 매치).\r\n        IEnumerator SpinReels(VisualElement[] reels, Sprite[] pool, Sprite finalSymbol)\r\n        {\r\n            int cells = Mathf.Max(6, reelCellCount);\r\n            var strips = new VisualElement[reels.Length];\r\n            var finalTop = new float[reels.Length];\r\n\r\n            // 1) 각 릴 안에 심볼 띠를 만든다.\r\n            for (int i = 0; i < reels.Length; i++)\r\n            {\r\n                var reel = reels[i];\r\n                if (reel == null) continue;\r\n\r\n                reel.Clear();\r\n                reel.style.overflow = Overflow.Hidden;     // 구멍 밖은 잘라낸다\r\n                reel.style.position = Position.Relative;    // 절대배치 자식의 기준\r\n\r\n                float h = reel.resolvedStyle.height;\r\n                if (h <= 1f) h = 120f;                       // 아직 레이아웃 전이면 기본값\r\n\r\n                var strip = new VisualElement();\r\n                strip.style.position = Position.Absolute;\r\n                strip.style.left = 0; strip.style.right = 0; strip.style.top = 0;\r\n                strip.pickingMode = PickingMode.Ignore;\r\n\r\n                for (int c = 0; c < cells; c++)\r\n                {\r\n                    var cell = new VisualElement();\r\n                    cell.style.height = h;\r\n                    cell.style.width = Length.Percent(100);\r\n\r\n                    // 마지막 칸 = 당첨 심볼, 나머지는 풀에서 랜덤.\r\n                    Sprite sp = (c == cells - 1)\r\n                        ? finalSymbol\r\n                        : (pool.Length > 0 ? pool[Random.Range(0, pool.Length)] : finalSymbol);\r\n\r\n                    if (sp != null)\r\n                    {\r\n                        cell.style.backgroundImage = new StyleBackground(sp);\r\n                        cell.style.unityBackgroundScaleMode = ScaleMode.ScaleToFit;\r\n                    }\r\n                    strip.Add(cell);\r\n                }\r\n\r\n                reel.Add(strip);\r\n                strips[i] = strip;\r\n                finalTop[i] = -((cells - 1) * h);           // 마지막 칸이 구멍에 오도록\r\n            }\r\n\r\n            // 2) 프레임마다 top을 0 → finalTop 으로 ease-out(빠르게 시작·감속) 이동.\r\n            //    릴마다 정지 시각을 어긋나게(stagger) 주어 왼쪽부터 착착 멈춘다.\r\n            float maxDur = reelBaseDuration + reelStagger * (reels.Length - 1);\r\n            float t = 0f;\r\n            while (t < maxDur)\r\n            {\r\n                for (int i = 0; i < reels.Length; i++)\r\n                {\r\n                    if (strips[i] == null) continue;\r\n                    float dur = reelBaseDuration + reelStagger * i;\r\n                    float p = Mathf.Clamp01(t / dur);\r\n                    float eased = 1f - Mathf.Pow(1f - p, 3f);   // ease-out cubic\r\n                    strips[i].style.top = Mathf.Lerp(0f, finalTop[i], eased);\r\n                }\r\n                t += Time.deltaTime;\r\n                yield return null;\r\n            }\r\n\r\n            // 3) 정확히 착지시켜 마무리(부동소수 오차 제거).\r\n            for (int i = 0; i < reels.Length; i++)\r\n                if (strips[i] != null) strips[i].style.top = finalTop[i];\r\n        }\r\n\r\n        // 다연차: count번을 각각 가중 추첨해 즉시 지급하고, 한 방에 결과판으로 좌르륵 공개.\r\n        IEnumerator RevealMulti(int count)\r\n        {\r\n            var um = Wooduduk.Network.Firebase.UserManager.Instance;\r\n            var cells = new List<VisualElement>();\r\n\r\n            reveal.RemoveFromClassList(\"hidden\");\r\n\r\n            // 단일 모드 프레임(reveal-window: reel 3칸)은 통째로 숨긴다.\r\n            var window = reveal.Q<VisualElement>(className: \"reveal-window\");\r\n            if (window != null) window.style.display = DisplayStyle.None;\r\n\r\n            var header = reveal.Q<Label>(\"reveal-result\");\r\n            if (header != null) header.text = count + \"연차 결과\";\r\n\r\n            // 결과 그리드(동적 생성 → 끝나면 제거해 다음 뽑기에 누적 안 되게).\r\n            // 결과 라벨 바로 뒤에 넣어, reveal-ok(확인) 버튼이 그리드 아래에 오도록 한다.\r\n            var gridEl = new VisualElement { name = \"reveal-grid\" };\r\n            gridEl.style.flexDirection = FlexDirection.Row;\r\n            gridEl.style.flexWrap = Wrap.Wrap;\r\n            gridEl.style.justifyContent = Justify.Center;\r\n            gridEl.style.alignItems = Align.Center;\r\n            gridEl.style.maxWidth = 560;\r\n            gridEl.style.marginTop = 12;\r\n            int insertAt = (header != null) ? reveal.IndexOf(header) + 1 : reveal.childCount;\r\n            reveal.Insert(insertAt, gridEl);\r\n\r\n            // ① count번 뽑고 각각 즉시 지급 + 칸 생성(처음엔 투명).\r\n            for (int i = 0; i < count; i++)\r\n            {\r\n                var w = RollOneSkin();\r\n                if (w == null) continue;\r\n\r\n                bool isNew;\r\n                if (w.category == SkinCategory.Slot)\r\n                    um.AddRouletteSkin(w.id, w.returnGold, out isNew);\r\n                else\r\n                    um.AddWeapon(w.id, w.returnGold, out isNew);\r\n\r\n                var cell = MakeResultCell(w, isNew);\r\n                gridEl.Add(cell);\r\n                cells.Add(cell);\r\n            }\r\n            RefreshCoinLabel();\r\n\r\n            // ② 한 칸씩 살짝 시차를 두고 \"좌르륵\" 등장.\r\n            foreach (var c in cells)\r\n            {\r\n                c.style.opacity = 1f;\r\n                yield return new WaitForSeconds(0.05f);\r\n            }\r\n\r\n            // ③ 확인 버튼(없으면 아무 키) → 정리.\r\n            yield return WaitRevealDismiss();\r\n\r\n            reveal.Remove(gridEl);\r\n            if (header != null) header.text = \"\";\r\n            if (window != null) window.style.display = DisplayStyle.Flex;\r\n\r\n            reveal.AddToClassList(\"hidden\");\r\n            Populate();\r\n        }\r\n\r\n        // 결과판 한 칸(아이콘 + 이름 + NEW/중복 배지). 희귀도 색은 인라인(reveal USS 없어도 동작).\r\n        VisualElement MakeResultCell(SkinData skin, bool isNew)\r\n        {\r\n            var cell = new VisualElement();\r\n            cell.style.width = 92;\r\n            cell.style.height = 118;\r\n            cell.style.marginTop = 6; cell.style.marginBottom = 6;\r\n            cell.style.marginLeft = 6; cell.style.marginRight = 6;\r\n            cell.style.alignItems = Align.Center;\r\n            cell.style.justifyContent = Justify.Center;\r\n            cell.style.backgroundColor = Hex(\"#2c1f16\");\r\n            cell.style.opacity = 0f;   // 좌르륵 등장용\r\n\r\n            Color rc = RarityHex.TryGetValue(skin.rarity, out var hex) ? Hex(hex) : Hex(\"#7a5638\");\r\n            SetBorderAll(cell, rc, 3f, 12f);\r\n\r\n            var thumb = new VisualElement();\r\n            thumb.style.width = 56; thumb.style.height = 56;\r\n            thumb.style.marginBottom = 6;\r\n            thumb.style.backgroundColor = Hex(\"#1f1810\");\r\n            SetBorderAll(thumb, rc, 2f, 8f);\r\n            if (skin.icon != null)\r\n            {\r\n                thumb.style.backgroundImage = new StyleBackground(skin.icon);\r\n                thumb.style.unityBackgroundScaleMode = ScaleMode.ScaleToFit;\r\n            }\r\n            else if (reelIcons != null && reelIcons.Length > 0)\r\n            {\r\n                // 스킨 고유 아이콘(SkinData.icon)이 아직 null → 임시 아이콘으로 대체(스킨별 고정 매핑).\r\n                int idx = Mathf.Abs((skin.id ?? \"\").GetHashCode()) % reelIcons.Length;\r\n                thumb.style.backgroundImage = new StyleBackground(reelIcons[idx]);\r\n                thumb.style.unityBackgroundScaleMode = ScaleMode.ScaleToFit;\r\n            }\r\n            cell.Add(thumb);\r\n\r\n            var nameLabel = new Label(skin.displayName);\r\n            nameLabel.style.color = Hex(\"#ffd27a\");\r\n            nameLabel.style.fontSize = 12;\r\n            nameLabel.style.unityTextAlign = TextAnchor.MiddleCenter;\r\n            nameLabel.style.whiteSpace = WhiteSpace.Normal;\r\n            cell.Add(nameLabel);\r\n\r\n            var badge = new Label(isNew ? \"NEW\" : \"골드 +\" + skin.returnGold);\r\n            badge.style.fontSize = 11;\r\n            badge.style.marginTop = 2;\r\n            badge.style.color = isNew ? Hex(\"#9be08a\") : Hex(\"#f5c542\");\r\n            cell.Add(badge);\r\n\r\n            return cell;\r\n        }\r\n\r\n        static Color Hex(string h)\r\n        {\r\n            ColorUtility.TryParseHtmlString(h, out var c);\r\n            return c;\r\n        }\r\n\r\n        static void SetBorderAll(VisualElement e, Color c, float w, float r)\r\n        {\r\n            e.style.borderTopColor = c; e.style.borderBottomColor = c;\r\n            e.style.borderLeftColor = c; e.style.borderRightColor = c;\r\n            e.style.borderTopWidth = w; e.style.borderBottomWidth = w;\r\n            e.style.borderLeftWidth = w; e.style.borderRightWidth = w;\r\n            e.style.borderTopLeftRadius = r; e.style.borderTopRightRadius = r;\r\n            e.style.borderBottomLeftRadius = r; e.style.borderBottomRightRadius = r;\r\n        }\r\n\r\n        // 현재 탭의 스킨을 weight 가중으로 바로 추첨한다 (희귀도 2단계 없음).\r\n        // weight 합이 0이면(설정 실수) 균등 폴백 — 최소한 뽑히긴 함.\r\n        SkinData RollOneSkin()\r\n        {\r\n            var pool = new List<SkinData>();\r\n            foreach (var s in allSkins)\r\n                if (s.category == currentTab) pool.Add(s);\r\n            if (pool.Count == 0) return null;\r\n\r\n            float total = 0f;\r\n            foreach (var s in pool)\r\n                if (s.weight > 0f) total += s.weight;\r\n\r\n            // 가중치 미설정(전부 0) → 균등 폴백\r\n            if (total <= 0f)\r\n                return pool[Random.Range(0, pool.Count)];\r\n\r\n            float roll = Random.value * total;\r\n            foreach (var s in pool)\r\n            {\r\n                if (s.weight <= 0f) continue;   // weight 0짜리는 대상에서 제외\r\n                roll -= s.weight;\r\n                if (roll < 0f) return s;\r\n            }\r\n\r\n            // 부동소수 경계 안전망: 마지막 유효 후보\r\n            for (int i = pool.Count - 1; i >= 0; i--)\r\n                if (pool[i].weight > 0f) return pool[i];\r\n            return pool[pool.Count - 1];\r\n        }\r\n    }\r\n}","lines":627},{"id":"Scripts/UI/TemperatureController.cs","name":"TemperatureController","path":"Scripts/UI/TemperatureController.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"체온 게이지 표시 전용 컨트롤러. 격리 패턴: 체온을 깎고/태우는 계산은 게임플레이 파트가 담당. 여기는 표시·색경고만. 게임플레이가 SetTemperature(0~1)로 값을 밀어넣는다. (리더보드 ShowResult와 같은 \"전화 받기\" 진입점)","src":"// 체온 게이지 표시 전용 컨트롤러.\r\n// 격리 패턴: 체온을 깎고/태우는 계산은 게임플레이 파트가 담당.\r\n// 여기는 표시·색경고만. 게임플레이가 SetTemperature(0~1)로 값을 밀어넣는다.\r\n// (리더보드 ShowResult와 같은 \"전화 받기\" 진입점)\r\nusing UnityEngine;\r\nusing UnityEngine.UIElements;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    pub
