\n    public class MatchmakingFlow : MonoBehaviour\r\n    {\r\n        // 매칭 성사 후 게임 시작 방식. InPlace=현재 씬에서 직호출(단일 씬), LoadScene=멀티 씬 로드(부트스트랩이 시작).\r\n        public enum StartMode { InPlace, LoadScene }\r\n\r\n        [Header(\"게임 제어\")]\r\n        [SerializeField] private GameController _gameController;\r\n\r\n        [Header(\"매칭 설정\")]\r\n        [SerializeField] private int _desiredPlayerCount = 2;\r\n        [SerializeField] private bool _allowGhostFill = true;\r\n        [SerializeField] private float _ghostFillTimeout = 8f;\r\n\r\n        [Header(\"자동 시작 설정\")]\r\n        [SerializeField] private bool _autoStartAfterMatch = true;\r\n        [SerializeField] private float _autoStartDelay = 3f;\r\n        [SerializeField] private float _loadingDuration = 2f;\r\n\r\n        [Header(\"게임 시작 방식\")]\r\n        [Tooltip(\"InPlace=현재 씬에서 GameController.StartMultiGame 직호출(단일 씬, 기본). LoadScene=멀티 씬을 로드(그 씬의 MultiGameBootstrap이 시작). GameSession은 여러 씬 공유 프리팹이라 기본은 InPlace(기존 유지) — 씬 전환 원하는 씬(예: Chunghui_DevScene) 인스턴스에서만 LoadScene으로 오버라이드.\")]\r\n        [SerializeField] private StartMode _startMode = StartMode.InPlace;\r\n        [Tooltip(\"LoadScene 모드에서 로드할 멀티 씬 이름. Build Settings에 등록돼 있어야 함.\")]\r\n        [SerializeField] private string _multiSceneName = \"Chunghui_DevMulti\";\r\n\r\n        private IMatchSource _matchSource;\r\n        private readonly List<string> _debugLogs = new();\r\n        private Coroutine _autoStartCoroutine;\r\n\r\n        // 카운트 변경 시에만 이벤트 발행하기 위한 캐시\r\n        private int _lastEmittedCount = -1;\r\n\r\n        // ★ 자동 시작 중복 방지 플래그\r\n        private bool _autoStartTriggered = false;\r\n\r\n        public float AutoStartRemainingTime { get; private set; }\r\n        public bool IsCountingDown { get; private set; }\r\n        public bool IsLoading { get; private set; }\r\n\r\n        public event Action<int, int> OnCountChanged;\r\n        public event Action OnMatchSuccess;\r\n        public event Action OnMatchFailed;\r\n        public event Action<float> OnCountdownTick;\r\n        public event Action<float> OnLoadingStarted;\r\n        public event Action OnLoadingFinished;\r\n\r\n        public IReadOnlyList<string> DebugLogs => _debugLogs;\r\n\r\n        public int DesiredPlayerCount\r\n        {\r\n            get => _desiredPlayerCount;\r\n            set => _desiredPlayerCount = Mathf.Clamp(value, 1, 4);\r\n        }\r\n\r\n        public bool AllowGhostFill\r\n        {\r\n            get => _allowGhostFill;\r\n            set => _allowGhostFill = value;\r\n        }\r\n\r\n        public bool AutoStartAfterMatch\r\n        {\r\n            get => _autoStartAfterMatch;\r\n            set => _autoStartAfterMatch = value;\r\n        }\r\n\r\n        public float GhostFillTimeout\r\n        {\r\n            get => _ghostFillTimeout;\r\n            set => _ghostFillTimeout = Mathf.Max(0f, value);\r\n        }\r\n\r\n        public bool IsMatched\r\n        {\r\n            get\r\n            {\r\n                if (_matchSource is IRoomMatchSource room)\r\n                    return room.IsMatched;\r\n                return false;\r\n            }\r\n        }\r\n\r\n        public bool IsSearching => _matchSource != null && !IsMatched;\r\n\r\n        public bool HasRoom\r\n        {\r\n            get\r\n            {\r\n                var s = CurrentSession;\r\n                return s != null && !string.IsNullOrEmpty(s.RoomId);\r\n            }\r\n        }\r\n\r\n        // ★ 게임 진행 중인지 (카운트다운/로딩/게임 시작 후)\r\n        public bool IsGameStarting => _autoStartTriggered;\r\n\r\n        public RoomSession CurrentSession\r\n        {\r\n            get\r\n            {\r\n                if (_matchSource is FirebaseRoomMatchSource fb)\r\n                    return fb.Session;\r\n                return null;\r\n            }\r\n        }\r\n\r\n        private FirebaseRoomMatchSource FirebaseSource => _matchSource as FirebaseRoomMatchSource;\r\n\r\n        private void AddLog(string message)\r\n        {\r\n            string line = $\"[{DateTime.Now:HH:mm:ss}] {message}\";\r\n            _debugLogs.Add(line);\r\n            if (_debugLogs.Count > 80) _debugLogs.RemoveAt(0);\r\n            Debug.Log($\"[MatchmakingFlow] {line}\");\r\n        }\r\n\r\n        public void ClearLogs() => _debugLogs.Clear();\r\n\r\n        public void BeginMatch()\r\n        {\r\n            if (_matchSource != null)\r\n            {\r\n                AddLog(\"이미 매칭 중이라 BeginMatch 무시\");\r\n                return;\r\n            }\r\n\r\n            _autoStartTriggered = false; // ★ 초기화\r\n\r\n            // NRE 방지 가드: CurrentUserData null이면 아래 user._userId 접근서 크래시.\r\n            //   원인 = 로그인/유저데이터 로드 전 매칭 시작, 또는 씬전환 시 UserManager 미영속(DDOL 그룹자식 경고).\r\n            var user = UserManager.Instance != null ? UserManager.Instance.CurrentUserData : null;\r\n            if (user == null)\r\n            {\r\n                AddLog(\"❌ 매칭 실패 — 유저 데이터 없음(로그인/로드 전). 로비 경유 후 재시도.\");\r\n                Debug.LogWarning(\"[MatchmakingFlow] BeginMatch 중단: UserManager.CurrentUserData == null. \" +\r\n                                 \"MultiScene 단독 테스트면 로비→멀티 경유 필요(로그인/유저 로드), 또는 UserManager DDOL 미영속 확인.\");\r\n                return;\r\n            }\r\n            AddLog(\"매칭 찾기 시작\");\r\n            AddLog($\"설정: 목표={_desiredPlayerCount}, 고스트허용={_allowGhostFill}, 타임아웃={_ghostFillTimeout:F1}s\");\r\n\r\n            var source = new FirebaseRoomMatchSource(\r\n                user._userId,\r\n                user._userNick,\r\n                user._axeTier,\r\n                user._gamesPlayed\r\n            )\r\n            {\r\n                DesiredPlayerCount = _desiredPlayerCount,\r\n                AllowGhostFill = _allowGhostFill,\r\n                GhostFillTimeout = _ghostFillTimeout\r\n            };\r\n\r\n            _matchSource = source;\r\n            _matchSource.OnMatchReady += HandleMatchReady;\r\n            _matchSource.OnMatchFailed += HandleMatchFailed;\r\n\r\n            source.BeginMatch();\r\n        }\r\n\r\n        public void CancelMatch()\r\n        {\r\n            _lastEmittedCount = -1;\r\n            if (_matchSource == null)\r\n            {\r\n                AddLog(\"취소할 매칭 없음\");\r\n                return;\r\n            }\r\n\r\n            AddLog(\"매칭 취소/정리\");\r\n\r\n            StopAutoStart();\r\n            _autoStartTriggered = false;\r\n\r\n            _matchSource.OnMatchReady -= HandleMatchReady;\r\n            _matchSource.OnMatchFailed -= HandleMatchFailed;\r\n            _matchSource.CancelMatch();\r\n            _matchSource = null;\r\n        }\r\n\r\n        private void StopAutoStart()\r\n        {\r\n            if (_autoStartCoroutine != null)\r\n            {\r\n                StopCoroutine(_autoStartCoroutine);\r\n                _autoStartCoroutine = null;\r\n            }\r\n            IsCountingDown = false;\r\n            IsLoading = false;\r\n            AutoStartRemainingTime = 0f;\r\n        }\r\n\r\n        private void Update()\r\n        {\r\n            if (_matchSource is IRoomMatchSource roomMatch)\r\n            {\r\n                roomMatch.Tick(Time.deltaTime);\r\n                var session = roomMatch.Session;\r\n                if (session != null)\r\n                {\r\n                    int count = session.PlayerCount;\r\n\r\n                    // 매 프레임 발행하면 OnPlayersChanged의 Clear() 순간 0이 찍혀 UI가 깜빡임\r\n                    // 실제 값이 바뀔 때만 발행\r\n                    if (count != _lastEmittedCount)\r\n                    {\r\n                        _lastEmittedCount = count;\r\n                        OnCountChanged?.Invoke(count, _desiredPlayerCount);\r\n                    }\r\n\r\n                    if (_autoStartAfterMatch && !_autoStartTriggered && HasRoom &&\r\n                        count >= _desiredPlayerCount)\r\n                    {\r\n                        TriggerAutoStart();\r\n                    }\r\n                }\r\n            }\r\n        }\r\n\r\n        // ★ 자동 시작 트리거 (중복 방지)\r\n        private void TriggerAutoStart()\r\n        {\r\n            if (_autoStartTriggered) return;\r\n            _autoStartTriggered = true;\r\n\r\n            // ★ 방을 닫아서 더 이상 못 들어오게 막음\r\n            CloseRoom();\r\n\r\n            if (_autoStartCoroutine != null)\r\n                StopCoroutine(_autoStartCoroutine);\r\n\r\n            _autoStartCoroutine = StartCoroutine(AutoStartSequence());\r\n        }\r\n\r\n        // ★ 방 닫기: state를 starting으로 바꿔서 매칭 검색에서 제외\r\n        private void CloseRoom()\r\n        {\r\n            var fb = FirebaseSource;\r\n            if (fb != null && fb.Session != null && !string.IsNullOrEmpty(fb.Session.RoomId))\r\n            {\r\n                fb.Repository.SetRoomState(fb.Session.RoomId, \"starting\", fb.MyTier);\r\n                AddLog($\"🔒 방 닫음 (state=starting) → 추가 입장 차단\");\r\n            }\r\n        }\r\n\r\n        private void HandleMatchReady(long seed)\r\n        {\r\n            AddLog($\"매칭 성공! Seed={seed}\");\r\n\r\n            if (_matchSource is FirebaseRoomMatchSource firebaseSource)\r\n            {\r\n                var session = firebaseSource.Session;\r\n\r\n                AddLog($\"RoomContext 세팅: {session.RoomId}\");\r\n                AddLog($\"최종 인원: {session.PlayerCount}/{session.MaxPlayers}\");\r\n\r\n                foreach (var kvp in session.Players)\r\n                {\r\n                    var p = kvp.Value;\r\n                    AddLog($\"참가자: {(p.isGhost ? \"Ghost\" : \"Player\")} / {p.nick} / T{p.tier}\");\r\n                }\r\n\r\n                RoomContext.Instance.SetMatchResult(firebaseSource.Session, firebaseSource.Repository);\r\n            }\r\n\r\n            OnMatchSuccess?.Invoke();\r\n\r\n            // ★ 여기서도 자동 시작 (이벤트 경로)\r\n            if (_autoStartAfterMatch && !_autoStartTriggered)\r\n            {\r\n                TriggerAutoStart();\r\n            }\r\n            else if (!_autoStartAfterMatch)\r\n            {\r\n                AddLog(\"수동 시작 대기 중... [강제 시작] 버튼을 누르세요.\");\r\n            }\r\n        }\r\n\r\n        private void HandleMatchFailed()\r\n        {\r\n            AddLog(\"매칭 실패\");\r\n            OnMatchFailed?.Invoke();\r\n            StopAutoStart();\r\n        }\r\n\r\n        private IEnumerator AutoStartSequence()\r\n        {\r\n            // ── 1단계: 인원 1차 확인 ──\r\n            var session = CurrentSession;\r\n            if (session == null || session.PlayerCount < _desiredPlayerCount)\r\n            {\r\n                AddLog($\"❌ 인원 부족으로 시작 취소: {session?.PlayerCount ?? 0}/{_desiredPlayerCount}\");\r\n                StopAutoStart();\r\n                _autoStartTriggered = false; // ★ 재시도 가능하게\r\n                yield break;\r\n            }\r\n\r\n            // ── 2단계: 카운트다운 ──\r\n            AddLog(\"🔥 자동 시작 카운트다운 시작!\");\r\n            IsCountingDown = true;\r\n            AutoStartRemainingTime = _autoStartDelay;\r\n\r\n            while (AutoStartRemainingTime > 0f)\r\n            {\r\n                AddLog($\"게임 시작까지 {AutoStartRemainingTime:F0}초...\");\r\n                OnCountdownTick?.Invoke(AutoStartRemainingTime);\r\n\r\n                yield return new WaitForSeconds(1f);\r\n                AutoStartRemainingTime -= 1f;\r\n            }\r\n\r\n            IsCountingDown = false;\r\n            AddLog(\"✅ 카운트다운 완료\");\r\n\r\n            // ── 3단계: 로딩 ──\r\n            IsLoading = true;\r\n            AddLog($\"로딩 시작: {_loadingDuration}초\");\r\n            OnLoadingStarted?.Invoke(_loadingDuration);\r\n\r\n            float loadTime = _loadingDuration;\r\n            while (loadTime > 0f)\r\n            {\r\n                loadTime -= Time.deltaTime;\r\n                yield return null;\r\n            }\r\n\r\n            IsLoading = false;\r\n\r\n            // ── 4단계: 게임 시작 ──\r\n            AddLog(\"🎮 게임 시작!\");\r\n\r\n            // state를 playing으로 최종 전환\r\n            var fb = FirebaseSource;\r\n\r\n            fb.Repository.SetRoomState(fb.Session.RoomId, \"playing\", fb.MyTier);\r\n\r\n            // HandleMatchReady가 아직 안 왔을 경우를 대비해 직접 세팅\r\n            if (!RoomContext.Instance.IsInMultiplayer)\r\n            {\r\n                RoomContext.Instance.SetMatchResult(fb.Session, fb.Repository);\r\n            }\r\n\r\n            // 게임 시작 — 모드에 따라 인플레이스 호출 or 멀티 씬 로드.\r\n            // (SetMatchResult가 위에서 끝나 seed/session/Repository는 RoomContext에 적재됨 → 정적이라 씬 넘어가도 유지)\r\n            if (_startMode == StartMode.LoadScene)\r\n            {\r\n                if (string.IsNullOrEmpty(_multiSceneName))\r\n                {\r\n                    Debug.LogError(\"[MatchmakingFlow] _multiSceneName 비어있음 — 멀티 씬 로드 불가. 씬 이름 설정 또는 _startMode=InPlace로.\");\r\n                }\r\n                else\r\n                {\r\n                    AddLog($\"멀티 씬 로드: {_multiSceneName}\");\r\n                    SceneManager.LoadSceneAsync(_multiSceneName);\r\n                }\r\n            }\r\n            else // InPlace — 기존 단일 씬 경로(회귀 0)\r\n            {\r\n                _gameController?.StartMultiGame();\r\n            }\r\n\r\n            OnLoadingFinished?.Invoke();\r\n\r\n            _autoStartCoroutine = null;\r\n        }\r\n\r\n        // ── 디버그용 메서드들 ──\r\n\r\n        public bool DebugAddFakePlayer()\r\n        {\r\n            var fb = FirebaseSource;\r\n            if (fb == null || fb.Session == null || string.IsNullOrEmpty(fb.Session.RoomId))\r\n            {\r\n                AddLog(\"DebugAddFakePlayer 실패: 활성 Room 없음\");\r\n                return false;\r\n            }\r\n\r\n            // ★ 이미 인원 충족이면 추가 차단\r\n            if (fb.Session.PlayerCount >= _desiredPlayerCount)\r\n            {\r\n                AddLog($\"❌ 이미 인원 충족 ({fb.Session.PlayerCount}/{_desiredPlayerCount}) → 플레이어 추가 차단\");\r\n                return false;\r\n            }\r\n\r\n            string shortId = Guid.NewGuid().ToString(\"N\").Substring(0, 8);\r\n            var player = new RoomPlayerData\r\n            {\r\n                uid = $\"debug_player_{shortId}\",\r\n                nick = $\"DebugPlayer_{shortId}\",\r\n                tier = UserManager.Instance.CurrentUserData._axeTier,\r\n                ready = true,\r\n                isGhost = false\r\n            };\r\n\r\n            fb.Repository.JoinRoom(fb.Session.RoomId, player);\r\n            AddLog($\"디버그 플레이어 추가: {player.nick}\");\r\n            return true;\r\n        }\r\n\r\n        public bool DebugAddGhost()\r\n        {\r\n            var fb = FirebaseSource;\r\n            if (fb == null || fb.Session == null || string.IsNullOrEmpty(fb.Session.RoomId))\r\n            {\r\n                AddLog(\"DebugAddGhost 실패: 활성 Room 없음\");\r\n                return false;\r\n            }\r\n\r\n            // ★ 이미 인원 충족이면 추가 차단\r\n            if (fb.Session.PlayerCount >= _desiredPlayerCount)\r\n            {\r\n                AddLog($\"❌ 이미 인원 충족 ({fb.Session.PlayerCount}/{_desiredPlayerCount}) → 고스트 추가 차단\");\r\n                return false;\r\n            }\r\n\r\n            string shortId = Guid.NewGuid().ToString(\"N\").Substring(0, 8);\r\n            var ghost = new RoomPlayerData\r\n            {\r\n                uid = $\"debug_ghost_{shortId}\",\r\n                nick = $\"AI_{shortId}\",\r\n                tier = UserManager.Instance.CurrentUserData._axeTier,\r\n                ready = true,\r\n                isGhost = true\r\n            };\r\n\r\n            fb.Repository.JoinRoom(fb.Session.RoomId, ghost);\r\n            AddLog($\"디버그 고스트 추가: {ghost.nick}\");\r\n            return true;\r\n        }\r\n\r\n        public bool DebugForceStart()\r\n        {\r\n            if (!_autoStartTriggered)\r\n            {\r\n                TriggerAutoStart();\r\n                AddLog(\"▶ 수동 강제 시작!\");\r\n                return true;\r\n            }\r\n            AddLog(\"이미 시작 진행 중\");\r\n            return false;\r\n        }\r\n\r\n        private void OnApplicationQuit()\r\n        {\r\n            // 유니티 에디터 중지 또는 앱 종료 시 방을 즉시 삭제.\r\n            // Firebase onDisconnect는 수 분간 지연될 수 있어서 다음 세션에서 잔존 방이 생기는 문제를 방지.\r\n            var fb = _matchSource as FirebaseRoomMatchSource;\r\n            if (fb?.Session != null && !string.IsNullOrEmpty(fb.Session.RoomId))\r\n            {\r\n                fb.Repository.DeleteRoom(fb.Session.RoomId);\r\n                Debug.Log(\"[MatchmakingFlow] 앱 종료 — 방 즉시 삭제\");\r\n            }\r\n        }\r\n\r\n        private void OnDestroy()\r\n        {\r\n            if (_matchSource is IRoomMatchSource room && !room.IsMatched)\r\n            {\r\n                _matchSource.CancelMatch();\r\n            }\r\n\r\n            StopAutoStart();\r\n        }\r\n    }\r\n}","lines":472},{"id":"Scripts/Network/GameController.cs","name":"GameController","path":"Scripts/Network/GameController.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"★ 타임아웃 시에도 확정 처리를 하기 위한 보관 필드","src":"﻿using Firebase.Database;\r\nusing System.Collections;\r\nusing System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Data.DataSO;\r\nusing Wooduduk.Data.Result;\r\nusing Wooduduk.Data.Service;\r\nusing Wooduduk.Data.Static;\r\nusing Wooduduk.Network.Firebase;\r\nusing Wooduduk.Network.Firebase.Leaderboard;\r\nusing Wooduduk.Network.Firebase.Matchmaking;\r\nusing Wooduduk.Player;\r\nusing Wooduduk.Slot;\r\nusing Wooduduk.Slot.Machine;\r\n\r\nnamespace Wooduduk.Network\r\n{\r\n    public class GameController : MonoBehaviour\r\n    {\r\n        [SerializeField] private DataManagerSO _dataManager;\r\n        [SerializeField] private RoomLiveSync _liveSync;\r\n        [SerializeField] private PlayerSurvival _playerSurvival;\r\n        [SerializeField] private SlotmachineController _slotmachineController;\r\n\r\n        [SerializeField] private float _resultDelay = 3f;\r\n\r\n        private RunContext _runContext;\r\n        private SlotMachine _slotMachine;\r\n        private SlotScoreCalculator _scoreCalculator;\r\n        private bool _rankReceived;\r\n        private bool _gameEnded;\r\n        private bool _ranksWritten;\r\n\r\n        public bool IsGameActive => _slotMachine != null && !_gameEnded;\r\n        public bool IsGameEnded => _gameEnded;\r\n        public bool RankReceived => _rankReceived;\r\n        public RunContext CurrentRunContext => _runContext;\r\n        public RoomLiveSync LiveSync => _liveSync;\r\n        public SlotMachine CurrentSlotMachine => _slotMachine;\r\n\r\n        // ★ 타임아웃 시에도 확정 처리를 하기 위한 보관 필드\r\n        private RunResultData _pendingResult;\r\n        private RunProgress _pendingRun;\r\n        private int _provisionalRank;\r\n\r\n        // P2: 이탈 감지 + 호스트 마이그레이션 + last-man 종료\r\n        private readonly HashSet<string> _originalRealPlayers = new HashSet<string>(); // 시작 시 non-ghost 로스터\r\n        private readonly HashSet<string> _leaverWritten = new HashSet<string>();       // 이탈 death 대필한 uid(멱등)\r\n        private int _totalPlayers;                                                       // 시작 시 총원 N(등수 기준, 고정)\r\n        private bool _lifecycleSubscribed;                                               // players/deaths 구독 1회 가드\r\n\r\n\r\n        private void OnEnable()\r\n        {\r\n            SlotEvent.OnDeath += HandleDeath;\r\n        }\r\n        private void OnDisable()\r\n        {\r\n            SlotEvent.OnDeath -= HandleDeath;\r\n        }\r\n\r\n        public void StartMultiGame()\r\n        {\r\n            if (_slotmachineController != null)\r\n                _slotmachineController.SetAutoRevive(false);\r\n\r\n            var ctx = RoomContext.Instance;\r\n            if (!ctx.IsInMultiplayer) { Debug.LogError(\"[GameController] 멀티 컨텍스트 없음\"); return; }\r\n            if (ctx.Session.PlayerCount < ctx.Session.MinPlayers)\r\n            {\r\n                Debug.LogError($\"[GameController] 인원 부족: {ctx.Session.PlayerCount}/{ctx.Session.MinPlayers}\");\r\n                return;\r\n            }\r\n\r\n            _rankReceived = false;\r\n            _gameEnded = false;\r\n            _ranksWritten = false;\r\n\r\n            long seed = ctx.Session.Seed;\r\n            Debug.Log($\"[GameController] 멀티 게임 시작 - Seed: {seed}, 인원: {ctx.Session.PlayerCount}\");\r\n\r\n            // ★ SlotmachineController를 공유 시드로 재초기화 (클릭 상호작용이 올바른 머신을 씀)\r\n            if (_slotmachineController != null)\r\n            {\r\n                _slotmachineController.Init(seed.ToString(), RunMode.Multi);\r\n                _slotMachine = _slotmachineController.Machine;\r\n            }\r\n            else\r\n            {\r\n                _slotMachine = CreateSlotMachine(seed);\r\n            }\r\n\r\n            // 멀티: Started는 코디네이터(서버시간 GO)만 소유 → 스핀 자동시작 차단(대기/카운트다운 중 조기 체온 드레인 방지).\r\n            //   컨트롤러 경로는 Init(Multi)에서 이미 세팅하지만, 컨트롤러 없는 폴백(CreateSlotMachine)도 여기서 커버.\r\n            if (_slotMachine?.Run != null)\r\n            {\r\n                _slotMachine.Run.AutoStartOnSpin = false;\r\n                Debug.Log(\"[GameController] 멀티 런 AutoStartOnSpin=false — Started는 코디네이터 GO만 소유.\");\r\n            }\r\n\r\n            if (_liveSync != null)\r\n            {\r\n                var survivalConfig = _dataManager._gameBalance._data._survival;\r\n                _scoreCalculator = new SlotScoreCalculator(_dataManager._gameBalance._data._slotScore);\r\n                _liveSync.Initialize(ctx.Session, ctx.Repository, _slotMachine, survivalConfig, _scoreCalculator);\r\n                LoadAndSetGhostEntries(ctx.Session);\r\n                _liveSync.IsEnabled = true;\r\n            }\r\n            else\r\n            {\r\n                Debug.LogWarning(\"[GameController] RoomLiveSync 가 Inspector 에 연결되지 않았습니다.\");\r\n            }\r\n\r\n            // P2: 세션 라이프사이클 구독(이탈감지·호스트마이그·last-man 종료) — 모든 클라.\r\n            StartLifecycleWatch(ctx);\r\n        }\r\n\r\n        // ── P2: 세션 라이프사이클 감시(모든 클라 구독) ─────────────────────────────\r\n        // 이탈감지(호스트 death 대필) + 로스터 동기화(IsHost 마이그레이션) + last-man 종료(SubscribeDeaths).\r\n        private void StartLifecycleWatch(RoomContext ctx)\r\n        {\r\n            if (_lifecycleSubscribed || ctx.Session == null) return;\r\n            _lifecycleSubscribed = true;\r\n\r\n            _totalPlayers = ctx.Session.PlayerCount; // 시작 총원 N(고정, 이후 이탈 제거와 무관하게 등수 기준)\r\n            _originalRealPlayers.Clear();\r\n            _leaverWritten.Clear();\r\n            foreach (var kvp in ctx.Session.Players)\r\n                if (kvp.Value != null && !kvp.Value.isGhost) _originalRealPlayers.Add(kvp.Key);\r\n\r\n            string roomId = ctx.Session.RoomId;\r\n            string myUid = ctx.Session.MyUid;\r\n\r\n            // 로스터 감시 — 이탈감지 + IsHost 마이그레이션(기존 SubscribePlayers 재사용).\r\n            ctx.Repository?.SubscribePlayers(roomId, players => OnRosterChanged(players, ctx));\r\n\r\n            // 사망 감시 — 시작 시점부터(기존엔 내 사망 후에만) → last-man을 남이 죽어도 감지.\r\n            ctx.Repository?.SubscribeDeaths(roomId, snapshot =>\r\n                OnDeathsUpdated(snapshot, roomId, myUid, _totalPlayers, ctx));\r\n\r\n            // 내 등수 확정 구독 — 세션 시작 시(죽든 살아남든 종료 시 여기로). 생존자(승자)도 커버.\r\n            ctx.Repository?.SubscribeRank(roomId, myUid, rank => OnMyRankConfirmed(rank, ctx));\r\n\r\n            Debug.Log($\"[GameController] P2 라이프사이클 구독 시작 (총원 N={_totalPlayers}, real={_originalRealPlayers.Count}).\");\r\n        }\r\n\r\n        // 로스터 변화: (a) session.Players 동기화 → 결정론 IsHost 자동 재계산(호스트 마이그레이션).\r\n        //             (b) 지금 내가 IsHost면 이탈한 real 플레이어의 death를 대필(멱등).\r\n        private void OnRosterChanged(Dictionary<string, RoomPlayerData> players, RoomContext ctx)\r\n        {\r\n            if (_gameEnded || players == null || ctx.Session == null) return;\r\n\r\n            var current = new HashSet<string>(players.Keys);\r\n\r\n            // (a) 빠진 uid 제거 → IsHost(최저uid) 재계산 = 마이그레이션.\r\n            var toRemove = new List<string>();\r\n            foreach (var uid in ctx.Session.Players.Keys)\r\n                if (!current.Contains(uid)) toRemove.Add(uid);\r\n            foreach (var uid in toRemove) ctx.Session.RemovePlayer(uid);\r\n            if (toRemove.Count > 0)\r\n                Debug.Log($\"[GameController] 로스터 변화 {toRemove.Count}명 이탈 → IsHost={ctx.Session.IsHost}(마이그레이션 반영).\");\r\n\r\n            // (b) 호스트만: 이탈한 real 플레이어 death 대필(이미 대필했으면 스킵 = 멱등).\r\n            if (!ctx.Session.IsHost) return;\r\n            foreach (var uid in _originalRealPlayers)\r\n            {\r\n                if (current.Contains(uid)) continue;        // 아직 접속중\r\n                if (_leaverWritten.Contains(uid)) continue; // 이미 대필\r\n                _leaverWritten.Add(uid);\r\n                long lastScore = 0;\r\n                if (_liveSync != null && _liveSync.LiveCache.TryGetValue(uid, out var live)) lastScore = live.score;\r\n                ctx.Repository?.WriteDeath(ctx.Session.RoomId, uid, lastScore);\r\n                Debug.Log($\"[GameController] (호스트) 이탈 감지 → death 대필: {uid} (마지막 점수 {lastScore}).\");\r\n            }\r\n        }\r\n\r\n        // ★ 싱글플레이어 게임 시작용 (필요시 추가)\r\n        public void StartSingleGame()\r\n        {\r\n            _rankReceived = false;\r\n            _gameEnded = false;\r\n            _ranksWritten = false;\r\n\r\n            _slotMachine = CreateSlotMachine(Random.Range(0, 99999));\r\n            // 싱글은 카운트다운 없이 즉시 시작 → 체온 바로 드레인(멀티만 코디네이터가 지연 세팅).\r\n            if (_runContext != null) _runContext.Run.Started = true;\r\n            _scoreCalculator = new SlotScoreCalculator(_dataManager._gameBalance._data._slotScore);\r\n        }\r\n\r\n        private SlotMachine CreateSlotMachine(long seed)\r\n        {\r\n            var gb = _dataManager._gameBalance._data;\r\n            _runContext = RunContextFactory.CreateDefault(seed.ToString(), gb._slotEconomy, gb._survival);\r\n\r\n            var slotMachine = SlotMachineFactory.CreateDefault(_runContext, _dataManager);\r\n\r\n            var survival = _playerSurvival ?? FindAnyObjectByType<PlayerSurvival>();\r\n            if (survival != null)\r\n            {\r\n                survival.Bind(_runContext);\r\n                survival.enabled = true;\r\n                // P1: run.Started를 여기서 세팅하지 않는다 → 멀티는 MultiSessionCoordinator가 카운트다운 종료 시\r\n                //     전원 동시에 Started=true(체온 동시 드레인). 싱글은 StartSingleGame이 즉시 세팅.\r\n                //     (코디네이터 없는 멀티 dev씬은 첫 스핀 SlotMachine.Spin이 켬 → 폴백)\r\n                Debug.Log(\"[GameController] PlayerSurvival 연결 완료 → 체온 드레인 시작 시점은 호출부 결정(P1).\");\r\n            }\r\n            else\r\n            {\r\n                Debug.LogError(\"[GameController] ❌ PlayerSurvival 을 찾을 수 없습니다!\");\r\n            }\r\n\r\n            return slotMachine;\r\n        }\r\n\r\n        public SpinOutcome Spin()\r\n        {\r\n            if (_slotMachine == null)\r\n            {\r\n                Debug.LogError(\"[GameController] SlotMachine 이 없습니다.\");\r\n                return default;\r\n            }\r\n            return _slotMachine.Spin();\r\n        }\r\n\r\n        private void LoadAndSetGhostEntries(RoomSession session)\r\n        {\r\n            var ghostUids = new List<string>();\r\n            foreach (var kvp in session.Players)\r\n                if (kvp.Value.isGhost) ghostUids.Add(kvp.Key);\r\n\r\n            if (ghostUids.Count == 0) return;\r\n\r\n            var entries = session.GhostCandidates;\r\n            if (entries == null || entries.Count == 0)\r\n            {\r\n                Debug.Log(\"[GameController] 고스트 엔트리 없음 → 랜덤 시뮬레이션\");\r\n                return;\r\n            }\r\n\r\n            var map = new Dictionary<string, GhostEntry>();\r\n            for (int i = 0; i < ghostUids.Count && i < entries.Count; i++)\r\n            {\r\n                map[ghostUids[i]] = entries[i];\r\n                Debug.Log($\"[GameController] 고스트 매핑: {ghostUids[i]} → {entries[i]._nick} (점수:{entries[i]._score})\");\r\n            }\r\n\r\n            _liveSync?.SetGhostEntries(map);\r\n        }\r\n\r\n        // =========================================================\r\n        // ★ 핵심 수정: HandleDeath 분기 (싱글/멀티 공용)\r\n        // =========================================================\r\n        private void HandleDeath(RunProgress run)\r\n        {\r\n            if (_gameEnded) return;\r\n\r\n            var gb = _dataManager._gameBalance._data;\r\n            var calculator = _scoreCalculator ?? new SlotScoreCalculator(gb._slotScore);\r\n            var user = UserManager.Instance.CurrentUserData;\r\n\r\n            if (RoomContext.Instance.IsInMultiplayer)\r\n                HandleMultiplayerDeath(run, calculator, user);\r\n            else\r\n                HandleSingleplayerDeath(run, calculator, user);\r\n        }\r\n\r\n        // ─── 싱글: 데이터는 EndRun(Single)에 전부 위임, UI만 여기서 ───\r\n        private void HandleSingleplayerDeath(RunProgress run, SlotScoreCalculator calculator, UserData user)\r\n        {\r\n            // 데이터: 결과 생성 + 저장 + 고스트 저장 (티어 X — EndRun 내부에 티어 없음)\r\n            var result = RunEndService.EndRun(run, calculator, RunMode.Single, user);\r\n\r\n            // UI: 공통 헬퍼 사용\r\n            if (result != null)\r\n                ShowResultUI(result, _resultDelay);\r\n\r\n            // ★ EndGame() 호출하지 않음! (싱글은 SlotmachineController가 부활로 이어감)\r\n        }\r\n\r\n        // ─── 멀티플레이어 전용 (등수 확정 후 티어 적용) ─────────────────────────────────────\r\n        private void HandleMultiplayerDeath(RunProgress run, SlotScoreCalculator calculator, UserData user)\r\n        {\r\n            var ctx = RoomContext.Instance;\r\n            string myUid = ctx.Session.MyUid;\r\n            string roomId = ctx.Session.RoomId;\r\n            int totalPlayers = ctx.Session.PlayerCount;\r\n            long myScore = calculator.MultiScore(run);\r\n\r\n            // 1. 임시 등수 계산\r\n            int provisionalRank = 1;\r\n            if (_liveSync != null)\r\n            {\r\n                foreach (var kvp in _liveSync.LiveCache)\r\n                {\r\n                    if (kvp.Key == myUid) continue;\r\n                    if (kvp.Value.alive || kvp.Value.score > myScore) provisionalRank++;\r\n                }\r\n            }\r\n\r\n            // 2. 임시 결과 생성 (저장 X, 티어 X)\r\n            var result = MultiRunResultService.CreateProvisional(run, calculator, user, provisionalRank);\r\n\r\n            // 타임아웃 대비 보관\r\n            _pendingResult = result;\r\n            _pendingRun = run;\r\n            _provisionalRank = provisionalRank;\r\n\r\n            // 3. UI 표시 (임시 등수로)\r\n            ShowResultUI(result, delaySeconds: _resultDelay);\r\n\r\n            // 4. 네트워크 — 내 사망 기록만. (사망 감시 SubscribeDeaths는 StartLifecycleWatch에서 세션 시작 시 구독.)\r\n            ctx.Repository?.WriteDeath(roomId, myUid, myScore);\r\n\r\n            ctx.Repository?.SubscribeRank(roomId, myUid, rank =>\r\n            {\r\n                if (_rankReceived) return;\r\n                _rankReceived = true;\r\n\r\n                // ★ 확정: 골드 + 티어 + 저장 (여기서만 티어 적용!)\r\n                MultiRunResultService.ConfirmRank(result, run, calculator, user, rank, _totalPlayers);\r\n                RunResultUIService.UpdateRank(rank);\r\n\r\n                ctx.Repository?.UnsubscribeDeaths(roomId);\r\n                ctx.Repository?.UnsubscribeRank(roomId, myUid);\r\n\r\n                if (ctx.Session != null && ctx.Session.IsHost)\r\n                    StartCoroutine(DelayedEndGame(3f));\r\n                else\r\n                    EndGame();\r\n            });\r\n\r\n            StartCoroutine(EndGameTimeout(roomId, myUid, 60f));\r\n        }\r\n\r\n        // =========================================================\r\n        // ★ 공통: 결과 데이터 생성 로직 추출\r\n        // =========================================================\r\n        private RunResultData BuildRunResult(RunProgress run, SlotScoreCalculator calculator, int initialRank)\r\n        {\r\n            var user = UserManager.Instance.CurrentUserData;\r\n            long rawScore = calculator.MultiScore(run);\r\n\r\n            return new RunResultData\r\n            {\r\n                _userId = user._userId,\r\n                _userNick = user._userNick,\r\n                _finalScore = (int)rawScore,\r\n                _maxCombo = run.MaxCombo,\r\n                _survivalTime = run.SurvivalSeconds,\r\n                _settlementCount = run.SettleCount,\r\n                _rank = initialRank,\r\n                _rawScore = rawScore,\r\n                _earnedGold = (int)calculator.MultiCurrency(run, initialRank)\r\n            };\r\n        }\r\n\r\n        // =========================================================\r\n        // ★ 공통: UI 표시 로직 외부화 (딜레이 조절 가능)\r\n        // =========================================================\r\n        private void ShowResultUI(RunResultData result, float delaySeconds)\r\n        {\r\n            if (delaySeconds > 0f)\r\n                StartCoroutine(ShowResultDelayed(result, delaySeconds));\r\n            else\r\n                RunResultUIService.Show(result);\r\n        }\r\n\r\n        private IEnumerator ShowResultDelayed(RunResultData result, float delay)\r\n        {\r\n            yield return new WaitForSeconds(delay);\r\n            RunResultUIService.Show(result);\r\n        }\r\n\r\n        private void OnDeathsUpdated(DataSnapshot snapshot, string roomId, string myUid,\r\n            int totalPlayers, RoomContext ctx)\r\n        {\r\n            if (!snapshot.Exists) return;\r\n\r\n            // P2: 종료 조건 = 생존 ≤1명(전원-1 사망). totalPlayers=시작 총원(고정) 기준.\r\n            if ((int)snapshot.ChildrenCount < totalPlayers - 1) return;\r\n            if (_ranksWritten) return;\r\n            _ranksWritten = true;\r\n\r\n            var deaths = new List<(string uid, long time)>();\r\n            foreach (var child in snapshot.Children)\r\n            {\r\n                long time = 0;\r\n                var timeNode = child.Child(\"time\");\r\n                if (timeNode.Exists)\r\n                    long.TryParse(timeNode.Value.ToString(), out time);\r\n                deaths.Add((child.Key, time));\r\n            }\r\n\r\n            deaths.Sort((a, b) => a.time.CompareTo(b.time)); // 시각 오름차순(먼저 죽은 순)\r\n\r\n            // P2 등수: 사망자 = N-i (첫 사망 i=0 → N위 꼴찌, 늦게 죽을수록 상위) + 생존자(로스터-사망)=1위.\r\n            var ranks = new Dictionary<string, int>();\r\n            var deadSet = new HashSet<string>();\r\n            for (int i = 0; i < deaths.Count; i++)\r\n            {\r\n                ranks[deaths[i].uid] = totalPlayers - i;\r\n                deadSet.Add(deaths[i].uid);\r\n            }\r\n            if (ctx.Session != null)\r\n                foreach (var uid in ctx.Session.Players.Keys)\r\n                    if (!deadSet.Contains(uid)) ranks[uid] = 1; // last-man 생존자 = 1위\r\n\r\n            ctx.Repository?.WriteRanks(roomId, ranks);\r\n            Debug.Log($\"[GameController] 등수 확정(생존≤1) — 사망 {deaths.Count}/{totalPlayers}, 랭크 {ranks.Count}개 기록.\");\r\n        }\r\n\r\n        // ── P2: 내 등수 확정(죽었든 살아남았든 종료 시). ─────────────────────────────\r\n        // 죽었으면 _pendingResult(HandleMultiplayerDeath서 세팅), 생존자(승자)면 현재 run으로 결과 새로 생성.\r\n        private void OnMyRankConfirmed(int rank, RoomContext ctx)\r\n        {\r\n            if (_rankReceived) return;\r\n            _rankReceived = true;\r\n\r\n            var calculator = _scoreCalculator ?? new SlotScoreCalculator(_dataManager._gameBalance._data._slotScore);\r\n            var user = UserManager.Instance.CurrentUserData;\r\n            var run = _pendingRun ?? _slotMachine?.Run;   // 생존자는 pending 없음 → 현재 머신 run\r\n\r\n            var result = _pendingResult;\r\n            if (result == null && run != null)            // 생존자(승자): 결과 새로 생성 + 표시\r\n            {\r\n                result = MultiRunResultService.CreateProvisional(run, calculator, user, rank);\r\n                ShowResultUI(result, 0f);\r\n            }\r\n            if (result != null && run != null)\r\n                MultiRunResultService.ConfirmRank(result, run, calculator, user, rank, _totalPlayers); // 골드/티어/저장 1회\r\n\r\n            RunResultUIService.UpdateRank(rank);\r\n\r\n            string roomId = ctx.Session != null ? ctx.Session.RoomId : null;\r\n            string myUid = ctx.Session != null ? ctx.Session.MyUid : null;\r\n            if (roomId != null)\r\n            {\r\n                ctx.Repository?.UnsubscribeDeaths(roomId);\r\n                if (myUid != null) ctx.Repository?.UnsubscribeRank(roomId, myUid);\r\n            }\r\n\r\n            if (ctx.Session != null && ctx.Session.IsHost)\r\n                StartCoroutine(DelayedEndGame(3f));\r\n            else\r\n                EndGame();\r\n        }\r\n\r\n        private IEnumerator DelayedEndGame(float delay)\r\n        {\r\n            yield return new WaitForSeconds(delay);\r\n            EndGame();\r\n        }\r\n\r\n        private IEnumerator EndGameTimeout(string roomId, string myUid, float seconds)\r\n        {\r\n            yield return new WaitForSeconds(seconds);\r\n            if (_rankReceived) yield break;\r\n            _rankReceived = true;\r\n\r\n            var ctx = RoomContext.Instance;\r\n            ctx.Repository?.UnsubscribeDeaths(roomId);\r\n            ctx.Repository?.UnsubscribeRank(roomId, myUid);\r\n\r\n            // ★ 등수 못 받았어도 임시 등수로 확정 처리 (안 하면 결과가 영영 저장 안 됨!)\r\n            if (_pendingResult != null && _pendingRun != null)\r\n            {\r\n                var calculator = _scoreCalculator ?? new SlotScoreCalculator(_dataManager._gameBalance._data._slotScore);\r\n                MultiRunResultService.ConfirmRank(\r\n                    _pendingResult, _pendingRun, calculator,\r\n                    UserManager.Instance.CurrentUserData, _provisionalRank, _totalPlayers);\r\n            }\r\n\r\n            Debug.LogWarning(\"[GameController] 등수 수신 타임아웃 → 임시 등수로 확정 종료\");\r\n            EndGame();\r\n        }\r\n\r\n        public void EndGame()\r\n        {\r\n            if (_gameEnded) return;\r\n            _gameEnded = true;\r\n\r\n            _liveSync?.StopSync();\r\n\r\n            var ctx = RoomContext.Instance;\r\n            if (ctx.IsInMultiplayer && ctx.Session != null && ctx.Session.IsHost)\r\n            {\r\n                ctx.Repository?.DeleteRoom(ctx.Session.RoomId);\r\n            }\r\n\r\n            if (_playerSurvival != null) _playerSurvival.enabled = false;\r\n            else\r\n            {\r\n                var ps = FindAnyObjectByType<PlayerSurvival>();\r\n                if (ps != null) ps.enabled = false;\r\n            }\r\n\r\n            RoomContext.Instance.Clear();\r\n        }\r\n    }\r\n}","lines":500},{"id":"Scripts/Network/Firebase/Matchmaking/RoomLiveSync.cs","name":"RoomLiveSync","path":"Scripts/Network/Firebase/Matchmaking/RoomLiveSync.cs","layer":"Network","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"[디버그용] 특정 UID의 최신 실시간 데이터를 반환합니다. 내 데이터는 SlotMachine에서 직접 읽어서 최신 상태를 보장합니다.","src":"﻿using System.Collections.Generic;\r\nusing UnityEngine;\r\nusing Wooduduk.Network.Firebase.Leaderboard;\r\nusing Wooduduk.Network.Firebase.Matchmaking;\r\nusing Wooduduk.Player;\r\nusing Wooduduk.Slot;\r\nusing Wooduduk.Slot.Machine;\r\n\r\nnamespace Wooduduk.Network\r\n{\r\n    public class RoomLiveSync : MonoBehaviour\r\n    {\r\n        [Header(\"동기화 설정\")]\r\n        [SerializeField] private float _syncInterval = 0.33f;\r\n\r\n        private SurvivalConfig _survivalConfig;\r\n        private RoomSession _session;\r\n        private RoomRepository _repo;\r\n        private SlotMachine _slotMachine;\r\n        private SlotScoreCalculator _scoreCalculator;\r\n        private float _syncTimer;\r\n        private bool _isRunning;\r\n        private bool _subscribed;\r\n\r\n        private Dictionary<string, GhostEntry> _ghostEntries = new();\r\n        // ★ 모든 플레이어의 최신 라이브 데이터 (uid → data)\r\n        private readonly Dictionary<string, RoomLiveData> _liveCache = new();\r\n        public IReadOnlyDictionary<string, RoomLiveData> LiveCache => _liveCache;\r\n\r\n        // ★ 디버그 윈도우용 프로퍼티\r\n        public bool IsSyncing => _isRunning;\r\n\r\n        public bool IsEnabled\r\n        {\r\n            get => _isRunning;\r\n            set\r\n            {\r\n                _isRunning = value;\r\n                if (!_isRunning)\r\n                {\r\n                    _syncTimer = 0f;\r\n                    Debug.Log(\"[RoomLiveSync] 비활성화됨\");\r\n                }\r\n                else\r\n                {\r\n                    Debug.Log(\"[RoomLiveSync] 활성화됨 ✅\");\r\n                    TrySubscribe(); // 켜질 때 구독 시작\r\n                }\r\n            }\r\n        }\r\n\r\n        public void Initialize(RoomSession session, RoomRepository repository, SlotMachine slotMachine, SurvivalConfig survivalConfig, SlotScoreCalculator scoreCalculator)\r\n        {\r\n            _session = session;\r\n            _repo = repository;\r\n            _slotMachine = slotMachine;\r\n            _survivalConfig = survivalConfig;\r\n            _scoreCalculator = scoreCalculator;\r\n\r\n            _syncTimer = 0f;\r\n            _isRunning = true;\r\n            _liveCache.Clear();\r\n\r\n            TrySubscribe();\r\n\r\n            Debug.Log($\"[RoomLiveSync] 초기화 완료 및 동기화 시작 ✅ (Room: {session.RoomId})\");\r\n        }\r\n\r\n        private void TrySubscribe()\r\n        {\r\n            if (_subscribed || _repo == null || _session == null) return;\r\n            if (string.IsNullOrEmpty(_session.RoomId)) return;\r\n\r\n            // ★ 상대방 라이브 데이터 구독 시작\r\n            _repo.SubscribeLive(_session.RoomId, OnLiveReceived);\r\n            _subscribed = true;\r\n            Debug.Log(\"[RoomLiveSync] 상대 라이브 구독 시작\");\r\n        }\r\n\r\n        // ★ Firebase에서 실시간 데이터가 올 때마다 호출됨\r\n        private void OnLiveReceived(Dictionary<string, RoomLiveData> all)\r\n        {\r\n            if (all == null) return;\r\n\r\n            foreach (var kvp in all)\r\n            {\r\n                _liveCache[kvp.Key] = kvp.Value;\r\n            }\r\n        }\r\n\r\n        public void StopSync()\r\n        {\r\n            _isRunning = false;\r\n\r\n            if (_subscribed && _repo != null && _session != null)\r\n            {\r\n                _repo.UnsubscribeLive(_session.RoomId);\r\n                _subscribed = false;\r\n            }\r\n\r\n            _slotMachine = null;\r\n            Debug.Log(\"[RoomLiveSync] 동기화 중단됨 🛑\");\r\n        }\r\n\r\n        private void Update()\r\n        {\r\n            // 세션이나 레포가 없으면 초기화가 안 된 것이므로 실행 안 함\r\n            if (!_isRunning || _slotMachine == null || _session == null || _repo == null) return;\r\n\r\n            _syncTimer += Time.deltaTime;\r\n            if (_syncTimer < _syncInterval) return;\r\n            _syncTimer = 0f;\r\n\r\n            SendMyLiveData();\r\n            SimulateGhosts(); // ★ 고스트 시뮬레이션 추가\r\n        }\r\n\r\n        private void SendMyLiveData()\r\n        {\r\n            if (string.IsNullOrEmpty(_session.RoomId) || string.IsNullOrEmpty(_session.MyUid)) return;\r\n\r\n            var run = _slotMachine.Run;\r\n\r\n            var liveData = new RoomLiveData\r\n            {\r\n                score = _scoreCalculator != null ? _scoreCalculator.MultiScore(run) : run.BankedWood,\r\n                combo = run.Combo,\r\n                temperature = run.BodyTemp,\r\n                alive = _slotMachine.IsAlive,\r\n                spinIndex = run.SpinIndex,\r\n                fireLit = run.FireBurnSeconds > 0f  // 모닥불 연소시간 남으면 ON\r\n            };\r\n\r\n            // ★ 내 데이터도 캐시에 즉시 반영 (디버그 창에서 바로 보이게)\r\n            _liveCache[_session.MyUid] = liveData;\r\n\r\n            try\r\n            {\r\n                _repo.UpdateLive(_session.RoomId, _session.MyUid, liveData);\r\n            }\r\n            catch (System.Exception e)\r\n            {\r\n                Debug.LogError($\"[RoomLiveSync] Live 전송 실패: {e.Message}\");\r\n            }\r\n        }\r\n\r\n        /// <summary>\r\n        /// [디버그용] 특정 UID의 최신 실시간 데이터를 반환합니다.\r\n        /// 내 데이터는 SlotMachine에서 직접 읽어서 최신 상태를 보장합니다.\r\n        /// </summary>\r\n        public RoomLiveData GetPlayerLiveData(string uid)\r\n        {\r\n            // 내 데이터: SlotMachine에서 직접 읽음\r\n            if (_session != null && uid == _session.MyUid && _slotMachine != null)\r\n            {\r\n                var run = _slotMachine.Run;\r\n                return new RoomLiveData\r\n                {\r\n                    // ★ SendMyLiveData와 동일 규칙으로 맞춤(불일치 제거). score=MultiScore, fireLit 누락 복구.\r\n                    score = _scoreCalculator != null ? _scoreCalculator.MultiScore(run) : run.BankedWood,\r\n                    combo = run.Combo,\r\n                    temperature = run.BodyTemp,\r\n                    alive = _slotMachine.IsAlive,\r\n                    spinIndex = run.SpinIndex,\r\n                    fireLit = run.FireBurnSeconds > 0f   // ★ 누락 복구 — 내 패널 모닥불 표시\r\n                };\r\n            }\r\n\r\n            // 상대/고스트: 캐시에서 읽음\r\n            if (_liveCache.TryGetValue(uid, out var live))\r\n            {\r\n                return live;\r\n            }\r\n\r\n            // 데이터 없음\r\n            return new RoomLiveData\r\n            {\r\n                alive = true,\r\n                score = 0,\r\n                combo = 0,\r\n                temperature = 36.5f,\r\n                spinIndex = 0\r\n            };\r\n        }\r\n\r\n        // 외부에서 고스트 데이터 주입\r\n        public void SetGhostEntries(Dictionary<string, GhostEntry> entries)\r\n        {\r\n            _ghostEntries = entries ?? new Dictionary<string, GhostEntry>();\r\n            Debug.Log($\"[RoomLiveSync] 고스트 엔트리 {_ghostEntries.Count}개 주입됨\");\r\n        }\r\n\r\n        // ★ 고스트 로컬 시뮬레이션\r\n        private void SimulateGhosts()\r\n        {\r\n            if (_session == null) return;\r\n\r\n            // ★ 세션 GO(run.Started) 전엔 고스트 점수·체온 진행 정지. 실플레이어와 동일하게 카운트다운 후부터 시작.\r\n            //   초기 캐시 엔트리는 대기 중에도 만들어 좌석/보드에 정상 초기값(0점/풀체온) 표시.\r\n            bool started = _slotMachine != null && _slotMachine.Run != null && _slotMachine.Run.Started;\r\n\r\n            foreach (var kvp in _session.Players)\r\n            {\r\n                var p = kvp.Value;\r\n                if (!p.isGhost) continue;\r\n\r\n                // 캐시에 없으면 초기 데이터 생성\r\n                if (!_liveCache.TryGetValue(p.uid, out var ghostLive))\r\n                {\r\n                    ghostLive = new RoomLiveData\r\n                    {\r\n                        alive = true,\r\n                        score = 0,\r\n                        // SO에서 MaxBodyTemp 읽기, 없으면 100f\r\n                        temperature = _survivalConfig?._maxBodyTemp ?? 100f\r\n                    };\r\n                    _liveCache[p.uid] = ghostLive;\r\n                }\r\n\r\n                if (!started) continue;      // ★ GO 전엔 진행 정지(초기값만 유지) — 대기시간 전 점수상승 버그 픽스\r\n                if (!ghostLive.alive) continue;\r\n\r\n                // 체온 감소 — 플레이어와 동일한 드레인\r\n                float drain = _survivalConfig?._drainBasePerSecond ?? 4f;\r\n                ghostLive.temperature = Mathf.Max(0, ghostLive.temperature - (drain * _syncInterval));\r\n\r\n                // 점수 증가 — GhostEntry 있으면 목표 기반, 없으면 랜덤\r\n                if (_ghostEntries.TryGetValue(p.uid, out var entry))\r\n                {\r\n                    // 목표 생존시간 60초 가정 → 초당 목표 점수 역산\r\n                    float targetPerSecond = entry._score / 60f;\r\n                    ghostLive.score += Mathf.RoundToInt(targetPerSecond * _syncInterval);\r\n\r\n                    // 콤보도 maxCombo 기반으로 서서히 증가\r\n                    int targetCombo = Mathf.Clamp(entry._maxCombo, 1, 15);\r\n                    ghostLive.combo = Mathf.Min(ghostLive.combo + 1, targetCombo);\r\n                }\r\n                else\r\n                {\r\n                    // GhostEntry 없을 때 폴백 — 적당한 랜덤\r\n                    ghostLive.score += Mathf.RoundToInt(Random.Range(20f, 60f) * _syncInterval);\r\n                    ghostLive.combo = Mathf.Min(ghostLive.combo + 1, 10);\r\n                }\r\n\r\n                ghostLive.spinIndex++;\r\n\r\n                // 체온 0 → 사망\r\n                if (ghostLive.temperature <= 0f)\r\n                {\r\n                    ghostLive.alive = false;\r\n                    // 호스트만 기록 — 모든 클라가 쓰면 중복됨\r\n                    if (_session.IsHost)\r\n                        _repo?.WriteDeath(_session.RoomId, p.uid, ghostLive.score);\r\n                    Debug.Log($\"[RoomLiveSync] 고스트 {p.nick} 사망!\");\r\n                }\r\n            }\r\n        }\r\n    }\r\n}","lines":259},{"id":"Scripts/UI/ResultController.cs","name":"ResultController","path":"Scripts/UI/ResultController.cs","layer":"UI","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"사망(런 종료) 결과창. 데이터팀 RunResultUIService.Show(result)가 OnShow 이벤트를 쏘면 받아서 표시. - 다시하기: 결과창 닫고 OnRestartRequested 발생(재시작은 게임플레이가 처리). - 리더보드: 결과창은 둔 채 기존 LeaderboardController를 위에 띄움.","src":"using System;\r\nusing UnityEngine;\r\nusing UnityEngine.UIElements;\r\nusing Wooduduk.Data.Result;    // RunResultData\r\nusing Wooduduk.Data.Service;   // RunResultUIService\r\nusing Wooduduk.Tier;           // TierEvents, TierProgress, TierChangeKind, AxeTier\r\nusing Wooduduk.FX;\r\n\r\nnamespace Wooduduk.UI\r\n{\r\n    /// <summary>\r\n    /// 사망(런 종료) 결과창.\r\n    /// 데이터팀 RunResultUIService.Show(result)가 OnShow 이벤트를 쏘면 받아서 표시.\r\n    /// - 다시하기: 결과창 닫고 OnRestartRequested 발생(재시작은 게임플레이가 처리).\r\n    /// - 리더보드: 결과창은 둔 채 기존 LeaderboardController를 위에 띄움.\r\n    /// </summary>\r\n    public class ResultController : MonoBehaviour\r\n    {\r\n        [SerializeField] private UIDocument uiDocument;\r\n        [SerializeField] private LeaderboardController leaderboardController;\r\n\r\n        // 티어: 도끼 등급 7단계 스프라이트 [0]막대기 ~ [6]다이아 (인스펙터에서 크기 7로)\r\n        [SerializeField] private Sprite[] axeSprites;\r\n\r\n        /// 다시하기를 누르면 발생. 게임플레이가 구독해서 런을 재시작한다.\r\n        public static event Action OnRestartRequested;\r\n\r\n        private VisualElement overlay;\r\n        private Label rankLabel, scoreLabel;\r\n        private Label comboLabel, survivalLabel, settleLabel, goldLabel;\r\n        private Button lbButton, restartButton;\r\n\r\n        // 티어 블록(멀티 런 종료 시에만 표시). 스타일은 StyleTierBlock에서 인라인으로.\r\n        private VisualElement tierBlock, tierAxe, tierTop, tierBottom;\r\n        private Label tierRankLabel, tierLpLabel, tierDeltaLabel, tierTagLabel;\r\n\r\n        void OnEnable()\r\n        {\r\n            var root = uiDocument.rootVisualElement;\r\n            UiSfxHover.BindAll(root);\r\n            overlay = root.Q<VisualElement>(\"result-overlay\");\r\n            rankLabel = root.Q<Label>(\"result-rank\");\r\n            scoreLabel = root.Q<Label>(\"result-score\");\r\n            comboLabel = root.Q<Label>(\"result-combo\");\r\n            survivalLabel = root.Q<Label>(\"result-survival\");\r\n            settleLabel = root.Q<Label>(\"result-settle\");\r\n            goldLabel = root.Q<Label>(\"result-gold\");\r\n            lbButton = root.Q<Button>(\"result-lb-btn\");\r\n            restartButton = root.Q<Button>(\"result-restart-btn\");\r\n\r\n            tierBlock = root.Q<VisualElement>(\"result-tier\");\r\n            tierAxe = root.Q<VisualElement>(\"result-tier-axe\");\r\n            tierTop = root.Q<VisualElement>(\"result-tier-top\");\r\n            tierBottom = root.Q<VisualElement>(\"result-tier-bottom\");\r\n            tierRankLabel = root.Q<Label>(\"result-tier-rank\");\r\n            tierTagLabel = root.Q<Label>(\"result-tier-tag\");\r\n            tierLpLabel = root.Q<Label>(\"result-tier-lp\");\r\n            tierDeltaLabel = root.Q<Label>(\"result-tier-delta\");\r\n            StyleTierBlock();\r\n\r\n            lbButton.clicked += OpenLeaderboard;\r\n            restartButton.clicked += Restart;\r\n\r\n            // 데이터팀 진입점 구독(\"전화 받기\")\r\n            RunResultUIService.OnShow += HandleShow;\r\n            RunResultUIService.OnRankUpdated += UpdateDisplayedRank;\r\n            TierEvents.OnTierChanged += HandleTierChanged;\r\n\r\n            Hide();\r\n        }\r\n\r\n        void OnDisable()\r\n        {\r\n            RunResultUIService.OnShow -= HandleShow;\r\n            RunResultUIService.OnRankUpdated -= UpdateDisplayedRank;\r\n            TierEvents.OnTierChanged -= HandleTierChanged;\r\n        }\r\n\r\n        // 게임플레이 사망 → RunResultUIService.Show → 여기로 도착\r\n        private void HandleShow(RunResultData result)\r\n        {\r\n            if (result == null) return;\r\n\r\n            scoreLabel.text = result._finalScore.ToString(\"N0\");\r\n            rankLabel.text = result._rank > 0 ? result._rank + \"등\" : \"-\";  // 순위 없으면 \"-\"(원하면 \"순위 없음\"/\"미정\"으로)\r\n            comboLabel.text = result._maxCombo.ToString();\r\n            survivalLabel.text = result._survivalTime.ToString(\"F1\") + \"초\";\r\n            settleLabel.text = result._settlementCount.ToString();\r\n            goldLabel.text = \"+\" + result._earnedGold;\r\n\r\n            Show();\r\n        }\r\n\r\n        // 비동기로 등수가 확정되면 rankLabel만 업데이트\r\n        private void UpdateDisplayedRank(int rank)\r\n        {\r\n            if (rankLabel != null) rankLabel.text = \"#\" + rank;\r\n        }\r\n\r\n        public void Show()\r\n        {\r\n            overlay.style.display = DisplayStyle.Flex;\r\n        }\r\n\r\n        public void Hide()\r\n        {\r\n            overlay.style.display = DisplayStyle.None;\r\n            // 티어 블록은 멀티 런에서 OnTierChanged가 와야만 다시 켜짐.\r\n            // 여기서 숨겨두면 싱글 런(이벤트 없음)에선 이전 멀티 잔상이 안 남음.\r\n            if (tierBlock != null) tierBlock.style.display = DisplayStyle.None;\r\n        }\r\n\r\n        // 결과창은 그대로 두고 리더보드 모달을 위에 띄움\r\n        private void OpenLeaderboard()\r\n        {\r\n            if (leaderboardController != null) leaderboardController.Show();\r\n        }\r\n\r\n        // 결과창 내려가고, 게임플레이에 재시작 요청\r\n        private void Restart()\r\n        {\r\n            UiSfxEvent.Click();\r\n            Hide();\r\n            OnRestartRequested?.Invoke();\r\n        }\r\n\r\n        // ── 티어 ───────────────────────────────────────────────\r\n        // 멀티 런 종료 시 한 번 도착. 등급/LP + 이번 런 델타 + 승급/강등 태그.\r\n        // 싱글 런은 이벤트가 안 오므로 블록이 계속 숨겨진 상태로 남는다(Hide가 리셋).\r\n        private void HandleTierChanged(TierProgress p)\r\n        {\r\n            TierState s = p.NewState;\r\n\r\n            if (tierRankLabel != null) tierRankLabel.text = ToKorean(s.Rank);\r\n            if (tierLpLabel != null) tierLpLabel.text = \"LP \" + s.Lp;\r\n\r\n            if (tierDeltaLabel != null)\r\n            {\r\n                tierDeltaLabel.text = (p.LpDelta >= 0 ? \"+\" : \"\") + p.LpDelta;\r\n                tierDeltaLabel.style.color = p.LpDelta >= 0 ? Hex(\"#9be08a\") : Hex(\"#ff8a8a\");\r\n            }\r\n\r\n            if (tierAxe != null && axeSprites != null\r\n                && (int)s.Rank < axeSprites.Length && axeSprites[(int)s.Rank] != null)\r\n                tierAxe.style.backgroundImage = new StyleBackground(axeSprites[(int)s.Rank]);\r\n\r\n            if (tierTagLabel != null)\r\n            {\r\n                if (p.DemoteBlockedByProtection)\r\n                    SetTag(\"보호\", Hex(\"#ffd27a\"), Hex(\"#3a2e0e\"));\r\n                else if (p.Change == TierChangeKind.Promoted)\r\n                    SetTag(\"승급\", Hex(\"#9be08a\"), Hex(\"#1f3315\"));\r\n                else if (p.Change == TierChangeKind.Demoted)\r\n                    SetTag(\"강등\", Hex(\"#ff8a8a\"), Hex(\"#3a1818\"));\r\n                else\r\n                    tierTagLabel.style.display = DisplayStyle.None;\r\n            }\r\n\r\n            if (tierBlock != null) tierBlock.style.display = DisplayStyle.Flex;\r\n        }\r\n\r\n        private void SetTag(string txt, Color fg, Color bg)\r\n        {\r\n            tierTagLabel.text = txt;\r\n            tierTagLabel.style.color = fg;\r\n            tierTagLabel.style.backgroundColor = bg;\r\n            tierTagLabel.style.display = DisplayStyle.Flex;\r\n        }\r\n\r\n        // ResultPanel.uss를 안 건드리고 코드로 스타일 지정(우드/불 테마 일관).\r\n        private void StyleTierBlock()\r\n        {\r\n            if (tierBlock != null)\r\n            {\r\n                tierBlock.style.flexDirection = FlexDirection.Row;\r\n                tierBlock.style.alignItems = Align.Center;\r\n                tierBlock.style.backgroundColor = Hex(\"#332419\");\r\n                SetBorder(tierBlock, Hex(\"#f5c542\"), 2, 12);\r\n                tierBlock.style.paddingTop = 12; tierBlock.style.paddingBottom = 12;\r\n                tierBlock.style.paddingLeft = 16; tierBlock.style.paddingRight = 16;\r\n                tierBlock.style.marginTop = 12; tierBlock.style.marginBottom = 4;\r\n            }\r\n            if (tierAxe != null)\r\n            {\r\n                tierAxe.style.width = 52; tierAxe.style.height = 52;\r\n                tierAxe.style.backgroundColor = Hex(\"#1f1810\");\r\n                SetBorder(tierAxe, Hex(\"#7a5638\"), 2, 10);\r\n                tierAxe.style.marginRight = 14;\r\n            }\r\n            if (tierTop != null) { tierTop.style.flexDirection = FlexDirection.Row; tierTop.style.alignItems = Align.Center; }\r\n            if (tierBottom != null) { tierBottom.style.flexDirection = FlexDirection.Row; tierBottom.style.alignItems = Align.Center; tierBottom.style.marginTop = 4; }\r\n            if (tierRankLabel != null)\r\n            {\r\n                tierRankLabel.style.color = Hex(\"#e6e6e6\");\r\n                tierRankLabel.style.fontSize = 22;\r\n                tierRankLabel.style.unityFontStyleAndWeight = FontStyle.Bold;\r\n            }\r\n            if (tierTagLabel != null)\r\n            {\r\n                tierTagLabel.style.fontSize = 13;\r\n                tierTagLabel.style.unityFontStyleAndWeight = FontStyle.Bold;\r\n                tierTagLabel.style.marginLeft = 10;\r\n                tierTagLabel.style.paddingLeft = 8; tierTagLabel.style.paddingRight = 8;\r\n                tierTagLabel.style.paddingTop = 2; tierTagLabel.style.paddingBottom = 2;\r\n                tierTagLabel.style.borderTopLeftRadius = 6; tierTagLabel.style.borderTopRightRadius = 6;\r\n                tierTagLabel.style.borderBottomLeftRadius = 6; tierTagLabel.style.borderBottomRightRadius = 6;\r\n            }\r\n            if (tierLpLabel != null) { tierLpLabel.style.color = Hex(\"#ffd27a\"); tierLpLabel.style.fontSize = 18; }\r\n            if (tierDeltaLabel != null) { tierDeltaLabel.style.fontSize = 18; tierDeltaLabel.style.unityFontStyleAndWeight = FontStyle.Bold; tierDeltaLabel.style.marginLeft = 10; }\r\n        }\r\n\r\n        private static void SetBorder(VisualElement e, Color c, float w, float r)\r\n        {\r\n            e.style.borderTopColor = c; e.style.borderBottomColor = c;\r\n            e.style.borderLeftColor = c; e.style.borderRightColor = c;\r\n            e.style.borderTopWidth = w; e.style.borderBottomWidth = w;\r\n            e.style.borderLeftWidth = w; e.style.borderRightWidth = w;\r\n            e.style.borderTopLeftRadius = r; e.style.borderTopRightRadius = r;\r\n            e.style.borderBottomLeftRadius = r; e.style.borderBottomRightRadius = r;\r\n        }\r\n\r\n        private static Color Hex(string h)\r\n        {\r\n            ColorUtility.TryParseHtmlString(h, out var c);\r\n            return c;\r\n        }\r\n\r\n        private static string ToKorean(AxeTier t)\r\n        {\r\n            switch (t)\r\n            {\r\n                case AxeTier.Stick: return \"막대기\";\r\n                case AxeTier.Wood: return \"나무 도끼\";\r\n                case AxeTier.Stone: return \"돌 도끼\";\r\n                case AxeTier.Iron: return \"철 도끼\";\r\n                case AxeTier.Silver: return \"은 도끼\";\r\n                case AxeTier.Gold: return \"금 도끼\";\r\n                case AxeTier.Diamond: return \"다이아 도끼\";\r\n                default: return t.ToString();\r\n            }\r\n        }\r\n    }\r\n}","lines":243},{"id":"Scripts/Slot/Animation/SlotMachinePostProcessing.cs","name":"SlotMachinePostProcessing","path":"Scripts/Slot/Animation/SlotMachinePostProcessing.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"연출 즉시 초기화","src":"﻿using UnityEngine;\nusing UnityEngine.Rendering;\nusing UnityEngine.Rendering.Universal;\nusing UnityEngine.UI;\n\nnamespace Wooduduk.Slot.Machine\n{    public class SlotMachinePostProcessing : MonoBehaviour\n    {\n        [Header(\"References\")]\n        [SerializeField] private SlotmachineController _controller;\n\n        [Header(\"Post Processing (Screen Frost)\")]\n        [SerializeField] private Volume _globalVolume; // 씬의 Global Volume\n        [SerializeField, Range(0f, 1f)] private float _maxVignetteIntensity = 0.3f;\n\n        [Header(\"UI Frost Effect\")]\n        [SerializeField] private Image _frostUI; // 화면을 덮는 얼음 캔버스 이미지\n        [SerializeField, Range(0f, 1f)] private float _maxFrostAlpha = 1f;\n\n        private Vignette _vignette;\n        private bool _isCriticalPhase = false;\n        private float _criticalStartTemp = -1f;\n\n        private void Awake()\n        {\n            if (_globalVolume != null && !_globalVolume.profile.TryGet(out _vignette))\n            {\n                Debug.LogWarning(\"Global Volume에 Vignette 오버라이드가 추가되지 않았습니다.\");\n            }\n\n            if (_frostUI != null)\n            {\n                _frostUI.raycastTarget = false;\n            }\n        }\n\n        private void OnEnable()\n        {\n            SlotEvent.OnBodyTempCritical += HandleBodyTempCritical;\n            SlotEvent.OnRunReset += HandleRunReset;\n        }\n\n        private void OnDisable()\n        {\n            SlotEvent.OnBodyTempCritical -= HandleBodyTempCritical;\n            SlotEvent.OnRunReset -= HandleRunReset;\n        }\n\n        private void HandleBodyTempCritical(RunProgress run)\n        {\n            _isCriticalPhase = true;\n            if (_controller != null)\n            {\n                _criticalStartTemp = _controller.BodyTempNormalized;\n            }\n        }\n\n        private void HandleRunReset(RunProgress run)\n        {\n            _isCriticalPhase = false;\n            _criticalStartTemp = -1f;\n            \n            // 연출 즉시 초기화\n            if (_vignette != null) _vignette.intensity.value = 0f;\n            if (_frostUI != null)\n            {\n                Color uiColor = _frostUI.color;\n                uiColor.a = 0f;\n                _frostUI.color = uiColor;\n            }\n        }\n\n        private void Update()\n        {\n            if (_controller == null) return;\n\n            // 위험 구간 진입 시점부터 사망(0)까지의 정규화된 비율 계산 (0.0 ~ 1.0)\n            float criticalProgress = 0f;\n            if (_isCriticalPhase && _criticalStartTemp > 0f)\n            {\n                criticalProgress = Mathf.InverseLerp(_criticalStartTemp, 0f, _controller.BodyTempNormalized);\n            }\n\n            // 포스트 프로세싱 비네트 제어\n            if (_vignette != null)\n            {\n                // 전체 체온 저하(1f - Normalized)와 위험 구간 진행률 중 더 극적인 연출을 위해 위험 구간 비율을 반영\n                float finalFreezeAmount = Mathf.Max(1f - _controller.BodyTempNormalized, criticalProgress);\n                _vignette.intensity.value = finalFreezeAmount * _maxVignetteIntensity;\n            }\n\n            // UI 캔버스 이미지 알파 제어 (요청하신 위험 구간 기준 완벽 비례 반영)\n            if (_frostUI != null)\n            {\n                Color uiColor = _frostUI.color;\n                uiColor.a = criticalProgress * _maxFrostAlpha;\n                _frostUI.color = uiColor;\n            }\n        }\n    }\n}","lines":101},{"id":"Scripts/Slot/Animation/SlotmachineAnimationController.cs","name":"SlotmachineAnimationController","path":"Scripts/Slot/Animation/SlotmachineAnimationController.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"(요약 없음)","src":"﻿using MoreMountains.Feedbacks;\r\nusing System.Collections;\r\nusing Unity.Services.Authentication;\r\nusing UnityEngine;\r\n\r\nnamespace Wooduduk.Slot.Machine\r\n{\r\n    public class SlotmachineAnimationController : MonoBehaviour\r\n    {\r\n\r\n        [Header(\"Controller Reference\")]\r\n        [SerializeField] private SlotmachineController _mainController;\r\n        [SerializeField] private float _RollTimer = 0.5f;\r\n\r\n        [Header(\"Machine Feedbacks\")]\r\n        [SerializeField] private MMF_Player _machineShakeFeedback;\r\n\r\n        [Header(\"Reel Settings\")]\r\n        [SerializeField] private MMF_Player[] _reelPlayers; // 회전 정지 시 덜컹거림 등의 연출을 위해 유지\r\n        [SerializeField] private float _startDelay = 0.2f;\r\n\r\n        [Header(\"Rotation Settings\")]\r\n        [SerializeField] private float _spinSpeed = 3000f; // 회전 속도\r\n        [SerializeField] private float _tensionSpinMultiplier = 0.2f;\r\n\r\n        [Header(\"Result VFX Particles\")]\r\n        [SerializeField] private ParticleSystem _perfectParticle; // 퍼펙트\r\n        [SerializeField] private ParticleSystem _acornParticle;   // 도토리\r\n        [SerializeField] private ParticleSystem _wormParticle;    // 좀벌레\r\n        [SerializeField] private ParticleSystem _luckParticle;    // 행운\r\n        [SerializeField] private ParticleSystem _firebatParticle; // 불빠따\r\n        \n        [Header(\"Makgeolli Settings\")]\n        [SerializeField] private MMF_Player _bottle; // 막걸리 연출용 MMF\n        private Vector3 _bottleStartPos; // 원래 위치 기억용\r\n        private Coroutine _makgeolliCoroutine;\r\n\r\n        private bool[] _isSpinning; // 각 릴의 회전 상태\r\n        private float[] _currentSpinSpeeds;\r\n        private Vector3[] _startEulers;\r\n        private Vector3 _machineStartEuler;\r\n\r\n        private SlotSymbolManager _symbolManager;\r\n        private SlotMachineReel[] _reels;\r\n\r\n        private SpinOutcome _cachedOutcome;\r\n        private void Awake()\r\n        {\r\n            if(_mainController == null)\r\n            _mainController = GetComponent<SlotmachineController>();\r\n            _symbolManager = GetComponent<SlotSymbolManager>();\r\n            if (_reelPlayers == null || _reelPlayers.Length == 0)\r\n            {\r\n                Debug.LogError(\"인스펙터에 _reelPlayers 배열 세팅 안 됨\");\r\n                return;\r\n            }\r\n\r\n            _isSpinning = new bool[_reelPlayers.Length];\r\n            _currentSpinSpeeds = new float[_reelPlayers.Length];\r\n            _startEulers = new Vector3[_reelPlayers.Length];\r\n            _reels = new SlotMachineReel[_reelPlayers.Length];\r\n\r\n            for (int i = 0; i < _reelPlayers.Length; i++)\r\n            {\r\n                if (_reelPlayers[i] == null)\r\n                {\r\n                    Debug.LogError($\"[인스펙터 누락] _reelPlayers 배열의 {i}번째 칸이 비어있음\");\r\n                    continue;\r\n                }\r\n\r\n                _startEulers[i] = _reelPlayers[i].transform.localEulerAngles;\r\n\r\n                _reels[i] = _reelPlayers[i].GetComponent<SlotMachineReel>();\r\n                if (_reels[i] == null)\n                {\n                    Debug.LogError($\"{_reelPlayers[i].name} 오브젝트에 SlotMachineReel 컴포넌트가 누락\");\n                }\r\n            }\r\n           \r\n            _machineStartEuler = _machineShakeFeedback.transform.localEulerAngles;\r\n\r\n            if (_bottle != null)\n            {\n                _bottleStartPos = _bottle.transform.localPosition;\n                _bottle.gameObject.SetActive(false);\n            }\r\n\r\n        }\r\n        private void OnEnable()\r\n        {\r\n            // SlotEvent 구독\r\n            SlotEvent.OnSpinStarted += StartReels;\r\n            SlotEvent.OnReelsDecided += StopReels;\r\n            SlotEvent.OnSpinJudged += HandleSpinJudged; // 판정 결과 캐싱을 위해 추가\r\n            SlotEvent.OnRunReset += HandleRunReset;     // 리셋 시 빛 초기화용\r\n        }\r\n\r\n        private void OnDisable()\r\n        {\r\n            SlotEvent.OnSpinStarted -= StartReels;\r\n            SlotEvent.OnReelsDecided -= StopReels;\r\n            SlotEvent.OnSpinJudged -= HandleSpinJudged; // 판정 결과 캐싱을 위해 추가\r\n            SlotEvent.OnRunReset -= HandleRunReset;     // 리셋 시 빛 초기화용\r\n        }\r\n\r\n        private void Update()\r\n        {\r\n            // Update 문에서 유니티 내장 Rotate를 사용해 끊김 없는 완벽한 무한 회전 처리\r\n            for (int i = 0; i < _reelPlayers.Length; i++)\r\n            {\r\n                if (_isSpinning[i])\r\n                {\r\n                    // Z축 기준으로 초고속 회전 (원하는 축으로 변경 가능)\r\n                    _reelPlayers[i].transform.Rotate(0, 0, _currentSpinSpeeds[i] * Time.deltaTime);\r\n                }\r\n            }\r\n        }\r\n        private void HandleSpinJudged(SpinOutcome outcome)\r\n        {\r\n            _cachedOutcome = outcome;\r\n        }\r\n\r\n        private void HandleRunReset(RunProgress run)\n        {\n            // 리셋 시 모든 릴의 빛 끄기\n            for (int i = 0; i < _reels.Length; i++)\n            {\n                if (_reels[i] != null) _reels[i].SetSymbolGlow(false, Color.black);\n            }\n\n            StopAndClearParticle(_perfectParticle);\n            StopAndClearParticle(_acornParticle);\n            StopAndClearParticle(_wormParticle);\n            StopAndClearParticle(_luckParticle);\n            StopAndClearParticle(_firebatParticle);\n\n            ResetMakgeolliBottle();\n        }\r\n\r\n        public void StartReels()\r\n        {\r\n            SlotEvent.RaiseAxeSwing();\r\n            for (int i = 0; i < _reelPlayers.Length; i++)\n            {\n                _isSpinning[i] = true;\r\n                _currentSpinSpeeds[i] = _spinSpeed;\r\n\r\n                if (_reels[i] != null) _reels[i].SetSymbolGlow(false, Color.black);\r\n            }\n\n            StopAndClearParticle(_perfectParticle);\n            StopAndClearParticle(_acornParticle);\n            StopAndClearParticle(_wormParticle);\n            StopAndClearParticle(_luckParticle);\n            StopAndClearParticle(_firebatParticle);\n\n            ResetMakgeolliBottle();\n\n            _machineShakeFeedback?.PlayFeedbacks();\n        }\r\n\r\n        public void StopReels(SpinResult result)\r\n        {\r\n            for (int i = result.Reels.Length; i < _reelPlayers.Length; i++)\r\n            {\r\n                _isSpinning[i] = false;\r\n                _reelPlayers[i].transform.localRotation = Quaternion.Euler(_startEulers[i].x, _startEulers[i].y, 0f);\r\n            }\r\n            //Debug.Log($\"[5.Anim] StartReels 수신 / reelPlayers={(_reelPlayers == null ? -1 : _reelPlayers.Length)}\");\r\n            StartCoroutine(StopReelsRoutine(result));\r\n        }\r\n\r\n        private IEnumerator StopReelsRoutine(SpinResult result)\r\n        {\r\n            yield return new WaitForSeconds(_RollTimer);\r\n\r\n            // 방어3(뷰 최후 방어): 논리 릴 수를 물리 릴 오브젝트(_reelPlayers) 수로 클램프.\r\n            // 방어1(카드가드)·방어2(엔진클램프)가 뚫려 논리릴 > 물리릴이 돼도, 여기서 잘라\r\n            // 아래 정지 루프의 _reelPlayers[i]/_reels[i] 접근이 범위를 넘지 않게 함.\r\n            // → IndexOutOfRangeException 원천 차단 → CompleteSpin 항상 도달 → _spinning 영구락 해소.\r\n            int totalReelCount = Mathf.Min(result.Reels.Length, _reelPlayers.Length);\r\n            if (result.Reels.Length > _reelPlayers.Length)\r\n                Debug.LogWarning($\"[릴뷰가드] 논리릴 {result.Reels.Length} > 물리릴 {_reelPlayers.Length} — 물리 수로 클램프(초과 릴 미표시).\");\r\n\r\n            int normalStopCount = Mathf.Max(0, totalReelCount - 2);\r\n\r\n            for (int i = 0; i < normalStopCount; i++)\r\n            {\r\n                _isSpinning[i] = false; // 회전 정지\r\n                _reelPlayers[i].transform.localRotation = Quaternion.Euler(_startEulers[i].x, _startEulers[i].y, 0f);\r\n\r\n                SlotEvent.RaiseReelStopped(i);\r\n                if (_reels[i] != null)\r\n                {\r\n                    _reels[i].ChangeSymbol(result.Reels[i], _symbolManager);\r\n                }\r\n                _reelPlayers[i].PlayFeedbacks();\r\n\r\n                // 멈출 때의 타격감/효과음 피드백만 여기서 단발성으로 재생\r\n                yield return new WaitForSeconds(_startDelay);\r\n            }\r\n\r\n\r\n            for (int i = normalStopCount; i < totalReelCount; i++)\r\n            {\r\n\r\n                if (i >= _reelPlayers.Length) break;\r\n                _currentSpinSpeeds[i] = _spinSpeed * _tensionSpinMultiplier;\r\n\r\n                yield return new WaitForSeconds(1f);\r\n\r\n                _isSpinning[i] = false; // 회전 정지\r\n                _reelPlayers[i].transform.localRotation = Quaternion.Euler(_startEulers[i].x, _startEulers[i].y, 0f);\r\n\r\n                SlotEvent.RaiseReelStopped(i);\r\n\r\n                if (i < result.Reels.Length && _reels[i] != null)\r\n                {\r\n                    _reels[i].ChangeSymbol(result.Reels[i], _symbolManager);\r\n                }\r\n\r\n                _reelPlayers[i].PlayFeedbacks();\r\n            }\r\n\r\n\r\n            _machineShakeFeedback?.StopFeedbacks();\r\n\r\n            _machineShakeFeedback.transform.localRotation = Quaternion.Euler(_machineStartEuler);\r\n\r\n            string[] logParts = new string[result.Reels.Length];\r\n            for (int i = 0; i < result.Reels.Length; i++)\r\n            {\r\n                logParts[i] = $\"[{i}] {result.Reels[i]}\";\r\n            }\r\n            Debug.Log($\"[슬롯 최종 결과] {string.Join(\" | \", logParts)}\");\r\n\r\n            _mainController.CompleteSpin();\r\n            SlotEvent.RaiseSpinCompleted();\r\n\r\n            for (int i = 0; i < result.Reels.Length; i++)\r\n            {\r\n                if (i < _reels.Length && _reels[i] != null)\r\n                {\r\n                    ApplyGlowIfMatched(_reels[i], result.Reels[i]);\r\n                }\r\n            }\r\n\r\n            PlayResultVFX(_cachedOutcome.Judgment, result);\r\n        }\r\n\r\n        private void ApplyGlowIfMatched(SlotMachineReel reel, SymbolId symbol)\r\n        {\r\n            if (reel == null || _cachedOutcome.Result == null) return;\r\n\r\n            var j = _cachedOutcome.Judgment;\r\n            bool highlight = false;\r\n            Color glowColor = Color.black;\r\n\r\n            // 좀벌레로 인한 실패 상태일 경우, 다른 모든 조건 무시\r\n            if (j.FailReason == FailReason.WORM)\r\n            {\r\n                if (symbol == SymbolId.WORM)\r\n                {\r\n                    highlight = true;\r\n                    glowColor = new Color(0.6f, 0f, 1f); // 보라색\r\n                }\r\n            }\r\n            else\r\n            {\r\n                // 좀벌레 실패가 아닐 때의 일반 정상 판정\r\n                switch (symbol)\r\n                {\r\n                    case SymbolId.SWING:\r\n                        if (j.EffectiveSwingCount >= 1) { highlight = true; glowColor = Color.white; }\r\n                        break;\r\n                    case SymbolId.ACORN:\r\n                        highlight = true; glowColor = Color.sandyBrown;\r\n                        break;\r\n                    case SymbolId.LUCK:\r\n                        highlight = true; glowColor = Color.green;\r\n                        break;\r\n                    case SymbolId.PERFECT:\r\n                        if (j.IsPerfect) { highlight = true; glowColor = Color.yellow; }\r\n                        break;\r\n                    case SymbolId.FRIEBAT:\r\n                        if (j.FireBatActive) { highlight = true; glowColor = Color.red; }\r\n                        break;\r\n                    case SymbolId.MAKGEOLLI:\r\n                        if (j.MGLTriggered) { highlight = true; glowColor = Color.blue; }\r\n                        break;\r\n                }\r\n            }\r\n\r\n            reel.SetSymbolGlow(highlight, glowColor);\r\n        }\r\n\r\n\r\n        private void PlayResultVFX(SpinJudgment j, SpinResult result)\n        {\n            if (j == null) return;\n\n            // 1. 좀벌레 실패 기믹 발동 시 다른 모든 파티클을 무시하고 좀벌레만 재생\n            if (j.FailReason == FailReason.WORM)\n            {\n                _wormParticle?.Play(true);\n                return;\r\n            }\n\n            // 2. 일반 정상 판정 시 해당 기믹 파티클 재생 (중복 재생 허용 구조)\n            if (j.IsPerfect) _perfectParticle?.Play(true);\n            if (j.AcornCount > 0) _acornParticle?.Play(true);\n            if (j.FireBatActive) _firebatParticle?.Play(true);\n\n            // 행운(LUCK) 심볼 노출 여부 직접 체크\n            bool hasLuck = false;\n            if (result != null && result.Reels != null)\n            {\n                foreach (var symbol in result.Reels)\n                {\n                    if (symbol == SymbolId.LUCK)\n                    {\n                        hasLuck = true;\n                        break;\n                    }\n                }\n            }\n            if (hasLuck) _luckParticle?.Play(true);\n\n            if (j.MGLTriggered)\n            {\n                if (_makgeolliCoroutine != null) StopCoroutine(_makgeolliCoroutine);\n                _makgeolliCoroutine = StartCoroutine(PlayMakgeolliRoutine());\n            }\n\n        }\r\n\r\n        private void StopAndClearParticle(ParticleSystem ps)\r\n        {\r\n            if (ps == null) return;\r\n            ps.Stop(true, ParticleSystemStopBehavior.StopEmittingAndClear);\r\n        }\r\n\r\n        private IEnumerator PlayMakgeolliRoutine()\n        {\n            if (_bottle == null) yield break;\n\n            // 만약을 대비해 위치를 한번 더 잡아주고 활성화 후 Play\n            _bottle.transform.localPosition = _bottleStartPos;\n            _bottle.gameObject.SetActive(true);\n            _bottle.PlayFeedbacks();\n\n            // 0.5초 대기\n            yield return new WaitForSeconds(0.5f);\n\n            // MMF 정지, 비활성화, 위치 원복\n            ResetMakgeolliBottle();\n        }\n\n        // 막걸리 초기화\n        private void ResetMakgeolliBottle()\n        {\n            if (_makgeolliCoroutine != null)\n            {\n                StopCoroutine(_makgeolliCoroutine);\n                _makgeolliCoroutine = null;\n            }\n\n            if (_bottle != null)\n            {\n                _bottle.StopFeedbacks(); // 피드백 즉시 중단\n                _bottle.gameObject.SetActive(false); // 비활성화\n                _bottle.transform.localPosition = _bottleStartPos; // 원래 위치로 복귀\n            }\n        }\r\n    }\r\n}","lines":376},{"id":"Scripts/Slot/Slotmachine/SlotmachineShader.cs","name":"SlotmachineShader","path":"Scripts/Slot/Slotmachine/SlotmachineShader.cs","layer":"Slot","scenes":["Dev","Multi","Tutorial"],"entry":true,"summary":"[리팩토링] 오직 슬롯머신 3D 본체 머티리얼의 얼음 쉐이더 수치만 전담하여 제어하는 클래스","src":"﻿using UnityEngine;\r\n\r\nnamespace Wooduduk.Slot.Machine\r\n{\r\n    // [리팩토링] 오직 슬롯머신 3D 본체 머티리얼의 얼음 쉐이더 수치만 전담하여 제어하는 클래스\r\n    [RequireComponent(typeof(SlotmachineController))]\r\n    public class SlotmachineShader : MonoBehaviour\r\n    {\r\n        [Header(\"References\")]\r\n        [SerializeField] private SlotmachineController _controller;\r\n        [SerializeField] private Renderer[] _targetRenderer; // 얼어붙을 메쉬의 렌더러들\r\n\r\n        [Header(\"Shader Settings\")]\r\n        [SerializeField] private string _freezePropertyName = \"_FreezeAmount\";\r\n\r\n        private int _freezePropertyID;\r\n        private MaterialPropertyBlock _propBlock;\r\n\r\n        private void Awake()\r\n        {\r\n            if (_controller == null) _controller = GetComponent<SlotmachineController>();\r\n\r\n            _freezePropertyID = Shader.PropertyToID(_freezePropertyName);\r\n            _propBlock = new MaterialPropertyBlock();\r\n\r\n            if (_targetRenderer == null || _targetRenderer.Length == 0)\r\n            {\r\n                Debug.LogWarning(\"Target Renderer가 할당되지 않았습니다.\");\r\n            }\r\n        }\r\n\r\n        private void Update()\r\n        {\r\n            if (_controller == null || _targetRenderer == null || _targetRenderer.Length == 0) return;\r\n            if (_propBlock == null) _propBlock = new MaterialPrope
